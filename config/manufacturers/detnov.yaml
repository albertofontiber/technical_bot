series:
- name: Vesta
  members: [CAD-171, CAD-201, CAD-250]
  evidence: >-
    DEC-032 + curación Alberto s63. Cada member tiene manual PROPIO de
    instalación+usuario que NO cruza: CAD-250 = MI-372/MU-376 (solo 250);
    CAD-201 = MI-715 (portada verificada chunks_v2: "MANUAL DE INSTALACIÓN Y
    USUARIO CAD-201 — CAD-201, CAD-201-PLUS, CAD-201-Z y CAD-201-ZPLUS");
    CAD-171 = MI-716 (ídem, instalación y usuario).
  shared_docs:
  - source_file: "CAD-250_Manual-Configuracion-MC-380-es-2026-c"
    evidence: >-
      Manual de configuración de la SERIE — control de revisiones (p2, verificado
      chunks_v2 s63): rev c = "Adaptación para CAD-171 y CAD-201", 23/04/2026.
      Edición VIGENTE frente a CAD-250-MC-380-es (rev b, 16/06/2020), que queda
      fuera del registry (candidata a superseded post-A/B).
  - source_file: "CAD-250_Manual-software-configuracion-MS-416-es-2026-b"
    evidence: >-
      Software de configuración de la SERIE — versión 2026 multi-central,
      verificado chunks_v2 s63: p12 "VESTA ... incluye en las versiones de la
      CAD-250, CAD-171 y CAD-201"; p8 referencia los manuales MI-715/716 (2026).
      Confirmado por Alberto (sustituye a CAD-250-MS-416-es, solo-250, que queda
      fuera — candidata a superseded post-A/B). OJO: la tabla "control de
      revisiones" DENTRO de este PDF está desactualizada por Detnov (solo fila
      "a" de 2020) — la vigencia se ancla en el contenido, no en esa tabla.
