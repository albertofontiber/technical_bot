schema: evidence_coverage_facets_v5
max_cards: 4
window_chars: 360
min_window_chars: 20
min_distinct_terms: 2
query_alignment_min_terms:
  compatibility: 0
archetypes:
  compatibility:
    - id: protocol_scope
      terms: [compatible, compatibilidad, protocolo, fabricante, familia, protocol, manufacturer, family]
      required_any: [protocolo, protocol]
    - id: supported_device_roster
      terms: [compatible, equipo, dispositivo, detector, sensor, modelo, equipment, device, detector, sensor, model]
      required_any: [compatible]
    - id: loop_topology
      # Topology is commonly expressed as two complementary clauses: the
      # topology declaration and the physical out/return termination.  Keep
      # both exact source spans, bounded by the global four-card budget.
      terms: [lazo, bucle, cerrad, retorn, salid, loop, closed, return, out]
      required_any: [cerrad, retorn, closed, return]
      max_cards: 2
    - id: installation_requirements
      terms: [electrico, mecanico, instalacion, requisito, electrical, mechanical, installation, requirement]
