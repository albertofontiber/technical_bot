    Una vez conectadas las baterías, el orden correcto de alimentación es [F4]:


    1. Conectar primero la **alimentación de red** activando el magnetotérmico bipolar.

    2. Conectar después las **baterías**.


    > ⚠️ Si se arranca el equipo **solo con baterías** (sin red), es imprescindible
    pulsar el pulsador **BAT** (posición 9 en PCB Base) para arrancar el equipo [F4].


    ### Verificación previa


    Antes de conectar, comprueba que las baterías tienen una **tensión superior a
    24 V** con voltímetro [F4].


