- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en comprobar averías enclavadas, señales físicas como flujo/presión
    y el rearme en nivel 2, pero omite comprobaciones clave como ABORT, t.A y zonas
    en alarma. Además confunde el parámetro r.1/ri y describe mal sus valores y el
    valor por defecto, lo que puede inducir a un diagnóstico incorrecto.
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103_RP1r-Supra_lr
  - MIEMN570I
  bot_answer: '## RP1r-Supra — Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento es esperado y está controlado por el parámetro **ri (Resumen
    inhibido tras extinción)**. Aquí tienes los puntos a comprobar por orden:


    ---


    ### 1. Verifica el parámetro `ri` — Inhibición tras extinción


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras una extinción
    realizada, el sistema **debe pasar al estado de sistema inhibido** antes de volver
    al estado normal. Esto es un comportamiento normativo, no un fallo.


    El parámetro `ri` controla este comportamiento [F1]:

    - **Valor 00:** El sistema pasa a estado inhibido al finalizar la extinción o
    al agotar el tiempo configurado (valor por defecto)

    - **Valores 01 a 30:** El sistema pasa a estado inhibido después de la intervención
    o reposición, con un retardo de 1 a 30 minutos


    **Acción:** Comprueba el valor programado en `ri`. Si está en 00, el sistema permanecerá
    en estado inhibido hasta que se realice una intervención manual. Si está en 01-30,
    deberás esperar el tiempo configurado.


    ---


    ### 2. Verifica el estado "Extinción Realizada"


    Tras la descarga, el LED **"Extinción realizada"** permanece iluminado de forma
    **fija** y los relés de salida de los solenoides se **desactivan** [F2]. Este
    estado es normal y no desaparece solo.


    ---


    ### 3. Comprueba si hay averías enclavadas


    Todas las averías son **enclavadas por defecto** y requieren **rearme manual**
    para su restablecimiento [F3]. Tras una extinción, es habitual que queden activas
    señales de:

    - Presión baja (`LOW PRESS SWITCH`) — LED "Avería presión baja" intermitente [F3]

    - Señal de flujo (`FLOW PRESS SWITCH`) — LED "Avería presión flujo" intermitente
    [F3]

    - Puerta abierta (`DOOR OPEN SWITCH`) — LED "C''to. supervisión puerta abierta"
    intermitente [F3]


    Estas averías **impedirán el retorno al estado normal** aunque se pulse rearme,
    si la condición física sigue presente (botella vacía, presostato de flujo activo,
    etc.).


    ---


    ### 4. Procedimiento de rearme correcto


    Para rearmar la central [F3]:

    1. Accede al **nivel 2** de acceso (consulta sección 4.3 del manual)

    2. Pulsa la tecla **"Rearme"**

    3. La central se reiniciará y todas las entradas enclavadas se restablecerán


    > ⚠️ Si existe un **FALLO DE SISTEMA** activo, el rearme es obligatorio. Sin él,
    la central **no realizará el proceso de extinción** al considerar que no funciona
    correctamente [F4].


    ---


    ### 5. Si el fallo persiste tras el rearme


    Comprueba si aparece indicación de **FALLO DE SISTEMA** [F4]. Esto puede ocurrir
    si al arrancar hay perturbaciones en la alimentación o el microprocesador principal
    tarda en inicializar. En ese caso, realiza un nuevo rearme tras estabilizar la
    alimentación.


    ---


    **Resumen del flujo de comprobación:**

    - ¿El parámetro `ri` está configurado correctamente? → Ajusta si es necesario

    - ¿Hay averías físicas activas (presión, flujo, puerta)? → Resuelve la condición
    física primero

    - ¿Aparece FALLO DE SISTEMA? → Rearma la central

    - ¿Se ha accedido a nivel 2 para el rearme? → Obligatorio para que el rearme sea
    efectivo


    ---


    Fuente: HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada); HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
    (sin revisión registrada); HLSI-BT-001 Boletín técnico (04/11/2011)


    ---


    También puedo ayudarte con: **configuración del parámetro `ri`**, **acceso a nivel
    2 y procedimiento de rearme detallado** o **diagnóstico de averías de presión
    tras extinción** en la RP1r-Supra.'
