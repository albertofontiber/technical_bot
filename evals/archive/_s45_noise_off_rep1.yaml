  bot_sources:
  - HOP-138-8ES  issue 6_01-2026_Co
  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE
    E10/E15


    ---


    ## Información general sobre contraseñas


    - La contraseña de fábrica del **Nivel 2** es **"22222222"** [F3].

    - Se recomienda cambiarla por una contraseña exclusiva de entre **4 y 8 dígitos**
    [F1][F3].

    - Si no se usa el panel durante **5 minutos** tras iniciar sesión en Nivel 2,
    la central cierra sesión automáticamente y vuelve al Nivel 1 [F3].


    ---


    ## Cambio de contraseña de Nivel 2 (desde usuario Nivel 2)


    Procedimiento según manual de operación [F2]:


    1. Selecciona el **icono del menú** ① y luego **"Configuración"** ② → inicia sesión
    como usuario **Nivel 2**.

    2. Selecciona la opción **"Cambio del código de acceso"** ③.

    3. Verifica que **Nivel de Acceso 2** ④ esté seleccionado y que el cursor parpadee
    ⑤.

    4. Opcional: pulsa el **icono del ojo** ⑥ para visualizar la entrada.

    5. Introduce el nuevo código de acceso (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma pulsando el símbolo **✓** ⑧.

    7. Repite los pasos 3 a 6 para confirmar el código.

    8. Aparecerá el mensaje **"Cambio de código de acceso satisfactorio"** → pulsa
    **Aceptar**.


    ---


    ## Cambio de contraseña de Nivel 2 y/o Nivel 3 (desde usuario Nivel 3)


    Procedimiento según manual de puesta en marcha [F1]:


    1. Selecciona el **icono del menú** ① → **"Ajustes"** ② → inicia sesión como usuario
    **Nivel 3**.

    2. Selecciona **"Cambio del código de acceso"** ③.

    3. Selecciona el nivel a modificar: **Nivel 2 o Nivel 3** ④ y verifica que el
    cursor parpadee ⑤.

    4. Opcional: pulsa el **icono del ojo** ⑥ para visualizar la entrada.

    5. Introduce el nuevo código (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma con el símbolo **✓** ⑧.

    7. Repite los pasos 3 a 6 para confirmar.

    8. Aparecerá el mensaje **"Cambio de código de acceso satisfactorio"** → pulsa
    **Aceptar**.

    9. **Sincroniza** el programa con la central y realiza una **copia de seguridad
    en la nube** [F1].


    ---


    > ⚠️ **Importante:** Tras el cambio, es obligatorio sincronizar con la herramienta
    CLSS Configuration Tool y hacer copia de seguridad en la nube [F1]. Asegúrate
    de que los códigos se mantienen seguros y solo los conocen usuarios autorizados
    [F3].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6_01-2026_Co (manual de puesta en marcha, sin revisión registrada)

    - HOP-338-9ES issue 4_01-2026_Op (manual de operación, sin revisión registrada)


