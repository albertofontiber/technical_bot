    \   - Si quieres que aplique a toda la zona: selecciona **\"Zona(s) Determinada\"\
    ** e indica el rango de zona [F2].\n   - Si quieres que aplique a cualquier zona\
    \ del sistema: selecciona **\"Cualquier Zona\"** [F2].\n\n4. Activa la casilla\
    \ **\"Coincidencia de 2 Equipos\"** (o **\"Coincidencia de 2 Zonas\"** según el\
    \ criterio deseado) [F2][F4].\n\n5. **⚠️ ATENCIÓN (EN54-2: 7.1.4):** No incluyas\
    \ pulsadores manuales (MCP) en el grupo de coincidencia [F1]. Para evitarlo, programa\
    \ **dos instrucciones** en la Matriz de Control [F1]:\n   - **Instrucción 1:**\
    \ Define la entrada tipo **'Pulsador Manual' (MCP)** como **'Simple'** (sin coincidencia)\
    \ [F1].\n   - **Instrucción 2:** Define el tipo de entrada analógica (p.ej. **'ANALÓGICA'**)\
    \ al que se aplicará la coincidencia. El grupo ANALÓGICO incluye detectores TÉRMICOS,\
    \ IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR [F1].\n\n6. La función de coincidencia\
    \ solo es aplicable si la entrada está especificada como **'ZONA'**, **'SUBZONA'**\
    \ o **'CUALQUIERA'** — no si es un equipo individual o una tecla [F1].\n\n7. En\
    \ el **evento de salida**, configura la acción como **\"Activar\"** sobre la función\
    \ especial **\"Circuito Sirena\"** correspondiente [F5].\n\n---\n\n## MÉTODO 2\
    \ — Coincidencia de equipos a nivel de sistema (software v4.63 o superior)\n\n\
    Este método es más avanzado: la central **no entra en alarma** hasta que se cumple\
    \ el criterio de coincidencia. Mientras tanto, el sistema queda en estado de **PRIMERA\
    \ ALARMA / PREALARMA** [F3].\n\n### Niveles de coincidencia disponibles [F3]:\n\
    \n- **Nivel 1:** Sin coincidencia (por defecto) — alarma inmediata.\n- **Nivel\
    \ 2:** Dos o más sensores en la **misma zona**.\n- **Nivel 3:** Dos o más sensores\
    \ en **diferentes zonas, misma central**.\n- **Nivel 4:** Dos o más sensores en\
    \ la **misma zona o zonas diferentes, misma central**.\n- **Nivel 5:** Dos o más\
    \ sensores en zonas diferentes, misma central o centrales diferentes *(solo red)*.\n\
    - **Nivel 6:** Dos o más sensores en cualquier zona, misma central o centrales\
    \ diferentes *(solo red)*.\n\nPara tu caso (dos detectores en la misma zona activando\
    \ la sirena), selecciona el **Nivel 2** [F3].\n\n### Limitaciones importantes\
    \ [F3]:\n- **No aplica a módulos** — los módulos de entrada siempre actúan con\
