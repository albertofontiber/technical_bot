    y sirenas) que son irrelevantes y pueden confundir al técnico.
  bot_sources:
  - MIE-MI-310
  - MIE-MP-310
  bot_answer: 'La pregunta menciona "lazos de la central Morley ZXe", pero los fragmentos
    disponibles son del **ZXAE/ZXEE**, no del ZXe. Aun así, dado que son centrales
    de la misma familia Morley, te indico lo que aparece en los fragmentos — verifica
    que tu equipo sea efectivamente el ZXAE o ZXEE antes de aplicar estos valores.


    ---


    Los fragmentos del manual MIE-MI-310 distinguen **dos tipos de lazos**, cada uno
    con su propia resistencia de fin de línea:


    ---


    **1. Lazo periférico (RS-485)**


    - Resistencia final de línea (RFL): **150 Ω, 0,5 W mínimo** [F1]

    - Se instala en cada extremo del lazo cuando se trabaja en **lazo abierto** [F1]

    - En lazo cerrado no se requiere RFL [F1]


    ---


    **2. Salidas de sirenas convencionales (Salida A, B, C, D)**


    - Resistencia final de línea (RFL): **6.800 Ω (6K8), 0,5 W mínimo** [F2] [F3]

    - Se instala entre **+** y **−** de la última sirena del circuito [F2]

    - Si no hay sirenas conectadas, la RFL se coloca directamente en los terminales
    de salida de la central [F2]

    - ⚠️ No realizar ramales en la línea de sirenas, ya que los ramales paralelos
    no quedan supervisados [F3]


    ---


    **3. Lazos analógicos**


    - Los fragmentos disponibles **no especifican resistencia de fin de línea** para
    los lazos analógicos [F5]. El lazo analógico trabaja con comunicación digital
    a dos hilos y los fragmentos solo indican comprobaciones de resistencia de lazo
    (máximo **36 Ω** con un extremo puenteado) [F5], pero no una RFL de supervisión.


    ---


    ⚠️ **Nota importante:** Los fragmentos son del **ZXAE/ZXEE** (manual MIE-MI-310).
    Si tu central es el **ZXe** (modelo distinto), estos valores pueden no aplicar
