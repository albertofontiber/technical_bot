- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta la capacidad principal del lazo, los límites CLIP/mixto y describe
    bastante bien la autoconfiguración. Pero omite la carga máxima de 0,75 A, el límite
    específico PEARL de 25 equipos entre aisladores, y la parte de edición individual
    queda incompleta/truncada sin los campos clave ni la inicialización OPAL.
  bot_sources:
  - 997-669-005-3_Instal-Comm_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Notifier PEARL — Lazo SLC: capacidad, aisladores y alta/edición
    de equipos


    ---


    ### 1. Capacidad máxima del lazo


    - **Máximo 318 equipos por lazo analógico**: hasta **159 sensores** y **159 módulos**
    [F1]

    - **Límite global del sistema**: máximo **512 sensores y/o pulsadores manuales**
    entre ambos lazos analógicos (incluidos detectores y pulsadores de zona convencionales
    conectados) [F1]

    - En lazos **solo CLIP**: admite hasta **99 sensores y 99 módulos** [F5]

    - En lazos **mixtos Opal + CLIP**: el límite de equipos CLIP es **40**; si se
    supera, la autoconfiguración continúa pero señala fallos [F5]


    ---


    ### 2. Requisitos de aisladores (EN54-2: 12.5.2)


    - **Máximo 32 equipos entre aisladores** según EN54-2 [F1]

    - **Equipos sin aisladores internos** (protocolo CLIP y algunos Opal): **NO más
    de 20 equipos entre aisladores** [F1]

    - **Equipos con aisladores internos** (usados con base **B501 AP**): el lazo cumple
    directamente los requisitos de EN54-2 [F1]

    - La mayoría de equipos Opal tienen **aisladores internos FET**; con bases compatibles
    Opal, el aislador se conecta a los terminales **+2 y +4** en el extremo positivo
    [F1]

    - ⚠️ Para que los aisladores se cierren al aplicar alimentación, la **carga entre
    aisladores no debe superar 20 SU** [F2]


    > **Advertencia**: NUNCA utilices un multímetro de alta tensión (tipo Megger)
    en el lazo de detección. Si hay aisladores instalados, el conductor positivo (+)
    del lazo será circuito abierto [F1].


    ---


    ### 3. Alta y edición de equipos desde la central


    #### 3.1 Autoconfiguración (alta masiva)


    Acceso: **nivel de acceso 3 → menú de puesta en marcha → opción 1: Autoconfiguración**
    [F3]


    **Paso 1 — Seleccionar alcance:**

    - Todos los lazos o un lazo específico [F3]


    **Paso 2 — Seleccionar modo de autoconfiguración** [F3] [F5]:

    1. **Todos Prot. OPAL/CLIP** → detecta duplicidades de dirección

    2. **OPAL/CLIP (No detecta duplicidad)** → más rápido, ignora duplicados

    3. **Sólo con protocolo CLIP** → solo autoconfigura equipos CLIP aunque haya Opal
    en el lazo


    **Paso 3 — Seleccionar modo de actualización** [F5]:

    1. **Permite Añadir/Borrar/Cambiar** → operación completa

    2. **Sólo Añadir Nuevos Equipos** → conserva configuración existente


    El proceso se inicia automáticamente. Sensores y módulos (Opal y CLIP) se detectan
    en la misma pasada [F3].


    **Paso 4 — Ver resultados:**

    Al finalizar, los resultados se muestran por lazo de forma independiente. Usa
    las teclas **◁/▷** para navegar entre lazos [F5].


    > **Nota**: Si se autoconfigura un equipo Opal, por defecto será Opal. Si los
    equipos CLIP superan 40, selecciona manualmente la opción «Sólo con protocolo
    CLIP» [F5].


    #### 3.2 Edición individual de equipos


    Para añadir, borrar o mover un equipo concreto: **nivel de acceso 2 o 3 → sección
    «4.2 Edición de equipos»** del manual de configuración [F4].


    Para editar el texto de un equipo: **sección «5.2 Edición de texto»** [F4].


    Para ver los equipos configurados en cualquier momento: **nivel de acceso 2 →
    opción «Resumen de Equipos»** [F3].


    #### 3.3 Configuración avanzada con software


    La configuración puede realizarse de forma más óptima con el **programa de configuración
    ITS**. Tras la autoconfiguración desde la central, la configuración puede transferirse
    a un ordenador portátil para editarla y archivarla [F3].


    ---


    **Fuente:** Manual de instalación y puesta en marcha 997-669-005-3\_Instal-Comm\_ES
    (sin revisión registrada); Manual de configuración de la central 997-671-005-3\_Configuration\_ES
    (sin revisión registrada)


    ---


    También puedo ayudarte con: **edición individual de equipos (sección 4.2)**, **cálculo
    de carga de lazo con SU por tipo de equipo** o **puesta en marcha y comprobaciones
    del lazo**.'
