    esquema de conexionado físico (terminales, polaridad, diagrama de cableado) del
    módulo de aislamiento de línea. Lo que sí está documentado son los **requisitos
    de instalación y las reglas de posicionamiento** en el lazo, que son críticos
    para cumplir la normativa.


    ---


    ### Reglas de instalación de aisladores — obligatorias por EN54-2


    **1. Número máximo de equipos entre aisladores**


    Según la norma **EN54-2: 12.5.2** [F1]:

    - Máximo **32 equipos** de lazo entre aisladores (límite normativo).

    - En la central **ID2000**, el límite operativo es **25 equipos de lazo entre
    aisladores** [F1].

    - Si se utilizan **aisladores tipo FET**, el límite se reduce a **20 equipos entre
    aisladores** [F1].


    **2. Aplicación en todos los lazos**


    Los aisladores deben instalarse en **cada lazo analógico**, incluyendo los lazos
    con detectores de zona convencional y/o pulsadores manuales [F1].


    **3. Comprobación de continuidad antes de conectar aisladores**


    > ⚠️ Las comprobaciones de continuidad del lazo **deben realizarse ANTES de conectar
    los aisladores** [F1].


    **4. Comportamiento ante cortocircuito**


    Cuando se produce un cortocircuito entre dos aisladores, el sistema lo señaliza
    como **''Posible corte''** [F2]. Los equipos instalados entre los puntos de aislamiento
    aparecerán como **NO RESPONDE / PERDIDO**, o como **PÉRDIDA PARCIAL DEL LAZO**
    si faltan más de tres equipos [F2].


    ---


    ### Lo que NO está en los fragmentos disponibles


    El manual **MIDT180** no incluye en los fragmentos recuperados:

    - El esquema de conexionado físico del módulo aislador (terminales A, B, polaridad).

    - El modelo concreto del módulo de aislamiento compatible con ID2000.

    - Las instrucciones de cableado paso a paso del aislador.


    > El propio manual indica que **"estos equipos van acompañados de instrucciones
    en las que se muestran las interconexiones adecuadas para cada aplicación"** [F1].
    Consulta la hoja de instrucciones incluida con el módulo aislador específico que
    estás instalando.


    ---


