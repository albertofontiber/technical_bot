- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó en que el retardo se programa mediante reglas de causa-efecto
    y que existen tipos de retardo asociados, pero omite pasos clave como acceder
    a Causa y Efecto, borrar la Regla 1 por defecto, crear la regla con entrada/salida
    y asignar el retardo. Además afirma que hay 6 tipos pero enumera 7, lo que introduce
    imprecisión.
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    La configuración del retardo de salida de alarma en la PEARL se realiza a través
    de las **reglas de causa-efecto**. Aquí tienes el proceso completo:


    ---


    ### 1. Concepto general


    El retardo se configura dentro de una o más reglas de causa-efecto [F1]. Cuando
    hay una regla con retardo activo, el **LED de RETARDO ACTIVO** se enciende en
    el panel [F3].


    ---


    ### 2. Tipos de retardo disponibles


    Hay **6 tipos de retardo de salida** que puedes asignar a una regla [F1]. Sus
    diferencias clave son [F2]:


    - **Fijo**: No se puede silenciar, no se puede anular, no muestra cuenta atrás
    en LCD.

    - **Estándar**: Se detiene si se pulsa SILENCIAR SIRENAS; se puede anular en nivel
    de acceso 2; muestra cuenta atrás; se puede detener con FIN RETARDO.

    - **No Silenc.**: No se detiene con SILENCIAR SIRENAS; sí se puede anular en nivel
    2; muestra cuenta atrás.

    - **Est. Ext.**: Se detiene con SILENCIAR SIRENAS; se detiene también con AMPLIAR
    RETARDO; muestra cuenta atrás.

    - **RetExtStd**: Se detiene con SILENCIAR SIRENAS; al pulsar AMPLIAR RETARDO inicia
    un segundo temporizador (retardo ampliado).

    - **No Sil. Ext**: No se detiene con SILENCIAR SIRENAS; sí se detiene con AMPLIAR
    RETARDO.

    - **SinRetExt**: Al pulsar AMPLIAR RETARDO inicia el temporizador de retardo ampliado;
    no se detiene con SILENCIAR SIRENAS.


    ---


    ### 3. Funcionamiento del retardo ampliado


    Cuando se detecta una alarma con retardo configurado, se inicia el primer temporizador.
    El usuario con llave (nivel de acceso 2) puede pulsar **AMPLIAR RETARDO** para
    iniciar un segundo temporizador (normalmente más largo), que anula al primero
    [F4]. Para terminar cualquier retardo inmediatamente, se pulsa **FIN RETARDO**
    (disponible en nivel de acceso 1) [F4].


    ---


    ### 4. Habilitar/Anular el retardo desde el menú de operación


    Si necesitas anular o rehabilitar los retardos configurados en campo (sin reprogramar):


    1. Accede al **Menú Anular/Habilitar** [F3].

    2. Selecciona **«5: Retardo Activación Salidas»** [F3].

    3. Pulsa **✓** para cambiar el estado entre HABILITADO y ANULADO [F3].

    4. Pulsa **✕** para salir [F3].


    ---


    ### 5. Opción: habilitar/deshabilitar el pulsador AMPLIAR RETARDO


    Desde los parámetros de la central, el parámetro **«10: Extend Delay Button»**
    permite activar o desactivar el pulsador AMPLIAR RETARDO, ya que en algunos mercados
    no se requiere esta función [F5].


    ---


    > ⚠️ **Nota importante**: Los fragmentos disponibles describen los tipos de retardo
    y su comportamiento, pero **no detallan el procedimiento paso a paso para crear
    o editar una regla de causa-efecto con un valor de tiempo concreto** (p. ej.,
    cómo introducir 30 segundos de retardo en la regla). Para ese nivel de detalle,
    consulta el Apéndice 5 completo del manual de configuración.


    ---


    **Fuente:** Manual de configuración de la central PEARL – 997-671-005-3\_Configuration\_ES
    (sin revisión registrada); Manual de funcionamiento PEARL – 997-670-005-3\_Operating\_ES
    (sin revisión registrada)


    ---


    También puedo ayudarte con: **borrar una regla de causa-efecto**, **configurar
    el modo día/noche** o **anular zonas y equipos** en la PEARL.'
- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta lo esencial del conexionado: salidas supervisadas, 2/4 circuitos,
    RFL 6K8 0,5 W, diodo/polaridad inversa y 1 A por circuito. Pero mezcla la ZXe
    con modelos/manual ZXAE/ZXEE, da referencias/terminales físicos dudosos o incorrectos
    y usa términos como “serie” que pueden inducir a error.'
  bot_sources:
  - MIE-MI-310
  - MIE-MP-310
  - MIE-MU-310
  bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe (ZXAE/ZXEE)


    ## Diferencias entre modelos


    - **ZXAE**: dispone de **2 salidas supervisadas** para campanas convencionales
    (Salida A y B) [F2]

    - **ZXEE**: dispone de **4 salidas supervisadas** para sirenas convencionales
    (Salida A, B, C y D) [F2]


    ---


    ## Procedimiento de conexionado


    ### 1. Conexión en serie (sin ramales)

    Las sirenas se conectan en **línea directa**, una tras otra, respetando la polaridad
    [F1]:

    - Sirenas **con polaridad**: conectar respetando + y − de cada sirena [F1]

    - Campanas **sin polaridad**: instalar un **diodo** entre el terminal + y uno
    de los terminales de alimentación de la campana, para evitar consumos durante
    la supervisión [F2]


    > ⚠️ **CRÍTICO**: **No realizar ramales** en la línea de sirenas. La supervisión
    se realiza sobre la línea directa hasta la RFL; los ramales paralelos no podrán
    ser supervisados [F1].


    ### 2. Resistencia Final de Línea (RFL)

    - Valor: **6.800 Ω (6K8) a 0,5 W mínimo** [F2]

    - Se instala **entre + y − de la última sirena** de la línea [F2]

    - Si **no hay sirenas** conectadas en la salida, conectar la RFL directamente
    en los terminales de la central [F2]


    ### 3. Corriente y supervisión

    - Corriente máxima por circuito: **1 A** [F2]

    - La supervisión usa una **corriente inversa** que lee la RFL con **polaridad
    inversa** a la de activación [F2]

    - Al activarse la salida, la corriente circula en sentido normal con la polaridad
    indicada en los terminales [F2]


    ### 4. Cableado

    - Sección mínima recomendada: **1,5 mm²** [F2]

    - Evitar longitudes excesivas que provoquen caídas de tensión en la línea [F2]


    ### 5. Terminales físicos

    - **ZXAE**: terminales de Salida A y B (ver Figura 15 del manual de instalación)
    [F2]

    - **ZXEE**: terminales **TB7** → S,A+ / S,A− / S,B+ / S,C+ / S,D+ / S,D− (ver
    Figura 15 del manual de instalación) [F2]


    ---


    También puedo ayudarte con: **cálculo de consumo de baterías con sirenas activas**,
    **configuración de zonas de disparo de sirenas** o **conexionado de módulos de
    relé supervisado**.


    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)'
