  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó en señalar obstrucción/orificios sucios/filtro colmatado y consultar
    memoria de eventos, pero omite el diagnóstico clave de leer el valor de flujo
    en V01/V02 e interpretar % respecto al reset inicial, así como ventana/retardo
    de monitorización. Además mezcla causas de flujo alto como fugas/rotura y ventilador
    defectuoso como probables de 'flujo bajo', y no aclara que es un fallo de flujo
    de aire, no una alarma como tal.
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: "## Alarma intermitente de flujo bajo en ASD535\n\n### Causa más probable\n\
    \nLa alarma intermitente de flujo bajo en el **ASD 535** indica que el sistema\
    \ de monitorización del flujo de aire ha detectado una anomalía en el conducto\
    \ de aspiración [F5]. Las causas más probables son:\n\n- **Obstrucción parcial**\
    \ en los orificios de aspiración o en el conducto de aspiración [F1]\n- **Filtro\
    \ de polvo colmatado** o próximo al fin de su vida útil [F1]\n- **Rotura o fuga**\
    \ en el conducto de aspiración [F5]\n- **Unidad de ventilación (AFU 35) degradada**\
    \ o defectuosa [F4]\n\n> El manual indica explícitamente que si los orificios\
    \ de aspiración están obstruidos, \"la toma de muestras puede resultar imposible\
    \ o insuficiente\" [F1].\n\n---\n\n### Procedimiento de diagnóstico\n\n1. **Inspección\
    \ visual del conducto de aspiración**\n   Revisa toda la tubería de PVC rígido\
    \ o ABS de **25 mm de diámetro exterior / 20 mm de diámetro interior** [F5] buscando\
    \ obstrucciones, roturas o desconexiones en uniones.\n\n2. **Inspección de los\
    \ orificios de aspiración**\n   Comprueba que los orificios no estén bloqueados\
    \ por suciedad, polvo acumulado u objetos extraños [F1].\n\n3. **Verificación\
    \ del estado del filtro**\n   Consulta la vida útil restante del filtro mediante\
    \ *EasyConfig* en la posición de conmutador **d > RE** [F1]. Si el filtro está\
    \ agotado, habrá un disparo de **\"Fallo de filtro (fin de vida útil)\"** [F1].\n\
    \n4. **Comprobación de la unidad de ventilación (AFU 35)**\n   Si los pasos anteriores\
    \ no revelan la causa, considera que la **AFU 35** puede estar degradada. Su sustitución\
    \ requiere desmontar el **Main Board AMB 35** [F4].\n\n5. **Lectura de la memoria\
    \ de eventos**\n   Accede a la memoria de eventos del ASD 535 (sección **8.5.3**\
    \ del manual) [F2] para obtener el código de evento exacto asociado al fallo de\
    \ flujo.\n\n---\n\n### Acciones correctivas según causa\n\n- **Orificios obstruidos**\
    \ → Limpiar. Tras la limpieza normalmente no es necesario reset inicial [F1].\n\
    - **Filtro colmatado** → Sustituir el elemento de filtro activando la función\
    \ **\"Sustitución del filtro\"** (botón Reset o vía *EasyConfig* / *ASD Config*)\
    \ [F1]. El ASD pasará a estado **\"Aislar\"** durante el proceso [F1].\n- **Unidad\
    \ de ventilación defectuosa** → Sustituir la **AFU 35**. Tras la sustitución es\
    \ **imprescindible** realizar un nuevo **reset inicial** (cap. **7.3.5**) [F4].\n\
    \n> ⚠️ **Advertencia**: Toda sustitución de componentes (sensores de humo, sensores\
    \ de flujo, ventilador) debe realizarse **sin tensión**, desconectando los bloques\
    \ de bornes 1/2 y, en su caso, 3/4 del AMB 35 [F1].\n\n---\n\n**Fuente:** ASD535_TD_T131192es_h\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **procedimiento\
    \ completo de sustitución del filtro**, **reset inicial tras mantenimiento (cap.\
    \ 7.3.5)** o **lectura e interpretación de la memoria de eventos del ASD535**."
