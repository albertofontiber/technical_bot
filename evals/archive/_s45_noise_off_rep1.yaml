- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en la existencia de relés NC-C-NA, las dos salidas de sirena
    con RFL de 47 kΩ y las corrientes/tensiones nominales. Pero no responde correctamente
    al punto clave del relé de avería fail-safe ante corte de alimentación, omite
    que no está enclavado y falta la vida útil mínima de 10^5 operaciones.
  bot_sources:
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés de alarma


    El equipo dispone de **dos relés de alarma**, uno por canal [F5]:


    - **Relé de alarma C1** (terminales 5, 6, 7): contactos **NC / C / NA** [F5]

    - **Relé de alarma C2** (terminales 8, 9, 10): contactos **NC / C / NA** — solo
    disponible en modelos de 2 canales [F5]


    ### Relés de avería


    Dispone igualmente de **dos relés de avería** [F5]:


    - **Relé de avería C1** (terminales 11, 12, 13): contactos **NC / C / NA** [F5]

    - **Relé de avería C2 (AUX.)** (terminales 14, 15, 16): contactos **NC / C / NA**
    — solo disponible en modelos de 2 canales [F5]


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Cuando se abre la puerta frontal de la caja durante el funcionamiento normal,
    la unidad entra en modo de servicio: **el relé de fallo indica una avería** [F3].
    Este mismo comportamiento aplica ante cualquier condición de fallo detectada por
    la unidad.


    > ⚠️ **Nota importante:** Los fragmentos disponibles describen el comportamiento
    del relé de avería al abrir la puerta [F3], pero no especifican explícitamente
    el estado de los contactos (energizado/desenergizado) ante un corte total de alimentación.
    Para confirmar si el relé es de tipo "fail-safe" (desenergizado en reposo), consulta
    el manual completo o el soporte técnico del fabricante.


    ### Salidas de sirena


    - **Salida sirena 1** (terminales 17 y 18): resistencia de fin de línea de **47
    kΩ** [F5]

    - **Salida sirena 2** (terminales 19 y 20): resistencia de fin de línea de **47
    kΩ** [F5]


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC** [F1]

    - **0,5 A a 30 V CA** [F1]


    ---


    > **Aviso sobre los fragmentos:** La tabla de terminales [F5] proviene del manual
    del **FAAST LT (versión Morley Loop)**, no del manual autónomo LT-200. Los valores
    de relé y sirena son coincidentes con los del LT-200 autónomo [F1], pero verifica
    que la designación de terminales corresponde exactamente a tu modelo (FL0111E-HS,
    FL0112E-HS o FL0122E-HS).


    ---


    **Fuentes:**

    - I56-6574-005_ES - HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-3956-201_ES Morley Loop FAAST LT QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de la entrada configurable (rearme)**,
    **conexionado de la alimentación principal y auxiliar** o **prueba funcional del
    relé de alarma** del FAAST LT-200.'
