    El **esquema de conexionado físico** del módulo de aislamiento (terminales de
    entrada/salida, polaridad, tipo de cable) **no aparece en los fragmentos recuperados**.
    Cada módulo de lazo va acompañado de sus propias instrucciones de conexionado
    [F1]:


    > *"Estos equipos van acompañados de instrucciones en las que se muestran las
    interconexiones adecuadas para cada aplicación."* [F1]


    Consulta la **hoja de instrucciones incluida con el módulo de aislamiento** o
    el apartado de cableado del lazo del manual MIDT180 (secciones **5.7.2** y **5.9.1**
