  bot_answer: '# Test anual del detector VESDA-E VEP


    Según el calendario de mantenimiento del manual, las tareas que corresponden a
    la frecuencia **anual (una vez al año)** son las siguientes [F1][F2]:


    ---


    ## Tareas anuales obligatorias


    - **Realizar una prueba de humos** para comprobar la integridad de la red de tubería
    [F1][F2]

    - **Comprobar el flujo** de la red de tubería [F1][F2]

    - **Limpiar los puntos de muestreo** [F1][F2]

    - **Limpiar con agua la red de tubería** [F1][F2]


    ---


    ## Herramientas y comandos disponibles para la prueba


    Desde el software **Xtralis VSC** se pueden ejecutar los siguientes comandos de
    prueba [F5]:


    - **Iniciar prueba de alarma ("Start Alarm Test"):** simula nivel de humo de escala
    completa, generando condiciones de Alerta, Acción, Fuego 1 y Fuego 2. Los relés
    de alarma se activarán salvo que el detector esté desactivado [F5]

    - **Inicio de la prueba de fallo de circulación del aire ("Start Air Flow Fault
    Test"):** comprueba el sistema de detección de flujo apagando el aspirador [F5]

    - **Iniciar prueba de relés ("Start Relay Test"):** activa y desactiva los relés
    disponibles para verificarlos [F5]

    - **Iniciar prueba de LED ("Start LED Test"):** realiza un ciclo de prueba de
    cada indicador LED del panel de visualización [F5]


    También se debe verificar la conexión de los relés de fallo con el panel de incendios
    mediante los comandos **Xtralis VSC Urgent Fault Test** y **Xtralis VSC Minor
    Fault Test** [F3][F4].


    ---


    ## ⚠️ Precauciones antes de realizar el mantenimiento


    1. **Informe a la autoridad supervisora adecuada** antes de comenzar [F1][F2]

    2. **Aísle los dispositivos dependientes** del detector antes de ponerlo en funcionamiento
    [F1][F2]

    3. **Siga los procedimientos del sitio** para evitar falsas alarmas en los servicios
    supervisados [F1][F2]

    4. Recuerda que **cuando el detector está deshabilitado o en espera, no emitirá
    advertencias de fuego** [F1][F2]


    ---


    ## Nota sobre frecuencias adicionales


    El manual también contempla otras tareas con distinta periodicidad [F1][F2]:

    - **Cada 3 meses:** Fuente de alimentación y batería

    - **Cada 6 meses:** Comprobar la red de tubería

    - **Cada 2 años:** Sustitución del filtro


    > La frecuencia puede variar según los códigos y normas locales y el entorno de
    la instalación [F1][F2].


