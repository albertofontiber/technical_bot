  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en orientar a revisar el parámetro de inhibición de rearme
    y averías pendientes, pero lo identifica/explica de forma imprecisa y con valores
    mal descritos. Omite comprobaciones clave del manual: entrada ABORT enclavada,
    Flow Press, parámetro t.A de duración de descarga y estado de zonas/detectores.'
  bot_sources:
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103_RP1r-Supra_lr
  - MNDT102
  bot_answer: '## RP1r / RP1r-Supra — Sistema no vuelve a estado normal tras resetear
    después de extinción


    Este comportamiento es **esperado por diseño** según la norma **UNE-EN 12094-1:2004**
    [F1]. El sistema no pasa directamente a estado normal tras la extinción: primero
    entra en **estado de sistema inhibido** (Resumen inhibido), y el retorno al estado
    normal depende del parámetro **ri** configurado.


    ---


    ### Qué comprobar paso a paso


    **1. Verifica el parámetro `ri` (Resumen inhibido tras extinción)**


    El parámetro `ri` controla el tiempo que el sistema permanece en estado inhibido
    tras la extinción antes de poder rearmarse [F1]:


    - **Valor 00** (por defecto): el resumen inhibido se activa desde que finaliza
    la extinción o cuando se agota el tiempo configurado en `ri`.

    - **Valores 01 a 30**: el resumen inhibido se activa tras intervención o reposición,
    con un retardo de 1 a 30 minutos.


    ➡️ Si `ri` está configurado con un valor alto (ej. 30), el sistema esperará ese
    tiempo antes de permitir el rearme completo. **Accede al nivel 3 de programación**
    para verificar el valor actual [F5].


    ---


    **2. Verifica que el rearme se realiza correctamente**


    En el panel, la tecla de **Rearme** es la que debe usarse para volver al estado
    normal [F3][F5]. Comprueba que:


    - El LED **"Extinción Realizada"** está activo en la carátula [F3].

    - No hay condiciones de avería activas (LED **"Avería Extinción"**, **"Avería
    Alimentación Extinción"**, **"Fallo Sistema"**) que impidan el rearme [F3].


    ---


    **3. Comprueba si hay averías pendientes**


    Si alguno de estos indicadores está activo, el sistema no podrá volver a estado
    normal hasta resolverlos [F3]:


    - **Avería Extinción** △

    - **Avería Alimentación Extinción** △

    - **Cto. Supervisión Paro** △

    - **Cto. Supervisión Espera** △

    - **Cto. Supervisión Puerta Abierta** △

    - **Fallo Sistema** △


    ---


    **4. Accede a programación (nivel 3) para revisar `ri`**


    Para modificar el parámetro `ri` si es necesario [F5]:

    1. Accede al nivel 3 mediante el puente (jumper) de programación.

    2. Navega con la tecla **Teclado** hasta el parámetro `ri`.

    3. Ajusta el valor con **Retardo Sí/No** (incrementar) o **Silenciar Zumbador**
    (disminuir).

    4. Confirma con la tecla **Rearme**.


    ---


    ⚠️ **Nota importante**: el parámetro `ri` está vinculado al cumplimiento de la
    norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1]. Cualquier modificación debe
    respetar los requisitos normativos de la instalación.


    ---


    **Fuentes:**

    - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr (sin revisión registrada)

    - HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada)

    - MNDT102 (sin revisión registrada)


    ---


    También puedo ayudarte con: **acceso al nivel 3 de programación**, **interpretación
    de LEDs de avería en carátula** o **procedimiento completo de rearme tras extinción**
    de la RP1r.'
