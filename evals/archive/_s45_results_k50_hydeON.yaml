  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: La respuesta acierta en el orden de conexión, la verificación de >24V,
    el uso del pulsador BAT y menciona el cable puente y fusible. Sin embargo, queda
    incompleta/imprecisa porque no indica explícitamente que son dos baterías de 12V
    en serie uniendo el positivo de una con el negativo de la otra, ni que rojo/negro
