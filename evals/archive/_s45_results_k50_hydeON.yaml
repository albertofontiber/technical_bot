  bot_answer: '## Conexión del módulo de aislamiento de línea en lazo ID2000


    Los fragmentos disponibles del manual **MIDT180** no incluyen el esquema de conexionado
    físico (terminales, polaridad, cableado) del módulo de aislamiento de línea para
    el lazo ID2000.


    Lo que sí está documentado en los fragmentos son los **requisitos de instalación**
    que afectan a los aisladores:


    ---


    ### Requisitos de posicionamiento según EN54-2


    - **Máximo 25 equipos de lazo entre aisladores** en la central ID2000 [F1].

    - Si se utilizan **aisladores tipo FET**, el límite se reduce a **20 equipos de
    lazo entre aisladores** [F1].

    - Los aisladores deben instalarse en **cada lazo analógico** para separar sensores
    y pulsadores manuales [F1].

    - La norma **EN54-2: 12.5.2** establece un máximo de 32 sensores y/o pulsadores
    manuales entre aisladores [F1].


    > ⚠️ **Importante:** Las comprobaciones de continuidad del lazo se deben realizar
    **antes de conectar los aisladores** [F1].


    > ⚠️ **Nunca uses un multímetro de alta tensión (tipo "Megger") en el lazo** una
    vez conectados los componentes [F1].


    ---


    ### Comportamiento en caso de cortocircuito


    Cuando hay un cortocircuito entre dos aisladores, el sistema lo señaliza como
    **''Posible corte''** [F2]. Los equipos instalados entre los puntos de aislamiento
    aparecerán como **NO RESPONDE / PERDIDO** o como **PÉRDIDA PARCIAL DEL LAZO**
    si faltan más de tres equipos [F2].


    ---


