  bot_answer: '## Añadir un nuevo detector al lazo en la DXc


    Según los fragmentos disponibles, el proceso es el siguiente:


    ### Situación previa


    Cuando conectas un nuevo detector al lazo, la central DXc lo detectará automáticamente
    y generará el evento **"EQUIPO NUEVO"**, que indica que se ha detectado un equipo
    nuevo en el lazo [F1].


    ### Procedimiento para aceptar el nuevo equipo


    **Paso 1 — Verificar el evento**

    La central mostrará el evento **EQUIPO NUEVO** en pantalla [F1]. Esto confirma
    que el detector ha sido detectado físicamente en el lazo.


