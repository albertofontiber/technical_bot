- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta gran parte de la capacidad del lazo y el procedimiento de
    autoconfiguración, incluido el límite de 40 CLIP en lazo mixto. Pero falla en
    un punto clave preguntado: dice que no hay información sobre aisladores cuando
    el manual sí fija límites, y la edición de equipos queda incompleta frente a la
    referencia.'
  bot_sources:
  - 997-669-005-3_Instal-Comm_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: "## Notifier PEARL — Lazo SLC: capacidad, límites y alta/edición de\
    \ equipos\n\n---\n\n### 1. Capacidad del lazo SLC\n\nSegún las especificaciones\
    \ de la central [F1]:\n\n- **Protocolo Opal:** hasta **159 sensores + 159 módulos**\
    \ por lazo\n- **Protocolo CLIP:** hasta **99 sensores + 99 módulos** por lazo\n\
    - **Protocolo mixto (Opal + CLIP):** combinación de ambos, pero con un límite\
    \ de **40 equipos CLIP** en el lazo mixto [F4]. Si se supera ese límite, la autoconfiguración\
    \ continúa pero señala fallos [F4]\n- **Carga máxima por lazo:** **0,75 A** [F1]\n\
    \n> **Nota importante:** Si el número de equipos CLIP supera los 40 en un lazo\
    \ mixto, el manual recomienda seleccionar manualmente la opción **«Sólo con protocolo\
    \ CLIP»** para aprovechar la gama completa de 99+99 [F4].\n\n---\n\n### 2. Límites\
    \ de cableado / aisladores\n\nLos fragmentos disponibles **no especifican** longitudes\
    \ máximas de cable ni requisitos de aisladores de cortocircuito para el lazo SLC\
    \ de la PEARL. Consulta el manual de instalación físico (ref. **997-669-005-3**)\
    \ para esos datos.\n\n---\n\n### 3. Alta de equipos: Autoconfiguración\n\nAcceso\
    \ requerido: **nivel de acceso 3** (menús de puesta en marcha) [F3].\n\n**Pasos:**\n\
    \n1. Desde el menú de configuración, selecciona **«1: Autoconfiguración»** [F2]\n\
    2. Elige si aplica a **todos los lazos** o a un **lazo específico** [F2]\n3. Selecciona\
    \ el modo de protocolo [F2] [F4]:\n   - **«1: Todos Prot. OPAL/CLIP»** → detecta\
    \ duplicidades de dirección\n   - **«2: OPAL/CLIP (No detecta duplicidad)»** →\
    \ más rápido, sin comprobación de duplicados\n   - **«3: Sólo con protocolo CLIP»**\
    \ → solo autoconfigura equipos CLIP\n4. Selecciona el modo de operación [F4]:\n\
    \   - **«1: Permite Añadir/Borrar/Cambiar»**\n   - **«2: Sólo Añadir Nuevos Equipos»**\n\
    5. El proceso se inicia automáticamente. Sensores y módulos (Opal y CLIP) se detectan\
    \ en la misma pasada [F2]\n6. Al finalizar, los resultados se muestran por lazo.\
    \ Usa las teclas **◄/►** para navegar entre lazos [F4]\n\n> La autoconfiguración\
    \ puede realizarse también de forma más óptima con el **programa de configuración\
    \ ITS**, y la configuración resultante puede transferirse a un ordenador portátil\
    \ para editarla y archivarla [F2].\n\n---\n\n### 4. Edición de equipos individuales\n\
    \nPara añadir, borrar, mover o editar un equipo concreto, el manual remite a la\
    \ sección **«4.2 Edición de equipos»** [F3]. Desde esa pantalla se pueden editar\
    \ parámetros por dirección de lazo, incluyendo campos como **Ali. Lazo**, **Función\
    \ Cortocto.** y **Cir. Abie.** [F5].\n\nPara editar el texto descriptivo de un\
    \ equipo o zona, el manual remite a la sección **«5.2 Edición de texto»** [F3].\n\
    \nLos equipos configurados pueden consultarse en cualquier momento desde el **nivel\
    \ de acceso 2**, opción **«Resumen de Equipos»** [F2].\n\n---\n\n**Fuente:** Manual\
    \ de instalación y puesta en marcha 997-669-005-3 (sin revisión registrada); Manual\
    \ de configuración de la central 997-671-005-3 (sin revisión registrada)\n\n---\n\
    \nTambién puedo ayudarte con: **edición de zonas y texto de equipo**, **configuración\
    \ de sirenas y salidas de relé** o **parámetros de red entre centrales PEARL**."
