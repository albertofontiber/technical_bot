  bot_sources:
  - 55315013 Manual Centrales Analogicas CAD-150-8 Instalacion ES FR GB IT
  - 55315501 CAD150R Instalacion ES GB 191018
  bot_answer: '## Conexión de baterías en la CAD-150


    Basándome en los fragmentos disponibles, el procedimiento es el siguiente:


    **Paso 1 — Conectar las baterías entre sí**

    Conecta previamente las dos baterías entre sí mediante el **cable puente batería**
    [F1].


    **Paso 2 — Conectar al circuito de la central**

    Conecta los cables que salen del circuito de la placa base (rojo y negro) al **positivo
    y negativo** de las baterías [F1].


    **Paso 3 — Verificación previa a la puesta en marcha**

    Antes de energizar, comprueba con un voltímetro que las baterías tienen una tensión
    **superior a 24 V** [F4].


    **Paso 4 — Orden de conexión del sistema**

    El orden correcto es [F4]:

    - Primero: conectar la alimentación de red activando el **magnetotérmico bipolar**

    - Segundo: conectar las baterías


    > ⚠️ **Nota importante:** Si se necesita arrancar el equipo únicamente con baterías
    (sin red), es imprescindible pulsar el pulsador **BAT** (componente 9 en la PCB
    base) para arrancar el equipo [F3] [F4].


    El **conector de batería** en la PCB base está identificado como componente **11**,
    y el **fusible de baterías** como componente **10** [F2] [F3].


