  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: La respuesta reproduce correctamente los permisos por nivel y el procedimiento
    para cambiar los códigos de acceso de Nivel 2 y 3, incluyendo longitud, confirmación,
    mensaje final y sincronización/backup con CLSS. Añade información extra no esencial
    y omite la nota sobre credenciales compartidas de CLSS, pero no afecta a la utilidad
    técnica principal.
  bot_sources:
  - HOP-138-8ES  issue 6_01-2026_Co
  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE
    E10/E15


    ---


    ## Información general


    La INSPIRE E10/E15 usa contraseñas de acceso por niveles [F3]:

    - **Nivel 2**: código de fábrica **"22222222"** [F3]. Se recomienda cambiarlo.

    - **Nivel 3**: requerido para acceder a Ajustes y cambiar contraseñas de ambos
    niveles [F1].

    - Formato permitido: **mínimo 4 dígitos, máximo 8 dígitos** [F1][F2].

    - Tiempo de sesión nivel 2: cierre automático tras **5 minutos** de inactividad
    [F3].


    ---


    ## Cambiar contraseña de Nivel 2 o Nivel 3 (desde nivel 3)


    Procedimiento completo desde el manual de puesta en marcha [F1]:


    1. Selecciona el **icono de menú ①** → selecciona **"Ajustes" ②** → inicia sesión
    como usuario de **Nivel 3**.

    2. Selecciona la opción **"Cambio del código de acceso" ③**.

    3. Asegúrate de que el **Nivel de Acceso 2 o 3 ④** esté seleccionado y que el
    cursor parpadee en el campo ⑤.

    4. Opcional: pulsa el **icono del ojo ⑥** para visualizar la entrada del código.

    5. Introduce el nuevo código de acceso (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma pulsando el **símbolo ✓ ⑧**.

    7. Repite los pasos 3 a 6 para confirmar la entrada.

    8. Observa el mensaje **"Cambio de código de acceso satisfactorio"** → selecciona
    **Aceptar**.

    9. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    > ⚠️ Tras el cambio, es obligatorio sincronizar con la herramienta CLSS Configuration
    Tool y hacer backup en la nube. Sin este paso, el cambio puede perderse.


    ---


    ## Cambiar contraseña de Nivel 2 (desde nivel 2)


    Si el técnico está logado en nivel 2, solo puede cambiar la contraseña de nivel
    2 [F1][F2]:


    1. Selecciona el **icono de menú ①** → selecciona **"Configuración" ②** → inicia
    sesión como **Nivel 2**.

    2. Selecciona **"Cambio del código de acceso" ③**.

    3. Verifica que **Nivel de Acceso 2 ④** esté seleccionado y el cursor parpadee
    ⑤.

    4. Opcional: pulsa el **icono del ojo ⑥** para ver la entrada.

    5. Introduce el nuevo código (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma con el **símbolo ✓ ⑧**.

    7. Repite los pasos 3 a 6 para confirmar [F2].


    ---


    ## Regla de permisos por nivel


    - **Nivel 2** → puede cambiar únicamente la contraseña de **Nivel 2** [F1].

    - **Nivel 3** → puede cambiar la contraseña de **Nivel 2 y Nivel 3** [F1].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (manual de puesta en marcha INSPIRE E10/E15)

    - HOP-338-9ES issue 4, 01-2026 (manual de usuario INSPIRE E10/E15)


    ---


    También puedo ayudarte con: **sincronización de configuración con CLSS**, **lectura
    de contraseña AL2 desde la herramienta** o **acceso al Modo Servicio con Nivel
    3**.'
