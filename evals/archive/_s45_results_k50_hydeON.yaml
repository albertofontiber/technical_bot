- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en la idea central: usar la Matriz de Control con entrada
    por zona/subzona, coincidencia de 2 equipos y salida de sirena, evitando incluir
    pulsadores manuales. Sin embargo, omite varios pasos y términos clave del procedimiento
    oficial y añade un segundo ''método'' con afirmaciones no alineadas con la referencia,
    lo que puede confundir al técnico.'
  bot_sources:
  - MADT190_07
  - MADT190_14
  - MCDT190
  bot_answer: "# Programación de coincidencia de dos detectores para activar sirena\
    \ — ID3000\n\nHay **dos métodos** disponibles en la ID3000 para implementar la\
    \ coincidencia de dos detectores. Te explico ambos:\n\n---\n\n## MÉTODO 1 — Coincidencia\
    \ en la Matriz de Control (versiones anteriores de software)\n\nEste método comprueba\
    \ la coincidencia **después** de que el sistema haya entrado en estado de alarma\
    \ [F3].\n\n### Pasos:\n\n1. **Accede a la Matriz de Control** y crea o edita la\
    \ instrucción de entrada correspondiente a la zona donde están los detectores.\n\
    \n2. **Configura el Evento de Entrada:**\n   - Tipo de entrada: selecciona **ZONA**\
    \ (o SUBZONA / CUALQUIER ZONA). La coincidencia **no aplica** si la entrada es\
    \ un equipo individual o una tecla [F1].\n   - En el campo **Coincidencia**, pulsa\
    \ la barra **ESPACIADORA** para cambiar de **NO** a **SÍ** [F1].\n   - Con esto,\
    \ se requerirá que **dos equipos de esa zona** estén en alarma antes de activar\
    \ la salida [F1].\n\n3. **⚠️ ATENCIÓN (EN54-2: 7.1.4):** No incluyas pulsadores\
    \ manuales (MCP) en el grupo de coincidencia [F1]. Para evitarlo, programa **dos\
    \ instrucciones separadas**:\n   - **Instrucción 1:** Entrada tipo **Pulsador\
    \ Manual (MCP)** → coincidencia en **Simple** (sin coincidencia) [F1].\n   - **Instrucción\
    \ 2:** Entrada tipo **ANALÓGICA** (incluye detectores térmicos, iónicos, ópticos,\
    \ VIEW y multisensor) → coincidencia activada a **SÍ** [F1].\n\n4. **Configura\
    \ el Evento de Salida:**\n   - Acción: **Activar** [F5].\n   - Tipo de equipo\
    \ / Función Especial: selecciona **Circuito Sirena** correspondiente [F5].\n \
    \  - Define la zona o equipo de destino según tu instalación [F5].\n\n---\n\n\
    ## MÉTODO 2 — Coincidencia de Equipos a nivel de central (software v4.63 o superior)\n\
    \nEste método actúa **antes** de que el sistema entre en alarma: los detectores\
    \ quedan en estado de **PRIMERA ALARMA / PREALARMA** hasta que se cumple la coincidencia\
    \ [F3].\n\nLos niveles disponibles son [F3]:\n\n- **Nivel 2:** Dos o más sensores\
    \ en la **misma zona** ← el más habitual para tu caso.\n- **Nivel 3:** Dos o más\
    \ sensores en **diferentes zonas, misma central**.\n- **Nivel 4:** Dos o más sensores\
    \ en la **misma zona o zonas diferentes, misma central**.\n- **Nivel 5/6:** Solo\
    \ para sistemas en red.\n\n> La opción por defecto es **Nivel 1** (sin coincidencia)\
    \ [F3].\n\n### Limitaciones importantes [F3]:\n- **No aplica a módulos** — una\
    \ entrada de alarma desde un módulo activa alarma inmediata independientemente\
    \ del nivel configurado.\n- No se pueden configurar coincidencias de **más de\
    \ dos equipos**.\n- No se pueden combinar **diferentes tipos de equipo** en la\
    \ misma coincidencia.\n\n---\n\n## Diferencia clave entre ambos métodos\n\n- **Método\
    \ 1 (Matriz):** La central entra en alarma con el primer detector; la **salida\
    \ de sirena** queda retenida hasta el segundo [F3].\n- **Método 2 (Coincidencia\
    \ de equipos):** La central **no entra en alarma** hasta el segundo detector;\
    \ permanece en **PREALARMA** con el primero [F3].\n\n---\n\n**Fuentes:**\n- MCDT190\
