- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó en identificar la obstrucción/suciedad del conducto, filtros
    o sensores como causa probable y propone lectura del flujo e inspección/limpieza.
    Pero contiene errores importantes en los umbrales de diagnóstico (±20% implica
    fallo por debajo de 80%, no 90%; ±50% no es 75%), no aclara que es un fallo de
    flujo y no una alarma, omite la memoria de eventos y el retardo configurado, y
    mezcla fugas/roturas como posible causa de flujo bajo cuando normalmente indicarían
    flujo alto.
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: "## ASD535 — Alarma intermitente de flujo bajo: diagnóstico y causa\
    \ probable\n\n### Causa más probable\n\nUna alarma intermitente de flujo bajo\
    \ indica que el valor de flujo de aire del conducto de aspiración ha **caído por\
    \ debajo del umbral configurado**. Según el manual, una **disminución del valor\
    \ de flujo (inferior al 100 % del valor de referencia)** implica una **obstrucción\
    \ inminente** en el conducto de aspiración [F3].\n\n---\n\n### Procedimiento de\
    \ diagnóstico paso a paso\n\n1. **Antes de empezar**: bloquea o desconecta el\
    \ control de incendios y la alerta remota en la CDI de orden superior para evitar\
    \ disparos no deseados durante el diagnóstico [F3].\n\n2. **Verificar la tensión\
    \ de alimentación**: abre la cubierta de la caja del detector y mide la tensión\
    \ en los bornes **1 (+) y 2 (-)** [F3]:\n   - Valor nominal en funcionamiento\
    \ a **12 V-CC**: **12,3 a 13,8 V-CC** [F3]\n   - Valor nominal en funcionamiento\
    \ a **24 V-CC**: **21,6 a 27,6 V-CC** [F3]\n   - Si la tensión está fuera de rango,\
    \ el problema puede ser eléctrico, no de flujo.\n\n3. **Leer el valor de flujo\
    \ actual**: con el conmutador en posición **V** (cap. 7.6.1), lee el valor de\
    \ flujo y compáralo con el registrado en el **protocolo de puesta en funcionamiento**\
    \ [F3].\n\n4. **Evaluar la desviación según la sensibilidad configurada** [F3]:\n\
    \   - Si la sensibilidad **LS-Ü = ±20 %** (estándar): actuar si el valor cae **por\
    \ debajo del 90 %**\n   - Si la sensibilidad **LS-Ü = ±50 %**: actuar si el valor\
    \ cae **por debajo del 75 %**\n\n5. **Inspección visual del conducto de aspiración**:\
    \ comprueba si hay obstrucción en [F3]:\n   - Entrada del conducto de aspiración\n\
    \   - Tapones de tubo del orificio de entrada de la caja del detector (en ASD\
    \ 535-1 y ASD 535-3)\n   - Salida de aire (limpiar si hay suciedad)\n   - Puntos\
    \ de unión, racores y transiciones tubo rígido/flexible (verificar fugas)\n\n\
    6. **Limpieza del conducto si hay obstrucción** [F2]:\n   - Limpiar todos los\
    \ orificios de aspiración con bastoncillos limpia-pipas\n   - Si no hay acceso\
    \ directo, introducir **nitrógeno o aire comprimido sin aceite** desde la caja\
    \ del detector hacia la tubería (a través de la válvula de bola manual o la unión\
    \ atornillada)\n   - ⚠️ **No soplar desde el interior de las cámaras de los sensores\
    \ de humo** — puede dañar el ventilador [F2]\n   - Abrir y limpiar los accesorios\
    \ instalados (separador de agua, caja de filtro, boxes para detector) con pincel\
    \ suave y seco [F2]\n   - **Sustituir el elemento de filtro** si procede [F2]\n\
    \n7. **En aplicaciones con mucha suciedad**: limpiar también los **sensores de\
    \ flujo de aire** extrayéndolos según el cap. 9.4.3 y limpiándolos con pincel\
    \ suave y seco [F2].\n   - ⚠️ **No limpiar ni tocar la superficie del sensor con\
    \ los dedos** [F2]\n\n8. **Tras la limpieza**: reconectar el ASD y esperar al\
    \ menos **5 minutos** para que el ventilador alcance el número óptimo de revoluciones\
    \ [F2].\n\n9. **Nueva lectura del valor de flujo**: si los valores siguen fuera\
    \ de tolerancia, será necesario un **nuevo ajuste de la monitorización del flujo\
    \ de aire (reset inicial según cap. 7.3.5)** [F2].\n\n---\n\n### ⚠️ Advertencia\
    \ importante sobre el reset inicial\n\nSi se realiza un reset inicial con los\
    \ orificios de aspiración aún obstruidos, existe el riesgo de que la toma de muestras\
    \ resulte imposible o insuficiente, lo que **puede impedir que el ASD 535 dispare\
    \ la alarma** [F1]. Asegúrate de que el conducto está completamente limpio antes\
    \ de ejecutar el reset.\n\n---\n\n**Fuente:** ASD535_TD_T131192es_h (sin revisión\
    \ registrada)\n\n---\n\nTambién puedo ayudarte con: **sustitución del sensor de\
    \ flujo de aire (cap. 9.4.3)**, **procedimiento de reset inicial (cap. 7.3.5)**\
    \ o **sustitución del filtro en la unidad de filtrado de polvo**."
