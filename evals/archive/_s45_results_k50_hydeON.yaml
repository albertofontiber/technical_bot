  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó en que el retardo se programa mediante reglas de causa-efecto
    y menciona el acceso, tipos de retardo, operación y advertencia EN54. Pero falta
    información clave del procedimiento según la referencia: borrar la Regla 1 por
    defecto, crear regla con instrucción de entrada/salida, lazo 0=todos, límite de
    reglas y prueba de lógicas; además enumera de forma confusa siete tipos pese a
    indicar seis.'
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura dentro de las **reglas
    de causa-efecto**. Aquí te explico el proceso y los conceptos clave:


    ---


    ### 1. Acceso a la configuración


    Desde el menú principal de configuración [F5]:


    1. Accede al menú **«Editar Configuración»** (requiere nivel de acceso 3)

    2. Selecciona la opción **«8: Causa y Efecto»**


    Esto te lleva a la **Programación de causa-efecto** donde se definen los retardos
    [F1].


    ---


    ### 2. Tipos de retardo disponibles


    Al editar una regla de causa-efecto, puedes asignar **uno de seis tipos de retardo
    de salida** [F1]. Cada tipo determina qué acciones puede realizar el usuario mientras
    el retardo está activo [F2]:


    - **Fijo**: No se puede silenciar, no se puede anular, no muestra cuenta atrás
    en LCD.

    - **Estándar**: Se detiene si se pulsa SILENCIAR SIRENAS; se puede anular en nivel
    2; muestra tiempo restante en pestaña ALARMA; se puede detener con FIN RETARDO.

    - **No Silenc.**: No se detiene con SILENCIAR SIRENAS; sí se puede anular en nivel
    2; muestra tiempo restante; se puede detener con FIN RETARDO.

    - **Est. Ext.**: Se detiene con SILENCIAR SIRENAS; se puede anular en nivel 2;
    muestra tiempo restante; se detiene también con AMPLIAR RETARDO.

    - **RetExtStd**: Se detiene con SILENCIAR SIRENAS; se puede anular en nivel 2;
    el temporizador comienza en RETARDO AMPLIADO al pulsar esa tecla.

    - **No Sil. Ext**: No se detiene con SILENCIAR SIRENAS; sí se puede anular en
    nivel 2; se detiene con AMPLIAR RETARDO.

    - **SinRetExt**: No se detiene con SILENCIAR SIRENAS; el temporizador comienza
    en RETARDO AMPLIADO [F2].


    ---


    ### 3. Funcionamiento del retardo en campo


    Cuando hay un retardo activo [F4]:


    - El **LED de RETARDO ACTIVO** se enciende en el panel.

    - El personal autorizado (con llave, nivel de acceso 2) puede pulsar **AMPLIAR
    RETARDO** para iniciar un segundo temporizador (normalmente más largo que el primero).

    - Cualquier usuario de nivel 1 puede pulsar **FIN RETARDO** para terminar el retardo
    y pasar a condición de alarma completa.


    ---


    ### ⚠️ Advertencia importante


    El uso de retardos puede contravenir las disposiciones de **EN54-2, párrafos 7.4.2,
    7.4.3** (condiciones de incendio) **y 8.6.3** (condiciones de fallo), dependiendo
    del período establecido [F5].


    ---


    ### Nota sobre anulación de retardos en operación


    Si necesitas anular/habilitar los retardos sin entrar en configuración completa,
    puedes hacerlo desde el **Menú Anular/Habilitar → «5: Retardo Activación Salidas»**
    (nivel de acceso 2), pulsando ✓ para cambiar el estado [F3].


    ---


    **Fuente:** Manual de configuración de la central PEARL 997-671-005-3 (sin revisión
    registrada); Manual de funcionamiento PEARL 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **borrado o copia de reglas de causa-efecto**, **configuración
    del segundo temporizador (retardo ampliado)** o **programación horaria de retardos**
    en la PEARL.'
- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta lo esencial de la conexión: salidas supervisadas, 2/4 circuitos,
    1 A, polaridad, diodo y RFL 6K8 de 0,5 W al final de línea. Pero mezcla la ZXe
    ZX2e/ZX5e con ZXAE/ZXEE, añade detalles dudosos o no referenciados como terminales
    TB7, sección mínima 1,5 mm² y consumo 0,018 A, por lo que no es plenamente fiable.'
  bot_sources:
  - MIE-MI-310
  bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe (ZXAE/ZXEE)


    ## Datos generales de las salidas


    - La **ZXAE** dispone de **2 salidas supervisadas** para campanas convencionales:
    **Salida A y Salida B** [F2]

    - La **ZXEE** dispone de **4 salidas supervisadas**: **Salida A, B, C y D** [F2]

    - Corriente máxima por circuito: **1 A** [F2]

    - Terminales en ZXEE: **TB7** → S,A+ / S,A- / S,B+ / S,C+ / S,D+ / S,D- [F2]


    ---


    ## Procedimiento de conexionado


    1. **Conecta las sirenas en serie topológica** (línea directa desde la central
    hasta la última sirena), respetando la polaridad + / − de cada sirena [F1]


    2. **Respeta la polaridad**: las sirenas con polaridad se conectan con el ánodo
    (+) hacia el terminal + de la salida y el cátodo (−) hacia el terminal − [F1]


    3. **Campanas sin polaridad**: instala un **diodo** entre el terminal + de la
    salida y uno de los terminales de alimentación de la campana, para evitar consumos
    durante la supervisión [F2]


    4. **Resistencia Final de Línea (RFL)**: coloca una resistencia de **6.800 Ω (6K8)
    / 0,5 W mínimo** entre + y − de la **última sirena** de la línea [F2]


    5. **Si no hay sirenas instaladas**: conecta la RFL de **6K8 Ω** directamente
    entre + y − en el terminal de la central [F2]


    6. **Sección de cable mínima**: **1,5 mm²**. Evita longitudes excesivas para no
    provocar caídas de tensión [F2]


    ---


    ## ⚠️ Advertencias críticas


    - **NO realizar ramales (derivaciones paralelas)** en la línea de sirenas. La
    supervisión se realiza sobre la línea directa hasta la RFL; los ramales paralelos
    **no serán supervisados** [F1]

    - La corriente de supervisión circula en **sentido inverso** a la de activación,
    con pequeña tensión de polaridad inversa. Al activarse la salida, la corriente
    circula en sentido normal [F2]

    - Tener en cuenta el **consumo total de la central** para no exceder el límite
    con todas las sirenas activadas. Consumo de referencia por salida en alarma: **0,018
    A** [F5]


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)'
