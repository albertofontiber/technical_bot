    La solución indicada para el evento EQUIPO NUEVO es: **realizar una autobúsqueda
    para aceptar el nuevo equipo** [F1].


    > ⚠️ **Importante:** Antes de realizar la autobúsqueda, asegúrate de que no hay
    dos equipos con la misma dirección en el lazo, ya que esto generaría el evento
