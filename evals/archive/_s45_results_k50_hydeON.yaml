- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: 'Respuesta correcta y suficiente: indica que no se puede desactivar
    un detector individual desde la CCD-103 y explica la anulación por zona con doble
    pulsación e indicadores. Añade detalles de conexionado y EOL coherentes, aunque
    la sugerencia sobre intervención física debería quedar siempre en manos del instalador/servicio
    técnico.'
  bot_sources:
  - CCD-103_Manual_ES_FR_GB_IT
  bot_answer: '## Desactivación de zona en la CCD-103


    Los fragmentos disponibles del manual de la **CCD-103** no describen un procedimiento
    para desactivar un **detector individual** de forma aislada.


    Lo que sí documenta el manual es la desactivación a nivel de **zona completa**:


    ### Desactivación de zona (nivel zona, no detector individual)


    1. Asegúrate de que la **llave de bloqueo del teclado de detección (G)** esté
    en posición **abierta** (desbloqueada) [F1].

    2. Pulsa la **tecla de zona (A)** correspondiente **una primera vez** → la zona
    entra en **modo prueba** [F1].

    3. Pulsa la **tecla de zona (A)** una **segunda vez** → la zona entra en **modo
    desconexión** [F1].

    4. Se activará el **indicador de anular** y el **indicador de fallo/anular/prueba**
    de esa zona [F1].


    > ⚠️ Esto desconecta la **zona entera**, no un detector individual.


    ---


    ### Lo que el manual NO especifica


    El manual **no describe ningún mecanismo para desactivar un detector individual**
    sin afectar al resto del lazo. La arquitectura de conexionado de la CCD-103 es
    **convencional en serie** [F2][F3]: los detectores van conectados en cadena (positivo
    a contacto 1, negativo entra por contacto 4 y sale por contacto 3 al siguiente
    detector, con resistencia de fin de línea de **4,7 kΩ** al final) [F2][F3]. Esta
    topología no permite aislar un detector individual por software desde la central.


    Si necesitas retirar físicamente un detector del lazo sin generar fallo, deberías
    consultar la documentación técnica de la base del detector utilizado para ver
    si admite un puente de cortocircuito en sus terminales, pero **eso no está cubierto
    en los fragmentos disponibles de este manual**.


    ---


    **Fuente:** CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de zonas cruzadas para extinción**,
    **conexionado de sirenas** o **modos de prueba de la CCD-103**.'
