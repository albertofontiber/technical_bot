  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó en la existencia de relés NC-C-NA, las dos salidas de sirena
    con EOL de 47 kΩ y los valores principales de corriente/tensión de los contactos.
    Pero falla en un punto clave: no indica que el relé de avería es failsafe y se
    desenergiza también ante corte de alimentación, ni que la avería no queda enclavada;
    además omite carga resistiva y vida útil mínima de los contactos.'
  bot_sources:
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés disponibles y contactos


    El equipo dispone de los siguientes relés [F5]:


    **Relés de alarma:**

    - Relé de alarma C1 (terminales 5, 6, 7): contactos **NC / C / NA** [F5]

    - Relé de alarma C2 (terminales 8, 9, 10): contactos **NC / C / NA** — solo disponible
    en modelos de 2 canales [F5]


    **Relés de avería:**

    - Relé de avería C1 (terminales 11, 12, 13): contactos **NC / C / NA** [F5]

    - Relé de avería AUX. C2 (terminales 14, 15, 16): contactos **NC / C / NA** —
    solo disponible en modelos de 2 canales [F5]


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Al abrir la puerta de la caja durante el funcionamiento normal, la unidad entra
    en modo de servicio y **el relé de fallo indica una avería** [F3]. Este es el
    único comportamiento documentado en los fragmentos disponibles para el relé de
    avería.


    > ⚠️ El manual no especifica explícitamente el estado del relé de avería ante
    un corte total de alimentación eléctrica (energizado/desenergizado en reposo).
    Los fragmentos disponibles solo describen el comportamiento en modo de servicio
    [F3].


    ---


    ### Resistencia de fin de línea en salidas de sirena


    - **Salida sirena 1** (terminales 17 y 18): resistencia de fin de línea de **47
    kΩ** [F5]

    - **Salida sirena 2** (terminales 19 y 20): resistencia de fin de línea de **47
    kΩ** [F5]


    > **Nota:** Aunque el Fragmento 4 corresponde al FAAST LT (versión de lazo Morley),
    la tabla de terminales del Fragmento 5 también es de ese manual. Los valores de
    47 kΩ aparecen en ese documento [F5]. El manual autónomo del LT-200 (I56-6574-005_ES)
    no incluye esta tabla de terminales en los fragmentos recuperados — verifica que
    tu unidad corresponde al modelo autónomo FL01xxE-HS antes de aplicar estos valores.


    ---


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC**

    - **0,5 A a 30 V CA**


    [F1]


    ---


    Fuentes:

    - I56-6574-005_ES — HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-3956-201_ES — Morley Loop FAAST LT QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de la entrada configurable (rearme)**,
    **designación completa del bloque de terminales de alimentación** o **procedimiento
    de prueba funcional** del FAAST LT-200.'
