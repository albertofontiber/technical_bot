  - Actualizacion del firmware de INSPIRE a R1.35
  - HOP-138-8ES  issue 6_01-2026_Co
  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '## Configuración de contraseñas Nivel 2 y Nivel 3 — INSPIRE E10/E15


    ---


    ### Cambio de contraseña de **Nivel 2**


    El procedimiento está documentado en el manual de operación [F1]:


    1. Selecciona el **icono del menú** ① y accede a **"Configuración"** ② [F1].

    2. Inicia sesión como usuario de **nivel de acceso 2** [F1].

    3. Selecciona la opción **"Cambio de contraseña"** ③ [F1].

    4. Asegúrate de que **"Acceso Nivel 2"** ④ esté seleccionado y que el cursor parpadea
    ⑤ [F1].

    5. Opcionalmente, pulsa el **icono del ojo** ⑥ para visualizar la entrada mientras
    escribes [F1].

    6. Introduce el nuevo código de acceso con el **teclado numérico** ⑦ — mínimo
    **4 dígitos**, máximo **8 dígitos** [F1].

    7. Confirma pulsando el **símbolo ✓** ⑧ [F1].

    8. **Repite los pasos 3 a 6** para confirmar el código introducido [F1].


    ---


    ### Contraseña de **Nivel 3**


    Los fragmentos disponibles no incluyen un procedimiento específico de cambio de
    contraseña para el Nivel 3. Lo que sí se menciona es que el **código de acceso
    Nivel 3** se utiliza para iniciar sesión en el **Modo Servicio** desde el menú
    de la central [F2].


    ---


    ### Buenas prácticas de seguridad aplicables a ambos niveles


    El manual de ciberseguridad de INSPIRE recomienda [F3]:


    - Garantizar la **seguridad física** de las contraseñas.

    - Usar contraseñas con **combinación de letras, números y mayúsculas/minúsculas**
    cuando sea aplicable.

    - Contraseñas **suficientemente complejas**, no basadas en frases comunes.

    - **No usar datos personales** (fechas, direcciones, números de seguridad social,
    etc.).


    ---


    > ⚠️ El procedimiento de cambio de contraseña de Nivel 3 no aparece en los fragmentos
    recuperados. Para ese procedimiento, consulta el manual completo de puesta en
    marcha o el soporte técnico de Notifier.


