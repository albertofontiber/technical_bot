  conducta_bot: answer
  veredicto: FALLO
  diagnostico: 'Acertó las salidas de sirena, la EOL de 47 kΩ y parte de los relés/contactos,
    pero omitió una parte esencial: el relé de avería es fail-safe y actúa también
    ante fallo, modo servicio y corte de alimentación. Además no incluyó la vida útil
    mínima de 10^5 operaciones ni calificó las cargas como resistivas, por lo que
    no es suficiente frente a la referencia.'
  bot_sources:
  - FAAST-LT-Como-obtener-el-historico-del-equipo
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés de alarma


    El equipo dispone de **dos relés de alarma** (uno por canal), cada uno con contacto
    **NC, C (común) y NA** [F2]:


    - Terminales **5 (NC), 6 (C), 7 (NA)** → Relé de alarma Canal 1 [F2]

    - Terminales **8 (NC), 9 (C), 10 (NA)** → Relé de alarma Canal 2 (solo en modelos
    de 2 canales) [F2]


    ### Relés de avería


    El equipo dispone de **dos relés de avería**, cada uno con contacto **NC, C (común)
    y NA** [F2]:


    - Terminales **11 (NC), 12 (C), 13 (NA)** → Relé de avería Canal 1 [F2]

    - Terminales **14 (NC AUX.), 15 (C AUX.), 16 (NA AUX.)** → Relé de avería Canal
    2 / Auxiliar (solo en modelos de 2 canales) [F2]


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Los fragmentos disponibles no describen explícitamente el comportamiento del relé
    de avería (energizado/desenergizado en reposo, o cómo reacciona ante un corte
    de alimentación). El manual no especifica ese detalle en los fragmentos recuperados.
    Consulta el manual completo o el soporte técnico de Honeywell/Morley para confirmar
    si el relé de avería es de tipo "fail-safe" (desenergizado en reposo).


    ### Salidas de sirena


    Hay **dos salidas de sirena supervisadas** [F2]:


    - Terminales **17 (−) y 18 (+)** → Salida sirena 1 [F2]

    - Terminales **19 (−) y 20 (+)** → Salida sirena 2 [F2]


    **Resistencia de fin de línea:** **47 kΩ** en ambas salidas de sirena [F2]


    > ⚠️ El indicador **SIRENA** del panel frontal parpadeará en amarillo (1 parpadeo)
    si hay un fallo de sirena. En ese caso, comprueba el elemento de fin de línea
    y el circuito de la sirena [F3].


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC** [F1]

    - **0,5 A a 30 V CA** [F1]


    ---


    **Fuentes:**

    - Fuente 1: I56-6574-005_ES – HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - Fuente 2: I56-3956-201_ES – Morley Loop FAAST LT QIG (sin revisión registrada)


    > **Nota:** El Fragmento 2 corresponde al **FAAST LT** (versión loop de Morley).
    La tabla de terminales es la misma estructura que el LT-200, pero si tu equipo
    es estrictamente el modelo Stand-Alone LT-200, verifica que la asignación de terminales
