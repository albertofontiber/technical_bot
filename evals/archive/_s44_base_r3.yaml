- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó al indicar que el retardo se configura mediante reglas de causa-efecto
    y no desde la operación normal, y mencionó la ruta general y advertencias EN54.
    Sin embargo, la respuesta es incompleta: no explica los pasos clave de programación,
    los tipos de retardo, la importancia de borrar la Regla 1 por defecto, ni otros
    detalles críticos que sí aporta la referencia.'
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    Los fragmentos disponibles cubren **dos aspectos distintos** relacionados con
    los retardos. Te explico ambos:


    ---


    ### 1. Anular / Habilitar un retardo ya configurado (operación en campo)


    Si el retardo ya está programado en las reglas de causa-efecto, puedes activarlo
    o desactivarlo desde el menú de operador:


    1. Accede al **Menú Anular/Habilitar** [F1]

    2. Selecciona **«5: Retardo Activación Salidas»** [F1]

    3. Pulsa **✓** para cambiar el estado entre HABILITADO y ANULADO [F1]

    4. Pulsa **✕** para salir en cualquier momento [F1]


    > ⚠️ Esta opción **solo está disponible si se han configurado retardos** como
    parte de una o más reglas de causa-efecto. Si hay retardos activos, el **LED de
    RETARDO ACTIVO** estará encendido [F1].


    ---


    ### 2. Configurar el retardo (programación de causa-efecto)


    La **configuración del valor del retardo** se realiza desde el menú de nivel 3,
    a través de las **reglas de causa-efecto** [F5]:


    - Ruta: **Editar Configuración → «8: Causa y Efecto»** (Apéndice 5 del manual
    de configuración) [F5]


    Los fragmentos disponibles no incluyen el detalle paso a paso del Apéndice 5 (Programación
    de causa-efecto). Para configurar el valor numérico del retardo, consulta directamente
    el **Apéndice 5** del manual de configuración.


    ---


    ### 3. Opción adicional: botón EXTENDER RETARDO


    Existe un parámetro de configuración para habilitar o deshabilitar el pulsador
    físico **EXTENDER RETARDO** [F2]:


    - Ruta: **Editar Configuración → Configuración de la Central → parámetro «10:
    Extend Delay Button»** [F2]

    - Valores posibles: **Enabled / Disabled** [F2]


    > ⚠️ El manual advierte que el uso de retardos puede contravenir las disposiciones
    de **EN54-2, párrafos 7.4.2, 7.4.3** (condiciones de incendio) **y 8.6.3** (condiciones
    de fallo), dependiendo del período establecido [F5].


    ---


    **Fuente:** 997-670-005-3_Operating_ES (sin revisión registrada); 997-671-005-3_Configuration_ES
    (sin revisión registrada)


    También puedo ayudarte con: **programación de reglas de causa-efecto**, **opciones
    de zona** o **gestión de acceso de usuario nivel 3** en la PEARL.'
