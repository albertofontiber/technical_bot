  bot_sources:
  - MADT190_07
  - MCDT190
  - MFDT190
  - TIDT096
  - TIDT104
  bot_answer: '## Programación de coincidencia de dos detectores en la ID3000


    La función de **coincidencia** en la ID3000 se configura desde la **Matriz de
    Control (E/S)**, en el evento de entrada. Aquí tienes el procedimiento:


    ---


    ### Requisitos previos


    - La entrada debe estar especificada como **''ZONA''**, **''SUBZONA''** o **''CUALQUIERA''**.
    Esta función **no aplica** si la entrada es un equipo individual o una tecla [F1].

    - ⚠️ **ATENCIÓN (EN54-2: 7.1.4):** No incluyas pulsadores manuales (MCP) en el
    grupo de coincidencia [F1].


    ---


    ### Pasos para programar la coincidencia


    **Si la zona incluye pulsadores manuales**, debes crear **dos instrucciones separadas**
    en la Matriz de Control [F1]:


    1. **Primera instrucción:** Define la entrada de tipo **''Pulsador Manual'' (MCP)**
    como **''Simple''** (sin coincidencia) [F1].


    2. **Segunda instrucción:** Define el tipo de entrada al que se aplicará la coincidencia,
    por ejemplo **''ANALÓGICA''** (que incluye detectores térmicos, iónicos, ópticos,
    VIEW y multisensor) [F1].


    **Si la zona solo tiene detectores** (sin MCP), basta con una sola instrucción:


    3. En la pantalla de edición del evento de entrada de la Matriz de Control, localiza
    el campo **"Coincidencia de 2 Zonas"** o **"Coincidencia de Equipos"** y actívalo
    [F2].


    4. Pulsa la **barra ESPACIADORA** para cambiar el valor de **NO a SÍ** en la columna
    de coincidencia [F1].


