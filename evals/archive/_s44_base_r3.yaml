  - 55315501 CAD150R Instalacion ES GB 191018
  bot_answer: '## Conexión de baterías en la CAD-150


    ### Procedimiento de conexión


    1. **Conecta primero el cable puente entre las dos baterías** (cable de interconexión
    entre batería 1 y batería 2) [F1].


    2. **Conecta los cables del circuito** (rojo → positivo, negro → negativo) al
    conjunto de baterías ya unidas entre sí [F1].


    3. El conector de batería en la PCB Base está identificado como **Conector Batería
    (posición 11)**, protegido por el **Fusible Baterías (posición 10)** [F2][F3].


    ### Verificación previa a la conexión


    Antes de conectar las baterías, verifica que la tensión de cada batería sea **superior
    a 24V** [F4].


    ### Orden correcto de puesta en marcha


    1. Conectar primero la **alimentación de red** activando el magnetotérmico bipolar
    [F4].

    2. Conectar las **baterías** a continuación [F4].


    > ⚠️ Si necesitas arrancar el equipo **solo con baterías** (sin red), es imprescindible
    pulsar el pulsador **BAT** (posición 9 en PCB Base) para arrancar el equipo [F3][F4].


    ---


    **Fuente:** 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB
    IT (sin revisión registrada)'
