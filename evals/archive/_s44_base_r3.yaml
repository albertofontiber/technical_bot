    - Máximo **25 equipos de lazo entre aisladores** en la central ID2000 [F1].

    - Si se utilizan **aisladores tipo FET**, el máximo se reduce a **20 equipos entre
    aisladores** [F1].

    - Las comprobaciones de continuidad del lazo se deben realizar **antes de conectar
    los aisladores** [F1].


    **Comportamiento ante cortocircuito** [F2]:


    - Cuando ocurre un cortocircuito entre dos aisladores, el sistema lo señaliza
    como **''Posible corte''** [F2].

    - Los equipos entre los puntos de aislamiento aparecen como **NO RESPONDE / PERDIDO**
    o **PÉRDIDA PARCIAL DEL LAZO** si faltan más de tres equipos [F2].


    ---


    Para el esquema de conexionado físico del módulo de aislamiento (terminales L+,
    L−, cableado en serie en el lazo), el manual indica que **"estos equipos van acompañados
    de instrucciones en las que se muestran las interconexiones adecuadas para cada
    aplicación"** [F1]. Consulta las instrucciones de instalación específicas del
    módulo de aislamiento que acompañan al propio equipo.


