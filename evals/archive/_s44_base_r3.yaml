  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta parte de la capacidad general del lazo y algunos requisitos
    de aisladores, pero omite límites importantes como 99+99 en CLIP, 1/2 lazos, 0,75
    A y el límite PEARL de 25 equipos entre aisladores. La parte de alta/edición desde
    central queda incompleta: no explica las opciones de autoconfiguración, la limitación
    de CLIP en lazos mixtos ni los campos editables relevantes.'
  bot_sources:
  - 997-669-005-3_Instal-Comm_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '# Notifier PEARL — Capacidad de lazo SLC, aisladores y alta/edición
    de equipos


    ---


    ## 1. Capacidad máxima del lazo SLC


    - **Máximo 318 equipos por lazo analógico**: hasta **159 sensores** y **159 módulos**
    [F1]

    - **Máximo 512 sensores y/o pulsadores manuales por sistema** (sumando ambos lazos,
    incluidos detectores de zona convencionales y pulsadores conectados), para cumplir
    **EN54-2: 13-7** [F1]


    ---


    ## 2. Requisitos de aisladores (EN54-2: 12.5.2)


    **Regla general:** máximo **32 equipos entre aisladores** según EN54-2 [F1]


    Sin embargo, la Pearl impone condiciones más restrictivas según el tipo de equipo:


    - **Equipos SIN aisladores internos** (protocolo CLIP y algunos Opal): **NO más
    de 20 equipos entre aisladores** [F1]

    - **Equipos CON aisladores internos** (usados con base **B501 AP**): el lazo cumple
    directamente los requisitos de EN54-2 [F1]


    > ⚠️ **Nota importante sobre bases:** Los equipos con aislador interno funcionan
    correctamente con bases sin conectores adicionales, pero el aislador interno quedará
    inutilizado. Para que el aislador interno opere, es obligatorio usar la base **B501
    AP** (con conectores de cable de lazo de extremo positivo adicionales) [F1].


    **Condición de arranque del lazo:** la carga entre aisladores no debe superar
    **20 SU** para garantizar que los aisladores se cierren al aplicar alimentación
    [F2]


    Cargas de referencia para equipos CLIP [F2]:

    - Detector por rayo LPB-700: **6 SU**

    - Sirenas de lazo: **3 SU**

    - Módulo ZMX-1: **3 SU**

    - Módulo MMX-10M / CMX10-RM: **10 SU**

    - Resto de equipos: **1 SU**


    > ⚠️ **Advertencia de cableado:** Antes de conectar la central, comprueba continuidad
    y aislamiento del cableado. Una vez instalados los aisladores, **NUNCA uses multímetro
    de alta tensión (Megger)** en el lazo — solo multímetros de baja tensión. Si hay
    aisladores instalados, el conductor positivo (+) del lazo estará en circuito abierto
    [F1].


    ---


    ## 3. Alta y edición de equipos desde la central


    ### Acceso al nivel de configuración (Nivel 3)


    Hay dos métodos [F5]:


    **Método 1 — Por clave:**

    1. Pulsa para mostrar la pantalla de introducción de clave de nivel 2/3

    2. Selecciona **«Conf/Mant.Ingeniero»** y pulsa **✓**

    3. Introduce la clave de nivel 3 → pulsa **✓**

    4. Pulsa de nuevo para mostrar la pestaña **CONFIG** («Menú de Configuración de
    Central»)


    **Método 2 — Por llave:**

    1. Gira la llave de acceso de usuario **90° en sentido horario**

    2. En el Menú Principal, selecciona **«5: Pestaña Configuración»** → pulsa **✓**

    3. Introduce la clave de nivel 3 → pulsa **✓**

    4. Se muestran directamente las pestañas **MENÚ** y **CONFIG** [F5]


    ### Operaciones disponibles sobre equipos de lazo


    Desde **«Editar Configuración» → «Equipos de lazo»** [F4]:


    - **Autoconfigurar equipos de lazo** → Sección «4 Equipos de lazo» del manual
    de configuración [F3]

    - **Editar equipos** (añadir, borrar, mover a otra zona) → Sección **«4.2 Edición
    de equipos»** [F3]

    - **Editar texto del equipo** → Sección **«5.2 Edición de texto»** [F3]

    - **Perfiles Interface Gas** [F4]

    - **Resumen del equipo** [F4]

    - **Inicializar equipos de protocolo OPAL** [F4]


    > 💡 El procedimiento detallado de autoconfiguración y edición paso a paso está
    en la **Sección 4** del manual de configuración (997-671-005-3), que no está incluida
    en los fragmentos disponibles. Consulta esa sección para el flujo completo de
    pantallas.


    ---


    **Fuentes:**

    - Manual de instalación y puesta en marcha **997-669-005-3_Instal-Comm_ES** (sin
    revisión registrada) — Secciones 4 y Apéndice 10

    - Manual de configuración de la central **997-671-005-3_Configuration_ES** (sin
    revisión registrada) — Secciones 1.4, 2.2 y 3


    ---


    También puedo ayudarte con: **procedimiento detallado de autoconfiguración de
    lazo**, **edición de zonas y texto de equipo** o **cálculo de carga de lazo con
    el programa de baterías**.'
