  bot_answer: '## Añadir un nuevo detector al lazo en la DXc (tras puesta en marcha)


    El procedimiento es el siguiente:


    **1. Conectar el nuevo detector al lazo**


    Instala físicamente el detector en el lazo analógico, cortando el cable en el
    punto de conexión (no puentees los terminales) [F2]. Si es necesario, coloca aisladores
    de cortocircuito en puntos estratégicos del lazo [F2].


