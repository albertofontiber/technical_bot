  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-TI-001I
  - MN-DT-959_OPC-RP1r
  - MNDT102
  bot_answer: "## RP1r – Sistema no vuelve a estado normal tras descarga de extinción\n\
    \nEl comportamiento que describes está directamente relacionado con el parámetro\
    \ **ri (Resumen inhibido tras extinción)**, que es el mecanismo de seguridad que\
    \ impide que el sistema vuelva automáticamente al estado normal después de una\
    \ descarga.\n\n---\n\n### ¿Qué está pasando?\n\nSegún la norma **UNE-EN 12094-1:2004,\
    \ apartado 4.1.2** [F1], tras una extinción realizada, el sistema pasa al estado\
    \ de **sistema inhibido** durante un tiempo programable. Esto es intencionado:\
    \ evita que el proceso de extinción se reinicie automáticamente.\n\n---\n\n###\
    \ Pasos a comprobar\n\n1. **Verifica el parámetro `ri` (Resumen inhibido tras\
    \ extinción)** [F1]:\n   - Accede a nivel 3 con el jumper de programación [F3].\n\
    \   - Comprueba el valor configurado en `ri`:\n     - **Valor 00**: el sistema\
    \ pasa a inhibido al finalizar la extinción o al agotar el tiempo configurado.\n\
    \     - **Valores 01 a 30**: el sistema permanece inhibido ese número de minutos\
    \ tras la extinción o hasta intervención/reposición manual.\n   - Si está configurado\
    \ con un valor entre 01 y 30, el sistema **no volverá a estado normal hasta que\
    \ transcurra ese tiempo o se realice la intervención manual** correspondiente.\n\
    \n2. **Comprueba si hay indicación de FALLO DE SISTEMA** [F2]:\n   - Si el display\
    \ muestra \"Fallo de Sistema\", es necesario **rearmar la central** (no basta\
    \ con resetear).\n   - Este fallo puede aparecer si el microprocesador principal\
    \ tardó en inicializar o hubo perturbaciones de tensión durante el arranque [F2].\n\
    \   - Pulsa la tecla **Rearme** para resolver este estado.\n\n3. **Verifica que\
    \ no hay condiciones de alarma activas** en las zonas (detectores, pulsadores,\
    \ entradas monitorizadas) que impidan el retorno al estado normal. Si hay alguna\
    \ zona en alarma, el sistema no puede resetear hasta que se resuelva la causa.\n\
    \n---\n\n### Resumen de acciones\n\n- Si el sistema está en **estado inhibido**\
    \ → espera el tiempo `ri` o realiza la intervención/reposición manual requerida\
    \ [F1].\n- Si hay **Fallo de Sistema** en display → pulsa **Rearme** [F2].\n-\
    \ Si hay **alarma activa** → elimina la causa antes de resetear.\n\n---\n\n**Fuente:**\
    \ HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr (sin revisión registrada) [F1]; HLSI-BT-001\
    \ Boletín técnico 04/11/2011 [F2]; MNDT102 Manual de usuario Central de extinción\
    \ (sin revisión registrada) [F3]\n\n---\n\nTambién puedo ayudarte con: **programación\
    \ del parámetro `ri` paso a paso**, **procedimiento completo de rearme** o **diagnóstico\
    \ de fallos de sistema en la RP1r**."
