  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: 'La respuesta acierta en lo esencial: no se puede desactivar un detector
    individual en la CCD-103 y la anulación es por zona completa mediante doble pulsación
    con la llave habilitada. Incluye además los indicadores, límite de 32 dispositivos
    y resistencia de fin de línea 4K7, coherente con la referencia.'
  bot_sources:
  - CCD-103_Manual_ES_FR_GB_IT
  bot_answer: 'El manual de la **CCD-103** no describe un procedimiento para desactivar
    un detector **individualmente** sin afectar al resto del lazo.


    Lo que sí documenta el manual es la desactivación a nivel de **zona completa**:


    - Las **teclas de zona (A)** permiten poner una zona en **modo prueba** (primera
    pulsación) o en **modo desconexión** (segunda pulsación) [F1].

    - En estado de desconexión se activa el indicador de anular y el correspondiente
    indicador de fallo/anular/prueba [F1].

    - Para actuar sobre estas teclas, la **llave de bloqueo del teclado de la zona
    de detección (G)** debe estar en posición **abierta** [F1].


    La granularidad mínima de desconexión que ofrece la central es la **zona**, no
    el detector individual.


    Adicionalmente, el conexionado de detectores es en **serie** dentro de la zona
    [F2][F3], con resistencia de final de línea de **4K7 Ω** [F2][F3] y un máximo
    de **32 detectores o pulsadores por zona** [F3]. Esta arquitectura convencional
    en serie implica que no existe mecanismo electrónico en la central para aislar
    un único detector del lazo.


    Si necesitas retirar físicamente un detector del circuito sin generar avería,
    consulta el manual completo o el soporte técnico de Detnov, ya que los fragmentos
    disponibles no especifican ese procedimiento.


