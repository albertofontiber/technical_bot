  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: FALLO
  diagnostico: 'Aunque acierta en mencionar averías enclavadas y rearme en nivel 2,
    interpreta mal el parámetro de inhibición de rearme: lo llama ''ri'', da valores
    y comportamiento contrarios al manual para r.1, y afirma erróneamente que el valor
    por defecto inhibe el rearme. Además omite comprobaciones clave como ABORT enclavado,
    t.A, Flow Press activo y zonas/pulsadores aún en alarma.'
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103_RP1r-Supra_lr
  - MIEMN570
  bot_answer: '# RP1r: Sistema no vuelve a estado normal tras resetear después de
    extinción


    Este comportamiento es **esperado por diseño** según la normativa. Aquí tienes
    los puntos a comprobar por orden:


    ---


    ## 1. Estado "Resumen Inhibido" tras extinción (causa más probable)


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras la extinción
    realizada el sistema pasa al **estado de sistema inhibido** de forma intencionada,
    para evitar reiniciar el proceso de extinción.


    El parámetro que controla esto es **ri** [F1]:

    - **ri = 00**: el sistema pasa a "Resumen inhibido" desde que finaliza la extinción
    (comportamiento por defecto)

    - **ri = 01 a 30**: el sistema pasa a "Resumen inhibido" tras ese número de minutos,
    o cuando se produce intervención/reposición


    **Acción:** Verifica el valor programado en el parámetro **ri**. Si está en 00
    (por defecto), el sistema permanecerá inhibido hasta que se realice la reposición
    manual. Esto **no es un fallo**, es el comportamiento normativo.


    ---


    ## 2. Averías enclavadas que impiden el rearme completo


    Todas las averías son **enclavadas por defecto** y requieren **rearme manual**
    para su restablecimiento [F3]. Esto incluye:

    - Presión baja (LOW PRESS SWITCH)

    - Señal de flujo (FLOW PRESS SWITCH)

    - Puerta abierta (DOOR OPEN SWITCH)


    **Acción:** Comprueba si hay algún LED de avería intermitente en el panel. Si
    existe alguna condición de avería activa (p.ej. presión baja tras la descarga
    del agente), el sistema no volverá a estado normal aunque se rearme, hasta que
    desaparezca la condición física.


    ---


    ## 3. Procedimiento de rearme correcto


    Para rearmar la central es necesario acceder con **nivel 2** de acceso y pulsar
    la tecla **"Rearme"** [F3]. Esta acción reinicia la central y restablece todas
    las entradas enclavadas.


    **Acción:** Confirma que el rearme se está realizando con el nivel de acceso correcto
    (nivel 2), no solo con nivel 1.


    ---


    ## 4. Fallo de sistema al rearrancar


    Si tras el rearme aparece indicación de **"FALLO DE SISTEMA"** [F4], la central
    no completará la vuelta a estado normal. Esto ocurre si el microprocesador principal
    tarda en inicializar o detecta tensiones fuera de rango.


    **Acción:** Realiza un rearme completo. Si la avería desaparece tras el rearme,
    el sistema es funcional [F4].


    ---


    ## Resumen de comprobaciones


    - **Parámetro ri**: ¿está configurado correctamente? El estado inhibido post-extinción
    es normativo [F1]

    - **LEDs de avería**: ¿hay alguno intermitente? Identifica y resuelve la condición
    física antes de rearmar [F3]

    - **Nivel de acceso**: ¿se está usando nivel 2 para el rearme? [F3]

    - **Fallo de sistema**: ¿aparece esa indicación? → rearmar [F4]


    ---


    Fuente: HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr (sin revisión registrada); HLSI-MN-103_RP1r-Supra_lr
    (sin revisión registrada); HLSI-BT-001 (04/11/2011)


    También puedo ayudarte con: **configuración del parámetro ri**, **procedimiento
    de reposición del agente extintor y vuelta a servicio**, o **interpretación de
    LEDs de avería** en la RP1r.'
