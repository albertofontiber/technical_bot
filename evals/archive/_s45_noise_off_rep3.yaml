  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'La respuesta recoge varios puntos correctos: uso del puente, cables
    rojo/negro, tensión >24V, fusible y pulsador BAT. Sin embargo, no explicita claramente
    la conexión en serie uniendo positivo de una batería con negativo de la otra,
    omite precauciones importantes de seguridad/ubicación y presenta cierta confusión
    en el orden de conexión frente a la alimentación de red.'
  bot_sources:
  - 55315013 Manual Centrales Analogicas CAD-150-8 Instalacion ES FR GB IT
  - 55315501 CAD150R Instalacion ES GB 191018
  bot_answer: '## Conexión de baterías en la CAD-150


    ### Procedimiento de conexión


    1. **Conecta el cable puente entre las dos baterías** antes de cualquier otra
    conexión [F1]. Este paso es previo e imprescindible.


    2. **Conecta los cables del circuito** (rojo → positivo, negro → negativo) al
    conjunto de baterías ya unidas entre sí [F1].


    3. El conector de batería en la PCB Base está identificado como **Conector Batería
    (posición 11)**, protegido por el **Fusible Baterías (posición 10)** [F3].


    ### Orden de puesta en marcha


    Una vez conectadas las baterías, el orden correcto de alimentación es [F4]:


    1. Conectar primero la **alimentación de red** activando el magnetotérmico bipolar.

    2. Conectar después las **baterías**.


    > ⚠️ Si se arranca el equipo **solo con baterías** (sin red), es imprescindible
    pulsar el pulsador **BAT** (posición 9 en PCB Base) para arrancar el equipo [F4].


    ### Verificación previa


    Antes de conectar, comprueba que las baterías tienen una **tensión superior a
    24 V** con voltímetro [F4].


    ---


    **Fuente:** 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB
    IT (sin revisión registrada)


    También puedo ayudarte con: **conexionado del bucle analógico**, **verificación
    del sistema antes de puesta en marcha** o **configuración rápida desde teclado**
    de la CAD-150-8.'
