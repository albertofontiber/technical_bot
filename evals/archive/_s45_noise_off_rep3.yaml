    \ **después** de que el sistema haya entrado en estado de alarma [F3].\n\n###\
    \ Pasos:\n\n1. **Accede a la Matriz de Control** y edita el evento de entrada\
    \ correspondiente.\n\n2. En la pantalla \"Edición Evento de Entrada en la Matriz\
    \ de Control\", configura:\n   - **Categoría:** ALARMA [F2]\n   - **Evento:**\
    \ ALARMA [F2]\n   - Activa la casilla **\"Indicar Evento de Equipo\"** [F2]\n\
    \   - **Tipo de Equipo:** selecciona el tipo analógico (ANALÓGICO incluye detectores\
    \ TÉRMICOS, IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR) [F1]\n\n3. En el campo de zona,\
    \ selecciona **\"Zona(s) Determinada\"** con el rango de la zona que quieres supervisar\
    \ [F2].\n\n4. Activa la casilla **\"Coincidencia de 2 Equipos\"** [F2][F4].\n\n\
    5. En el evento de salida, configura la acción como **\"Activar\"** sobre la **Función\
    \ Especial: Circuito Sirena 1** [F5].\n\n### ⚠️ Advertencia importante (EN54-2:\
    \ 7.1.4):\n> **No incluyas pulsadores manuales (MCP) en el grupo de coincidencia**\
    \ [F1].\n\nSi en la zona hay pulsadores manuales, debes programar **dos instrucciones**\
    \ en la Matriz de Control [F1]:\n- **Primera instrucción:** define la entrada\
    \ tipo **'Pulsador Manual' (MCP)** como **'Simple'** (sin coincidencia) [F1].\n\
    - **Segunda instrucción:** define el tipo de entrada analógica (p.ej. 'ANALÓGICA')\
    \ con la coincidencia activada [F1].\n\n---\n\n## MÉTODO 2 — Coincidencia de Equipos\
    \ a nivel de central (software v4.63+)\n\nEste método es más avanzado: la central\
    \ **no entra en alarma** hasta que se cumple la coincidencia. Mientras tanto,\
    \ el sistema queda en estado de **PRIMERA ALARMA / PREALARMA** [F3].\n\n- El nivel\
    \ de coincidencia aplicable para tu caso es el **nivel 2: dos o más sensores en\
    \ la misma zona** [F3].\n- Esta opción funciona de forma **independiente** a la\
    \ Matriz de Control [F3].\n- **Limitación:** solo aplica a sensores, **no a módulos\
    \ de entrada**. Un módulo en alarma hace que el sistema entre directamente en\
    \ alarma sin coincidencia [F3].\n- La opción por defecto es **nivel 1 (sin coincidencia)**\
    \ [F3].\n\n---\n\n## Diferencia clave entre ambos métodos\n\n- **Método 1 (Matriz):**\
    \ el sistema entra en alarma con el primer detector y la coincidencia controla\
    \ si se activa la salida de sirena [F3].\n- **Método 2 (Coincidencia de equipos):**\
    \ el sistema permanece en prealarma hasta que el segundo detector confirma; solo\
    \ entonces entra en alarma y activa la sirena [F3].\n\n---\n\n**Fuentes:**\n-\
    \ MCDT190 — Notifier ID3000, Sección 6.1.5 (sin revisión registrada)\n- MADT190_07\
