  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en que el retardo se programa mediante reglas de causa-efecto
    y menciona los tipos/comportamiento de retardos, pero no explica el procedimiento
    clave de programación de la regla ni advierte borrar la Regla 1 por defecto, definir
    entradas/salidas, lazo 0, etc. Además presenta una incoherencia al decir que hay
    6 tipos pero listar 7, y mezcla operación/anulación con programación.
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    La configuración del retardo de salida de alarma en la PEARL se realiza a través
    de las **reglas de causa-efecto**. Aquí tienes el proceso completo:


    ---


    ### 1. Concepto general


    El retardo se configura dentro de una o más reglas de causa-efecto [F1]. Cuando
    hay una regla con retardo activo, el **LED de RETARDO ACTIVO** se enciende en
    el panel [F3].


    ---


    ### 2. Tipos de retardo disponibles


    Hay **6 tipos de retardo de salida** que puedes asignar a una regla [F1]. Sus
    diferencias clave son [F2]:


    - **Fijo**: No se puede silenciar, no se puede anular, no muestra cuenta atrás
    en LCD.

    - **Estándar**: Se detiene si se pulsa SILENCIAR SIRENAS; se puede anular en nivel
    de acceso 2; muestra cuenta atrás; se puede detener con FIN RETARDO.

    - **No Silenc.**: No se detiene con SILENCIAR SIRENAS; sí se puede anular en nivel
    2; muestra cuenta atrás.

    - **Est. Ext.**: Se detiene con SILENCIAR SIRENAS; se detiene también con AMPLIAR
    RETARDO; muestra cuenta atrás.

    - **RetExtStd**: Se detiene con SILENCIAR SIRENAS; al pulsar AMPLIAR RETARDO inicia
    un segundo temporizador extendido; muestra cuenta atrás.

    - **No Sil. Ext**: No se detiene con SILENCIAR SIRENAS; sí se detiene con AMPLIAR
    RETARDO; muestra cuenta atrás.

    - **SinRetExt**: No se detiene con SILENCIAR SIRENAS ni con AMPLIAR RETARDO; al
    pulsar AMPLIAR RETARDO inicia temporizador extendido.


    ---


    ### 3. Funcionamiento operativo del retardo


    Cuando se detecta una alarma con retardo configurado [F4]:


    1. Se inicia el **primer temporizador** (retardo inicial).

    2. El operador con llave (nivel de acceso 2) puede pulsar **AMPLIAR RETARDO**
    para iniciar un segundo temporizador, normalmente más largo, que anula al primero
    [F4].

    3. Cualquier operador de nivel 1 puede pulsar **FIN RETARDO** para terminar el
    retardo y pasar a condición de alarma completa [F4].


    ---


    ### 4. Anular/Habilitar retardos en operación


    Desde el menú **Anular/Habilitar**, opción **«5: Retardo Activación Salidas»**
    [F3]:


    1. Accede al menú Anular/Habilitar.

    2. Selecciona **5: Retardo Activación Salidas**.

    3. Pulsa **✓** para cambiar el estado entre HABILITADO y ANULADO.

    4. Pulsa **✕** para salir.


    > ⚠️ Esta opción solo aparece si hay retardos configurados en las reglas de causa-efecto
    [F3].


    ---


    ### 5. Opción adicional: habilitar/deshabilitar el pulsador AMPLIAR RETARDO


    Desde **Editar Parámetros de la Central**, parámetro **10: Extend Delay Button**
    [F5], puedes activar o desactivar el pulsador físico AMPLIAR RETARDO (útil en
    mercados donde esta función no es requerida).


    ---


    > ⚠️ **Nota importante**: Los fragmentos disponibles describen los tipos de retardo
    y su comportamiento operativo, pero **no detallan el procedimiento paso a paso
    para crear o editar una regla de causa-efecto con un valor de tiempo concreto**
    (p. ej., cómo introducir 30 segundos en la regla). Para ese nivel de detalle,
    consulta el Apéndice 5 completo del manual de configuración.


    ---


    **Fuente:** Manual de configuración de la central PEARL (997-671-005-3\_Configuration\_ES,
    sin revisión registrada); Manual de funcionamiento PEARL (997-670-005-3\_Operating\_ES,
    sin revisión registrada)


    ---


    También puedo ayudarte con: **borrar una regla de causa-efecto**, **configurar
    coincidencia de detectores** o **gestión de niveles de acceso en la PEARL**.'
