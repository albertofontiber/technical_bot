  bot_answer: '## Desactivación de zona en la CCD-103


    Los fragmentos disponibles del manual de la **CCD-103** no describen un procedimiento
    para desactivar un **detector individual** de forma aislada.


    Lo que sí documenta el manual es la desactivación a nivel de **zona completa**:


    ### Desactivación de zona (nivel zona, no detector individual)


    1. Pulsa la **tecla de zona (A)** correspondiente una primera vez → la zona entra
    en **modo prueba** [F1].

    2. Pulsa la **tecla de zona (A)** una segunda vez → la zona entra en **modo desconexión**
    [F1].

    3. En ese estado se activa el **indicador de anular** y el **indicador de fallo/anular/prueba**
    de esa zona [F1].


    > ⚠️ **Importante:** Para que las pulsaciones de las teclas del bloque de detección
    tengan efecto, la **llave de bloqueo de teclado (G)** debe estar en posición **abierta**
    [F1].


    ---


    ### Limitación conocida


    El manual no especifica ningún mecanismo para desactivar un **detector individual**
    sin afectar al resto del lazo/zona. La arquitectura de conexionado de la CCD-103
    es **convencional en serie** (los detectores se conectan en cadena, positivo al
    contacto 1 y negativo entrando por contacto 4 y saliendo por contacto 3 al siguiente
    detector) [F2][F3], lo que implica que la unidad mínima de gestión documentada
    es la **zona completa** (máximo 32 detectores o pulsadores por zona) [F2][F3].


    Para la desactivación de un detector individual sin afectar al lazo, consulta
    directamente el soporte técnico de Detnov o el manual completo, ya que esa información
    no está disponible en los fragmentos recuperados.


    ---


    **Fuente:** CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    ---


