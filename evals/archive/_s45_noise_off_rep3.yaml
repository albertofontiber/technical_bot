  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Incluye datos clave correctos como RFL 6K8/0,5 W, límite 1 A, polaridad/supervisión
    inversa y uso de diodo, pero confunde la ZXe con ZXAE/ZXEE y no cita ZX2e/ZX5e;
    además habla de conexión “en serie”, lo que puede inducir a error porque las sirenas
    se cablean en una línea supervisada con RFL al final, no en serie eléctrica.
  bot_sources:
  - MIE-MI-310
  - MIE-MP-310
  - MIE-MU-310
  bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe (ZXAE/ZXEE)


    ## Número de salidas disponibles


    - **ZXAE**: 2 salidas supervisadas para sirenas convencionales (Salida A y Salida
    B) [F2]

    - **ZXEE**: 4 salidas supervisadas para sirenas convencionales (Salida A, B, C
    y D) [F2]


    Los terminales en la ZXEE son: **S,A+ / S,A- / S,B+ / S,C+ / S,D+ / S,D-** (bloque
    TB7) [F2]


    ---


    ## Procedimiento de conexionado


    ### 1. Conexión en serie (sin ramales)

    Conecta las sirenas en **línea directa**, respetando la polaridad (+/-) de cada
    sirena [F1]. **No realices ramales paralelos**: la supervisión se hace sobre la
    línea directa hasta la RFL, y los ramales no quedan supervisados [F1].


    ### 2. Sirenas con polaridad

    Conecta respetando el + y el - de cada sirena, encadenándolas en serie hasta la
    RFL [F1].


    ### 3. Campanas/sirenas sin polaridad

    Instala un **diodo** entre el terminal + de la salida y uno de los terminales
    de alimentación de la campana. Esto evita consumos durante la supervisión, ya
    que las bobinas de campanas sin polaridad no tienen polaridad [F2].


    ### 4. Resistencia Final de Línea (RFL)

    - Coloca la **RFL de 6.800 Ω (6K8), mínimo 0,5 W** entre el + y el - de la **última
    sirena** de la línea [F2]

    - Si **no hay ninguna sirena** conectada en esa salida, conecta la RFL directamente
    en los terminales de la salida en la central [F2]


    ### 5. Límite de corriente por circuito

    - Corriente máxima por salida: **1 A** [F2]

    - Ten en cuenta el consumo total de la central con todas las sirenas activadas
    para no exceder el consumo total [F2]


    ### 6. Sección de cable

    - No usar sección inferior a **1,5 mm²** [F2]

    - Evitar longitudes excesivas que provoquen caídas de tensión en la línea [F2]


    ---


    ## Funcionamiento de la supervisión


    La supervisión se realiza con una **corriente inversa** que lee la RFL. La corriente
    de supervisión tiene sentido inverso a la de activación, con una pequeña tensión
    de polaridad inversa a la de la salida. Al activarse la salida, la corriente circula
    en sentido normal [F2].


    ---


    > ⚠️ **Advertencia**: Los ramales paralelos en la línea de sirenas dejan tramos
    sin supervisión. Toda la línea debe ser en serie hasta la RFL [F1].


    ---


    **Fuente:** Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)


    También puedo ayudarte con: **configuración de zonas de disparo de sirenas**,
    **consumo total de la central con sirenas activas** o **conexionado de módulos
    de sirena en lazo analógico**.'
