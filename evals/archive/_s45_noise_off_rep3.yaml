  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en gran parte las salidas de relé/sirena, contactos NC-C-NA
    y EOL de 47 kΩ, así como los valores de corriente/tensión de relé. Pero falla
    en un punto clave: no indica que el relé de avería es failsafe y actúa ante corte
    de alimentación; además omite que la avería no está enclavada, la carga resistiva
    y la vida mínima de 10^5 operaciones.'
  bot_sources:
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés disponibles y sus contactos


    El equipo dispone de los siguientes relés [F5]:


    **Relés de alarma:**

    - **Relé de alarma C1** (terminales 5, 6, 7): contactos NC / C / NA

    - **Relé de alarma C2** (terminales 8, 9, 10): contactos NC / C / NA *(solo en
    modelos de 2 canales)*


    **Relés de avería:**

    - **Relé de avería C1** (terminales 11, 12, 13): contactos NC / C / NA

    - **Relé de avería AUX. C2** (terminales 14, 15, 16): contactos NC / C / NA *(solo
    en modelos de 2 canales)*


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Al abrir la puerta de la caja durante el funcionamiento normal, la unidad entra
    en modo de servicio: **el relé de fallo indica una avería** [F3]. Este mismo comportamiento
    se aplica ante cualquier condición de fallo detectada.


    > ⚠️ **Nota importante:** Los fragmentos no describen explícitamente el comportamiento
    del relé de avería ante un corte total de alimentación (energizado/desenergizado
    en reposo). El manual no especifica ese detalle en los fragmentos disponibles.
    Consulta el manual completo o el soporte técnico de Notifier/Hochiki para confirmar
    si el relé es de tipo "fail-safe" (desenergizado en reposo).


    ---


    ### Salidas de sirena y resistencia de fin de línea


    - **Salida sirena 1** (terminales 17 −, 18 +): resistencia de fin de línea de
    **47 kΩ** [F5]

    - **Salida sirena 2** (terminales 19 −, 20 +): resistencia de fin de línea de
    **47 kΩ** [F5]


    > ⚠️ **Atención:** La resistencia de fin de línea de **47 kΩ** aparece en el fragmento
    del FAAST LT versión de lazo Morley [F5]. El fragmento de especificaciones del
    LT-200 autónomo [F1] no menciona este valor explícitamente. Verifica que tu modelo
    (FL0111E-HS, FL0112E-HS o FL0122E-HS) coincide con esta tabla de terminales antes
    de aplicarla.


    ---


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC**

    - **0,5 A a 30 V CA**


    [F1]


    ---


    Fuentes:

    - I56-6574-005_ES - HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-3956-201_ES Morley Loop FAAST LT QIG (sin revisión registrada)


    ---


