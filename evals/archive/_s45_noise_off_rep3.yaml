  bot_answer: "# Notifier PEARL — Capacidad de lazo SLC, límites de aisladores y alta/edición\
    \ de equipos\n\n---\n\n## 1. Capacidad máxima por lazo\n\n- **Máximo 318 equipos\
    \ por lazo analógico**: hasta **159 sensores** y **159 módulos** [F1]\n- **Máximo\
    \ 512 sensores y/o pulsadores manuales en el sistema completo** (sumando ambos\
    \ lazos, incluidos detectores y pulsadores de zonas convencionales conectadas)\
    \ [F1]\n\n> **Nota BS5839 parte 1:** Si se instalan pulsadores CLIP, el máximo\
    \ de equipos CLIP será **6** para cumplir el tiempo de respuesta de 3 segundos\
    \ [F1].\n\n---\n\n## 2. Límites de aisladores (EN54-2: 12.5.2)\n\nLa norma exige\
    \ un máximo de **32 equipos entre aisladores**, pero la Pearl impone condiciones\
    \ más restrictivas según el tipo de equipo [F1]:\n\n- **Equipos SIN aisladores\
    \ internos** (protocolo CLIP y algunos Opal): **máximo 20 equipos entre aisladores**\
    \ [F1]\n- **Equipos CON aisladores internos** (usados con base **B501 AP**): los\
    \ lazos deben cumplir los requisitos de EN54-2 (máximo 32) [F1]\n\n> **Importante:**\
    \ Para que los aisladores del lazo se cierren al aplicar alimentación, la carga\
    \ entre aisladores no debe superar **20 SU** [F2].\n\n**Equipos de protocolo Opal:**\
    \ la mayoría incorporan aisladores FET internos. Con bases compatibles Opal, el\
    \ aislador se conecta a los terminales **+2 y +4** en el extremo positivo [F1].\n\
    \n**Advertencia de comprobación de lazo:** NUNCA usar multímetro de alta tensión\
    \ (tipo Megger) en el lazo. Si hay aisladores instalados, el conductor positivo\
    \ (+) del lazo aparecerá como circuito abierto [F1].\n\n---\n\n## 3. Alta de equipos:\
    \ Autoconfiguración\n\nAcceso desde **nivel de acceso 3 → Menú de Configuración\
    \ → Equipos de lazo → Autoconfigurar** [F5].\n\n**Pasos del proceso** [F3]:\n\n\
    1. Pulsar **1: Autoconfiguración**\n2. Seleccionar si aplica a **todos los lazos**\
    \ o a un **lazo específico**\n3. Elegir el modo de autoconfiguración:\n   - **1:\
    \ Todos Prot. OPAL/CLIP** → detecta direcciones duplicadas ✓ (recomendado)\n \
    \  - **2: OPAL/CLIP (No detecta duplicidad)** → más rápido, sin comprobación de\
    \ duplicados\n   - **3: Sólo con protocolo CLIP** → solo autoconfigura equipos\
    \ CLIP aunque haya Opal en el lazo\n4. Seleccionar entre:\n   - **\"Permite Añadir/Borrar/Cambiar\"\
    **\n   - **\"Sólo Añadir Nuevos Equipos\"**\n5. El proceso se inicia automáticamente.\
    \ Sensores y módulos (Opal y CLIP) se detectan en la misma pasada [F3]\n\n> Al\
    \ finalizar, los resultados se muestran en la pantalla LCD. Los equipos configurados\
    \ pueden consultarse en cualquier momento desde **nivel de acceso 2 → \"Resumen\
    \ de Equipos\"** [F3].\n\n> La configuración puede transferirse a un ordenador\
    \ portátil para editarla y archivarla usando el **programa de configuración ITS**\
    \ [F3].\n\n---\n\n## 4. Edición de equipos (añadir, borrar, mover)\n\nDesde **nivel\
    \ de acceso 3 → Menú de Configuración → Equipos de lazo → Editar equipos** [F4]\
    \ [F5]:\n\n- **Añadir o borrar un equipo de lazo** → Sección **«4.2 Edición de\
    \ equipos»** del manual de configuración [F4]\n- **Mover un equipo a otra zona**\
    \ → Sección **«4.2 Edición de equipos»** [F4]\n- **Editar texto del equipo** →\
    \ Sección **«5.2 Edición de texto»** [F4]\n\n---\n\n**Fuente:** Manual de instalación\
    \ y puesta en marcha 997-669-005-3\\_Instal-Comm\\_ES (sin revisión registrada);\
    \ Manual de configuración de la central 997-671-005-3\\_Configuration\\_ES (sin\
    \ revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **cargas SU de equipos\
    \ CLIP por modelo**, **procedimiento detallado de edición de equipos (sección\
    \ 4.2)** o **transferencia de configuración con el programa ITS**."
