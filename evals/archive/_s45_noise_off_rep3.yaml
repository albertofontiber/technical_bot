- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en que la causa probable puede ser obstrucción parcial, orificios/filtro
    sucios y en revisar la memoria de eventos, pero omite el diagnóstico clave: leer
    el valor de flujo en V01/V02 y compararlo con el 100% del reset inicial y la ventana/retardo
    de monitorización. Además mezcla causas de flujo alto como rotura/fuga con flujo
    bajo, no aclara que el ASD 535 genera un fallo de flujo de aire y no una ''alarma
    de flujo bajo'' como tal, e introduce elementos menos justificados como degradación
    de la AFU.'
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: "## Alarma intermitente de flujo bajo en ASD535\n\n### Causa más probable\n\
    \nLa alarma intermitente de flujo bajo en el **ASD 535** indica que el sistema\
    \ de monitorización del flujo de aire ha detectado una anomalía en el conducto\
    \ de aspiración [F5]. Las causas más probables son:\n\n- **Obstrucción parcial**\
    \ en los orificios de aspiración o en el conducto de aspiración [F1]\n- **Filtro\
    \ de polvo colmatado** o próximo al fin de su vida útil [F1]\n- **Rotura o fuga**\
    \ en el conducto de aspiración [F5]\n- **Unidad de ventilación (AFU 35) degradada**\
    \ [F4]\n\n> El manual indica explícitamente que si los orificios de aspiración\
    \ están obstruidos, \"la toma de muestras puede resultar imposible o insuficiente\"\
    \ [F1].\n\n---\n\n### Procedimiento de diagnóstico\n\n1. **Inspección visual del\
    \ conducto de aspiración**\n   Revisa toda la tubería de PVC rígido o ABS de **25\
    \ mm de diámetro exterior / 20 mm de diámetro interior** [F5] buscando obstrucciones,\
    \ aplastamientos o roturas.\n\n2. **Inspección de los orificios de aspiración**\n\
    \   Comprueba que todos los orificios estén libres de suciedad, polvo acumulado\
    \ o bloqueos físicos [F1].\n\n3. **Verificación del estado del filtro**\n   Consulta\
    \ la vida útil restante del filtro desde *EasyConfig*, posición de conmutador\
    \ **d > RE** [F1]. Si el filtro está al límite o ha disparado el aviso \"Fallo\
    \ de filtro (fin de vida útil)\", procede a su sustitución siguiendo el procedimiento\
    \ del **cap. 9.3.1** [F1].\n\n4. **Comprobación de la unidad de ventilación (AFU\
    \ 35)**\n   Si los pasos anteriores no revelan la causa, considera que la unidad\
    \ de ventilación puede estar degradada. Su sustitución requiere desmontar el **Main\
    \ Board AMB 35** [F4].\n\n5. **Lectura de la memoria de eventos**\n   Consulta\
    \ la memoria de eventos del ASD 535 (cap. **8.5.3** del manual) [F2] para identificar\
    \ el código de evento exacto asociado al fallo de flujo y acotar la causa.\n\n\
    ---\n\n### ⚠️ Advertencias importantes\n\n- Tras limpiar los orificios de aspiración,\
    \ **normalmente no es necesario un reset inicial** [F1].\n- Si se realizan trabajos\
    \ de mantenimiento o reparación en el conducto de aspiración, puede ser necesario\
    \ ejecutar un **reset inicial** (cap. **7.3.5**) [F1].\n- **No ejecutes el reset\
    \ inicial con orificios obstruidos**: existe riesgo de que el ASD 535 no pueda\
    \ disparar la alarma [F1].\n- Cualquier sustitución de componentes (sensor de\
    \ flujo, ventilador) debe realizarse **sin tensión**, desconectando los bloques\
    \ de bornes 1/2 y, en su caso, 3/4 del AMB 35 [F1].\n\n---\n\nFuente: ASD535_TD_T131192es_h\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **procedimiento\
    \ de sustitución del filtro**, **sustitución del sensor de flujo de aire (cap.\
    \ 9.4.3)** o **lectura e interpretación de la memoria de eventos del ASD535**."
