  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: La respuesta cubre correctamente las reglas de acceso y el procedimiento
    para cambiar los códigos de Nivel 2 y 3, incluyendo longitud, confirmación, mensaje
    final y sincronización/copia en la nube. Solo omite la nota específica sobre que
    el portal/app/programa CLSS comparten usuario y contraseña, pero no afecta sustancialmente
    a la configuración solicitada.
  bot_sources:
  - HOP-138-8ES  issue 6_01-2026_Co
  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE
    E10/E15


    ---


    ## Información general


    La INSPIRE E10/E15 usa contraseñas de **4 a 8 dígitos** para los niveles de acceso
    2 y 3 [F1][F2][F3].


    - El código de fábrica del **Nivel 2** es **"22222222"** [F3]. Se recomienda cambiarlo.

    - Para cambiar contraseñas: si estás en **Nivel 2**, solo puedes cambiar la contraseña
    de Nivel 2. Si estás en **Nivel 3**, puedes cambiar la contraseña de Nivel 2 **o**
    Nivel 3 [F1].


    ---


    ## Procedimiento para cambiar la contraseña (Nivel 2 o Nivel 3)


    *(Requiere acceso de Nivel 3 para cambiar ambas; Nivel 2 solo para cambiar la
    suya propia)* [F1]


    1. Selecciona el **icono del menú** ① y luego **"Ajustes/Configuración"** ② [F1][F2].

    2. Inicia sesión con el nivel de acceso correspondiente (Nivel 3 para cambiar
    cualquiera de las dos) [F1].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F1][F2].

    4. Asegúrate de que el **Nivel de Acceso 2 o 3** ④ esté seleccionado y que el
    cursor parpadee en el campo de entrada ⑤ [F1].

    5. Pulsa el **icono del ojo** ⑥ si quieres visualizar el código mientras lo introduces
    [F1][F2].

    6. Introduce el nuevo código de acceso (**mínimo 4 dígitos, máximo 8 dígitos**)
    con el teclado numérico ⑦ [F1][F2].

    7. Confirma la entrada seleccionando el **símbolo ✓** ⑧ [F1][F2].

    8. **Repite los pasos 3 a 7** para confirmar el código introducido [F1].

    9. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1].

    10. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    ---


    > ⚠️ **Importante:** Asegúrate de que los códigos de acceso se mantienen seguros
    y solo los conocen los usuarios autorizados [F3].


    ---


    También puedo ayudarte con: **sincronización de configuración con la herramienta
    CLSS**, **procedimiento de puesta en marcha** o **simulación de alarma en Modo
    Servicio** de la INSPIRE E10/E15.


    **Fuentes:** HOP-138-8ES issue 6_01-2026 (Instrucciones de puesta en marcha);
    HOP-338-9ES issue 4_01-2026 (Instrucciones de usuario)'
