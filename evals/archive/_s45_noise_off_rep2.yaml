- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en que la causa más probable puede ser obstrucción/filtro sucio
    y propone revisar eventos e inspeccionar la aspiración. Pero omite el diagnóstico
    clave leyendo V01/V02 en % respecto al reset inicial y los umbrales/retardo de
    fallo de flujo, confunde rotura/fuga como causa de flujo bajo, y da una indicación
    dudosa al decir que normalmente no hace falta reset inicial tras la limpieza.
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: "## Alarma intermitente de flujo bajo en ASD535\n\n### Causa más probable\n\
    \nLa alarma intermitente de flujo bajo en el **ASD 535** indica que el sistema\
    \ de monitorización del flujo de aire ha detectado una anomalía en el conducto\
    \ de aspiración [F5]. Las causas más probables son:\n\n- **Obstrucción parcial**\
    \ en los orificios de aspiración o en el conducto de aspiración [F1]\n- **Filtro\
    \ de polvo colmatado** o al final de su vida útil [F1]\n- **Rotura o fuga** en\
    \ el conducto de aspiración [F5]\n- **Unidad de ventilación (AFU 35) degradada**\
    \ [F4]\n\n> El manual indica explícitamente que si los orificios de aspiración\
    \ están obstruidos, la toma de muestras puede resultar imposible o insuficiente\
    \ [F1].\n\n---\n\n### Procedimiento de diagnóstico\n\n1. **Inspección visual del\
    \ conducto de aspiración**\n   Revisa toda la tubería de PVC rígido o ABS de **25\
    \ mm de diámetro exterior / 20 mm de diámetro interior** [F5] buscando obstrucciones,\
    \ aplastamientos o roturas.\n\n2. **Inspección de los orificios de aspiración**\n\
    \   Comprueba que todos los orificios estén libres de suciedad, polvo acumulado\
    \ o bloqueos físicos [F1].\n\n3. **Verificación del estado del filtro**\n   Consulta\
    \ en *EasyConfig* la posición de conmutador **d > RE** para leer la vida útil\
    \ restante del filtro [F1]. Si está agotado, aparecerá el fallo **«Fallo de filtro\
    \ (fin de vida útil)»** [F1].\n\n4. **Lectura de la memoria de eventos**\n   Accede\
    \ a la memoria de eventos del ASD 535 (sección **8.5.3** del manual) [F2] para\
    \ identificar el código de evento exacto asociado al fallo de flujo. Los grupos\
    \ de eventos y códigos están descritos en los apartados **8.5.3.2** y **8.5.3.3**\
    \ [F2].\n\n5. **Comprobación de la unidad de ventilación (AFU 35)**\n   Si los\
    \ pasos anteriores no revelan la causa, puede estar degradada la unidad de ventilación\
    \ para la aspiración. Su sustitución requiere desmontar el **Main Board AMB 35**\
    \ [F4].\n\n---\n\n### Acción correctiva inmediata\n\n- Si la causa es **obstrucción**:\
    \ limpia los orificios y el conducto. Tras la limpieza, normalmente **no es necesario\
    \ un reset inicial** [F1].\n- Si la causa es **filtro agotado**: sustituye el\
    \ elemento de filtro activando la función **«Sustitución del filtro»** (botón\
    \ Reset o vía *EasyConfig* / *ASD Config*) antes de retirar el filtro, para que\
    \ el equipo pase a estado **«Aislar»** y evitar falsas alarmas durante el cambio\
    \ [F1].\n\n> ⚠️ **Advertencia**: Si tras trabajos de mantenimiento o reparación\
    \ en el conducto de aspiración fuera necesario un reset inicial, este **solo**\
    \ debe ejecutarse cuando se tenga la seguridad de que el conducto está completamente\
    \ limpio. Realizarlo con obstrucciones puede impedir que el ASD 535 dispare la\
    \ alarma [F1].\n\n---\n\n**Fuente:** ASD535_TD_T131192es_h (sin revisión registrada)\n\
    \n---\n\nTambién puedo ayudarte con: **sustitución del filtro paso a paso**, **sustitución\
    \ de la unidad de ventilación AFU 35** o **lectura e interpretación de la memoria\
    \ de eventos del ASD535**."
