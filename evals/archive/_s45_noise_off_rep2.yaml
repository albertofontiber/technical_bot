  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: La respuesta cubre correctamente las reglas de acceso y el procedimiento
    para cambiar los códigos de Nivel 2 y Nivel 3, incluyendo longitud, confirmación,
    mensaje de éxito y sincronización/copia en la nube. Solo omite la nota sobre credenciales
    compartidas de CLSS, pero no afecta de forma relevante a la respuesta técnica
    principal.
  bot_sources:
  - HOP-138-8ES  issue 6_01-2026_Co
  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE
    E10/E15


    ---


    ## Información general sobre contraseñas


    - La contraseña de fábrica del **Nivel 2** es **"22222222"** [F3].

    - Se recomienda cambiarla por una contraseña exclusiva de entre **4 y 8 dígitos**
    [F1][F3].

    - Si los controles no se usan durante **5 minutos** tras iniciar sesión en Nivel
    2, la central cierra sesión automáticamente y vuelve al Nivel 1 [F3].


    ---


    ## Cambio de contraseña de Nivel 2 (desde usuario Nivel 2)


    Procedimiento según manual de operación [F2]:


    1. Selecciona el **icono del menú** ① y luego **"Configuración"** ②. Inicia sesión
    como usuario de **Nivel de Acceso 2**.

    2. Selecciona la opción **"Cambio del código de acceso"** ③.

    3. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y que el cursor
    parpadee ⑤.

    4. Puedes ver la contraseña introducida pulsando el **icono del ojo** ⑥.

    5. Introduce el nuevo código de acceso (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma la entrada seleccionando el símbolo **✓** ⑧.

    7. Repite los pasos 3 a 6 para confirmar el código.


    ---


    ## Cambio de contraseña de Nivel 2 y/o Nivel 3 (desde usuario Nivel 3)


    Procedimiento según manual de puesta en marcha [F1]:


    1. Selecciona el **icono del menú** ① → **"Ajustes"** ② → inicia sesión como usuario
    de **Nivel de Acceso 3**.

    2. Selecciona **"Cambio del código de acceso"** ③.

    3. Selecciona el nivel a modificar: **Nivel de Acceso 2 o 3** ④. Comprueba que
    el cursor parpadea ⑤.

    4. Puedes ver la contraseña introducida pulsando el **icono del ojo** ⑥.

    5. Introduce el nuevo código (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma seleccionando el símbolo **✓** ⑧.

    7. Repite los pasos 3 a 6 para confirmar.

    8. Observa el mensaje **"Cambio de código de acceso satisfactorio"** → selecciona
    **Aceptar**.

    9. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    > ⚠️ **Importante:** Tras cambiar la contraseña, es obligatorio sincronizar con
    la herramienta CLSS y hacer copia de seguridad en la nube [F1]. Asegúrate de que
    los códigos se mantienen seguros y solo los conocen usuarios autorizados [F3].


    ---


    **Regla de acceso resumida:**

    - Usuario **Nivel 2** → puede cambiar solo la contraseña de **Nivel 2** [F1].

    - Usuario **Nivel 3** → puede cambiar la contraseña de **Nivel 2 o Nivel 3** [F1].


    ---


    Fuentes: HOP-138-8ES issue 6_01-2026_Co (sin revisión registrada); HOP-338-9ES
    issue 4_01-2026_Op (sin revisión registrada)'
