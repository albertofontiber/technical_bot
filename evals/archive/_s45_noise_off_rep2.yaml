    - La fluctuación máxima de temperatura permitida durante el funcionamiento (tanto
    en la caja como en el conducto) es de **20 °C** [F1]. Si se superan estas oscilaciones,
    pueden ser necesarios ajustes especiales [F5].

    - En recintos con temperatura superior a **50 °C** o humedad superior al **80
    % H rel.**, puede ser necesario instalar tramos de refrigeración en el conducto
    de aspiración [F4].

    - Para uso en **almacenes de ultracongelación**, el rango de temperatura restringido
    es de **–30 °C hasta 0 °C**, y debe seguirse la directriz T 131 390 [F2].


