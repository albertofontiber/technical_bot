  bot_sources:
  - DXc_Manual de configuracion
  - DXc_Manual de usuario
  - Eventos-Averias-de-Equipos-en-DXc
  bot_answer: '## Añadir un nuevo detector al lazo en la DXc


    Según los fragmentos disponibles, cuando se conecta un nuevo detector al lazo
    de la DXc, la central lo detecta automáticamente y genera el evento **"EQUIPO
    NUEVO"** [F1].


    ### Procedimiento


    1. **Conecta físicamente el nuevo detector** al lazo, respetando el cableado en
    bucle (no puentees los terminales, corta el cable en cada conexión) [F2].


    2. **La central generará el evento "EQUIPO NUEVO"** — esto indica que ha detectado
    un equipo en el lazo que no estaba registrado en la configuración actual [F1].


    3. **Realiza una autobúsqueda** para aceptar el nuevo equipo en el sistema [F1].


    > ⚠️ **Nota importante:** Si el nuevo detector comparte dirección con otro equipo
    ya existente, la central generará el evento **"DOBLE DIRECCIÓN"**. En ese caso,
    cambia la dirección del nuevo detector antes de proceder [F1].


    ---


    ### Lo que los fragmentos NO cubren


    El procedimiento paso a paso para ejecutar la **autobúsqueda** desde el menú de
    la central no aparece en los fragmentos recuperados. Para ese procedimiento concreto,
    consulta el manual de configuración de la DXc en la sección correspondiente a
    autobúsqueda, o contacta con el soporte técnico de Honeywell en **soporteHLSI@Honeywell.com**
    [F1].


    ---


    Fuente: Eventos-Averias-de-Equipos-en-DXc (sin revisión registrada); DXc\_Manual
    de configuracion (sin revisión registrada)


    ---


    También puedo ayudarte con: **resolución del evento "NO RESPONDE"**, **conexionado
    físico del lazo con aisladores** o **anulación/habilitación de equipos individuales**
    en la DXc.'
- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: FALLO
  diagnostico: 'Aunque menciona el rearme en nivel 2 y averías enclavadas, se equivoca
    en el punto clave: identifica mal el parámetro de inhibición de rearme, invierte/falsea
    sus valores por defecto y omite comprobaciones esenciales como ABORT activo, t.A,
    Flow Press activo y zonas en alarma. Puede inducir a un técnico a aceptar como
    normal un bloqueo que debe diagnosticarse.'
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103_RP1r-Supra_lr
  - MIEMN570I
  bot_answer: '## RP1r-Supra: Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento es esperado y está regulado por normativa. Aquí tienes los
    puntos clave a comprobar:


    ---


    ### 1. Estado "Resumen Inhibido" tras extinción (causa más probable)


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras la extinción
    realizada el sistema **no vuelve directamente a estado normal**, sino que pasa
    a **estado inhibido** para evitar reiniciar el proceso de extinción.


    El parámetro **ri** controla este comportamiento [F1]:

    - **ri = 00**: El sistema pasa a resumen inhibido desde que finaliza la extinción
    (valor por defecto)

    - **ri = 01 a 30**: El sistema pasa a resumen inhibido tras ese tiempo en minutos,
    o cuando se agota el tiempo configurado


    **Acción:** Verifica el valor programado en el parámetro **ri**. Si está en 00
    (por defecto), el sistema permanecerá en estado inhibido hasta que se realice
    una intervención o reposición manual. Esto es comportamiento correcto según normativa.


    ---


    ### 2. Averías enclavadas que impiden el rearme completo


    Todas las averías son **enclavadas por defecto** y requieren **rearme manual**
    para su restablecimiento [F3]. Comprueba si hay algún LED de avería activo (intermitente):


    - **Presión baja** → LED "Avería presión baja" intermitente [F3]

    - **Señal de flujo** → LED "Avería presión flujo" intermitente [F3]

    - **Puerta abierta** → LED "C''to. supervisión puerta abierta" intermitente [F3]


    > ⚠️ La excepción es la **avería en el circuito de paro**, que no admite rearme
    automático. El resto pueden configurarse para rearme automático mediante las **funciones
    especiales (sección 5.4)** [F3].


    ---


    ### 3. Procedimiento de rearme correcto


    Para rearmar la central [F3]:

    1. Accede al **nivel 2** de acceso (consultar sección **4.3. Niveles de acceso**)

    2. Pulsa la tecla **"Rearme"**

    3. La central se reiniciará y todas las entradas enclavadas se restablecerán


    ---


    ### 4. Fallo de sistema al rearmar


    Si al rearmar aparece indicación de **FALLO DE SISTEMA** [F4]:

    - Es causado por el microprocesador principal tardando en inicializar, o por lecturas
    de tensión fuera de rango

    - **Acción:** Rearmar de nuevo. Si la avería desaparece tras el rearme, el sistema
    es correcto

    - ⚠️ Si persiste el FALLO DE SISTEMA sin rearmar, la central **NO ejecutará el
    proceso de extinción** [F4]


    ---


    ### 5. Estado tras extinción realizada (verificación visual)


    Confirma que el sistema está realmente en "fin de extinción" y no en otro estado
    [F2]:

    - LED **"Extinción Realizada"** iluminado de forma **fija**

    - Temporizador de disparo en **00 seg.** fijo

    - Relés de salida de solenoides **desactivados**


    ---


    **Fuente:** HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada); HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
    (sin revisión registrada); HLSI-BT-001 Boletín técnico (04/11/2011)


    ---


    También puedo ayudarte con: **configuración del parámetro ri**, **funciones especiales
    de rearme automático (sección 5.4)** o **niveles de acceso y código de nivel 2**
    de la RP1r-Supra.'
