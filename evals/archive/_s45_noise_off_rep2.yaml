  question: ¿Cuáles son las características técnicas de la central de detección de
    gas Fidegas CS4, y en qué se diferencian las versiones digital y analógica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: 'Incluye las características técnicas esenciales de la referencia:
    alimentación, potencia, hasta 4 sensores, salidas, corriente, dimensiones, peso,
    rearme y códigos 3244/3270. También explica correctamente que la diferencia principal
    es el tipo de conexión de sensores, digital frente a analógica 4-20 mA; añade
    información extra no necesaria pero no contradice lo esencial.'
  bot_sources:
  - MNDT515
  - Manual-de-Usuario-CS4
  bot_answer: '# Central de Detección de Gas Fidegas CS4 — Características Técnicas


    ## Especificaciones generales


    - **Tensión de alimentación:** 110–230 Vac, 50/60 Hz [F2]

    - **Potencia/Consumo:** 30 W, Clase II [F2][F3]

    - **Número de sensores:** Hasta 4 conexiones simultáneas (modo analógico o digital)
    [F2]

    - **Salidas:** 2 salidas conmutadas LP (relé apto para 230 Vac) con contactos
    NA-C-NC [F2]

    - **Corriente máxima:** 250 mA [F2]

    - **Rearme:** Seleccionable manual o automático [F2]

    - **Dimensiones:** 90 × 106 × 58 mm [F2]

    - **Peso:** 300 g [F2]

    - **Instalación:** Carril DIN o armario de superficie [F1]


    ## Indicaciones disponibles


    - **LED verde (PWR):** Alimentación presente (fijo) / corte de red (intermitente)
    [F1]

    - **LED bicolor (ON/ALARM) por sensor:** Presencia de sensor (verde) / alarma
    (rojo) [F1]

    - **LED amarillo (ERROR) por sensor:** Avería de sensor remoto [F1]

    - **LED verde (OUT1 / OUT2):** Salida activa (verde) / desactivada (apagado) [F1]

    - **Avisador acústico:** Apoyo sonoro a las indicaciones ópticas [F1]


    ## Comportamiento de alarmas


    - Las alarmas se activan al **20% del fondo de escala** [F1]

    - Las alarmas son **enclavadas**; se rearman mediante pulsador [F1]

    - El enclavamiento del corte de red es configurable: **rearme manual (de serie)
    o automático** [F1]


    ---


    ## Diferencias entre versión digital y analógica


    **Código de producto:**

    - Versión digital: **3244** [F2]

    - Versión analógica: **3270** [F2]


    **Tipo de entrada de señal:**

    - Versión digital: entradas **0–10/15 V** [F1]

    - Versión analógica: entradas **4–20 mA** [F1]


    **Sensores compatibles:**

    - Versión digital: sensores **S/10 gases combustibles** [F3]

    - Versión analógica: sensores **S/3 gases combustibles**, sensores **S/3 y S/2
    gases tóxicos**, sensores **S/10 gases tóxicos** [F3]


    > ⚠️ La versión analógica tiene mayor variedad de sensores compatibles (combustibles
    y tóxicos), mientras que la versión digital está limitada a sensores S/10 de gases
    combustibles.


    ---


    **Fuente:** Manual de Usuario CS4 — Fidegas (sin revisión registrada)


    También puedo ayudarte con: **conexionado de sensores S/3 o S/10**, **configuración
    de salidas OUT1/OUT2** o **procedimiento de rearme** de la CS4.'
