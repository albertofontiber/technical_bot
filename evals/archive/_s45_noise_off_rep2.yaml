    pulsadores. Es incompleto e impreciso frente al procedimiento oficial: omite varios
    pasos/parámetros clave, concreta indebidamente una salida como ''Circuito Sirena
    1'' y añade un segundo método de coincidencia a nivel de sistema que puede confundir
    respecto a la programación solicitada.'
  bot_sources:
  - MADT190_07
  - MADT190_14
  - MCDT190
  bot_answer: "# Programación de coincidencia de dos detectores para activar sirena\
    \ — ID3000\n\nHay **dos métodos** disponibles en la ID3000 para implementar la\
    \ coincidencia de dos detectores. Te explico ambos:\n\n---\n\n## MÉTODO 1 — Coincidencia\
    \ en la Matriz de Control (versiones anteriores)\n\nEste método comprueba la coincidencia\
    \ **después** de que el sistema haya entrado en estado de alarma [F3].\n\n###\
    \ Pasos:\n\n1. **Accede a la Matriz de Control** y edita el evento de entrada\
    \ correspondiente.\n\n2. En la pantalla \"Edición Evento de Entrada en la Matriz\
    \ de Control\", configura:\n   - **Categoría:** ALARMA [F2]\n   - **Evento:**\
    \ ALARMA [F2]\n   - Activa la casilla **\"Indicar Evento de Equipo\"** [F2]\n\
    \   - **Tipo de Equipo:** selecciona el tipo analógico (ANALÓGICO incluye detectores\
    \ TÉRMICOS, IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR) [F1]\n\n3. En el campo de zona,\
    \ selecciona **\"Zona(s) Determinada\"** con el rango de la zona que quieres supervisar\
    \ [F2].\n\n4. Activa la casilla **\"Coincidencia de 2 Equipos\"** [F2][F4].\n\n\
    5. En el evento de salida, configura la acción como **\"Activar\"** sobre la **\"\
    Función Especial: Circuito Sirena 1\"** [F5].\n\n### ⚠️ Advertencia importante\
    \ (EN54-2: 7.1.4):\n> **No incluyas pulsadores manuales (MCP) en el grupo de coincidencia**\
    \ [F1].\n\nSi en la zona hay pulsadores manuales, debes programar **dos instrucciones**\
    \ en la Matriz de Control [F1]:\n- **Instrucción 1:** Entrada tipo **'Pulsador\
    \ Manual' (MCP)** → configurada como **'Simple'** (sin coincidencia) [F1].\n-\
    \ **Instrucción 2:** Entrada tipo **'ANALÓGICA'** → con coincidencia activada\
    \ [F1].\n\n---\n\n## MÉTODO 2 — Coincidencia de equipos a nivel de sistema (software\
    \ v4.63+)\n\nEste método es más avanzado: la central **no entra en alarma** hasta\
    \ que se cumple la coincidencia. Mientras tanto, el sistema queda en estado de\
    \ **PREALARMA / PRIMERA ALARMA** [F3].\n\nLos niveles disponibles relevantes para\
    \ tu caso son [F3]:\n- **Nivel 2:** Dos o más sensores *en la misma zona*.\n-\
    \ **Nivel 4:** Dos o más sensores *en la misma zona o zonas diferentes, en la\
    \ misma central*.\n\n### Limitaciones a tener en cuenta [F3]:\n- **Solo aplica\
    \ a sensores**, no a módulos de entrada (los módulos siempre activan alarma inmediata).\n\
    - No se pueden configurar coincidencias de más de dos equipos ni combinaciones\
    \ de diferentes tipos de equipo en esta versión.\n- La opción por defecto es **Nivel\
    \ 1 (sin coincidencia)**.\n\n---\n\n## Diferencia clave entre ambos métodos\n\n\
    - **Método 1 (Matriz):** El sistema entra en alarma con el primer detector; la\
    \ salida de sirena espera la coincidencia [F3].\n- **Método 2 (Coincidencia de\
    \ sistema):** El sistema permanece en PREALARMA hasta que se cumple la coincidencia;\
    \ solo entonces entra en alarma y activa la sirena [F3].\n\n---\n\nTambién puedo\
    \ ayudarte con: **configuración del retardo de sirenas**, **programación de subzonas**\
    \ o **gestión de pulsadores manuales fuera del grupo de coincidencia**.\n\nFuentes:\
    \ MCDT190 (sin revisión registrada); MADT190_07 (14-12-05); MADT190_14 — Anexo\
    \ ID3000 versión de software 4.63 (sin revisión registrada)"
