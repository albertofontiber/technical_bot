  bot_answer: '## Conexión de baterías en la CAD-150 (CAD-150-8)


    ### Procedimiento de conexión


    1. **Conecta el cable puente entre las dos baterías** antes de cualquier otra
    conexión [F1]. Este paso es previo e imprescindible.


    2. **Conecta los cables del circuito** (rojo → positivo, negro → negativo) al
    conjunto de baterías ya unidas con el puente [F1].


    3. El conector de batería en la PCB Base está identificado como **conector 11
    (Conector Batería)**, protegido por el **fusible 10 (Fusible Baterías, 5A)** [F2][F3].


    ### Verificación previa a la puesta en marcha


    - Antes de conectar, comprueba con voltímetro que **las baterías tienen una tensión
    superior a 24V** [F4].


    ### Orden correcto de alimentación


    1. Primero conectar la **alimentación de red** activando el magnetotérmico bipolar.

    2. Después conectar las **baterías** [F4].


    > ⚠️ Si se arranca el equipo **solo con baterías** (sin red), es imprescindible
    pulsar el pulsador **BAT (tecla 9 en PCB Base)** para arrancar el equipo [F4].


    ---


    **Fuente:** 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB
    IT (sin revisión registrada)


