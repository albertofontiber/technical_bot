  bot_sources:
  - 33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores
  - 33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores
  bot_answer: '## Test anual del detector VESDA-E VEP


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido** del manual, las tareas
    que deben realizarse **una vez al año** son las siguientes [F1] [F2]:


    - **Realizar una prueba de humos** para comprobar la integridad de la red de Tubería

    - **Comprobar el flujo** de la red de Tubería

    - **Limpiar los puntos de muestreo**

    - **Limpiar con agua la red de Tubería**


    ---


    ### Consideraciones previas obligatorias antes de realizar el test [F1] [F2]:


    1. **Informar a la autoridad supervisora adecuada** antes de comenzar.

    2. **Aislar los dispositivos existentes** que dependan del detector antes de ponerlo
    en funcionamiento.

    3. Seguir los **procedimientos del sitio para evitar falsas alarmas** en los servicios
    supervisados durante la prueba de humos.


    > ⚠️ **Precaución:** Cuando el detector está deshabilitado o en espera, **no emitirá
    advertencias de fuego**.


    ---


    ### Sobre la prueba de humos:


    El procedimiento consiste en introducir una muestra de humo en el **orificio de
    muestreo más alejado** y medir el tiempo que tarda el humo en llegar al detector
    [F3]. Los resultados deben registrarse y compararse con pruebas posteriores para
    detectar variaciones del sistema [F3].


    Para el procedimiento detallado paso a paso de la prueba de humos, el manual remite
    a la **VESDA-E Commissioning Guide** (Guía de puesta en marcha de VESDA-E) [F3].


    ---


    ### Nota sobre frecuencias adicionales:


    Recuerda que hay tareas con otras periodicidades que también deben estar al día
    [F1] [F2]:

    - **Cada 3 meses:** Fuente de alimentación y batería

    - **Cada 6 meses:** Comprobar la red de tubería

    - **Cada 2 años:** Sustitución del filtro


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de puesta en espera del detector**,
    **sustitución del filtro cada 2 años** o **comprobación del flujo de tubería**.'
