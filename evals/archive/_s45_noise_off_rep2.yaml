- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en que el retardo se programa mediante reglas de causa-efecto
    y menciona los tipos/comportamiento del retardo, pero no da el procedimiento clave
    de programación: acceder a Causa y Efecto, borrar la Regla 1 por defecto, crear
    regla con entrada/salida y asignar el retardo. Además afirma que hay 6 tipos pero
    enumera 7, lo que introduce una inconsistencia.'
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    La configuración del retardo de salida de alarma en la PEARL se realiza a través
    de las **reglas de causa-efecto**. Aquí tienes el proceso completo:


    ---


    ### 1. Concepto general


    El retardo se configura dentro de una o más reglas de la **matriz de causa-efecto**
    [F1]. Cuando hay una o más reglas con retardo antes de la activación de equipos
    de salida, el **tipo de retardo seleccionado** determina qué acciones podrán realizarse
    mientras el retardo esté activo [F1].


    ---


    ### 2. Tipos de retardo disponibles


    Hay **6 tipos de retardo de salida** asignables a una regla [F1]:


    - **Fijo**: No permite silenciar, no muestra cuenta atrás, no puede anularse ni
    detenerse [F2].

    - **Estándar**: Permite silenciar con SILENCIAR SIRENAS, anular en nivel 2, mostrar
    tiempo restante en pestaña ALARMA, y detener con FIN RETARDO [F2].

    - **No Silenc.**: No se detiene con SILENCIAR SIRENAS, pero sí permite anular
    en nivel 2, muestra tiempo restante y permite FIN RETARDO [F2].

    - **Est. Ext.**: Igual que Estándar, y además se detiene al pulsar AMPLIAR RETARDO
    [F2].

    - **RetExtStd**: Igual que Estándar, y además inicia el temporizador de RETARDO
    AMPLIADO [F2].

    - **No Sil. Ext**: No se detiene con SILENCIAR SIRENAS, se detiene con AMPLIAR
    RETARDO, permite anular en nivel 2 y FIN RETARDO [F2].

    - **SinRetExt**: No se detiene con SILENCIAR SIRENAS ni AMPLIAR RETARDO, pero
    inicia temporizador de RETARDO AMPLIADO y permite anular en nivel 2 [F2].


    ---


    ### 3. Funcionamiento operativo del retardo


    Una vez configurado, el retardo funciona así [F4]:


    1. Se detecta una condición de alarma → se inicia el **primer temporizador**.

    2. El operador (con llave, nivel de acceso 2) puede pulsar **AMPLIAR RETARDO**
    para iniciar un segundo temporizador (normalmente más largo), que anula al primero.

    3. En cualquier momento, pulsar **FIN RETARDO** (nivel de acceso 1) termina el
    retardo y activa la condición de alarma completa.


    El **LED de RETARDO ACTIVO** se enciende cuando hay un retardo en curso [F3].


    ---


    ### 4. Anular/Habilitar el retardo desde el panel


    Si necesitas activar o desactivar el retardo en operación [F3]:


    1. Accede al **Menú Anular/Habilitar**.

    2. Selecciona **«5: Retardo Activación Salidas»**.

    3. Pulsa **✓** para cambiar el estado (habilitado ↔ anulado).

    4. Pulsa **✕** para salir.


    > ⚠️ Esta opción solo está disponible si se han configurado retardos en las reglas
    de causa-efecto [F3].


    ---


    ### 5. Opción: Habilitar/Deshabilitar el pulsador AMPLIAR RETARDO


    Desde los parámetros de la central, el parámetro **«10: Extend Delay Button»**
    permite habilitar o deshabilitar el pulsador AMPLIAR RETARDO, ya que esta función
    no se requiere en algunos mercados [F5].


    Ruta: **Editar Parámetros de la Central → opción 10: Extend Delay Button** [F5].


    ---


    > **Nota importante**: Los fragmentos disponibles describen los tipos de retardo
    y su comportamiento operativo, pero **no detallan el procedimiento paso a paso
    para crear/editar una regla de causa-efecto con retardo** (valores numéricos de
    tiempo, pantallas de edición de la regla, etc.). Para eso, consulta el Apéndice
    5 completo del manual de configuración.


    ---


    **Fuentes:**

    - 997-671-005-3\_Configuration\_ES (sin revisión registrada) — Apéndice 5 y Apéndice
    1

    - 997-670-005-3\_Operating\_ES (sin revisión registrada) — Secciones 2.1.4 y 5.1.4


    ---


    También puedo ayudarte con: **borrar una regla de causa-efecto**, **configurar
    coincidencia de alarma** o **gestión de niveles de acceso en la PEARL**.'
- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: FALLO
  diagnostico: Aunque acierta en la RFL 6K8, 0,5 W, límite de 1 A y uso de diodo/polaridad,
    da una instrucción crítica incorrecta al indicar conectar las sirenas en serie;
    en estos circuitos deben conectarse respetando +/- en la línea con la RFL al final.
    Además confunde la ZXe ZX2e/ZX5e con ZXAE/ZXEE y cita terminales/modelos no correspondientes
    como base de la respuesta.
  bot_sources:
  - MIE-MI-310
  - MIE-MP-310
  bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe (ZXAE/ZXEE)


    ## Identificación de terminales


    Según el manual de instalación [F2]:


    - **ZXAE**: dispone de **2 salidas supervisadas** (Salida A y Salida B) en terminales
    **TB7: S,A+ / S,A- / S,B+** [F2]

    - **ZXEE**: dispone de **4 salidas supervisadas** (Salida A, B, C y D) en terminales
    **TB7: S,A+ / S,A- / S,B+ / S,C+ / S,D+ / S,D-** [F2]


    ---


    ## Procedimiento de conexionado


    1. **Conecta las sirenas en serie** (en línea directa), respetando la polaridad:
    terminal **+** de la salida al **+** de la primera sirena, el **-** de esa sirena
    al **+** de la siguiente, y así sucesivamente [F1].


    2. **Instala la Resistencia Final de Línea (RFL) de 6.800 Ω (6K8), mínimo 0,5
    W**, entre el **+** y el **-** de la última sirena de la línea [F2].


    3. **Si no hay sirenas instaladas** en una salida, conecta igualmente la RFL directamente
    en los terminales de esa salida en la central [F2].


    4. **Para campanas sin polaridad**: instala un **diodo** entre el terminal **+**
    de la salida y uno de los terminales de alimentación de la campana. Esto es obligatorio
    para evitar consumos durante la supervisión, ya que las bobinas de estas campanas
    no tienen polaridad [F2].


    ---


    ## Restricciones críticas


    - ⚠️ **No realizar ramales (derivaciones paralelas)** en el cableado de sirenas.
    La supervisión se realiza en la línea directa hasta la RFL; los ramales paralelos
    no podrán ser supervisados [F1].

    - ⚠️ **Corriente máxima por circuito: 1 A**. Verifica que el consumo total de
    sirenas por salida no supera este valor, y que el consumo total de la central
    no se excede con todas las sirenas activadas [F2].

    - ⚠️ **Sección mínima de cable: 1,5 mm²**. Longitudes excesivas pueden provocar
    caídas de tensión importantes en la línea [F2].


    ---


    ## Principio de supervisión


    La supervisión se realiza con una **corriente inversa** que lee la RFL. Al activarse
    la salida, la corriente circula en sentido normal con la polaridad indicada en
    los terminales. En reposo, la pequeña tensión de supervisión tiene **polaridad
    inversa** a la de activación [F2].


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)


    También puedo ayudarte con: **cálculo de consumo de baterías con sirenas**, **configuración
    del tipo de disparo de sirenas** o **conexionado de módulos de relé supervisado**
    en la ZXAE/ZXEE.'
