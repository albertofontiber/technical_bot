  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en las salidas de relé NC-C-NA, las dos salidas de sirena
    supervisadas con RFL de 47 kΩ y las corrientes/tensiones máximas de los contactos.
    Queda incompleto/impreciso en el relé de avería: no afirma claramente que es failsafe
    y que señaliza también por corte de alimentación, omite que la avería no queda
    enclavada y falta la vida útil mínima de 10^5 operaciones.'
  bot_sources:
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés de alarma


    El FAAST LT-200 dispone de **2 relés de alarma** (uno por canal), cada uno con
    contacto **NC, C (común) y NA** [F4]:


    - Terminal 5: Relé de alarma NC — Canal 1

    - Terminal 6: Relé de alarma C — Canal 1

    - Terminal 7: Relé de alarma NA — Canal 1

    - Terminal 8: Relé de alarma NC — Canal 2

    - Terminal 9: Relé de alarma C — Canal 2

    - Terminal 10: Relé de alarma NA — Canal 2


    > Los terminales CH2 (canal 2) solo están disponibles en modelos de 2 canales
    [F4].


    ---


    ### Relés de avería


    Dispone de **2 relés de avería** (uno principal y uno auxiliar), también con contacto
    **NC, C y NA** [F4]:


    - Terminal 11: Relé de avería NC — Canal 1

    - Terminal 12: Relé de avería C — Canal 1

    - Terminal 13: Relé de avería NA — Canal 1

    - Terminal 14: Relé de avería NC (AUX.) — Canal 2

    - Terminal 15: Relé de avería C (AUX.) — Canal 2

    - Terminal 16: Relé de avería NA (AUX.) — Canal 2


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Al abrir la puerta de la caja durante el funcionamiento normal, la unidad entra
    en modo de servicio: **el relé de fallo indica una avería** [F3]. Esto implica
    que el relé de avería es de tipo **energizado en reposo** (se activa/indica avería
    cuando la unidad pierde alimentación o detecta un fallo), aunque el fragmento
    no describe explícitamente el comportamiento ante corte total de alimentación
    más allá del modo de servicio. El manual no especifica en los fragmentos disponibles
    el estado de los contactos NC/NA ante un corte de alimentación externo.


    ---


    ### Salidas de sirena


    Hay **2 salidas de sirena supervisadas** [F4]:


    - Terminal 17: Salida sirena 1 (–)

    - Terminal 18: Salida sirena 1 (+)

    - Terminal 19: Salida sirena 2 (–)

    - Terminal 20: Salida sirena 2 (+)


    **Resistencia de fin de línea: 47 kΩ** en cada salida de sirena [F4].


    > Nota: Esta información de terminales y resistencias de fin de línea proviene
    del manual del **FAAST LT** (versión Morley Loop) [F4], no del manual específico
    del LT-200 autónomo. Verifica que el conexionado coincide con tu modelo exacto.


    ---


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC**

    - **0,5 A a 30 V CA**


    [F1]


    ---


    **Fuentes:**

    - I56-6574-005\_ES - HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-3956-201\_ES Morley Loop FAAST LT QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **instalación del cableado de alimentación**, **configuración
    de la entrada configurable (rearme)** o **pruebas funcionales** del FAAST LT-200.'
