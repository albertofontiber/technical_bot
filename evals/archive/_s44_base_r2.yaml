    - La entrada debe estar especificada como **''ZONA''**, **''SUBZONA''** o **''CUALQUIERA''**.
    Esta función **no aplica** si la entrada es un equipo individual o una tecla [F1].

    - ⚠️ **ATENCIÓN (EN54-2: 7.1.4):** No incluyas pulsadores manuales (MCP) en el
    grupo de coincidencia [F1].


    ---


    ### Pasos para programar la coincidencia


    **Si la zona incluye pulsadores manuales**, debes crear **dos instrucciones**
    en la Matriz de Control [F1]:


    1. **Primera instrucción:** Define la entrada de tipo **''Pulsador Manual'' (MCP)**
    como **''Simple''** (sin coincidencia).

    2. **Segunda instrucción:** Define el tipo de entrada al que se aplicará la coincidencia
    (por ejemplo, **''ANALÓGICA''**). El grupo ANALÓGICO incluye detectores **TÉRMICOS,
    IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR** [F1].


    **Si la zona solo tiene detectores** (sin MCP), basta con una sola instrucción
    en la Matriz de Control.


    ---


    ### Activar la coincidencia en la instrucción


    En la pantalla de edición del evento de entrada de la Matriz de Control [F2]:


    1. En el campo de entrada, selecciona **''Zona(s) Determinada''** e indica el
    número de zona (por ejemplo, De: **10** a: **10**).

    2. Localiza la opción **"Coincidencia de 2 Zonas"** o **"Coincidencia de Equipos"**
    según corresponda.

    3. Pulsa la **barra ESPACIADORA** para cambiar el valor de **NO** a **SÍ** en
    la columna de coincidencia [F1].


    Con esto activado, la salida de sirena **solo se activará cuando dos equipos de
    esa zona hayan generado alarma** [F1].


    ---


    ### Nota para sistemas en red


    - Si en la columna **''CENTRAL''** aparece **''CLQ''**, la coincidencia se aplica
    a dos eventos de **toda la red** [F1].

    - Si se indica una central específica (maestra o esclava), puedes designar el
    panel entero o un número de zona, pero **no un número de subzona** [F1].


    ---


    Fuente: MCDT190 (sin revisión registrada); MADT190_07 (sin revisión registrada)


