  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: '## Alarma intermitente de flujo bajo en ASD535 — Diagnóstico


    Los fragmentos recuperados **no contienen la sección específica de diagnóstico
    de fallos de flujo bajo** (esa información estaría en la sección 10.3 "Detección
    y subsanación de errores" [F1], que no ha sido recuperada en estos fragmentos).


    Lo que sí puedo confirmar a partir de los fragmentos disponibles:


    ### Lo que el manual describe sobre la monitorización de flujo


    El ASD535 incorpora un **sistema de monitorización del flujo de aire** que detecta
    en cada tubería las obstrucciones y roturas que puedan producirse en el conducto
    de aspiración [F3]. Este sistema es independiente por tubería.


    ### Causas posibles según lo descrito en los fragmentos


    A partir de la información de instalación disponible, los fragmentos mencionan
    factores que pueden afectar al flujo:


    - **Orificios de aspiración con rebabas o mal perforados**: el manual indica que
    los orificios deben taladrase limpiamente, sin rebabas ni marcas de presión, y
    que un silbido durante la perforación indica que no se está realizando correctamente
    [F4]. Orificios defectuosos pueden alterar el caudal.

    - **Obstrucción o rotura en el conducto de aspiración**: el sistema de monitorización
    detecta específicamente estos dos tipos de anomalías [F3].


    ### Pasos de diagnóstico recomendados por el manual


    El manual indica que el restablecimiento del evento solo se producirá **cuando
    el evento que produjo el disparo ya no esté presente** [F2]. Por tanto:


    1. Consulta la **sección 10.3 "Detección y subsanación de errores"** del manual
    físico [F1] — es la sección específica para este tipo de fallo.

    2. Revisa visualmente los conductos de aspiración en busca de obstrucciones, roturas
    o desconexiones.

    3. Comprueba el estado de los orificios de aspiración (rebabas, obstrucciones,
    diámetros incorrectos) [F4].

    4. Verifica el estado del ventilador de aspiración — el manual contempla su sustitución
    en la sección 9.4.2 [F1], lo que indica que es un componente susceptible de fallo.

    5. Comprueba el **sensor de flujo de aire** — el manual contempla su sustitución
    en la sección 9.4.3 [F1].


    ---


    ⚠️ **Para el diagnóstico completo con códigos de evento específicos**, necesitas
    consultar las secciones **8.5.3 (Visualización y lectura de la memoria de eventos)**
    y **10.3 (Detección y subsanación de errores)** del manual físico [F1], que contienen
    los códigos de fallo y sus causas exactas — esos fragmentos no han sido recuperados
    en esta consulta.


    ---


    **Fuente:** ASD535 Descripción técnica, T 131 192 h es (sin revisión registrada)


    ---


    También puedo ayudarte con: **sustitución del sensor de flujo de aire (sección
    9.4.3)**, **lectura de la memoria de eventos (sección 8.5.3)** o **restablecimiento
    del equipo tras subsanar el fallo**.'
