    \ instrucciones en las que se muestran las interconexiones adecuadas para cada\
    \ aplicación.\"* [F1]\n\nConsulta las **instrucciones específicas del módulo de\
    \ aislamiento** suministradas con el equipo para el conexionado físico exacto.\n\
    \n---\n\nFuente: Panel ID2000 - Manual de instalación y puesta en marcha, MI-DT-180,\
