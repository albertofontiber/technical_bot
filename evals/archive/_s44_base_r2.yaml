- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en lo esencial: la CCD-103 es convencional y no permite anular
    un detector individual desde la central, solo zonas completas, e incluye el procedimiento
    de anulación por zona. Sin embargo añade una sugerencia especulativa de puente
    físico en bornes no contemplada por el manual y potencialmente peligrosa/incorrecta,
    por lo que no es plenamente aceptable.'
  bot_sources:
  - CCD-103_Manual_ES_FR_GB_IT
  bot_answer: '## Desactivación de detector individual en CCD-103


    La CCD-103 es una central **convencional** [F3], lo que significa que la desactivación
    opera a nivel de **zona completa**, no de detector individual.


    El manual no describe ningún procedimiento para desactivar un detector de forma
    individual sin afectar al resto del lazo. Los fragmentos disponibles solo cubren:


    - **Desconexión por zona completa** mediante las teclas de zona (A) [F1]: primera
    pulsación → modo prueba, segunda pulsación → modo desconexión de toda la zona.

    - **Conexionado en serie** de detectores dentro de cada zona [F2][F3]: todos los
    detectores de una zona comparten el mismo par de hilos, con resistencia de final
    de línea de **4K7 Ω** al final del ramal.


    ### Lo que sí puedes hacer a nivel de zona:


    1. Asegúrate de que la **llave de bloqueo de teclado (G)** esté en posición **abierta**
    [F1].

    2. Pulsa la **tecla de zona (A)** correspondiente una vez → la zona entra en **modo
    prueba** [F1].

    3. Pulsa de nuevo la **tecla de zona (A)** → la zona entra en **modo desconexión**
    [F1].

    4. Se activará el **indicador de anular** y el **indicador de fallo/anular/prueba**
    de esa zona [F1].


    ### Para aislar físicamente un detector concreto sin desconectar la zona:


    El manual no especifica este procedimiento. Dado que el cableado es en serie [F2][F3],
    la única forma de retirar un detector sin generar avería en la zona sería mediante
    un **puente físico en sus bornes** (cortocircuitar contacto 1 con contacto 3/4
    del detector a retirar), pero **este procedimiento no está descrito en los fragmentos
    disponibles**. Consulta directamente al soporte técnico de Detnov antes de actuar.


    ---


    **Fuente:** CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    ---


    También puedo ayudarte con: **interpretación de indicadores de avería de zona**,
    **procedimiento de reset tras alarma** o **conexionado de la resistencia de final
    de línea 4K7**.'
