    \ esquema de conexionado físico (terminales, polaridad, cableado) del módulo de\
    \ aislamiento de línea. Lo que sí está documentado son los **requisitos de instalación\
    \ y posicionamiento** que debes respetar.\n\n---\n\n### Requisitos de instalación\
    \ de aisladores — norma EN54-2: 12.5.2\n\n1. **Los aisladores son obligatorios\
    \ en cada lazo analógico** para separar sensores y pulsadores manuales, incluyendo\
    \ lazos con detectores de zona convencional y/o pulsadores [F1].\n\n2. **Máximo\
    \ de equipos entre aisladores:**\n   - **25 equipos de lazo** entre aisladores\
    \ (límite ID2000) [F1]\n   - **20 equipos de lazo** si se utilizan **aisladores\
    \ tipo FET** [F1]\n   - La norma EN54-2 permite hasta 32, pero la ID2000 impone\
    \ el límite más restrictivo indicado arriba [F1]\n\n3. **Comprobaciones de continuidad\
    \ del lazo** deben realizarse **antes de conectar los aisladores** [F1].\n\n4.\
    \ **No utilices nunca un multímetro de alta tensión (tipo \"Megger\") en el lazo**\
    \ una vez conectados los componentes. Usa únicamente multímetros de baja tensión\
    \ [F1].\n\n---\n\n### Comportamiento ante cortocircuito (para verificar la instalación)\n\
    \n- Si se produce un cortocircuito entre dos aisladores, el sistema lo señaliza\
    \ como **\"Posible corte\"** [F2].\n- Los equipos entre los puntos de aislamiento\
    \ aparecerán como **NO RESPONDE / PERDIDO** o **PÉRDIDA PARCIAL DEL LAZO** si\
    \ faltan más de tres equipos [F2].\n\n---\n\n### ⚠️ Información no disponible\
    \ en los fragmentos\n\nEl **esquema de conexionado físico** del módulo de aislamiento\
