  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en que el retardo de salidas se configura mediante Causa-Efecto
    y da la ruta general, además de distinguir la anulación/habilitación del retardo.
    Pero queda incompleto frente a la referencia: no explica las reglas por defecto
    ni la necesidad de borrar la Regla 1, no menciona los seis tipos de retardo ni
    su comportamiento, y afirma que no puede detallar los pasos exactos aunque la
    información existe en el apéndice.'
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    Los fragmentos disponibles cubren **dos aspectos distintos** relacionados con
    los retardos. Te explico ambos:


    ---


    ### 1. Anular / Habilitar un retardo ya configurado (operación en campo)


    Este procedimiento permite activar o desactivar un retardo que **ya ha sido programado
    previamente** en las reglas de causa-efecto [F1]:


    1. Accede al **Menú Anular/Habilitar** [F1].

    2. Selecciona la opción **«5: Retardo Activación Salidas»** [F1].

    3. Pulsa **✓** para cambiar el estado entre HABILITADO y ANULADO [F1].

    4. Pulsa **✕** para salir en cualquier momento [F1].


    > ⚠️ Esta opción **solo está disponible si se han configurado retardos** como
    parte de una o más reglas de causa-efecto. Si hay algún retardo activo, el **LED
    de RETARDO ACTIVO** estará encendido [F1].


    ---


    ### 2. Configuración del retardo (programación de nivel 3)


    El retardo de activación de salidas se **define dentro de las reglas de Causa-Efecto**,
    accesibles desde el menú de configuración de nivel 3 [F4]:


    **Ruta de acceso:**


    1. Entra en nivel de acceso **L3** [F4].

    2. Accede a **«Editar Configuración»** → **«8: Causa y Efecto»** [F5].

    3. Ahí se programan las reglas donde se puede incluir el retardo de activación
    de salidas.


    > El detalle completo de la programación de causa-efecto se encuentra en el **Apéndice
    5. Programación de causa-efecto** del manual de configuración [F5]. Los fragmentos
    disponibles no incluyen el contenido de ese apéndice, por lo que no puedo detallarte
    los pasos exactos de configuración del valor del retardo.


    ---


    ### 3. Opción adicional: botón «Extender Retardo»


    Existe también el parámetro **«10: Extend Delay Button»** en el Menú de Configuración
    de la Central, que permite habilitar o deshabilitar el pulsador físico de extensión
    de retardo [F2]. En el ejemplo del manual aparece como **Enabled** [F2].


    ---


    **Resumen práctico:**

    - Para **ver/cambiar si el retardo está activo o anulado** → Menú Anular/Habilitar
    → opción 5 [F1].

    - Para **programar el valor del retardo** → nivel L3 → Causa y Efecto → Apéndice
    5 del manual [F4][F5].


    ---


    Fuente: 997-670-005-3_Operating_ES (sin revisión registrada); 997-671-005-3_Configuration_ES
    (sin revisión registrada)


    ---


    También puedo ayudarte con: **programación de zonas y opciones de zona**, **configuración
    de reglas de causa-efecto** o **gestión de acceso de usuario (niveles 1/2/3)**
    en la PEARL.'
