  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés de alarma


    El equipo dispone de **2 relés de alarma** (uno por canal), cada uno con contacto
    **NC, C (común) y NA** [F2]:


    - Terminales **5 (NC), 6 (C), 7 (NA)** → Relé de alarma Canal 1 [F2]

    - Terminales **8 (NC), 9 (C), 10 (NA)** → Relé de alarma Canal 2 (solo en modelos
    de 2 canales) [F2]


    ### Relés de avería


    El equipo dispone de **2 relés de avería**, cada uno con contacto **NC, C (común)
    y NA** [F2]:


    - Terminales **11 (NC), 12 (C), 13 (NA)** → Relé de avería Canal 1 [F2]

    - Terminales **14 (NC AUX.), 15 (C AUX.), 16 (NA AUX.)** → Relé de avería Canal
    2 / Auxiliar (solo en modelos de 2 canales) [F2]


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Los fragmentos disponibles no describen explícitamente el comportamiento del relé
    de avería (energizado/desenergizado en reposo, o cómo reacciona ante corte de
    alimentación). Lo que sí se indica es que el indicador **FALLO DE ALIMENTACIÓN**
    muestra alerta de baja tensión/sobretensión con LED amarillo fijo [F3], y que
    existe un retardo de avería de alimentación con **1 parpadeo amarillo** con valor
    predeterminado de **60 s** [F3]. Sin embargo, el comportamiento específico del
    contacto de relé (NC/NA) ante pérdida total de alimentación no está especificado
    en los fragmentos recuperados. Consulta el manual completo para este detalle.


    ### Salidas de sirena


    El equipo dispone de **2 salidas de sirena supervisadas** [F2]:


    - Terminales **17 (−) y 18 (+)** → Salida sirena 1, con **resistencia de fin de
    línea de 47 kΩ** [F2]

    - Terminales **19 (−) y 20 (+)** → Salida sirena 2, con **resistencia de fin de
    línea de 47 kΩ** [F2]


    > ⚠️ El indicador **SIRENA** con 1 parpadeo amarillo indica fallo de sirena. La
    acción recomendada es comprobar el elemento de fin de línea y el circuito de la
    sirena [F3].


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC** [F1]

    - **0,5 A a 30 V CA** [F1]


    ---


    **Fuentes:**

    - Fuente 1: I56-6574-005_ES - HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - Fuente 2: I56-3956-201_ES Morley Loop FAAST LT QIG (sin revisión registrada)


