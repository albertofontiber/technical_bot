  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta la capacidad Opal de 318 por lazo y el límite EN54 de 512,
    y menciona autoconfiguración/edición, pero omite datos clave: 1/2 lazos, 99+99
    en CLIP, 0,75 A, el límite PEARL de 25 equipos entre aisladores y la restricción
    de 40 CLIP en lazos mixtos. La parte de alta/edición queda demasiado genérica
    y no recoge los modos de autoconfiguración ni los campos editables principales.'
  bot_sources:
  - 997-669-005-3_Instal-Comm_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '# Notifier PEARL — Capacidad de lazo SLC, aisladores y alta/edición
    de equipos


    ---


    ## 1. Capacidad máxima del lazo SLC


    - **Máximo 318 equipos por lazo analógico**: hasta **159 sensores** y **159 módulos**
    [F1]

    - **Máximo 512 sensores y/o pulsadores manuales por sistema** (sumando ambos lazos,
    incluidos detectores de zona convencionales conectados), para cumplir **EN54-2:
    13-7** [F1]


    ---


    ## 2. Requisitos de aisladores (EN54-2: 12.5.2)


    La norma exige un máximo de **32 equipos entre aisladores** [F1], pero la Pearl
    impone condiciones más restrictivas según el tipo de equipo:


    **Equipos SIN aisladores internos** (protocolo CLIP y algunos Opal):

    - Máximo **20 equipos entre aisladores** [F1]


    **Equipos CON aisladores internos** (usados con base **B501 AP**):

    - El lazo cumple directamente los requisitos de **EN54-2** [F1]

    - La mayoría de equipos Opal incorporan aisladores FET internos; con bases compatibles
    Opal, el aislador se conecta a los terminales **+2 y +4** en el extremo positivo
    [F1]


    > ⚠️ **Importante**: Para que los aisladores del lazo se cierren al aplicar alimentación,
    la carga entre aisladores no debe superar **20 SU** [F2]. Cada equipo CLIP tiene
    una carga asignada:

    > - Detector por rayo LPB-700: **6 SU** [F2]

    > - Sirenas de lazo: **3 SU** [F2]

    > - Módulo ZMX-1: **3 SU** [F2]

    > - Módulo MMX-10M/CMX10-RM: **10 SU** [F2]

    > - El resto: **1 SU** [F2]


    > ⚠️ **Advertencia de cableado**: NUNCA uses multímetro de alta tensión (tipo
    Megger) en el lazo. Si hay aisladores instalados, el conductor positivo (+) del
    lazo estará en circuito abierto [F1].


    ---


    ## 3. Alta y edición de equipos desde la central


    ### 3.1 Acceso al nivel de configuración (Nivel 3)


    Hay dos métodos [F5]:


    **Método 1 — Por teclado:**

    1. Pulsa para mostrar la pantalla de introducción de clave de nivel 2/3 [F5]

    2. Selecciona **«Conf/Mant.Ingeniero»** y pulsa **✓** [F5]

    3. Introduce la clave de nivel 3 (aparecen asteriscos); usa **«C»** para borrar
    si te equivocas [F5]

    4. Pulsa **✓** → aparece la pestaña **MENÚ**; pulsa de nuevo para mostrar la pestaña
    **CONFIG** [F5]


    **Método 2 — Por llave:**

    1. Gira la llave de acceso de usuario **90° en sentido horario** [F5]

    2. En el Menú Principal, selecciona **«5: Pestaña Configuración»** y pulsa **✓**
    [F5]

    3. Introduce la clave de nivel 3 y pulsa **✓** → se muestran las pestañas **MENÚ**
    y **CONFIG** [F5]


    ### 3.2 Dar de alta equipos (Autoconfiguración)


    Desde el **Menú de Configuración de Central → L2 Editar Configuración → Equipos
    de lazo → Autoconfigurar** [F4]


    - El manual remite a la **sección «4 Equipos de lazo»** del manual de configuración
    para el procedimiento completo de autoconfiguración [F3]

    - También desde ese menú puedes ejecutar **«Inicializar equipos de protocolo OPAL»**
    [F4]


    ### 3.3 Editar equipos existentes


    Desde **Equipos de lazo → Editar equipos** [F4], que permite [F3]:

    - **Mover un equipo a otra zona** → sección **«4.2 Edición de equipos»** [F3]

    - **Añadir o borrar un equipo de lazo** → sección **«4.2 Edición de equipos»**
    [F3]

    - **Editar el texto del equipo** → sección **«5.2 Edición de texto»** [F3]

    - Ver el **Resumen del equipo** [F4]

    - Configurar **Perfiles Interface Gas** [F4]


    ---


    > 📋 **Nota**: El manual recomienda usar el **programa de cálculo de baterías y
    lazo** para validar la longitud y carga del lazo antes de la instalación definitiva
    [F2].


    ---


    **Fuentes:**

    - Manual de instalación y puesta en marcha PEARL, ref. **997-669-005-3_Instal-Comm_ES**
    (sin revisión registrada)

    - Manual de configuración de la central PEARL, ref. **997-671-005-3_Configuration_ES**
    (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento detallado de autoconfiguración del
    lazo (sección 4)**, **edición de texto de zona y equipo (sección 5.2)** o **cálculo
    de longitud máxima de lazo**.'
