    El manual de ciberseguridad de INSPIRE indica [F3]:

    - Garantiza la **seguridad física** de las contraseñas.

    - Usa combinación de **caracteres, números y letras minúsculas/mayúsculas** cuando
    sea aplicable.

    - Evita contraseñas fácilmente adivinables o frases comunes.

    - No uses **datos de identificación personal** (fechas, direcciones, etc.).


