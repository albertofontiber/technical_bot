  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: FALLO
  diagnostico: 'Aunque identifica de forma aproximada que puede existir una inhibición
    de rearme tras la extinción, describe mal el parámetro y sus valores por defecto,
    confunde la norma y alucina condiciones como la reposición física obligatoria.
    Además omite comprobaciones clave del manual: entrada ABORT enclavada, Flow Press,
    t.A, averías enclavadas, zonas aún en alarma y procedimiento correcto de rearme.'
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-TI-001I
  - MN-DT-959_OPC-RP1r
  - MNDT102
  bot_answer: '## RP1r – Sistema no vuelve a estado normal tras descarga de extinción


    El problema que describes está directamente relacionado con el parámetro **ri
    (Resumen inhibido tras extinción)**, que es el mecanismo que controla exactamente
    este comportamiento.


    ---


    ### ¿Qué está pasando?


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras una extinción
    realizada, el sistema **debe pasar a estado de sistema inhibido** antes de volver
    al estado normal. Esto es un comportamiento diseñado, no un fallo.


    El parámetro **ri** controla cuándo se produce ese "resumen inhibido" [F1]:


    - **Valor 00 (por defecto):** El resumen inhibido se activa desde que finaliza
    la extinción, o cuando se agota el tiempo configurado en el propio parámetro **ri**.

    - **Valores 01 a 30:** El resumen inhibido se activa tras intervención o reposición,
    con un retardo de **1 a 30 minutos**.


    ---


    ### Pasos a comprobar


    1. **Verifica el estado del sistema:** Comprueba si el panel está en estado "extinción
    realizada" o "sistema inhibido". El sistema no volverá a normal automáticamente
    hasta que se cumpla la condición configurada en **ri**.


    2. **Comprueba el valor del parámetro ri:** Accede a nivel 3 mediante el puente
    (jumper) de programación [F3]. Navega hasta el parámetro **ri** con la tecla **Teclado**
    y verifica el valor configurado [F3].


    3. **Intervención manual requerida:** Si **ri** está configurado entre 01 y 30,
    el sistema espera una **intervención o reposición física** (recarga del agente
    extintor, reposición de botellas) antes de salir del estado inhibido [F1].


    4. **Comprueba también fallo de sistema:** Si tras el reset aparece indicación
    de **FALLO DE SISTEMA**, es necesario realizar un **REARME** de la central [F2].
    Este fallo puede aparecer si al arrancar hay perturbaciones en la alimentación
    o las baterías.


    ---


    ### Resumen del flujo esperado tras extinción


    - Estado extinción realizada → **Estado inhibido** (según parámetro ri) → Reposición
    física del sistema extintor → **Rearme** → Estado normal.


    > ⚠️ El sistema **no volverá a estado normal** si no se ha realizado la reposición
    física del agente extintor y el rearme correspondiente. Esto es un requisito de
    la norma **UNE-EN 12094-1:2004** [F1].


    ---


    **Fuente:** HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr (sin revisión registrada);
    HLSI-BT-001 (sin revisión registrada); MNDT102 (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración del parámetro ri paso a paso**, **procedimiento
    de rearme nivel 3** o **diagnóstico de fallo de sistema en la RP1r**.'
