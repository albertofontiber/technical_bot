- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta la capacidad básica de 318 equipos por lazo y el límite EN54
    de 512, y menciona aisladores/base B501 AP y rutas generales de configuración.
    Pero omite datos clave: 1/2 lazos, carga 0,75 A, capacidad CLIP 99+99 frente a
    Opal 159+159, el límite PEARL de 25 equipos entre aisladores, la limitación de
    40 CLIP en lazo mixto y los detalles concretos de autoconfiguración/edición; además
    la respuesta queda truncada.'
  bot_sources:
  - 997-669-005-3_Instal-Comm_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '# Notifier PEARL — Capacidad de lazo SLC, aisladores y alta/edición
    de equipos


    ---


    ## 1. Capacidad máxima del lazo SLC


    - **Máximo 318 equipos por lazo analógico**: hasta **159 sensores** y **159 módulos**
    [F1]

    - **Máximo 512 sensores y/o pulsadores manuales por sistema** (sumando ambos lazos,
    incluidos detectores de zona convencionales y pulsadores conectados), para cumplir
    **EN54-2: 13-7** [F1]


    ---


    ## 2. Requisitos de aisladores (EN54-2: 12.5.2)


    **Regla general:** máximo **32 equipos entre aisladores** según EN54-2 [F1]


    Sin embargo, la Pearl impone condiciones más restrictivas según el tipo de equipo:


    - **Equipos SIN aisladores internos** (protocolo CLIP y algunos Opal): **NO más
    de 20 equipos entre aisladores** [F1]

    - **Equipos CON aisladores internos** (usados con base **B501 AP**): el lazo cumple
    directamente los requisitos de EN54-2 [F1]


    > ⚠️ **Nota importante sobre bases:** Los equipos con aislador interno requieren
    la base **B501 AP** (con conectores de cable de lazo de extremo positivo adicionales).
    Si se usan bases sin estos conectores, el equipo funciona pero el **aislador interno
    queda inutilizado** [F1].


    ### Regla adicional para arranque del lazo (protocolo CLIP)


    Para garantizar que los aisladores se cierren al aplicar alimentación, la **carga
    entre aisladores no debe superar 20 SU** [F2]. Cargas de referencia:


    - Detector por rayo LPB-700: **6 SU** [F2]

    - Sirenas de lazo: **3 SU** [F2]

    - Módulo ZMX-1: **3 SU** [F2]

    - Módulo MMX-10M/CMX10-RM: **10 SU** [F2]

    - Resto de equipos: **1 SU** [F2]


    > ⚠️ Si hay aisladores instalados, el conductor positivo (+) del lazo aparecerá
    como **circuito abierto** en la comprobación de continuidad. **Nunca usar multímetro
    de alta tensión (Megger) en el lazo** [F1].


    ---


    ## 3. Alta y edición de equipos desde la central


    ### Acceso al nivel de configuración (Nivel 3)


    Hay dos métodos [F5]:


    **Método 1 — Por clave:**

    1. Pulsa el botón para mostrar la pantalla de introducción de clave nivel 2/3
    [F5]

    2. Selecciona **«Conf/Mant.Ingeniero»** y pulsa **✓** [F5]

    3. Introduce la clave de nivel 3 (los caracteres aparecen como **\*\***) y pulsa
    **✓** [F5]

    4. Pulsa de nuevo para mostrar la pestaña **CONFIG** y acceder al **«Menú de Configuración
    de Central»** [F5]


    **Método 2 — Por llave:**

    1. Gira la llave de acceso de usuario **90° en sentido horario** [F5]

    2. En el Menú Principal, selecciona **«5: Pestaña Configuración»** y pulsa **✓**
    [F5]

    3. Introduce la clave de nivel 3 y pulsa **✓** [F5]

    4. Se muestran directamente las pestañas **MENÚ** y **CONFIG** [F5]


    ---


    ### Operaciones disponibles sobre equipos de lazo


    Desde **«Editar Configuración» → Equipos de lazo** [F4]:


    - **Autoconfigurar equipos de lazo** → Sección *«4 Equipos de lazo»* del manual
    de configuración [F3]

    - **Editar equipos** (añadir, borrar, mover a otra zona) → Sección *«4.2 Edición
    de equipos»* [F3]

    - **Editar texto del equipo** → Sección *«5.2 Edición de texto»* [F3]

    - **Resumen del equipo** [F4]

    - **Inicializar equipos de protocolo OPAL** [F4]

    - **Perfiles Interface Gas** [F4]


    > 📌 El manual indica que con los **menús de puesta en marcha de nivel 3**, editar
    la configuración es «muy sencillo» [F3].


    ---


    **Fuentes:**

    - Manual de instalación y puesta en marcha **997-669-005-3\_Instal-Comm\_ES**
    (sin revisión registrada)

    - Manual de configuración de la central **997-671-005-3\_Configuration\_ES** (sin
    revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento detallado de autoconfiguración de
    lazo**, **edición de texto y zonas de equipos** o **comprobación del cableado
    de lazo antes de la puesta en marcha**.'
