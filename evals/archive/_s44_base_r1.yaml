  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '## Configuración de contraseñas Nivel 2 y Nivel 3 en INSPIRE E10/E15


    ---


    ### Cambio de contraseña de **Nivel 2**


    El procedimiento está documentado en el manual de operación [F1]:


    1. Selecciona el **icono del menú ①** y accede a **"Configuración" ②** [F1].

    2. Inicia sesión como usuario de **nivel de acceso 2** [F1].

    3. Selecciona la opción **"Cambio de contraseña" ③** [F1].

    4. Asegúrate de que **"Acceso Nivel 2" ④** esté seleccionado y que el cursor parpadea
    **⑤** [F1].

    5. Opcionalmente, pulsa el **icono del ojo ⑥** para visualizar la entrada del
    código [F1].

    6. Introduce el nuevo código de acceso con el teclado numérico **⑦** — mínimo
    **4 dígitos**, máximo **8 dígitos** [F1].

    7. Confirma pulsando el símbolo **✓ ⑧** [F1].

    8. Repite los pasos 3 a 6 para confirmar el código introducido [F1].


    ---


    ### Contraseña de **Nivel 3**


    Los fragmentos disponibles no incluyen un procedimiento específico de cambio de
    contraseña de Nivel 3. Lo que sí se menciona es que el **código de acceso Nivel
    3** se utiliza para iniciar sesión en el **Modo Servicio** desde la central [F2].


    > El manual no especifica el procedimiento de configuración o cambio de la contraseña
    de Nivel 3 en los fragmentos recuperados. Consulta el manual completo de puesta
    en marcha o contacta con el soporte técnico de Notifier.


    ---


    ### Buenas prácticas de seguridad para contraseñas [F3]


    - Garantiza la seguridad física de las contraseñas.

    - Usa combinación de caracteres, números y letras mayúsculas/minúsculas cuando
    sea aplicable.

    - Evita frases comunes o datos de identificación personal.

    - No escribas las contraseñas donde personal no autorizado pueda verlas.


