  bot_answer: '## Añadir un nuevo detector al lazo en la DXc (tras puesta en marcha)


    Cuando se conecta un nuevo detector al lazo de una **DXc** ya en servicio, la
    central lo detecta automáticamente y genera el evento **"EQUIPO NUEVO"** [F1].


    ### Procedimiento


    1. **Conecta el nuevo detector** al lazo, respetando el cableado en bucle (no
    puentees los terminales, corta el cable en cada conexión) [F2].


    2. **Verifica la dirección** del nuevo detector antes de conectarlo. Si dos equipos
    tienen la misma dirección, la central generará el evento **"DOBLE DIRECCION"**
    [F1]. En ese caso, cambia la dirección de uno de los equipos.


    3. **Realiza una autobúsqueda** desde la central para aceptar el nuevo equipo.
    Esto es imprescindible: sin la autobúsqueda, el equipo quedará en estado de avería
    "EQUIPO NUEVO" y no será operativo en el sistema [F1].


    ---


    ### ⚠️ Notas importantes


    - Si el nuevo detector es de un **tipo diferente** al que había configurado previamente
    en esa dirección, la central generará el evento **"TIPO EQUIPO CAMBIADO"**. En
    ese caso, deberás hacer la autobúsqueda de nuevo o cambiar manualmente el tipo
    de equipo en la configuración [F1].

    - Si el lazo queda abierto en algún punto, la central indicará avería de **circuito
    abierto** [F2].

    - Se recomienda instalar **aisladores de cortocircuito** en puntos estratégicos
    del lazo para que un cortocircuito no afecte a más de **32 puntos direccionables**
    [F2].


    ---


    Para dudas adicionales sobre el procedimiento de autobúsqueda, puedes contactar
    con el soporte técnico de Honeywell en **soporteHLSI@Honeywell.com** [F1].


