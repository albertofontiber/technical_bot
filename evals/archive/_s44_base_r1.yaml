  - MPDT180
  bot_answer: '## Conexión del módulo de aislamiento de línea en lazo ID2000


    Los fragmentos recuperados del manual de instalación (MIDT180) y del manual de
    programación (MPDT180) de la ID2000 **no incluyen el procedimiento de conexionado
    físico paso a paso del módulo de aislamiento de línea** (esquema de bornes, polaridad,
    tipo de cable, etc.).


    Lo que sí está documentado en los fragmentos es la **normativa de instalación**
    que rige su uso:


    ---


    ### Requisitos de instalación de aisladores — EN54-2: 12.5.2 [F1]


    - Se deben instalar aisladores en **cada lazo analógico** para separar sensores
    y pulsadores manuales [F1].

    - Máximo **32 equipos de lazo entre aisladores** según EN54-2 [F1].

    - En la central ID2000 específicamente: **no más de 25 equipos de lazo entre aisladores**
    [F1].

    - Si se utilizan **aisladores tipo FET**: el límite se reduce a **20 equipos entre
    aisladores** [F1].

    - Incumplir esto contraviene la norma **EN54-2** en caso de avería en la transmisión
    [F1].


    ---


    ### Comportamiento ante cortocircuito [F2]


    - Cuando ocurre un cortocircuito entre dos aisladores, el sistema lo señaliza
    como **"Posible corte"** [F2].

    - Los equipos instalados entre los puntos de aislamiento aparecen como **NO RESPONDE
    / PERDIDO** o **PÉRDIDA PARCIAL DEL LAZO** si faltan más de tres equipos [F2].


    ---


    ### Comprobación del lazo antes de conectar aisladores [F1]


    > ⚠️ Las comprobaciones de continuidad del lazo se deben realizar **antes de conectar
    los aisladores** [F1].

    > ⚠️ **NO utilices nunca un multímetro de alta tensión (tipo "Megger") en el lazo**
    [F1].


    ---


    ### Para el conexionado físico del módulo


    El manual indica que **"estos equipos van acompañados de instrucciones en las
    que se muestran las interconexiones adecuadas para cada aplicación"** [F1]. Por
    tanto, debes consultar la **hoja de instrucciones específica del módulo de aislamiento**
    que acompaña al equipo, ya que el esquema de bornes no está incluido en los fragmentos
    disponibles.


