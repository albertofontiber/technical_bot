- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: FALLO
  diagnostico: Acierta en general las salidas de sirena, la EOL de 47 kΩ, los contactos
    NC-C-NA de los relés y las corrientes/tensiones nominales. Pero falla una parte
    clave al decir que no se especifica el comportamiento del relé de avería ante
    fallo/corte de alimentación, cuando el manual sí indica que es failsafe y se desenergiza,
    además omite que la avería no queda enclavada y la vida útil mínima de 10^5 operaciones.
  bot_sources:
  - FAAST-LT-Como-obtener-el-historico-del-equipo
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés de alarma


    El equipo dispone de **dos relés de alarma** (uno por canal), cada uno con contacto
    **NC, C (común) y NA** [F2]:


    - Terminales **5 (NC), 6 (C), 7 (NA)** → Relé de alarma Canal 1

    - Terminales **8 (NC), 9 (C), 10 (NA)** → Relé de alarma Canal 2


    > Los terminales CH2 (canal 2) solo están disponibles en modelos de 2 canales
    [F2].


    ---


    ### Relés de avería


    El equipo dispone de **dos relés de avería**, cada uno con contacto **NC, C (común)
    y NA** [F2]:


    - Terminales **11 (NC), 12 (C), 13 (NA)** → Relé de avería Canal 1

    - Terminales **14 (NC AUX.), 15 (C AUX.), 16 (NA AUX.)** → Relé de avería Canal
    2 (auxiliar)


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Los fragmentos disponibles **no especifican explícitamente** el comportamiento
    del relé de avería (energizado/desenergizado en reposo, ni su estado ante corte
    de alimentación). Lo que sí se indica es que el indicador **FALLO DE ALIMENTACIÓN**
    se activa en amarillo ante alerta de baja tensión o fallo por sobretensión [F3],
    y que existe un **retardo de avería de alimentación** con valor predeterminado
    de **60 s** [F3].


    Para el comportamiento exacto del relé de avería ante corte de alimentación, consulta
    el manual completo o el soporte técnico.


    ---


    ### Salidas de sirena y resistencia de fin de línea


    El equipo dispone de **dos salidas de sirena supervisadas** [F2]:


    - Terminales **17 (−) y 18 (+)** → Salida sirena 1 — Resistencia de fin de línea:
    **47 kΩ**

    - Terminales **19 (−) y 20 (+)** → Salida sirena 2 — Resistencia de fin de línea:
    **47 kΩ**


    > En caso de fallo de sirena, el indicador **SIRENA** parpadea en amarillo (1
    parpadeo). La acción recomendada es comprobar el elemento de fin de línea y el
    circuito de la sirena [F3].


    ---


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC** [F1]

    - **0,5 A a 30 V CA** [F1]


    ---


    Fuente: I56-6574-005_ES - HS Stand Alone FAAST LT-200 QIG (sin revisión registrada);
    I56-3956-201_ES Morley Loop FAAST LT QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **indicadores LED del panel frontal y diagnóstico
    de averías**, **conexionado de la alimentación principal y auxiliar** o **configuración
    de la entrada configurable (rearme)** del FAAST LT-200.'
