  bot_sources:
  - MADT190_07
  - MADT190_12
  - MADT190_13
  - MCDT190
  - TIDT096
  bot_answer: '## Programación de coincidencia de dos detectores en la ID3000


    La función de **coincidencia** (doble knock) en la Matriz de Control de la ID3000
    se configura así:


    ---


    ### Paso 1 — Accede a la Matriz de Control


    Entra en la programación de la **Matriz E/S** correspondiente a la salida de sirena
    que quieres condicionar [F2].


    ---


    ### Paso 2 — Define el evento de entrada


    En la pantalla de edición del evento de entrada, configura los siguientes parámetros
    [F2]:


    - **Categoría:** ALARMA

    - **Evento:** ALARMA

    - **Tipo de Equipo:** el tipo analógico que corresponda (TÉRMICO, IÓNICO, ÓPTICO,
    VIEW o MULTISENSOR) [F1]

    - **Zona(s) Determinada:** selecciona la zona o rango de zonas donde aplica la
    coincidencia [F2]


    ---


    ### Paso 3 — Activa la coincidencia


    En el campo **"Coincidencia de 2 Zonas"** o **"Coincidencia de Equipos"**, marca
    la casilla correspondiente [F2].


    Según la sección 6.1.5 [F1]:

