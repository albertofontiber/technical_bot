  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó en que el retardo se configura mediante reglas de causa-efecto
    y dio la ruta general, además de distinguir la anulación/habilitación operativa.
    Pero queda incompleto para un técnico: no explica las reglas por defecto ni la
    necesidad de borrar la Regla 1, no detalla entrada/salida ni los seis tipos de
    retardo, y sugiere erróneamente un ''valor numérico'' único del retardo.'
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la PEARL


    Los fragmentos disponibles cubren **dos aspectos distintos** relacionados con
    los retardos. Es importante distinguirlos:


    ---


    ### 1. Anular/Habilitar un retardo ya configurado (operación en campo)


    Esto se hace desde el **Menú Anular/Habilitar**, opción **«5: Retardo Activación
    Salidas»** [F1]:


    1. Accede al **Menú Anular/Habilitar** desde el panel.

    2. Selecciona **«5: Retardo Activación Salidas»** [F1].

    3. Pulsa **✓** para cambiar el estado entre **HABILITADO** y **ANULADO** [F1].

    4. Pulsa **✕** para salir en cualquier momento [F1].


    > ⚠️ Esta opción **solo está disponible si se han configurado retardos previamente**
    como parte de una o más reglas de causa-efecto. Si hay algún retardo activo, el
    **LED de RETARDO ACTIVO** estará encendido [F1].


    ---


    ### 2. Configurar el valor del retardo (programación de causa-efecto)


    El retardo de activación de salidas se define dentro de las **reglas de causa-efecto**
    [F1][F5]. Para programarlo:


    - Accede a **Nivel 3** de configuración [F3].

    - Desde **«Editar Configuración»** → selecciona **«8: Causa y Efecto»** [F5].

    - La programación detallada de causa-efecto se describe en el **Apéndice 5** del
    manual de configuración [F5].


    > ⚠️ Los fragmentos recuperados no incluyen el contenido del **Apéndice 5** (Programación
    de causa-efecto). Para configurar el valor numérico del retardo, consulta ese
    apéndice en el manual físico.


    ---


    ### 3. Opción adicional: botón EXTENDER RETARDO


    Existe un parámetro **«Extend Delay Button»** (habilitado/deshabilitado) en los
    parámetros de la central [F2], accesible desde:


    - **Nivel 3** → **«Editar Configuración»** → **«1: Configuración de la Central»**
    → **Apéndice 1** [F5].


    Este parámetro permite activar o desactivar el pulsador físico de extensión de
    retardo, ya que **no se requiere en todos los mercados** [F2].


    ---


    Fuente: 997-671-005-3_Configuration_ES (sin revisión registrada); 997-670-005-3_Operating_ES
    (sin revisión registrada)


    ---


    También puedo ayudarte con: **programación de reglas de causa-efecto (Apéndice
    5)**, **opciones de zona** o **acceso de nivel 3 con clave temporal**.'
