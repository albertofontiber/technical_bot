  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: FALLO
  diagnostico: Aunque intenta tratar la inhibición de rearme, confunde el parámetro
    r.1 con 'ri/resumen', describe mal sus valores y omite comprobaciones clave como
    ABORT enclavado, Flow Press, t.A, averías enclavadas y zonas aún en alarma. Añade
    información poco pertinente o alucinada sobre 'Fallo de Sistema', por lo que no
    guiaría correctamente al técnico.
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-TI-001I
  - MN-DT-959_OPC-RP1r
  - MNDT102
  bot_answer: '## RP1r – Sistema no vuelve a estado normal tras resetear después de
    extinción


    El problema más probable está relacionado con el parámetro **ri (Resumen inhibido
    tras extinción)**. Aquí tienes los puntos a comprobar:


    ---


    ### 1. Verificar el parámetro `ri` – Resumen inhibido tras extinción


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras la extinción
    realizada, el sistema pasa automáticamente al **estado de sistema inhibido** antes
    de volver al estado normal. Este comportamiento es por diseño.


    El parámetro `ri` controla cuándo se produce ese resumen inhibido [F1]:


    - **Valor 00** (por defecto): el resumen inhibido se activa desde que finaliza
    la extinción o cuando se agota el tiempo configurado.

    - **Valores 01 a 30**: el resumen inhibido se activa después de intervención o
    reposición, con un retardo de **1 a 30 minutos**.


    **Acción:** Accede al nivel 3 de programación y comprueba el valor configurado
    en `ri`. Si está en un valor distinto de 00, el sistema esperará ese tiempo (o
    la intervención manual) antes de salir del estado inhibido.


    ---


    ### 2. Comprobar si hay indicación de "Fallo de Sistema"


    Si tras el reset el panel no vuelve a estado normal y muestra **FALLO DE SISTEMA**
    [F2], la causa puede ser que el microprocesador principal tardó en inicializar
    o detectó tensiones fuera de rango.


    **Acción:** Realiza un **REARME** de la central [F2]. Si el fallo desaparece tras
    el rearme, el sistema debería volver a estado operativo normal.


    > ⚠️ Si no se rearma, la central **NO realizará el proceso de extinción** al considerar
    que no está funcionando correctamente [F2].


    ---


    ### 3. Acceso a programación para verificar parámetros


    Si necesitas revisar o modificar el parámetro `ri`, accede mediante **nivel 3
    con el jumper de programación** [F3]:


    1. Desplázate entre parámetros con la tecla **Teclado** [F3].

    2. Incrementa valor con **Retardo Sí/No** [F3].

    3. Disminuye valor con **Silenciar Zumbador** [F3].

    4. Confirma el nuevo valor pulsando la tecla **Rearme** [F3].


    ---


    **Resumen de comprobaciones:**

    - Parámetro `ri`: ¿está en el valor esperado? ¿Hay un retardo activo que impide
    la salida del estado inhibido?

    - ¿Aparece indicación de **FALLO DE SISTEMA**? → Ejecutar **REARME**.

    - ¿Se han repuesto los agentes extintores y sensores? El estado inhibido puede
    requerir intervención física antes de permitir el resumen.


    ---


    Fuentes:

    - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr (sin revisión registrada) [F1]

    - HLSI-BT-001 Boletín técnico (04/11/2011) [F2]

    - MNDT102 Manual de usuario. Central de extinción (sin revisión registrada) [F3]


    ---


    También puedo ayudarte con: **configuración del parámetro `ri` paso a paso**,
    **procedimiento completo de rearme tras extinción** o **diagnóstico de otros fallos
    en la RP1r**.'
