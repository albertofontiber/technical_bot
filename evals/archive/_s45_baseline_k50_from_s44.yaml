  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: La respuesta reproduce correctamente las reglas por nivel de acceso
    y el procedimiento principal para cambiar códigos de Nivel 2 y Nivel 3, incluyendo
    longitud, confirmación, mensaje de éxito y sincronización/copia en nube. Solo
