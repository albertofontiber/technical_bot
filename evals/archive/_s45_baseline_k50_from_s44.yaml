- qid: cat005
  question: ¿Cuáles son las características técnicas de la central de detección de
    gas Fidegas CS4, y en qué se diferencian las versiones digital y analógica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: 'Responde con las características técnicas clave indicadas en la referencia:
    alimentación, potencia, hasta 4 sensores, salidas, corriente máxima, dimensiones,
    peso y rearme. También distingue correctamente las versiones por código 3244 digital
    y 3270 analógica, y por el tipo de conexión de sensores; añade información adicional
    no esencial, pero no contradice el contenido GOLD.'
  bot_sources:
  - MNDT515
  - Manual-de-Usuario-CS4
  bot_answer: '## Central de Detección de Gas Fidegas CS4 — Características Técnicas


    ### Especificaciones generales


    - **Tensión de alimentación:** 110-230 Vac, 50-60 Hz [F2]

    - **Potencia/Consumo:** 30 W, Clase II [F2][F3]

    - **Número de sensores:** Hasta 4 conexiones simultáneas (modo analógico o digital)
    [F2]

    - **Salidas:** 2 salidas conmutadas LP (relé apto para 230 Vac) con contactos
    NA-C-NC [F2]

    - **Corriente máxima:** 250 mA [F2]

    - **Rearme:** Seleccionable manual o automático [F2]

    - **Dimensiones:** 90 x 106 x 58 mm [F2]

    - **Peso:** 300 g [F2]

    - **Instalación:** Carril DIN o armario de superficie [F1]


    ### Indicaciones


    - **LED verde (PWR):** Alimentación presente (fijo) / corte de red (intermitente)
    [F1]

    - **LED bicolor (ON/ALARM) por sensor:** Presencia de sensor (verde) / alarma
    (rojo) [F1]

    - **LED amarillo (ERROR) por sensor:** Avería de sensor remoto [F1]

    - **LED verde (OUT1 / OUT2):** Salida activa (verde) / desactivada (apagado) [F1]

    - **Avisador acústico:** Apoyo sonoro a las indicaciones ópticas [F1]


    ### Entradas de señal


    - **Versión digital:** Entradas 0-10/15 V [F1]

    - **Versión analógica:** Entradas 4-20 mA [F1]


    ### Conexionado de sensores


    Los conectores de cada sensor tienen la siguiente asignación [F4]:

    - **Terminal 1:** Positivo de alimentación (12 a 24 Vdc)

    - **Terminal 2:** Entrada de señal

    - **Terminal 3:** Negativo común de alimentación y señal


    ---


    ## Diferencias entre versión digital y analógica


    ### Código de producto

    - **Versión digital:** 3244 [F2]

    - **Versión analógica:** 3270 [F2]


    ### Tipo de señal

    - **Versión digital:** Señal 0-10/15 V [F1]

    - **Versión analógica:** Señal 4-20 mA [F1]


    ### Sensores compatibles

    - **Versión digital:** Sensores S/10 gases combustibles [F3]

    - **Versión analógica:** Sensores S/3 gases combustibles; Sensores S/3 y S/2 gases
    tóxicos; Sensores S/10 gases tóxicos [F3]


    > ⚠️ La versión analógica tiene firmware identificado como **Firmware 1.2** [F3].
    Verifica que el firmware de tu equipo coincide con la documentación disponible.


    ---


    También puedo ayudarte con: **procedimiento de conexionado de sensores**, **configuración
    del rearme manual/automático** o **asignación de salidas OUT1/OUT2**.


    Fuente: Manual-de-Usuario-CS4 (sin revisión registrada)'
