  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó en que el rearme debe hacerse desde nivel 2 y que puede haber
    estados/averías enclavadas, pero omite comprobaciones clave como Abort, Flow Press,
    zonas en alarma y circuitos supervisados. Además confunde/imprecisa el parámetro
    de inhibición de rearme (`r.1`, no `ri`) y describe mal el valor por defecto,
    lo que puede inducir a diagnóstico incorrecto.
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103_RP1r-Supra_lr
  - MIEMN570I
  bot_answer: '## RP1r-Supra: Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento es **esperado por diseño** según la normativa. Aquí tienes
    los puntos clave a comprobar:


    ---


    ### 1. Estado "Resumen Inhibido" tras extinción (parámetro `ri`)


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras la extinción
    realizada el sistema pasa automáticamente al **estado de sistema inhibido** para
    evitar reiniciar el proceso de extinción.


    El parámetro `ri` controla este comportamiento [F1]:

    - **Valor 00 (por defecto):** El resumen inhibido se activa desde que finaliza
    la extinción o cuando se agota el tiempo configurado.

    - **Valores 01 a 30:** Resumen inhibido durante 1 a 30 minutos tras la extinción
    o intervención/reposición.


    ➡️ **Comprueba el valor programado en `ri`.** El sistema no saldrá del estado
    inhibido hasta que se cumpla la condición configurada (tiempo agotado o intervención
    manual).


    ---


    ### 2. Estado "Extinción Realizada" — comportamiento normal


    Tras el tiempo de activación `t-H`, el sistema entra en estado fin de extinción
    con [F2]:

    - LED **"Extinción Realizada"** iluminado de forma **fija**.

    - Temporizador de disparo fijo en **00 seg**.

    - Relés de salida de solenoides **desactivados**.


    Este estado es **enclavado** y requiere rearme manual.


    ---


    ### 3. Procedimiento de rearme correcto


    Para rearmar la central [F3]:

    1. Accede al **nivel 2** de acceso (consultar sección **4.3 Niveles de acceso**).

    2. Pulsa la tecla **"Rearme"**.

    3. La central se reiniciará y todas las entradas enclavadas se restablecerán.


    ⚠️ **Todas las averías son por defecto enclavadas y requieren rearme manual**
    [F3]. No basta con que desaparezca la condición de fallo.


    ---


    ### 4. Fallo de sistema persistente tras rearme


    Si tras el rearme aparece indicación de **FALLO DE SISTEMA** [F4]:

    - Es causado por el microprocesador principal tardando en inicializar o por lecturas
    de tensión fuera de rango.

    - **Solución:** Rearmar la central. Si la avería desaparece tras el rearme, el
    sistema es funcional.

    - Si persiste, revisar la alimentación y posibles perturbaciones externas.


    ---


    ### Resumen de comprobaciones


    - **Parámetro `ri`:** ¿Está en 00 o tiene un tiempo configurado que aún no ha
    expirado?

    - **Nivel de acceso:** ¿Se ha realizado el rearme correctamente desde nivel 2?

    - **LED "Extinción Realizada":** ¿Sigue fijo? → Confirma que el rearme no se completó.

    - **Fallo de sistema:** ¿Aparece alguna indicación de avería tras el rearme?


    ---


    Fuente: HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada); HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
    (sin revisión registrada); HLSI-BT-001 Boletín técnico (04/11/2011)


    ---


    También puedo ayudarte con: **configuración del parámetro `ri`**, **niveles de
    acceso y código de nivel 2**, o **interpretación de LEDs de avería tras extinción**
    en la RP1r-Supra.'
