  bot_answer: '## Test anual del detector VESDA-E VEP


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido** del manual, las tareas
    que corresponden realizarse **una vez al año** son las siguientes [F1]:


    - **Realizar una prueba de humos** para comprobar la integridad de la red de Tubería

    - **Comprobar el flujo** de la red de Tubería

    - **Limpiar los puntos de muestreo**

    - **Limpiar con agua** la red de Tubería


    ---


    ### Sobre la prueba de humos anual


    El manual indica que la prueba de humos consiste en introducir una muestra de
    humo en el **orificio de muestreo más alejado** y medir el tiempo que tarda en
    llegar al detector [F3]. Los resultados se registran y se comparan con pruebas
    posteriores para detectar variaciones del sistema [F3].


    Para el procedimiento detallado de la prueba de humos, el manual remite expresamente
    a la **VESDA-E Commissioning Guide (Guía de puesta en marcha de VESDA-E)** [F3].


    ---


    ### ⚠️ Precauciones obligatorias antes de iniciar el mantenimiento [F1]


    1. **Informe a la autoridad supervisora adecuada** antes de comenzar.

    2. **Aísle todos los dispositivos** que dependan del detector antes de ponerlo
    en funcionamiento.

    3. Cuando el detector está deshabilitado o en espera, **no emitirá advertencias
    de fuego**.

    4. Siga los **procedimientos del sitio** para evitar falsas alarmas en los servicios
    supervisados.


    ---


    ### Nota sobre frecuencias adicionales


    Recuerda que hay tareas de otras frecuencias que también deben estar al día:

    - **Cada 3 meses:** Fuente de alimentación y batería [F1]

    - **Cada 6 meses:** Comprobar la red de Tubería [F1]

    - **Cada 2 años:** Sustitución del filtro [F1]


    La frecuencia puede variar según los códigos y normas locales y el entorno de
    la instalación [F1].


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

