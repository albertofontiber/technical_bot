- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en que el retardo se configura mediante reglas de causa-efecto
    y no como un parámetro global, y menciona la anulación/habilitación operativa.
    Pero queda incompleto frente a la referencia: no da el procedimiento clave de
    creación/edición de reglas, omite borrar la Regla 1 por defecto, no menciona la
    estructura entrada/salida ni advertencias de prueba/EN54, y además enumera siete
    tipos pese a hablar de seis.'
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura dentro de las **reglas
    de causa-efecto**. No existe un único parámetro global de "retardo de alarma principal",
    sino que el retardo se asigna a cada regla de causa-efecto individualmente, eligiendo
    uno de los **seis tipos de retardo** disponibles [F1].


    ---


    ### Tipos de retardo disponibles


    Los seis tipos son [F1][F2]:


    - **Fijo**: No permite silenciar sirenas durante el retardo, no muestra cuenta
    atrás, no puede anularse ni detenerse.

    - **Estándar**: Permite silenciar sirenas durante el retardo, muestra cuenta atrás
    en pestaña ALARMA, puede anularse (nivel acceso 2) y detenerse con FIN RETARDO.

    - **No Silenc.**: No permite silenciar sirenas, pero sí muestra cuenta atrás y
    permite anular/detener el retardo.

    - **Est. Ext.**: Igual que Estándar, y además la salida se detiene si se pulsa
    AMPLIAR RETARDO.

    - **RetExtStd**: Igual que Estándar, y además el temporizador comienza en RETARDO
    AMPLIADO.

    - **No Sil. Ext**: No permite silenciar sirenas, pero sí permite ampliar retardo
    y muestra cuenta atrás.

    - **SinRetExt**: El temporizador comienza en RETARDO AMPLIADO, pero no permite
    silenciar ni ampliar manualmente.


    ---


    ### Dónde se configura


    El retardo se asigna en la **matriz de causa-efecto** (Apéndice 5 del manual de
    configuración) [F1]. Cada regla puede tener su propio tipo y duración de retardo.


    > ⚠️ Los fragmentos disponibles describen los **tipos de retardo** y su comportamiento,
    pero **no incluyen el procedimiento paso a paso** para crear o editar una regla
    de causa-efecto con un valor de tiempo concreto (en segundos). Para ese procedimiento
    detallado, consulta el Apéndice 5 completo del manual de configuración **997-671-005-3**.


    ---


    ### Parámetro adicional: botón AMPLIAR RETARDO


    Desde los parámetros de la central, puedes habilitar o deshabilitar el pulsador
    físico **AMPLIAR RETARDO** [F5]:


    - Ruta: `Editar Parámetros de la Central` → opción **10: Extend Delay Button**
    → `Enabled / Disabled`


    ---


    ### Anular/habilitar retardos en operación


    Si necesitas anular temporalmente todos los retardos configurados (sin modificar
    la programación) [F3]:


    1. Accede al **Menú Anular/Habilitar** (nivel de acceso 2).

    2. Selecciona **`5: Retardo Activación Salidas`**.

    3. Pulsa **✓** para cambiar entre estado HABILITADO / ANULADO.

    4. Pulsa **✕** para salir.


    ---


    **Fuente:** Manual de configuración de la central PEARL 997-671-005-3 (sin revisión
    registrada); Manual de funcionamiento PEARL 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **borrar o crear una regla de causa-efecto**, **configuración
    del retardo ampliado** o **comportamiento del LED RETARDO ACTIVO** en la PEARL.'
- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Aporta varios datos correctos y útiles que coinciden con la conexión
    esperada: RFL 6K8/0,5 W al final de línea, polaridad, supervisión, diodo para
    sirenas no polarizadas y límite de 1 A. Pero responde principalmente para ZXAE/ZXEE
    y da terminales/figuras de ese manual, no para Morley ZXe ZX2e/ZX5e, por lo que
    puede confundir al técnico en la identificación física de las salidas.'
  bot_sources:
  - MIE-MI-310
  bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — ZXAE/ZXEE


    ## Diferencias según modelo


    - **ZXAE**: dispone de **2 salidas supervisadas** (Salida A y B) [F2]

    - **ZXEE**: dispone de **4 salidas supervisadas** (Salida A, B, C y D) [F2]


    ---


    ## Reglas de conexionado


    ### 1. Resistencia Final de Línea (RFL)

    - Obligatoria en **cada circuito de sirenas** [F2]

    - Valor: **6.800 Ω (6K8) a 0,5 W mínimo** [F2]

    - Se instala entre **+ y −** de la **última sirena** del circuito [F2]

    - Si no hay sirenas conectadas en la salida, la RFL se conecta directamente en
    los terminales de la central [F2]


    ### 2. Topología del cableado

    - Las sirenas se conectan **en serie de línea** (daisy-chain), **sin ramales**
    [F1]

    - ⚠️ **No realizar ramales paralelos**: la supervisión se realiza sobre la línea
    directa hasta la RFL; los ramales no quedan supervisados [F1]


    ### 3. Sirenas con polaridad

    - Conectar respetando la polaridad **+ / −** indicada en los terminales de la
    salida [F2]

    - La corriente de activación circula en sentido normal al activarse la salida
    [F2]

    - La supervisión usa una **corriente inversa** con pequeña tensión de polaridad
    opuesta a la de activación [F2]


    ### 4. Campanas/sirenas sin polaridad

    - Es **obligatorio instalar un diodo** entre el terminal **+** y uno de los terminales
    de alimentación de la campana [F2]

    - Motivo: evitar consumo durante la supervisión, ya que las bobinas de campanas
    sin polaridad no tienen polaridad definida [F2]


    ### 5. Sección de cable

    - **Mínimo 1,5 mm²** [F2]

    - Evitar longitudes excesivas para no provocar caídas de tensión en la línea [F2]


    ### 6. Límite de corriente por circuito

    - **Máximo 1 A por salida** [F2]

    - Tener en cuenta el consumo total de la central con todas las sirenas activadas
    [F2]

    - Consumo de referencia en alarma por salida: **0,018 A por sirena** (ver Tabla
    4 de cálculo de baterías) [F5]


    ---


    ## Terminales físicos


    - **ZXAE**: terminales de salida de sirenas A y B en placa (ver Figura 15 del
    manual) [F2]

    - **ZXEE**: terminales **S,A+ / S,A− / S,B+ / S,B− / S,C+ / S,C− / S,D+ / S,D−**
    en bloque **TB7** (ver Figura 15 del manual) [F2]


    ---


    **Fuente:** Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)


    También puedo ayudarte con: **cálculo de baterías con sirenas**, **conexionado
    de relés de la ZXEE** o **entradas de cableado recomendadas**.'
