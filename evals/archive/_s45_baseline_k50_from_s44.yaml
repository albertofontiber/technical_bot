  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en las salidas de relé NC-C-NA, las salidas de sirena con
    EOL de 47 kΩ y los valores principales de corriente/tensión de contactos. Pero
    falla en un punto clave: no indica que el relé de avería es failsafe y se desenergiza
    ante avería o corte de alimentación, y omite que la avería no está enclavada y
    la vida útil mínima de 10^5 operaciones.'
  bot_sources:
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés de alarma


    El equipo dispone de **dos relés de alarma**, uno por canal [F5]:


    - Terminal 5 → **Relé de alarma NC, Canal 1** (bloque T2)

    - Terminal 6 → **Relé de alarma C, Canal 1**

    - Terminal 7 → **Relé de alarma NA, Canal 1**

    - Terminal 8 → **Relé de alarma NC, Canal 2** (bloque T3)

    - Terminal 9 → **Relé de alarma C, Canal 2**

    - Terminal 10 → **Relé de alarma NA, Canal 2**


    > Los terminales CH2 (canal 2) solo están disponibles en modelos de 2 canales
    [F5].


    ---


    ### Relés de avería


    El equipo dispone de **dos relés de avería**, uno por canal [F5]:


    - Terminal 11 → **Relé de avería NC, Canal 1** (bloque T4)

    - Terminal 12 → **Relé de avería C, Canal 1**

    - Terminal 13 → **Relé de avería NA, Canal 1**

    - Terminal 14 → **Relé de avería NC (AUX.), Canal 2** (bloque T5)

    - Terminal 15 → **Relé de avería C (AUX.), Canal 2**

    - Terminal 16 → **Relé de avería NA (AUX.), Canal 2**


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    El manual describe el siguiente comportamiento [F3]:


    > Al abrir la puerta de la caja durante el funcionamiento normal, la unidad entra
    en modo de servicio: **el relé de fallo indica una avería**.


    Este es el único comportamiento del relé de avería descrito explícitamente en
    los fragmentos disponibles. El manual no especifica en los fragmentos recuperados
    el comportamiento del relé de avería ante un corte total de alimentación eléctrica
    (energizado/desenergizado en reposo). Consulta el manual completo o el soporte
    técnico de Notifier/Honeywell para ese detalle concreto.


    ---


    ### Salidas de sirena


    Dos salidas de sirena con **resistencia de fin de línea de 47 kΩ** cada una [F5]:


    - Terminales 17 (–) y 18 (+) → **Salida sirena 1** (bloque T6) — resistencia de
    fin de línea: **47 kΩ**

    - Terminales 19 (–) y 20 (+) → **Salida sirena 2** (bloque T7) — resistencia de
    fin de línea: **47 kΩ**


    ---


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC** [F1]

    - **0,5 A a 30 V CA** [F1]


    ---


    ⚠️ **Nota importante sobre los fragmentos**: La Tabla 2 de designaciones de terminales
    [F5] proviene del manual del **FAAST LT (versión Morley Loop)**, no del manual
    autónomo LT-200. Los datos de especificación eléctrica de contactos [F1] sí son
    del manual del **FAAST LT-200 autónomo**. Verifica que la asignación de terminales
    coincide con tu modelo exacto (FL0111E-HS, FL0112E-HS o FL0122E-HS).


    ---


    **Fuentes:**

    - I56-6574-005_ES - HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-3956-201_ES Morley Loop FAAST LT QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de la entrada configurable (rearme)**,
    **cableado de alimentación principal y auxiliar** o **pruebas funcionales del
    FAAST LT-200**.'
