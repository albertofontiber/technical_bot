- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó en identificar obstrucción/orificios sucios y filtro colmatado
    como causas probables, y advierte correctamente no hacer reset inicial con el
    conducto sucio. Pero omite el diagnóstico clave mediante lectura de flujo V01/V02
    en %, memoria de eventos y umbrales/retardo; además mezcla rotura/fuga como causa
    de 'flujo bajo' cuando normalmente indicaría flujo alto, y contradice parcialmente
    el reset inicial tras corregir la causa.
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: "## Alarma intermitente de flujo bajo en ASD535\n\n### Causa más probable\n\
    \nLa alarma intermitente de flujo bajo en el **ASD 535** indica que el sistema\
    \ de monitorización del flujo de aire ha detectado una anomalía en el conducto\
    \ de aspiración [F5]. Las causas más probables son:\n\n- **Obstrucción parcial**\
    \ en los orificios de aspiración o en el conducto de aspiración [F1]\n- **Filtro\
    \ de polvo colmatado** o próximo al fin de su vida útil [F1]\n- **Rotura o fuga**\
    \ en el conducto de aspiración [F5]\n- **Unidad de ventilación (AFU 35) degradada**\
    \ [F4]\n\n> El manual indica explícitamente que \"un sistema de monitorización\
    \ del flujo de aire detecta en cada tubería las obstrucciones y roturas que puedan\
    \ producirse en el conducto de aspiración\" [F5].\n\n---\n\n### Procedimiento\
    \ de diagnóstico\n\n1. **Inspección visual del conducto de aspiración**\n   Revisa\
    \ toda la tubería de PVC rígido o ABS de **25 mm de diámetro exterior / 20 mm\
    \ de diámetro interior** [F5] buscando obstrucciones, aplastamientos o roturas.\n\
    \n2. **Comprobación de los orificios de aspiración**\n   Verifica que los orificios\
    \ no estén bloqueados por suciedad, polvo o cuerpos extraños [F1].\n\n3. **Revisión\
    \ del estado del filtro**\n   Comprueba si hay activo un fallo de tipo **\"Fallo\
    \ de filtro (fin de vida útil)\"** [F1]. La vida útil restante del filtro puede\
    \ leerse en *EasyConfig*, posición de conmutador **d > RE** [F1].\n\n4. **Comprobación\
    \ de la unidad de ventilación (AFU 35)**\n   Si los pasos anteriores no revelan\
    \ la causa, puede estar degradada la unidad de ventilación para la aspiración.\
    \ Su sustitución requiere desmontar el **Main Board AMB 35** [F4].\n\n---\n\n\
    ### Acciones correctivas según causa\n\n- **Orificios obstruidos** → Limpiar los\
    \ orificios. Tras la limpieza normalmente no es necesario un reset inicial [F1].\n\
    - **Filtro colmatado** → Sustituir el elemento de filtro activando la función\
    \ **\"Sustitución del filtro\"** (botón Reset o vía *EasyConfig* / *ASD Config*).\
    \ El ASD pasará a estado **\"Aislar\"** durante el proceso [F1].\n- **Unidad de\
    \ ventilación defectuosa** → Sustituir la **AFU 35**. Tras la sustitución es **imprescindible**\
    \ realizar un nuevo reset inicial (cap. 7.3.5) [F4].\n\n---\n\n### ⚠️ Advertencia\
    \ crítica\n\n> Si se realiza un reset inicial con los orificios de aspiración\
    \ obstruidos, existe el riesgo de que la toma de muestras resulte imposible o\
    \ sea insuficiente, lo cual puede impedir que el ASD 535 dispare la alarma [F1].\n\
    \n**No ejecutes el reset inicial hasta haber limpiado completamente el conducto\
    \ de aspiración.**\n\n---\n\n**Fuente:** ASD535_TD_T131192es_h (sin revisión registrada)\n\
    \n---\n\nTambién puedo ayudarte con: **procedimiento completo de sustitución del\
    \ filtro**, **sustitución de la unidad de ventilación AFU 35** o **lectura de\
    \ la memoria de eventos del ASD535** para identificar el historial de fallos de\
    \ flujo."
