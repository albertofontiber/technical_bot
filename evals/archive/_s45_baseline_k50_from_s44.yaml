    recuperados**. Consulta el manual completo de configuración de la DXc o contacta
    con el soporte técnico de Honeywell en **soporteHLSI@Honeywell.com** [F1].


    ---


    ### Consideraciones previas al añadir el detector


    Antes de conectar el nuevo equipo al lazo, ten en cuenta:


    - **No puentees los terminales**: corta el cable en cada conexión para mantener
    la supervisión [F2].

    - **Dirección única**: asegúrate de que el nuevo detector tiene una dirección
    distinta a todos los existentes. Si dos equipos comparten dirección, la central
    generará el evento **"DOBLE DIRECCION"** [F1].

    - **Aisladores de cortocircuito**: si el lazo supera los **32 puntos direccionables**
    en un segmento, se recomienda instalar aisladores en los límites de zona [F2].


