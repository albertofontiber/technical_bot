    no esenciales.
  bot_sources:
  - HOP-138-8ES  issue 6_01-2026_Co
  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE
    E10/E15


    ---


    ## Información general


    La INSPIRE E10/E15 usa contraseñas de **4 a 8 dígitos** para los niveles de acceso
    2 y 3 [F1][F3]. El código de fábrica del **Nivel 2 es "22222222"** [F3], y se
    recomienda cambiarlo tras la puesta en marcha [F3].


    - Si estás en **Nivel 2**: solo puedes cambiar la contraseña del Nivel 2 [F1].

    - Si estás en **Nivel 3**: puedes cambiar la contraseña del Nivel 2 **o** del
    Nivel 3 [F1].


    ---


    ## Cambio de contraseña desde Nivel 3 (NI2 y NI3)


    Procedimiento para cambiar cualquiera de los dos niveles [F1]:


    1. Selecciona el **icono del menú ①** → selecciona **"Ajustes" ②** → inicia sesión
    como usuario de **Nivel 3**.

    2. Selecciona la opción **"Cambio del código de acceso" ③**.

    3. Asegúrate de que el **Nivel de Acceso 2 o 3 ④** esté seleccionado y que el
    cursor parpadee en el campo ⑤.

    4. Puedes visualizar la contraseña introducida pulsando el **icono del ojo ⑥**.

    5. Introduce la nueva contraseña (**mínimo 4 dígitos, máximo 8 dígitos**) con
    el teclado numérico ⑦.

    6. Confirma la entrada seleccionando el **símbolo ✓ ⑧**.

    7. Repite los pasos 3 a 6 para confirmar la contraseña.

    8. Observa el mensaje **"Cambio de código de acceso satisfactorio"** → selecciona
    **Aceptar**.

    9. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    ---


    ## Cambio de contraseña desde Nivel 2 (solo NI2)


    Procedimiento cuando el operario accede con Nivel 2 [F2]:


    1. Selecciona el **icono del menú ①** → selecciona **"Configuración" ②** → inicia
    sesión como usuario de **Nivel 2**.

    2. Selecciona la opción de **cambio del código de acceso ③**.

    3. Asegúrate de que **Nivel de Acceso 2 ④** esté seleccionado y el cursor parpadee
    ⑤.

    4. Puedes visualizar la contraseña pulsando el **icono del ojo ⑥**.

    5. Introduce la nueva contraseña (**mínimo 4 dígitos, máximo 8 dígitos**) con
    el teclado ⑦.

    6. Confirma seleccionando el **símbolo ✓ ⑧**.

    7. Repite los pasos 3 a 6 para confirmar [F2].


    ---


    ## ⚠️ Notas importantes


    - Tras el cambio, es obligatorio **sincronizar con la central y hacer copia de
    seguridad en la nube** [F1].

    - El cierre de sesión automático del Nivel 2 ocurre tras **5 minutos de inactividad**
    [F3].

    - Mantén los códigos seguros y accesibles solo para usuarios autorizados [F3].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha) [F1][F4][F5]

    - HOP-338-9ES issue 4, 01-2026 (Instrucciones de usuario/operador) [F2][F3]


    ---


    También puedo ayudarte con: **sincronización de la configuración con la herramienta
    CLSS**, **simulación de alarma en modo servicio** o **acceso y lectura de logs
    de auditoría** de la INSPIRE E10/E15.'
