  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: La respuesta acierta en la conexión en serie, polaridades, orden red-baterías,
    fusible y uso del pulsador BAT. Sin embargo, contiene un error importante al indicar
    que cada batería debe tener más de 24V; deben ser dos baterías de 12V en serie
