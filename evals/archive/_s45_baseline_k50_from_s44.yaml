    Según los fragmentos disponibles, el proceso es el siguiente:


    ### Situación que se produce


    Cuando conectas un nuevo detector al lazo, la central genera automáticamente el
    evento **"EQUIPO NUEVO"**, que indica que se ha detectado un equipo nuevo en el
    lazo que aún no está aceptado por el sistema [F1].


