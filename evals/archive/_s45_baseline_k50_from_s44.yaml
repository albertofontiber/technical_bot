  bot_answer: 'La pregunta requiere distinguir entre **dos tipos de lazos** en la
    ZXAE/ZXEE, ya que cada uno tiene su propia resistencia de fin de línea:


    ---


    ## Lazos analógicos (detección)


    Los fragmentos recuperados del manual **MIE-MI-310** para la ZXAE/ZXEE **no especifican
    una resistencia de fin de línea (RFL) para los lazos analógicos** [F4]. El lazo
    analógico opera con transmisión digital a dos hilos y la sección 3.3.4 describe
    únicamente parámetros de cableado y comprobaciones de continuidad/resistencia
    del bucle, pero no menciona ninguna RFL para este lazo [F4].


    ---


