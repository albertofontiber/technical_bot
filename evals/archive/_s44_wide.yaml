  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en revisar el rearme desde nivel 2 y posibles averías/entradas
    persistentes, pero omite comprobaciones clave como ABORT enclavado, t.A y zonas
    en alarma. Además describe mal el parámetro de inhibición de rearme: lo llama
    ''ri'' y asigna valores/efectos distintos a los del manual, lo que puede inducir
    a error.'
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103_RP1r-Supra_lr
  - MIEMN570I
  bot_answer: '## RP1r-Supra — Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento es esperado y está controlado por el parámetro **ri (Resumen
    inhibido tras extinción)**. Aquí tienes los puntos a comprobar por orden:


    ---


    ### 1. Comprobar el parámetro `ri` — Inhibición post-extinción


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras la extinción
    realizada el sistema **no debe volver directamente al estado normal**: debe pasar
    primero al estado de **sistema inhibido** para evitar reiniciar el proceso de
    extinción.


    El parámetro `ri` controla este comportamiento [F1]:

    - **Valor 00:** El sistema pasa a estado inhibido desde que finaliza la extinción,
    o cuando se agota el tiempo configurado.

    - **Valores 01 a 30:** El sistema pasa a estado inhibido después de la intervención
    o reposición, con un retardo de **1 a 30 minutos**.


    ➡️ **Acción:** Accede al nivel 3 (switch PROG) y verifica el valor de `ri`. Si
    está en 00, el sistema permanecerá inhibido hasta que se realice una intervención
    manual. Esto es comportamiento correcto según norma.


    ---


    ### 2. Verificar que el rearme se hace correctamente desde nivel 2


    Para rearmar la central correctamente [F3]:

    1. Accede al **nivel 2** de acceso (código de teclado o llave VSN-LL).

    2. Pulsa la tecla **"Rearme"**.

    3. Esto reinicia la central y restablece todas las entradas enclavadas.


    ⚠️ **Importante:** Por defecto, **todas las averías son enclavadas y requieren
    rearme manual** [F3]. Si hay alguna avería activa (presión baja, flujo, puerta
    abierta, etc.), el sistema no volverá al estado normal aunque se rearme.


    ---


    ### 3. Comprobar si hay indicación de "Fallo de sistema"


    Si tras el rearme aparece avería de **FALLO DE SISTEMA** [F4]:

    - Puede deberse a que el microprocesador principal tardó en inicializar o hubo
    una lectura de tensiones fuera de rango.

    - **Solución:** Rearmar la central. Si la avería desaparece tras el rearme, el
    sistema debería volver a operar correctamente [F4].

    - ⚠️ Si no se rearma, la central **no realizará el proceso de extinción** al considerar
    que no funciona correctamente [F4].


    ---


    ### 4. Comprobar averías activas que impidan el retorno al estado normal


    Revisa si alguno de estos LEDs está intermitente [F3]:

    - **LED "Avería presión baja"** → señal en entrada LOW PRESS SWITCH

    - **LED "Avería presión flujo"** → señal en entrada FLOW PRESS SWITCH

    - **LED "C''to. supervisión puerta abierta"** → señal en entrada DOOR OPEN SWITCH


    Estas averías son enclavadas por defecto. Hasta que no se resuelva la condición
    física y se rearme, el sistema no retornará al estado normal [F3].


    ---


    ### Estado normal esperado


    En condiciones normales, solo deben estar iluminados el LED verde de **alimentación**
    y el LED de **Automático** [F5].


    ---


    **Fuente:** HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada); HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
    (sin revisión registrada); HLSI-BT-001 Boletín técnico (04/11/2011); MIEMN570I
    (Rev. 008)


    ---


    También puedo ayudarte con: **configuración del parámetro `ri` paso a paso**,
    **acceso al nivel 3 (switch PROG)** o **interpretación de LEDs de avería activos**
    en la RP1r-Supra.'
