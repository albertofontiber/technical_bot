  bot_sources:
  - 55315013 Manual Centrales Analogicas CAD-150-8 Instalacion ES FR GB IT
  - 55315501 CAD150R Instalacion ES GB 191018
  bot_answer: '## Conexión de baterías en la CAD-150


    Según el manual de instalación, el procedimiento es el siguiente:


    **Paso 1 — Conectar las baterías entre sí**

    Conecta previamente las dos baterías entre sí mediante el **cable puente batería**
    [F1].


    **Paso 2 — Conectar al circuito de la central**

    Conecta los cables que salen del circuito (rojo → positivo, negro → negativo)
    a los bornes correspondientes de las baterías [F1].


    **Paso 3 — Verificación previa a la puesta en marcha**

    Antes de energizar, comprueba con un voltímetro que las baterías tienen una tensión
    **superior a 24V** [F4].


    **Paso 4 — Orden de conexión del sistema**

    1. Conectar primero la alimentación de red activando el **magnetotérmico bipolar**

    2. Conectar las baterías después [F4]


    > ⚠️ **Nota importante:** Si necesitas arrancar el equipo únicamente con baterías
    (sin red), es imprescindible pulsar el pulsador **BAT** (componente 9 en la PCB
    Base) para arrancar el equipo [F4].


    En la PCB Base, el conector de batería está identificado como componente **11
    (Conector Batería)**, y el fusible de baterías como componente **10 (Fusible Baterías)**
    [F2][F3].


    ---


    Fuente: 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB IT
    (sin revisión registrada)


    También puedo ayudarte con: **conexionado del bucle analógico**, **puesta en marcha
    y verificación del sistema** o **configuración inicial desde teclado** de la CAD-150-8.'
