  bot_answer: 'La pregunta menciona "lazos de la central Morley ZXe", pero los fragmentos
    disponibles son del manual de la **ZXAE/ZXEE**, no de la ZXe. Dicho esto, los
    fragmentos cubren dos tipos de lazos distintos con resistencias de fin de línea
    diferentes:


    ---


    ## Resistencias de fin de línea según tipo de lazo


    ### Lazos analógicos (detectores y módulos)

    El manual de la ZXAE/ZXEE **no especifica resistencia de fin de línea para los
    lazos analógicos** [F4]. El lazo analógico trabaja con comunicación digital a
    dos hilos y la verificación de instalación se realiza midiendo resistencia de
    lazo (máximo **36 Ohmios** con un extremo puenteado) [F4], pero no se menciona
    RFL en este tipo de lazo.


    ### Salidas de sirenas convencionales

    - **RFL: 6.800 Ohmios (6K8 Ω), 0,5 W mínimo** [F2][F3]

    - Se instala entre **+** y **−** de la última sirena del circuito [F2]

    - Si no hay sirenas conectadas, la RFL se coloca directamente en los terminales
    de salida de la central [F2]

    - ⚠️ No realizar ramales en la línea de sirenas, ya que los ramales paralelos
    no quedan supervisados [F3]


    ### Lazo periférico RS-485

    - **RFL: 150 Ohmios, 0,5 W mínimo**, en cada extremo del lazo [F1]

    - Aplicable cuando el lazo periférico se instala en **lazo abierto** [F1]

    - Cable apantallado obligatorio, conectado a tierra adecuada [F1]


    ---


    ⚠️ **Nota importante:** Los fragmentos disponibles corresponden a la **ZXAE/ZXEE**
    (manual MIE-MI-310), no a la ZXe. Si tu central es específicamente la **ZXe**,
