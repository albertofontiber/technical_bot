  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en lo esencial: salidas supervisadas, 2/4 circuitos, 1 A,
    polaridad, diodo y RFL de 6K8 0,5 W al final de línea. Pero confunde la referencia
    principal ZXe/ZX2e-ZX5e con ZXAE/ZXEE, aporta datos de terminales/consumo dudosos
    y no se ajusta plenamente al manual esperado.'
  bot_sources:
  - MIE-MI-310
  bot_answer: "# Conexionado de sirenas convencionales en salidas de sirena — Morley\
    \ ZXe (ZXAE/ZXEE)\n\n## Datos generales de las salidas\n\n- La **ZXAE** dispone\
    \ de **2 salidas supervisadas** para campanas convencionales: **Salida A y Salida\
    \ B** [F2]\n- La **ZXEE** dispone de **4 salidas supervisadas**: **Salidas A,\
    \ B, C y D** [F2]\n- Corriente máxima por circuito: **1 A** [F2]\n- Terminales\
    \ en ZXEE: **TB7** → S,A+ / S,A- / S,B+ / S,C+ / S,D+ / S,D- [F2]\n\n---\n\n##\
    \ Procedimiento de conexionado\n\n1. **Conecta las sirenas en serie/línea** desde\
    \ los terminales + y − de la salida correspondiente. **No hagas ramales paralelos**\
    \ — la supervisión se realiza sobre la línea directa y los ramales no quedan supervisados\
    \ [F1].\n\n2. **Sirenas con polaridad**: conéctalas respetando la polaridad indicada\
    \ (+ y −) [F1].\n\n3. **Campanas/sirenas sin polaridad**: instala un **diodo**\
    \ entre el terminal + y uno de los terminales de alimentación de la campana, para\
    \ evitar consumos durante la supervisión (las bobinas de estas no tienen polaridad)\
    \ [F2].\n\n4. **Resistencia Final de Línea (RFL)**: coloca una resistencia de\
    \ **6.800 Ω (6K8) y mínimo 0,5 W** entre + y − al final de la última sirena [F2].\n\
    \   - Si **no hay sirenas** conectadas en esa salida, conecta la RFL directamente\
    \ en los terminales de la central [F2].\n\n5. **Sección de cable**: no usar sección\
    \ inferior a **1,5 mm²**. Evitar longitudes excesivas para no provocar caídas\
    \ de tensión [F2].\n\n---\n\n## Funcionamiento de la supervisión\n\n- La supervisión\
    \ usa una **corriente inversa** que lee la RFL de 6K8 Ω [F2].\n- En reposo: la\
    \ central supervisa la línea con tensión de polaridad inversa a la de activación\
    \ [F2].\n- En alarma: la corriente circula en sentido normal y la tensión adopta\
    \ la polaridad indicada en los terminales [F2].\n\n---\n\n## Consumo a tener en\
    \ cuenta\n\n- Consumo en alarma por salida de sirenas: **0,018 A por salida**\
    \ (A y B) [F5]\n- Tener en cuenta el consumo total de la central para no exceder\
    \ el límite con todas las sirenas activadas [F2]\n\n---\n\n⚠️ **Advertencia crítica**:\
    \ No realizar ramales en el cableado de sirenas. Los ramales paralelos no quedan\
    \ supervisados y la central no detectará fallos en esos tramos [F1].\n\n---\n\n\
    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)"
