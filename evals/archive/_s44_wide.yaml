- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en que el retardo se programa mediante reglas de causa-efecto
    y tipos de retardo, no como un parámetro global. Pero omite pasos críticos de
    la referencia como borrar la Regla 1 por defecto, definir explícitamente entradas/salidas
    de la regla y advertencias de programación; además dice “seis tipos” pero enumera
    siete, lo que genera imprecisión.
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura dentro de las **reglas
    de causa-efecto**. No existe un único parámetro global de "retardo de alarma principal",
    sino que el retardo se asigna a cada regla de causa-efecto con un **tipo de retardo**
    específico [F1].


    ---


    ### Paso 1 — Acceder a la programación de causa-efecto


    El retardo se define en la **matriz de causa-efecto** (Apéndice 5 del manual de
    configuración) [F1]. Debes editar o crear la regla de causa-efecto correspondiente
    a la salida de alarma principal.


    ---


    ### Paso 2 — Seleccionar el tipo de retardo


    A cada regla se le asigna uno de los siguientes **seis tipos de retardo de salida**
    [F1][F2]:


    - **Fijo**: No se puede silenciar ni ampliar. El tiempo restante NO se muestra
    en pantalla [F2].

    - **Estándar**: Se puede silenciar con SILENCIAR SIRENAS, anular en nivel 2, mostrar
    tiempo restante y finalizar con FIN RETARDO [F2].

    - **No Silenc.**: No se detiene con SILENCIAR SIRENAS, pero sí se puede anular
    en nivel 2 y mostrar tiempo restante [F2].

    - **Est. Ext.**: Igual que Estándar, y además se detiene si se pulsa AMPLIAR RETARDO
    [F2].

    - **RetExtStd**: Igual que Estándar, y además inicia el temporizador de RETARDO
    AMPLIADO [F2].

    - **No Sil. Ext**: No se silencia, pero se detiene con AMPLIAR RETARDO y se puede
    anular en nivel 2 [F2].

    - **SinRetExt**: No se silencia ni se amplía, pero inicia el temporizador de RETARDO
    AMPLIADO [F2].


    ---


    ### Paso 3 — Comportamiento operativo del retardo


    Una vez configurado, cuando se detecta una alarma [F4]:


    1. Se inicia la cuenta atrás del **primer temporizador** (retardo inicial).

    2. El personal autorizado (nivel de acceso 2) puede pulsar **AMPLIAR RETARDO**
    para iniciar un segundo temporizador, normalmente más largo, que anula al primero
    [F4].

    3. Cualquier usuario de nivel 1 puede pulsar **FIN RETARDO** para terminar el
    retardo y activar la condición de alarma completa [F4].

    4. El **LED de RETARDO ACTIVO** se enciende mientras el retardo está en curso
    [F3].


    ---


    ### Paso 4 — Anular/habilitar el retardo en operación


    Desde el menú **Anular/Habilitar → opción 5: Retardo Activación Salidas** (nivel
    de acceso 2) [F3]:


    1. Navega hasta **«5: Retardo Activación Salidas»**.

    2. Pulsa **✓** para cambiar el estado entre HABILITADO y ANULADO.

    3. Pulsa **✕** para salir [F3].


    ---


    ### Paso 5 — Verificar el pulsador AMPLIAR RETARDO


    En el menú de parámetros de la central, el parámetro **«10: Extend Delay Button»**
    permite habilitar o deshabilitar el pulsador AMPLIAR RETARDO, ya que en algunos
    mercados esta función no es requerida [F5].


    ---


    > ⚠️ **Nota importante**: Los fragmentos disponibles describen los **tipos de
    retardo** y su comportamiento, pero **no especifican el procedimiento paso a paso
    para introducir el valor numérico del tiempo de retardo** dentro del editor de
    reglas de causa-efecto. Para ese detalle concreto, consulta el Apéndice 5 completo
    del manual de configuración físico.


    ---


    **Fuente:** Manual de configuración de la central PEARL (997-671-005-3\_Configuration\_ES,
    sin revisión registrada); Manual de funcionamiento PEARL (997-670-005-3\_Operating\_ES,
    sin revisión registrada)


    ---


    También puedo ayudarte con: **borrar o editar una regla de causa-efecto**, **configurar
    coincidencia de detectores antes de activar salidas**, o **gestión de niveles
    de acceso en la PEARL**.'
