  bot_answer: '## Añadir un nuevo detector al lazo en la DXc


    Según los fragmentos disponibles, el procedimiento es el siguiente:


    ### Situación

    Cuando se conecta un nuevo detector al lazo, la central DXc genera automáticamente
    el evento **"EQUIPO NUEVO"**, que indica que se ha detectado un equipo nuevo en
    el lazo [F1].


    ### Procedimiento


    1. **Conecta físicamente el detector** al lazo, respetando las indicaciones de
    cableado: no puentees los terminales, corta el cable en cada conexión para mantener
    la supervisión [F2].


    2. **Asigna una dirección única** al nuevo detector antes de conectarlo. Si dos
    equipos responden a la misma dirección, la central generará el evento **"DOBLE
    DIRECCION"** [F1].


    3. **Realiza una autobúsqueda** desde la central para aceptar el nuevo equipo.
    Esta es la solución indicada para el evento "EQUIPO NUEVO" [F1].


    > ⚠️ Si el nuevo detector es de un **tipo diferente** al que había configurado
    previamente en esa dirección, la central generará el evento **"TIPO EQUIPO CAMBIADO"**.
    En ese caso, deberás hacer la autobúsqueda de nuevo o cambiar el tipo de equipo
    manualmente [F1].


    ---


    ### Nota sobre el procedimiento de autobúsqueda

    Los fragmentos disponibles describen el **resultado** de la autobúsqueda (aceptar
    el nuevo equipo) pero **no detallan paso a paso cómo ejecutarla desde el menú**
    de la central. Para el procedimiento completo de autobúsqueda, consulta el manual
    de configuración de la DXc o contacta con el soporte técnico de Honeywell en **soporteHLSI@Honeywell.com**
