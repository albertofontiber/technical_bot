    ZXe y se apoya en documentación ZXAE/ZXEE, añadiendo información de RS-485 que
    puede confundir. Falta indicar claramente que en ZXe el lazo se cablea como bucle
    cerrado con retorno al panel y supervisión por topología/aisladores.
  bot_sources:
