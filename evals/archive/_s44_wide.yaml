  bot_answer: '# Programación de coincidencia de dos detectores para activar sirena
    — ID3000


    Hay **dos métodos** disponibles en la ID3000 para implementar la coincidencia
    de dos detectores. Te explico ambos:


    ---


    ## MÉTODO 1 — Coincidencia en la Matriz de Control (versiones anteriores)


    Este método comprueba la coincidencia **después** de que el sistema haya entrado
    en estado de alarma [F3].


    ### Pasos en la Matriz de Control:


    **1. Configura el Evento de Entrada:**


    En la pantalla "Edición Evento de Entrada en la Matriz de Control" [F2][F4]:


    - **Categoría:** ALARMA

    - **Evento:** ALARMA

    - Selecciona **"Zona(s) Determinada"** e indica el rango de zona correspondiente

    - Activa la casilla **"Coincidencia de 2 Equipos"** ☑ [F2]


    > ⚠️ La función de coincidencia solo se aplica si la entrada está especificada
    como **ZONA**, **SUBZONA** o **CUALQUIERA** — NO si es un equipo individual o
    una tecla [F1].


    **2. Evita incluir Pulsadores Manuales (MCP) en el grupo de coincidencia** [F1]:


    - **Primera instrucción:** define la entrada de tipo **MCP** como **Simple** (sin
    coincidencia)

    - **Segunda instrucción:** define el tipo de entrada analógica (p.ej. **ANALÓGICA**)
    al que se aplicará la coincidencia. El grupo ANALÓGICO incluye detectores TÉRMICOS,
    IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR [F1]


    **3. Configura el Evento de Salida** [F5]:


    - **Acción:** Activar

    - **Función Especial:** Circuito Sirena 1

    - Selecciona la zona o equipo de destino correspondiente

    - Configura el **Tipo de Retardo** si aplica (Rtrdo. Sirenas)


    ---


    ## MÉTODO 2 — Coincidencia de Equipos a nivel de central (software v4.63+)


    Este método es más avanzado: la central **no entra en alarma** hasta cumplir la
    coincidencia. Mientras tanto, queda en estado de **PRIMERA ALARMA / PREALARMA**
    [F3].


    Los niveles disponibles son [F3]:


    - **Nivel 2:** Dos o más sensores *en la misma zona* ← el más habitual para tu
    caso

    - **Nivel 3:** Dos o más sensores en diferentes zonas, misma central

    - **Nivel 4:** Dos o más sensores en la misma zona o zonas diferentes, misma central

    - **Niveles 5 y 6:** Solo para sistemas de red (multi-central)


    > ⚠️ **Limitaciones importantes** [F3]:

    > - Esta función **solo aplica a sensores**, NO a módulos de entrada

    > - Los módulos siempre actúan con nivel 1 (sin coincidencia, alarma inmediata)

    > - No se pueden configurar coincidencias de más de dos equipos ni combinaciones
    de diferentes tipos de equipo en esta versión


    > ⚠️ **Norma EN54-2: 7.1.4** — No incluyas pulsadores manuales en un grupo de
    coincidencia [F1].


    ---


    ## ¿Qué método usar?


    - Si quieres que la **sirena no suene** hasta confirmar dos detectores → usa el
    **Método 2** (coincidencia a nivel de central, prealarma hasta cumplir criterio)
    [F3]

    - Si el sistema ya está en alarma y quieres condicionar la **activación de la
    salida de sirena** → usa el **Método 1** (Matriz de Control con coincidencia)
    [F1][F2]


    ---


    Fuentes:

    - MCDT190 (sin revisión registrada) — Sección 6.1.5

    - MADT190\_07 (14-12-05) — Edición Evento de Entrada / Salida en Matriz de Control

    - MADT190\_14 (sin revisión registrada) — Anexo ID3000 v4.63, Sección 4 Coincidencia
    de equipos


    ---


    También puedo ayudarte con: **configuración del retardo de sirenas en la Matriz
    de Control**, **programación de prealarma y evacuación** o **restricciones de
    coincidencia en sistemas de red ID3000**.'
