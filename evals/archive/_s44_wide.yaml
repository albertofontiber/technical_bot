  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés disponibles y sus contactos


    El equipo dispone de los siguientes relés [F5]:


    **Relés de alarma:**

    - Relé de alarma C1 (terminales 5-6-7): contactos **NC / C / NA** [F5]

    - Relé de alarma C2 (terminales 8-9-10): contactos **NC / C / NA** — solo disponible
    en modelos de 2 canales [F5]


    **Relés de avería:**

    - Relé de avería C1 (terminales 11-12-13): contactos **NC / C / NA** [F5]

    - Relé de avería AUX. C2 (terminales 14-15-16): contactos **NC / C / NA** — solo
    disponible en modelos de 2 canales [F5]


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Al abrir la puerta de la caja durante el funcionamiento normal, la unidad entra
    en modo de servicio y **el relé de fallo indica una avería** [F3]. Esto implica
    que el relé de avería es de tipo energizado en reposo (fail-safe): ante cualquier
    condición de fallo o pérdida de alimentación, el relé cambia de estado.


    > ⚠️ **Nota importante:** El fragmento disponible describe el comportamiento del
    relé de avería únicamente en el contexto del modo de servicio (apertura de puerta)
    [F3]. El manual no detalla explícitamente el comportamiento ante un corte total
    de alimentación eléctrica en otro apartado de los fragmentos recuperados.


    ---


    ### Resistencia de fin de línea en salidas de sirena


    - **Salida sirena 1** (terminales 17 y 18): resistencia de fin de línea de **47
    kΩ** [F5]

    - **Salida sirena 2** (terminales 19 y 20): resistencia de fin de línea de **47
    kΩ** [F5]


    ---


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC** [F1]

    - **0,5 A a 30 V CA** [F1]


    ---


    > ⚠️ **Aviso de compatibilidad de fragmentos:** La tabla de designaciones de terminales
    (Fragmento 5) proviene del manual del **FAAST LT versión Morley Loop** (`I56-3956-201_ES`),
    no del manual autónomo LT-200 (`I56-6574-005_ES`). Los valores de resistencia
    de fin de línea y la numeración de terminales pueden diferir en la versión autónoma.
    Verifica contra el diagrama de cableado incluido con tu unidad específica.


    ---


