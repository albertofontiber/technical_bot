- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta en señalar obstrucción, orificios sucios y filtro colmatado
    como causas probables, y advierte correctamente sobre no hacer reset inicial con
    el conducto sucio. Pero es incompleto e impreciso: no explica que el ASD535 genera
    un fallo de flujo de aire por desviación respecto al 100%, no indica el diagnóstico
    clave leyendo V01/V02 en %, memoria de eventos E, umbrales/retardo, y mezcla rotura/fuga
    como causa de ''flujo bajo'' cuando correspondería a flujo alto.'
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: '## Alarma intermitente de flujo bajo en ASD535


    ### Causa más probable


    La alarma intermitente de flujo bajo en el **ASD 535** indica que el sistema de
    monitorización del flujo de aire ha detectado una anomalía en el conducto de aspiración
    [F5]. Las causas más habituales según el manual son:


    - **Obstrucción parcial** en los orificios de aspiración o en el conducto de aspiración
    [F1]

    - **Filtro de polvo colmatado** o al final de su vida útil [F1]

    - **Rotura o fuga** en el conducto de aspiración [F5]


    > El manual indica explícitamente que "un sistema de monitorización del flujo
    de aire detecta en cada tubería las obstrucciones y roturas que puedan producirse
    en el conducto de aspiración" [F5].


    ---


    ### Procedimiento de diagnóstico


    1. **Inspección visual del conducto de aspiración**: Revisa toda la tubería de
    PVC rígido o ABS de **25 mm de diámetro exterior / 20 mm de diámetro interior**
    [F5] buscando obstrucciones, aplastamientos o roturas.


    2. **Inspección de los orificios de aspiración**: Comprueba que no estén bloqueados
    por suciedad, polvo u objetos extraños [F1].


    3. **Verificación del estado del filtro**: Consulta en *EasyConfig* la posición
    de conmutador **d > RE** para leer la vida útil restante del filtro [F1]. Si está
    agotado, habrá generado un fallo de tipo **"Fallo de filtro (fin de vida útil)"**
    [F1].


    4. **Limpieza de orificios de aspiración**: Si se detecta suciedad, procede a
    la limpieza. Tras la limpieza, normalmente **no es necesario un reset inicial**
    [F1].


    5. **Sustitución del filtro si procede**: Activa la función **"Sustitución del
    filtro"** pulsando el botón **Reset** o a través de *EasyConfig* o **ASD Config**
    [F1]. El equipo pasará a estado **"Aislar"** durante el proceso [F1].


    ---


    ### ⚠️ Advertencias importantes


    - Si tras los trabajos de mantenimiento es necesario un **reset inicial**, este
    **solo** podrá ejecutarse cuando se tenga la seguridad de que el conducto de aspiración
    está completamente limpio [F1].

    - Si se realiza un reset inicial con orificios obstruidos, **existe riesgo de
    que la detección de humo sea imposible o insuficiente** [F1].

    - Si el problema persiste tras limpieza y sustitución de filtro, puede ser necesaria
    la **sustitución del sensor de flujo de aire** (ver cap. 9.4.3 del manual) [F2].


    ---


    **Fuente:** ASD535_TD_T131192es_h (sin revisión registrada)


    También puedo ayudarte con: **procedimiento completo de sustitución del filtro**,
    **reset inicial paso a paso (cap. 7.3.5)** o **sustitución del sensor de flujo
    de aire (cap. 9.4.3)**.'
