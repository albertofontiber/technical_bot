  bot_answer: "## Notifier PEARL — Lazo SLC: capacidad, aisladores y alta/edición\
    \ de equipos\n\n---\n\n### 1. Capacidad máxima por lazo\n\n- **Máximo 318 equipos\
    \ por lazo analógico**: hasta **159 sensores** y **159 módulos** [F1]\n- Límite\
    \ global del sistema (ambos lazos): **máximo 512 sensores y/o pulsadores manuales**\
    \ para cumplir **EN54-2: 13-7** [F1]\n- En lazos de **protocolo mixto Opal + CLIP**,\
    \ el límite de equipos CLIP es **40**; si se supera, la autoconfiguración continúa\
    \ pero señala fallos [F5]\n- Un lazo **solo CLIP** admite hasta **99 sensores\
