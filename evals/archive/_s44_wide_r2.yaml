- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó en lo esencial: el retardo se configura mediante reglas de
    causa-efecto y no como un único parámetro global. Pero la respuesta es incompleta
    frente a la referencia: no menciona borrar la Regla 1 por defecto, ni el procedimiento
    de creación de regla entrada/salida, ni las consideraciones de zona/equipo, horarios
    y EN54; además enumera siete tipos aunque afirma que son seis, lo que introduce
    imprecisión.'
  bot_sources:
  - 997-670-005-3_Operating_ES
  - 997-671-005-3_Configuration_ES
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura dentro de las **reglas
    de causa-efecto**. No existe un único parámetro global de "retardo de alarma principal",
    sino que el retardo se asigna a cada regla de causa-efecto individualmente, eligiendo
    uno de los **seis tipos de retardo** disponibles [F1].


    ---


    ### Tipos de retardo disponibles


    Los seis tipos son [F1][F2]:


    - **Fijo**: No permite silenciar sirenas durante el retardo, no muestra cuenta
    atrás, no puede anularse.

    - **Estándar**: Permite silenciar sirenas durante el retardo, muestra cuenta atrás
    en pestaña ALARMA, puede anularse con «Anular retardos» (nivel acceso 2) o con
    tecla FIN RETARDO.

    - **No Silenc.**: No permite silenciar sirenas, pero sí muestra cuenta atrás y
    permite anular el retardo.

    - **Est. Ext.**: Igual que Estándar, y además la salida se detiene si se pulsa
    AMPLIAR RETARDO.

    - **RetExtStd**: Igual que Estándar, y además el temporizador comienza en RETARDO
    AMPLIADO.

    - **No Sil. Ext**: No permite silenciar sirenas, pero sí detiene la salida al
    pulsar AMPLIAR RETARDO.

    - **SinRetExt**: No permite silenciar sirenas, pero el temporizador comienza en
    RETARDO AMPLIADO.


    ---


    ### Dónde se configura


    El retardo se asigna en la **programación de causa-efecto** (Apéndice 5 del manual
    de configuración) [F1]. Cada regla de causa-efecto puede tener asignado uno de
    los tipos anteriores.


    ---


    ### Parámetro adicional: habilitar/deshabilitar el pulsador AMPLIAR RETARDO


    Desde los **parámetros de la central**, opción **10: Extend Delay Button**, se
    puede habilitar o deshabilitar el pulsador AMPLIAR RETARDO [F5]:


    - Ruta: Menú de configuración → *Editar Parámetros de la Central* → parámetro
    **10: Extend Delay Button**

    - Valores posibles: **Enabled / Disabled** [F5]


    > ⚠️ Esta opción desactiva físicamente el pulsador AMPLIAR RETARDO. Algunos mercados
    no requieren esta función [F5].


    ---


    ### Anular/habilitar retardos en operación (nivel acceso 2)


    Una vez configurado, el retardo puede anularse temporalmente desde el menú de
    operación [F3]:


    1. Accede al **Menú Anular/Habilitar** (nivel de acceso 2).

    2. Selecciona **«5: Retardo Activación Salidas»**.

    3. Pulsa **✓** para cambiar entre estado HABILITADO / ANULADO.

    4. Pulsa **✕** para salir.


    ---


    ### ⚠️ Limitación de los fragmentos disponibles


    Los fragmentos recuperados **no incluyen el procedimiento paso a paso para crear
    o editar una regla de causa-efecto con su valor de tiempo de retardo** (duración
    en segundos/minutos). Para configurar el valor numérico del retardo dentro de
    una regla, consulta el **Apéndice 5 completo** del manual de configuración.


    ---


    **Fuente:** Manual de configuración de la central PEARL, ref. 997-671-005-3\_Configuration\_ES
    (sin revisión registrada); Manual de funcionamiento PEARL, ref. 997-670-005-3\_Operating\_ES
    (sin revisión registrada).


    ---


    También puedo ayudarte con: **borrar o editar una regla de causa-efecto**, **comportamiento
    de las teclas AMPLIAR RETARDO y FIN RETARDO en operación**, o **tipos de salida
    compatibles con retardo en la PEARL**.'
- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: La respuesta incluye los puntos esenciales de conexión (polaridad,
    supervisión con polaridad inversa, diodo, RFL 6K8/0,5 W y límite de 1 A), por
    lo que sería útil en parte. Sin embargo responde sobre ZXAE/ZXEE y no sobre Morley
    ZXe ZX2e/ZX5e, cita terminales/manual no aplicables y añade datos dudosos como
    el consumo de 0,018 A, lo que puede confundir al técnico.
  bot_sources:
  - MIE-MI-310
  bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — ZXAE/ZXEE


    ## Información general de las salidas


    La **ZXAE** dispone de **2 salidas supervisadas** (Salida A y B) y la **ZXEE**
    dispone de **4 salidas supervisadas** (Salida A, B, C y D) para sirenas convencionales
    [F2].


    - Corriente máxima por circuito: **1 A** [F2]

    - Resistencia Final de Línea (RFL): **6.800 Ω, 0,5 W mínimo** [F2]

    - Terminales en ZXEE: **TB7** → S,A+ / S,A- / S,B+ / S,C+ / S,D+ / S,D- [F2]


    ---


    ## Procedimiento de conexionado


    1. **Conecta las sirenas en serie topológica** (línea directa desde la central
    hasta la última sirena), respetando la polaridad + / − de cada sirena [F1].


    2. **Respeta la polaridad**: las sirenas con polaridad se conectan con el terminal
    **+** al conductor positivo y el **−** al negativo [F1].


    3. **Sirenas sin polaridad (campanas)**: instala un **diodo** entre el terminal
    **+** de la salida y uno de los terminales de alimentación de la campana. Esto
    evita consumos durante la supervisión, ya que las bobinas de estas campanas no
    tienen polaridad [F2].


    4. **Instala la RFL al final de la línea**: coloca la resistencia de **6.800 Ω
    / 0,5 W mínimo** entre **+** y **−** de la última sirena de la línea [F2].


    5. **Si no hay sirenas instaladas** en una salida: conecta la RFL directamente
    entre **+** y **−** en el terminal de la central [F2].


    6. **No realices ramales (derivaciones paralelas)**: la supervisión se realiza
    en la línea directa hasta la RFL. Los ramales paralelos no podrán ser supervisados
    [F1].


    ---


    ## Advertencias importantes


    > ⚠️ **Sección de cable mínima: 1,5 mm²**. Secciones inferiores o longitudes excesivas
    pueden provocar caídas de tensión importantes en la línea [F2].


    > ⚠️ **Corriente de supervisión inversa**: la supervisión usa una pequeña tensión
    con polaridad inversa a la de activación. Al activarse la salida, la corriente
    circula en sentido normal [F2].


    > ⚠️ **Consumo total**: ten en cuenta el consumo total de la central para no exceder
    el límite con todas las sirenas activadas. Consumo de referencia por salida en
    alarma: **0,018 A** [F5].


    ---


    **Fuente:** Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)'
