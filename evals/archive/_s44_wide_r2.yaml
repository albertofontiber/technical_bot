- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta las salidas de relé NC-C-NA, las salidas de sirena con 47
    kΩ y los valores eléctricos principales. Pero falla en un punto clave al decir
    que no consta el comportamiento ante corte de alimentación: el relé de avería
    es failsafe y se desenergiza también sin alimentación; además omite que la avería
    no está enclavada y la vida útil mínima de 10^5 operaciones.'
  bot_sources:
  - I56-3956-201_ES Morley Loop FAAST LT QIG
  - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG
  bot_answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés de alarma


    El equipo dispone de **2 relés de alarma** (uno por canal) [F4]:


    - Terminal 5 → **Relé de alarma NC — Canal 1**

    - Terminal 6 → **Relé de alarma C — Canal 1**

    - Terminal 7 → **Relé de alarma NA — Canal 1**

    - Terminal 8 → **Relé de alarma NC — Canal 2**

    - Terminal 9 → **Relé de alarma C — Canal 2**

    - Terminal 10 → **Relé de alarma NA — Canal 2**


    > Los terminales CH2 (canal 2) solo están disponibles en modelos de 2 canales
    [F4].


    ---


    ### Relés de avería


    El equipo dispone de **2 relés de avería** [F4]:


    - Terminal 11 → **Relé de avería NC — Canal 1**

    - Terminal 12 → **Relé de avería C — Canal 1**

    - Terminal 13 → **Relé de avería NA — Canal 1**

    - Terminal 14 → **Relé de avería NC (AUX.) — Canal 2**

    - Terminal 15 → **Relé de avería C (AUX.) — Canal 2**

    - Terminal 16 → **Relé de avería NA (AUX.) — Canal 2**


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    Cuando se abre la puerta frontal de la unidad durante el funcionamiento normal,
    la unidad entra en modo de servicio: **el relé de fallo indica una avería** [F3].
    Este mismo comportamiento se produce ante cualquier condición de avería detectada.


    > ⚠️ El manual no especifica explícitamente el estado del relé de avería ante
    un corte total de alimentación (energizado/desenergizado en reposo). Los fragmentos
    disponibles solo describen el comportamiento en modo de servicio (apertura de
    puerta) [F3].


    ---


    ### Salidas de sirena y resistencia de fin de línea


    El equipo dispone de **2 salidas de sirena** [F4]:


    - Terminal 17 → **Salida sirena 1 −**

    - Terminal 18 → **Salida sirena 1 +**

    - Terminal 19 → **Salida sirena 2 −**

    - Terminal 20 → **Salida sirena 2 +**


    Resistencia de fin de línea: **47 kΩ** en cada salida de sirena (sirena 1 y sirena
    2) [F4].


    ---


    ### Especificación eléctrica de los contactos de relé


    - **2,0 A a 30 V CC**

    - **0,5 A a 30 V CA**


    [F1]


    ---


    Fuente: I56-6574-005_ES - HS Stand Alone FAAST LT-200 QIG (sin revisión registrada);
    I56-3956-201_ES Morley Loop FAAST LT QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **diagrama de cableado completo de terminales**, **configuración
    de la entrada configurable (rearme)** o **pruebas funcionales del FAAST LT-200**.'
