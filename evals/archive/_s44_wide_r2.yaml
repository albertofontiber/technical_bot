  bot_answer: '## Test anual del detector VESDA-E VEP


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido**, las tareas que deben
    realizarse **una vez al año** son las siguientes [F1] [F2]:


    - **Realizar una prueba de humos** para comprobar la integridad de la red de Tubería

    - **Comprobar el flujo** de la red de Tubería

    - **Limpiar los puntos de muestreo**

    - **Limpiar con agua la red de Tubería**


    ---


    ### Sobre la prueba de humos anual


    La prueba de humos consiste en introducir una muestra de humo en el **orificio
    de muestreo más alejado** y medir el tiempo que tarda en llegar al detector [F3].
    Los resultados se registran y se comparan con pruebas posteriores para detectar
    variaciones del sistema [F3].


    Para el procedimiento detallado de la prueba de humos, el manual remite a la **VESDA-E
    Commissioning Guide (Guía de puesta en marcha de VESDA-E)** [F3].


    ---


    ### ⚠️ Precauciones obligatorias antes de realizar cualquier prueba [F1] [F2]


    1. **Informar a la autoridad supervisora adecuada** antes de comenzar.

    2. **Aislar todos los dispositivos** que dependan del detector antes de ponerlo
    en funcionamiento.

    3. Seguir los **procedimientos del sitio** para evitar falsas alarmas en los servicios
    supervisados.


    > Cuando el detector está deshabilitado o en espera, **no emitirá advertencias
    de fuego**.


    ---


    ### Nota sobre quién puede realizar el mantenimiento [F1] [F2]


    Puede realizarlo el **instalador original**, un **distribuidor autorizado** o
    el **contratista de servicio**. La frecuencia puede variar según los códigos y
    normas locales y el entorno de instalación.


    ---


