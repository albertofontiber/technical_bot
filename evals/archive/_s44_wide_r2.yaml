  bot_answer: '## Rango de temperatura de funcionamiento — ASD 535


    Según los datos técnicos del manual [F1], los rangos de temperatura son:


    **Caja del detector:**

    - Rango estándar: **–30 °C hasta +60 °C** [F1]

    - Según norma UL: máximo **+40 °C** [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]


    **Conducto de aspiración:**

    - Rango estándar: **–30 °C hasta +60 °C** [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]


    **Temperatura de almacenamiento** (caja del detector, sin condensación):

    - **–30 °C hasta +70 °C** [F1]


    ---


    **Consideraciones adicionales importantes:**


    - La fluctuación de temperatura máxima permitida durante el funcionamiento (tanto
    en caja como en conducto) es de **20 °C** [F1]. Si se superan estas oscilaciones,
    pueden ser necesarios ajustes especiales (ventana de flujo de aire más grande,
    mayor tiempo de retardo, etc.) [F4].

    - En recintos con temperatura ambiente superior a **50 °C** o humedad superior
    al **80 % H rel.**, puede ser necesario instalar tramos de refrigeración en el
    conducto de aspiración [F5].

    - Para uso en **almacenes de ultracongelación**, el rango de temperatura queda
    restringido a **–30 °C hasta 0 °C**, y debe seguirse la directriz T 131 390 [F2].


    ---


    Fuente: ASD535_TD_T131192es_h (sin revisión registrada)


