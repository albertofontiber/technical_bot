    \ en estado de alarma [F4].\n\n### Pasos en la Matriz de Control:\n\n1. **Accede\
    \ a la Matriz de Control** y edita el evento de entrada correspondiente a la zona\
    \ de sirenas.\n\n2. En la pantalla \"Edición Evento de Entrada\", selecciona la\
    \ opción **\"Zona(s) Determinada\"** e indica el rango de zona que quieres supervisar\
    \ [F2].\n\n3. Activa la casilla **\"Coincidencia de 2 Equipos\"** [F2][F3] — esto\
    \ exige que dos equipos de esa zona estén en alarma antes de que se active la\
    \ salida.\n\n4. **Restricción crítica** ⚠️: Esta función solo se aplica si la\
    \ entrada está especificada como **'ZONA'**, **'SUBZONA'** o **'CUALQUIERA'**.\
    \ No aplica si la entrada es un equipo individual o una tecla [F1].\n\n5. **No\
    \ incluyas pulsadores manuales (MCP) en el grupo de coincidencia** — requisito\
    \ de **EN54-2: 7.1.4** [F1]. Para evitarlo, programa **dos instrucciones** en\
    \ la Matriz de Control:\n   - **Primera instrucción**: define la entrada tipo\
    \ **'Pulsador Manual' (MCP)** como **'Simple'** (sin coincidencia) [F1].\n   -\
    \ **Segunda instrucción**: define el tipo de entrada analógica (p.ej. **'ANALÓGICA'**)\
    \ al que se aplicará la coincidencia. El grupo ANALÓGICO incluye detectores **TÉRMICOS,\
    \ IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR** [F1].\n\n6. En el evento de salida, configura\
    \ la acción como **\"Activar\"** sobre el **\"Circuito Sirena\"** correspondiente\
    \ [F5].\n\n---\n\n## MECANISMO 2 — Coincidencia de Equipos a nivel de central\
    \ (software v4.63 o superior)\n\nEste método es más avanzado: la central **no\
    \ entra en alarma** hasta que se cumple la coincidencia. Mientras tanto, el sistema\
    \ queda en estado de **PRIMERA ALARMA / PREALARMA** [F4].\n\n- Cumple **EN54-2:\
    \ párrafo 7.12.2 Tipo B dependencia** [F4].\n- Los niveles de coincidencia disponibles\
    \ son [F4]:\n  - **Nivel 2**: dos o más sensores en la misma zona.\n  - **Nivel\
    \ 3**: dos o más sensores en diferentes zonas, misma central.\n  - **Nivel 4**:\
    \ dos o más sensores en la misma zona o zonas diferentes, misma central.\n  -\
    \ **Nivel 5/6**: aplican a sistemas de red (varias centrales).\n- **Limitaciones**\
    \ [F4]:\n  - No aplica a módulos de entrada (nivel efectivo siempre = 1, alarma\
    \ inmediata).\n  - No se pueden configurar coincidencias de más de dos equipos\
    \ ni combinaciones de diferentes tipos de equipo en esta versión de software.\n\
    - El **LED de ALARMA rojo no se iluminará** hasta que se cumpla la coincidencia\
    \ [F4].\n\n---\n\n## ¿Cuál usar?\n\n- Si quieres que la **sirena no suene** hasta\
    \ tener dos detectores en alarma y la central tampoco entre en alarma: usa el\
    \ **Mecanismo 2** (coincidencia a nivel de central, nivel 2) [F4].\n- Si quieres\
    \ que la **salida de sirena** espere la coincidencia pero la central ya gestione\
    \ el estado de alarma internamente: usa el **Mecanismo 1** (Matriz de Control)\
    \ [F1][F2].\n\n---\n\nFuentes:\n- MCDT190 (sin revisión registrada) — Sección\
    \ 6.1.5\n- MADT190_07 (sin revisión registrada) — Sección Edición Evento de Entrada\
    \ / Editar Evento de Salida\n- MADT190_14 (sin revisión registrada) — Sección\
    \ 4 Coincidencia de equipos (software v4.63)\n\n---\n\nTambién puedo ayudarte\
