  bot_answer: '## Desactivación de detector individual en CCD-103


    Los fragmentos disponibles del manual de la **CCD-103** no describen un procedimiento
    para desactivar un detector **individualmente** dentro de una zona.


    Lo que sí documenta el manual es la **desactivación por zona completa**:


    - Con las **teclas de zona (A)**, una primera pulsación pone la zona en **modo
    prueba**, y una segunda pulsación pone la zona en **modo desconexión** [F1].

    - En estado de desconexión se activa el **indicador de anular** y el correspondiente
    **indicador de fallo/anular/prueba** [F1].

    - Para que las pulsaciones de las teclas de zona tengan efecto, la **llave de
    bloqueo de teclado (G)** debe estar en posición **abierta** [F1].


    La CCD-103 es una central **convencional con 3 zonas** [F3], y la arquitectura
    de conexionado muestra detectores en serie dentro de cada zona con una **resistencia
    de final de línea de 4K7** [F2][F3]. El manual no especifica ningún mecanismo
    de direccionamiento o desactivación individual de detector dentro de una zona.


    **El manual no especifica un procedimiento para desactivar un detector individual
    sin afectar al resto del lazo.** Los fragmentos disponibles solo cubren desconexión
    a nivel de zona completa.


    Para este requerimiento, consulta directamente el manual completo de la CCD-103
    o el soporte técnico de Detnov, ya que puede requerir una solución física en el
    cableado de la zona.


