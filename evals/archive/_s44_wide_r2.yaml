- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en que el rearme debe hacerse en nivel 2 y que pueden quedar
    averías enclavadas, pero omite comprobaciones clave como Abort, Flow Press, t.A
    y zonas en alarma. Además describe de forma incorrecta el parámetro de inhibición
    de rearme r.1/ri y sus valores por defecto, lo que puede confundir al técnico.
  bot_sources:
  - HLSI-BT-001
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103_RP1r-Supra_lr
  - MIEMN570I
  bot_answer: '## RP1r-Supra: Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento es esperado y está regulado por norma. Aquí tienes los puntos
    clave a comprobar:


    ---


    ### 1. Estado "Extinción Realizada" — comportamiento normal


    Tras la descarga, la central entra en **estado fin extinción** [F2]:

    - El temporizador de disparo queda fijo en **00 seg.**

    - El LED "Extinción realizada" permanece iluminado de forma **fija**

    - Los relés de salida de solenoides se **desactivan**


    Este estado **no desaparece solo** con un simple reset.


    ---


    ### 2. Parámetro **ri** — Resumen inhibido tras extinción (causa más probable)


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F1], tras la extinción
    el sistema pasa a **estado inhibido** para evitar reiniciar el proceso de extinción.
    El parámetro **ri** controla este comportamiento [F1]:


    - **ri = 00** (por defecto): el sistema pasa a "resumen inhibido" al finalizar
    la extinción o al agotar el tiempo configurado.

    - **ri = 01 a 30**: el sistema pasa a "resumen inhibido" tras ese número de minutos,
    o cuando se produce intervención/reposición.


    **Comprueba:** ¿Ha transcurrido el tiempo configurado en **ri**? ¿Se ha realizado
    la intervención/reposición física del agente extintor?


    ---


    ### 3. Rearme manual obligatorio


    Para llevar a cabo el rearme, es necesario acceder a **nivel 2** [F3] y pulsar
    la tecla **"Rearme"**. Esta acción reinicia la central y restablece todas las
    entradas enclavadas [F3].


    > ⚠️ **Importante:** Por defecto, **todas las averías son enclavadas y requieren
    rearme manual** [F3]. El rearme automático solo es posible si se ha configurado
    mediante las funciones especiales (sección *5.4 Funciones especiales*) [F3].


    ---


    ### 4. Fallo de sistema al rearmar


    Si al rearmar aparece indicación de **FALLO DE SISTEMA** [F4]:

    - Es causado por el microprocesador principal tardando en inicializar, o por lecturas
    de tensión fuera de rango.

    - **Solución:** Realizar un nuevo rearme. La avería desaparece tras el rearme
    correcto [F4].

    - ⚠️ Si no se rearma, la central **no realizará el proceso de extinción** al considerar
    que no funciona correctamente [F4].


    ---


    ### Secuencia de comprobación recomendada:


    1. Verificar que el tiempo del parámetro **ri** ha transcurrido o que se ha repuesto
    el agente extintor [F1].

    2. Acceder a **nivel 2** con código o llave [F3].

    3. Pulsar tecla **"Rearme"** [F3].

    4. Si aparece "Fallo de sistema", realizar un segundo rearme [F4].

    5. Verificar que solo queda encendido el LED verde de alimentación y el LED de
    **Automático** como estado normal.


    ---


    Fuente: HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada); HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
    (sin revisión registrada); HLSI-BT-001 Boletín técnico (04/11/2011)


    ---


    También puedo ayudarte con: **configuración del parámetro ri**, **acceso a nivel
    2 y secuencia de código**, o **funciones especiales para rearme automático de
    averías**.'
