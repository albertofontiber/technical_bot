    \ (añadir, borrar, mover)\n\nDesde el **nivel de acceso 3** [F4]:\n\n- **Añadir\
    \ o borrar un equipo de lazo** → Sección **«4.2 Edición de equipos»** del manual\
    \ de configuración [F4]\n- **Mover un equipo a otra zona** → Sección **«4.2 Edición\
    \ de equipos»** [F4]\n- **Editar texto del equipo** → Sección **«5.2 Edición de\
