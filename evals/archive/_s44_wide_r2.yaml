  - Manual usuario CAD-250 (MU 376 es 2024 f)
  bot_answer: '## Acceso al menú de programación avanzada — CAD-250


    El acceso a la configuración avanzada se realiza en dos pasos: primero acceder
    como administrador y luego navegar al submenú **AVANZADO**.


    ---


    ### Paso 1 — Acceder como administrador


    1. Desde la **PANTALLA DE REPOSO**, toca el icono del candado (🔒) [F1][F5].

    2. Se abrirá la **PANTALLA DE ACCESO** solicitando contraseña [F1].

    3. Introduce la **clave de administrador por defecto: 2222** [F1].


    > ⚠️ El uso indebido del nivel de administrador puede provocar un mal funcionamiento
    de la instalación. Asegúrate de tener la autorización necesaria [F1].


    ---


    ### Paso 2 — Navegar al submenú AVANZADO


    Una vez dentro de la pantalla de administrador, la ruta es [F4]:


    **AJUSTES** (Menú principal) → **AVANZADO** (Submenú)


    El menú principal se encuentra en la columna izquierda de la pantalla, y el submenú
    en la columna derecha [F3]. Los submenús disponibles bajo **AJUSTES** son: GENERAL,
    VERSIONES, USUARIOS, **AVANZADO**, CONECTIVIDAD, IMPRESORA, LOGS, TEST e INICIO
    [F4].


    ---


    > 📄 **Nota:** Para una descripción detallada de todas las opciones de configuración
    avanzada, el manual remite a la **Guía Avanzada de Configuración** [F1].


    ---


    **Fuente:** Manual instalacion CAD-250 (MI\_372\_es\_2024 e) — sin revisión registrada;
    CAD-250-MC-380-es — sin revisión registrada; Manual usuario CAD-250 (MU 376 es
