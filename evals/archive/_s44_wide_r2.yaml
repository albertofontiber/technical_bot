    \n- **Máximo 32 equipos entre aisladores** según EN54-2 [F1]\n- Para **equipos\
    \ sin aisladores internos** (protocolo CLIP y algunos Opal): **NO más de 20 equipos\
    \ entre aisladores** [F1]\n- Para **equipos con aisladores internos** (usados\
    \ con base **B501 AP**): el lazo cumple directamente los requisitos de EN54-2\
    \ [F1]\n- La mayoría de equipos Opal tienen **aisladores internos FET**; con bases\
    \ compatibles Opal, el aislador se conecta a los terminales **+2 y +4** en el\
    \ extremo positivo [F1]\n- ⚠️ Para que los aisladores se cierren al aplicar alimentación,\
    \ la **carga entre aisladores no debe superar 20 SU** [F2]\n- ⚠️ **NUNCA usar\
    \ multímetro de alta tensión (tipo Megger) en el lazo**; usar solo multímetros\
    \ de baja tensión. Si hay aisladores instalados, el conductor positivo (+) del\
    \ lazo estará en circuito abierto [F1]\n\n---\n\n### 3. Alta de equipos: Autoconfiguración\
    \ desde la central\n\nEl procedimiento se realiza desde el **nivel de acceso 3**\
    \ [F4]:\n\n1. Accede al menú de configuración y selecciona **1: Autoconfiguración**\
    \ [F3]\n2. Elige si aplica a **todos los lazos** o a un **lazo específico** [F3]\n\
    3. Selecciona el modo de autoconfiguración [F3] [F5]:\n   - **1: Todos Prot. OPAL/CLIP**\
    \ → detecta duplicidades de dirección ✓ (recomendado)\n   - **2: OPAL/CLIP (No\
    \ detecta duplicidad)** → más rápido, sin comprobación de duplicados\n   - **3:\
    \ Sólo con protocolo CLIP** → solo autoconfigura equipos CLIP aunque haya Opal\
    \ en el lazo\n4. Selecciona el modo de gestión de equipos [F5]:\n   - **1: Permite\
    \ Añadir/Borrar/Cambiar**\n   - **2: Sólo Añadir Nuevos Equipos**\n5. El proceso\
    \ se inicia automáticamente. Sensores y módulos (Opal y CLIP) se detectan en la\
    \ **misma pasada** [F3]\n6. Al finalizar, los resultados se muestran en pantalla\
    \ LCD por lazo. Usa las teclas **◁/▷** para navegar entre lazos [F5]\n7. Los equipos\
    \ configurados pueden consultarse en cualquier momento desde **nivel de acceso\
    \ 2 → «Resumen de Equipos»** [F3]\n\n> **Nota:** Si se autoconfigura un equipo\
    \ Opal, por defecto será Opal. Si los equipos CLIP superan 40, selecciona manualmente\
