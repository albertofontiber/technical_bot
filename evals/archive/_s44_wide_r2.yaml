- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó en señalar como causa probable una obstrucción parcial/orificios
    o filtro sucio y en recomendar inspección y consulta de memoria de eventos. Pero
    omite el diagnóstico clave leyendo el valor de flujo en V01/V02 en %, no explica
    ventana/retardo de fallo de flujo, incluye erróneamente rotura/fuga como causa
    de flujo bajo y da indicaciones discutibles sobre el reset inicial tras corregir
    la causa.
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: '## Alarma intermitente de flujo bajo en ASD535


    ### Causa más probable


    La alarma intermitente de flujo bajo en el **ASD 535** indica que el sistema de
    monitorización del flujo de aire ha detectado una anomalía en el conducto de aspiración
    [F5]. Las causas más probables son:


    - **Obstrucción parcial** en los orificios de aspiración o en el conducto de aspiración
    [F1]

    - **Filtro de polvo colmatado** o al final de su vida útil [F1]

    - **Rotura o fuga** en el conducto de aspiración [F5]

    - **Unidad de ventilación (AFU 35) defectuosa** o degradada [F4]


    > El manual indica explícitamente que si los orificios de aspiración están obstruidos,
    la toma de muestras puede resultar imposible o insuficiente [F1].


    ---


    ### Procedimiento de diagnóstico


    1. **Inspección visual del conducto de aspiración**: Revisa toda la tubería de
    PVC rígido o ABS de **25 mm de diámetro exterior / 20 mm de diámetro interior**
    [F5] buscando obstrucciones, aplastamientos o roturas.


    2. **Comprobación de los orificios de aspiración**: Verifica que los orificios
    no estén bloqueados por suciedad, polvo o cuerpos extraños. Si están obstruidos,
    procede a limpiarlos [F1].


    3. **Revisión del filtro**: Comprueba el estado del elemento de filtro. Si está
    al final de su vida útil, el ASD habrá generado o generará un fallo de «Fallo
    de filtro (fin de vida útil)» [F1]. La vida útil restante puede leerse en *EasyConfig*
    en la posición de conmutador **d > RE** [F1].


    4. **Verificación de la unidad de ventilación (AFU 35)**: Si los pasos anteriores
    no resuelven el problema, considera que el ventilador puede estar degradado. La
    sustitución de la AFU 35 requiere desmontar el **Main Board AMB 35** [F4].


    5. **Consulta la memoria de eventos**: El ASD 535 dispone de memoria de eventos
    accesible desde la unidad de control (sección **8.5.3** del manual) [F2], que
    puede ayudar a identificar el historial y la frecuencia del fallo.


    ---


    ### Acciones correctivas según causa


    - **Orificios obstruidos** → Limpiar. Normalmente no requiere reset inicial tras
    la limpieza [F1].

    - **Filtro colmatado** → Sustituir el filtro activando la función «Sustitución
    del filtro» (botón Reset o vía *EasyConfig* / «ASD Config»). El ASD pasará a estado
    «Aislar» durante el proceso [F1].

    - **Ventilador defectuoso** → Sustituir la AFU 35. **Tras la sustitución es imprescindible
    realizar un nuevo reset inicial** (cap. 7.3.5) [F4].


    ---


    ⚠️ **Advertencia**: La sustitución de componentes (sensores de humo, sensores
    de flujo de aire, ventilador) solo puede realizarse **sin tensión**, desconectando
    los bloques de bornes 1/2 y, en su caso, 3/4 del AMB 35 [F1].


    ---


    **Fuente:** ASD535_TD_T131192es_h (sin revisión registrada)'
