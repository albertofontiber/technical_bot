  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PASS
  diagnostico: La respuesta cubre correctamente quién puede cambiar cada nivel, el
    procedimiento en la central, longitud del código, confirmación, mensaje final
    y sincronización/copia en la nube. Solo omite la nota sobre que CLSS portal/app/configurador
    comparten usuario/código/contraseña, pero no afecta de forma relevante a la configuración
    solicitada.
  bot_sources:
  - HOP-138-8ES  issue 6_01-2026_Co
  - HOP-338-9ES issue 4_01-2026_Op
  bot_answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE
    E10/E15


    ---


    ## Consideraciones previas


    - La contraseña debe tener entre **4 y 8 dígitos** [F1][F2].

    - El código de fábrica del Nivel 2 es **"22222222"** [F3]. Se recomienda cambiarlo
    [F3].

    - Si estás en Nivel 2, solo puedes cambiar la contraseña de **Nivel 2**. Si estás
    en Nivel 3, puedes cambiar la de **Nivel 2 o Nivel 3** [F1].

    - Tras 5 minutos de inactividad en Nivel 2, la central cierra sesión automáticamente
    y vuelve a Nivel 1 [F3].


    ---


    ## Cambio de contraseña de Nivel 2 (desde usuario Nivel 2)


    1. Selecciona el **icono del menú** ① y accede a **"Configuración"** ② [F2].

    2. Inicia sesión como usuario de **Nivel de Acceso 2** [F2].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F2].

    4. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y el cursor parpadee
    ⑤ [F2].

    5. Pulsa el **icono del ojo** ⑥ si quieres visualizar la entrada [F2].

    6. Introduce el nuevo código de acceso (4–8 dígitos) con el teclado ⑦ [F2].

    7. Confirma pulsando el símbolo **✓** ⑧ [F2].

    8. Repite los pasos 3 a 7 para confirmar el código [F2].


    ---


    ## Cambio de contraseña de Nivel 2 y/o Nivel 3 (desde usuario Nivel 3)


    1. Selecciona el **icono del menú** ① y accede a **"Ajustes"** ② [F1].

    2. Inicia sesión como usuario de **Nivel de Acceso 3** [F1].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F1].

    4. Selecciona el nivel a modificar (**Nivel 2 o Nivel 3**) en el desplegable ④
    y comprueba que el cursor parpadea ⑤ [F1].

    5. Pulsa el **icono del ojo** ⑥ si quieres visualizar la entrada [F1].

    6. Introduce el nuevo código de acceso (4–8 dígitos) con el teclado ⑦ [F1].

    7. Confirma pulsando el símbolo **✓** ⑧ [F1].

    8. Repite los pasos 4 a 7 para confirmar el código [F1].

    9. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1].

    10. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    ---


    > ⚠️ Asegúrate de que los códigos de acceso se mantienen seguros y solo los usuarios
    autorizados los conozcan [F3].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6_01-2026 (Instrucciones de puesta en marcha)

    - HOP-338-9ES issue 4_01-2026 (Instrucciones de usuario)


    ---


    También puedo ayudarte con: **lectura/sincronización de configuración desde la
    herramienta CLSS**, **simulación de alarma en modo servicio** o **gestión de niveles
    de acceso durante la puesta en marcha**.'
