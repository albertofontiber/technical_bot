honest_declarations:
- 'REFINAMIENTO DE CONTRATO DECLARADO (adjudicación del coordinador): los 36 clean-FP de seed-270 (todos
  anexos de átomos hermanos ligados por solape genérico de anchors) motivaron RE-EXAMINAR el contrato
  de binding. El refinamiento (presencia parcial / contexto procedimental) es TAXONOMY-DERIVED (s243),
  NO un ajuste contra los 36 ejemplos, y se valida en esta población FRESCA seed-271 (docs v1 + seed-270
  excluidos). seed-270 queda como evidencia; no se re-usa para el veredicto.'
- 'TUNING DESDE V1 DECLARADO: el léxico/patrones del detector se ajustaron con los misses de la cohorte
  v1 (diagnóstico) — población fresca en cada medida desde entonces.'
- 'PREVALENCIA NO MEDIDA: el harness condiciona a mutación; no estima la prevalencia/ubicuidad de las
  familias en el corpus.'
- SALUD DE FAMILIAS s243 = SUPUESTO de diseño, no hecho medido por este instrumento.
- 'PRE-SCREEN DETERMINISTA: la cohorte se pre-filtra con el detector determinista (subset del híbrido,
  $0); sesgo de selección controlado porque el gold es mecánico y el gate mide sobre mutaciones.'
- 'COLISIONES: mutaciones cuyo valor eliminado re-aparece en el borrador por otro campo se excluyen con
  un guard independiente del mecanismo y se listan (no entran en el denominador de recall).'
- clean_noise corre con TODOS los átomos del fragmento; el scoring es POR FAMILIA del átomo anexado (ver
  gates.clean_noise_definition).
- 'BINDING GUARD: mutaciones cuyo borrador template pierde la presencia parcial del átomo (contrato v2)
  se listan como no-puntuables (artefacto del template, no del mecanismo); la vía binding se mide en clean/cross.'
- 'ITERACIÓN DE IMPLEMENTACIÓN DECLARADA (post 1ª pasada seed-271): la primera medida del contrato v2
  dio 42 clean-FP RBC, TODOS bundles ligados por palabras FUNCIÓN de 2-3 letras (''de''/''el''/''the'')
  — _STOPWORDS solo cubría palabras ≥4 letras porque asumía min_len=3. Fix de LÉXICO raíz (función cortas
  añadidas a _STOPWORDS): es implementación del contrato (''token PROPIO'' no incluye preposiciones),
  no ajuste del contrato ni por-fila. Se re-congeló y re-midió sobre la misma cohorte seed-271; la 1ª
  pasada queda en el historial git.'
