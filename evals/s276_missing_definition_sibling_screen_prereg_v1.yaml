schema: s276_missing_definition_sibling_screen_prereg_v1
status: FROZEN_BEFORE_GET_RUN
created_utc: '2026-07-20T00:00:00+00:00'
decision_question: >-
  Does a fresh, document-disjoint corpus population contain enough explicit
  top-level definition-list records, and can a deterministic reference close
  exactly one omitted sibling without crossing frozen structural boundaries?
scope:
  runtime_build: false
  target_scoring: false
  answer_generation: false
  model_calls: 0
  allowed_http_methods:
    - GET
  database_writes: 0
seed: 278
population:
  sampled_docs: 80
  sampling: seeded round-robin by manufacturer over the eligible corpus
  min_fragment_chars: 200
  exclusions:
    - base S269 packet/gold/held-out/target-adjacent exclusions
    - v1 structural cohort
    - mutation cohorts seed-270 through seed-277 inclusive
  no_target_probe: true
mechanism_form:
  unit: contiguous top-level Markdown definition list
  item_count_min: 2
  item_count_max: 5
  max_cards: 1
  max_card_chars: 600
  required_state: exactly one wholly omitted item; every other item selected
  selected_item_may_be_truncated: true
  output_field: missing_definition_sibling_cards
  inherits_local_semantic_validation: false
  receipt: exact parent span plus deterministic rederivation
  fail_closed_boundaries:
    - heading
    - table
    - code_fence
    - blockquote
    - numbered_list
    - unindented_prose
    - indentation_mismatch
    - multiline_continuation
cases:
  positives:
    - full selected siblings with one omitted sibling
    - one selected sibling truncated after bullet and label, with one omitted sibling
  controls:
    - all siblings already covered
    - heading boundary
    - prose boundary
    - table boundary
    - omitted item longer than 600 chars
    - tampered output receipt
    - flag off byte identity
gates:
  freshness_overlap_max: 0
  sampled_docs_min: 60
  eligible_blocks_min: 20
  eligible_documents_min: 10
  eligible_manufacturers_min: 3
  full_selection_recall_min: 1.0
  truncated_selection_recall_min: 1.0
  clean_fp_max: 0
  boundary_fp_max: 0
  oversize_fp_max: 0
  cross_record_fp_max: 0
  receipt_tamper_accept_max: 0
  flag_off_drift_max: 0
