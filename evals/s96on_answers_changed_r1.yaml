- bot_answer: '## RP1r – Sistema no vuelve a estado normal tras resetear después de
    extinción


    El fragmento clave aquí es el parámetro **ri (Resumen inhibido tras extinción)**
    [F2].


    ---


    ### ¿Qué está pasando?


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F2], el sistema está diseñado
    para que, tras una extinción realizada, **pase a estado de sistema inhibido**
    durante un tiempo programable antes de volver al estado normal. Esto es un comportamiento
    **intencionado por normativa**, no un fallo.


    ---


    ### Qué comprobar: parámetro **ri**


    El parámetro **ri** controla cuándo se produce el "Resumen inhibido tras extinción"
    [F2]:


    - **ri = 00** → El sistema pasa a inhibido desde que finaliza la extinción o cuando
    se agota el tiempo configurado (valor por defecto) [F2]

    - **ri = 01 a 30** → El sistema pasa a inhibido después de la intervención o reposición,
    con un retardo de **1 a 30 minutos** [F2]


    ---


    ### Pasos a seguir


    1. **Accede al nivel de programación** (nivel 3 del programador) [F2]

    2. **Consulta el valor del parámetro ri** configurado en la central

    3. Si **ri = 00**, el sistema permanece en estado inhibido hasta que se realice
    la reposición manual — esto es el comportamiento correcto según norma [F2]

    4. Si hay un **tiempo configurado (01-30)**, el sistema saldrá del estado inhibido
    una vez transcurrido ese tiempo tras la intervención/reposición [F2]

    5. Para salir del estado inhibido y volver a estado normal, verifica que se ha
    realizado la **intervención física** (reposición del agente extintor, revisión
