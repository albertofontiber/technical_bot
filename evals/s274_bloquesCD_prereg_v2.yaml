  c1_card_contract: >-
    Clase propia card_class=mandatory_callout en CAMPO PROPIO
    mandatory_callout_cards (0-1 card), SIN heredar la validacion semantica del
    selector (local_semantic_validated: False explicito — Sol-M4); receipt PROPIO
    (has_exact_mandatory_callout_receipt: spans exactos + igualdad con la
    re-derivacion determinista; tampering -> no se sirve, test pineado); <=600
    chars, merge de oraciones-gatillo con hueco sin alfanumericos; grupo mayor se
    omite ENTERO. Se sirve con SU flag, independiente de LOGICAL_RECORD_COVERAGE.
    served_coverage_cards y su receipt v3 quedan BYTE-INTACTOS. Contrato de la
    lane actualizado en el docstring del modulo.
  consumers_audit: >-
    Lectores de cards auditados (grep src/): coverage_context_content (serving —
    actualizado para anexar el campo propio con su receipt), receipts v3
    (byte-intactos), answer_planner.py build_answer_plan l.1399 (deriva
    OBLIGACIONES de served_coverage_cards — al vivir la card en campo propio NO la
    ve POR CONSTRUCCION; answer_planner.py queda INTACTO, pin de bytes s201/s260
    respetado; test funcional con flag ON), _has_substantive_coverage_card y
    table_preamble (leen coverage_cards del selector — no afectados), must_preserve
    _chunk_text (beneficiario intencional).
  d1b_deployable: >-
    Sol-C1 (ON-medido != ON-shippeado, 3a aparicion): el hibrido queda CABLEADO de
    verdad tras MP_HYBRID_DETECT — cliente runtime fail-open (sin SDK/key/timeout ->
    determinista puro), presupuesto <=2 llamadas Haiku/respuesta (los 2 fragmentos
    attested-citados de vista mas larga, orden determinista), timeout 10 s,
    trace["hybrid"] con fragmentos/uso/errores. F-RELATION (contrato NUEVO, Sol-M6:
    no continuidad del TODO §1.1) solo existe tras el flag — prompt y validador
    byte-identicos v3 con flag off; defensa en profundidad en el validador.
  d1b_relation_shape: >-
    Clausula completa (verbo conjugado, >=40 chars sin markup — vara whitelist v5) +
    ANCLA: numero-con-unidad | >=2 tokens distintivos | cabeza de definicion
    (_DEFLINE con etiqueta de >=2 tokens de contenido — anadida tras el funnel N=3:
    las clausulas 7aa7/b2043 no llevan numeros ni acronimos). Prosa generica y
    titulos NO pasan (verificado en tests).
  d2_catalog_anchor: >-
    Ancla fichero:linea (Fable-m2): scripts/catalog_store.py — indices _by_canonical
    /_by_alias (campos l.79-81, construidos en load() l.94: norm_token de
    canonical_model y alias), consumidos via src/rag/catalog_resolver.py (import
    por-path l.45, _ensure/_cat l.141-148). El helper _catalog_identifier_tokens
