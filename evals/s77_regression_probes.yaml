- id: neighbor_spectrex_4041
  clase: vecino
  q: Necesito un detector de llama SharpEye Spectrex 40/41R para una instalación; ¿qué referencia pido?
  model_extraido: null
  lookup: null
  fiel_a_optionD: false
  K: 3
  runs:
  - answer: 'El detector que mencionas es el **SharpEye 40/40R Single IR Flame Detector** de Spectrex.
      La referencia completa se construye con el código **40/40R-XXXXX**, donde cada posición define una
      característica específica [F2].


      Según el esquema de codificación [F1], necesitas definir los 5 dígitos en este orden:


      **Posición 1 — Configuración de cableado (Wiring Configuration):**

      Ver Tabla 1 del manual [F1] — hay 5 opciones disponibles [F5]. Debes indicar cuál necesitas (1 a
      5).


      **Posición 2 — Rango de temperatura:**

      - **1** → hasta **75°C** (–55°C ≤ Ta ≤ +75°C)

      - **2** → hasta **85°C** (–55°C ≤ Ta ≤ +85°C)


      **Posición 3 — Entradas de cable (Electrical Entries):**

      - **1** → M25

      - **2** → ¾" NPT


      **Posición 4 — Material de carcasa (Housing):**

      - **S** → Acero inoxidable (Stainless Steel)

      - **A** → Aluminio ⚠️ *No disponible en versión FM* [F1]


      **Posición 5 — Certificación (Ex-Approval):**

      - **B** → Inmetro

      - **F** → FM/CSA

      - **C** → ATEX/IECEx

      - **R** → TR-CU


      ---


      **Ejemplo de referencia completa:** `40/40R-11SC` sería: opción de cableado 1, temperatura 75°C,
      entrada M25, carcasa inoxidable, certificación ATEX/IECEx.


      Para completar tu pedido, necesitas confirmar estas 5 características según tu instalación. ¿Tienes
      ya definidos los requisitos de certificación y rango de temperatura?


      ---


      Fuente: guide-40-40r-single-ir-flame-detector-spectrex-en-us-1459812 (sin revisión registrada)


      ---


      También puedo ayudarte con: **opciones de cableado y conexionado de terminales**, **certificaciones
      ATEX disponibles** o **procedimiento de instalación y montaje** del 40/40R.'
