- id: absent_xtralis_vep999
  clase: ausente-cola
  q: ¿Cómo se realiza el test anual del detector Xtralis VESDA VEP-9990 según el fabricante?
  model_extraido: VESDA
  lookup: Xtralis
  fiel_a_optionD: false
  K: 3
  runs:
  - answer: '## Test anual del detector VESDA VEP-9990


      Antes de responder, necesito aclararte dos puntos importantes:


      **1. Sobre el modelo VEP-9990:** Los fragmentos disponibles no contienen documentación del modelo
      **VEP-9990** específicamente. Los fragmentos recuperados corresponden al **VESDA-E VEP-A00-P** [F3].
      Si tu equipo es un VEP-9990 (modelo de generación anterior), la información exacta puede diferir.
      Verifica el modelo en la etiqueta del equipo.


      **2. Sobre el calendario anual:** Los fragmentos sí contienen un calendario de mantenimiento, pero
      este corresponde al **VES-A00-P** [F1], no al VEP. Te lo indico igualmente como referencia, señalando
      su origen.


      ---


      ### Tareas con frecuencia ANUAL según el calendario del VES-A00-P [F1]:


      - **Realizar una prueba de humos** para comprobar la integridad de la tubería

      - **Comprobar el flujo de la tubería**

      - **Limpiar los puntos de muestreo**

      - **Limpiar con agua la red de tubería**


      *(Frecuencia bianual: sustitución del filtro)*


      ---


      ### Comandos de prueba disponibles en el VESDA-E VEP-A00-P (ejecutables desde **Xtralis VSC**) [F2]:


      - **Iniciar prueba de alarma ("Start Alarm Test"):** Simula nivel de humo de escala completa, activando
      condiciones de Alerta, Acción, Fuego 1 y Fuego 2. Los relés de alarma se activarán salvo que el
      detector esté desactivado [F2].

      - **Inicio de la prueba de fallo de circulación del aire ("Start Air Flow Fault Test"):** Comprueba
      el sistema de detección de circulación del aire apagando el aspirador [F2].

      - **Iniciar prueba de relés ("Start Relay Test"):** Activa y desactiva los relés disponibles para
      probarlos [F2].

      - **Iniciar prueba de LED ("Start LED Test"):** Realiza un ciclo de prueba de cada indicador LED
      del panel de visualización [F2].

      - **Iniciar prueba de fallo importante ("Start Major Fault Test"):** Genera un fallo importante
      y desactiva el relé de fallo durante **2 minutos** [F2].

      - **Iniciar prueba de fallo menor ("Start Minor Fault Test"):** Genera un fallo menor y desactiva
      el relé de fallo durante **2 minutos** [F2].


      ---


      ### ⚠️ Precauciones antes de realizar cualquier prueba [F1]:


      1. Informa a la autoridad supervisora adecuada.

      2. Asegúrate de que se aíslen los dispositivos existentes que dependan del detector antes de ponerlo
      en funcionamiento.

      3. Cuando el detector está deshabilitado o en espera, **no emitirá advertencias de fuego**.

      4. Sigue los procedimientos del sitio para evitar falsas alarmas en los servicios supervisados.


      > **Nota importante:** Solo las personas cualificadas que hayan asistido a un **curso de formación
      acreditado de Xtralis** pueden instalar, probar y mantener el sistema [F3].


      ---


      **Fuentes:**

      - Fragmento F1: Manual *35007_03_VESDA-E_VES-A00-P_Product_Guide_A4_Spanish_lores* (sin revisión
      registrada)

      - Fragmento F2/F3/F5: Manual *33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores*, enero
      de 2019 (sin revisión registrada)


      ---


      También puedo ayudarte con: **procedimiento de modo en espera antes del mantenimiento**, **resolución
      de fallos del VEP-A00-P** o **sustitución del filtro (mantenimiento bianual)**.'
    top_mfrs:
    - Xtralis
    - Xtralis
    - Xtralis
    - Xtralis
    - Xtralis
    top_models:
    - VESDA-E-VES
    - VESDA-E-VEP
    - VESDA-E-VEP
    - VESDA-VLI
    - VESDA-E-VEP
  - answer: 'El modelo **VEP-9990** no aparece en ninguno de los fragmentos recuperados. Los fragmentos
      disponibles cubren los modelos **VESDA-E VEP-A00-P / VEP-A00-1P**, **VESDA-E VES-A00-P** y **VESDA-E
      VEA-040-A00 / VEA-040-A10** — todos de la gama VESDA-E, pero ninguno es el VEP-9990.


