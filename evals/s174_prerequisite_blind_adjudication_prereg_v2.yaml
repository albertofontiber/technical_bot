adjudication_labels:
  access_true_positive: >-
    The exact quote states that an access level, login, password or authorization
    is required before or in order to perform a concrete technical operation,
    configuration, installation, test or maintenance action. The condition and
    governed action must be bound in the same quote.
  quantified_entitlement_true_positive: >-
    The exact quote states a licence requirement and explicitly binds its
    distributive scope to each/per loop, circuit, channel, panel, device or site.
  false_positive:
    - password_or_access_level_description_without_governed_technical_action
    - administrative_RMA_or_commercial_authorization
    - licensing_copyright_or_credential_boilerplate
    - anchors_belong_to_unrelated_sentences
    - ambiguous_subject_action_or_distributive_scope

gate_for_frontier_validation:
