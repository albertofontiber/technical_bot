- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  answer: '# ASD535 — Diagnóstico de fallo de flujo bajo


    ## Causa más probable


    Un valor de flujo **por debajo del 80 %** del valor nominal (100 %) indica **obstrucción
    en el conducto de aspiración** [F2]. El ASD535 dispara el aviso «fallo flujo de
    aire» una vez transcurrido el tiempo de retardo de **300 s** de la LS-Ü [F1][F2].


    El código de fallo asociado es **G30/001: Obstrucción, conducto de aspiración**
    [F10].


    ---


    ## Procedimiento de diagnóstico paso a paso


    **1. Leer el valor de flujo actual**


    Accede a la posición de conmutador **V** (sección 7.6.1) para leer el porcentaje
    de flujo real [F1][F9].


    - Valor < **80 %** → obstrucción confirmada [F2]

    - Valor > **120 %** → rotura de tubo (causa diferente) [F2]


    **2. Comparar con el umbral de inspección preventiva**


    Con la sensibilidad estándar LS-Ü de **±20 %**, ya deberías haber inspeccionado
    el conducto cuando el valor cayó por debajo del **90 %** (mitad de la sensibilidad
    = ±10 %) [F9].


    **3. Inspeccionar el conducto de aspiración** [F10]


    Comprueba en este orden:


    - Orificios de aspiración (tapados, sucios o bloqueados)

    - Salida de aire en el ASD

    - Caja de filtro / unidad de filtrado de polvo → inspeccionar y limpiar

    - Sensor de flujo de aire → inspeccionar y limpiar


    **4. Verificar la tensión de alimentación** [F9]


    Mide en los bornes **1 (+) y 2 (-)** del AMB 35:

    - Funcionamiento a **12 V-CC**: valor nominal **12,3 a 13,8 V-CC**

    - Funcionamiento a **24 V-CC**: valor nominal **21,6 a 27,6 V-CC**


    Un fallo de baja tensión (**< 10,4 V-CC, +0/–0,3 V**) también puede generar avisos
    de fallo [F3].


    **5. Consultar el código de evento en el AMB 35** (posición de conmutador **E**)
    [F3]


    Los códigos relevantes para flujo bajo son [F10]:


    - **001** → Obstrucción en conducto de aspiración

    - **004** → Parámetros LS-Ü no válidos / sensor fuera de rango

    - **008** → Sensor de flujo de aire defectuoso o no conectado


    ---


    ## Acciones correctivas según código


    - **Código 001**: Limpiar orificios de aspiración, salida de aire, caja de filtro
    y sensor de flujo [F10]

    - **Código 004**: Inspeccionar y limpiar sensor de flujo; si persiste, sustituirlo
    [F10]

    - **Código 008**: Verificar cable de conexión del sensor; si está defectuoso,
    sustituir el sensor [F10]


    ---


    ## ⚠️ Advertencia importante tras la limpieza


    Después de limpiar los orificios de aspiración **normalmente no es necesario un
    nuevo reset inicial**. Si fuera necesario ejecutarlo, **solo debe hacerse cuando
    el conducto esté completamente limpio** (incluyendo nuevo elemento de filtro).
    Realizar un reset inicial con orificios obstruidos puede impedir que el ASD535
    dispare la alarma [F7].


    ---


    **Fuente:** ASD535, Descripción técnica, T 131 192 h es (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de reset inicial**, **sustitución
    del sensor de flujo de aire** o **sustitución del filtro en la unidad de filtrado**.'
