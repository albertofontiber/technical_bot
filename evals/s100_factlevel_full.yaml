- qid: hp010
  question: En la Morley DXc, ¿cómo se añade un nuevo detector al lazo tras la puesta
    en marcha inicial?
  answer: "## Añadir un nuevo detector al lazo en la DXc tras la puesta en marcha\n\
    \nEl proceso se basa en la función **Autobúsqueda de equipos**. Cuando se conecta\
    \ un nuevo detector al lazo, la central genera el evento **\"EQUIPO NUEVO\"**\
    \ [F2], indicando que ha detectado un equipo no registrado. La solución es realizar\
    \ una autobúsqueda para aceptarlo [F2].\n\n---\n\n### Pasos para realizar la Autobúsqueda\n\
    \n1. **Accede al Nivel 2** introduciendo la clave (por defecto **1234**) desde\
    \ el menú de estado [F10].\n\n2. **Navega al menú de Lazos** (dentro de Programación/Nivel\
    \ 3 o desde el menú de configuración) y **pulsa la tecla `2`** para seleccionar\
    \ la función **'Autobúsqueda'** [F1].\n\n3. **Si la central tiene más de un lazo**,\
    \ introduce el número de lazo correspondiente y pulsa **⊙** para confirmar [F1]:\n\
    \   ```\n   [Autobusqueda]\n   Sel.Num.Lazo (1-2) :1\n   ```\n\n4. La central\
    \ pedirá confirmación. **Pulsa ⊙** para iniciar el proceso [F1]:\n   ```\n   [Autobusqueda]\n\
    \   Lazo: 1  Autobusqueda?\n   OK:Confirm   ←:Cancel\n   ```\n\n5. **Espera**\
