- qid: hp006
  question: La Notifier AFP-400 muestra el aviso 'Tierra' (Earth Fault). ¿Qué significa
    y cómo se localiza?
  answer: "## Fallo de Tierra (Earth Fault) en la AFP-400\n\n### ¿Qué significa?\n\
    \nEl aviso de **Fallo de Tierra** indica que la central ha detectado una conexión\
    \ no deseada entre algún conductor del sistema y tierra. La **MPS-400** dispone\
    \ de un **LED específico de \"Fallo de Tierra\"** en su placa para indicar esta\
    \ condición [F4].\n\nEl sistema entrará en modo **Avería**: el piezo sonará, el\
    \ LED **Avería del Sistema** parpadeará, se activará el relé de avería y aparecerá\
    \ un mensaje en la pantalla LCD [F3].\n\n---\n\n### Pasos para gestionar y localizar\
    \ el fallo\n\n1. **Reconocer la avería en el panel**\n   Pulsa `<Aceptar>` para\
    \ silenciar el piezo y cambiar el LED de *Avería del Sistema* de intermitente\
    \ a fijo [F3].\n\n2. **Consultar la pantalla LCD**\n   La pantalla mostrará un\
    \ mensaje de avería con el tipo de evento, tipo de equipo, descripción de ubicación,\
    \ zona de software asignada y fecha/hora [F3]. Anota toda esa información para\
    \ localizar el punto afectado.\n\n3. **Localizar físicamente el fallo**\n   -\
    \ Dirígete a la zona/equipo indicado en el mensaje LCD.\n   - Inspecciona el cableado\
    \ en busca de contacto entre conductores activos y masa/chasis.\n   - Revisa especialmente\
    \ las conexiones en los bloques de terminales de la **MPS-400** [F4]:\n     -\
    \ **TB1** (entrada de alimentación AC y baterías)\n     - **TB2** (salidas de\
    \ 24 VDC)\n     - **TB7–TB10** (circuitos NAC)\n\n4. **Verificar el LED de Fallo\
    \ de Tierra en la MPS-400**\n   La placa **MPS-400** tiene un **LED \"Fallo de\
    \ Tierra\"** independiente [F4] que confirma que el origen está en la fuente de\
    \ alimentación o en los circuitos asociados a ella.\n\n5. **Opción: Deshabilitar\
    \ temporalmente la detección de fallo de tierra**\n   En la **MPS-400** existe\
    \ el puente **JP2**: *\"Corte para inhabilitar la detección de la Falla de Tierra\"\
    * [F6]. Esto puede usarse como medida temporal de diagnóstico para confirmar que\
    \ el fallo proviene del sistema y no es una falsa indicación, pero **no debe dejarse\
    \ cortado en operación normal**.\n\n6. **Eliminar la causa y rearmar**\n   Una\
    \ vez corregido el fallo, si desaparecen todas las averías, la central vuelve\
    \ automáticamente a modo Normal y envía el mensaje \"Sistema Normal\" a la pantalla\
    \ LCD [F3].\n\n---\n\n> ⚠️ **Precaución:** Antes de intervenir en la MPS-400,\
    \ desconecta todas las entradas de alimentación (AC y baterías). Varias fuentes\
    \ de alimentación pueden estar conectadas simultáneamente al panel [F5].\n\n---\n\
    \n**Fuentes:**\n- MFDT170 — Manual de usuario AFP-400 (sin revisión registrada)\
    \ [F1, F2, F3]\n- MIDT170 — Manual de instalación AFP-400 (sin revisión registrada)\
    \ [F4, F8]\n- 50253SP — Manual de instalación AFP-300/AFP-400 (sin revisión registrada)\
    \ [F5, F6]\n\n---\n\nTambién puedo ayudarte con: **verificación del cableado de\
    \ la MPS-400**, **procedimiento de rearme del sistema** o **interpretación de\
    \ otros mensajes de avería en pantalla LCD**."
