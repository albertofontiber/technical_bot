- qid: cat011
  question: Necesito un detector de humos analógico direccionable «751» para una instalación
    Notifier; ¿cuál es el modelo correcto?
  answer: 'El sufijo «751» aparece en **varios modelos distintos** de Notifier, cada
    uno con tecnología y aplicación diferente. Necesito que me confirmes qué tipo
    de detección buscas para darte el modelo exacto.


    Los modelos con «751» presentes en la documentación son:


    - **SDX-751** — Detector óptico (fotoeléctrico) analógico direccionable, bajo
    perfil [F10]

    - **SDX-751TEM** — Detector combinado óptico-térmico (OPTIPLEX), con sensor de
    temperatura fija a 58 °C [F2][F7]

    - **SDX-751E** — Detector óptico fotoeléctrico analógico, bajo perfil [F9]

    - **CPX-751** — Detector por ionización analógico direccionable, bajo perfil [F10]

    - **CPX-751E** — Detector por ionización analógico direccionable, bajo perfil
    [F4][F7]

    - **FSL-751E** — Detector de humo láser VIEW [F7]

    - **LPX-751** — Detector fotoeléctrico láser analógico, sensibilidad extremadamente
    alta [F10]

    - **IPX-751** — Detector multicriterio (fotoeléctrico + iónico + térmico) [F10]

    - **IRX-751TEM** — Sensor multicriterio SMART 3 [F7]

    - **IRX-751CTEM** — Sensor multicriterio SMART 4 [F7]

    - **IDX-751** — Detector óptico analógico **intrínsecamente seguro** (para zonas
    ATEX, requiere barrera IMX-1) [F1]

    - **HPX-751E** — Sensor óptico HARSH (para entornos agresivos) [F7]


    ---


    **Para orientarte, dime:**

    1. ¿Qué tipo de detección necesitas? (óptico, iónico, láser, multicriterio, combinado
    óptico-térmico)

    2. ¿Es para zona de riesgo de explosión (ATEX/intrínsecamente seguro)?

    3. ¿En qué central Notifier se va a instalar? (AFP-400, ID50/60, AM-6000, AFP4000…)


    Con esos datos te confirmo el modelo correcto y su compatibilidad con la central.


    Fuentes: MNDT1020 (IDX-751); I56-1320-001 SDX-751TEM; I56-0790-003 CPX-751E; MNDT1025
    (FSL-751E); MIDT156 (ID50/60); MIDT170 (AFP-400); MIDT250_A (AM-6000); MIDT230
    (AFP4000)'
