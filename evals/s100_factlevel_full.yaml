- qid: hp014
  question: ¿Cómo se conecta un módulo de aislamiento de línea en un lazo ID2000?
  answer: "## Conexión del módulo de aislamiento de línea en lazo ID2000\n\n### Requisitos\
    \ de instalación (cuántos y dónde)\n\nAntes de conectar físicamente el aislador,\
    \ ten en cuenta las reglas de distribución obligatorias:\n\n- **Máximo 32 equipos\
    \ de lazo entre aisladores** para cumplir **EN54-2: 12.5.2** [F4]\n- En la central\
    \ **ID2000**, el límite es más restrictivo: **no más de 25 equipos entre aisladores**\
    \ [F4]\n- Si se utilizan **aisladores tipo FET**, el límite baja a **20 equipos\
    \ entre aisladores** [F4]\n\n---\n\n### Terminales del aislador\n\nEl aislador\
    \ dispone de **4 terminales numerados: 1, 2, 3 y 4** [F3].\n\nDurante las comprobaciones\
    \ previas del lazo (antes de conectar el cableado al panel), se deben **cortocircuitar\
    \ temporalmente los terminales 2 y 4** de cada aislador para desconectarlos del\
    \ lazo y poder realizar las pruebas de continuidad [F3].\n\n---\n\n### Procedimiento\
    \ de conexión\n\n1. **Antes de conectar el cableado del lazo al panel**, realiza\
    \ las comprobaciones de continuidad con los aisladores desconectados (terminales\
    \ 2 y 4 cortocircuitados) [F3].\n\n   > ⚠️ El cableado del lazo **DEBE estar desconectado\
    \ del panel** durante este procedimiento [F3].\n\n2. Comprueba la resistencia\
    \ final de línea. Debe ser inferior a [F3]:\n   - **Placa base y LIB con detección\
    \ de dirección duplicada:** 14,5 Ω\n   - **Placa base y LIB sin detección de dirección\
    \ duplicada:** 28,5 Ω\n   - **Placa base y LIB con detección de dirección duplicada\
    \ (segundo rango):** 18,5 Ω\n   - **Placa base y LIB sin detección de dirección\
    \ duplicada (segundo rango):** 35,5 Ω\n\n3. Verifica polaridad con multímetro\
    \ en modo diodo: conecta **positivo (+) al negativo (−) del lazo** y **negativo\
    \ (−) al positivo (+)**. El multímetro debe indicar varios diodos polarizados\
    \ en paralelo [F3].\n\n4. Verifica que **no hay continuidad entre la pantalla\
    \ del cable y los conductores +/−** [F2]. La pantalla debe conectarse a tierra\
    \ **únicamente en el panel** [F2].\n\n5. Una vez verificado todo, **retira las\
    \ conexiones temporales (cortocircuitos) de los terminales 2 y 4** de cada aislador\
    \ [F1].\n\n6. Conecta el cableado del lazo al panel respetando polaridad: **extremo\
    \ A al terminal A y extremo B al terminal B** [F1].\n\n---\n\n### Longitud máxima\
    \ del lazo\n\n- La longitud total del par de lazo **no puede exceder los 2000\
    \ metros**, y solo si se utiliza **cable de 1,5 mm² de sección o superior** [F3].\n\
    \n---\n\n### Nota sobre cortocircuitos en el lazo\n\nSi se produce un cortocircuito\
    \ entre dos aisladores, el panel lo señalizará como **'Posible corte'** (no como\
    \ cortocircuito directo), y los equipos en la sección afectada aparecerán como\
    \ **NO RESPONDE / PERDIDO** o **PÉRDIDA PARCIAL DEL LAZO** si faltan más de tres\
    \ equipos [F5].\n\n---\n\n> ⚠️ **NUNCA uses un multímetro de alta tensión (tipo\
    \ \"Megger\") en el lazo** [F4].\n\n---\n\n**Fuente:** Manual de instalación y\
    \ puesta en marcha Panel ID2000 (MIDT180, sin revisión registrada); Manual de\
    \ programación Panel ID2000 (MPDT180, sin revisión registrada)\n\n---\n\nTambién\
    \ puedo ayudarte con: **comprobación de los circuitos de sirena**, **configuración\
    \ de zonas en el lazo** o **mensajes de avería de lazo y su diagnóstico** en la\
    \ ID2000."
