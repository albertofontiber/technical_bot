- qid: cat018
  question: ¿Como se programa una ecuacion causa-efecto (CBE) en la Notifier AM-8200
    para que un evento active una salida?
  answer: '# Programación de ecuación CBE en AM-8200: evento → salida


    ## Concepto básico


    Una **CBE (Control By Event)** es la ecuación que defines en un módulo de salida
    para indicar qué condición debe cumplirse para que esa salida se active [F1].
    La central evalúa la ecuación cuando los puntos/zonas/grupos referenciados cambian
    de estado [F1].


    ---


    ## Paso a paso: programar la CBE en un módulo de salida


    **1. Accede al menú de programación del punto de salida**


    Navega hasta el módulo de salida en el menú de programación. Verás la pestaña
    **"Programa"** con el campo **CBE** [F3].


    **2. Selecciona el campo CBE**


    Usa las teclas flecha **▲▼** para seleccionar el parámetro CBE y pulsa la tecla
    de confirmación **☑** para editarlo [F3].


    **3. Introduce la ecuación**


    Usa el teclado alfanumérico del panel para escribir la ecuación. Pulsa **Enter**
    para confirmar [F3].


    > ⚠️ **Límite máximo: 64 caracteres** por ecuación [F3].

    > ⚠️ **No insertes espacios** entre los caracteres de la ecuación [F1].


    ---


    ## Los tres métodos más habituales (ejemplos prácticos)


    El manual describe tres opciones equivalentes para activar un módulo de salida
    desde un detector [F10]:


    **OPCIÓN A — Vía grupo software:**

    - Ecuación del detector (C1L1S1): `(G1)`

    - Ecuación del módulo de salida (C1L1M1): `(G1)`

    - El detector se asigna al grupo G1, y el módulo se activa cuando G1 está activo
    [F10].


    **OPCIÓN B — Referencia directa al sensor:**

    - Ecuación del detector: *(vacía o la que corresponda)*

    - Ecuación del módulo de salida (C1L1M1): `(C1L1S1)`

    - El módulo se activa directamente cuando el sensor C1L1S1 entra en alarma [F10].


    **OPCIÓN C — Referencia directa al módulo de salida desde el sensor:**

    - Ecuación del detector (C1L1S1): `(C1L1M1)`

    - Ecuación del módulo de salida: *(vacía)*

    - El sensor referencia al módulo de salida en su propia CBE [F10].


    ---


    ## Operadores disponibles para la ecuación


    **OR** — Al menos UN operando activo [F4]:

    `OR(G9 G15 G23)` → se activa si cualquiera de los tres grupos está en alarma.

    *(El operador OR puede omitirse: `(G9 G15 G23)` es equivalente)* [F4]


    **AND** — TODOS los operandos activos [F4]:

    `AND(G9 G15 G23)` → se activa solo si los tres grupos están en alarma simultáneamente.


    **NOT** — Niega el operando [F4]:

    `NOT(G23)` → el módulo está activo mientras G23 NO esté en alarma; se desactiva
    cuando G23 entra en alarma.


    **XGRP** — Al menos DOS elementos del grupo activos [F5]:

    `XGRP(G23)` → doble coincidencia. Solo admite UN grupo, no varios [F5].


    **PRE** — Usa el estado de pre-alarma de un sensor [F6]:

    `OR(PRE(C1L1S2) PRE(C2L1S10))` → activa la salida si cualquiera de los dos sensores
    está en pre-alarma.


    **FLT** — Usa el estado de avería de un dispositivo o zona [F7]:

    `OR(FLT(C1L1S2) FLT(Z1))` → activa la salida si el sensor o la zona están en avería.


    **DIS** — Desactivación de zonas/puntos [F8]:

    `(DIS(Z1))` en un módulo de salida → el módulo se activa cuando la Zona 1 está
    desactivada.


    ---


    ## Reglas sintácticas críticas


    - Si usas **más de un operador**, el primer carácter debe ser `(` y el último
    `)` [F1].

    - Formato general: `OPERADOR(OPERANDO-1 OPERANDO-2...)` [F1].

    - **NOT** y **XGRP** solo admiten un operando [F1].

    - Para grupos directos: **no se permite** que los operandos sean grupos con índice
    **menor** que el grupo al que se asocia la CBE [F4]. Ejemplo no permitido: `G33
    = (G23 G24)`.

    - Para grupos inversos: **no se permite** que los operandos sean grupos con índice
    **mayor** que el grupo al que se asocia la CBE [F4]. Ejemplo no permitido: `G305
    = (G306 G307)`.

    - **NOTA:** Para módulos de salida con tipo ID de señalización general, la central
    **no permite** programar una ecuación CBE [F4].


    ---


    ## Ejemplo completo: alarma general con varios detectores


    ```

    C1L1S1 → G1 → C1L1M2  (CBE del módulo M2: (G1))

    C1L1S2 → G1 y G2

    C1L1S3 → G2 y G3 → C1L1M3  (CBE del módulo M3: (G2))

    C1L1M1 → G3 → C1L1M4  (CBE del módulo M4: (G3))

    ```

    El módulo **C1L1M2** se activa con alarma en **C1L1S1 o C1L1S2** [F10].

    El módulo **C1L1M3** se activa con alarma en **C1L1S3 o C1L1M1** [F10].


    ---


    **Fuente:** AM-8200 Manual de programación, Doc. M-162.1-AM8200-ESP Rev A.3, HONEYWELL
    LIFE SAFETY IBERIA; AM-8200 Manual de instalación, Doc. AM-8200-ESP Rev. A.3,
    NOTIFIER.


    ---


    También puedo ayudarte con: **operador DEL/SDEL (retardos temporales en CBE)**,
    **programación de grupos software (directos e inversos)** o **operador TONE para
    control de sirenas por zonas** en la AM-8200.'
