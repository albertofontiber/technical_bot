- qid: cat023
  question: En el detector de humos por aspiración Securiton ASD532, ¿qué clases de
    sensibilidad según EN 54-20 ofrece y cómo se configura la monitorización del flujo
    de aire?
  answer: '# ASD532 — Clases EN 54-20 y configuración de monitorización de flujo de
    aire


    ---


    ## 1. Clases de sensibilidad según EN 54-20


    El ASD 532 cumple los requisitos de la norma **EN 54-20** en sus tres clases [F8]:


    - **Clase A** → Sensibilidad muy alta

    - **Clase B** → Sensibilidad alta

    - **Clase C** → Sensibilidad normal


    Esto queda reflejado también en la placa de características del equipo, donde
    aparece marcado como **EN 54-20 A/B/C** [F7].


    ---


    ## 2. Sensores de humo disponibles según rango de sensibilidad


    La elección del sensor condiciona el rango de ajuste posible [F2]:


    - **SSD 532-1** → Rango de sensibilidad de alarma: **0,5 %/m hasta 10 %/m**

    - **SSD 532-2** → Rango de sensibilidad de alarma: **0,1 %/m hasta 10 %/m**

    - **SSD 532-3** → Rango de sensibilidad de alarma: **0,02 %/m hasta 10 %/m**


    ---


    ## 3. Configuración de la monitorización del flujo de aire


    ### 3.1 Principio de funcionamiento


    La monitorización se basa en **medición calorimétrica** (técnica de medición de
    flujo en masa) [F3]. Al ejecutar el **reset inicial** (con el conducto de aspiración
    intacto), el ASD 532 registra y memoriza los valores de flujo como **valores nominales
    al 100 %** [F3].


    Si los valores reales se desvían fuera de la ventana de monitorización, el equipo
    dispara el aviso **«Fallo flujo de aire»** [F3].


    ### 3.2 Parámetros configurables


    Dos parámetros definen la ventana de monitorización [F3] [F6]:


    - **Tamaño de la ventana** (desviación permitida): ±xx %

    - **Tiempo de retardo**: tiempo transcurrido hasta que se comunica el fallo al
    superarse la ventana


    ### 3.3 Requisito normativo EN 54-20


    Según EN 54-20, debe notificarse como fallo toda variación del flujo de aire superior
    a **±20 %** [F3]. En las posiciones de conmutador **A11 a C31**, una variación
    superior a ±20 % (por debajo del **80 %** por suciedad/obstrucción, o por encima
    del **120 %** por rotura de tubo) dispara el aviso «Fallo flujo de aire» tras
    un tiempo de retardo de **300 s** [F3].


    ---


    ## 4. Posiciones de conmutador: normativas vs. no normativas


    ### Posiciones normativas (homologadas EN 54-20): A11 a C31


    | Posición | Clase EN 54-20 |

    |---|---|


    - **A11** → Clase A (sensibilidad muy alta) [F4]

    - **b11 / b21** → Clase B (sensibilidad alta) [F4]

    - **C11 / C21 / C31** → Clase C (sensibilidad normal) [F4]


    Estas posiciones aplican **±20 % de desviación y 300 s de retardo**, cumpliendo
    EN 54-20 [F3].


    ### Posiciones no normativas (NO homologadas EN 54-20): W01 a W44


    Las posiciones **W01 a W44** cumplen la sensibilidad de respuesta de alarma según
    EN 54-20 (clases A a C), **pero NO los límites normativos de monitorización del
    flujo de aire** [F5].


    Permiten configurar combinaciones de ventana y retardo distintas [F1]:


    - Tiempo de retardo: **10 min** o **60 min**

    - Desviación: **±20 %** o **±50 %**


    Ejemplos de posiciones W [F1]:

    - **W01**: Clase A, 1 límite, retardo 10 min, desviación ±20 %

    - **W02**: Clase A, 1 límite, retardo 60 min, desviación ±20 %

    - **W03**: Clase A, 1 límite, retardo 10 min, desviación ±50 %

    - **W04**: Clase A, 1 límite, retardo 60 min, desviación ±50 %

    - *(y así sucesivamente hasta W44 para clases B y C)*


    > ⚠️ **ADVERTENCIA**: Las posiciones **W01 a W44 únicamente deben utilizarse previa
    consulta con el fabricante**. Los valores de monitorización del flujo de aire
    definidos en ellas **no están homologados según EN 54-20** [F5] [F6] [F9].


    ---


    ## 5. Proceso de configuración (resumen)


    **Sin software ASD PipeFlow (EasyConfig)** [F6] [F9]:

    1. Seleccionar los límites del sistema según cap. 4.4.4.3

    2. Si se requiere monitorización de flujo conforme a EN 54-20 → seleccionar posición
