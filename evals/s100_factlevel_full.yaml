- qid: hp012
  question: ¿Cuántos lazos direccionables soporta la Notifier AM2020/AFP1010 y cuántos
    dispositivos por lazo?
  answer: '## Lazos y dispositivos por lazo — AM2020 / AFP1010


    ### AM2020


    - **Número máximo de lazos:** hasta **10 lazos** [F8]

    - **Dispositivos por lazo:** hasta **99 detectores analógicos** y **99 módulos
    monitores o de control** por lazo [F8]

    - Cada lazo requiere una tarjeta **LIB** (LIB-200, LIB-200A o LIB-400) [F3]

    - El gabinete **CAB-C3** con módulos LIB-400 exclusivamente puede alojar un máximo
    de **10 lazos** [F4]


    ### AFP1010


    - **Número máximo de lazos:** limitado a un máximo de **dos LIB-200** [F1]

    - **Total de dispositivos en el sistema:** máximo **396 dispositivos** [F1]

    - El gabinete **CAB-A3** con módulos LIB-400 exclusivamente puede alojar un máximo
    de **cuatro lazos** [F3][F4]


    > ⚠️ **Nota importante:** El AFP1010 está limitado a dos LIB-200 (396 dispositivos
    en total). La capacidad de 10 lazos corresponde exclusivamente a la AM2020 [F1][F4].


    ---


    **Fuentes:**

    - Manual AM2020/AFP1010 PN 15088SP (sin revisión registrada)

    - Manual MFDT280 (sin revisión registrada)

    - Manual MPDT280, rev. Rev A


    ---


    También puedo ayudarte con: **programación de lazos LIB**, **modo local en caso
    de pérdida de comunicación CPU-LIB** o **configuración de zonas avanzadas** en
    la AM2020/AFP1010.'
