- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  answer: '# FAAST LT-200 — Salidas de relé y sirena: especificaciones completas


    ---


    ## 1. Tipos de relé disponibles


    Los fragmentos cubren **dos variantes** del FAAST LT-200 con diferente dotación
    de relés:


    ### Variante Stand-Alone (modo autónomo)

    Dispone de **5 relés** [F1][F6]:

    - **ALARMA 1 y 2** — Se activan cuando se alcanza la condición de alarma en el
    canal correspondiente. Estado enclavado por defecto; requiere RESET manual para
    desactivar LED y relé. Condición por defecto = Nivel 1 [F1].

    - **PRE-ALARMA 1 y 2** — Se activan cuando se alcanza la condición de pre-alarma
    en el canal. Cuando Pre-ALARMA = ALARMA = Nivel 1, la Pre-ALARMA responde al **70%
    del Nivel 1** [F1].

    - **AVERÍA 1 y 2** — Se activan ante condición de avería en CH1 o CH2, o ante
    avería común. También se activan en modo de servicio y cuando la unidad está **sin
    alimentación** [F1]. Estado **no enclavado** por defecto [F1].

    - **SIRENA 1 y 2** — Se activan cuando el canal está en ALARMA o PRE-ALARMA. Sirena
    1 → CH1, Sirena 2 → CH2. Condición por defecto = activado en ALARMA [F1].


    ### Variante Loop (en lazo) / Notifier Loop

    Dispone de **3 relés** [F3][F4]:

    - **ALARMA 1 y 2** — Controlado por el panel cuando determina que se ha alcanzado
    la condición de alarma. Activado y desactivado por el panel; **no enclavado**
    [F3][F4].

    - **AVERÍA 1 y 2** — Igual comportamiento que la variante Stand-Alone ante fallos,
    modo servicio y corte de alimentación. Estado **no enclavado** [F3][F4].

    - **SIRENA 1 y 2** — Se activan cuando el canal está en ALARMA. Sirena 1 → CH1,
    Sirena 2 → CH2. Condición por defecto = activado en ALARMA [F3][F4].

    - *(Sin relé de Pre-Alarma en esta variante)* [F3][F4]


    ---


    ## 2. Contactos de los relés (terminales de bornes)


    ### Variante Stand-Alone [F6]

    - **Relé ALARMA CH1** (bloque T2): terminales 5 (NC), 6 (C), 7 (NO)

    - **Relé ALARMA CH2** (bloque T3): terminales 8 (NC), 9 (C), 10 (NO)

    - **Relé AVERÍA CH1** (bloque T4): terminales 11 (NC), 12 (C), 13 (NO)

    - **Relé AVERÍA CH2 / AUX** (bloque T5): terminales 14 (NC), 15 (C), 16 (NO)

    - **Relé PRE-ALARMA CH1** (bloque T9): terminales 23 (NC), 24 (C), 25 (NO)

    - **Relé PRE-ALARMA CH2** (bloque T10): terminales 26 (NC), 27 (C), 28 (NO)


    ### Variante Loop / Notifier Loop [F5][F7]

    - **Relé ALARMA CH1** (bloque T2): terminales 5 (NC), 6 (C), 7 (NO)

    - **Relé ALARMA CH2** (bloque T3): terminales 8 (NC), 9 (C), 10 (NO)

    - **Relé AVERÍA CH1** (bloque T4): terminales 11 (NC), 12 (C), 13 (NO)

    - **Relé AVERÍA CH2 / AUX** (bloque T5): terminales 14 (NC), 15 (C), 16 (NO)

    - *(Terminales 23–28 usados para lazo, no para Pre-Alarma)* [F5][F7]


    Todos los relés son de **contacto seco** con configuración **NC / C / NO** [F5][F6][F7].


    ---


    ## 3. Comportamiento del relé de AVERÍA ante fallo o corte de alimentación


    El relé de AVERÍA se activa en los siguientes casos [F1][F2][F3][F4]:

    - Condición de avería en **CH1 o CH2**

    - **Avería común**

    - Cuando la unidad está en **modo de servicio** (puerta abierta) [F8][F9]

    - Cuando la unidad está **sin alimentación** (desconectada)


    El estado de avería **no está enclavado** (se desactiva automáticamente al resolverse
    la condición) [F1][F2][F3][F4].


    > **Nota importante:** Al abrir la puerta de la caja durante el funcionamiento
    normal, la unidad entra en modo de servicio, los LED de FILTRO parpadean, se desconecta
    la alimentación de los ventiladores y **el relé de avería indica una avería**
    [F8][F9].


    ---


    ## 4. Resistencia de fin de línea (EOL) en salidas de sirena


    - **Salida Sirena 1** (terminales 17 − y 18 +): resistencia EOL de **47 kΩ** [F5][F6][F7]

    - **Salida Sirena 2** (terminales 19 − y 20 +): resistencia EOL de **47 kΩ** [F5][F6][F7]


    ---


    ## 5. Especificación eléctrica de los contactos de relé


    - **Corriente máxima (carga resistiva CC):** **2 A** a **30 VDC** [F1][F4]

    - **Corriente máxima (carga resistiva CA):** **0,5 A** a **30 VAC** [F1][F4]

    - **Vida útil mínima:** **10⁵ operaciones** [F1][F4]


    > ⚠️ **Advertencia para cargas inductivas:** Los fragmentos incluyen diagramas
    de advertencia sobre la conmutación de cargas inductivas, indicando configuraciones
    correctas e incorrectas con diodo **1N6284CA** [F4]. Consulta el diagrama del
    manual para el conexionado correcto con cargas inductivas.


    ---


    **Fuentes:**

    - I56-6574-005_EN-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6577-006_ES FAAST Notifier LT-200 QIG (sin revisión registrada)

    - I56-6575-005_EN-FAAST-LT-200-Loop-QIG (sin revisión registrada)

    - I56-6577-006_EN Notifier FAAST LT-200 QIG (sin revisión registrada)

    - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-6575-005_ES FAAST LT-200 Loop QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **conexionado de la alimentación principal y auxiliar**,
    **configuración de la entrada configurable (Reset)** o **procedimiento de sustitución
    de sensores F-SEN-SSE** del FAAST LT-200.'
