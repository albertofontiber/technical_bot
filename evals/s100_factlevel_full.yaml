- qid: hp012
  question: ¿Cuántos lazos direccionables soporta la Notifier AM2020/AFP1010 y cuántos
    dispositivos por lazo?
  answer: '## Lazos y dispositivos por lazo — AM2020 / AFP1010


    ### AM2020


    La **AM2020** puede soportar hasta **10 lazos SLC** [F7], cada uno de los cuales
    soporta hasta:


    - **99 detectores analógicos** por lazo [F7]

    - **99 módulos monitores o de control** por lazo [F7]


    El diagrama de la Figura 12 del manual confirma la numeración de lazos del **1
    al 10**, con tarjetas **LIB-400**, **LIB-200** o **LIB-200A** según la posición
    [F4].


    ---


    ### AFP1010


    El **AFP1010** está limitado a un máximo de **dos tarjetas LIB-200**, lo que supone
    un total de **396 dispositivos en el sistema** [F1].


    > ⚠️ El manual no especifica explícitamente el número máximo de lazos del AFP1010
    en los fragmentos disponibles, solo indica el límite de 2 LIB-200 y 396 dispositivos
    totales [F1].


    ---


    ### Resumen


    - **AM2020:** hasta **10 lazos**, **99 detectores + 99 módulos** por lazo [F7]

    - **AFP1010:** máximo **2 LIB-200**, **396 dispositivos** en total [F1]


    ---


    Fuente: Manual AM2020/AFP1010 (MFDT280, sin revisión registrada); Manual MPDT-280
    (rev. Rev A)


    ---


    También puedo ayudarte con: **tipos de tarjetas LIB compatibles (LIB-200, LIB-200A,
    LIB-400)**, **funcionamiento en Modo Local** o **programación de lazos SLC (Estilo
    4 / Estilo 6)**.'
