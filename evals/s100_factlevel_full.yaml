- qid: hp009
  question: ¿Cuál es la resistencia de fin de línea recomendada para los lazos de
    la central Morley ZXe?
  answer: 'La pregunta menciona "lazos de la central Morley ZXe" de forma genérica.
    Los fragmentos disponibles cubren varios productos de la familia ZX (ZXAE/ZXEE
    y ZX2e/ZX5e), y cada tipo de circuito tiene su propia resistencia de fin de línea.
    Te detallo lo que aparece en los fragmentos:


    ---


    ## Resistencias de fin de línea según tipo de circuito


    ### 1. Salidas de sirenas convencionales (ZXAE/ZXEE y ZX2e/ZX5e)


    - **Valor:** **6.800 Ω (6K8)**, **0,5 W mínimo** [F1][F2][F4]

    - Se instala entre **+** y **−** de la última sirena del circuito [F1]

    - Si no hay sirenas conectadas, se coloca directamente en los terminales de salida
    de la central [F1]

    - **No se deben realizar ramales** en la línea de sirenas, ya que la supervisión
    solo cubre la línea directa hasta la RFL [F2]


    ### 2. Lazo periférico RS-485 (ZXAE/ZXEE)


    - **Valor:** **150 Ω**, **0,5 W mínimo**, en **cada extremo** del lazo [F3]

    - Aplica cuando el lazo periférico se instala en **lazo abierto** [F3]

    - Cable apantallado obligatorio [F3]


    ### 3. Lazos analógicos (ZXAE/ZXEE)


    - Los fragmentos disponibles **no especifican una resistencia de fin de línea**
    para los lazos analógicos. El lazo analógico opera con comunicación digital a
    dos hilos y los fragmentos describen comprobaciones de resistencia de lazo (máximo
    **36 Ω** con un extremo puenteado) [F7], pero no mencionan una RFL específica
    para este circuito.


    ---


    **Resumen rápido:**

    - Sirenas → **6.800 Ω / 0,5 W** [F1][F2][F4]

    - Lazo periférico RS-485 → **150 Ω / 0,5 W en cada extremo** [F3]

    - Lazo analógico → el manual no especifica RFL para este circuito en los fragmentos
    disponibles


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE (DOC.MIE-MI-310, sin revisión registrada);
    Manual de Instalación ZX2e/ZX5e (DOC.MIE-MI-530, rev. 001)


    ---


    También puedo ayudarte con: **longitudes máximas de lazo analógico**, **conexionado
    de sirenas con campanas sin polaridad** o **instalación del lazo periférico RS-485**
    en la ZXAE/ZXEE.'
