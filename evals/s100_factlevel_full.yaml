- qid: cat012
  question: ¿Cómo se calcula la capacidad de batería (en Ah) necesaria para la central
    AM-8200?
  answer: "# Cálculo de capacidad de batería — AM-8200\n\nEl manual establece un procedimiento\
    \ de cálculo en dos partes (reposo + alarma) con un factor de corrección final\
    \ [F3][F4][F6].\n\n---\n\n## Fórmula general\n\n**Ah Batería = (A + B) × 1,2**\
    \ [F4][F5][F6]\n\nDonde:\n- **A** = Corriente total en reposo × horas de autonomía\
    \ requeridas (24 h o 72 h) [F4]\n- **B** = Corriente total en alarma × **0,5 h**\
    \ [F4]\n- **1,2** = Factor de corrección por tolerancias de fabricación de las\
    \ baterías [F6]\n\n---\n\n## Paso 1 — Consumos base de la central (condiciones\
    \ de NO alarma)\n\nUsa la **Tabla 1** para la versión **AM-8200 (CPU AM8200-KLCD)**\
    \ [F4]:\n\n- AM-8200 CPU (AM8200-KLCD): **179 mA**\n- LIB-8200 (por unidad): **50\
    \ mA**\n- AM82-2S2C (por unidad): **28 mA**\n- AM82-BST-C (por unidad): **39 mA**\n\
    \nUsa la **Tabla 2** para la versión **AM-8200BB** [F5]:\n\n- AM-8200BB: **135\
    \ mA**\n- LIB-8200 (por unidad): **50 mA**\n- AM82-2S2C (por unidad): **28 mA**\n\
    - AM82-BST-C (por unidad): **39 mA**\n\n---\n\n## Paso 2 — Consumos en condiciones\
    \ de ALARMA\n\n**Tabla 1 — AM-8200 (CPU AM8200-KLCD)** [F4]:\n\n- AM-8200 CPU:\
    \ **345 mA**\n- LIB-8200 (por unidad): **92 mA**\n- AM82-2S2C (por unidad): **28\
    \ mA**\n- AM82-BST-C (por unidad): **39 mA**\n\n**Tabla 2 — AM-8200BB** [F5]:\n\
    \n- AM-8200BB: **177 mA**\n- LIB-8200 (por unidad): **92 mA**\n- AM82-2S2C (por\
    \ unidad): **28 mA**\n- AM82-BST-C (por unidad): **39 mA**\n\n---\n\n## Paso 3\
    \ — Añadir consumos de dispositivos de campo\n\nA los consumos base debes sumar\
    \ [F4][F5][F6]:\n\n- **Corriente de los lazos**: consultar fichas de datos de\
    \ cada dispositivo instalado. La corriente total de todos los lazos debe ser **inferior\
    \ a 750 mA** [F6].\n- **Salida de usuario (24 Vcc)**: corriente total debe ser\
    \ **inferior a 2 A** [F6].\n- **Dispositivos de aviso** (campanas, sirenas, flashes):\
    \ consumo en reposo = 0; añadir consumo en alarma según ficha del fabricante [F4][F5].\n\
    - **LCD-8200** y otros dispositivos externos: según ficha técnica.\n\n> ⚠️ **Nota\
    \ importante**: En alarma, la central enciende **solo los primeros 6 LED** de\
    \ los detectores y módulos de entrada en alarma. Tenerlo en cuenta al calcular\
    \ la corriente de alarma de los lazos [F6].\n\n> ⚠️ Si la corriente total calculada\
    \ supera **3,5 A**, la corriente en exceso durante alarma se extrae de las baterías\
    \ [F6].\n\n---\n\n## Paso 4 — Aplicar la fórmula\n\n1. Suma todos los consumos\
    \ en reposo → **Total reposo (mA)**\n2. Multiplica por las horas de autonomía\
    \ requeridas: **× 24 h** o **× 72 h** → resultado en **mAh** → convierte a **Ah**\
    \ = valor **A**\n3. Suma todos los consumos en alarma → **Total alarma (mA)**\n\
    4. Multiplica por **0,5 h** → resultado en **mAh** → convierte a **Ah** = valor\
    \ **B**\n5. Aplica: **Ah Batería = (A + B) × 1,2**\n\n---\n\n## Límites y baterías\
    \ admitidas\n\n- Capacidad mínima: **7 Ah** por batería (configuración 2 × 12\
    \ V) [F7]\n- Capacidad máxima: **18 Ah** por batería [F7]\n- Baterías recomendadas\
    \ [F7]:\n  - Yuasa **NP18-12B** o **NP7-12BFR** (UL94) — 12 V / 17,2 Ah — 181\
    \ × 77 × 167 mm\n  - Fiamm **FG21803** o **FGV21803** (UL94) — 12 V / 18 Ah —\
    \ 181 × 77 × 167 mm\n\n---\n\nFuente: AM-8200 Manual de Instalación (Doc. AM-8200-ESP\
    \ Rev. A.3)\n\n---\n\nTambién puedo ayudarte con: **consumos detallados de dispositivos\
    \ de lazo (Tabla 3)**, **conexionado de baterías** o **umbrales de señalización\
    \ del cargador** del AM-8200."
