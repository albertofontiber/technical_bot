- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  answer: '# Programación de coincidencia de dos detectores en la ID3000


    La función de coincidencia en la ID3000 se configura en la **Matriz de Control
    (E/S)**. A continuación el procedimiento:


    ---


    ## Consideración previa importante


    ⚠️ **No incluyas pulsadores manuales (MCP) en el grupo de coincidencia** [F1],
    según requisito **EN54-2: 7.1.4** [F1]. Si en la zona hay MCPs, debes programar
    **dos instrucciones separadas** en la Matriz de Control [F1]:


    - **Primera instrucción:** define la entrada tipo **''Pulsador Manual'' (MCP)**
    como **''Simple''** (sin coincidencia) [F1].

    - **Segunda instrucción:** define el tipo de entrada al que se aplicará la coincidencia
    (p.ej. **''ANALÓGICA''**, que incluye detectores térmicos, iónicos, ópticos, VIEW
    y multisensor) [F1].


    ---


    ## Pasos de programación


    **1. Accede a la Matriz de Control** y crea o edita la instrucción correspondiente
    a la salida de sirena.


    **2. En la ventana "Edición Evento de Entrada en la Matriz de Control"**, configura
    los siguientes campos [F2]:


    - **Categoría:** ALARMA

    - **Evento:** ALARMA

    - **Tipo de Equipo:** selecciona el tipo al que aplicar la coincidencia (p.ej.
    ANALÓGICA para detectores automáticos)


    **3. Selecciona el ámbito de la entrada:**


    - Elige **"Zona(s) Determinada"** e indica el rango de zona correspondiente [F2].

    - La función de coincidencia se aplica solo si la entrada está especificada como
    **''ZONA''**, **''SUBZONA''** o **''CUALQUIERA''** — no si es un equipo individual
    o una tecla [F1].


    **4. Activa la coincidencia de equipos:**


    - En el campo **"Coincidencia de [N] Equipos"**, establece el valor en **2** [F2][F8].

    - Marca la casilla correspondiente para activarla.


    Esto significa que deben activarse las alarmas de **dos equipos de esa zona**
    antes de que se active la salida [F1].


    ---


    ## Opción alternativa: Coincidencia a nivel de central (prealarma)


    Existe también una función de **Coincidencia de Equipos a nivel de central** (Sección
    4 del Anexo, versión de software 4.63) [F9], que actúa **antes** de que el sistema
    entre en alarma (estado de prealarma). A diferencia de la Matriz de Control, aquí
    la coincidencia se comprueba **antes** de que el sistema entre en estado de alarma
    [F9].


    Los niveles disponibles incluyen, entre otros [F9]:

    - **Nivel 2:** Dos o más sensores en la misma zona.

    - **Nivel 3:** Dos o más sensores en diferentes zonas pero en la misma central.

    - **Nivel 4:** Dos o más sensores en la misma zona o zonas diferentes y en la
    misma central.


    ⚠️ Esta función aplica **solo a sensores**, no a módulos de entrada [F9]. La opción
    por defecto es **Nivel 1 (sin coincidencia)** [F9].


    Puedes configurar los niveles disponibles desde **Modificar Opciones de la Central
    → pestaña "Coincidencia de Alarma"** [F4], sección **"Nivel de Coincidencia de
    los Equipos en Alarma"** [F4].


    ---


    ## Comportamiento en sistemas en red


    Si trabajas en un sistema en red [F3][F6]:


    - **Zona especificada en otra central:** la coincidencia requiere dos sensores
    en alarma en esa zona concreta.

    - **Cualquier zona en cualquier central:** la coincidencia requiere dos sensores
    en alarma en cualquier lugar de la red, incluso en centrales diferentes.


    ---


    Fuentes:

    - MCDT190 (sin revisión registrada)

    - MADT190_07 (sin revisión registrada)

    - MCDT191_F v. 2.17e (sin revisión registrada)

    - MPDT190_D (sin revisión registrada)

    - MA-DT-190_14 — Anexo ID3000, versión de software 4.63 (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de la pestaña "Coincidencia de Alarma"
    en las opciones de central**, **programación de subzonas con coincidencia**, o
    **comportamiento del estado de "Primera Alarma" (prealarma)** en la ID3000.'
