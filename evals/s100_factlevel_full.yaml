- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '## Test anual del detector VESDA-E VEP según el manual del fabricante


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido** [F1][F2], las tareas
    que corresponden realizarse **una vez al año** son las siguientes:


    ---


    ### Tareas anuales obligatorias


    1. **Realizar una prueba de humos** para comprobar la integridad de la red de
    tubería [F1][F2]

    2. **Comprobar el flujo de la red de tubería** [F1][F2]

    3. **Limpiar los puntos de muestreo** [F1][F2]

    4. **Limpiar con agua la red de tubería** [F1][F2]


    ---


    ### Procedimiento de la prueba de humos


    La prueba de humos consiste en introducir una muestra de humo en el **orificio
    de muestreo más alejado** y medir el tiempo que tarda el humo en llegar al detector
    [F3][F4]. Los resultados deben registrarse y compararse con pruebas posteriores
    para tener en cuenta las variaciones del sistema [F3][F4].


    > ⚠️ El manual remite al documento **VESDA-E Commissioning Guide** para los detalles
    completos del procedimiento de prueba de humos [F3][F4].


    ---


    ### Precauciones previas al mantenimiento


    Antes de realizar cualquier tarea de mantenimiento o prueba [F1][F2]:


    - **Informe a la autoridad supervisora adecuada.**

    - **Aísle todos los dispositivos existentes** que dependan del detector antes
    de comenzar.

    - Recuerda que cuando el detector está deshabilitado o en espera, **no emitirá
    advertencias de fuego**.

    - Cuando se realicen pruebas de humo, **sigue los procedimientos del sitio** para
    evitar falsas alarmas en los servicios supervisados.


    ---


    ### Modo en espera durante el mantenimiento


    Si necesitas realizar trabajos en la red de tubería o puntos de muestreo, es recomendable
    establecer el detector en **modo en espera** para apagar el aspirador [F10]. Para
    ello:


    1. En **Xtralis VSC**, selecciona **"Go to Standby"** en el menú **"Device"**
    [F10].

    2. El LED desactivado parpadeará y se desactivará el aspirador [F10].

    3. Al finalizar, selecciona **"End Standby"** en el menú **"Device"** para reactivar
    la unidad [F10].


    > ⚠️ En modo en espera se detiene la detección de alarmas, aunque **sí continúa
    la detección y señalización de fallos** [F10].


    ---


    ### Notas adicionales


    - El mantenimiento puede realizarlo el instalador original, un distribuidor autorizado
    o el contratista de servicio [F1][F2].

    - La frecuencia puede variar según los **códigos y normas locales** y el entorno
    de la instalación [F1][F2].


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento completo de AutoLearn Flow**, **configuración
    de relés de fallo** o **lista de verificación de instalación** del VESDA-E VEP.'
