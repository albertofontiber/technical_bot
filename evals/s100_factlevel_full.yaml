- qid: hp020
  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — INSPIRE E10/E15


    ---


    ## Información general


    La contraseña debe tener entre **4 y 8 dígitos** [F1][F2][F4]. El código de fábrica
    para el nivel 2 es **"22222222"** [F4], y se recomienda cambiarlo [F4].


    - Si estás en **nivel de acceso 2**: puedes cambiar únicamente la contraseña de
    nivel 2 [F1].

    - Si estás en **nivel de acceso 3**: puedes cambiar la contraseña de nivel 2 **o**
    de nivel 3 [F1].


    ---


    ## Procedimiento para cambiar la contraseña de Nivel 2 (desde nivel 2)


    1. Selecciona el icono del menú ① y selecciona **"Configuración"** ② [F2].

    2. Inicia sesión como usuario de **nivel de acceso 2** [F2].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F2].

    4. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y que el cursor
    parpadee ⑤ [F2].

    5. Puedes ver la entrada del código haciendo clic en el **icono del ojo** ⑥ [F2].

    6. Introduce el nuevo código de acceso (entre 4 y 8 caracteres) con el teclado
    ⑦ [F2].

    7. Confirma la entrada seleccionando el símbolo **✓** ⑧ [F2].

    8. Repite los pasos 3 a 7 para confirmar el código introducido [F2].


    ---


    ## Procedimiento para cambiar la contraseña de Nivel 2 o Nivel 3 (desde nivel
    3)


    1. Selecciona el icono del menú ① y selecciona **"Ajustes"** ② [F1].

    2. Inicia sesión como usuario de **nivel de acceso 3** [F1].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F1].

    4. Asegúrate de que el **Nivel de Acceso 2 o 3** ④ esté seleccionado y que el
    cursor parpadee ⑤ [F1].

    5. Puedes ver la entrada del código haciendo clic en el **icono del ojo** ⑥ [F1].

    6. Introduce el nuevo código de acceso (entre 4 y 8 caracteres) con el teclado
    ⑦ [F1].

    7. Confirma la entrada seleccionando el símbolo ⑧ [F1].

    8. Repite los pasos 3 a 7 para confirmar el código introducido [F1].

    9. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1].

    10. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    ---


    ## ⚠️ Consideraciones de seguridad


    - El código de acceso del nivel 2/3 debe tener entre **4 y 8 caracteres** [F3].

    - Mantén los códigos seguros y accesibles solo para usuarios autorizados [F4].

    - Si los controles no se usan durante **5 minutos** tras iniciar sesión en nivel
    2, la central cerrará sesión automáticamente y volverá al **nivel de acceso 1**
    [F4].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha INSPIRE E10/E15)

    - HOP-338-9ES issue 4, 01-2026 (Instrucciones de usuario INSPIRE E10/E15)

    - 4188-1122-ES issue 4, 04-2025 (Ciberseguridad INSPIRE)


    ---


    También puedo ayudarte con: **acceso con contraseña a los controles desde la pantalla
    HMI**, **sincronización del programa CLSS tras cambio de contraseña** o **lectura
    de la configuración de la central**.'
