- qid: cat012
  question: ¿Cómo se calcula la capacidad de batería (en Ah) necesaria para la central
    AM-8200?
  answer: '# Cálculo de capacidad de batería — AM-8200


    El manual establece el procedimiento mediante las **Tabla 1** (para AM-8200 con
    CPU AM8200-KLCD) y **Tabla 2** (para AM-8200BB) [F3][F4][F5]. La fórmula final
    es común a ambas variantes.


    ---


    ## Fórmula general


    **Ah Batería = (A + B) × 1,2** [F4][F5]


    Donde:

    - **A** = Corriente total en reposo (No Alarma) × horas de autonomía requeridas
    (24 h o 72 h) → resultado en **Ah**

    - **B** = Corriente total en alarma × **0,5 h** → resultado en **Ah**

    - **× 1,2** = Factor de corrección por tolerancias de fabricación de las baterías
    [F6]


    ---


    ## Paso a paso


    **1. Calcular la corriente total en condiciones de NO ALARMA (columna A)**


    Suma los consumos de cada componente instalado:


    Para la variante **AM-8200 (CPU AM8200-KLCD)** [F4]:

    - AM-8200 CPU (AM8200-KLCD): **179 mA**

    - LIB-8200 (por unidad): **50 mA**

    - AM82-2S2C: **28 mA**

    - AM82-BST-C: **39 mA**

    - Dispositivos de lazos (ver Tabla 3 del manual): consultar fichas de datos de
    cada dispositivo [F6]

    - Salida usuario (máx. **2 A**): consumo real de campanas, sirenas, flashes, etc.
    [F4]


    Para la variante **AM-8200BB** [F5]:

    - AM-8200BB: **135 mA**

    - LIB-8200 (por unidad): **50 mA**

    - AM82-2S2C: **28 mA**

    - AM82-BST-C: **39 mA**


    **2. Multiplicar el total de NO ALARMA por las horas de autonomía**


    → Total NO ALARMA (A) × **24 h** o × **72 h** = **Ah (A)** [F4][F5]


    **3. Calcular la corriente total en condiciones de ALARMA (columna B)**


    Para la variante **AM-8200 (CPU AM8200-KLCD)** [F4]:

    - AM-8200 CPU: **345 mA**

    - LIB-8200: **92 mA**

    - AM82-2S2C: **28 mA**

    - AM82-BST-C: **39 mA**

    - Dispositivos de lazos en alarma: la central enciende **solo los primeros 6 LED**
    de detectores y módulos de entrada en alarma [F6]

    - Salida usuario en alarma (máx. **2 A**) [F4]


    Para la variante **AM-8200BB** [F5]:

    - AM-8200BB: **177 mA**

    - LIB-8200: **92 mA**

    - AM82-2S2C: **28 mA**

    - AM82-BST-C: **39 mA**


    **4. Multiplicar el total de ALARMA por 0,5 h**


    → Total ALARMA (B) × **0,5 h** = **Ah (B)** [F4][F5]


    **5. Aplicar la fórmula final**


    → **Ah Batería = (A + B) × 1,2** [F4][F5][F6]


    ---


    ## Notas importantes


    - Si la corriente total calculada supera **3,5 A**, la corriente en exceso durante
    alarma se extrae de las baterías [F6].

    - La corriente total de todos los lazos debe ser **inferior a 750 mA** [F6].

    - La corriente total de la salida de 24 Vcc (salida usuario) debe ser **inferior
    a 2 A** [F6].

    - Rango admitido de baterías: **2 × 12 V, mín. 7 Ah — máx. 18 Ah** [F7].


    ---


    ## Baterías recomendadas por el fabricante


    - Yuasa **NP18-12B** o **NP7-12BFR** (UL94): 12 V / 17,2 Ah — 181 × 77 × 167 mm
    [F7]

    - Fiamm **FG21803** o **FGV21803** (UL94): 12 V / 18 Ah — 181 × 77 × 167 mm [F7]


    ---


    > ⚠️ **Nota:** Los fragmentos recuperados contienen la estructura de las tablas
    de cálculo (Tabla 1 y Tabla 2) pero las columnas "C" (cantidad de unidades) y
    los totales aparecen vacíos — son campos que el instalador debe rellenar con los
    datos reales de su instalación. El manual indica que hay un **apéndice específico
    de cálculo de baterías** al final del manual físico [F1]; consúltalo para el formulario
    completo.


    ---


    **Fuente:** AM-8200 Manual de Instalación — Doc. AM-8200-ESP Rev. A.3 (AM8200_manu-inst_ESP)
    | Sin revisión de fecha registrada.


    ---


    También puedo ayudarte con: **consumos detallados de dispositivos de lazo (Tabla
    3)**, **conexionado de baterías al cargador** o **umbrales de señalización de
    la sección de carga**.'
