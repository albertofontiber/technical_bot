- qid: cat017
  question: ¿Como se cablea y se da de alta (configura) un lazo en la central Notifier
    INSPIRE (E10/E15)?
  answer: "# Cableado y configuración de lazo — Notifier INSPIRE E10/E15\n\n---\n\n\
    ## 1. CABLEADO FÍSICO DEL LAZO\n\n### Terminales del módulo LAZO OPAL X2 (HOP-433-100)\n\
    \nEl módulo de doble lazo tiene **10 terminales** [F2][F3]:\n\n**Lazo 1:**\n-\
    \ Terminal **1** → Lazo 1 Salida +VE\n- Terminal **2** → Lazo 1 Salida -VE\n-\
    \ Terminal **3** → ⊕ (**NO usar para pantalla de cable**)\n- Terminal **4** →\
    \ Lazo 1 Entrada +VE\n- Terminal **5** → Lazo 1 Entrada -VE\n\n**Lazo 2:**\n-\
    \ Terminal **6** → Lazo 2 Salida +VE\n- Terminal **7** → Lazo 2 Salida -VE\n-\
    \ Terminal **8** → ⊕ (**NO usar para pantalla de cable**)\n- Terminal **9** →\
    \ Lazo 2 Entrada +VE\n- Terminal **10** → Lazo 2 Entrada -VE\n\n> ⚠️ **IMPORTANTE:**\
    \ La pantalla del cable de lazo debe conectarse a la **barra de tierra** de la\
    \ central, NO a los terminales 3 u 8 [F2][F3]. Se recomienda poner a tierra **un\
    \ solo extremo** de la pantalla [F5].\n\n> ⚠️ **NO mezclar dispositivos OPAL y\
    \ CLIP en el mismo lazo** [F2].\n\n---\n\n## 2. COMPROBACIONES PREVIAS DE CABLEADO\
    \ (antes de conectar a la central)\n\nSe recomienda usar la herramienta **POL-200-TS**\
    \ para verificar el lazo antes de conectarlo [F5].\n\n### Con multímetro — pasos\
    \ obligatorios:\n\n**Paso 1 — Preparación de aisladores:**\n- En dispositivos\
    \ OPAL: al retirar el detector de la base B501 AP, los terminales +2 y +4 mantienen\
    \ continuidad automáticamente [F8].\n- En módulos y pulsadores OPAL con aisladores:\
    \ puentear terminales +2/+4 (módulos) o +3/+4 (pulsadores) [F8].\n- En dispositivos\
    \ CLIP: puentear temporalmente los terminales 2 y 4 de cada aislador [F8].\n\n\
    **Paso 2 — Continuidad y resistencia:**\n- Comprobar continuidad de cada tramo\
    \ del lazo [F6].\n- Medir resistencia de extremo a extremo: entre **Lazo X Entrada\
    \ -VE** y **Lazo X Salida -VE** con el lazo desconectado de la central, multiplicar\
    \ el resultado por 2 y sumar la resistencia de cada aislador (**0,1 a 0,13 Ω**\
    \ por aislador) [F8].\n- La capacidad del cable debe ser **inferior a 0,5 µF**\
    \ [F8].\n\n**Límites de resistencia máxima** [F8]:\n- Protocolo **OPAL**: resistencia\
    \ **< 40 Ω**\n- Protocolo **CLIP** (detección de dirección duplicada): **< 40\
    \ Ω**\n- Protocolo **CLIP** (sin detección de dirección duplicada): **< 71 Ω**\n\
    \n**Paso 3 — Comprobación de pantalla:**\n- Verificar continuidad de la pantalla\
    \ de extremo a extremo (valor muy bajo) [F6].\n- Comprobar que NO hay continuidad\
    \ entre la pantalla y los cables +VE ni -VE [F6][F7].\n\n**Paso 4 — Prueba de\
    \ diodo:**\n- Conectar multímetro en **polaridad invertida** (+VE del multímetro\
    \ al -VE del lazo): debe indicar símbolo de diodo en polarización directa [F7].\n\
    - Conectar en **polaridad normal**: la resistencia debe comenzar baja y aumentar\
    \ progresivamente al cargarse los condensadores de los dispositivos [F7].\n- Si\
    \ en polaridad normal aparece diodo en directa → hay dispositivos con polaridad\
    \ invertida o cortocircuito → localizar por sectorización sucesiva [F7].\n\n>\
    \ ⚠️ **NUNCA usar dispositivos de alta tensión (p.ej. comprobador de aislamiento)\
    \ en el circuito de lazo** [F6].\n\n---\n\n## 3. CONEXIÓN A LA CENTRAL\n\n**Lazo\
    \ OPAL:** Una vez verificado el cableado, conectar el circuito al bloque de terminales\
    \ de lazo seleccionado en la central [F5].\n\n**Lazo CLIP:** [F5]\n1. Reconectar\
    \ los aisladores que se puentearon temporalmente.\n2. Reconectar módulos de lazo\
    \ y pulsadores.\n3. Conectar el circuito al bloque de terminales de lazo seleccionado.\n\
    \n---\n\n## 4. NUMERACIÓN DE LAZOS\n\nLos circuitos de lazo se numeran **secuencialmente\
    \ de izquierda a derecha** del portamódulos [F2]. En la E15 (dos filas de portamódulos),\
    \ la segunda fila continúa la numeración desde la primera.\n\n---\n\n## 5. CONFIGURACIÓN\
    \ DEL LAZO EN CLSS (Auto Configuración)\n\n### Paso previo — Configuración inicial\
    \ con CLSS:\n\nAntes de realizar la Auto Configuración, especialmente en lazos\
    \ CLIP o TC800, la central debe configurarse con el programa **CLSS** [F9]:\n\n\
    1. Ir a **Ajustes → Ajustes HMI** → en **Tipo de marca** seleccionar **Notifier\
    \ EN** [F9].\n2. Ir a **Ajustes de lazo** [F9]:\n   - Si el lazo **no se usa**:\
    \ marcar ☑ **Sin Uso** [F1][F9].\n   - Si el lazo se usa: seleccionar **Limitar\
    \ a VdS 2540** (Sí/No) — el valor de resistencia cambia según la selección. Seleccionar\
    \ el **tipo de cable** [F9].\n3. Enviar la configuración a la central siguiendo\
    \ el procedimiento \"Enviar configuración a la central\" [F9].\n\n> ℹ️ De forma\
    \ predeterminada, la central tiene licencia para **protocolo OPAL avanzado** únicamente.\
    \ Para usar CLIP o TC800, se requiere **licencia adicional** antes de la Auto\
    \ Configuración [F9].\n\n### Auto Configuración desde la central:\n\n**Paso 1:**\
    \ Seleccionar **Auto Configuración** en el menú. Leer la ventana emergente y confirmar\
    \ pulsando **Auto Configuración** / **Learn Devices** [F10].\n\n> ℹ️ Si no hay\
    \ protocolo especificado en la configuración, el lazo usará por defecto el **protocolo\
    \ OPAL** [F10].\n\n**Paso 2:** Una vez completada la búsqueda, seleccionar la\
    \ flecha **>** junto al botón Auto Búsqueda para ver el estado de averías del\
    \ lazo [F10].\n\n**Paso 3:** Leer los mensajes de avería y corregir los problemas\
    \ detectados. Seleccionar **Hecho** al completar [F10].\n\nCausas típicas de averías\
    \ tras Auto Configuración [F10]:\n- Discordancia entre diseño e instalación real\n\
    - Averías en el cableado\n- Fuente de RFI externa\n- Error de módulo o fuente\
    \ de alimentación\n- Conexionado incorrecto en dispositivos\n\n**Paso 4:** Repetir\
    \ los pasos 1 a 3 si se han corregido averías [F10].\n\n**Paso 5:** Repetir el\
    \ proceso para cada lazo hasta descubrir todos [F10].\n\n---\n\n## 6. CAPACIDAD\
    \ DE LAZO (referencia)\n\n- Dispositivos **OPAL**: hasta **159 detectores + 159\
    \ módulos** por lazo [F2]\n- Dispositivos **CLIP**: hasta **99 detectores + 99\
    \ módulos** por lazo [F2]\n- Corriente máxima por lazo: **750 mA** [F2]\n- Longitud\
    \ máxima de cable: **hasta 3,5 km** dependiendo del tipo de carga y cable (verificar\
    \ con calculador CLSS) [F2]\n- Restricción EN54-2 (13.7): máximo **512 detectores\
    \ y/o pulsadores** por módulo de lazo dual (2 lazos) [F2]\n\n---\n\n**Fuentes:**\n\
    - HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha INSPIRE E10/E15)\n\
    - HOP-138-9ES issue 5, 11-2025 (Manual de instalación INSPIRE E10)\n\nTambién\
    \ puedo ayudarte con: **mensajes de avería y su significado**, **configuración\
    \ de zonas en CLSS** o **conexionado de módulos de salida** en la INSPIRE E10/E15."
