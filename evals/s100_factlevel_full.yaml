- qid: cat022
  question: En los detectores de llama Spectrex SharpEye 40/40, ¿qué diferencia hay
    entre el modelo 40/40L y el 40/40L4, y qué significa el sufijo «B» (p. ej. 40/40LB)?
  answer: '## Diferencias entre 40/40L, 40/40L4 y significado del sufijo «B»


    ### 40/40L vs. 40/40L4 — Sensibilidad


    La diferencia más clara que aparece en los fragmentos es la **sensibilidad de
    detección**:


    - **40/40L** (y su variante 40/40LB): ajuste de sensibilidad en **15**, correspondiente
    a **50 ft / 15 m** [F1]

    - **40/40L4** (y su variante 40/40L4B): ajuste de sensibilidad en **28**, correspondiente
    a **93 ft / 28 m** [F1]


    Es decir, el **40/40L4 tiene mayor alcance de detección** que el 40/40L según
    los valores de sensibilidad disponibles en los fragmentos.


    > ⚠️ Los fragmentos no describen otras diferencias técnicas entre ambos modelos
    (óptica, espectro, certificaciones específicas, etc.). Para más detalle, consulta
    el manual completo.


    ---


    ### Sufijo «B» — ¿Qué significa?


    Los fragmentos **no definen explícitamente** qué significa el sufijo «B» en los
    modelos 40/40LB y 40/40L4B. El manual MNDT722_40-40L cubre los modelos **S40/40L-LB-L4-L4B**
    [F2][F4] de forma conjunta, pero no incluye en los fragmentos recuperados una
    explicación del significado de dicho sufijo.


    Lo que sí se puede confirmar es que **ambas variantes con «B» comparten los mismos
    ajustes de sensibilidad** que sus homólogos sin «B»:

    - 40/40LB: misma tabla de sensibilidad que el 40/40L (ajuste 15 → 50 ft / 15 m)
    [F1]

    - 40/40L4B: misma tabla de sensibilidad que el 40/40L4 (ajuste 28 → 93 ft / 28
    m) [F1]


    Asimismo, el Air Shield P/N 777650 es compatible con ambas variantes (con y sin
    «B») [F3].


    **Para el significado exacto del sufijo «B», consulta la sección de tipos y modelos
    del manual MNDT722_40-40L**, equivalente a la sección 1.2 del manual del 40/40I
    [F10], que en los fragmentos disponibles no ha sido recuperada para el 40/40L.


    ---


    Fuente: Manual de usuario. Detector S40/40L-LB-L4-L4B (MNDT722_40-40L, rev. MN-DT-722_B);
    SharpEye™ 40/40 Flame Detectors User Guide (TM777050 Rev. Da, October 2017); SharpEye™
    40/40 Air Shield Installation Guide (P/N 777650)


    ---


    También puedo ayudarte con: **especificaciones eléctricas del 40/40L**, **opciones
    de cableado disponibles** o **procedimiento de prueba BIT manual**.'
