- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura a través de las **reglas
    de causa-efecto**. A continuación te explico el proceso y los parámetros disponibles.


    ---


    ### 1. Acceso al menú de configuración


    Desde el nivel de acceso 3 (L3) [F8], accede a:


    **Editar Configuración → 8: Causa y Efecto** [F7]


    ---


    ### 2. Tipos de retardo disponibles


    Dentro de cada regla de causa-efecto, puedes asignar **uno de seis tipos de retardo
    de salida** [F1]. Cada tipo determina el comportamiento durante la cuenta atrás:


    **Fijo**

    - No muestra tiempo restante en LCD

    - No puede anularse ni detenerse

    - No responde a SILENCIAR SIRENAS ni AMPLIAR RETARDO


    **Estándar**

    - Muestra tiempo restante en pestaña ALARMA [F2]

    - La salida se detiene si se pulsa SILENCIAR SIRENAS [F2]

    - Puede anularse con «Anular retardos» (nivel acceso 2) [F2]

    - Puede detenerse con FIN RETARDO (nivel acceso 2) [F2]


    **No Silenc.**

    - Muestra tiempo restante en pestaña ALARMA [F2]

    - **No** se detiene al pulsar SILENCIAR SIRENAS [F2]

    - Puede anularse con «Anular retardos» (nivel acceso 2) [F2]

    - Puede detenerse con FIN RETARDO (nivel acceso 2) [F2]


    **Est. Ext.**

    - Muestra tiempo restante en pestaña ALARMA [F2]

    - La salida se detiene si se pulsa SILENCIAR SIRENAS [F2]

    - La salida se detiene si se pulsa AMPLIAR RETARDO [F2]

    - Puede anularse con «Anular retardos» (nivel acceso 2) [F2]

    - Puede detenerse con FIN RETARDO (nivel acceso 2) [F2]


    **RetExtStd**

    - Muestra tiempo restante en pestaña ALARMA [F2]

    - La salida se detiene si se pulsa SILENCIAR SIRENAS [F2]

    - El temporizador comienza en RETARDO AMPLIADO al pulsar AMPLIAR RETARDO [F2]

    - Puede anularse con «Anular retardos» (nivel acceso 2) [F2]

    - Puede detenerse con FIN RETARDO (nivel acceso 2) [F2]


    **No Sil. Ext**

    - Muestra tiempo restante en pestaña ALARMA [F2]

    - **No** se detiene al pulsar SILENCIAR SIRENAS [F2]

    - La salida se detiene si se pulsa AMPLIAR RETARDO [F2]

    - Puede anularse con «Anular retardos» (nivel acceso 2) [F2]

    - Puede detenerse con FIN RETARDO (nivel acceso 2) [F2]


    **SinRetExt**

    - Muestra tiempo restante en pestaña ALARMA [F2]

    - El temporizador comienza en RETARDO AMPLIADO al pulsar AMPLIAR RETARDO [F2]

    - Puede anularse con «Anular retardos» (nivel acceso 2) [F2]

    - Puede detenerse con FIN RETARDO (nivel acceso 2) [F2]


    ---


    ### 3. Borrar una regla de causa-efecto


    Si necesitas eliminar una regla existente: sitúa el cursor en cualquier columna
    de la regla y pulsa **C**. Ten en cuenta que **la última regla no puede borrarse**
    (es la que tiene asterisco delante del número) [F1].


    ---


    ### 4. Anular/habilitar retardos desde el panel (operación)


    Si necesitas activar o desactivar los retardos configurados sin entrar en configuración
    [F3]:


    1. Accede al **Menú Anular/Habilitar** (nivel acceso 2)

    2. Selecciona **«5: Retardo Activación Salidas»**

    3. Pulsa **✓** para cambiar el estado (habilitado ↔ anulado)

    4. Pulsa **✕** para salir


    ---


    ### 5. Nota sobre el pulsador AMPLIAR RETARDO


    La opción **«10: Extend Delay Button»** en los parámetros de la central permite
    habilitar o deshabilitar el pulsador AMPLIAR RETARDO, ya que esta función no se
    requiere en algunos mercados [F6].


    ---


    > ⚠️ **Aviso normativo:** El uso de retardos puede contravenir las disposiciones
    de **EN54-2**, párrafos **7.4.2, 7.4.3** (condiciones de incendio) y **8.6.3**
    (condiciones de fallo), dependiendo del período establecido [F7].


    ---


    **Fuente:** Manual de configuración de la central PEARL 997-671-005-3 (sin revisión
    registrada); Manual de funcionamiento PEARL 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **programación de reglas de causa-efecto completas**,
    **configuración de coincidencia de zona** o **gestión de niveles de acceso de
    usuario** en la PEARL.'
