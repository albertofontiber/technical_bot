- qid: hp003
  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  answer: '## Conexión de baterías en la CAD-150-8


    ### ⚠️ Orden de conexión obligatorio


    **Primero red, después baterías.** Si no se respeta este orden, el equipo podría
    sufrir daños [F8].


    1. Conectar primero la alimentación de red (**230 VAC**) activando el magnetotérmico
    bipolar [F6].

    2. Conectar las baterías a continuación [F6].


    ---


    ### Procedimiento de conexión de baterías


    1. **Conecta las baterías entre sí** mediante el cable puente de batería antes
    de conectarlas al circuito [F1].

    2. **Conecta los cables del circuito** (rojo y negro) al positivo y negativo de
    las baterías respectivamente [F1].

    3. El conector de batería en la PCB Base está identificado como **conector 11**
    (etiquetado **BA1** / **BA7** en el diagrama de la placa) [F2][F3].

    4. La placa también dispone de un **fusible de baterías** (componente **10**)
    [F2][F3].


    ---


    ### Arranque solo con baterías (si fuera necesario)


    Si se necesita encender el equipo únicamente con baterías, es **imprescindible
    pulsar el pulsador BAT** (componente **9** — Tecla arranque por batería) para
    arrancar el equipo [F6][F2].


    ---


    ### Verificación previa


    Antes de conectar, comprueba con voltímetro que las baterías tienen una tensión
    **superior a 24 V** [F6].


    ---


    ### Capacidades de batería según modelo


    La gama CAD-150-8 incluye modelos con distintas capacidades [F8]:

    - Modelos de 1, 2 y 4 lazos no ampliables → baterías de **7 A/h**

    - Modelos de 4 lazos ampliable a 8 lazos → baterías de **18 A/h** o **24 A/h**


    ---


    **Fuente:** 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB
    IT (sin revisión registrada); 55315008 Manual Centrales Analógicas CAD-150-8 Usuario
    ES FR GB IT (sin revisión registrada)


    ---


    También puedo ayudarte con: **conexión del bucle analógico**, **puesta en marcha
    completa** o **verificación de fusibles** de la CAD-150-8.'
