- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  answer: "# ASD535 — Fallo de flujo bajo: diagnóstico\n\n## Causa más probable\n\n\
    Un valor de flujo **por debajo del 80 %** del valor nominal indica **obstrucción\
    \ en el conducto de aspiración** [F2]. El ASD535 dispara el aviso «fallo flujo\
    \ de aire» una vez transcurrido el tiempo de retardo de **300 s** de la LS-Ü [F1][F2].\n\
    \nEl código de fallo asociado es el **G30/001** (Obstrucción, conducto de aspiración)\
    \ [F10].\n\n---\n\n## Diagnóstico paso a paso\n\n**1. Leer el valor de flujo actual**\n\
    - Coloca el conmutador en posición **V** para leer el valor de flujo del conducto\
    \ de aspiración [F9].\n- Compara con el protocolo de puesta en funcionamiento.\n\
    - Si el valor está **por debajo del 90 %** (con sensibilidad estándar ±20 %),\
    \ ya es señal de obstrucción inminente [F9].\n- El fallo se confirma cuando cae\
    \ **por debajo del 80 %** [F1][F2].\n\n**2. Inspeccionar el conducto de aspiración**\n\
    Según el código G30/001, comprueba [F10]:\n- Orificios de aspiración obstruidos\
    \ (suciedad, polvo, objetos)\n- Salida de aire en el ASD\n- Caja de filtro / unidad\
    \ de filtrado de polvo → inspeccionar y limpiar\n- Sensor de flujo de aire → inspeccionar\
    \ y limpiar\n\n**3. Verificar la tensión de servicio**\n- Mide en los bornes **1\
    \ (+) y 2 (-)** del AMB 35 [F9]:\n  - Funcionamiento a **12 V-CC**: valor nominal\
    \ **12,3 a 13,8 V-CC**\n  - Funcionamiento a **24 V-CC**: valor nominal **21,6\
    \ a 27,6 V-CC**\n- Un fallo de baja tensión (**< 10,4 V-CC**) también puede generar\
    \ avisos de fallo [F3].\n\n**4. Comprobar el código de evento en el AMB 35**\n\
    - Coloca el conmutador en posición **E** para leer el código de evento y delimitar\
    \ el patrón de error [F3].\n- Código **001** en el grupo G30 = obstrucción confirmada\
    \ [F10].\n\n---\n\n## Acciones correctivas\n\n- **Limpiar el conducto de aspiración**\
    \ (orificios, filtro, sensor de flujo) [F10].\n- Tras la limpieza, **normalmente\
    \ no es necesario un nuevo reset inicial** si se vuelve al estado de puesta en\
    \ funcionamiento [F7].\n- Si se realizan trabajos de mantenimiento o reparación\
    \ en el conducto, puede ser necesario ejecutar un **nuevo reset inicial** — pero\
    \ **solo** cuando el conducto esté completamente limpio y con el filtro nuevo\
    \ instalado [F7].\n\n> ⚠️ **Advertencia**: No ejecutes el reset inicial con orificios\
    \ obstruidos. Existe riesgo de que la toma de muestras sea insuficiente y el ASD535\
    \ no dispare la alarma ante un incendio real [F7].\n\n---\n\n**Fuente:** ASD535\
    \ Descripción técnica, T 131 192 h es (sin revisión registrada)\n\n---\n\nTambién\
    \ puedo ayudarte con: **procedimiento completo de reset inicial**, **sustitución\
    \ del sensor de flujo de aire** o **configuración de la ventana de monitorización\
    \ LS-Ü** del ASD535."
