- qid: cat010
  question: ¿Cómo se alimenta la sirena/avisador intrínsecamente seguro IS-mA1 en
    una zona peligrosa (ATEX) y cuáles son sus parámetros de seguridad intrínseca
    de entrada?
  answer: "# Alimentación e IS del IS-mA1 en zona peligrosa (ATEX)\n\n## Clasificación\
    \ ATEX y zonas de uso\n\nEl IS-mA1 está certificado como [F1]:\n- **Ex ia IIC\
    \ T4 Ga**\n- Temperatura ambiente: **-40 °C ≤ Ta ≤ +60 °C**\n- Certificado: **SIRA\
    \ 05ATEX2084X** (sufijo 'X' → condiciones especiales de uso)\n- Apto para zonas\
    \ **0, 1 y 2** con gases y vapores inflamables, grupos **IIA, IIB e IIC**, clases\
    \ de temperatura **T1, T2, T3 y T4** [F1]\n\n---\n\n## Parámetros de seguridad\
    \ intrínseca de entrada\n\n### Terminales + / − (alimentación principal del avisador)\n\
    \n- **Ui = 28 V** [F1]\n- **Ii = 93 mA** [F1]\n- **Pi = 660 mW** [F1]\n- **Ci\
    \ = 0** [F1]\n- **Li = 0** [F1]\n\n> ⚠️ La capacitancia total conectada a los\
    \ terminales +/−, es decir, C_cable más cualquier otra capacitancia, **no debe\
    \ superar 83 nF** [F4].\n\n### Terminales S2 y S3 / − (cambio de tono — 2.ª y\
    \ 3.ª etapa de alarma)\n\n- **Ui = 28 V** [F3]\n- **Ii = 0 mA** [F3]\n- **Ci =\
    \ 0** [F3]\n- **Uo = 16,8 V** [F3]\n- **Io = 7,3 mA** [F3]\n- **Po = 31 mW** [F3]\n\
    \n> ⚠️ La corriente de entrada permitida es **cero**, por lo que S2 y S3 **solo\
    \ pueden conectarse** a [F5]:\n> - Barrera de diodo de retorno (diode return barrier)\
    \ certificada Ex ia por organismo notificado, con caída de tensión **< 0,9 V**\n\
    > - Relé intrínsecamente seguro certificado Ex ia\n> - Aislador galvánico certificado\
    \ Ex ia\n> - Alternativamente, un interruptor de accionamiento mecánico situado\
    \ en la zona peligrosa\n\n---\n\n## Aparatos asociados requeridos (lado seguro)\n\
    \n### Opción A — Barreras Zener\n\n**Para terminales +/−:**\n- Barrera Zener de\
    \ diodo shunt, canal único, aprobada FM, con parámetros [F3]:\n  - Uo ≤ 28 V\n\
    \  - Io ≤ 93 mA\n  - Po ≤ 660 mW\n  - Co ≥ C_cable\n  - Lo ≥ L_cable\n\n**Para\
    \ terminales S2 y S3:**\n- Barrera de diodo de retorno con [F3]:\n  - Uo ≤ 28\
    \ V\n  - Io = 0\n\n### Opción B — Aisladores galvánicos\n\n**Para terminales +/−:**\n\
    - Fuente galvánicamente aislada con [F4]:\n  - Uo ≤ 28 V\n  - Io ≤ 93 mA\n  -\
    \ Po ≤ 660 mW\n  - Co ≥ C_cable\n  - Lo ≥ L_cable\n\n**Para terminales S2 y S3:**\n\
    - Relé galvánicamente aislado con [F4]:\n  - Uo = 0\n  - Io = 0\n\n> Los aisladores\
    \ galvánicos **no requieren conexión a tierra de alta integridad**, lo que puede\
    \ simplificar la instalación en sistemas pequeños [F10].\n\n---\n\n## Configuración\
    \ de alarma multietapa\n\n- Conectar **S2 a 0 V** activa la **2.ª etapa de alarma**\
    \ [F9]\n- Conectar **S3 a 0 V** activa la **3.ª etapa de alarma** [F9]\n- Si solo\
    \ se necesitan dos etapas, se omite la barrera de la 3.ª etapa [F9]\n\n---\n\n\
    ## Advertencias de instalación\n\n- La resistencia entre la tierra intrínsecamente\
    \ segura y la tierra de protección debe ser **< 1 Ω** (instalación con barreras\
    \ Zener) [F3]\n- La unión entre conexiones de conducto **no es automática** y\
    \ debe garantizarse en la instalación [F3]\n- La separación entre terminales S2\
    \ y S3 es **inferior a 6 mm** — precaución en el conexionado [F3]\n- Limpiar únicamente\
    \ con **paño húmedo** para evitar carga electrostática [F1]\n- Desconectar la\
    \ alimentación antes de cualquier intervención [F4]\n- La sustitución de componentes\
    \ puede comprometer la seguridad [F4]\n\n---\n\nFuente: IS5001-F_IS-mA1_EN (Issue\
    \ E, 27-11-09); manual IS MA1 (Issue H, 03-01-2020)\n\n---\n\nTambién puedo ayudarte\
    \ con: **selección de tono y configuración de los interruptores DIP**, **requisitos\
    \ de cableado y prensaestopas IP65** o **diseño completo del circuito multietapa\
    \ con barreras Zener (Fig. 6)**."
