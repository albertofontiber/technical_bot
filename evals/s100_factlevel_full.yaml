  question: ¿Cómo se cambia la batería tampón de la Detnov ADW535 sin perder configuración?
  answer: 'El procedimiento de sustitución de la **batería tampón** del ADW535 **no
    está descrito en los fragmentos disponibles**.


    Lo que sí aparece en los fragmentos es:


    - Una mención a la **batería de litio** del reloj (código de fallo **G80 / 008**):
    "La cinta aislante de la batería de litio aún no se ha retirado → Retirar" y "Batería
    de litio defectuosa → Sustituir" [F8]. Sin embargo, no se describe el procedimiento
    paso a paso para su sustitución.

    - Información sobre eliminación de baterías (normativa de residuos) [F10].

    - Procedimientos de sustitución del **Main Board LMB 35** [F1] y del **Extension
    Board LEB 35** [F1], pero no de la batería tampón.


    Los fragmentos recuperados del manual **ADW535_TD_T140358es_e** cubren: mantenimiento
    general, reset inicial, sustitución de placas LMB/LEB, tipos de reset y tabla
    de fallos — pero **no incluyen el procedimiento de cambio de batería tampón ni
    cómo preservar la configuración durante ese proceso**.


    **Recomendación:** Consulta directamente el manual físico completo del ADW535
    (sección de conservación y mantenimiento, capítulo 9) o contacta con el soporte
    técnico de Detnov/Securiton para obtener el procedimiento oficial.


    Fuente: ADW535_TD_T140358es_e (sin revisión registrada)'
