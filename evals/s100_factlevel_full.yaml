- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov
    CAD-250: como se crea, como se definen las entradas/eventos que la disparan y
    como se asignan las salidas?'
  answer: "# Configuración de una maniobra completa en la CAD-250\n\n## Concepto previo\n\
    \nUna maniobra es un conjunto de **eventos de entrada** (causas) que, al cumplirse\
    \ según una lógica de coincidencias, disparan **acciones de salida** (efectos)\
    \ [F1]. El sistema gestiona **eventos** (cambios de estado), no estados estáticos\
    \ [F3].\n\nEl número máximo de entradas y salidas configuradas entre todas las\
    \ maniobras es de **100.000** [F3][F7].\n\n---\n\n## PASO 1 — Acceder al menú\
    \ de maniobras\n\nDesde el panel:\n\n**MENÚ** → **MANIOBRAS** → **+AÑADIR** [F1]\n\
    \nDesde el software de configuración:\n\nAccede a la ventana **CREACIÓN DE MANIOBRA**\
    \ [F6].\n\n---\n\n## PASO 2 — Crear la maniobra y definir las coincidencias\n\n\
    Al pulsar **AÑADIR** se accede a la pantalla de edición de la maniobra [F2].\n\
    \nEl campo **COINCIDENCIAS** define cuántos eventos deben cumplirse simultáneamente\
    \ para que la maniobra sea verdadera [F2][F5]:\n\n- **Coincidencias = 1** → basta\
    \ con que **cualquier** evento se cumpla (comportamiento equivalente a puerta\
    \ lógica **OR**) [F2][F5]\n- **Coincidencias = N** (igual al número total de eventos)\
    \ → **todos** los eventos deben cumplirse (comportamiento equivalente a puerta\
    \ lógica **AND**) [F2][F5]\n- **Coincidencias = X** (valor intermedio, p.ej. 3\
    \ de 4 eventos) → se deben cumplir X eventos cualesquiera de los N configurados\
    \ [F2]\n\nUn evento es verdadero cuando se cumplen **todas** las premisas establecidas\
    \ para ese evento [F6].\n\n---\n\n## PASO 3 — Añadir eventos de entrada (causas)\n\
    \n1. Pulsa **AÑADIR** en el margen inferior de la pantalla [F3].\n2. En la pantalla\
    \ emergente, selecciona **EVENTO** [F3].\n3. Se mostrará una nueva pantalla para\
    \ escoger entre [F3]:\n   - **ENTIDAD**: cualquier elemento de la jerarquía del\
    \ sistema (instalación, panel, lazo, área, zona, dispositivo, grupo o módulo virtual),\
    \ tanto del sistema local como de la red [F3].\n   - **CONDICIÓN TEMPORAL**: establece\
    \ un periodo de tiempo durante el cual la ecuación de entrada es verdadera [F3].\n\
    \n4. Si seleccionas **ENTIDAD**, accedes a la pantalla **EVENTO DE LA ENTIDAD**,\
    \ donde configuras el parámetro **REPETICIONES**: número de elementos de la entidad\
    \ que deben cumplir la condición para que la entrada sea verdadera [F3].\n\n5.\
    \ En el software de configuración, puedes arrastrar entidades desde la ventana\
    \ de eventos y editarlas haciendo **doble clic** o pulsando **EDITAR** [F6].\n\
    \n> **Nota importante:** Desde la versión **1.1.1** es posible seleccionar un\
    \ elemento de **salida** como condición de entrada. En ese caso, será el cambio\
    \ a condición de avería el que hará verdadera la condición entrante. Para ello,\
    \ desmarca la casilla **\"Sólo dispositivos de entrada\"** [F6].\n\nPuedes añadir\
    \ tantos eventos como necesites [F6].\n\n---\n\n## PASO 4 — Añadir acciones de\
    \ salida (efectos)\n\n1. Pulsa **AÑADIR** en el margen inferior de la pantalla\
    \ [F4].\n2. En la pantalla emergente, selecciona **ACCIÓN** [F4].\n3. Se presentan\
    \ dos campos [F4]:\n   - **RETRASO**: tiempo de hasta **600 segundos** antes de\
    \ iniciar la acción [F4].\n   - **ENTIDAD**: panel, lazo, área, zona, dispositivo,\
    \ grupo o módulo virtual del sistema local [F4].\n\n4. En la pantalla **ACCIÓN\
    \ DE LA ENTIDAD** configuras [F4][F8]:\n   - **Retraso**: modificable aquí también\
    \ [F4].\n   - **Tipo de acción** disponible [F8]:\n     - **Activar** las salidas\n\
    \     - **Desactivar** las salidas\n     - **Habilitar** la entidad\n     - **Deshabilitar**\
    \ la entidad\n     - **Test**: pone en modo test la entidad\n     - **Reiniciar**\
    \ la entidad\n     - **Pulso**: activa las salidas con anchura de pulso configurable\
    \ entre **0 y 600 segundos** (10 s por defecto) [F8]\n     - **Configuración**:\
    \ permite la cancelación de retardos [F8]\n   - **Tipo de elemento** sobre el\
    \ que actúa [F8]:\n     - **Todos**: todas las salidas de la entidad\n     - **Sirenas**:\
    \ únicamente las sirenas\n     - **Relés**: únicamente los relés\n     - **Sirena\
    \ discontinua**: sirenas en modo discontinuo\n     - **Sirena PCB1**: sirena 1\
    \ de la central\n     - **Sirena PCB2**: sirena 2 de la central [F8]\n\n> **Restricción\
    \ importante:** El programa **no permite mezclar acciones sobre entidades de paneles\
    \ diferentes** en la misma maniobra [F7].\n\n5. Pulsa **GUARDAR** para confirmar,\
    \ o **CANCELAR** para deshacer [F4][F8].\n\n---\n\n## PASO 5 — Verificar la maniobra\
    \ completa\n\nTras configurar eventos y acciones, la ventana de maniobra mostrará\
    \ [F7]:\n- A la **izquierda**: cuadro con todos los eventos (entradas)\n- A la\
    \ **derecha**: cuadro con todas las acciones (salidas)\n\nDesde la tabla de maniobras\
    \ puedes ver el resumen con columnas: **Panel, Coincidencias, Eventos, Acciones**\
    \ [F10].\n\n---\n\n## Herramientas adicionales\n\n- **GRUPOS**: asociaciones de\
    \ elementos, áreas, zonas o dispositivos para facilitar la creación de reglas\
    \ [F1].\n- **MÓDULOS VIRTUALES**: permiten crear bucles interdependientes; un\
    \ conjunto de entradas determina el estado del módulo virtual, que a su vez puede\
    \ actuar como entrada de otra maniobra [F1].\n- **ESTADO VM**: visualiza el estado\
    \ de los módulos virtuales y permite activarlos o usarlos como botones de acceso\
    \ rápido [F1].\n\n> ⚠️ **Recomendación del fabricante:** Planifica bien los escenarios\
    \ antes de crear maniobras, evita crear bucles y verifica todos los escenarios\
    \ y maniobras completos tras la configuración [F9].\n\n---\n\n**Fuentes:**\n-\
    \ CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n- CAD-250\
    \ Manual Software de Configuración MS-416-es-2026-b (rev. b)\n\n---\n\nTambién\
    \ puedo ayudarte con: **configuración de Módulos Virtuales**, **ejemplo completo\
    \ de maniobra con condición temporal y retardo** o **uso de Grupos en maniobras**."
