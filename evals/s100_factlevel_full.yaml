- qid: cat018
  question: ¿Como se programa una ecuacion causa-efecto (CBE) en la Notifier AM-8200
    para que un evento active una salida?
  answer: "# Programación de ecuación CBE en la AM-8200 para activar una salida\n\n\
    ## Concepto previo\n\nUna ecuación CBE (Control By Event) se asocia a cada punto,\
    \ zona o grupo [F1]. Para activar un **módulo de salida**, la CBE contiene las\
    \ direcciones de los objetos (sensores, módulos de entrada o grupos) que lo activarán\
    \ [F1].\n\n---\n\n## Pasos para programar la CBE\n\n**1. Acceder al punto de salida\
    \ en el menú de programación**\n\nNavega hasta el módulo de salida en: `MENU PROGRAMMAZIONE\
    \ \\ Punti \\ Sensori` [F3]\n\n**2. Seleccionar el campo CBE**\n\n- Usa las teclas\
    \ flecha **▲▼** para seleccionar el parámetro CBE [F3]\n- Pulsa la tecla de confirmación\
    \ **☑** para entrar en edición [F3]\n- Si ya hay una ecuación configurada, se\
    \ visualizará; si no, el campo estará vacío [F3]\n\n**3. Escribir la ecuación**\n\
    \nUsa el teclado alfanumérico del panel. Reglas críticas de sintaxis [F1]:\n\n\
    - **Sin espacios** entre caracteres\n- Si usas más de un operador, el primer carácter\
    \ debe ser **(** y el último **)**\n- La longitud máxima de una CBE es de **64\
    \ caracteres** [F3]\n\n**4. Confirmar con Enter** [F3]\n\n---\n\n## Opciones de\
    \ ecuación según el caso de uso\n\n### Caso más simple: un detector activa una\
    \ salida\n\nEl manual describe tres opciones equivalentes [F8]:\n\n- **Opción\
    \ A** — Vía grupo software:\n  - CBE del detector (C1L1S1): `(G1)`\n  - CBE del\
    \ módulo de salida (C1L1M1): `(G1)`\n\n- **Opción B** — Módulo referencia directa\
    \ al sensor:\n  - CBE del módulo de salida: `(C1L1S1)`\n\n- **Opción C** — Sensor\
    \ referencia directa al módulo:\n  - CBE del detector: `(C1L1M1)`\n  - CBE del\
    \ módulo de salida: vacía (se activa por referencia inversa)\n\n---\n\n### Operadores\
    \ disponibles para condiciones más complejas\n\n**OR** — Al menos UN operando\
    \ activo [F4]:\n```\nOR(G9 G15 G23)\n```\n→ Si cualquiera de los grupos G9, G15\
    \ o G23 está en alarma, la salida se activa. El operador OR puede omitirse: `(G9\
    \ G15 G23)` es equivalente [F4].\n\n**AND** — TODOS los operandos activos [F4]:\n\
    ```\nAND(G9 G15 G23)\n```\n→ Solo si los tres grupos están en alarma simultáneamente.\n\
    \n**NOT** — Niega el operando [F4]:\n```\nNOT(G23)\n```\n→ La salida estará activa\
    \ mientras G23 **no** esté en alarma.\n\n**XGRP** — Al menos DOS elementos del\
    \ grupo activos [F5]:\n```\nXGRP(G23)\n```\n→ Doble coincidencia. Solo admite\
    \ **un único grupo** como operando [F5].\n\n**PRE** — Estado de pre-alarma de\
    \ un sensor [F7]:\n```\nOR(PRE(C1L1S2) PRE(C2L1S10))\n```\n\n**FLT** — Estado\
    \ de avería de un dispositivo o zona [F6]:\n```\nOR(FLT(C1L1S2) FLT(Z1))\n```\n\
    \n**DIS** — Desactivación de zonas o puntos [F9]:\n```\n(DIS(Z1))\n```\n→ Cuando\
    \ la Zona 1 está desactivada, el módulo de salida se activa.\n\n---\n\n### Ejemplo\
    \ de alarma general con grupos [F8]\n\n```\nG301 = OR(G1 G2 G3 G4 G5 G6 G7 G8)\n\
    G302 = OR(G9 G10 G11 G12 G13 G14 G15 G16)\nL01M01 CBE = OR(G301 G302)\n```\nÚtil\
    \ cuando la memoria no permite un OR de 16 grupos directos en una sola CBE [F10].\n\
    \n---\n\n## ⚠️ Restricciones importantes\n\n- Para módulos de salida con **tipo\
    \ ID para señalizaciones generales**, la central **no permite** programar una\
    \ ecuación CBE [F4]\n- Para grupos directos: no se puede usar como operando un\
    \ grupo con **índice menor** que el grupo al que se asocia la CBE [F4]\n  - ❌\
    \ `G33 = (G23 G24)` → No permitida\n  - ✅ `G21 = (G23 G24)` → Permitida\n- Para\
    \ grupos inversos: no se puede usar como operando un grupo con **índice mayor**\
    \ [F4]\n  - ❌ `G305 = (G306 G307)` → No permitida\n  - ✅ `G307 = (G305 G306)`\
    \ → Permitida\n- El operador **XGRP** solo admite un grupo, no varios [F5]:\n\
    \  - ❌ `XGRP(G23 G24)` → No permitida\n\n---\n\n**Fuente:** AM-8200 Manual de\
    \ programación, Doc. M-162.1-AM8200-ESP Rev A.3 — HONEYWELL LIFE SAFETY IBERIA\n\
    \n---\n\nTambién puedo ayudarte con: **programación de grupos software (directos\
    \ e inversos)**, **operadores DEL/SDEL para retardos temporales** o **configuración\
    \ del tipo ID de un módulo de salida**."
