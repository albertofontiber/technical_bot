- qid: cat016
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo
    y como se prueba que funciona?
  answer: "# CAD-150-8: Alta de detector nuevo y prueba funcional\n\n## PARTE 1 —\
    \ Alta de un detector nuevo en el lazo\n\nEl proceso para dar de alta un detector\
    \ nuevo se realiza mediante la **autobúsqueda del lazo** [F1]:\n\n1. Instala físicamente\
    \ el detector en el lazo (con el sistema sin alimentación, según las indicaciones\
    \ de seguridad) [F9].\n2. Accede al **menú BUCLE** desde el teclado de la central\
    \ [F1].\n3. Ejecuta la **autobúsqueda** del lazo correspondiente. El sistema realizará\
    \ un escaneo y mostrará todos los elementos detectados [F1].\n4. Verifica que\
    \ los elementos encontrados coinciden con los planos de la instalación [F1].\n\
    5. Accede al **menú ELEMENTOS** para asignar al nuevo detector:\n   - **Nombre**\
    \ (campo TEXTO) que lo identifique [F1][F2]\n   - **Zona** de ubicación (campo\
    \ ZONA) [F1][F2]\n\n> ⚠️ El manual recomienda utilizar el **software de configuración**\
    \ en lugar del teclado, ya que el proceso resulta más sencillo y rápido [F8].\n\
    \n---\n\n## PARTE 2 — Prueba funcional del detector\n\nEl método recomendado es\
    \ poner la zona en **modo PRUEBA**, lo que permite probar los detectores **sin\
    \ necesidad de rearmar la central** [F3]:\n\n### Pasos:\n\n1. Accede al **menú\
    \ ZONA** → opción **PRUEBA** [F3].\n2. Introduce el **rango de zonas** a poner\
    \ en prueba:\n   ```\n   PRUEBA ZONA\n   RANGO  : [000] a [250]\n   ACTIVAR SIRENAS:\
    \ [SI]\n   < Aceptar >        < Salir >\n   ```\n   [F3]\n3. El sistema preguntará\
    \ si deben **dispararse las sirenas**:\n   - Si respondes **SÍ**: las sirenas\
    \ se activarán unos segundos tras la alarma del detector y se silenciarán automáticamente\
    \ [F3].\n   - Si hay retardos configurados en las sirenas, **quedan anulados**\
    \ durante el modo prueba para agilizar la verificación [F3].\n4. Activa el detector\
    \ (con aerosol de prueba u otro método) y verifica que la central registra la\
    \ alarma.\n5. Para **salir del modo prueba**, conecta la zona desde el menú ZONA\
    \ → opción **CONECTAR** [F3].\n\n### Consideración importante:\n> Si transcurridos\
    \ **20 minutos** desde la activación del modo prueba el sistema no detecta ningún\
    \ disparo de alarma, el equipo **vuelve automáticamente al estado normal**, anulando\
    \ el modo prueba [F3][F4].\n\n---\n\n### Verificación del estado del detector\n\
    \nEn cualquier momento puedes comprobar el estado del detector desde **menú ELEMENTO\
    \ → VER** [F2], donde se muestran:\n- **TIPO**: tipo de elemento (óptico, térmico,\
    \ etc.)\n- **MODO**: conectado, desconectado o en prueba\n- **VA**: valor analógico\
    \ del elemento\n- **ZONA**: zona asignada\n- **TEXTO**: nombre del elemento\n\n\
    [F2]\n\n---\n\n**Fuente:** Manual de Usuario `55315008-Manual-Centrales-Analogicas-CAD-150-8-Usuario-ES-FR-GB-IT`\
    \ y Manual de Instalación `55315013 Manual Centrales Analogicas CAD-150-8 Instalacion\
    \ ES FR GB IT` (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con:\
    \ **configuración de maniobras tras el alta del detector**, **desconexión temporal\
    \ de un elemento** o **mantenimiento periódico según EN54** de la CAD-150-8."
