- qid: hp010
  question: En la Morley DXc, ¿cómo se añade un nuevo detector al lazo tras la puesta
    en marcha inicial?
  answer: "## Añadir un nuevo detector al lazo en la DXc\n\nCuando se conecta un nuevo\
    \ detector al lazo tras la puesta en marcha inicial, la central lo detectará como\
    \ **\"EQUIPO NUEVO\"** y generará una avería [F2]. El procedimiento para aceptarlo\
    \ es realizar una **Autobúsqueda de equipos**:\n\n---\n\n### Pasos:\n\n1. **Accede\
    \ al menú de Lazos** (Nivel de programación) [F1].\n\n2. **Pulsa la tecla `2`**\
    \ para seleccionar la función **'Autobúsqueda'** [F1].\n\n3. **Si la central tiene\
    \ más de un lazo**, introduce el número de lazo donde has conectado el nuevo detector\
    \ y pulsa **⊙** [F1].\n\n4. **Confirma la autobúsqueda** pulsando **⊙** cuando\
    \ aparezca la pantalla:\n   ```\n   [Autobusqueda]\n   Lazo: X  Autobusqueda?\n\
    \   OK:Confirm    ←:Cancel\n   ```\n   [F1]\n\n5. **Espera** a que finalice el\
    \ proceso de reconocimiento (se muestra una barra de progreso en pantalla) [F1].\n\
