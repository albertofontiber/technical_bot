- qid: cat009
  question: ¿Qué resistencia de fin de línea (EOL) hay que instalar en las líneas
    de zona de la central convencional NFS Supra?
  answer: "# Resistencia de Fin de Línea (EOL) — NFS Supra\n\nLa central **NFS Supra**\
    \ admite **dos modos de supervisión de zona**, configurables por software. Cada\
    \ modo requiere un componente EOL diferente:\n\n---\n\n## Modo por defecto: **Capacitivo\
    \ (EFL)**\n- Componente: **condensador de 47 µF** [F6]\n- Se instala entre el\
    \ positivo y negativo de la línea, en la salida del **último equipo** de la zona\
    \ [F3]\n- Es el modo de fábrica [F1]\n\n## Modo alternativo: **Resistivo (RFL)**\n\
    - Componente: **resistencia de 6K8 Ω** [F6]\n- Rango admisible en modo resistivo:\
    \ entre **3 KΩ** (consumo máx. por zona 2,5 mA) y **7 KΩ** (consumo máx. por zona\
    \ 4 mA) [F6]\n- Se usa para compatibilidad con sistemas anteriores [F1]\n\n> ⚠️\
    \ **Importante:** Todas las zonas, **incluso las no usadas**, deben tener instalada\
    \ su EOL según la configuración del sistema (EFL o RFL) [F6].\n\n---\n\n## Cómo\
    \ cambiar el modo de supervisión\n\nEl cambio se realiza desde **Nivel de acceso\
    \ 3** (Configuración) [F1]:\n\n1. Pulsa simultáneamente **Tecla TECLADO = ON +\
    \ Tecla EVACUACIÓN = ON** para acceder al menú de configuración de Final de Línea\
    \ [F1]\n2. Usa la **Tecla REARME** para cambiar cíclicamente entre opciones [F1]:\n\
    \   - **Led 1 Alarma (Rojo) encendido** → Final de Línea Resistivo **6K8 Ω** [F1]\n\
    \   - **Led 2 Anulada (Ámbar) encendido** → Final de Línea Capacitivo **47 µF\
    \ / Diodo** (por defecto) [F1]\n\n---\n\n## Nota sobre versiones del manual\n\n\
    Los fragmentos del manual en inglés (versión v.04) mencionan en un punto **4K7\
    \ Ω** como valor resistivo [F8], mientras que el manual en español (v.05) y otros\
    \ fragmentos en inglés (v.05) indican **6K8 Ω** [F1][F6][F7]. Verifica la versión\
    \ exacta de tu central y usa el manual correspondiente para confirmar el valor\
    \ correcto.\n\n---\n\n**Fuentes:**\n- HLSI-MN-025_NFS Supra (Manual de usuario,\
    \ HLS-MN-025 v.05) — sin revisión registrada\n- HLSI-MN-025-I_NFS Supra Series\
    \ v05 (Installation and Operating Manual) — sin revisión registrada\n- HLSI-MN-025-I_NFS\
    \ Supra Series (Installation and Operating Manual, v.04) — sin revisión registrada\n\
    \nTambién puedo ayudarte con: **conexionado de detectores en zona**, **cálculo\
    \ del número máximo de sensores por zona** o **configuración de los circuitos\
    \ de sirena** de la NFS Supra."
