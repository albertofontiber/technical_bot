- qid: hp003
  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  answer: "## Conexión de baterías en la CAD-150-8\n\n### Especificaciones de las\
    \ baterías\n\n- **Tipo requerido:** Dos baterías de **12V 7A/h** [F10]\n- **Configuración:**\
    \ En **serie** (para obtener los 24V de funcionamiento) [F10]\n\n### Procedimiento\
    \ de conexión\n\n1. **Coloca las baterías** en la parte inferior de la caja, en\
    \ el espacio reservado para ello, de forma **vertical** [F10].\n\n2. **Conecta\
    \ el cable puente** (suministrado con la central) uniendo el **polo positivo de\
    \ una batería con el polo negativo de la otra** — esto las pone en serie [F10].\n\
    \n3. **Conecta los cables del circuito** (rojo y negro) al **positivo y negativo**\
    \ del conjunto de baterías [F1].\n   - El conector de baterías en la PCB Base\
    \ está identificado como **conector 11** (Conector Batería) [F2][F3].\n   - El\
    \ fusible de baterías es el componente **10** (Fusible Baterías) [F2][F3].\n\n\
    ### Orden de conexión — importante\n\nEl orden correcto de alimentación es [F10]:\n\
    1. Primero conectar la **red** (activando el magnetotérmico bipolar)\n2. Después\
    \ conectar las **baterías**\n\n> ⚠️ **Advertencia:** No realizar la instalación\
    \ con la alimentación conectada. Desconectar siempre el magnetotérmico bipolar\
    \ exterior antes de manipular la central [F10].\n\n### Verificación previa a la\
    \ puesta en marcha\n\nAntes de conectar, comprueba que las baterías tienen una\
    \ **tensión superior a 24V** [F5].\n\n---\n\n**Nota:** Si necesitas arrancar el\
    \ equipo únicamente con baterías (sin red), es imprescindible pulsar el **pulsador\
    \ BAT** (componente 9 — Tecla arranque por Batería) [F2][F3][F5].\n\n---\n\nFuente:\
    \ 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB IT (sin\
    \ revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **conexionado del\
    \ bucle analógico**, **puesta en marcha y verificación del sistema** o **configuración\
    \ rápida desde teclado** de la CAD-150-8."
