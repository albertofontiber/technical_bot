- qid: cat009
  question: ¿Qué resistencia de fin de línea (EOL) hay que instalar en las líneas
    de zona de la central convencional NFS Supra?
  answer: "# Resistencia de Fin de Línea (EOL) — NFS Supra\n\nLa central NFS Supra\
    \ admite **dos modos de supervisión de zona**, configurables por software. El\
    \ valor del EOL depende del modo seleccionado:\n\n---\n\n## Modo por defecto:\
    \ Capacitivo (EFL)\n\n- **Condensador de 47 µF** instalado entre positivo y negativo\
    \ al final de la última zona [F6][F3]\n- Es el modo de fábrica [F1]\n- Estabiliza\
    \ la zona a la tensión de reposo (~25 V) [F6]\n\n## Modo alternativo: Resistivo\
    \ (RFL)\n\n- **Resistencia de 6K8 Ω** [F6][F1]\n- Rango admisible en modo resistivo:\
    \ entre **3 KΩ** (consumo máx. por zona 2,5 mA) y **7 KΩ** (consumo máx. por zona\
    \ 4 mA) [F6]\n\n> ⚠️ **Nota importante:** El fragmento [F4] (versión en inglés\
    \ del manual) menciona una resistencia de **4K7 Ω** como alternativa al condensador\
    \ de 47 µF, y el fragmento [F8] (revisión anterior v.04) también indica **4K7\
    \ Ω** en modo resistivo. Sin embargo, la versión en español del manual (v.05)\
    \ especifica claramente **6K8 Ω** [F6][F1]. Verifica qué revisión del manual corresponde\
    \ a tu equipo instalado.\n\n---\n\n## Zonas no utilizadas\n\nTodas las zonas,\
    \ **incluso las no usadas**, deben tener instalado su final de línea según la\
    \ configuración del sistema (EFL o RFL) [F6].\n\n---\n\n## Cómo cambiar el modo\
    \ (Nivel de acceso 3)\n\n1. Pulsa simultáneamente **Tecla TECLADO = ON + Tecla\
    \ EVACUACIÓN = ON** [F1]\n2. Usa la tecla **REARME** para cambiar cíclicamente\
    \ entre modos [F1]:\n   - **LED 1 Alarma (Rojo) encendido** → Modo Resistivo **6K8\
    \ Ω** [F1]\n   - **LED 2 Anulada (Ámbar) encendido** → Modo Capacitivo **47 µF**\
    \ (por defecto) [F1]\n\n---\n\nFuente: HLSI-MN-025_NFS Supra (Manual de usuario,\
    \ v.05, sin revisión registrada); HLSI-MN-025-I_NFS Supra Series v05 (Installation\
    \ and Operating Manual, sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **conexionado del diagrama de zona paso a paso**, **cálculo del número\
    \ máximo de detectores por zona** o **configuración de los circuitos de sirena\
    \ (EOL de sirenas)**."
