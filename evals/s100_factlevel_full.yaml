- qid: hp013
  question: ¿Cómo se cambia la batería tampón de la Detnov ADW535 sin perder configuración?
  answer: '## Sustitución de la batería de litio del ADW535


    Los fragmentos disponibles **no describen un procedimiento específico de sustitución
    de la batería tampón** (batería de litio) del ADW535 sin pérdida de configuración.


    Lo que sí aparece en los fragmentos es:


    **Sobre la batería de litio:**

    - La batería de litio está ubicada en el **Main Board LMB 35** [F7], visible en
    la Fig. 31.

    - El fallo de reloj (código **G80 / 008**) puede deberse a que "la cinta aislante
    de la batería de litio aún no se ha retirado" o a que la "batería de litio es
    defectuosa → Sustituir" [F10].


    **Sobre la conservación de configuración:**

    - El manual indica que el **reset de hardware** (interrupción de tensión o pulsador
    reset del LMB 35) **mantiene los parámetros programados** (configuraciones específicas
    del sistema) [F5].

    - Sin embargo, la **sustitución del LMB 35** completo sí requiere un nuevo reset
    inicial y reconfiguración completa [F1].


    **Conclusión práctica:**

    El manual no especifica si la batería de litio es sustituible de forma independiente
    sin retirar el LMB 35, ni describe el procedimiento paso a paso para hacerlo conservando
    la configuración. Los fragmentos disponibles solo cubren la sustitución del LMB
    35 completo y el diagnóstico de fallo de batería.


    > ⚠️ **Recomendación:** Consulta directamente el manual físico completo del ADW535
    (T 140 358 e es) o el soporte técnico de Securiton/Detnov para el procedimiento
    exacto de sustitución de la batería de litio.


    ---


    Fuente: ADW535, Descripción técnica, T 140 358 e es (sin revisión registrada)


    ---


    También puedo ayudarte con: **diagnóstico del fallo G80/008 de reloj**, **procedimiento
    de reset inicial tras reparación** o **sustitución del LMB 35**.'
