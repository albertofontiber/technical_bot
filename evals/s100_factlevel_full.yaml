- qid: hp019
  question: ¿Cuál es el rango de temperatura de funcionamiento del detector de aspiración
    ASD535 (Securiton, distribuido por Detnov)?
  answer: '## Rangos de temperatura del ASD 535


    El manual especifica los siguientes rangos de temperatura de funcionamiento [F1]:


    **Caja del detector:**

    - Rango estándar: **–30 °C hasta +60 °C** (norma UL: máx. +40 °C) [F1]

    - Según estándar australiano **AS 1603.8**: –30 °C hasta +55 °C [F1]


    **Conducto de aspiración:**

    - Rango estándar: **–30 °C hasta +60 °C** ➂ [F1]

    - Según estándar australiano **AS 1603.8**: –30 °C hasta +55 °C [F1]


    **Temperatura de almacenamiento** (caja del detector, sin condensación):

    - **–30 °C hasta +70 °C** [F1]


    **Restricciones adicionales importantes:**


    - La fluctuación de temperatura máxima permitida durante el funcionamiento (tanto
    en caja como en conducto) es de **20 °C** [F1]. Si se superan estas oscilaciones,
    pueden ser necesarios ajustes especiales (ventana de flujo de aire más grande,
    mayor tiempo de retardo, etc.) [F5].

    - En recintos con temperatura ambiente superior a **50 °C** o humedad superior
    al **80 % H rel.**, puede ser necesario instalar tramos de refrigeración en el
    conducto de aspiración [F7].

    - Para uso en **almacenes de ultracongelación**, el rango de temperatura restringido
    es **–30 °C hasta 0 °C**, siguiendo la directriz T 131 390 [F3].

    - La nota ➂ del manual indica que es posible acordar con el fabricante rangos
    de temperatura inferiores o superiores. La instalación en rango de condensación
    solo puede llevarse a cabo previa consulta con el fabricante [F2].


    ---


    Fuente: ASD535 Descripción técnica, T 131 192 h es (sin revisión registrada en
    los fragmentos)


    ---


    También puedo ayudarte con: **consumos de corriente por variante (ASD 535-1/2/3/4)**,
    **condiciones de humedad admisibles** o **uso en condiciones adversas (polvo,
    corrosión)** del ASD 535.'
