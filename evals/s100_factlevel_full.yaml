- qid: cat020
  question: En una central Morley DXc instalada en Espana, ¿cual es el nivel de alarma
    y de prealarma por defecto de los detectores, y el maximo configurable?
  answer: '## Niveles de alarma y prealarma en la DXc — Versión España


    La respuesta depende del **tipo de detector** (protocolo), ya que la DXc distingue
    entre detectores con protocolo Morley-IAS y detectores Multicriterio/láser.


    ---


    ### 1. Detectores con protocolo Morley-IAS (detectores ópticos convencionales,
    p.ej. OPT)


    Estos detectores trabajan con un valor analógico normalizado de **0% a 100%**
    [F2]:


    - **Nivel de prealarma por defecto: 80%** [F2]

    - **Nivel de alarma por defecto: 100%** [F2]

    - **Nivel de alarma máximo configurable: 108%** [F2]


    ---


    ### 2. Detectores Multicriterio OTM (óptico-térmicos)


    Trabajan por niveles (no por porcentaje). Los valores por defecto que muestra
    la pantalla de la central son [F1][F2]:


    - **Nivel de prealarma por defecto: Nivel 3** (valor analógico 72, sensibilidad
    6,5% osc./m) [F1]

    - **Nivel de alarma por defecto: Nivel 4** (valor analógico 86, sensibilidad 6,5%
    a 11,5% osc./m, autoajustado) [F1]


    La tabla completa de niveles disponibles para OTM es [F1]:


    - Nivel 1 → valor analógico 47 → 3,2% osc./m

    - Nivel 2 → valor analógico 55 → 3,2% a 6,5% osc./m (autoajustado)

    - **Nivel 3 → valor analógico 72 → 6,5% osc./m (\*P prealarma recomendado)**

    - **Nivel 4 → valor analógico 86 → 6,5% a 11,5% osc./m (\*A alarma recomendado)**

    - Nivel 5 → valor analógico 101 → 11,5% osc./m

    - Nivel 6 → valor analógico 116 → Solo temperatura


    ---


    ### 3. Detectores láser (LSR)


    También trabajan por niveles. Los valores por defecto son [F1][F2]:


    - **Nivel de prealarma por defecto: Nivel 4** (valor analógico 69, sensibilidad
    0,32% osc./m) [F1]

    - **Nivel de alarma por defecto: Nivel 5** (valor analógico 76, sensibilidad 0,65%
    osc./m) [F1]


    La tabla completa de niveles disponibles para LSR es [F1]:


