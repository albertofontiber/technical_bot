- qid: cat023
  question: En el detector de humos por aspiración Securiton ASD532, ¿qué clases de
    sensibilidad según EN 54-20 ofrece y cómo se configura la monitorización del flujo
    de aire?
  answer: '# ASD532 — Clases EN 54-20 y configuración de monitorización de flujo de
    aire


    ---


    ## 1. Clases de sensibilidad según EN 54-20


    El ASD 532 cumple los requisitos de la norma **EN 54-20** en sus tres clases [F8]:


    - **Clase A** — Sensibilidad muy alta

    - **Clase B** — Sensibilidad alta

    - **Clase C** — Sensibilidad normal


    Esto queda reflejado también en la placa de características del equipo, donde
    aparece marcado como **EN 54-20 A/B/C** [F7].


    ---


    ## 2. Sensores de humo disponibles según rango de sensibilidad


    La elección del sensor condiciona el rango de ajuste posible [F2]:


    - **SSD 532-1** — Rango de sensibilidad de alarma: **0,5 %/m hasta 10 %/m**

    - **SSD 532-2** — Rango de sensibilidad de alarma: **0,1 %/m hasta 10 %/m**

    - **SSD 532-3** — Rango de sensibilidad de alarma: **0,02 %/m hasta 10 %/m**


    ---


    ## 3. Cómo funciona la monitorización del flujo de aire


    El sistema usa **medición calorimétrica** (técnica de medición de flujo en masa)
    [F3]. El proceso es el siguiente:


    1. Al ejecutar el **reset inicial** (posición de conmutador **U01**) [F4], con
    el conducto de aspiración intacto, el ASD 532 registra y memoriza los valores
    de flujo como **valores nominales (100%)** [F3].

    2. El sistema crea electrónicamente una **ventana de monitorización** centrada
    en ese 100% [F3].

    3. Si los valores reales se salen de esa ventana (por obstrucción o rotura de
    tubo), el ASD 532 dispara el aviso **«Fallo flujo de aire»** [F3].

    4. Un **tiempo de retardo** ajustable descarta perturbaciones transitorias como
    turbulencias de aire [F3].

    5. El equipo incorpora un **circuito de compensación de temperatura** para mitigar
    fluctuaciones ambientales [F3].


    > ⚠️ **Importante:** Para el correcto funcionamiento, el flujo de aire específico
    debe registrarse durante la puesta en funcionamiento. El reset inicial es obligatorio
    [F3].


    ---


    ## 4. Configuración: posiciones de conmutador


    ### 4.1 Posiciones normativas (homologadas EN 54-20) — A11 a C31


    Para monitorización del flujo de aire **conforme a EN 54-20**, se usan las posiciones
    [F4]:


    - **A11** → Límites normativos clase A

    - **b11 / b21** → Límites normativos clase B

    - **C11 / C21 / C31** → Límites normativos clase C


    En estas posiciones, una variación del flujo superior a **±20 %** (por debajo
    del 80% o por encima del 120%) dispara el aviso «Fallo flujo de aire» tras un
    tiempo de retardo de **300 s** [F3].


    ### 4.2 Posiciones no normativas — W01 a W44


    Permiten configurar combinaciones personalizadas de ventana de monitorización
    y tiempo de retardo [F1]:


    **Clase A (Sensibilidad muy alta):**

    - W01: retardo 10 min / desviación ±20 %

    - W02: retardo 60 min / desviación ±20 %

    - W03: retardo 10 min / desviación ±50 %

    - W04: retardo 60 min / desviación ±50 %


    **Clase B (Sensibilidad alta), Límite 1:**

    - W09: retardo 10 min / desviación ±20 %

    - W10: retardo 60 min / desviación ±20 %

    - W11: retardo 10 min / desviación ±50 %

    - W12: retardo 60 min / desviación ±50 %


    **Clase B (Sensibilidad alta), Límite 2:**

    - W17: retardo 10 min / desviación ±20 %

    - W18: retardo 60 min / desviación ±20 %

    - W19: retardo 10 min / desviación ±50 %

    - W20: retardo 60 min / desviación ±50 %


    **Clase C (Sensibilidad normal), Límite 1:**

    - W25: retardo 10 min / desviación ±20 %

    - W26: retardo 60 min / desviación ±20 %

    - W27: retardo 10 min / desviación ±50 %

    - W28: retardo 60 min / desviación ±50 %


    **Clase C (Sensibilidad normal), Límite 2:**

    - W33: retardo 10 min / desviación ±20 %

    - W34: retardo 60 min / desviación ±20 %

    - W35: retardo 10 min / desviación ±50 %

    - W36: retardo 60 min / desviación ±50 %


    **Clase C (Sensibilidad normal), Límite 3:**

    - W41: retardo 10 min / desviación ±20 %

    - W42: retardo 60 min / desviación ±20 %

    - W43: retardo 10 min / desviación ±50 %

    - W44: retardo 60 min / desviación ±50 %


    > ⚠️ **Advertencia crítica:** Las posiciones **W01 a W44 NO están homologadas
    según EN 54-20** para la monitorización del flujo de aire. Solo deben utilizarse
    **previa consulta con el fabricante** [F3][F5][F6].


    ---


    ## 5. Proceso de configuración (resumen)


    **Sin software ASD PipeFlow (EasyConfig)** [F6]:

    - Si se requiere monitorización de flujo conforme a EN 54-20 → seleccionar posición
    **A11 a C31**

    - Si NO se requiere conformidad EN 54-20 en flujo → seleccionar posición **W01
    a W44** (solo con autorización del fabricante)


    **Con software ASD PipeFlow** [F6]:

    1. Crear y calcular el proyecto en «ASD PipeFlow»

    2. Introducir el resultado en el software de configuración **«ASD Config»**

    3. Seleccionar posiciones de conmutador **X01, X02 o X03** en el ASD para memorizar
    los resultados


    ---


    ## 6. Límites de ajuste de la ventana de monitorización


    Cuando se usan adaptaciones vía «ASD Config» [F6]:


    - Aumentar los valores de LS-Ü por encima de **±20 %** o por encima de **300 s**
    implica **incumplimiento de EN 54-20** y requiere consulta con el fabricante

