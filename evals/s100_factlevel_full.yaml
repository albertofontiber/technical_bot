- qid: hp019
  question: ¿Cuál es el rango de temperatura de funcionamiento del detector de aspiración
    ASD535 (Securiton, distribuido por Detnov)?
  answer: '## Rango de temperatura de funcionamiento — ASD 535


    Según la sección de datos técnicos del manual [F1], los rangos de temperatura
    son:


    **Caja del detector:**

    - Rango de temperatura estándar: **–30 °C hasta +60 °C** [F1]

    - Rango según normativa UL: máx. **+40 °C** [F1]

    - Rango según estándar australiano **AS 1603.8**: **–30 °C hasta +55 °C** [F1]


    **Conducto de aspiración:**

    - Rango de temperatura estándar: **–30 °C hasta +60 °C** [F1]

    - Rango según estándar australiano **AS 1603.8**: **–30 °C hasta +55 °C** [F1]


    **Temperatura de almacenamiento** (caja del detector, sin condensación):

    - **–30 °C hasta +70 °C** [F1]


    **Restricciones adicionales a tener en cuenta:**


    - La fluctuación de temperatura máxima permitida durante el funcionamiento (tanto
    en la caja como en el conducto) es de **20 °C** [F1]. En entornos con oscilaciones
    superiores a 20 °C pueden ser necesarios ajustes especiales [F5].

    - En recintos con temperatura ambiente superior a **50 °C** o humedad superior
    al **80 % H rel.**, puede ser necesario instalar tramos de refrigeración en el
    conducto de aspiración [F6].

    - Para uso en **almacenes de ultracongelación**, el rango de temperatura restringido
    es **–30 °C hasta 0 °C**, siguiendo la directriz **T 131 390** [F3].

    - Rangos de temperatura inferiores o superiores a los estándar pueden acordarse
    con el fabricante [F2].


    ---


    Fuente: ASD535_TD_T131192es_h (sin revisión registrada en los fragmentos)


    ---


    También puedo ayudarte con: **consumos de corriente por variante (ASD 535-1/2/3/4)**,
    **condiciones de humedad ambiental** o **instalación en almacenes de ultracongelación**
    del ASD 535.'
