- qid: hp008
  question: ¿Qué detectores de humo analógicos son compatibles con la Notifier ID3000?
  answer: '## Detectores de humo analógicos compatibles con la ID3000


    La ID3000 es compatible con toda la gama de sensores analógicos de **NOTIFIER**
    que utilizan protocolo de comunicaciones Notifier [F4]. A continuación se listan
    los detectores de humo analógicos específicamente mencionados:


    ---


    ### Detectores de humo por tipo


    **Ópticos:**

    - **SDX-751EM** — Óptico [F1]

    - **SDX-751** — Óptico [F2]

    - **SDX551E** — Óptico [F2]

    - **SDX-551THE** — Óptico [F2]

    - **HAZARD IDX-751** — Óptico intrínsecamente seguro [F1]

    - **HPX-751E** — Óptico HARSH/FILTREX [F1]


    **Iónicos:**

    - **CPX-751E** — Iónico (bajo perfil) [F1][F2]

    - **CPX-551E** — Iónico [F2]


    **Combinados térmico/humo (Multicriterio):**

    - **SDX-751TEM** — Optiplex (combinado térmico/humo) [F1][F2]

    - **IRX-751TEM** — SMART 3 [F2]

    - **IRX-751CTEM** — SMART 4 [F2]


    **Humo láser (VIEW™):**

    - **FSL-751E / LPX-751** — VIEW (humo láser) [F1][F2]


    ---


    ### Notas técnicas relevantes


    - Los sensores **VIEW™** utilizan umbrales de sensibilidad expresados en "porcentaje
    de oscurecimiento por metro", con **9 niveles** (L1 más sensible, L9 menos sensible).
    La sensibilidad estándar se ajusta a **2,44%/m (L8)** o menos [F6].


    - El sensor **SMART4 (IRX-751CTEM)** dispone de detección fotoeléctrica, por infrarrojos,
    térmica y de monóxido de carbono [F5].


    - El sensor **SDX-751TEM (Optiplex)** dispone de modo de funcionamiento "solo
    térmico" (nivel L6) configurable por programación horaria o tecla Modo Día [F9].


    - Para el sensor **IDX-751 (HAZARD)**, se requiere el aislador galvánico de seguridad
    intrínseca **Y72221** [F2].


    - El límite máximo es de **512 sensores y pulsadores manuales por panel**, salvo
    que se utilicen ELIBs [F4].


    ---


    También puedo ayudarte con: **configuración del tipo de sensor en el menú de programación**,
    **niveles de sensibilidad VIEW o MULTI**, o **módulos de lazo compatibles con
    la ID3000**.


    Fuentes: MPDT190 (sin revisión registrada); MIDT190 (sin revisión registrada);
    MCDT190 (sin revisión registrada); MCDT191 (sin revisión registrada)'
