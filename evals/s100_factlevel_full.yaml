- qid: cat005
  question: ¿Cuáles son las características técnicas de la central de detección de
    gas Fidegas CS4, y en qué se diferencian las versiones digital y analógica?
  answer: '# Central de Alarmas FIDEGAS® CS4 — Características Técnicas


    ## Especificaciones generales


    Las siguientes características son comunes a ambas versiones [F2]:


    - **Tensión de alimentación:** 110-230 Vac, 50-60 Hz [F2]

    - **Potencia:** 30 W [F2]

    - **Clase:** Clase II [F3] [F7]

    - **Firmware:** 1.2 (tanto versión digital como analógica) [F3] [F7]

    - **Sensores:** Hasta 4 conexiones en modo analógico o digital [F2]

    - **Salidas:** 2 salidas conmutadas LP (relé apto para 230 Vac) con contactos
    NA-C-NC [F2]

    - **Corriente máxima:** 250 mA [F2]

    - **Rearme:** Seleccionable manual o automático [F2]

    - **Indicaciones:** Presencia, alarma y avería por sensor, avería de central,
    corte de red [F2]

    - **Dimensiones:** 90 x 106 x 58 mm [F2]

    - **Peso:** 300 g [F2]

    - **Instalación:** En carril DIN o en armario de superficie [F1]


    ---


    ## Indicaciones luminosas y acústicas


    - **LED verde PWR:** Alimentación presente (fijo) / corte de red (intermitente)
    [F1]

    - **LED bicolor ON/ALARM** (por sensor): Sensor presente (verde) / alarma (rojo)
    [F1]

    - **LED amarillo ERROR** (por sensor): Avería de sensor remoto [F1]

    - **LED verde OUT1 y OUT2:** Salida activa (verde) / desactivada (apagado) [F1]

    - **Avisador acústico:** Apoyo sonoro a las indicaciones ópticas [F1]


    ---


    ## Diferencias entre versión digital y analógica


    ### Código de producto [F2]

    - **Versión digital:** 3244

    - **Versión analógica:** 3270


    ### Tipo de entrada de señal [F1]

    - **Versión digital:** Entradas digitales **0-10/15 V**

    - **Versión analógica:** Entradas analógicas **4-20 mA**


    ### Sensores compatibles [F3]

    **Versión analógica:**

    - Sensores S/3 gases combustibles

    - Sensores S/3 y S/2 gases tóxicos

    - Sensores S/10 gases tóxicos


    **Versión digital:**

    - Sensores S/10 gases combustibles


    ---


    ## Conexionado de sensores


    Los conectores de cada sensor tienen la siguiente asignación [F4]:

    1. Positivo de alimentación (12 a 24 Vdc)

    2. Entrada de señal

    3. Negativo común de alimentación y señal


    Las salidas (OUT1 y OUT2) y la alimentación se ubican en la parte inferior de
    la central [F4].


    ---


    ## Comportamiento en alarma


    - El umbral de alarma se activa al superar el **20% del fondo de escala** [F6]

    - Las alarmas son **enclavadas** y requieren pulsación del botón **RESET** para
    rearmar [F1] [F6]

    - Si la concentración de gas no ha disminuido, la alarma puede **silenciarse durante
    24 horas** con el botón RESET, pero la central no puede rearmarse [F6]

    - En alarma, las salidas asignadas al sensor pasan a NA y los LEDs OUT1/OUT2 se
    apagan [F6]

    - Tras el encendido, el LED PWR parpadea durante **30 segundos** con las salidas
    OUT1 y OUT2 en posición NA [F6]


    ---


    Fuente: Manual de Usuario CS4 (Analógica o Digital), Rev. 2, 10/2018 — Fabricado
    por C.A.E., S.L.'
