- qid: cat016
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo
    y como se prueba que funciona?
  answer: "# CAD-150-8: Alta de detector nuevo y prueba funcional\n\n## PARTE 1 —\
    \ Dar de alta un detector nuevo en el lazo\n\nEl procedimiento para incorporar\
    \ un nuevo elemento al lazo es mediante la **autobúsqueda** [F1]:\n\n1. Instala\
    \ físicamente el detector en el lazo (con el sistema sin alimentación, según las\
    \ indicaciones de seguridad) [F9].\n2. Alimenta la central.\n3. Accede al **menú\
    \ BUCLE** desde el teclado de la central [F1].\n4. Ejecuta la **autobúsqueda del\
    \ lazo** correspondiente. El sistema escaneará el lazo y mostrará todos los elementos\
    \ detectados [F1].\n5. Verifica que los elementos encontrados coinciden con los\
    \ planos de la instalación [F1].\n6. Accede al **menú ELEMENTOS** para asignar\
    \ al nuevo detector:\n   - **Nombre/texto** identificativo [F1][F2]\n   - **Zona**\
    \ de ubicación [F1][F2]\n\n> Puedes verificar que el detector ha quedado correctamente\
    \ registrado desde el **menú ELEMENTO → VER**, donde podrás consultar los campos:\
    \ BUCLE, DIR, ZONA, TIPO, MODO y VA (valor analógico) [F2].\n\n---\n\n## PARTE\
    \ 2 — Probar que el detector funciona\n\nEl método recomendado es el **modo PRUEBA\
    \ de zona**, que permite verificar los detectores **sin necesidad de rearmar la\
    \ central** tras cada disparo [F3][F4]:\n\n1. Accede al **menú ZONA → PRUEBA**\
    \ [F3].\n2. Introduce el **rango de zonas** a poner en prueba (campo RANGO) [F3].\n\
    3. Selecciona si deseas activar las sirenas durante la prueba (campo **ACTIVAR\
    \ SIRENAS: [SI/NO]**) [F3]:\n   - Si seleccionas **SÍ**: las sirenas se activarán\
    \ unos segundos tras el disparo del detector y se silenciarán automáticamente.\
    \ Los retardos de sirena quedan **anulados** en modo prueba para agilizar el proceso\
    \ [F3][F4].\n4. Pulsa **Aceptar** [F3].\n5. Activa el detector (con aerosol de\
    \ prueba u otro método).\n6. Verifica que la central registra la alarma.\n\n###\
    \ Consideraciones importantes del modo prueba:\n- Si transcurren **20 minutos**\
    \ desde la activación del modo prueba sin que se produzca ningún disparo, el sistema\
    \ **vuelve automáticamente al estado normal** [F3][F4].\n- Para **salir manualmente**\
    \ del modo prueba, conéctala zona desde el menú ZONA → CONECTAR [F3].\n\n---\n\
    \n> ⚠️ El mantenimiento anual exige poner el equipo en estado de prueba y verificar\
    \ que **todos los detectores y pulsadores** funcionan de acuerdo con las especificaciones\
    \ del fabricante [F10]. Las comprobaciones deben respetar las recomendaciones\
    \ de la norma **EN54 parte 14** [F10].\n\n---\n\n**Fuente:** Manual de Usuario\
    \ `55315008-Manual-Centrales-Analogicas-CAD-150-8-Usuario-ES-FR-GB-IT` (sin revisión\
    \ registrada); Manual de Instalación `55315013 Manual Centrales Analogicas CAD-150-8\
    \ Instalacion ES FR GB IT` (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **configuración de maniobras tras el alta del detector**, **desconexión\
    \ temporal de un elemento para trabajos**, o **interpretación del valor analógico\
    \ (VA) del detector**."
