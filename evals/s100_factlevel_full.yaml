- qid: cat008
  question: ¿Cómo se cablea el módulo de entrada M710 / MI-DMMI en el lazo, y qué
    resistencias necesita (fin de línea y modo 3 estados)?
  answer: '# Conexionado del módulo M710 / MI-DMMI en el lazo


    ## Terminales de lazo


    La asignación de terminales es la siguiente [F1][F4][F7]:


    - **Terminal 1** → Lazo salida (–)

    - **Terminal 2** → Lazo salida (+) — con aislador interno activo

    - **Terminal 3** → Lazo entrada (–)

    - **Terminal 4** → Lazo entrada (+)

    - **Terminal 5** → Lazo salida (+) alternativo — sin aislador interno


    > **Nota sobre el aislador interno:** Si **no** se necesita aislamiento de cortocircuitos,
    conecta el positivo de salida del lazo al **Terminal 5** en lugar del Terminal
    2. El Terminal 5 está conectado internamente con el Terminal 4 [F4][F7]. En el
    caso del MI-DMMI, el fragmento F1 indica que los positivos in/out de lazo deben
    conectarse a los terminales 4 y 5 para eliminar el aislador interno [F1].


    ---


    ## Modo 2 estados


    - **Resistencia de fin de línea (RFL): 47 kΩ** en paralelo con la entrada (terminales
    6-7) [F1]

    - Funcionamiento: **cortocircuito = alarma** [F1]

    - La entrada A se conecta a los terminales **6 y 7** [F1]


    ---


    ## Modo 3 estados


    - **Resistencia de fin de línea (RFL): 47 kΩ** [F1]

    - **Resistencia adicional: 18 kΩ en serie con el contacto** (cada conmutador/dispositivo
    que se desee supervisar) [F1][F2][F4][F7]

    - Funcionamiento: permite distinguir **reposo / avería / alarma** — el cortocircuito
    puede señalizarse como avería en lugar de alarma, siempre que la central lo permita
    [F2][F4]


    > **Importante:** La función de 3 estados (cortocircuito como avería) requiere
    que la **central sea compatible** con este modo [F4][F7].


    ---


    ## Terminales de entrada (señal supervisada)


    - **Terminal 6** ← Entrada A [F1]

    - **Terminal 7** ← conexión RFL / retorno [F1]

    - **Terminales 8 y 9** → **No se usan en el M710/MI-DMMI** (solo disponibles en
    el M720E/MI-DMM2I/MI-DMM2IE) [F4][F6][F7]


