- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: "# Conexionado de sirena convencional en salidas de sirena de la ZXe\n\n\
    > **Nota previa:** La denominación \"ZXe\" puede referirse a varios modelos de\
    \ la familia Morley. Los fragmentos disponibles cubren la **ZXAE/ZXEE** [F1][F2]\
    \ y la **ZX2e/ZX5e** [F3]. El conexionado es muy similar en ambos casos. A continuación\
    \ se detalla el procedimiento aplicable a ambas plataformas.\n\n---\n\n## Principios\
    \ de funcionamiento de la salida\n\n- Las salidas de sirenas son **supervisadas**\
    \ y **limitadas en corriente** [F1].\n- La supervisión se realiza mediante una\
    \ **corriente inversa** que lee la **resistencia final de línea (RFL) de 6.800\
    \ Ω, 0,5 W mínimo**, instalada al final de la línea [F1].\n- La corriente de supervisión\
    \ tiene **sentido inverso** a la de activación [F1].\n- Al activarse la salida,\
    \ la corriente circula en sentido normal con la polaridad indicada en los terminales\
    \ [F1].\n\n---\n\n## Pasos de conexionado\n\n**1. Identifica los terminales de\
    \ salida según el modelo:**\n\n- **ZXAE:** 2 salidas supervisadas → **Salida A\
    \ y Salida B** [F1]\n- **ZXEE:** 4 salidas supervisadas → **Salida A, B, C y D**\
    \ [F1]\n  - Terminales en bloque **TB7**: `S,A+` `S,A-` `S,B+` `S,B-` `S,C+` `S,D+`\
    \ `S,D-` [F1]\n- **ZX2e/ZX5e:** 2 salidas → **Sirena A (+/-)** y **Sirena B (+/-)**\
    \ [F3]\n\n**2. Conecta las sirenas en serie (línea directa, sin ramales):**\n\n\
    - Conecta el **+** de la salida al terminal **+** de la primera sirena.\n- Conecta\
    \ el **-** de la primera sirena al **+** de la siguiente, y así sucesivamente.\n\
    - El **-** de la última sirena se conecta al **-** de la salida [F2].\n- ⚠️ **No\
    \ realices ramales paralelos**: la supervisión solo funciona en la línea directa\
    \ hasta la RFL; los ramales no quedan supervisados [F2].\n\n**3. Instala la resistencia\
    \ final de línea (RFL):**\n\n- Coloca una resistencia de **6.800 Ω, 0,5 W mínimo**\
    \ entre el **+** y el **-** al final de la última sirena [F1].\n- Si **no se instala\
    \ ninguna sirena** en la salida, conecta la RFL directamente en los terminales\
    \ de la central [F1].\n\n**4. Sirenas sin polaridad (campanas con bobina):**\n\
    \n- Instala un **diodo** entre el **+** de la salida y uno de los terminales de\
    \ alimentación de la campana [F1].\n- Esto evita consumos durante la supervisión,\
    \ ya que las bobinas de estas campanas no tienen polaridad [F1].\n\n**5. Requisitos\
    \ de cableado:**\n\n- Sección mínima: **1,5 mm²** [F1].\n- Para ZX2e/ZX5e: longitud\
    \ **no superior a 1 km**; por encima, la capacitancia e inductancia del lazo pueden\
    \ afectar al funcionamiento [F3].\n- ⚠️ **No enrolles el cable en los terminales.\
    \ Corta y empalma las conexiones adecuadamente** para mantener la supervisión\
    \ de la línea [F3].\n- Verifica que la sección de cable garantiza la alimentación\
    \ de las sirenas tanto con alimentación principal como en condiciones de **mínima\
    \ tensión de baterías** [F3].\n\n**6. Corriente máxima por circuito:**\n\n- Cada\
    \ circuito de sirenas admite un máximo de **1 A** [F1].\n- Ten en cuenta el consumo\
    \ total de la central para no exceder el consumo total con las sirenas activadas\
    \ [F1].\n\n---\n\n## Verificación tras el conexionado\n\n- Cualquier fallo en\
    \ la línea (apertura o cortocircuito) se mostrará en pantalla y quedará registrado\
    \ en el sistema [F4]:\n  ```\n  !ATENCION!  CIRCUITO ABIERTO SIRENA B\n  ```\n\
    \n---\n\nTambién puedo ayudarte con: **configuración del programa de disparo de\
    \ las sirenas**, **supervisión y gestión de averías de sirena** o **conexionado\
    \ de sirenas en módulos de lazo analógico**.\n\nFuente: Manual de Instalación\
    \ ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada); Manual de Instalación\
    \ ZX2e/ZX5e — DOC.MIE-MI-530, Revisión 001; Manual de Configuración ZX2e/ZX5e\
    \ — DOC.MIE-MP-530, Revisión 001."
