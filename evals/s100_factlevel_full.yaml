- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  answer: '# Programación de coincidencia de dos detectores para activar sirena —
    ID3000


    ## Concepto previo


    La función de **coincidencia** requiere que se activen dos equipos antes de que
    se dispare la salida. Se aplica únicamente cuando la entrada está definida como
    **ZONA**, **SUBZONA** o **CUALQUIERA** — no si es un equipo individual [F1].


    > ⚠️ **PRECAUCIÓN EN54-2: 7.1.4** — No incluyas pulsadores manuales (MCP/PUL)
    en el grupo de coincidencia [F1][F4].


    ---


    ## Procedimiento de programación


    ### Paso 1 — Accede a la Matriz de Control


    Entra en la edición de la instrucción de Matriz de Control correspondiente a la
    salida de sirena [F8].


    ---


    ### Paso 2 — Define la entrada (zona)


    En la ventana **"Edición Evento de Entrada en la Matriz de Control"**:


    - Selecciona **"Zona(s) Determinada"** e indica el número de zona (o rango) donde
    están los detectores [F8].

    - Alternativamente, selecciona **"Cualquier Zona"** si quieres que aplique a todo
    el sistema [F8].


    > **Nota:** La coincidencia de zona solo está disponible para el tipo de evento
    de entrada **ALARMA** y cuando se especifica **Cualquier zona** o un **rango de
    zonas** [F8].


    ---


    ### Paso 3 — Selecciona "COINCIDENCIA 2 EQUIPOS"


    En el menú **"Indique tipo de coincidencia"**, selecciona la opción:


    - **2: COINCIDENCIA 2 EQUIPOS** [F4]


    Esto exige que dos equipos de esa zona estén en alarma antes de activar la salida
    [F1].


    > **Nota:** Las opciones **"UN ÚNICO EQUIPO"** y **"COINCIDENCIA 2 EQUIPOS"**
    siempre están disponibles. Las opciones de nivel 3 en adelante (n y p equipos)
    solo aparecen si están configuradas previamente en los ajustes de la central —
    **Sección 11.21** [F4].


    ---


    ### Paso 4 — Condición de ubicación de los equipos en coincidencia


    Para que se produzca la coincidencia, los equipos en alarma deben estar **en la
    misma zona o subzona** [F4].


    Si usas **subzonas**, puedes configurar en **Sección 11.21** si los equipos deben
    estar:

    - En la **misma subzona** (opción por defecto) [F10]

    - Dentro de un **rango de subzonas** especificado [F10]


    ---


    ### Paso 5 — Gestión obligatoria de pulsadores manuales (si los hay en la zona)


    Si la zona contiene pulsadores manuales, debes crear **dos instrucciones separadas**
    en la Matriz de Control [F1][F4]:


    1. **Primera instrucción:** Define la entrada como tipo **Pulsador Manual (MCP)**
    con coincidencia en **"Simple"** (sin coincidencia → un único equipo activa la
    salida).

    2. **Segunda instrucción:** Define la entrada como tipo **ANALÓGICO** (incluye
    detectores térmicos, iónicos, ópticos, VIEW y multisensor) con la coincidencia
    de **2 equipos** activada [F1].


    ---


    ### Paso 6 — Verificación en la pestaña "Coincidencia de Alarma" (si necesitas
    niveles adicionales)


    Si necesitas niveles de coincidencia superiores a 2 (nivel 3, 4, 5...), configúralos
    previamente en:


    **Modificar Opciones de la Central → pestaña "Coincidencia de Alarma"**


    - Introduce el número de equipos requerido para cada nivel en la sección **"Nivel
    de Coincidencia de los Equipos en Alarma"** [F5].

    - Los valores configurados quedan disponibles en la ventana de edición de la Matriz
    de Control [F5].


    > Para la coincidencia estándar de **2 equipos**, este paso no es necesario —
    la opción **"COINCIDENCIA 2 EQUIPOS"** siempre está disponible sin configuración
    previa [F4].


    ---


    ## Resumen visual del campo clave en pantalla


    En la ventana de edición de entrada de la Matriz de Control, el campo relevante
    es [F2][F6]:


    - **Coincidencia de [2] Equipos ☐** → marca esta casilla con el valor **2**


    ---


    Fuentes:

    - MCDT190 (sin revisión registrada)

    - MADT190_07 (sin revisión registrada)

    - MCDT191_F v. 2.17e (sin revisión registrada)

    - MPDT190_D (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de retardos de salida en la Matriz
    de Control**, **programación de subzonas en la ID3000** o **ajustes de la Sección
    11.21 para coincidencia avanzada**.'
