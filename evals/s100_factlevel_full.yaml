- qid: cat011
  question: Necesito un detector de humos analógico direccionable «751» para una instalación
    Notifier; ¿cuál es el modelo correcto?
  answer: '# Detectores de humo analógicos direccionables con «751» en Notifier


    En los fragmentos disponibles aparecen **varios modelos** con el sufijo «751»
    que son detectores de humo analógicos direccionables de Notifier. No existe un
    único modelo «751» — el sufijo identifica el formato de bajo perfil, pero hay
    distintas tecnologías y variantes. Aquí tienes los que aparecen documentados:


    ---


    ## Detectores ópticos (fotoeléctricos)


    - **SDX-751** — Detector óptico analógico de bajo perfil [F6][F9]

    - **SDX-751E** — Versión «E» del óptico de bajo perfil, compatible con AM-6000
    [F10]

    - **SDX-751TEM** — Combinado óptico-térmico (58 °C), con microprocesador [F2][F10]

    - **SDX-751XXXX** — Sensor óptico de bajo perfil (listado en equipos compatibles
    ID50/60) [F7]

    - **FSL-751E** — Sensor de humo láser VIEW [F7]

    - **LPX-751** — Detector fotoeléctrico láser de muy alta sensibilidad [F7][F9]


    ## Detectores iónicos


    - **CPX-751** — Detector iónico analógico de bajo perfil [F6][F8][F9]

    - **CPX-751E** — Versión «E» del iónico de bajo perfil [F4][F7]


    ## Detectores multicriterio


    - **IPX-751** — Combinación fotoeléctrico + iónico + térmico con microprocesador
    [F9][F10]

    - **IRX-751TEM** — Multicriterio SMART 3 [F7]

    - **IRX-751CTEM** — Multicriterio SMART 4 [F7]


    ## Detector intrínsecamente seguro


    - **IDX-751** — Óptico analógico intrínsecamente seguro (zonas ATEX), requiere
    traductor **IMX-1** [F1]

    - **HPX-751E** — Sensor óptico HARSH (entornos agresivos) [F7]


    ---


    ## ¿Cuál necesitas?


    Para orientarte al modelo correcto, necesito saber:


    1. **¿Qué central Notifier tienes instalada?** (AFP-400, AM-6000, ID50/60, AFP4000…)
    — la compatibilidad varía según la central.

    2. **¿Qué tecnología de detección necesitas?** (solo óptico, combinado óptico-térmico,
    iónico, multicriterio, láser, intrínsecamente seguro…)

    3. **¿Hay algún requisito especial?** (ambiente agresivo, zona ATEX, conducto…)


    ---


    Fuentes: MNDT1020 (IDX-751); I56-1320-001 SDX-751TEM; I56-1306-002 SDX-751EM;
    I56-0790-003 CPX-751E; MNDT1025 (FSL-751E); MIDT230 AFP4000; MIDT156 ID50/60;
    MIDT170 AFP-400; MIDT250_A AM-6000 — todas sin revisión registrada.'
