- qid: cat017
  question: ¿Como se cablea y se da de alta (configura) un lazo en la central Notifier
    INSPIRE (E10/E15)?
  answer: "# Cableado y configuración de lazo — Notifier INSPIRE E10/E15\n\n---\n\n\
    ## 1. CABLEADO FÍSICO DEL LAZO\n\n### Terminales del módulo LAZO OPAL X2 (HOP-433-100)\n\
    \nEl módulo de doble lazo tiene 10 terminales [F2][F3]:\n\n**Lazo 1:**\n- Terminal\
    \ **1**: Lazo 1 Salida +VE (OUT +VE)\n- Terminal **2**: Lazo 1 Salida -VE (OUT\
    \ -VE)\n- Terminal **3**: ⊕ — **NO conectar pantalla aquí**\n- Terminal **4**:\
    \ Lazo 1 Entrada +VE (IN +VE)\n- Terminal **5**: Lazo 1 Entrada -VE (IN -VE)\n\
    \n**Lazo 2:**\n- Terminal **6**: Lazo 2 Salida +VE (OUT +VE)\n- Terminal **7**:\
    \ Lazo 2 Salida -VE (OUT -VE)\n- Terminal **8**: ⊕ — **NO conectar pantalla aquí**\n\
    - Terminal **9**: Lazo 2 Entrada +VE (IN +VE)\n- Terminal **10**: Lazo 2 Entrada\
    \ -VE (IN -VE)\n\n> ⚠️ **La pantalla del cable de lazo debe conectarse a la barra\
    \ de tierra de la central, NO a los terminales 3 u 8** [F2][F3]. Se recomienda\
    \ poner a tierra un solo extremo de la pantalla [F5].\n\n> ⚠️ **No mezclar dispositivos\
    \ OPAL y CLIP en el mismo lazo** [F2].\n\n---\n\n### Topología del lazo\n\nEl\
    \ lazo es un circuito cerrado (bucle): la central tiene **Salida** (terminales\
    \ 1/2) y **Entrada** (terminales 4/5). Los dispositivos se encadenan desde la\
    \ Salida hasta la Entrada [F1]. Se recomienda conectar solo con **cable de 2 hilos**\
    \ [F6].\n\n---\n\n### Capacidad por lazo [F2][F4]\n\n**Modo OPAL:**\n- Hasta **159\
    \ detectores** OPAL\n- Hasta **159 módulos** OPAL (sirenas, pulsadores, módulos\
    \ E/S)\n- Corriente máxima por lazo: **750 mA**\n\n**Modo CLIP** (requiere licencia):\n\
    - Hasta **99 detectores** CLIP\n- Hasta **99 módulos** CLIP\n\n> ⚠️ **Restricción\
    \ EN54-2, apartado 13.7**: máximo **512 detectores y/o pulsadores** por módulo\
    \ de lazo (los 2 circuitos en conjunto) [F2].\n\n---\n\n### Numeración de lazos\
    \ [F2]\n\nLos circuitos se numeran secuencialmente de **izquierda a derecha**\
    \ del portamódulos. En la E15 (dos filas), la segunda fila continúa la numeración\
    \ desde la primera.\n\n---\n\n## 2. COMPROBACIONES PREVIAS A LA CONEXIÓN\n\nAntes\
    \ de conectar el lazo a la central, realiza estas pruebas con multímetro [F6][F7][F8]:\n\
    \n1. **Continuidad del lazo**: comprueba continuidad de cada tramo y mide resistencia\
    \ extremo a extremo.\n\n2. **Resistencia máxima admisible** [F8]:\n   - Protocolo\
    \ **OPAL**: resistencia < **40 Ω**\n   - Protocolo **CLIP** (detección de dirección\
    \ duplicada): < **40 Ω**\n   - Protocolo **CLIP** (sin detección de dirección\
    \ duplicada): < **71 Ω**\n   - Capacidad del cable: inferior a **0,5 µF** [F8]\n\
    \   - Resistencia por aislador: entre **0,1 y 0,13 Ω** [F8]\n\n   > Para medir:\
    \ desconecta el lazo de los terminales de la central, mide entre Lazo X Entrada\
    \ -VE y Lazo X Salida -VE, multiplica el resultado por 2 y suma la resistencia\
    \ de cada aislador [F8].\n\n3. **Pantalla del cable**: comprueba continuidad de\
    \ la pantalla (resistencia muy baja) y que NO hay continuidad entre la pantalla\
    \ y los cables +VE ni -VE [F6][F7].\n\n4. **Prueba de diodo** (con función diodo\
    \ del multímetro) [F7]:\n   - En **polaridad inversa** (+VE del multímetro al\
    \ -VE del lazo): debe indicar diodo en conducción directa.\n   - En **polaridad\
    \ normal** (+VE al +VE del lazo): la resistencia debe empezar baja y aumentar\
    \ progresivamente (carga de condensadores de los dispositivos).\n   - Si en polaridad\
    \ normal aparece diodo en conducción directa → hay dispositivos con polaridad\
    \ invertida o cortocircuito.\n\n5. **Herramienta recomendada**: usa la **POL-200-TS**\
    \ para diagnósticos más detallados antes de conectar a la central; funciona con\
    \ protocolos OPAL y CLIP [F5].\n\n> ⚠️ **NUNCA uses un comprobador de alta tensión\
    \ (megóhmetro) en el circuito de lazo** [F6].\n\n---\n\n## 3. PRIMER ENCENDIDO\
    \ Y CONFIGURACIÓN INICIAL\n\n### Secuencia de encendido [F1]\n\n1. Conecta el\
    \ cableado del lazo a los terminales correspondientes.\n2. Conecta el cable HMI\
    \ de la puerta a la CPU (punto \"a\" → toma \"b\").\n3. Conecta la corriente principal\
    \ y las baterías (2 × 12 V 24 Ah para E10/E15).\n\n> ⚠️ El primer encendido debe\
    \ hacerse **sin cableado externo** (módulos de salida, etc.), pero **con el lazo\
    \ conectado y probado** [F1].\n\n---\n\n### Configuración del lazo con CLSS [F9]\n\
    \nAntes de realizar la Auto Configuración en lazos CLIP o TC800, la central debe\
    \ configurarse previamente con el **programa de configuración CLSS** [F9]:\n\n\
    1. Conecta la herramienta de configuración CLSS a la central.\n2. Ve a **Ajustes\
    \ → Ajustes HMI** y en **Tipo de marca** selecciona **Notifier EN** [F9].\n3.\
    \ Ve a **Ajustes de lazo**:\n   - Si el lazo **no se usa**: marca ☑ **Sin Uso**\
    \ [F1][F9].\n   - Si el lazo se usa: selecciona **Limitar a VdS 2540** (Sí/No)\
    \ — el valor de resistencia cambia según la selección — y elige el **Tipo de Cable**\
    \ [F9].\n4. Envía la configuración a la central (pasos \"Enviar configuración\
    \ a la central\") [F9].\n\n> ℹ️ Por defecto, la central tiene licencia para **Protocolo\
    \ avanzado OPAL** únicamente. Para usar CLIP o TC800, se requiere **licencia adicional**\
    \ antes de la Auto Configuración [F9].\n\n---\n\n## 4. AUTO CONFIGURACIÓN (búsqueda\
    \ de dispositivos)\n\nUna vez enviada la configuración y con la central encendida\
    \ [F10]:\n\n1. Selecciona **Auto Configuración** en el panel → confirma en la\
    \ ventana emergente seleccionando **Auto Configuración** (o **Learn Devices**).\n\
    2. Al completarse, pulsa la flecha **>** junto al botón Auto Búsqueda para ver\
    \ el estado de averías del lazo.\n3. Lee los mensajes de avería y corrige los\
    \ problemas detectados. Selecciona **Hecho** al terminar.\n4. Si se han corregido\
    \ averías, **repite los pasos 1 a 3**.\n5. Repite el proceso para **cada lazo**\
    \ hasta descubrir todos los lazos del sistema [F10].\n\n**Causas típicas de averías\
    \ tras Auto Configuración** [F10]:\n- Discordancia entre diseño y cableado real\n\
    - Averías en el cableado\n- Interferencias RFI externas\n- Error en módulo o fuente\
    \ de alimentación\n- Conexionado incorrecto en dispositivos\n\n---\n\n**Fuente:**\
    \ HOP-138-8ES issue 6 (01-2026) — INSPIRE E10/E15 Instrucciones de puesta en marcha;\
    \ HOP-138-9ES issue 5 (11-2025) — INSPIRE E10 Manual de instalación\n\n---\n\n\
    También puedo ayudarte con: **mensajes de avería y su significado**, **cálculo\
    \ de longitud máxima de lazo con CLSS**, o **compatibilidad de dispositivos OPAL/CLIP\
    \ con aisladores internos**."
