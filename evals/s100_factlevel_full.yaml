- qid: cat022
  question: En los detectores de llama Spectrex SharpEye 40/40, ¿qué diferencia hay
    entre el modelo 40/40L y el 40/40L4, y qué significa el sufijo «B» (p. ej. 40/40LB)?
  answer: "## Diferencias entre el 40/40L, el 40/40L4 y el sufijo «B»\n\n### 40/40L\
    \ vs. 40/40L4 — Longitud de onda del sensor IR\n\nLa diferencia principal entre\
    \ ambos modelos es la **longitud de onda de trabajo del sensor IR** [F1]:\n\n\
    - **S40/40L**: el sensor IR opera en la banda de **2,5 a 3,0 µm**. Es apto para\
    \ detectar:\n  - Combustibles a base de hidrocarburos y fuegos de gas\n  - Fuegos\
    \ de hidróxido e hidrógeno\n  - Fuegos de metales o materia inorgánica\n\n- **S40/40L4**:\
    \ el sensor IR opera a **4,5 µm**. Es **exclusivamente** adecuado para la **detección\
    \ de fuegos de hidrocarburos** [F1].\n\n> ⚠️ **Importante**: si la aplicación\
    \ implica fuegos de hidrógeno, metales o materia inorgánica, el modelo correcto\
    \ es el **40/40L**, no el **40/40L4** [F1].\n\n---\n\n### Sufijo «B» (p. ej. 40/40LB\
    \ o 40/40L4B) — Prueba incorporada (BIT)\n\nEl sufijo **«B»** indica que el modelo\
    \ incluye la función de **Prueba Incorporada (BIT — Built-In Test)** [F1]:\n\n\
    - La función BIT **solo se incluye** en los modelos **S40/40LB** y **S40/40L4B**\
    \ [F1].\n- Los modelos sin sufijo «B» (40/40L y 40/40L4) **no disponen** de esta\
    \ función.\n\nAdicionalmente, el sufijo «B» tiene implicaciones en certificaciones\
    \ [F2]:\n\n- La certificación **SIL-2 (TÜV)** según **IEC 61508** está disponible\
    \ **únicamente** en los modelos **S40/40LB y L4B** [F2].\n\n---\n\n### Resumen\
    \ rápido\n\n- **40/40L** → IR a 2,5–3,0 µm, múltiples tipos de fuego, sin BIT\
    \ [F1]\n- **40/40L4** → IR a 4,5 µm, solo hidrocarburos, sin BIT [F1]\n- **40/40LB**\
    \ → igual que 40/40L + BIT + certificación SIL-2 [F1][F2]\n- **40/40L4B** → igual\
    \ que 40/40L4 + BIT + certificación SIL-2 [F1][F2]\n\n---\n\nFuente: Manual de\
    \ usuario. Detector S40/40L-LB-L4-L4B — MNDT722_40-40L (sin revisión registrada),\
    \ Honeywell Life Safety Iberia.\n\n---\n\nTambién puedo ayudarte con: **rangos\
    \ de sensibilidad de cada modelo**, **especificaciones eléctricas de consumo**\
    \ o **procedimiento de prueba BIT (manual y automática)**."
