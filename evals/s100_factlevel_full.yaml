per_gold:
- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  answer: "# Notifier PEARL — Capacidad de lazo SLC, aisladores y alta/edición de\
    \ equipos\n\n---\n\n## 1. Capacidad máxima por lazo\n\n- **Protocolo Opal:** hasta\
    \ **159 sensores + 159 módulos** por lazo [F1][F2]\n- **Protocolo CLIP:** hasta\
    \ **99 sensores + 99 módulos** por lazo [F2][F6]\n- **Total máximo por lazo (cualquier\
    \ protocolo):** **318 equipos** [F1]\n- **Carga máxima por lazo:** **0,75 A**\
    \ [F2]\n\n**Límite global del sistema (EN54-2: 13-7):** máximo **512 sensores\
    \ y/o pulsadores manuales** sumando AMBOS lazos, incluyendo detectores y pulsadores\
    \ de zona convencionales [F1].\n\n### Caso especial: lazos de protocolo mixto\
    \ (Opal + CLIP)\n- El límite de equipos CLIP en lazo mixto es **40**. Si se supera,\
    \ la autoconfiguración continúa pero señala fallos [F6].\n- Si hay pulsadores\
    \ CLIP y se requiere cumplir el tiempo de respuesta de **3 segundos** de BS5839\
    \ parte 1, el máximo de equipos CLIP será **6** [F1].\n\n---\n\n## 2. Requisitos\
    \ de aisladores (EN54-2: 12.5.2)\n\n- **Máximo 32 equipos entre aisladores** según\
    \ EN54-2 [F1].\n- **Equipos SIN aisladores internos** (incluidos CLIP y algunos\
    \ Opal): **NO más de 20 equipos entre aisladores** [F1].\n- **Equipos CON aisladores\
    \ internos** (usados con base **B501 AP**): el lazo cumple directamente los requisitos\
    \ de EN54-2 [F1].\n- Los equipos Opal con aislador FET interno se conectan a los\
    \ terminales **+2 y +4** en el extremo positivo [F1].\n\n> ⚠️ **Nota importante:**\
    \ Si hay aisladores instalados, el conductor positivo (+) del lazo será circuito\
    \ abierto. **NUNCA uses un multímetro de alta tensión (tipo Megger) en el lazo**\
    \ [F1].\n\n### Regla de arranque del lazo (carga entre aisladores)\nPara asegurar\
    \ que los aisladores se cierran al aplicar alimentación, la carga entre aisladores\
    \ **no debe superar 20** [F5].\n\nCargas de referencia para equipos CLIP [F5]:\n\
    - Detector por rayo LPB-700: **6 SU**\n- Sirenas de lazo: **3 SU**\n- Módulo ZMX-1:\
    \ **3 SU**\n- Módulo MMX-10M/CMX10-RM: **10 SU**\n- El resto de equipos: **1 SU**\n\
    \n---\n\n## 3. Alta de equipos: Autoconfiguración\n\nAcceso: **Nivel de acceso\
    \ 3 → Menú de Configuración → Equipos de lazo → Autoconfigurar** [F8].\n\n###\
    \ Pasos del proceso [F3][F6]:\n\n1. Pulsa **1: Autoconfiguración** en el menú\
    \ de configuración.\n2. Selecciona si aplica a **todos los lazos** o a un **lazo\
    \ específico**.\n3. Elige el modo de autoconfiguración:\n   - **1: Todos Prot.\
    \ OPAL/CLIP** → detecta duplicidades de dirección.\n   - **2: OPAL/CLIP (No detecta\
    \ duplicidad)** → más rápido, sin comprobación de duplicados.\n   - **3: Sólo\
    \ con protocolo CLIP** → solo autoconfigura equipos CLIP aunque haya Opal en el\
    \ lazo.\n4. Selecciona el modo de gestión de equipos:\n   - **1: Permite Añadir/Borrar/Cambiar**\n\
    \   - **2: Sólo Añadir Nuevos Equipos**\n5. El proceso se inicia automáticamente.\
    \ Sensores y módulos (Opal y CLIP) se detectan en la misma pasada [F3].\n6. Al\
    \ finalizar, los resultados se muestran en pantalla por lazo. Usa las teclas **◄/►**\
    \ para navegar entre lazos [F6].\n\n> **Nota:** Si un equipo Opal se autoconfigura,\
    \ por defecto será Opal. Si el número de equipos CLIP supera 40, selecciona manualmente\
    \ la opción «Sólo con protocolo CLIP» [F6].\n\nLos equipos configurados pueden\
    \ consultarse en cualquier momento desde **Nivel de acceso 2 → Resumen de Equipos**\
    \ [F3].\n\n> \U0001F4A1 La configuración puede realizarse también (de forma más\
    \ óptima) con el **programa de configuración ITS**, y transferirse a un ordenador\
    \ portátil para editarla y archivarla [F3].\n\n---\n\n## 4. Edición individual\
    \ de equipos\n\nAcceso: **Nivel de acceso 3 → Menú de Configuración → Equipos\
    \ de lazo → Editar equipos** [F7][F8].\n\nPermite editar individualmente sensores\
    \ o módulos. Parámetros editables para **sensores** [F4]:\n\n- Números de referencia\
    \ de zona de red\n- Tipo de equipo\n- Entorno del número de referencia de zona\
    \ (opcional)\n- Número de central (LOCAL o 1-125 para otras centrales de red)\n\
    - Número de zonas (hasta **255 zonas locales** o **8192 zonas de red**)\n- Número\
    \ de células (hasta **255**)\n- Prioridad de interrogación (solo CLIP, limitada\
    \ a **30 equipos**)\n- Acción de parpadeo en equipo interrogado (elección de color\
    \ solo para Opal)\n- Opción de tipo de equipo (VIEW, Optiplex, SMART)\n- Ajuste\
    \ del nivel de alarma\n- Ajuste del nivel de alarma horaria\n- Ajuste del nivel\
    \ de prealarma\n- Selección de programación horaria (cambio de sensibilidad)\n\
    - Grupo AWACS (**50 grupos**, todos los sensores CLIP salvo HEAT)\n- Retardo de\
    \ alarma\n- Ajuste no silenciable para LED remoto (solo Opal)\n- Operación solo\
    \ modo térmico L6 (solo SMART y Optiplex)\n- Número de aplicación (solo equipos\
    \ SMART 4)\n- Ajuste de función LED remota (solo Opal): «Seguir el equipo» o «Controlada\
    \ por reglas causa-efecto»\n- Retardo de confirmación de coincidencia de detector:\
    \ hasta **240 s (4 min)**, usable con dependencia tipo B\n\n---\n\n**Fuentes:**\n\
    - Manual de instalación y puesta en marcha PEARL: `997-669-005-3_Instal-Comm_ES`\
    \ (sin revisión registrada)\n- Manual de configuración de la central PEARL: `997-671-005-3_Configuration_ES`\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de zonas y reglas causa-efecto**, **cálculo de carga de lazo y baterías con\
    \ el programa ITS**, o **inicialización de equipos de protocolo Opal**."
