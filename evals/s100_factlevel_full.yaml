- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: "# Conexionado de sirenas convencionales en salidas de sirena — Morley ZXe\n\
    \n> **Nota previa:** La query menciona \"ZXe\" como familia. Los fragmentos disponibles\
    \ cubren la **ZXAE/ZXEE** [F1][F2] y la **ZX2e/ZX5e** [F3][F4]. El conexionado\
    \ es muy similar en ambas familias, así que te detallo los puntos comunes y las\
    \ diferencias.\n\n---\n\n## Principios generales del circuito [F1][F2]\n\n1. **Topología\
    \ obligatoria: línea serie, sin ramales.**\n   No se deben realizar ramales en\
    \ la conexión de sirenas convencionales. La supervisión se realiza en la línea\
    \ directa hasta la resistencia final de línea; los ramales paralelos no pueden\
    \ ser supervisados [F2].\n\n2. **Resistencia Final de Línea (RFL):**\n   - Valor:\
    \ **6.800 Ω (6K8), 0,5 W mínimo** [F1].\n   - Se instala entre **+** y **−** de\
    \ la **última sirena** de la línea [F1].\n   - Si no hay ninguna sirena conectada,\
    \ la RFL se conecta directamente en los terminales de la salida de la central\
    \ [F1].\n\n3. **Corriente de supervisión inversa:**\n   La supervisión usa una\
    \ corriente con polaridad **inversa** a la de activación. Al dispararse la salida,\
    \ la corriente circula en sentido normal [F1].\n\n4. **Corriente máxima por circuito:\
    \ 1 A** [F1].\n\n5. **Sección mínima de cable: 1,5 mm²** [F1].\n   No se recomienda\
    \ longitud superior a **1 km** (en ZX2e/ZX5e), ya que la capacitancia e inductancia\
    \ pueden afectar al funcionamiento [F3].\n\n---\n\n## Sirenas con polaridad [F2]\n\
    \nConectar respetando la polaridad **+/−** de cada sirena en serie a lo largo\
    \ de la línea:\n\n```\n+ Salida → (+)Sirena1(−) → (+)Sirena2(−) → (+)SirenaN(−)\
    \ → RFL 6800Ω → − Salida\n```\n\nCada sirena debe tener un **diodo integrado**\
    \ para impedir el consumo en polarización inversa durante la supervisión [F4].\n\
    \n---\n\n## Campanas/sirenas sin polaridad [F1][F2]\n\n- Se debe instalar un **diodo**\
    \ entre el terminal **+** y uno de los terminales de alimentación de la campana,\
    \ para evitar consumos durante la supervisión [F1].\n- En caso de conectar otros\
    \ dispositivos no polarizados a la línea de sirenas, se deben usar **diodos de\
    \ polarización y protección en cada uno** [F4].\n\n---\n\n## Terminales físicos\
    \ según modelo\n\n**ZXAE** — 2 salidas (A y B) [F1]:\n- Terminales en bloque inferior\
    \ de placa (ver Figura 15 del manual) [F1].\n\n**ZXEE** — 4 salidas (A, B, C y\
    \ D) [F1]:\n- Terminales: **TB7** → `S,A+ / S,A− / S,B+ / S,B− / S,C+ / S,C− /\
    \ S,D+ / S,D−` [F1].\n\n**ZX2e** — 2 salidas (A y B) [F4]:\n- Terminales en bloque\
    \ inferior: `SOUNDERS — B+ B− A+ A−` [F4].\n\n**ZX5e** — 4 salidas (A, B, C y\
    \ D) [F4]:\n- Terminales: **TB7** → `A− A+ B− B+ C− C+ D− D+` [F4].\n\n---\n\n\
    ## Advertencia importante [F3]\n\n> ✓ **No enrolles el cable en los terminales.\
    \ Corta y empalma las conexiones adecuadamente para mantener la supervisión de\
    \ la línea.**\n\n---\n\n## Resumen del esquema de conexión\n\n```\n+ Salida X\
    \ ──→ (+)Sirena(−) ──→ (+)Sirena(−) ──→ [RFL 6800Ω] ──┐\n− Salida X ─────────────────────────────────────────────────────┘\n\
    ```\n\n---\n\n**Fuentes:**\n- MIE-MI-310 (Manual de Instalación ZXAE/ZXEE, sin\
    \ revisión registrada)\n- MIE-MI-530rv001 (Manual de Instalación ZX2e/ZX5e, rev.\
    \ 001)\n\n---\n\nTambién puedo ayudarte con: **verificación de avería de supervisión\
    \ de sirenas**, **programación de patrones de disparo** o **conexionado de campanas\
    \ sin polaridad con diodo**."
