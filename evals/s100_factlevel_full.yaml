- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: '## Acceso al menú de programación avanzada — CAD-250


    El acceso se realiza en dos fases: primero entrar como administrador, luego navegar
    hasta el submenú **AVANZADO**.


    ---


    ### Paso 1 — Acceder como administrador


    1. Desde la **PANTALLA DE REPOSO**, toca el icono del candado (🔒) en el centro
    de la pantalla [F1][F2].

    2. Se abrirá la **PANTALLA DE ACCESO** solicitando el código de acceso [F1][F2].

    3. Introduce la **clave de administrador por defecto: `2222`** [F1][F2].


    > ⚠️ Asegúrate de tener la autorización y los conocimientos necesarios. El uso
    indebido del nivel de administrador puede provocar un mal funcionamiento de la
    instalación [F1][F2].


    ---


    ### Paso 2 — Navegar hasta Configuración Avanzada


    Una vez en la pantalla de administrador, sigue esta ruta:


    **AJUSTES** (Menú principal) **→ AVANZADO** (Submenú) [F5]


    ---


    ### Paso 3 — Pestañas disponibles en AVANZADO


    Dentro de **AVANZADO** encontrarás 3 pestañas [F5][F8]:


    - **SISTEMA:** Configura número de cabinas (paneles), número de lazos y si hay
    cabina con LEDs de zona [F5].

    - **OTROS:** 5 interruptores para facilitar puesta en marcha y mantenimiento (tiempo
    de inactividad, salto a scroll, timeout, módulos virtuales, salida automática
    del modo test) [F8].

    - **REINICIAR:** Devuelve los valores de configuración del panel a valores por
    defecto (no afecta a entidades, lazos, maniobras, grupos, módulos virtuales, modos
    especiales, filtros de red ni registros de eventos) [F8].


    > ⚠️ Por razones de seguridad y cumplimiento normativo, por defecto todos los
    interruptores de inactividad, timeout y scroll deben estar activados (en verde)
    [F8].


    ---


    **Nota:** El nivel de administrador (Nivel 2) también da acceso a todos los demás
    submenús de configuración: Lazo, Sectorización, Maniobras, Logs, Red, Instalación,
    etc. [F3].


    ---


    Fuentes: CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23);
    Manual de Instalación CAD-250 MI_372_es_2024 e; CAD-250 Manual Software Configuración
    MS-416-es-2026-b (rev. b)


    ---


    También puedo ayudarte con: **configuración del número de lazos en AVANZADO >
    SISTEMA**, **opciones del submenú MANIOBRAS** o **gestión de usuarios y contraseñas**
    en la CAD-250.'
