- qid: cat010
  question: ¿Cómo se alimenta la sirena/avisador intrínsecamente seguro IS-mA1 en
    una zona peligrosa (ATEX) y cuáles son sus parámetros de seguridad intrínseca
    de entrada?
  answer: '# Alimentación e IS de la sirena IS-mA1 en zona ATEX


    ## 1. Clasificación ATEX y zonas de uso


    La IS-mA1 está certificada como [F1]:

    - **II 1G Ex ia IIC T4 Ga**

    - Temperatura ambiente: **-40 °C ≤ Ta ≤ +60 °C**

    - Apta para zonas **0, 1 y 2** con gases y vapores inflamables, grupos **IIA,
    IIB e IIC**, clases de temperatura **T1, T2, T3 y T4** [F1]

    - Certificados: **SIRA 05ATEX2084X** / **IECEx SIR 06.0045X** [F1]


    ---


    ## 2. Parámetros de seguridad intrínseca de entrada (Entity Parameters)


    ### Terminales **+ / −** (alimentación principal del avisador)


    - **Ui = 28 V** [F1]

    - **Ii = 93 mA** [F1]

    - **Pi = 660 mW** [F1]

    - **Ci = 0** [F1]

    - **Li = 0** [F1]


    > ⚠️ La capacitancia total conectada a los terminales +/− (cable + cualquier otra
    capacitancia) **no debe superar 83 nF** [F3][F4].


    ### Terminales **S2 y S3** (cambio de tono / etapas de alarma) respecto a −


    - **Ui = 28 V** [F1]

    - **Ii = 0 mA** [F1]

    - **Ci = 0** [F3]


    Adicionalmente, estos terminales tienen parámetros de salida (actúan como fuente
    hacia el circuito de retorno) [F3]:

    - Uo = **16,8 V**

    - Io = **7,3 mA**

    - Po = **31 mW**


    ---


    ## 3. Requisitos del aparato asociado (lado seguro)


    ### Para terminales +/− — dos opciones:


    **Opción A: Barrera Zener (shunt zener diode barrier)** [F3]

    - Uo ≤ **28 V**

    - Io ≤ **93 mA**

    - Po ≤ **660 mW**

    - Co ≥ Ccable

    - Lo ≥ Lcable


    **Opción B: Aislador galvánico (galvanically isolated supply)** [F4]

    - Uo ≤ **28 V**

    - Io ≤ **93 mA**

    - Po ≤ **660 mW**

    - Co ≥ Ccable

    - Lo ≥ Lcable


    En ambos casos, el aparato asociado debe estar **certificado Ex ia por un Organismo
    Notificado** [F10].


    ### Para terminales S2 y S3 — tres opciones [F5][F6]:

    - **Barrera de diodo de retorno** certificada Ex ia, con caída de tensión **<
    0,9 V**

    - **Relé intrínsecamente seguro** certificado por Organismo Notificado

    - **Aislador galvánico** certificado por Organismo Notificado

    - Alternativamente: **interruptor mecánico** ubicado directamente en la zona peligrosa


    > ⚠️ La corriente permitida en S2/S3 es **cero** — no pueden conectarse a barreras
    convencionales con corriente de salida [F5].


    > ⚠️ La distancia entre terminales S2 y S3 es **inferior a 6 mm** — precaución
    en el conexionado [F3][F4].


    ---


    ## 4. Esquemas de conexión disponibles


    ### Alarma monofásica (1 tono):

    - **Con interruptor en positivo**: barrera Zener de un solo canal (Fig 4) [F8]

    - **Con interruptor en negativo**: barrera Zener + barrera de diodo de retorno
    (Fig 5) [F8]

    - **Con aislador galvánico**: aislador galvánico único (Fig 7) [F10]


    ### Alarma multietapa (2 o 3 tonos):

    - Conectar **S2 a 0V** activa la 2.ª etapa; **S3 a 0V** activa la 3.ª etapa [F9]

    - Con barreras Zener: barrera principal 28V/93mA + barreras de diodo de retorno
    para S2/S3 (Fig 6) [F9]

    - Con aisladores galvánicos: aislador galvánico principal + relés galvánicamente
    aislados para S2/S3 (Fig 8) [F10]


    ---


    ## 5. Requisito de tierra (diferencia clave entre opciones)


    - **Barreras Zener**: requieren conexión a tierra de alta integridad. La resistencia
    entre la tierra IS y la tierra de protección debe ser **< 1 Ω** [F3].

    - **Aisladores galvánicos**: **no requieren** conexión a tierra de alta integridad
    — recomendados para instalaciones pequeñas donde no hay tierra de alta integridad
    disponible [F10].


    ---


    Fuente: IS5001-F_IS-mA1_EN (Issue E, 27-11-09); manual IS MA1 (Issue H, 03-01-2020)


    También puedo ayudarte con: **selección de tonos y configuración de los dip-switches**,
    **procedimiento de montaje mecánico** o **requisitos de prensaestopas y grado
    IP65** del IS-mA1.'
