- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  answer: '# RP1r — Sistema no vuelve a estado normal tras resetear después de extinción


    Este es un escenario con varias causas posibles bien documentadas. Comprueba en
    este orden:


    ---


    ## 1. Rearme inhibido (parámetro rI / función SW1-6)


    Según la normativa **EN12094:1/2003 Punto 4.12.2** [F2], la central puede tener
    programado un periodo de inhibición del rearme de **0 a 30 minutos** desde que
    entra en estado ACTIVADO.


    - Comprueba si el **microinterruptor SW1-6** está en posición **ON** [F2] — si
    es así, la función de rearme inhibido está habilitada.

    - Verifica el valor del parámetro **rI** en programación [F2]: si es distinto
    de **00**, la central no permitirá rearmar hasta que transcurra ese tiempo.

    - **Acción:** Espera el tiempo programado en rI (máximo 30 min) antes de intentar
    el rearme. Si no necesitas esta función, puedes deshabilitarla poniendo SW1-6
    en **OFF** [F2].


    > ⚠️ **Nota:** El manual indica que si la central está en modo *paro/espera*,
    sí se puede realizar un rearme [F2].


    ---


    ## 2. Averías enclavadas que impiden el restablecimiento


    Todas las averías son **por defecto enclavadas** y requieren rearme manual para
    su restablecimiento [F8]. Si hay alguna condición de avería activa (presión baja,
    flujo, puerta abierta, circuito de supervisión, etc.), la central no volverá a
    estado normal aunque pulses Rearme.


    **Comprueba los LEDs de avería en el panel:**

    - **Presión Baja** — revisar el circuito LOW PRESS SWITCH [F8]

    - **Señal de Flujo** — revisar el circuito FLOW PRESS SWITCH [F8]

    - **Puerta Abierta** — revisar el circuito DOOR OPEN SWITCH [F8]

    - **Avería Circuito Extinción** — revisar los circuitos de solenoide [F6]

    - **Fallo Sistema** — ver punto 3 a continuación [F5]


    > Si alguno de estos LEDs está **intermitente**, la condición de avería sigue
    activa. Elimina primero la causa física antes de rearmar.


    ---


    ## 3. Fallo de Sistema (FALLO DE SISTEMA)


    Si el LED **Fallo Sistema** está encendido [F5][F6]:


    - La central dispone de **dos microprocesadores**. Si el microprocesador principal
    tardó en inicializar o detectó tensiones fuera de rango, indica **FALLO DE SISTEMA**
    [F5].

    - En este estado, la central **NO realizará el proceso de extinción** al considerar
    que no funciona correctamente [F5].

    - **Acción:** Realiza un **REARME** de la central. Si la avería desaparece tras
    el rearme, el sistema es funcional [F5].

    - Este fallo puede ocurrir en el momento del arranque, una vez conectadas las
    baterías [F5].


    ---


    ## 4. Procedimiento de Rearme correcto


    Para ejecutar el rearme correctamente [F8]:


    1. Accede a **nivel 2** de acceso (giro de llave o habilitación de teclado).

    2. Pulsa la tecla **Rearme**.

    3. La central se reiniciará y todas las entradas enclavadas se restablecerán.


    ---


    ## Resumen de comprobaciones


    - **SW1-6 en ON + parámetro rI > 00** → esperar tiempo de inhibición o reprogramar

    - **LED de avería intermitente** → eliminar causa física antes de rearmar

    - **LED Fallo Sistema encendido** → rearmar; si persiste, revisar alimentación
    y baterías

    - **Nivel de acceso incorrecto** → asegurarse de estar en nivel 2 para poder rearmar


    ---


    Fuente: MNDT102 (sin revisión registrada); HLSI-BT-001 (sin revisión registrada);
    HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada)


    ---


    También puedo ayudarte con: **verificación del parámetro ri (resumen inhibido
    tras extinción)**, **comprobación de circuitos de supervisión de solenoides**
    o **interpretación de LEDs de avería en el panel RP1r**.'
