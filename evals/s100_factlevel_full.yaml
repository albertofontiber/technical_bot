- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura a través de las **reglas
    de causa-efecto**, accesibles desde el menú de configuración de nivel 3 [F7][F8].


    ---


    ### 1. Ruta de acceso a la configuración


    Desde el **Menú Editar Configuración**, selecciona la opción **«8: Causa y Efecto»**
    [F8], que corresponde al **Apéndice 5 – Programación de causa-efecto** del manual
    de configuración [F1].


    La ruta completa es [F7][F8]:

    - Nivel de acceso 3 → Editar Configuración → **Causa y Efecto**


    ---


    ### 2. Tipos de retardo disponibles


    Dentro de cada regla de causa-efecto, se puede asignar uno de **seis tipos de
    retardo de salida** [F1]. A continuación se describen sus comportamientos según
    la tabla del manual [F2]:


    **Fijo:**

    - No se detiene al pulsar SILENCIAR SIRENAS

    - No puede anularse con «Anular retardos» (nivel 2)

    - No muestra cuenta atrás en LCD

    - No responde a AMPLIAR RETARDO ni a FIN RETARDO


    **Estándar:**

    - Se detiene si se pulsa SILENCIAR SIRENAS (y se reactiva con SONIDO ALARMAS)

    - Puede anularse con «Anular retardos» (nivel 2)

    - Muestra tiempo restante en pestaña ALARMA

    - Puede detenerse con FIN RETARDO (nivel 2)

    - No responde a AMPLIAR RETARDO


    **No Silenc.:**

    - No se detiene al pulsar SILENCIAR SIRENAS

    - Puede anularse con «Anular retardos» (nivel 2)

    - Muestra tiempo restante en pestaña ALARMA

    - Puede detenerse con FIN RETARDO (nivel 2)

    - No responde a AMPLIAR RETARDO


    **Est. Ext. (Estándar Extendido):**

    - Se detiene si se pulsa SILENCIAR SIRENAS

    - Puede anularse con «Anular retardos» (nivel 2)

    - Muestra tiempo restante en pestaña ALARMA

    - Puede detenerse con FIN RETARDO (nivel 2)

    - **Se detiene también al pulsar AMPLIAR RETARDO**


    **RetExtStd:**

    - Se detiene si se pulsa SILENCIAR SIRENAS

    - Puede anularse con «Anular retardos» (nivel 2)

    - Muestra tiempo restante en pestaña ALARMA

    - Puede detenerse con FIN RETARDO (nivel 2)

    - **El temporizador comienza en RETARDO AMPLIADO** al pulsar AMPLIAR RETARDO


    **No Sil. Ext:**

    - No se detiene al pulsar SILENCIAR SIRENAS

    - Puede anularse con «Anular retardos» (nivel 2)

    - Muestra tiempo restante en pestaña ALARMA

    - Puede detenerse con FIN RETARDO (nivel 2)

    - **Se detiene también al pulsar AMPLIAR RETARDO**


    **SinRetExt:**

    - No se detiene al pulsar SILENCIAR SIRENAS

    - Puede anularse con «Anular retardos» (nivel 2)

    - Muestra tiempo restante en pestaña ALARMA

    - Puede detenerse con FIN RETARDO (nivel 2)

    - **El temporizador comienza en RETARDO AMPLIADO** al pulsar AMPLIAR RETARDO


    ---


    ### 3. Funcionamiento operativo del retardo


    Durante un retardo activo [F4]:

    - El **LED de RETARDO ACTIVO** se enciende [F3]

    - La tecla **AMPLIAR RETARDO** (nivel de acceso 2) permite extender el retardo
    para realizar una búsqueda [F4]

    - La tecla **FIN RETARDO** (nivel de acceso 1) pone fin al retardo e introduce
    la condición de alarma completa [F4]


    ---


    ### 4. Anulación global del retardo desde el panel


    Si necesitas anular/habilitar todos los retardos configurados sin entrar en programación
    [F3]:

    1. Accede al **Menú Anular/Habilitar**

    2. Selecciona **«5: Retardo Activación Salidas»**

    3. Pulsa **✓** para cambiar el estado (habilitado ↔ anulado)

    4. Pulsa **✕** para salir


    ---


    ### 5. Opción adicional: habilitar/deshabilitar la tecla AMPLIAR RETARDO


    Desde **Editar Parámetros de la Central**, el parámetro **«10: Extend Delay Button»**
    permite activar o desactivar el pulsador AMPLIAR RETARDO [F10], ya que esta función
    no se requiere en algunos mercados.


    ---


    > **Nota:** Los fragmentos disponibles describen los tipos de retardo y su comportamiento,
    pero **no especifican el procedimiento paso a paso para introducir el valor numérico
    del tiempo de retardo** dentro del editor de reglas de causa-efecto. Para ese
    detalle, consulta el **Apéndice 5** completo del manual de configuración físico
    [F1].


    ---


    Fuente: Manual de configuración de la central PEARL – 997-671-005-3 (sin revisión
    registrada); Manual de funcionamiento PEARL – 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **borrado de reglas de causa-efecto**, **configuración
    de coincidencia de zona** o **programación horaria** de la PEARL.'
