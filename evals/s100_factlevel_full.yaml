- qid: hp008
  question: ¿Qué detectores de humo analógicos son compatibles con la Notifier ID3000?
  answer: '## Detectores de humo analógicos compatibles con la ID3000


    La ID3000 es compatible con toda la gama de sensores analógicos de **Notifier**
    que utilizan protocolo de comunicaciones Notifier [F4]. A continuación se listan
    los detectores de humo analógicos específicos:


    ---


    ### Detectores de humo por tecnología


    **Ópticos (SDX):**

    - **SDX-751EM** — Óptico [F1][F2]

    - **SDX-751TEM** — Optiplex (combinado térmico/humo) [F1][F2]

    - **SDX-751** — Óptico [F2]

    - **SDX-551E** — Óptico [F2]

    - **SDX-551THE** [F2]


    **Iónicos (CPX):**

    - **CPX-751E** — Iónico (bajo perfil) [F1][F2]

    - **CPX-551E** — Iónico [F2]


    **Láser / VIEW™:**

    - **FSL-751E** — VIEW (humo láser) [F1]

    - **LPX-751** — VIEW [F2][F3]


    **Multicriterio / SMART:**

    - **IRX-751CTEM** — SMART 4 (óptico/térmico/infrarrojo/CO) [F2][F5]

    - **IRX-751TEM** — SMART 3 [F2]


    **Entornos especiales:**

    - **HPX-751E** — HARSH/FILTREX (óptico, para ambientes hostiles) [F1][F2]

    - **IDX-751** — HAZARD (óptico intrínsecamente seguro) [F1][F2]


    ---


    ### Tipos de sensor reconocidos en programación


    En la programación de la central, estos detectores se configuran bajo los siguientes
    tipos [F3]:


    - **ÓPT** → SDX (óptico)

    - **IÓN** → CPX (iónico)

    - **MULTI** → SDX-751TEM (combinado térmico/humo)

    - **VIEW** → LPX-751 / FSL-751E (humo láser)

    - **SMT4** → SMART4 (óptico/térmico/infrarrojo/CO)


    ---


    ### Nota sobre detectores por rayo


    Los fragmentos también mencionan detectores por rayo **LPB500** (máximo 4 por
    lazo) y **LBP-700 / LBP-700T** [F2], aunque estos no son detectores puntuales
    de humo analógico convencionales.


    ---


    Fuentes: MPDT190 (sin revisión registrada); MIDT190 (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de sensibilidad de los sensores VIEW™**,
    **programación de sensores MULTI/Optiplex** o **módulos de lazo compatibles con
    la ID3000**.'
