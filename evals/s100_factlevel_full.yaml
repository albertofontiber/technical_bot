- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  answer: "# Notifier PEARL — Capacidad de lazo SLC, aisladores y alta/edición de\
    \ equipos\n\n---\n\n## 1. Capacidad máxima por lazo\n\n- **Protocolo Opal:** hasta\
    \ **159 sensores + 159 módulos** por lazo [F1][F2]\n- **Protocolo CLIP:** hasta\
    \ **99 sensores + 99 módulos** por lazo [F2][F6]\n- **Protocolo mixto Opal + CLIP:**\
    \ el límite de equipos CLIP en el lazo es de **40**; si se supera, la autoconfiguración\
    \ continúa pero señala fallos [F6]\n- **Máximo total por lazo:** **318 equipos**\
    \ (159 sensores + 159 módulos) [F1]\n- **Límite global del sistema (ambos lazos):**\
    \ máximo **512 sensores y/o pulsadores manuales** en total para cumplir **EN54-2:\
    \ 13-7** [F1]\n- **Carga máxima:** **0,75 A por lazo** [F2]\n\n---\n\n## 2. Requisitos\
    \ de aisladores (EN54-2: 12.5.2)\n\n- **Regla general EN54-2:** máximo **32 equipos\
    \ entre aisladores** [F1]\n- **Equipos SIN aisladores internos** (incluidos CLIP\
    \ y algunos Opal): **NO más de 20 equipos entre aisladores** [F1]\n- **Equipos\
    \ CON aisladores internos** (usados con base **B501 AP**): el lazo cumple directamente\
    \ los requisitos de EN54-2 [F1]\n- Los equipos Opal con aisladores internos FET\
    \ conectan el aislador a los terminales **+2 y +4** en el extremo positivo [F1]\n\
    - Para que los aisladores del lazo se cierren al aplicar alimentación, la **carga\
    \ entre aisladores no debe superar 20** [F5]\n\n> ⚠️ **NUNCA utilices un multímetro\
    \ de alta tensión (tipo Megger) en el lazo de detección.** Si hay aisladores instalados,\
    \ el conductor positivo (+) del lazo será circuito abierto [F1].\n\n---\n\n##\
    \ 3. Alta de equipos: Autoconfiguración\n\nLa vía recomendada es el **programa\
    \ de configuración ITS** (más óptima), pero puede hacerse íntegramente desde la\
    \ central [F3].\n\n**Acceso:** Nivel de acceso 3 → Menú de Configuración → *Equipos\
    \ de lazo* → **Autoconfigurar** [F8]\n\n**Pasos:**\n\n1. Pulsa **1: Autoconfiguración**\
    \ [F3]\n2. Selecciona si aplica a **todos los lazos** o a un **lazo específico**\
    \ [F3]\n3. Elige una de las tres opciones [F3][F6]:\n   - **1: Todos Prot. OPAL/CLIP**\
    \ — detecta duplicidades de dirección\n   - **2: OPAL/CLIP (No detecta duplicidad)**\
    \ — más rápido, sin comprobación de duplicados\n   - **3: Sólo con protocolo CLIP**\
    \ — solo autoconfigura equipos CLIP aunque haya Opal en el lazo\n4. Selecciona\
    \ el modo de operación [F6]:\n   - **1: Permite Añadir/Borrar/Cambiar**\n   -\
    \ **2: Sólo Añadir Nuevos Equipos**\n5. El proceso se inicia automáticamente.\
    \ Sensores y módulos (Opal y CLIP) se detectan en la misma pasada [F3]\n6. Al\
    \ finalizar, los resultados se muestran por lazo. Usa las teclas **◄/►** para\
    \ navegar entre lazos [F6]\n\n> **Nota:** Si un equipo Opal se autoconfigura,\
    \ por defecto será Opal. Si el número de equipos CLIP supera 40, selecciona manualmente\
    \ la opción «Sólo con protocolo CLIP» [F6].\n\nLos equipos configurados pueden\
    \ consultarse en cualquier momento desde **Nivel de acceso 2 → Resumen de Equipos**\
    \ [F3].\n\n---\n\n## 4. Edición individual de equipos\n\n**Acceso:** Nivel de\
    \ acceso 3 → Menú de Configuración → *Equipos de lazo* → **Editar equipos** [F8][F7]\n\
    \nDesde aquí se puede editar cada sensor o módulo individualmente [F4]. Parámetros\
    \ editables para **sensores**:\n\n- Números de referencia de zona de red [F4]\n\
    - Tipo de equipo [F4]\n- Entorno del número de referencia de zona (opcional) [F4]\n\
    - Número de central (LOCAL o 1–125 para red) [F4]\n- Número de zonas (hasta **255\
    \ zonas locales** o **8192 zonas de red**) [F4]\n- Número de células (hasta **255**)\
    \ [F4]\n- Prioridad de interrogación (solo CLIP, limitada a **30 equipos**) [F4]\n\
    - Acción de parpadeo en equipo interrogado; elección de color solo para Opal [F4]\n\
    - Opción de tipo de equipo (VIEW, Optiplex, SMART) [F4]\n- Ajuste del nivel de\
    \ alarma, alarma horaria y prealarma [F4]\n- Selección de programación horaria\
    \ (cambio de sensibilidad) [F4]\n- Grupo AWACS (**50 grupos**, todos los sensores\
    \ CLIP salvo HEAT) [F4]\n- Retardo de alarma [F4]\n- Ajuste no silenciable para\
    \ LED remoto (solo Opal) [F4]\n- Operación solo modo térmico L6 (solo SMART y\
    \ Optiplex) [F4]\n- Número de aplicación (solo equipos SMART 4) [F4]\n- Función\
    \ LED remota (solo Opal): *Seguir el equipo* (predeterminada) o *Controlada por\
    \ reglas causa-efecto* [F4]\n- Retardo de confirmación de coincidencia de detector:\
    \ hasta **240 s (4 min)**; puede usarse con dependencia tipo B [F4]\n\n---\n\n\
    **Fuentes:**\n- Manual de instalación y puesta en marcha **997-669-005-3_Instal-Comm_ES**\
    \ (sin revisión registrada)\n- Manual de configuración de la central **997-671-005-3_Configuration_ES**\
    \ (sin revisión registrada)"
