- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  answer: '# RP1r — Sistema no vuelve a estado normal tras resetear después de descarga


    Cuando la central no rearma correctamente tras una extinción, hay varias causas
    posibles según los fragmentos disponibles. Comprueba en este orden:


    ---


    ## 1. Verificar si hay "Fallo de Sistema" activo


    El LED **Fallo Sistema** puede estar encendido [F7][F8]. Según el boletín técnico
    HLSI-BT-001 [F7]:


    > Si el microprocesador principal tarda en inicializar o hay una lectura de tensiones
    fuera de rango, la central indica **FALLO DE SISTEMA** y **NO realizará el proceso
    de extinción** al considerar que no está funcionando correctamente.


    **Acción:** Rearmar la central. Si la avería apareció al arrancar (al conectar
    baterías), un rearme la elimina [F7].


    ---


    ## 2. Verificar si el Rearme Inhibido (rI) está activo


    El parámetro **rI** (Rearme Inhibido) puede estar programado con un tiempo entre
    **0 y 30 minutos** [F3]. Mientras ese tiempo no haya transcurrido desde el estado
    ACTIVADO, **no es posible rearmar** la central [F3].


    - Comprueba si la pantalla de 7 segmentos muestra **"rI"** [F3].

    - Si el microinterruptor **SW1-6 está en ON**, esta función está habilitada [F3].

    - Espera a que transcurra el tiempo programado, o accede a programación para verificar
    el valor del campo rI [F3].


    > **Nota:** Si la central está en modo **paro/espera**, sí se puede realizar un
    rearme aunque rI esté activo [F3].


    ---


    ## 3. Verificar averías enclavadas en circuitos de supervisión


    Todas las entradas supervisadas requieren **RFL de 6K8** [F10]. Si hay cortocircuito
    o circuito abierto, la central activa la avería y el LED de avería general de
    forma intermitente [F10].


    Las averías que **requieren rearme manual** (no son automáticas) son:


    - **Circuito ABORT SWITCH (F)** — Avería Paro: requiere rearme manual y detiene
    la extinción [F10].


    El resto de circuitos (CCT EXT 1/2, SND 1/2, LOW PRESS, FLOW PRESS, DOOR OPEN,
    HOLD SWITCH, zonas 1/2/3) tienen **rearme automático** cuando desaparece la condición
    de avería [F10].


    **Acción:** Comprueba físicamente el cableado del circuito ABORT SWITCH y la presencia
    de la RFL de 6K8 [F10].


    ---


    ## 4. Procedimiento de rearme correcto


    Para rearmar la central [F6]:

    1. Habilitar **acceso nivel 2** (girar llave o habilitar teclado) [F6].

    2. Pulsar la tecla **Rearme** [F6].

    3. Las entradas enclavadas se reiniciarán [F6].


    Si tras el rearme la pantalla muestra **S1**, indica que se ha detectado un cambio
    en la configuración del microinterruptor SW1 [F6].


    ---


    ## Resumen de comprobaciones


    - **LED Fallo Sistema encendido** → Rearmar; si persiste, revisar alimentación
    y baterías [F7].

    - **Pantalla muestra rI** → Esperar tiempo de inhibición (hasta 30 min) [F3].

    - **LED Avería Paro intermitente + fijo** → Revisar circuito ABORT SWITCH y RFL
    6K8 [F10].

    - **Acceso nivel 2 no habilitado** → Sin nivel 2 no es posible pulsar Rearme [F6].


    ---


    Fuentes:

    - HLSI-BT-001 Boletín técnico (sin revisión registrada)

    - MNDT102 Manual de usuario RP1r (sin revisión registrada)

    - MIEMN570 Manual de usuario VSN-RP1r (Rev. 008)


    ---


    También puedo ayudarte con: **programación del parámetro rI (tiempo de inhibición
    de rearme)**, **verificación y conexionado de la RFL 6K8 en circuitos supervisados**,
    o **interpretación de LEDs de avería tras la extinción**.'
