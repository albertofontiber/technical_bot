- qid: cat020
  question: En una central Morley DXc instalada en Espana, ¿cual es el nivel de alarma
    y de prealarma por defecto de los detectores, y el maximo configurable?
  answer: '## Niveles de alarma y prealarma por defecto en la DXc


    La respuesta depende del **tipo de detector** (protocolo):


    ---


    ### Detectores con protocolo Morley-IAS (detectores ópticos convencionales, OPT)


    Para estos detectores, el valor analógico se normaliza entre **0% – 100%** [F2]:


    - **Nivel de prealarma por defecto: 80%** [F2]

    - **Nivel de alarma por defecto: 100%** [F2]

    - **Nivel de alarma máximo configurable: 108%** [F2]


    En pantalla se visualiza como: `S004 OPT Fuego:100% Prealarma: 80%` [F2]


    ---


    ### Detectores Multicriterio (OTM) de Morley-IAS


    Trabajan por **niveles**, no por porcentaje. Los valores por defecto que muestra
    el sistema son [F1][F2]:


    - **Nivel de prealarma por defecto: Nivel 3** (\*P, valor analógico 72, sensibilidad
    6,5% osc./m)

    - **Nivel de alarma por defecto: Nivel 4** (\*A, valor analógico 86, sensibilidad
    6,5% a 11,5% osc./m autoajustado)


    En pantalla: `S001 OTM Fuego:Niv4 Prealarma:Niv3` [F2]


    El rango configurable va de **Nivel 1** (3,2% osc./m) a **Nivel 6** (solo temperatura)
    [F1].


    ---


    ### Detectores Láser (LSR) de Morley-IAS


    También trabajan por niveles [F1]:


    - **Nivel de prealarma por defecto: Nivel 4** (\*P, valor analógico 69, sensibilidad
    0,32% osc./m)

    - **Nivel de alarma por defecto: Nivel 5** (\*A, valor analógico 76, sensibilidad
    0,65% osc./m)


    En pantalla: `S003 LSR Fuego:Niv5 Prealarma:Niv4` [F2]


    El rango configurable va de **Nivel 1** (0,06% osc./m) a **Nivel 9** (6,5% osc./m)
    [F1].


    ---


    ### Restricción importante


    La central **no permite ajustar niveles que impidan el reconocimiento de las alarmas**,
    y el **nivel de prealarma no puede ser superior al nivel de alarma** [F3].


    ---


    **Fuente:** DXc Manual de variaciones de mercado (sin revisión registrada); DXc
    Manual de configuración (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento paso a paso para modificar los niveles
    de sensibilidad**, **configuración de modos horarios con sensibilidad variable**
    o **verificación del valor analógico actual de un detector**.'
