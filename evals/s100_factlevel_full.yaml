- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  answer: '## Desactivación en la CCD-103: por zona, no por detector individual


    La **CCD-103** es una central convencional y el manual no describe ningún procedimiento
    para desactivar un detector de forma individual. La unidad mínima de desconexión
    es la **zona completa**.


    ---


    ### Procedimiento para desconectar una zona


    La desconexión se opera mediante las **teclas de zona (A)** [F3]:


    1. **Primera pulsación** de la tecla de zona → la zona entra en **modo prueba**.

    2. **Segunda pulsación** de la tecla de zona → la zona queda en **modo desconexión**
    (anulada) [F1][F3].


    Para **reconectar** la zona:

    - Con la zona ya desconectada, **una sola pulsación** de la tecla de zona → zona
    conectada de nuevo [F1].


    > ⚠️ **Requisito previo:** La llave de bloqueo de teclado **(G)** debe estar en
    posición **abierta (ON)**; si está cerrada, el teclado está inhibido y las pulsaciones
    no tienen efecto [F3].


    ---


    ### Indicaciones visuales durante la desconexión


    - **Indicador de anular (4):** encendido de forma continua [F1].

    - **Indicador de fallo/anular/prueba de la zona:** encendido fijo, indicando la
    zona concreta anulada [F1][F3].


    ---


    ### Limitación importante


    El manual advierte explícitamente que **"es importante limitar el uso de esta
    maniobra"**, ya que cuando una zona está desconectada, la central **no refleja
    ninguna incidencia ni evento** en esa zona [F1].


    Dado que la CCD-103 admite un máximo de **32 detectores o pulsadores por zona**
    [F5], si necesitas aislar un detector concreto sin afectar al resto, tendrías
    que actuar físicamente sobre el detector en el cableado (desconexión física),
    ya que el sistema no ofrece desactivación individual por software.


    ---


    Fuente: CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de prueba de zona**, **conexionado
    de detectores en la zona** o **interpretación de indicadores de avería** en la
    CCD-103.'
