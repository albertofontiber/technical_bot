  question: Necesito un detector de llama SharpEye «40/40» (Spectrex / Notifier) para
    una instalación; ¿qué modelo pido?
  answer: 'La familia SharpEye 40/40 tiene **varias variantes con tecnologías de detección
    distintas y no intercambiables entre sí**. Antes de pedir el modelo, necesitas
    definir qué tipo de llama quieres detectar y qué entorno tienes. Aquí tienes las
    variantes presentes en mi documentación:


    ---


    **S40/40R — Single IR (infrarrojo simple)** [F1][F8]

    - Tecnología: un único canal infrarrojo

    - Referencia del manual: TM40/40R [F3]

    - Disponible en carcasa acero inoxidable (S) o aluminio (A) [F9]

    - Entradas de cable: M25 (1) o ¾" NPT (2) [F9]

    - Temperatura: 75°C (1) o 85°C (2) [F9]

    - Homologaciones: Inmetro (B), FM/CSA (F), ATEX/IECEx (C), TR-CU (R) [F9]


    ---


    **S40/40I — IR3 (triple espectro infrarrojo)** [F4]

    - Tecnología: tres canales infrarrojos (IR3), máxima inmunidad a falsas alarmas

    - Referencia del manual: TM40/40I [F3]

    - Misma estructura de código de pedido que el 40/40R (cableado / temperatura /
    entrada / carcasa / homologación) [F10]


    ---


    **S40/40M — Multi IR (hidrógeno e hidrocarburo)** [F5]

    - Tecnología: infrarrojo múltiple, específico para llamas de **hidrógeno e hidrocarburo**

    - Referencia del manual: TM40/40M [F3]


    ---


    **S40/40L / LB / L4 / L4B — UV/IR** [F6]

    - Tecnología: combinación ultravioleta + infrarrojo

    - Referencia del manual: TM40/40L [F3]


    ---


    **S40/40U / UB — UV** [F2]

    - Tecnología: ultravioleta

    - Referencia del manual: TM40/40U [F3]

    - También existe variante **Ultra Fast UV/IR** (TM40/40UFL) y **Ultra Fast IR3**
    (TM40/40UFI) [F3]


    ---


    **Para ayudarte a elegir el modelo exacto y construir la referencia de pedido
    completa, necesito saber:**


    1. ¿Qué tipo de combustible/llama necesitas detectar? (hidrocarburos, hidrógeno,
    ambos, otro)

    2. ¿Qué homologación requiere la instalación? (ATEX/IECEx, FM/CSA, otra)

    3. ¿Qué entrada de cable tienes prevista? (M25 o ¾" NPT)

    4. ¿Qué rango de temperatura ambiente? (hasta 75°C o hasta 85°C)

    5. ¿Carcasa en acero inoxidable o aluminio?


    Con esos datos puedo construirte la referencia completa de pedido.


    ---


    Fuentes:

    - MNDT724_40-40R (TM 40/40R, Rev. 4, 10 octubre 2011)

    - MNDT723_40-40U (MN-DT-723_B, 10 octubre 2011)

