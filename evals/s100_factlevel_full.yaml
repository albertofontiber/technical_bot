- qid: hp014
  question: ¿Cómo se conecta un módulo de aislamiento de línea en un lazo ID2000?
  answer: '# Conexión del módulo de aislamiento de línea en lazo ID2000


    ## Requisitos de instalación (norma EN54)


    Antes de conectar el aislador, ten en cuenta los límites obligatorios [F4]:


    - **Máximo 32 equipos de lazo** entre aisladores (requisito EN54-2: 12.5.2) [F4]

    - **En la ID2000: máximo 25 equipos** entre aisladores [F4]

    - **Si se usan aisladores tipo FET: máximo 20 equipos** entre aisladores [F4]


    > ⚠️ Superar estos límites contraviene la norma EN54-2 en caso de avería en la
    transmisión [F4].


    ---


    ## Procedimiento de conexión


    ### Paso 1 — Comprobaciones previas al cableado del lazo


    Antes de conectar los aisladores, realiza las pruebas de continuidad del lazo
    [F4]:


    - Las comprobaciones de continuidad **deben realizarse antes de conectar los aisladores**
    [F4]

    - **Desconecta temporalmente los aisladores** cortocircuitando los **terminales
    2 y 4** de cada aislador [F3]

    - El cableado del lazo **debe estar desconectado del panel** durante este procedimiento
    [F3]


    ### Paso 2 — Verificación de resistencia de línea


    Mide la resistencia final de línea y verifica que es inferior a [F3]:


    **En placa base y LIB:**

    - **14,5 Ω** para detección de dirección duplicada

    - **28,5 Ω** si no se requiere detección de dirección duplicada


    **En placa base y LIB (segundo caso):**

    - **18,5 Ω** para garantizar detección de dirección duplicada

    - **35,5 Ω** si no se requiere detección de dirección duplicada


    ### Paso 3 — Verificación de polaridad


    - Conecta el multímetro en **polaridad invertida** (+ al lazo −, y − al lazo +)
    [F3]

    - El multímetro debe indicar la presencia de **diodos polarizados en paralelo**
    [F3]

    - Si indica un único diodo polarizado, algún equipo puede estar con **polaridad
    invertida** [F2]


    ### Paso 4 — Retirada de conexiones temporales y conexión al panel


    1. **Retira las conexiones temporales** (cortocircuitos) en los terminales 2 y
    4 de los aisladores [F1]

    2. Conecta el cableado del lazo al panel [F1]

    3. Verifica que la **polaridad es correcta**: los extremos marcados **A y B**
    deben conectarse en los terminales adecuados [F1]


    ### Paso 5 — Puesta en marcha tras la conexión


    1. Reconecta la **alimentación principal** [F1]

    2. ⚠️ **NUNCA conectes las baterías antes que la alimentación principal** [F1]

    3. Comprueba si la pantalla LCD indica alguna avería [F1]


    ---


    ## Longitud máxima del lazo


    - La longitud total del par de lazo **no puede exceder los 2000 metros**, y solo
    si se utiliza **cable de 1,5 mm² de sección o superior** [F3]


    ---


    ## Nota sobre cortocircuitos y aisladores


    Si se produce un cortocircuito entre dos aisladores, el sistema lo señalizará
    como **''Posible corte''** [F5]. Los aisladores desconectan la sección afectada
    y el panel mostrará **NO RESPONDE/PERDIDO** para los equipos entre los puntos
    de aislamiento, o **PÉRDIDA PARCIAL DEL LAZO** si faltan más de tres equipos [F5].


    ---


    Fuente: MIDT180 — Panel ID2000, Manual de instalación y puesta en marcha (sin
    revisión registrada)


    ---


    También puedo ayudarte con: **comprobación de circuitos de sirena**, **instalación
    de la placa de interfaz de lazo (LIB)** o **interpretación de mensajes de avería
    del lazo**.'
