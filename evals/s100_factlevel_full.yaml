- qid: cat013
  question: Tengo una central Detnov CAD-150 y me ha sobrado de otra instalacion un
    detector optico Notifier SDX-751; ¿es compatible / puedo montarlo en su lazo?
  answer: '## Compatibilidad SDX-751 (Notifier) con CAD-150 (Detnov)


    **Respuesta directa: No tengo documentación que confirme esta compatibilidad.**


    Los fragmentos recuperados no contienen ninguna lista de detectores compatibles
    con la **CAD-150** de Detnov. El manual de instalación de la CAD-150-8 [F1, F4,
    F7, F9, F10] no menciona en ningún momento el detector **SDX-751** ni ningún otro
    detector Notifier como equipo compatible con su lazo.


    Lo que sí aparece en los fragmentos es que el **SDX-751** está documentado como
    detector compatible con centrales **Notifier**:


    - Compatible con la central **AFP-200** de Notifier, montado sobre base **BX-501**
    [F2, F5]

    - Compatible con la central **ID-200** de Notifier, montado sobre base **B501**
    [F3, F6]


    Se trata de un detector analógico direccionable que usa el protocolo de comunicaciones
    de Notifier. La CAD-150 es una central analógica de Detnov con su propio protocolo
    de lazo — pero **no tengo en los fragmentos ningún dato sobre el protocolo de
    lazo de la CAD-150 ni sobre su lista de detectores compatibles**, por lo que no
    puedo confirmar ni descartar la compatibilidad técnica con datos concretos.


    ---


    **⚠️ Recomendación:**


    No instales el SDX-751 en el lazo de la CAD-150 sin confirmación del fabricante.
    La compatibilidad entre equipos de distintos fabricantes debe verificarse directamente
    con **Detnov** (para la lista oficial de detectores compatibles con la CAD-150)
    y/o con **Notifier** (para confirmar si el SDX-751 puede operar con centrales
    de terceros).


    ---


    Fuente: 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB IT
    (sin revisión registrada); MNDT120 AFP-200 (sin revisión registrada); MNDT150
    ID-200 (sin revisión registrada)'
