- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  answer: '## Desactivación individual de detector en la CCD-103


    La CCD-103 es una central **convencional** [F5], lo que significa que la unidad
    mínima de desconexión es la **zona completa**, no un detector individual.


    El manual no describe ningún procedimiento para desactivar un detector de forma
    individual sin afectar al resto del lazo. Los fragmentos disponibles solo cubren
    la **desconexión por zona completa**.


    ---


    ### Lo que sí permite el sistema: desconexión de zona


    El procedimiento para desconectar una zona completa es [F1][F3]:


    1. Asegúrate de que la **llave de bloqueo de teclado (G)** está en posición **abierta**
    (desbloqueada) [F3].

    2. Pulsa la **tecla de zona** correspondiente **dos veces** → la zona queda desconectada
    [F1].

    3. Para reconectar la zona: pulsa la **tecla de zona una vez** → zona conectada
    de nuevo [F1].


    **Indicaciones visuales al desconectar una zona** [F1]:

    - **Indicador de anular:** activo de forma continua.

    - **Indicador de anular en zona:** encendido fijo en la zona desconectada.


    > ⚠️ **Advertencia:** Cuando una zona está desconectada, la central **no refleja
    ninguna incidencia ni evento** en esa zona. El manual indica expresamente que
    es importante **limitar el uso de esta maniobra** [F1].


    ---


    ### Alternativa a nivel de cableado


    Si necesitas aislar físicamente un detector concreto sin desconectar toda la zona,
    el manual no describe ningún procedimiento específico para ello. Consulta directamente
    al soporte técnico de Detnov para verificar si existe algún accesorio o método
    aprobado para aislar detectores individuales en esta central.


    ---


    Fuente: CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    También puedo ayudarte con: **procedimiento de prueba de zona**, **resolución
    de avería en zona** o **conexionado de detectores en la CCD-103**.'
