- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '## Test anual del detector VESDA-E VEP según el manual del fabricante


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido**, las tareas que corresponden
    a realizarse **una vez al año** son las siguientes [F1][F2]:


    - **Realizar una prueba de humos** para comprobar la integridad de la red de tubería

    - **Comprobar el flujo** de la red de tubería

    - **Limpiar los puntos de muestreo**

    - **Limpiar con agua la red de tubería**


    ---


    ### Antes de comenzar cualquier prueba — Precauciones obligatorias [F1][F2]:


    1. **Informa a la autoridad supervisora adecuada** antes de iniciar el mantenimiento
    o las pruebas.

    2. **Aísla todos los dispositivos** que dependan del detector antes de ponerlo
    en funcionamiento.

    3. **Sigue los procedimientos del sitio** para evitar falsas alarmas en los servicios
    supervisados cuando realices la prueba de humos.


    > ⚠️ Cuando el detector está deshabilitado o en espera, **no emitirá advertencias
    de fuego** [F1][F2].


    ---


    ### Sobre la prueba de humos anual [F3][F4]:


    La prueba de humos consiste en:

    1. Introducir una muestra de humo en el **orificio de muestreo más alejado** de
    la red.

    2. Medir el **tiempo de transporte** hasta que el humo llega al detector.

    3. Registrar los resultados y **compararlos con pruebas anteriores** para detectar
    variaciones del sistema.


    > 📌 El manual indica que los detalles completos del procedimiento de prueba de
    humos se encuentran en la **VESDA-E Commissioning Guide** (Guía de puesta en marcha
    de VESDA-E) [F3][F4].


    ---


    ### Modo en espera durante el mantenimiento de tubería y puntos de muestreo [F9]:


    Cuando realices tareas sobre la red de tubería o los puntos de muestreo, se recomienda
    poner el detector en **modo en espera** para apagar el aspirador:


    - Desde **Xtralis VSC**: selecciona **"Go to Standby"** en el menú **"Device"**.

    - El LED desactivado parpadeará y el aspirador se detendrá.

    - Para volver a activar la unidad: selecciona **"End Standby"** en el menú **"Device"**.


    > ⚠️ En modo en espera se desactiva el aspirador y se detiene la detección de
    alarmas (aunque sí continúa la detección y señalización de fallos) [F9].


    ---


    ### Comandos de prueba disponibles desde Xtralis VSC [F10]:


    Para el test anual también puedes apoyarte en los siguientes comandos del software:


    - **"Start Alarm Test"**: simula nivel de humo de escala completa, generando condiciones
    de Alerta, Acción, Fuego 1 y Fuego 2. Activa los relés de alarma salvo que el
    detector esté desactivado.

    - **"Start Air Flow Fault Test"**: comprueba el sistema de detección de circulación
    del aire apagando el aspirador.

    - **"Start Relay Test"**: activa y desactiva los relés disponibles para probarlos.

    - **"Start Major Fault Test"**: genera un fallo importante y desactiva el relé
    de fallo durante **2 minutos**.

    - **"Start Minor Fault Test"**: genera un fallo menor y desactiva el relé de fallo
    durante **2 minutos**.


    ---


    ### Nota sobre frecuencias [F1][F2]:


    - La tarea de **sustitución del filtro** corresponde a frecuencia **cada dos años**,
    no anual.

    - La **comprobación de la fuente de alimentación y batería** es **trimestral**.

    - La **comprobación de la red de tubería** (inspección visual) es **semestral**.


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de sustitución del filtro bienal**,
    **configuración del modo en espera desde Xtralis VSC** o **interpretación de fallos
    de flujo en el VEP**.'
