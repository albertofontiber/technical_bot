- qid: hp009
  question: ¿Cuál es la resistencia de fin de línea recomendada para los lazos de
    la central Morley ZXe?
  answer: 'La pregunta hace referencia a los "lazos de la central Morley ZXe". Dado
    que el modelo exacto no queda del todo claro (la query menciona "ZXe" pero los
    fragmentos recuperados cubren principalmente la **ZXAE/ZXEE** y la **ZX2e/ZX5e**),
    voy a responderte con los datos disponibles, distinguiendo por tipo de lazo y
    modelo, ya que los valores difieren según el circuito.


    ---


    ## Resistencias de fin de línea (RFL) — Morley ZXAE/ZXEE y ZX2e/ZX5e


    ### 1. Salidas de sirenas convencionales (placa)


    - **Valor RFL:** **6.800 Ω (6K8)**, **0,5 W mínimo** [F1][F2]

    - Se instala entre **+** y **−** de la última sirena del circuito [F1]

    - Si no hay sirenas conectadas, la RFL se coloca directamente en los terminales
    de salida de la central [F1]

    - **No se deben realizar ramales** en la línea de sirenas, ya que la supervisión
    solo cubre la línea directa hasta la RFL [F2]

    - Este valor aplica tanto a la **ZXAE/ZXEE** [F1][F2] como a la **ZX2e/ZX5e**
    [F4]


    ### 2. Lazo periférico RS-485 (ZXAE/ZXEE)


    - **Valor RFL:** **150 Ω**, **0,5 W mínimo** [F3]

    - Se coloca **en cada extremo** del lazo cuando se instala en configuración de
    **lazo abierto** [F3]

    - El lazo periférico admite hasta **31 equipos** con direcciones de **1 a 126**
    [F3]


    ### 3. Lazos analógicos (ZXAE/ZXEE)


    - Los fragmentos disponibles **no especifican una resistencia de fin de línea**
    para los lazos analógicos. El manual describe que el lazo trabaja con transmisión
    digital a dos hilos y proporciona criterios de verificación de continuidad e impedancia
    (máximo **36 Ω** con un extremo puenteado) [F7], pero no menciona una RFL para
    este tipo de lazo.


    ---


    **¿Cuál es tu modelo exacto?** Si estás trabajando con una **ZXe** (sin sufijo
    A o E), confirma el modelo en la etiqueta del panel para asegurarnos de que los
    datos anteriores aplican a tu equipo.


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada);
    Manual de Instalación ZX2e/ZX5e — MIE-MI-530rv001 (sin revisión registrada)


    También puedo ayudarte con: **longitudes máximas de lazo analógico**, **conexionado
    de sirenas con campanas sin polaridad** o **instalación del lazo periférico RS-485**.'
