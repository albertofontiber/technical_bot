  question: Necesito un detector de llama SharpEye «40/40» (Spectrex / Notifier) para
    una instalación; ¿qué modelo pido?
  answer: "La familia SharpEye **40/40** de Spectrex/Notifier agrupa varios modelos\
    \ distintos según el principio de detección. No existe un único modelo genérico\
    \ \"40/40\" — el sufijo define el tipo de detector. Según los fragmentos disponibles,\
    \ los modelos de la serie son:\n\n- **S40/40R** — Detector de llama infrarrojo\
    \ simple (Single IR) [F1][F8]\n- **S40/40I** — Detector de llama de triple espectro\
    \ infrarrojo (IR3) [F4][F7]\n- **S40/40M** — Detector de llama de múltiple infrarrojo\
    \ (llamas de hidrógeno e hidrocarburo) [F5]\n- **S40/40L / LB / L4 / L4B** — Detector\
    \ de llama UV/IR [F6]\n- **S40/40U / UB** — Detector UV [F3]\n\nAdemás, el documento\
    \ de referencia [F2] menciona también los modelos **40/40UFI** (Ultra Fast IR3)\
    \ y **40/40UFL** (Ultra Fast UV/IR), aunque no tengo manuales completos de esos\
    \ en los fragmentos recuperados.\n\n---\n\nPara pedirte el modelo correcto, necesito\
    \ que me confirmes:\n\n1. **¿Qué tipo de llama necesitas detectar?**\n   - Hidrocarburos\
    \ en general → S40/40R (IR simple) o S40/40I (IR3)\n   - Hidrógeno + hidrocarburos\
    \ → S40/40M\n   - Aplicación con UV/IR → S40/40L\n   - UV solo → S40/40U\n\n2.\
    \ **Una vez elegido el tipo**, la referencia completa se construye con 5 dígitos\
    \ adicionales. Por ejemplo, para el **S40/40R** [F8]:\n   - Posición 1: Configuración\
    \ de cableado (ver Tabla 1 del manual)\n   - Posición 2: Temperatura — **1** (75\
    \ °C) o **2** (85 °C)\n   - Posición 3: Entradas de cable — **1** (M25) o **2**\
    \ (¾\" NPT)\n   - Posición 4: Carcasa — **S** (acero inoxidable) o **A** (aluminio)\n\
    \   - Posición 5: Aprobación Ex — **F** (FM/CSA) o **C** (ATEX/IECEx)\n\n   Ejemplo\
    \ de referencia completa: `S40/40R 1 1 1 S C`\n\n---\n\n¿Qué tipo de llama vas\
    \ a detectar y en qué entorno (zona ATEX, temperatura de trabajo, entrada de cable)?\n\
    \nFuentes: MNDT724_40-40R (MN-DT-724, 10 octubre 2011, TM 40/40R Rev. 4); MNDT721_40-40I\
    \ (MN-DT-721_D); MNDT723_40-40U (MN-DT-723_B); MNDT725_40-40M (MN-DT-725, 10 octubre\
    \ 2011, TM 40/40M Rev. 4); MNDT722_40-40L (MN-DT-722_B, TM 40/40L Rev. 5); manual-sharpeye-40-40-series-winhost-spectrex-en-us-4845694\
    \ (TM777050 Rev. Da, octubre 2017)"
