- qid: hp006
  question: La Notifier AFP-400 muestra el aviso 'Tierra' (Earth Fault). ¿Qué significa
    y cómo se localiza?
  answer: '## Fallo de Tierra (Earth Fault) en la AFP-400


    ### ¿Qué significa?


    El aviso de **Fallo de Tierra** indica que el sistema ha detectado una condición
    de fuga a tierra en algún punto del cableado o de los equipos conectados. La **MPS-400**
    dispone de un LED específico denominado **"Fallo de Tierra"** en su placa de alimentación
    para señalizar esta condición [F4].


    Cuando se produce cualquier avería (incluido el fallo de tierra), la central AFP-400
    reacciona así [F3]:


    1. El piezo interno suena.

    2. El **LED de Avería del Sistema** (amarillo) parpadea.

    3. Se activa el relé de avería.

    4. Se envía un mensaje a la pantalla LCD, al LCD-80 opcional, a la impresora opcional
    y al histórico.


    ### Procedimiento de reconocimiento


    1. Pulsa **\<Aceptar>** para silenciar el piezo y cambiar el LED de Avería del
    Sistema de intermitente a fijo [F3].

    2. La central enviará un mensaje de Reconocimiento al histórico y a la impresora
    opcional [F3].


    ### Localización del fallo de tierra


    Los fragmentos disponibles indican los siguientes elementos relacionados con la
    detección y gestión del fallo de tierra en la **MPS-400**:


    - **LED "Fallo de Tierra"** en la placa de la MPS-400: es el primer indicador
    visual a consultar [F4].

    - **Terminal TB1-1**: en el manual de instalación (AFP-300/AFP-400) este pin se
    identifica como "Falla de Tierra" [F5].

    - **JP2** (puente en la MPS-400): cortando este puente se inhabilita la detección
    de Falla de Tierra [F6]. Esto puede usarse temporalmente para confirmar que el
    circuito de detección funciona correctamente, pero **no debe dejarse inhabilitado
    en servicio normal**.

    - **JP6** (puente en la MPS-400): se corta cuando se utiliza un tablero **4XTM**
    opcional [F6].


    > ⚠️ **Precaución:** Antes de realizar cualquier intervención en la MPS-400, desconecta
    todas las entradas de alimentación (AC y baterías). El panel y sus equipos asociados
    pueden dañarse si se manipulan con tensión presente [F5].


    ### Qué revisar en campo


    Los fragmentos no incluyen un procedimiento paso a paso de localización del conductor
    en falta. Para identificar el circuito afectado, consulta el mensaje exacto que
    aparece en la **pantalla LCD** de la AFP-400 [F3], que indicará el tipo de equipo
    y la descripción de ubicación asignada durante la programación, lo que te permitirá
    acotar la zona del fallo.


    ---


    **Fuentes:** Manual de Usuario AFP-400 MFDT170 (sin revisión registrada); Manual
    de Instalación AFP-300/AFP-400 PN 50253:D 09/22/98 (sin revisión registrada);
    Manual de Instalación AFP-400 MIDT170 (sin revisión registrada)


    ---


    También puedo ayudarte con: **cableado de la MPS-400 (TB1/TB2)**, **interpretación
    de mensajes en pantalla LCD** o **procedimiento de rearme del sistema** tras eliminar
    la avería.'
