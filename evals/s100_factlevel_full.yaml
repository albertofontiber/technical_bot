- qid: cat013
  question: Tengo una central Detnov CAD-150 y me ha sobrado de otra instalacion un
    detector optico Notifier SDX-751; ¿es compatible / puedo montarlo en su lazo?
  answer: '**Respuesta directa: No puedo confirmar compatibilidad.**


    Los fragmentos disponibles no contienen ninguna lista de detectores compatibles
    con la **CAD-150-8** de Detnov. El manual de instalación de la CAD-150-8 [F1][F4][F7][F9][F10]
    no menciona en ningún momento el detector **SDX-751** ni ningún otro detector
    de Notifier como equipo compatible con su lazo.


    Lo que sí aparece en los fragmentos es que el **SDX-751** está documentado como
    compatible con:

    - La central **AFP-200** de Notifier, usando base **BX-501** [F2][F5]

    - La central **ID-200** de Notifier, usando base **B501** [F3][F6]


    Estas son centrales analógicas de **Notifier**, con su propio protocolo de lazo.
    La CAD-150-8 es una central analógica de **Detnov**.


    ---


    ⚠️ **Conclusión práctica:**


    No tengo documentación sobre interoperabilidad entre Detnov y Notifier. La compatibilidad
    entre equipos de distintos fabricantes debe verificarse directamente con cada
    fabricante antes de instalar. Consulta al soporte técnico de **Detnov** para confirmar
    si el SDX-751 es reconocido por el lazo de la CAD-150-8.


    ---


    Fuentes:

    - 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB IT (sin
    revisión registrada)

    - MNDT120 AFP-200 (sin revisión registrada)

    - MNDT150 ID-200 (sin revisión registrada)


    ---


    También puedo ayudarte con: **detectores compatibles con la CAD-150-8** (si tienes
    el listado de equipos Detnov), **conexionado del lazo de la CAD-150-8**, o **puesta
    en marcha de la central**.'
