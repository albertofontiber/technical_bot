- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov
    CAD-250: como se crea, como se definen las entradas/eventos que la disparan y
    como se asignan las salidas?'
  answer: "# Configuración de una maniobra completa en la CAD-250\n\n> ⚠️ La programación\
    \ de maniobras es una de las funciones más críticas de la configuración del sistema.\
    \ Requiere conocimiento específico del sistema instalado, del plan de protección\
    \ y del producto [F5].\n\n---\n\n## PASO 1 — Acceder al menú y crear la maniobra\n\
    \n1. Navega a **MENU > MANIOBRAS** [F1]\n2. Pulsa **+AÑADIR** en la barra de navegación\
    \ inferior [F1]\n3. Se abre la pantalla de edición de **Maniobra 000X** [F2]\n\
    4. En el campo **Coincidencias**, indica cuántos eventos deben cumplirse simultáneamente\
    \ para que la maniobra se active [F2]\n\n---\n\n## PASO 2 — Definir la lógica\
    \ de Coincidencias\n\nEl campo **Coincidencias** determina la puerta lógica que\
    \ se aplica a los eventos de entrada [F6]:\n\n- **Coincidencias = 1** con 2 eventos\
    \ → comportamiento **OR**: cualquiera de los eventos activa la salida [F6]\n-\
    \ **Coincidencias = 2** con 2 eventos → comportamiento **AND**: ambos eventos\
    \ deben cumplirse [F6]\n- **Coincidencias = 3** con 4 eventos → se necesitan 3\
    \ de los n eventos para activar la salida [F2]\n\n---\n\n## PASO 3 — Añadir Entradas\
    \ (Eventos)\n\n1. Pulsa **AÑADIR** en el margen inferior de la pantalla [F3]\n\
    2. En la pantalla emergente, selecciona **EVENTO** [F3]\n3. Elige el tipo de evento\
    \ [F3]:\n   - **ENTIDAD**: cualquier elemento de la jerarquía del sistema\n  \
    \ - **CONDICIÓN TEMPORAL**: un periodo de tiempo durante el cual la entrada es\
    \ verdadera\n\n### Si seleccionas ENTIDAD:\n\nLos eventos se pueden discriminar\
    \ según [F5]:\n\n- **Origen:** Local o red / Instalación, panel, lazo, área, zona,\
    \ dispositivo, grupo o modo virtual\n- **Condición:** Alarma, avería, técnico\n\
    - **Tipo:** Todos, pulsador, detector o entradas\n- **Estado lógico:** Normal\
    \ o Negado (si se selecciona Negado y la condición es alarma, la entrada es válida\
    \ cuando NO hay alarma)\n- **Repeticiones:** Valor entero hasta **9999** — el\
    \ evento debe repetirse ese número de veces en la entidad para que la entrada\
    \ sea válida [F3] [F5]\n\n> \U0001F4CC **Importante:** El sistema gestiona **eventos**\
    \ (cambios de estado), no estados estáticos. Solo el cambio de estado, si coincide\
    \ con la condición establecida, provoca la activación de las salidas [F3].\n\n\
    ### Origen Local o Red:\n\nAl seleccionar entidad, se puede escoger entre **Local**\
    \ (central actual) o **Red** (cualquier central del sistema en red) [F3].\n\n\
    ### Desde el software de configuración (PC):\n\nArrastra con el ratón la entidad\
    \ desde la ventana de eventos al cuadro de la maniobra [F8]. Para editar un evento,\
    \ haz doble clic sobre él o selecciónalo y pulsa **EDITAR** [F8].\n\n> Desde la\
    \ versión **1.1.1** es posible seleccionar un elemento de salida como condición\
    \ de entrada. En ese caso, será el cambio a condición de avería el que hará verdadera\
    \ la entrada. Para ello, desmarca la casilla **\"Sólo dispositivos de entrada\"\
    ** [F8].\n\n---\n\n## PASO 4 — Añadir Salidas (Acciones)\n\n1. Pulsa **AÑADIR**\
    \ en el margen inferior [F4]\n2. En la pantalla emergente, selecciona **ACCION**\
    \ [F4]\n3. Se muestran dos campos [F4]:\n   - **Retraso:** tiempo configurable\
    \ entre **0 y 600 segundos** antes de iniciar la acción [F4] [F5]\n   - **Entidad\
    \ destino:** panel, lazo, área, zona, dispositivo, grupo o modo virtual (siempre\
    \ relativa al sistema local) [F4]\n\n> ⚠️ El programa **no permite mezclar acciones\
    \ sobre entidades de paneles diferentes** [F9].\n\n### Tipos de Acción disponibles\
    \ [F7]:\n\n- **Activar** las salidas\n- **Desactivar** las salidas\n- **Habilitar**\
    \ la entidad\n- **Deshabilitar** la entidad\n- **Test** — pone en modo test la\
    \ entidad\n- **Reiniciar** la entidad\n- **Pulso** — activa las salidas con anchura\
    \ de pulso configurable entre **0 y 600 segundos** (10 s por defecto) [F7]\n-\
    \ **Configuración** — permite la cancelación de retardos\n\n### Tipo de elemento\
    \ sobre el que actúa la acción [F7]:\n\n- **Todos** — todas las salidas de la\
    \ entidad\n- **Sirenas** — únicamente las sirenas\n- **Relés** — únicamente los\
    \ relés\n- **Sirena discontinua** — sirenas en modo discontinuo\n- **Sirena PCB1**\
    \ — sirena 1 de la central\n- **Sirena PCB2** — sirena 2 de la central\n\n> Las\
    \ opciones disponibles dependen de la entidad seleccionada [F7].\n\n---\n\n##\
    \ PASO 5 — Guardar la maniobra\n\n- Pulsa **GUARDAR** para actualizar la base\
    \ de datos [F7]\n- Pulsa **CANCELAR** para deshacer los cambios [F7]\n- La central\
    \ devuelve al listado de maniobras donde se puede ver el resumen de eventos y\
    \ acciones configurados [F9]\n\n---\n\n## Límites del sistema\n\n- Número máximo\
    \ de entradas y salidas entre todas las maniobras: **100.000** [F3] [F9]\n\n---\n\
    \n## Ejemplo de maniobra de media complejidad (referencia)\n\nEl manual incluye\
    \ un ejemplo con [F10]:\n- Zona 1 con alarma y **repeticiones = 2** (mínimo 2\
    \ detectores activos)\n- Zona 2 con alarma y **repeticiones = 1**\n- Condición\
    \ temporal (no operar en fin de semana)\n- Puerta cerrada como condición adicional\n\
    - Pulsador para detener la maniobra\n- Salidas: paro de ventilación, señal de\
    \ alerta, evacuación con retardo\n\nEste ejemplo ilustra el uso combinado de **Módulos\
    \ Virtuales** y múltiples niveles de coincidencias [F10].\n\n---\n\n**Fuentes:**\n\
    - CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n- CAD-250\
    \ Manual Software de Configuración MS-416-es-2026-b (rev. b)\n\nTambién puedo\
    \ ayudarte con: **configuración de Grupos**, **uso de Módulos Virtuales** o **verificación\
    \ y prueba de maniobras** en la CAD-250."
