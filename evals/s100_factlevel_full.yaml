- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: "# Acceso al menú de programación avanzada — CAD-250\n\n## Paso a paso\n\
    \n1. **Desde la pantalla de reposo**, toca el icono del candado (\U0001F512) en\
    \ el centro de la pantalla [F1][F5].\n\n2. Se abrirá la **pantalla de acceso**\
    \ solicitando el código (contraseña) [F1][F5].\n\n3. Introduce la **clave de administrador\
    \ por defecto: `2222`** [F1][F4].\n   > ⚠️ Con clave de usuario (`1111`) no tendrás\
    \ acceso a los parámetros de configuración avanzada [F5].\n\n4. Una vez dentro\
    \ de la **pantalla de administrador**, navega por el menú principal hasta **AJUSTES**\
    \ [F3].\n\n5. En el submenú derecho, selecciona **AVANZADO** [F3].\n\n   La ruta\
    \ completa es:\n   **AJUSTES** (Menú principal) **> AVANZADO** (Submenú) [F3]\n\
    \n## Qué encontrarás en AVANZADO\n\nEl menú **AVANZADO** dispone de **3 pestañas**\
    \ [F3]:\n\n- **SISTEMA:** Configuración del número de cabinas (paneles: 1 a 4),\
    \ número de lazos (2, 4, 6, 8... hasta 32 según cabinas) y si hay cabina con LEDs\
    \ de zona (0 ó 1) [F3].\n- **OTROS:** Interruptores para facilitar puesta en marcha\
    \ y mantenimiento (tiempo de inactividad, salto a scroll si incidentes, saltar\
    \ a último incidente prioritario si timeout, recordar estado de módulos virtuales,\
    \ salir del modo test automáticamente) [F6].\n- **REINICIAR:** Devuelve los valores\
    \ de configuración de panel a valores por defecto. No afecta a configuración de\
    \ entidades, lazos, maniobras, grupos, módulos virtuales, modos especiales, filtros\
    \ de red ni registros de eventos [F6].\n\n> ⚠️ Para validar cambios en la pestaña\
    \ SISTEMA debes pulsar **\"Guardar y Reiniciar\"** [F3].\n\n> ⚠️ Por razones de\
    \ seguridad y cumplimiento normativo, los interruptores de inactividad, timeout\
    \ y scroll deben estar activados (en verde) por defecto [F6].\n\n---\n\n**Fuentes:**\n\
    - CAD-250 Manual de Configuración (MC-380-es-2026-c, rev. c, 2026-04-23)\n- CAD-250\
    \ Manual de Software de Configuración (MS-416-es-2026-b, rev. b)\n- Manual de\
    \ Instalación CAD-250 (MI_372_es_2024 e)\n- Manual de Usuario CAD-250 (MU_376_es_2024\
    \ f)\n\n---\n\nTambién puedo ayudarte con: **configuración del número de lazos\
    \ en SISTEMA**, **gestión de usuarios y contraseñas** o **creación de maniobras**\
    \ en la CAD-250."
