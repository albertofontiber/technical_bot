instrument: s122_enforced_answer_contract_adversarial_review_v1
review_mode: independent_read_only_bounded_adversarial
final_verdict: GO_LOCAL_CONTRACT_ONLY
severity:
  p0_open: 0
  p1_open: 0
  p2_open: 1

review_threshold: >-
  Convergence on material P0 and P1 defects, not an absolute lexical GO.
  Conservative false negatives that reconstruct or fail closed remain P2.

material_findings_closed:
  - id: P1_RELATION_IDENTITY
    finding: token coexistence could satisfy an output, rule or closed-loop relation
    closure: exact typed identities and bounded positive predicates are required
  - id: P1_CONFLICT_POLARITY
    finding: negated or hypothetical conflict disclosures could be treated as safe
    closure: only a canonical root disclosure is accepted and global contradictions are aggregated
  - id: P1_POSITIVE_DENYLIST
    finding: lexical deny lists missed disabled, revoked and false states
    closure: output and rule coverage now require closed positive typed records
  - id: P1_EXISTENTIAL_COVERAGE
    finding: one positive record could hide a later correction or competitor
    closure: all relation-bearing records are classified and any ambiguous, corrective or competing record fails closed
  - id: P1_ELLIPTIC_CONTRADICTION
    finding: short coreferential contradictions required an explicit discourse marker
    closure: short relation-bearing clauses are aggregated before or after the positive record, across bullets and paragraphs, in Spanish and English

