causal_conclusions:
  - >-
    Retrieval is not the dominant cause: all required source material was served,
    and eleven misses occur inside fragments the canonical answer already cited.
  - >-
    Global evidence selection is not the next lever: S149, S150 and S153 closed
    under-coverage, and S242's generic clause planner produced zero stable gains,
    three protected regressions and an unsafe conflict.
  - >-
    Direct model substitution is not the next lever: S156 closed with only 4/13
    relations for Fable and 2/13 for Sol before the residual became twelve.
  - >-
    The largest actionable cause is loss of must-preserve atoms inside evidence
    already judged relevant, especially conditions, bounds, structured siblings,
    prerequisites, warnings and verification clauses.
next_mechanism_requirements:
  priority: WITHIN_FRAGMENT_MUST_PRESERVE_ATOMS
  must_be_generic:
    - detect condition and dependency clauses without product-specific relation types
    - keep numeric value, unit, lower and upper bound, and step together
    - retain parent-child structure for headers, tables, lists and rule schemas
    - mark prerequisite, warning and verification language as non-prunable
    - validate count claims against enumerated members
    - disclose rather than resolve conflicting source values
  forbidden_reopens:
    - s141_target_specific_relation_templates
    - s149_single_pass_global_selector
    - s150_repeated_coverage_verifier
    - s153_typed_relation_branch
    - s156_direct_model_substitution
    - s216_decomposition_with_merge
    - s222_s223_post_answer_addendum_family
  evaluation_order:
    - independent positive and negative structural-unit cohort
    - direct twelve-fact probe only after independent generalization
    - full protected-fact regression before any default-on decision
official_fact_credit: 0
production_default_changed: false
chunks_v2_status: ACTIVE_READ_ONLY
chunks_v3_status: FINAL_NO_GO_CHUNKS_V3_WHOLESALE
railway_merge_gate: false

