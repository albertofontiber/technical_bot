- bot_answer: '## Lazos y dispositivos por lazo — AM2020 / AFP1010


    ### Número máximo de lazos


    Los dos modelos difieren:


    - **AM2020**: soporta un máximo de **10 lazos** direccionables [F3][F5]. El diagrama
    de la Figura 12 muestra los lazos del 1 al 10 [F3].

    - **AFP1010**: soporta un máximo de **4 lazos** cuando se usa exclusivamente con
    módulos **LIB-400** en gabinete CAB-A3 [F3][F5].


    ### Tarjetas de lazo compatibles


    Cada lazo requiere una tarjeta **LIB** (Loop Interface Board). Los modelos disponibles
    son [F3][F4]:

    - **LIB-400**

    - **LIB-200**

    - **LIB-200A**


    ### Límite de dispositivos


    - **AFP1010**: está limitado a un máximo de **dos LIB-200**, lo que supone un
    total de **396 dispositivos en el sistema** [F1].

    - Para el **AM2020** con 10 lazos, los fragmentos disponibles no especifican el
    número máximo de dispositivos por lazo ni el total del sistema.


    ### Notas de instalación importantes [F5]


    1. No instalar números de lazo duplicados.

    2. El **LIB-200** o **LIB-200A**, cuando se instala en el ICA, siempre ocupa el
    número de dirección menor para una posición dada.

    3. El **LIB-400** siempre ocupa ambas direcciones.

    4. No instalar tarjetas LIB en las posiciones posteriores derecha o izquierda
    de la segunda fila.

    5. No instalar tarjetas LIB en la tercera fila.


    ---


    **Fuentes:** Manual AM2020/AFP1010 PN 15088SP (sin revisión registrada); MFDT280
    (sin revisión registrada); MPDT280 rev. Rev A; BTDT032 (sin revisión registrada)


