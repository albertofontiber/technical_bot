- bot_answer: '# Cálculo de capacidad de batería — AM-8200


    El manual define una fórmula y un procedimiento estructurado en dos partes: **corriente
    en espera (A)** y **corriente en alarma (B)** [F3][F4].


    ---


    ## Fórmula general


    **Ah Batería = (A + B) × 1,2** [F3][F4]


    Donde:

    - **A** = Corriente total en espera × duración en espera (24 h o 72 h según normativa
    aplicable)

    - **B** = Corriente total en alarma × **0,5 h** [F3][F4]

    - **× 1,2** = Factor de corrección por tolerancias de fabricación de las baterías
    [F2]


    ---


    ## Pasos para calcular


    **Paso 1 — Corriente en condiciones de NO ALARMA (espera)**


    Suma los consumos de todos los elementos instalados usando la **Tabla 1** (para
    AM-8200) o **Tabla 2** (para AM-8200BB) [F4][F3]:


    - AM-8200 CPU (AM8200-KLCD): **179 mA** en reposo [F4]

    - LIB-8200 (por unidad): **50 mA** en reposo [F4]

    - AM82-2S2C (por unidad): **28 mA** en reposo [F4]

    - AM82-BST-C (por unidad): **39 mA** en reposo [F4]

    - Corriente de lazos: consultar **Tabla 3** del manual [F4]

    - Corriente salida usuario (máx. **2 A**) [F4]

    - LCD-8200, campanas, sirenas, flashes, otros dispositivos: añadir según instalación
    [F4]


    → **Total espera (A) = Σ corrientes × 24 h** (o × 72 h si se requiere autonomía
    de 72 h) [F4]


    > ⚠️ Comprobar que la corriente total de todos los lazos sea **inferior a 750
    mA** [F2], y que la corriente de la salida de 24 Vcc sea **inferior a 2 A** [F2].


    ---


    **Paso 2 — Corriente en condiciones de ALARMA**


    Con los mismos elementos, usar los valores de alarma de la Tabla 1 / Tabla 2 [F4][F3]:


    - AM-8200 CPU: **345 mA** en alarma [F4]

    - LIB-8200 (por unidad): **92 mA** en alarma [F4]

    - AM82-2S2C (por unidad): **28 mA** en alarma [F4]

    - AM82-BST-C (por unidad): **39 mA** en alarma [F4]

    - Lazos: la central enciende **solo los primeros 6 LED** de detectores y módulos
    de entrada en alarma [F2]

    - Añadir dispositivos de aviso (sirenas, campanas, flashes) según instalación
    [F4]


    → **Total alarma (B) = Σ corrientes × 0,5 h** [F4]


    > ⚠️ Si el valor de absorción calculado supera **3,5 A**, la corriente en exceso
    durante alarma se extrae de las baterías [F2].


    ---


    **Paso 3 — Aplicar la fórmula**


    **Ah Batería = (A + B) × 1,2** [F3][F4]


    El resultado debe estar dentro del rango admitido por la central: **mín. 7 Ah
    — máx. 18 Ah** (2 × 12 V) [F5].


    ---


    ## Baterías recomendadas (17-18 Ah)


    - Yuasa **NP18-12B** o **NP7-12BFR** (UL94) — 12 V / 17,2 Ah — 181 × 77 × 167
    mm [F5]

    - Fiamm **FG21803** o **FGV21803** (UL94) — 12 V / 18 Ah — 181 × 77 × 167 mm [F5]


    ---


    Fuente: AM-8200 Manual de Instalación (Doc. AM-8200-ESP Rev. A.3)


    ---


    También puedo ayudarte con: **consumos detallados de dispositivos de lazo (Tabla
    3)**, **límites de la salida de sirenas** o **conexionado de baterías en la AM-8200**.'
