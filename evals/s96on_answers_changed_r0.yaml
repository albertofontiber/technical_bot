    \ **SW1-6 en posición ON** → la pantalla de 7 segmentos mostrará **\"S1\"** [F5].\n\
    \  2. Colocar un puente en la posición **PROG** (parte inferior izquierda de la\
    \ placa base) [F5].\n  3. Pulsar la tecla **Rearme** → se iluminará en **rojo\
    \ fijo el led número 6** [F5].\n\n---\n\n### ⚠️ Punto crítico\n\nSi el sistema\
