    \ inhibido** durante un intervalo de tiempo programable, para evitar iniciar nuevamente\
    \ el proceso de extinción. Esto es un comportamiento **por diseño y normativo**,\
    \ no un fallo.\n\n---\n\n### Qué comprobar y cómo actuar\n\n**Paso 1 – Verifica\
    \ el valor configurado en el parámetro \"ri\":**\n\nLos valores posibles son [F2]:\n\
    \n- **00** → Resumen inhibido desde que finaliza la extinción o cuando se agota\
    \ el tiempo configurado *(valor por defecto)*\n- **01 a 30** → Resumen inhibido\
    \ durante ese número de minutos tras la extinción, o hasta intervención/reposición\
    \ manual\n\nSi está configurado en **01 a 30**, el sistema permanecerá inhibido\
    \ durante ese tiempo o hasta que se realice una intervención manual. El reset\
    \ no lo saca de ese estado hasta que se cumpla la condición programada.\n\n**Paso\
    \ 2 – Comprueba si el reset está habilitado:**\n\nSegún los fragmentos [F3] y\
    \ [F5], para que la función de rearme esté operativa:\n\n- Habilita el **nivel\
    \ de acceso 2** y pulsa la tecla **Rearme** [F5].\n- Si el rearme está inhibido\
