remote_contract:
  connection_source: DATABASE_URL_from_user_env
  required_session_proof: transaction_read_only_on
  statement_timeout_ms: 120000
  lock_timeout_ms: 2000
  cursor_batch_rows: 500
  allowed_sql_prefixes: [SELECT, SET TRANSACTION READ ONLY, SET LOCAL]
  always_rollback: true
  chunks_columns:
    - id
    - document_id
    - extraction_sha256
    - chunk_index
    - content
    - context
    - language
    - section_title
    - section_path
    - content_type
    - is_flow_diagram
    - confidence
    - product_model
    - manufacturer
    - distributor
    - protocol
    - doc_type
    - category
    - has_diagram
    - source_file
    - page_number
    - duplicate_of
    - parent_id
    - ingest_batch
    - embedding_present
    - embedding_dimensions
  forbidden_columns: [embedding, search_vector]

matching:
  ordinal_is_diagnostic_only: true
  surrogate_rows_are_donors: false
  confidence_canonicalization: IEEE_754_float32_big_endian_hex
  metadata_fields:
    - language
    - source_file
    - product_model
    - manufacturer
    - distributor
    - protocol
    - doc_type
    - category
    - content_type
  exact_document_binding: source_pdf_sha256_equals_extraction_sha256_and_is_unique
  ambiguity_policy: fail_closed_no_tiebreak

reuse_claim:
  context_origin: legacy_v2_reuse
  embedding_origin: legacy_v2_reuse
  historical_model_receipt: absent
  vector_sha256_in_M2: absent
  candidate_not_admitted_reuse: true

gate:
  required:
    - frozen inputs match
    - transaction read-only proven
    - local and remote manifests sealed
    - every local row has exactly one terminal classification
    - funnel counts are monotonic
    - zero model calls
    - zero database writes
    - zero vector payloads
    - deterministic replay from sealed snapshot
    - adversarial review
  decision_if_go: authorize M2_5_design_only
  never_authorizes:
    - database schema changes
    - database writes
    - model calls
    - embedding calls
    - chunks_v3 load
    - HNSW
    - serving
    - deploy
    - fact relabeling
