  gold_answer: 'El manual técnico del ADW 535 (T 140 358 e es) menciona la existencia de una batería de
    litio en el Main Board LMB 35 (visible en la Fig. 31 y Fig. 35, identificada como ''BAT''), así como
    la indicación de retirar la cinta aislante de la batería de litio antes del primer encendido (cap.
