  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la Morley ZXe?
  conducta_esperada: answer
  gold_answer: |-
    En la Morley ZXe (e-series, paneles ZX2e/ZX5e) las salidas de sirena son circuitos convencionales supervisados en la placa base:

    - Numero de salidas: la ZX2e tiene 2 circuitos de sirena (Sirenas A y B); la ZX5e tiene 4 (Sirenas A, B, C y D).
    - Caracteristicas: supervisados ante cortocircuito y circuito abierto, limitados en corriente, maximo 1 A por circuito.

    Conexion de una sirena convencional:
    1) Conecte la sirena en el terminal del circuito de sirena correspondiente de la placa base (Figura 13 ZX2e / Figura 14 ZX5e), respetando la polaridad +/- de la salida.
    2) Cada sirena debe llevar un diodo integrado: en reposo la linea esta polarizada en inverso (para la supervision) y, al dispararse la salida, se invierte la polaridad y la sirena suena. Si la sirena no es polarizada, anada un diodo de polarizacion y proteccion en cada una.
    3) Instale una resistencia de fin de linea (RFL) de 6,8 kOhm (6K8), 0,5 W minimo, en el final del circuito (en la ultima sirena) para la supervision.
    4) Use el calibre de cable indicado en la seccion 3.4.13 del manual.

    Las RFL de 6k8 se suministran con el panel (2 con la ZX2e, 4 con la ZX5e).

    Nota: los paneles convencionales ZXAE/ZXEE (manual MIE-MI-310) usan el mismo valor de RFL (6K8) y la misma corriente (1 A), variando solo el numero de salidas (ZXAE 2 / ZXEE 4).
