  question: ¿Qué resistencia de fin de línea (EOL) hay que instalar en las líneas de zona de la central
    convencional NFS Supra?
  conducta_esperada: answer
  split: dev
  estrato:
  - conflicto-revision
  gold_answer: |-
    En la central convencional NFS Supra (Honeywell Life Safety / Notifier; incluye las variantes VSN-Plus2 y ESS-2Plus), las líneas de zona se terminan con la resistencia de fin de línea (EOL) suministrada de 6K8 Ω (6,8 kΩ), o bien con el condensador de 47 µF que viene por defecto. La resistencia EOL mantiene la zona estable a 24 V en estado de reposo/normal y debe instalarse en cada zona, incluidas las no utilizadas (sección 4.4.1 «Zone Wirings» del manual de instalación y funcionamiento).

    Nota: 6K8 Ω es el valor de la edición vigente del manual (HLSI-MN-025-I v.05, abril 2015). Ediciones anteriores (v.04) indicaban 4K7 Ω; debe usarse el valor de la última revisión (6K8 Ω).
  atomic_facts:
  - texto: La resistencia de fin de línea (EOL) de las líneas de zona de la NFS Supra es 6K8 Ω (alternativamente,
      el condensador de 47 µF suministrado por defecto) — valor de la edición vigente v.05
    tipo: core
