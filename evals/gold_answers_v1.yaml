- qid: cat017
  question: ¿Como se cablea y se da de alta (configura) un lazo en la central Notifier INSPIRE (E10/E15)?
  conducta_esperada: answer
  split: dev
  estrato:
  - multi-doc
  gold_answer: |-
    Poner en marcha un lazo en la INSPIRE (E10/E15) tiene una parte de CABLEADO (manual de instalacion HOP-138-9) y una parte de ALTA/CONFIGURACION (manual de puesta en marcha HOP-138-8):

    CABLEADO (modulo de doble lazo OPAL HOP-433-100, conector morado):
    - Conecta el lazo a los terminales del modulo: Lazo 1 OUT +VE/-VE (1/2), Lazo 1 IN +VE/-VE (4/5), Lazo 2 OUT +VE/-VE (6/7), Lazo 2 IN +VE/-VE (9/10). (Los terminales 3 y 8 no se usan.)
    - El cable debe ser trenzado y apantallado; la pantalla se conecta a tierra en la central.
    - Capacidad por lazo: con dispositivos OPAL, hasta 159 detectores + 159 modulos (318 por lazo); con CLIP, hasta 99 detectores + 99 modulos (198 por lazo). NO se permite mezclar OPAL y CLIP en el mismo lazo. Maximo 750 mA por lazo; longitud de hasta 3,5 km (calculada con el programa de lazo y bateria de CLSS).
    - Los dispositivos CLIP requieren una licencia (una por cada circuito de lazo CLIP).

    ALTA / CONFIGURACION (tras 'Configuracion inicial y primer encendido'):
    - Ejecuta la AUTO CONFIGURACION: la central detecta automaticamente los dispositivos conectados al lazo y los da de alta.
    - La configuracion de la central se gestiona con el Programa de Configuracion de CLSS (portal en la nube Honeywell): se crea el sitio/edificio, se carga la configuracion y se genera el archivo .bin de licencia de la central.
    - Para comprobar el cableado del lazo puedes usar la herramienta de diagnostico POL-200-TS.
