- qid: cat018
  question: ¿Como se programa una ecuacion causa-efecto (CBE) en la Notifier AM-8200 para que un evento
    active una salida?
  conducta_esperada: answer
  split: dev
  estrato:
  - sintesis-completitud
  gold_answer: |-
    En la AM-8200 la logica causa-efecto se implementa con las ecuaciones CBE (Control By Events). La respuesta completa fusiona el concepto, el flujo de programacion y la sintaxis:

    1. QUE ES: una CBE (Control By Events) es una ecuacion que ACTIVA UN COMANDO en funcion de un EVENTO (p. ej. una alarma de una zona activa un modulo de salida). Es el mecanismo causa-efecto de la central.
    2. DONDE SE PROGRAMA: desde el menu Programacion AM8200 > Puntos, seleccionando Sensores o Modulos. Cada punto se programa en su pestana 'Programacion', donde se le asigna la ZONA y se configura su ecuacion CBE (si ya hay una, se visualiza).
    3. LA SALIDA: los modulos de salida llevan un Tipo SW (por ejemplo SND para sirena); un modulo de salida se dispara cuando su ecuacion CBE se cumple (se activa 'por asociacion CBE').
    4. LA SINTAXIS de las ecuaciones (operandos y operadores) esta detallada en el Apendice A 'Control By Event' al final del manual de programacion.

    Conviene, antes de programar en la central, registrar en las hojas de programacion la informacion de TODOS los sensores, modulos, zonas software, ecuaciones CBE y grupos.
