- qid: ho004
  question: ¿Cómo se alinea el detector de barrera FD2705R (reflector)?
  conducta_esperada: answer
  split: held-out
  estrato:
  - es-en
  gold_answer: |-
    La alineación se hace con el conmutador de modo (Mode Switch) trasero, accesible deslizando un dedo entre el cuerpo y la pared (NO desmontar el detector de la pared), en dos fases:

    1) PRISM TARGETING MODE (conmutador en posición SUPERIOR): ajustar las ruletas horizontal y vertical hasta que el LED ámbar quede encendido CONTINUO (parpadea más rápido cuanto más cerca del prisma). Verificación imprescindible: cubrir el prisma con material no reflectante y confirmar que el ámbar se APAGA (si no, está reflejando otra superficie).

    2) ALIGNMENT MODE (posición MEDIA): el detector auto-ajusta la potencia IR y la sensibilidad del receptor (al entrar, ámbar 5 s; esperar hasta 30 s a que los LEDs paren). Rojo parpadeante = demasiada señal: parar y esperar hasta que se apague (hasta 20 s; a menor distancia, más espera); ámbar parpadeante = señal débil: invertir el sentido de la ruleta; ámbar continuo = sin señal: volver a Prism Targeting. Ajustar despacio una ruleta y luego la otra hasta que ningún LED parpadee. Óptimo: desviar el haz en los cuatro planos debe hacer parpadear PRIMERO el ámbar. Bloquear ambas ruletas con las tuercas de fijación.

    3) Pasar a OPERATING MODE (posición INFERIOR): el detector hace una calibración interna de hasta 60 s (ámbar 1 parpadeo/s) — NO bloquear el haz durante la calibración; si falla, indica avería y hay que repetir la alineación. El procedimiento detallado solo está en el user guide en inglés; el datasheet ES no lo describe.
  atomic_facts:
