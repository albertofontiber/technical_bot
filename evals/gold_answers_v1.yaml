  gold_answer: Según la descripción técnica del ASD 535, el rango de temperatura de
    funcionamiento es de –30 °C a +60 °C, tanto para la caja del detector como para
    el conducto de aspiración (para uso conforme a UL el máximo es +40 °C, y según
    el estándar australiano AS 1603.8 el máximo es +55 °C). Adicionalmente, la fluctuación
    de temperatura máxima permitida durante el funcionamiento en la caja del detector
    y el conducto de aspiración es de 20 °C. La temperatura de almacenamiento permitida
    es de –30 °C a +70 °C (sin condensación). Para uso en almacenes de ultracongelación,
    el rango queda restringido a –30 °C hasta 0 °C, debiendo respetarse la directriz
    T 131 390.
