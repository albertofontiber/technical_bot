  gold_answer: 'Para añadir un nuevo detector (equipo) al lazo tras la puesta en marcha
    inicial en una central Morley DXc, se debe realizar una autobúsqueda de equipos
    del lazo. Procedimiento: 1) Acceder al Nivel 3 (introducir clave de acceso de
    Nivel 3 desde el menú de Nivel 2, opción ''5: Menú'', luego ''7'' para programación).
    2) Desbloquear la memoria pulsando la tecla de confirmación. 3) En el menú de
    Programación, pulsar la tecla ''2'' para seleccionar la opción ''Lazo''. 4) Si
    la central tiene más de un lazo, seleccionar el lazo correspondiente. 5) Seleccionar
    la opción ''2: Autobúsqueda''. 6) Introducir el número del lazo y confirmar. 7)
    Confirmar que se desea realizar la autobúsqueda de todos los equipos del lazo
    pulsando la tecla de confirmación. 8) Al finalizar, la central mostrará un resumen
    con los equipos encontrados, indicando los nuevos, eliminados y modificados, así
    como el total por tipo. Comprobar que los números corresponden con los equipos
    instalados. Tras la autobúsqueda, se pueden editar las propiedades del nuevo equipo
    (texto descriptivo, zona asignada, grupo de anulación, acción, etc.) mediante
    la opción ''1: Editar Equipos'' del menú de Lazo. Nota importante: si se ha realizado
    un cambio de protocolo, hay que ESPERAR dos minutos antes de realizar la autobúsqueda,
    ya que la central necesita tiempo para rearmar los equipos del lazo. Adicionalmente,
    si la central indica el evento ''EQUIPO NUEVO'' (detectado en el lazo pero no
    aceptado), la solución es ejecutar la autobúsqueda para aceptarlo.'
