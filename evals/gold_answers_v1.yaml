- qid: hp006
  question: La Notifier AFP-400 muestra el aviso 'Tierra' (Earth Fault). ¿Qué significa y cómo se localiza?
  conducta_esperada: answer
  gold_answer: |-
    En la AFP-400 el aviso 'Tierra' (Earth Fault) corresponde a un fallo de aislamiento a tierra: algun conductor de un circuito (lazo, zona, salidas o alimentacion) hace contacto con masa/tierra, y la central lo senaliza como averia del sistema.

    Lo que documentan los manuales disponibles:
    - La fuente MPS-400 dispone de deteccion de fallo de tierra: LED dedicado 'Fallo de Tierra', terminal de toma de tierra TB1-3 y puente JP2 para inhabilitar la deteccion. Es imprescindible conectar TB1-3 a una toma de tierra solida (p.ej. tuberia metalica de agua fria) para la inmunidad del panel (MIDT170 / 50253SP).
    - En el lazo de comunicaciones (SLC), 'Tierra' es una de las condiciones de averia que la central reconoce y muestra (tabla de Funcionamiento del Lazo, Estilos 4/6/7) (MIDT170).
    - En red, la deteccion de fallo de tierra por canal A/B se habilita/inhabilita con los conmutadores SW2/SW3 del modulo NAM-232W (MADT380_01).
    - Para acotar un fallo en el lazo se emplean los modulos aisladores ISO-X, que aislan la rama en averia del resto del lazo (MIDT170).

    Para localizar el punto exacto del fallo: los manuales disponibles NO incluyen un procedimiento paso a paso (el manual de funcionamiento MFDT170 no detalla este aviso). El metodo general consiste en aislar/desconectar circuitos progresivamente -en el lazo, mediante los aisladores ISO-X- hasta que desaparece el aviso; para el procedimiento detallado, consultar al servicio tecnico de Notifier.
  atomic_facts:
