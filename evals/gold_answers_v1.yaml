- qid: hp003
  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  conducta_esperada: answer
  split: dev
  estrato:
  - multi-doc
  gold_answer: |-
    Las centrales analógicas CAD-150 requieren dos baterías de 12V conectadas en serie para obtener los 24V necesarios para el funcionamiento del sistema. Según el modelo, las baterías pueden ser de 7A/h (también existen modelos con capacidad para 18A/h o 24A/h en las centrales de 4 y 8 lazos).

    Procedimiento de conexión:

    1. IMPORTANTE - Orden de conexión por seguridad: primero se debe conectar la alimentación de red (230VAC) y posteriormente las baterías. No respetar este orden puede dañar el equipo.

    2. No realizar la instalación con la alimentación conectada. Desconectar siempre el magnetotérmico bipolar exterior antes de manipular la central.

    3. Conexión en serie de las baterías: El cable puente suministrado con la central debe conectarse uniendo el polo positivo (+) de una batería con el polo negativo (-) de la otra batería.

    4. Ubicación: Las baterías se colocan en la parte inferior de la caja, en el espacio reservado para ello (de forma vertical en el caso de baterías de 7A/h).

    5. Conexión a la placa: Conectar los cables que salen del circuito al positivo y negativo libres de las baterías - cable rojo al polo positivo (+) y cable negro al polo negativo (-). Recordar conectar previamente entre sí las baterías con el cable puente batería.

    6. Verificación: Antes de alimentar, comprobar con voltímetro que las baterías tienen una tensión superior a 24V.

    7. En caso de necesidad, se puede encender el equipo solo con las baterías conectadas pulsando el botón BAT de la placa principal.

    La central dispone de fusible de baterías (2A) para protección.
