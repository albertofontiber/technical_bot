  gold_answer: "En la central RP1r-Supra, tras una descarga de extinción y al intentar\
    \ rearmar, hay que comprobar los siguientes puntos:\n\n1. **Entrada de Abort (paro\
    \ de emergencia) activada**: La entrada ABORT es por defecto enclavada (latched).\
    \ Una vez activada, requiere un rearme manual de la central para habilitar de\
    \ nuevo el proceso de extinción. Si esta entrada permanece activa, el sistema\
    \ no podrá restaurarse. Verificar el estado del pulsador de paro conectado al\
    \ bloque D y su circuito de supervisión.\n\n2. **Inhibición temporal del rearme\
    \ tras activación**: Según UNE-EN 12094-1:2004, sección 4.12.2, existe la posibilidad\
    \ de inhibir temporalmente la función de rearme una vez la central ha entrado\
    \ en estado ACTIVADO. Esto se configura mediante el parámetro P.18:\n   - '--':\
    \ Rearme inhibido hasta finalizar la extinción o hasta que se agote el tiempo\
    \ configurado en parámetro P.02 (duración descarga).\n   - '00': Rearme permitido\
    \ en cualquier momento (valor por defecto).\n   - '01 a 30': Rearme inhibido durante\
    \ el intervalo definido en minutos.\n   Comprobar el valor configurado de este\
    \ parámetro.\n\n3. **Tiempo de descarga del circuito de extinción (parámetro P.02\
    \ - soak time)**: El circuito de extinción permanece activo durante el tiempo\
    \ configurado (por defecto 295 seg., o hasta rearme si está configurado como '--').\
    \ Hasta que no finalice este tiempo, no se podrá rearmar correctamente.\n\n4.\
    \ **Entrada de Flow Press (señal de flujo)**: La activación de la condición de\
    \ flujo implica un rearme manual de la central. Verificar que esta entrada no\
    \ esté activa.\n\n5. **Averías enclavadas**: Por defecto todas las averías son\
    \ enclavadas y requieren rearme manual. Si persiste alguna avería en los circuitos\
    \ supervisados (extinción, sirenas, zonas, pulsadores, baja presión, flujo, puerta\
    \ abierta), el sistema mantendrá la indicación. Comprobar que se haya eliminado\
    \ la causa antes del rearme.\n\n6. **Estado de las zonas en alarma**: Verificar\
    \ que los detectores o pulsadores que provocaron la activación hayan vuelto a\
    \ estado normal.\n\nProcedimiento de rearme: Desde nivel de acceso 2 (mediante\
    \ la llave de desbloqueo), pulsar la tecla 'Rearme'."
