  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2 y nivel 3?
  conducta_esperada: answer
  gold_answer: |-
    En la Notifier INSPIRE, las contraseñas de los códigos de acceso de Nivel 2 y Nivel 3 se cambian desde la propia central mediante el siguiente procedimiento. Se recomienda cambiar la contraseña por defecto a una exclusiva de entre 4 y 8 dígitos.

    Reglas según el nivel de sesión iniciada:
    - Si está en Nivel de Acceso 2: puede cambiar únicamente el código de acceso de Nivel 2.
    - Si está en Nivel de Acceso 3: puede cambiar el código de acceso de Nivel 2 o de Nivel 3.

    Pasos para cambiar el código de acceso:
    1. Seleccionar el icono del menú y entrar en 'Ajustes' (Configuración), iniciando sesión como usuario de Nivel 3 (o Nivel 2 si solo se va a cambiar el Nivel 2).
    2. Seleccionar la opción 'Cambio del código de acceso'.
    3. Asegurarse de que esté seleccionado el Nivel de Acceso 2 o 3 a modificar y que el cursor parpadee como indicación.
    4. Se puede ver la entrada del código pulsando el icono del ojo.
    5. Introducir un nuevo código de acceso de entre 4 y 8 caracteres con el teclado.
    6. Confirmar la entrada del código de acceso seleccionando el símbolo de confirmación.
    7. Volver a introducir el código para confirmar (repetir pasos 3 a 6).
    8. Observar el mensaje 'Cambio de código de acceso satisfactorio' y seleccionar Aceptar.
    9. Finalmente, sincronizar el programa de configuración CLSS con la central y realizar una copia de seguridad del cambio en la nube.

    Nota importante: el inicio de sesión para el portal en la nube CLSS, la aplicación CLSS y el programa de configuración CLSS comparten el mismo usuario, código de acceso y contraseña.
