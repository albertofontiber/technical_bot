    lazo?
  conducta_esperada: answer-con-conflicto
  gold_answer: |-
    La AM2020 y la AFP1010 comparten la arquitectura de lazos SLC, pero difieren en el numero de lazos:

    - La AM2020 soporta hasta 10 lazos SLC.
    - La AFP1010: los manuales disponibles NO coinciden. La documentacion de Notifier Espana (MFDT280/MPDT280) la limita a un maximo de 2 lazos (2 tarjetas LIB-200), con un total de 396 dispositivos en el sistema. La documentacion de Notifier US (PN 15088SP) indica un maximo de 4 lazos (4 LIB-200 o 2 LIB-400), con un total de 792 dispositivos.

    Cada lazo SLC admite hasta 99 detectores analogicos + 99 modulos monitores o de control (198 dispositivos por lazo) en ambos casos; asi la AM2020 alcanza 1980 dispositivos. El cableado del lazo sigue los requisitos NFPA Estilo 4 o Estilo 6.

    La discrepancia del AFP1010 (2 vs 4 lazos) procede de documentos distintos (Notifier Espana vs Notifier US); con la informacion disponible no es posible determinar cual aplica sin identificar la documentacion o configuracion del panel concretamente instalado. Conviene verificar contra el manual correspondiente al equipo en campo.
