  gold_answer: 'Según el manual del fabricante, el detector VESDA-E VEP debe seguir
    el calendario de mantenimiento recomendado, que incluye comprobaciones anuales
    específicas. Las comprobaciones de mantenimiento ANUALES son:


    1. **Fuente de alimentación y batería** - verificación anual.

    2. **Comprobar la red de tubería** - verificación anual.

    3. **Realizar una prueba de humo para comprobar la integridad de las tuberías**
    - verificación anual.

    4. **Comprobar el flujo de las tuberías** - verificación anual.

    5. **Limpiar los puntos de muestreo** - verificación anual.


    Adicionalmente, hay tareas con otras frecuencias:

    - Cada 6 meses: limpiar con agua la red de tubería.

    - Cada 2 años: sustitución del filtro (o cuando se produzca un fallo del mismo;
    puede ser más frecuente en entornos contaminados).


    **Precauciones antes de realizar el mantenimiento o las pruebas:**

    - Cuando el detector está deshabilitado o en espera, NO emitirá advertencias de
    fuego.

    - Informar a la autoridad supervisora adecuada.

    - Asegurarse de que se aíslen los dispositivos auxiliares que dependan del detector
    antes de iniciar el trabajo.

    - Cuando se realicen pruebas de humo, seguir los procedimientos del sitio para
    evitar falsas alarmas en los servicios supervisados.


    **Notas adicionales:**

    - El mantenimiento puede ser realizado por el instalador original, un distribuidor
    autorizado o el contratista de servicio.

    - La frecuencia necesaria puede variar según códigos y normas locales, y el entorno
