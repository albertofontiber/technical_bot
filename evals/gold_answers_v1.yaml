    - SDX-751EM

    Sensores ópticos/térmicos multicriterio (MULTI):
    - SDX-751-TEM (OptiPlex)
    - SDX-551THE
    - IRX-751CTEM (SMART 4)
    - IRX-751TEM (SMART 3)

    Sensores para ambientes especiales:
    - HPX-751E (HARSH)
    - IDX-751 (HAZARD, seguridad intrínseca con barrera Y72221)

    Sensores por aspiración/láser (VIEW):
    - LPX-751 (VIEW)
    - FSL-751E (VIEW)

    Detectores por rayo (humo por haz):
    - LPB500 (máximo 4 por lazo)
    - LPB-700 / LPB-700T

