  question: ¿Qué detectores de humo analógicos son compatibles con la Notifier ID3000?
  conducta_esperada: answer
  gold_answer: |-
    Según el Apéndice 3 del Manual de instalación y puesta en marcha de la ID3000, los sensores de humo analógicos compatibles con la central son:

    Sensores iónicos:
    - CPX-551E (ION)
    - CPX-751E (ION - bajo perfil)

    Sensores ópticos:
    - SDX551E (OPT)
    - SDX-751 (OPT)
    - SDX-751EM

    Sensores ópticos/térmicos multicriterio (MULTI):
    - SDX-751-TEM (OptiPlex)
    - SDX-551THE
    - IRX-751CTEM (SMART 4)
    - IRX-751TEM (SMART 3)

    Sensores para ambientes especiales:
    - HPX-751E (HARSH)
    - IDX-751 (HAZARD, seguridad intrínseca con barrera Y72221)

    Sensores por aspiración/láser (VIEW):
    - LPX-751 (VIEW)
    - FSL-751E (VIEW)

    Detectores por rayo (humo por haz):
    - LPB500 (máximo 4 por lazo)
    - LPB-700 / LPB-700T

    La comunicación con los equipos en el lazo utiliza el protocolo 'CLIP' de Notifier. Se pueden instalar hasta 99 sensores por lazo (más 99 módulos).
