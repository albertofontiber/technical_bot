  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier PEARL?
  conducta_esperada: answer
  gold_answer: |-
    En la central Notifier PEARL los retardos en la activación de las salidas (incluida la salida/sirena de alarma) no se programan con un único parámetro de "retardo de salida", sino mediante la PROGRAMACIÓN DE CAUSA-EFECTO (reglas), descrita en el Manual de configuración de la central (997-671-005-3), Apéndice 5.

    Procedimiento:
    1. Acceda a la pantalla "Causa y Efecto" desde el menú "Editar Configuración" (se recomienda el programa de configuración por ordenador como método principal; el menú de la central, solo para modificaciones menores).
    2. Tenga en cuenta las dos reglas por defecto: Regla 1 (CUALQUIER entrada de alarma activa TODOS los equipos de salida) y Regla 2 (la tecla EVACUACIÓN activa TODOS los equipos de salida). Es fundamental BORRAR la Regla 1 si va a realizar una programación específica, o quedará anulada por ella.
    3. Cree una regla (número discreto; máximo 512 reglas) con una INSTRUCCIÓN DE ENTRADA (la condición; p. ej. alarma en una zona/lazo) y una INSTRUCCIÓN DE SALIDA (el equipo a accionar: sirenas o relés). En la columna "Lazo", un "0" significa TODOS.
    4. Asigne a la regla uno de los SEIS tipos de retardo de salida (sección A5.3 "Tipos de retardo"). El tipo seleccionado determina el comportamiento del retardo y cómo lo controlan las teclas (p. ej., SILENCIAR SIRENAS detiene la salida durante el retardo; SONIDO ALARMAS activa las sirenas).
    5. Pruebe rigurosamente las reglas durante la puesta en marcha para evitar lógicas contradictorias.

    Adicionalmente: a nivel de equipo/zona existe el parámetro "Retardo de alarma" en la programación del lazo; y mediante programaciones horarias pueden imponerse retardos en la activación de las salidas durante periodos preestablecidos del día.

    Nota EN54: configurar retardos puede afectar al cumplimiento normativo (p. ej., retardos de confirmación de alarma en entradas que contravengan EN54-2); verifique los requisitos aplicables.
