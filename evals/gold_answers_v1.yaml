  gold_answer: 'Para acceder al menú de programación avanzada (nivel de configuración/administrador)
    en la central Detnov CAD-250, siga estos pasos: 1) Desde la PANTALLA DE REPOSO,
    toque con el dedo el icono del candado (🔓) que aparece en el centro de la pantalla.
    2) Esto le llevará a la PANTALLA DE ACCESO, que solicita un código de seguridad.
    3) Introduzca la clave de administrador. La clave de administrador por defecto
    es 2222 (la clave de usuario por defecto es 1111, pero esta no da acceso a configuración
    avanzada completa). Una vez introducida la clave correcta, accederá a la PANTALLA
    DE ADMINISTRADOR, dividida en 6 secciones (Menú Principal a la izquierda, Submenú
    a la derecha, Barra de Navegación, Vista Principal, Barra de Estado y Barra de
    Mensajes), desde donde podrá acceder a Lazos, Sectorización, Maniobras, Logs,
    Red, Ajustes e Instalación. ADVERTENCIA: El uso indebido o negligente del nivel
    de acceso con privilegios de administrador puede provocar un mal funcionamiento
    de la instalación y poner en riesgo la protección de personas y bienes; asegúrese
    de tener la autorización y conocimientos necesarios. Se recomienda cambiar la
    clave por defecto desde Ajustes > Usuarios.'
