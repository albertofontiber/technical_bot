  gold_answer: 'Conexión de sirenas convencionales en las salidas de sirena de la
    central Morley ZXe (ZX1e/ZX5e):


    1) Características de las salidas:

    - La ZX1e dispone de 2 salidas de sirena y la ZX5e dispone de 5 salidas de sirena.

    - Cada salida es supervisada y está protegida contra cortocircuito.

    - Tensión de salida: 24 Vcc nominal.

    - Corriente máxima por salida: 500 mA.

    - Las salidas son de corriente limitada.


    2) Cableado y polaridad:

    - Las sirenas se conectan respetando la polaridad indicada en el conector de la
    placa: terminales marcados con + y − (Sirena+ / Sirena−).

    - Se debe utilizar cable apantallado adecuado. La pantalla/malla del cable debe
    conectarse a la arandela del pasacables (racord) en contacto con el chasis, para
    asegurar la continuidad de tierra/EMC.


    3) Resistencia final de línea (EOL):

    - Para que la línea quede supervisada correctamente debe instalarse una resistencia
    final de línea de 10 kΩ en el último dispositivo (sirena) de cada lazo de sirenas.

    - La resistencia se conecta en paralelo a los terminales + y − del último elemento
    de la línea.


    4) Diodos en las sirenas:

    - Las sirenas convencionales deben llevar un diodo en serie (o el correspondiente
    diodo de bloqueo interno) de modo que en reposo la línea esté en polarización
    inversa y la central pueda supervisarla; al activarse la salida, se invierte la
    polaridad y las sirenas suenan. Deben utilizarse sirenas polarizadas o con diodo
    de bloqueo.


    5) Procedimiento práctico:

    - Identifique el conector de salidas de sirena en la placa base de la central
    (Sounder Outputs).

    - Conecte el positivo (+) y negativo (−) de la sirena respetando la polaridad.

    - Si hay varias sirenas en la misma salida, conéctelas en paralelo respetando
    polaridad.

    - Coloque la resistencia EOL de 10 kΩ en bornes de la última sirena.

    - Conecte la malla del cable a la arandela del pasacables del chasis (no en ambos
    extremos para evitar bucles de masa, según la indicación del manual).


    Nota: el manual también indica que la corriente total disponible para sirenas
    y 24 V auxiliar está limitada por la fuente de alimentación de la central.'
