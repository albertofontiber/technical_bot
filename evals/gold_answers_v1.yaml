  question: ¿Cuál es la resistencia de fin de línea recomendada para los lazos de la central Morley ZXe?
  conducta_esperada: answer
  split: dev
  estrato:
  - diagrama
  gold_answer: |-
    El lazo analogico direccionable de la central Morley ZXe (e-series ZX2e/ZX5e) NO lleva resistencia de fin de linea (RFL). El lazo se cablea como un BUCLE CERRADO: los terminales de salida del panel (Inicio Lazo +/- OUT) recorren los equipos direccionables y el final del lazo VUELVE al panel por los terminales de Retorno (+/-) del mismo conector de lazo (manual de instalacion MIE-MI-530, seccion 3.4.3.1, Figuras 9 y 10). Cada lazo dispone de aisladores de cortocircuito INTERNOS en el panel; se recomienda intercalar aisladores adicionales en campo (maximo 32 sensores/pulsadores entre aisladores segun EN54-2 12.5.2, o por zona fisica segun EN54-14) para que un corto o un circuito abierto no deje sin comunicacion a todo el lazo.

    La 'resistencia de fin de linea' (RFL/EOL) es un concepto de los circuitos CONVENCIONALES supervisados (zonas convencionales, salidas de sirena monitorizadas que en la ZXe usan 6K8), NO del lazo direccionable. Por eso ningun manual de la ZXe especifica una RFL para el lazo: el lazo se supervisa por su topologia de bucle cerrado + aisladores, no con una resistencia. (El mismo cableado de bucle cerrado sin RFL aparece en los paneles convencionales-direccionables ZXAE/ZXEE, manual MIE-MI-310, Fig 11/12/13.)
  atomic_facts:
