- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov CAD-250: como se crea,
    como se definen las entradas/eventos que la disparan y como se asignan las salidas?'
  conducta_esperada: answer
  split: dev
  estrato:
  - sintesis-completitud
  gold_answer: |-
    En la CAD-250 (sistema VESTA) la logica causa-efecto se programa con MANIOBRAS (menu Maniobras, seccion 8 de la Guia de Configuracion). La respuesta completa fusiona el crear la maniobra, definir sus entradas y asignar sus salidas:

    1. CREAR LA MANIOBRA (§8.2): en el menu Maniobras pulsa ANADIR -> se abre la pantalla de edicion de la maniobra. En el campo COINCIDENCIAS se indica cuantos eventos de entrada deben CONCURRIR para que la salida sea verdadera y se ejecute la maniobra: con valor 1, basta con que se cumpla cualquiera de los eventos; con 2, deben concurrir dos; con 4, cuatro (cualesquiera de ellos), etc.
    2. ENTRADAS / EVENTOS (§8.2.1): pulsa ANADIR y elige EVENTO (las entradas que disparan) o ACCION (las salidas). Un EVENTO se define sobre una ENTIDAD -cualquier elemento de la jerarquia del sistema: instalacion, panel, lazo, area, dispositivo, grupo o modo virtual, de la central local o de la red- o sobre una CONDICION TEMPORAL (un periodo de tiempo para que la ecuacion de entrada sea verdadera). El maximo es 100.000 maniobras entre eventos y acciones.
    3. SALIDAS (§8.2.3): las ACCIONES son las salidas que la maniobra activa cuando se cumplen las coincidencias; actuan sobre los elementos de salida (sirenas o modulos de control).

    Como paso previo conviene tener definida la SECTORIZACION fisica del edificio (seccion 7), que estructura las entidades/zonas sobre las que operan las maniobras.
