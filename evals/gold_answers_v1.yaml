- qid: cat013
  question: Tengo una central Detnov CAD-150 y me ha sobrado de otra instalacion un detector optico Notifier
    SDX-751; ¿es compatible / puedo montarlo en su lazo?
  conducta_esperada: refuse-inference
  split: dev
  estrato:
  - multi-doc
  gold_answer: |-
    No puedo confirmarte la compatibilidad: ningun manual -ni el de la Detnov CAD-150 ni el del sensor Notifier- documenta que un detector Notifier SDX-751 funcione en el lazo de la CAD-150, asi que montarlo seria una inferencia no soportada por la documentacion. Lo que SI esta documentado, por separado:

    - Central Detnov CAD-150: central analogica de deteccion con lazo (bucle) CERRADO de dos hilos apantallados (longitud max. 2 km, resistencia del cable < 44 Ohm, capacidad max. < 500 nF). Los elementos se dan de alta por autobusqueda/escaneo del propio lazo Detnov; el manual de instalacion (55315013) no nombra un protocolo abierto ni lista compatibilidad con detectores de otras marcas.
    - Detector Notifier SDX-751: sensor optico analogico direccionable de la gama Notifier, que se comunica mediante el protocolo CLIP de Notifier (manual ID3000 MIDT190, p69 + Apendice 3).

    Cada equipo esta disenado para el sistema/protocolo de su propio fabricante, y no hay ningun documento que avale -ni que descarte explicitamente- mezclarlos; por tanto no debo asumir compatibilidad. Para una respuesta fiable consulta a Detnov (detectores homologados para el lazo de la CAD-150) o a Notifier.
