    negligente del nivel de acceso con privilegios de administrador puede provocar un mal funcionamiento
    de la instalación y poner en riesgo la protección de personas y bienes; asegúrese de tener la autorización
    y conocimientos necesarios. Se recomienda cambiar la clave por defecto desde Ajustes > Usuarios.'
