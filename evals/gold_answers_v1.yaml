- qid: hp014
  question: ¿Cómo se conecta un módulo de aislamiento de línea en un lazo ID2000?
  conducta_esperada: answer
  split: dev
  gold_answer: |-
    Conexión de aisladores en un lazo ID2000:

    1) Requisitos según EN54-2 y diseño del sistema (Sección 4.1.2, pág. 16):
    - Deben instalarse aisladores en cada lazo analógico para separar sensores y pulsadores.
    - Máximo 32 equipos de lazo entre aisladores según EN54-2.
    - En la central ID2000 no se deben colocar más de 25 equipos de lazo entre aisladores (20 si se utilizan aisladores tipo FET, como el B524IEFT).

    2) Comprobaciones del lazo ANTES de conectar los aisladores (Sección 4.2 y 8.4.2, pág. 16 y 41-42):
    - Las comprobaciones de continuidad del lazo deben realizarse antes de conectar los aisladores.
    - Para realizar las pruebas de continuidad/polaridad del lazo, se desconectan temporalmente los aisladores cortocircuitando los terminales 2 y 4 de cada aislador.
    - Una vez verificado el cableado, se retiran las conexiones temporales en las unidades aisladoras antes de conectar el lazo al panel.

    3) Conexión típica en el lazo (esquema de la Sección 8.4.2, pág. 41):
    - El aislador (referenciado como B501 / ISO-X o B524IE/B524IEFT) se intercala en el lazo entre tramos de equipos.
    - Se conecta en serie en el conductor del lazo, respetando la polaridad (extremos A+/A- de salida y B+/B- de entrada del panel).
    - La pantalla del cable debe ser continua a lo largo del lazo y conectarse a tierra solo en el panel (Sección 3.2.2, pág. 14: "Se debe evitar una conexión múltiple de la pantalla a tierra. Los productos de campo de NOTIFIER utilizan bases y cajas aisladas para este fin").

    4) Unidades de inicio (Apéndice 3, pág. A3-1):
    - Para asegurar que los aisladores se cerrarán al aplicar alimentación, se puede conectar un máximo de 25 unidades de inicio (SU) entre aisladores estándar, o 20 SU entre aisladores FET.

    5) Cálculo de resistencia del lazo con aisladores (Apéndice 3, pág. A3-4):
    - Resistencia añadida por cada aislador FET B524IEFT: 0,29 Ω (Rf = Nf x 0,29).
    - Resistencia añadida por otros aisladores B524IE / ISO-X: 0,1 Ω (Ri = Ni x 0,1).
    - La resistencia máxima del lazo (medida uniendo B+/B- y midiendo en A+/A-) no debe superar 35 Ω, con capacidad del cable inferior a 0,5 µF (Sección 3.2.2, pág. 14).

    Nota importante: el manual describe los requisitos de instalación, ubicación en el lazo y comprobaciones de los aisladores, pero remite a las instrucciones específicas que acompañan a cada equipo para el detalle de cableado terminal a terminal del módulo aislador (Sección 4, pág. 16: "Estos equipos van acompañados de instrucciones en las que se muestran las interconexiones adecuadas para cada aplicación").
