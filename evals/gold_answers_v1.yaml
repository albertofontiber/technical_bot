- conducta_esperada: answer
  gold_answer: "El ASD 535 no genera una alarma de 'flujo bajo' como tal, sino un\
    \ aviso de fallo de flujo de aire (Fault flujo de aire) cuando la variación del\
    \ flujo de aire respecto al valor nominal (registrado durante el reset inicial\
    \ = 100%) supera la ventana de monitorización configurada (por defecto ±20% según\
    \ EN 54-20) durante más tiempo que el retardo configurado (por defecto 300 s).\n\
    \nCAUSA MÁS PROBABLE de un flujo bajo (valor por debajo del 80%):\n- Obstrucción\
    \ del conducto de aspiración: orificios de aspiración sucios u obstruidos, filtro\
    \ sucio (caja de filtro FBL / unidad de filtrado de polvo DFU), trampa para polvo\
    \ o separador de agua obstruidos, suciedad acumulada en los sensores de flujo\
    \ de aire.\n- También puede deberse a turbulencias de aire o fluctuaciones ambientales\
    \ (especialmente si el aviso es intermitente y la ventana está ajustada de forma\
    \ muy sensible).\n- Un valor > 100% (por encima del 120%) apuntaría a rotura de\
    \ tubo o fugas, no a flujo bajo.\n\nDIAGNÓSTICO PASO A PASO:\n\n1) Leer el valor\
    \ actual de flujo de aire en el ASD (cap. 7.6.1):\n   - Pulsar UP hasta llegar\
    \ al grupo de posición de conmutador 'V'.\n   - Pulsar OK > V01 (conducto I) y\
    \ V02 (conducto II en ASD 535-2/-4).\n   - Pulsar OK: aparecerá el valor en %\
    \ respecto al reset inicial.\n   - Interpretación: valor < 100% → indicio de obstrucción;\
    \ valor > 100% → indicio de rotura de tubo.\n\n2) Consultar la memoria de eventos\
    \ (posición de conmutador E) para identificar el código de evento y confirmar\
    \ que se trata de 'fallo flujo de aire' (cap. 8.5.3 y 10.3.1).\n\n3) Inspeccionar\
    \ el conducto de aspiración:\n   - Verificar que los orificios de aspiración no\
    \ están obstruidos (polvo, pintura, suciedad).\n   - Comprobar el estado de la\
    \ caja de filtro / unidad de filtrado de polvo (DFU) y sustituir el filtro si\
    \ procede (cap. 9.3.1 y 7.8 'Sustitución del filtro').\n   - Revisar trampa para\
    \ polvo, separador de polvo y separador de agua.\n   - Comprobar que no hay agua\
    \ acumulada ni condensaciones.\n   - Limpiar los sensores de flujo de aire si\
    \ es necesario (cap. 9.3).\n\n4) Verificar la configuración de la monitorización\
    \ del flujo de aire:\n   - Sensibilidad LS-Ü por defecto: ±20% (rango ±1% a ±70%).\n\
    \   - Retardo LS-Ü por defecto: 300 s (rango 2 a 60 min).\n   - En entornos con\
    \ grandes turbulencias o oscilaciones térmicas >20°C puede ser necesario aumentar\
    \ el tiempo de retardo o el tamaño de la ventana (atención: fuera de ±20%/300\
    \ s ya no cumple EN 54-20, consultar con el fabricante).\n\n5) Tras solucionar\
    \ la causa (limpieza, reparación, sustitución de filtro), realizar un nuevo RESET\
    \ INICIAL (cap. 7.3.5):\n   - Grupo de posición de conmutador 'U' > U01 > OK.\n\
    \   - Importante: respetar un tiempo de espera mínimo de 5 min tras encender o\
    \ tras modificaciones en el conducto antes de ejecutar el reset inicial.\n   -\
    \ El reset inicial sólo debe ejecutarse cuando el conducto de aspiración esté\
    \ limpio y en perfecto estado, ya que si se hace con orificios sucios/obstruidos\
    \ no se podrán tomar muestras de aire correctamente y la alarma podría no dispararse.\n\
    \nADVERTENCIA: el documento es para el ASD 535 fabricado por Securiton. La pregunta\
    \ menciona 'Detnov', pero la documentación aportada corresponde a Securiton AG.\
    \ Si el equipo realmente es de otro fabricante, los procedimientos podrían diferir."
