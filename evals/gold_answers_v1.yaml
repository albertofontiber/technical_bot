  question: ¿Cómo se alimenta la sirena/avisador intrínsecamente seguro IS-mA1 en una zona peligrosa (ATEX)
    y cuáles son sus parámetros de seguridad intrínseca de entrada?
  conducta_esperada: answer
  split: dev
  estrato:
  - es-en
  gold_answer: |-
    El IS-mA1 (fabricante e2S / European Safety Systems) es una sirena/avisador acústico redondo intrínsecamente seguro, certificado ATEX e IECEx, para producir una señal de alarma en zonas peligrosas (atmósferas explosivas).

    Alimentación: se alimenta a 24V dc en la zona peligrosa A TRAVÉS de una barrera Zener o aislador galvánico certificado ATEX/IECEx de 28V / 93mA (resistivo). Puede probarse o usarse en zona segura sin barrera, pero por encima de 16V actúa el límite de corriente interno, por lo que se recomienda no operarlo de forma continua con una alimentación directa superior a 16V.

    Parámetros de seguridad intrínseca de entrada (terminales + y −): Ui = 28V, Ii = 93mA, Pi = 660mW, Ci = 0, Li = 0. La barrera Zener / aislador galvánico debe tener parámetros de salida iguales o inferiores a 28V, 93mA y 660mW.

    Marcado: II 1G Ex ia IIC T4 Ga, con rango de temperatura ambiente −40°C ≤ Ta ≤ +60°C.
  atomic_facts:
  - texto: El IS-mA1 se alimenta a 24V dc en zona peligrosa a través de una barrera Zener / aislador galvánico
      certificado ATEX/IECEx de 28V / 93mA resistivo (en zona segura sin barrera, no operar de forma continua
      por encima de 16V por el límite de corriente interno)
