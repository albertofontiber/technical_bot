    del detector y el conducto de aspiración es de 20 °C. La temperatura de almacenamiento permitida es
    de –30 °C a +70 °C (sin condensación). Para uso en almacenes de ultracongelación, el rango queda restringido
    a –30 °C hasta 0 °C, debiendo respetarse la directriz T 131 390.
