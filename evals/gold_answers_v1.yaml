    cita: p28 (2.2.10)
  - texto: 'Diagnostico: leer el valor actual del flujo de aire (cap 7.6.1) -> posicion de conmutador
      V, V01 (conducto I) y V02 (conducto II); interpretacion: valor < 100 % apunta a obstruccion, > 100
