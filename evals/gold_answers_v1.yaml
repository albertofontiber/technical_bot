- qid: cat021
  question: Necesito un detector de llama SharpEye «40/40» (Spectrex / Notifier) para una instalación;
    ¿qué modelo pido?
  conducta_esperada: clarify
  split: dev
  estrato:
  - familia-ambigua
  gold_answer: |-
    «40/40» (SharpEye, de Spectrex — rebrandeado por Notifier/Honeywell) no identifica un único detector: la serie 40/40 tiene varias variantes con TECNOLOGÍA DE DETECCIÓN distinta y NO intercambiables, y la correcta depende del tipo de fuego/combustible a proteger. Para confirmarte el modelo, ¿qué tipo de llama/combustible tienes (o qué variante necesitas)?

    • 40/40I (S40/40I) — triple espectro INFRARROJO (IR3); fuegos de hidrocarburos.
    • 40/40M (S40/40M) — MÚLTIPLE infrarrojo (Multi IR); específico para llamas de HIDRÓGENO e hidrocarburo.
    • 40/40U (S40/40U) — ULTRAVIOLETA (UV).
    • 40/40L (S40/40L) — combinado UV/IR.
    • 40/40R (S40/40R) — infrarrojo IR SIMPLE (single IR).

    Dime el combustible/tipo de fuego (p. ej. hidrógeno, hidrocarburos líquidos) o el modelo exacto y te confirmo las especificaciones. ⚠️ Importante de seguridad: la tecnología espectral debe coincidir con el tipo de llama — p. ej. un IR3 (40/40I) NO es la opción para fuegos de hidrógeno (que requieren el 40/40M, o una tecnología UV); elegir la variante equivocada puede dejar el fuego sin detectar.
