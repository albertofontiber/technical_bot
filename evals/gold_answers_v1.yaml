- qid: cat012
  question: ¿Cómo se calcula la capacidad de batería (en Ah) necesaria para la central AM-8200?
  conducta_esperada: answer
  split: dev
  estrato:
  - sintesis-completitud
  gold_answer: |-
    El dimensionado de la batería de la AM-8200 no es un único valor: se calcula COMBINANDO el consumo, la autonomía y un factor de seguridad (apéndice §11 «Cálculo de consumos» del manual de instalación), y queda acotado por la capacidad máxima del armario.

    Fórmula (Tabla 1, §11): Ah batería = (A + B) × 1,2, donde:
    • A = consumo total del sistema en REPOSO (sin alarma) × 24 h (o × 72 h, según la autonomía exigida).
    • B = consumo total del sistema en ALARMA × 0,5 h (30 min).
    • 1,2 = factor de seguridad.

    Los consumos por tarjeta se toman de §3.12/§3.13 y de la Tabla 1; p. ej. la CPU AM8200-KLCD consume 179 mA en reposo y 345 mA en alarma (consumo de alimentación; en consumo de baterías, 113 mA en reposo y 255 mA en alarma), la LIB-8200 50 mA y la AM82-2S2C 28 mA. A estos se suman la corriente de los lazos (Tabla 3) y la corriente de salida de usuario (campanas/sirenas/flashes, máx. 2 A).

    La alimentación interna es de 24 Vcc con un total de 4 A. La capacidad máxima estándar instalable es de 17-18 Ah (2 × 12 V; p. ej. Yuasa NP18-12B = 17,2 Ah o Fiamm FG21803 = 18 Ah).

    En resumen: suma los consumos en reposo y en alarma, multiplícalos por sus horas de autonomía (24/72 h y 0,5 h), aplica el factor 1,2 y comprueba que el resultado no supere la capacidad máxima instalable (≈18 Ah).
  atomic_facts:
  - texto: 'La capacidad de batería se calcula con la fórmula del apéndice §11 (Tabla 1): Ah = (A + B)
      × 1,2, siendo 1,2 el factor de seguridad'
    tipo: core
    estado: presente
    valor: 1,2
    cita: AM-8200 Instalacion p52 (§11 Tabla 1)
