    En cuanto al MTBF (tiempo medio entre fallos, en horas): el manual/datasheet del DGD-600 NO lo especifica. El unico dato de durabilidad que documenta el fabricante es la vida util de 10 anos. Si necesitas un valor de MTBF concreto (p.ej. para un calculo de fiabilidad), habria que solicitarlo a Detnov, ya que no figura en la documentacion disponible.
