  gold_answer: |-
    La central de detección de gas Fidegas CS4 tiene estas características técnicas (tabla §6 del manual):
    - Alimentación: 110-230 Vac, 50-60 Hz; potencia 30 W.
    - Sensores: hasta 4 conexiones, en modo analógico (4-20 mA) o digital.
    - Salidas: 2 salidas conmutadas LP, con relé apto para 230 Vac y contactos NA-C-NC.
    - Corriente máxima: 250 mA.
    - Dimensiones 90 x 106 x 58 mm; peso 300 g; rearme seleccionable manual o automático.

    Hay dos VERSIONES, que se distinguen por el código de producto: la versión DIGITAL es el código 3244 y la versión ANALÓGICA el 3270. La diferencia es el modo de conexión de los sensores remotos (digital vs analógico 4-20 mA).
