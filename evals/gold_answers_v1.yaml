- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual del fabricante?
  conducta_esperada: answer
  gold_answer: |-
    El manual del VESDA-E VEP no describe un "test anual" como un procedimiento
    único paso a paso, sino un CALENDARIO DE MANTENIMIENTO (Tabla 7-1) con tareas a
    distintas frecuencias. Las tareas de revisión ANUAL ("Una vez al año") son:

    1. Realizar una prueba de humos para comprobar la integridad de las tuberías.
    2. Comprobar el flujo de las tuberías.
    3. Limpiar los puntos de muestreo.
    4. Limpiar con agua la red de tubería.

    Tareas con OTRAS frecuencias (no anuales):
    - Cada 3 meses: comprobar la fuente de alimentación y la batería.
    - Cada 6 meses: comprobar la red de tubería.
    - Cada 2 años: sustitución del filtro (o ante un fallo del mismo; puede requerirse
      con más frecuencia en entornos contaminados).

    Precauciones antes del mantenimiento o las pruebas:
    - Cuando el detector está deshabilitado o en espera, NO emitirá advertencias de fuego.
    - Informar a la autoridad supervisora adecuada.
    - Aislar los dispositivos auxiliares que dependan del detector antes de empezar.
    - En pruebas de humo, seguir los procedimientos del sitio para evitar falsas alarmas.

    Para el mantenimiento de la red de tuberías o los puntos de muestreo, es recomendable
    poner el detector en modo En espera (Standby) para apagar el aspirador (detiene la
    detección de alarmas, pero no la de fallos).
