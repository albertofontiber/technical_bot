    específico para sustituir/cambiar la batería tampón (de litio) del ADW 535 manteniendo la configuración.
    Para esta operación se recomienda contactar directamente con el fabricante (Securiton AG) o con el
    servicio técnico autorizado. Nota: las configuraciones específicas del sistema se almacenan en la
    EEPROM del dispositivo (cap. 1.7 y 2.2.2), no en memoria volátil dependiente de la batería, por lo
    que cabe esperar que la configuración se conserve, pero el procedimiento exacto de sustitución no
    está documentado en el manual proporcionado.'
