      de monitorizacion (por defecto +-20 %, EN 54-20)
    tipo: core
    estado: presente
    valor: fallo flujo de aire
    cita: p28 (2.2.10)
  - texto: 'Causa mas probable de flujo BAJO (por debajo del 80 % / valor < 100 %): obstruccion del conducto
      de aspiracion (orificios sucios/obstruidos, filtro sucio, trampa de polvo/separador); un valor por
      encima del 120 % (> 100 %) apunta a rotura de tubo/fugas'
