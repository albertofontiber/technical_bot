- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites de cableado hay (aisladores),
    y cómo se dan de alta y editan esos equipos desde la central?
  conducta_esperada: answer
  split: dev
  estrato:
  - multi-doc
  gold_answer: |-
    En la central Notifier PEARL la capacidad y el alta de equipos del lazo se reparten entre el manual de instalación/puesta en marcha (997-669) y el de configuración (997-671):

    Capacidad del lazo (997-669):
    - La central admite 1 o 2 lazos de detección analógicos.
    - Cada lazo admite hasta 318 equipos: 159 sensores + 159 módulos con protocolo Opal, o 99 sensores + 99 módulos con protocolo CLIP, combinables. La carga máxima del lazo es de 0,75 A.
    - Tope de sistema: máximo 512 sensores y/o pulsadores por sistema a través de ambos lazos (EN54-2).

    Aisladores (997-669): para cumplir EN54-2 deben colocarse aisladores entre un máximo de 32 equipos; en la PEARL no se deben dejar más de 25 equipos entre aisladores (20 si se usan aisladores FET, o para equipos sin aislador interno como los CLIP). Los equipos con aislador interno requieren la base tipo B501 AP.

    Alta y edición desde la central (997-671):
    - El alta se hace por AUTOCONFIGURACIÓN, que detecta los tipos de equipo en cada dirección en una pasada; se elige aplicarla a todos los lazos o a uno, el modo y «Permite Añadir/Borrar/Cambiar» o «Sólo Añadir Nuevos Equipos».
    - OJO al mezclar protocolos: en un lazo MIXTO Opal/CLIP la autoconfiguración limita los equipos CLIP a 40; si se superan, continúa pero señala fallos y hay que seleccionar «Sólo con protocolo CLIP». Un lazo solo-CLIP sí admite los 99 + 99 completos.
    - La edición individual de sensores permite ajustar el número de zona (hasta 255 zonas locales o 8192 de red), el tipo de equipo y los niveles de alarma/prealarma. Los equipos Opal pueden reinicializarse con «4: Inicializar equipo prot.OPAL».
