- qid: cat016
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo y como se prueba que
    funciona?
  conducta_esperada: answer
  split: dev
  estrato:
  - multi-doc
  gold_answer: |-
    Dar de alta un detector nuevo en la CAD-150 y probarlo son dos pasos que se reparten entre el manual de INSTALACION (alta) y el de USUARIO (prueba):

    ALTA (autobusqueda del lazo) — manual de instalacion, §3.3:
    1. Conecta fisicamente el detector al bucle (lazo cerrado de 2 hilos apantallados).
    2. Accede al menu BUCLE y ejecuta una AUTOBUSQUEDA del lazo: el sistema hace un escaneo y muestra todos los elementos que encuentra. Comprueba que coinciden con los elementos instalados (con los planos de la instalacion).
    3. Asigna el detector a una zona en el menu ZONA, y dale un nombre identificativo y su zona de ubicacion en el menu ELEMENTO.

    PRUEBA (modo prueba de zona) — manual de usuario, §3.1.1.5 (menu ZONA > PRUEBA):
    4. Pon en MODO DE PRUEBA la zona donde esta el detector (menu ZONA > PRUEBA). Esto permite probar los detectores SIN tener que rearmar la central tras cada disparo.
    5. En modo prueba, cualquier retardo asociado a las sirenas queda ANULADO (para agilizar la prueba). Provoca la alarma en el detector (humo/calor de prueba) y verifica que la central la registra.
    6. Si transcurren 20 minutos en modo prueba sin ningun disparo, el equipo vuelve solo a estado normal. Para salir manualmente del modo prueba, vuelve a CONECTAR la zona.

    Puedes consultar el estado de cada elemento (conectado / desconectado / en prueba) y su tipo (optico, termico, etc.) en el menu ELEMENTO > Ver.
