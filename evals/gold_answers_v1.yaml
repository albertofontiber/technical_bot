  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una salida de sirena solo
    cuando haya coincidencia de dos detectores?
  conducta_esperada: answer
  split: dev
  estrato:
  - multi-doc
  - tabla-matriz
  gold_answer: |-
    Para programar una zona en la central ID3000 de modo que active una salida de sirena solo cuando haya coincidencia de dos detectores, se debe crear una instrucción en la Matriz de Control con los siguientes parámetros:

    ENTRADA:
    1. Acceder al menú Configuración → Configuración de matriz de control → Crear nuevo evento.
    2. Seleccionar como definición de ENTRADA: ALARMA.
    3. Para sensores multicriterio/SMART, seleccionar 'Normal (Combinada) Alarma'.
    4. Seleccionar 'Subzona, Zona o Central'.
    5. Especificar la zona deseada (zona específica o un rango de zonas).
    6. En la pantalla 'Seleccione Coincidencia Múltip.Zonas', dejar 'UNA ÚNICA zona' (ya que la coincidencia se hará por equipos dentro de la misma zona).
    7. En '¿Limitado por TIPO?' seleccionar el tipo de equipo deseado (por ejemplo, CUALQUIER SENSOR ANALÓGICO). IMPORTANTE: NO incluir pulsadores manuales (PUL) en el grupo de coincidencia (requisito EN54-2: 7.1.4). Si se quieren incluir pulsadores, deben configurarse en una instrucción separada sin coincidencia.
    8. En 'Indique tipo de coincidencia' seleccionar 'COINCIDENCIA 2 EQUIPOS'.

    SALIDA:
    9. Seleccionar 'Salidas activadas'.
    10. Elegir el tipo de salida deseada: 'CIRCUITO SIRENA/RELÉ' (para un circuito de sirena específico) o 'TODAS SALIDAS: Subzona/Zona/Central' limitando por tipo a 'TODOS LOS MÓDULOS DE SIRENA'.
    11. Configurar el modo de funcionamiento (FIJO o PULSANTE) y, si se desea, retardo y programación horaria.
    12. Confirmar la nueva instrucción con la tecla ✓.

    Requisitos previos importantes:
    - Los niveles de coincidencia de equipos deben estar configurados previamente en los ajustes de la central (Configuración de la central → Niveles COINCIDENCIA en ALARMA para EQUIPOS). Los niveles 1 (un único equipo) y 2 (coincidencia 2 equipos) están fijos; otros niveles deben configurarse.
    - Para que se produzca la coincidencia de equipos, los equipos en alarma deben estar en la misma zona o subzona.
    - Si se utiliza el programa PK-ID3000 bajo Windows, el procedimiento equivalente se realiza en la ventana 'Editar Matriz de Control' marcando la casilla de coincidencia y seleccionando 2 equipos.
