  gold_answer: |-
    Para los detectores de la Morley DXc en la VERSION DE ESPANA (protocolo Morley-IAS), los niveles por defecto son:
    - Nivel de PREALARMA por defecto: 80 %.
    - Nivel de ALARMA por defecto: 100 %.
    - Ajuste MAXIMO del nivel de alarma: 108 %.

    El valor analogico del nivel de alarma es un numero normalizado entre 0 % y 100 %, independiente del tipo de equipo. Estos valores se editan por detector (Fuego / Prealarma).

    IMPORTANTE: estos valores son especificos de la version de Espana y figuran en el «Manual de variaciones para Espana» de la DX Connexion, que COMPLEMENTA el manual de configuracion base (996-203-005-X) — la configuracion general del nivel de alarma esta en la seccion de Modos Horarios del manual base, pero los valores por defecto de Espana los fija el manual de variaciones.
