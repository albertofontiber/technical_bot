  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve a estado normal
    tras resetear. ¿Qué comprobar?
  conducta_esperada: answer
  gold_answer: |-
    En la central RP1r-Supra, tras una descarga de extinción y al intentar rearmar, hay que comprobar:

    1. Entrada de Abort (paro de emergencia): la entrada ABORT es por defecto enclavada (latched); una vez activada requiere un rearme manual de la central para habilitar de nuevo el proceso de extinción. Si permanece activa, el sistema no se restaura. Verificar el pulsador de paro y su circuito de supervisión.

    2. Inhibición temporal del rearme tras activación — parámetro "r.1" ("Rearme inhibido tras extinción", UNE-EN 12094-1:2004 ap. 4.12.2): "--" = rearme inhibido hasta finalizar la extinción o agotar el tiempo de descarga (parámetro t.A); "00" = rearme permitido en cualquier momento (POR DEFECTO); "01" a "30" = rearme inhibido durante el intervalo definido en minutos. Comprobar el valor configurado.

    3. Tiempo de descarga del circuito de extinción — parámetro "t.A" ("Duración de la descarga", soak time, UNE-EN 12094-1:2004 ap. 4.21): valor variable de 05 a 295 seg en intervalos de 5 seg; el valor POR DEFECTO es "--" (circuito activado hasta el rearme de la central). Hasta que no finalice este tiempo (o se rearme), no se podrá rearmar correctamente.

    4. Entrada de Flow Press (señal de flujo): su activación implica un rearme manual de la central. Verificar que esta entrada no esté activa.

    5. Averías enclavadas: por defecto todas las averías son enclavadas y requieren rearme manual. Si persiste una avería en los circuitos supervisados (extinción, sirenas, zonas, pulsadores, baja presión, flujo, puerta abierta), se mantiene la indicación. Eliminar la causa antes del rearme.

    6. Estado de las zonas en alarma: verificar que los detectores o pulsadores que provocaron la activación han vuelto a estado normal.

    Procedimiento de rearme: desde nivel de acceso 2 (mediante la llave de desbloqueo), pulsar la tecla "Rearme".
