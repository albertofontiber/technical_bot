- qid: ho005
  question: ¿Cómo amplío una central 2X-AF2 con un lazo adicional (tarjeta 2X-A-LB)?
  conducta_esperada: answer
  split: held-out
  estrato:
  - multi-doc
  gold_answer: |-
    La ampliación se hace con la tarjeta de lazo 2X-A-LB, que añade DOS lazos (LOOP3 y LOOP4) y cuatro salidas supervisadas (OUT5-OUT8); solo es compatible con centrales 2X-A (no usar tarjetas de lazo antiguas).

    1) SEGURIDAD: desconectar la central de la fuente de alimentación Y las baterías antes de instalar (riesgo de electrocución).

    2) MONTAJE (hoja de instalación de la tarjeta): instalar la tarjeta en la RANURA 2 del chasis, presionar con firmeza y fijar con los tornillos suministrados (figura 1). Cablear lazos y salidas según la figura 2 — par trenzado 0,13-3,31 mm² (26-12 AWG); la TIERRA del lazo se conecta por un lado a los espárragos de toma de tierra de la CAJA de la central (NO al terminal de tierra de la propia tarjeta; el otro lado puede quedar suelto); en las salidas que no se usen, instalar resistencia final de línea (Clase A: 4,7 kΩ 1% 1/4 W; Clase B: 15 kΩ 1% 1/4 W) para evitar fallo de circuito abierto.

    3) ALTA EN LA CENTRAL (manual de instalación del panel): restablecer la alimentación y añadir la tarjeta a la configuración: Menú principal → Ajustes del panel → Tarjeta expansión → seleccionar LB (Tarjeta de lazo) → SÍ → F4 (Enter) → Guardar/Aplicar (no olvidar aplicar en el Menú principal). Si la central no detecta el módulo instalado, indica fallo del sistema; si el firmware de la tarjeta no es compatible, aparece una advertencia.

    4) Configurar los lazos, salidas y dispositivos conectados, y comprobar los lazos calculando su carga.
  atomic_facts:
  - texto: La tarjeta de lazo 2X-A-LB proporciona dos lazos adicionales (LOOP3 y LOOP4) y cuatro salidas
      supervisadas adicionales (OUT5-OUT8); su instalación solo es compatible en centrales 2X-A
    tipo: core
    estado: presente
    valor: LOOP3 y LOOP4 + OUT5-OUT8
    cita: sheet 2X-A-LB p7 (bloque ES)
  - texto: 'Antes de instalar: desconectar la central de la fuente de alimentación y las baterías (peligro
      de electrocución)'
    tipo: core
    estado: presente
    valor: desconectar alimentación y baterías
    cita: sheet p7
