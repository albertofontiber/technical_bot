- qid: ho001
  question: En la central Kidde 2X-AF2, ¿cómo se configuran las zonas (agrupar detectores y pulsadores)
    y cuántas zonas admite?
  conducta_esperada: answer
  split: held-out
  estrato:
  - oem-relabel
  gold_answer: |-
    La serie 2X-A (la 2X-AF2 es la variante de 2 lazos; el portal la vende como Kidde y como Aritech) admite un MÁXIMO de 512 zonas (todas las centrales de la serie), con números de zona entre 01 y 9.999. Ojo: por compatibilidad con la aplicación 2010-2GUI, los números asignados deben estar entre 1 y 4095 (las zonas con números superiores se desechan).

    Las zonas se CREAN asignando números de zona a los dispositivos del lazo: Menú principal → Config de lazo → Config. de lazo → seleccionar el lazo y el dispositivo → asignar el número de zona; confirmar con F4 (Enter), volver con F1 (Atrás) y Guardar/Aplicar (F1/F3); repetir por dispositivo y aplicar los ajustes guardados en el Menú principal. Caveat documentado: si el número de zona queda fuera del intervalo válido (determinado por la zona inicial y el número de lazos), la operación no finaliza y NO se muestra error en la pantalla LCD.

    Sí se pueden agrupar detectores y pulsadores en la misma zona: el modo de funcionamiento 'Mixta' admite combinación de dispositivos de alarma automática y manual, y es el modo POR DEFECTO de todas las zonas. Los modos disponibles son Mixta, Manual (solo pulsadores/MCP), Auto (solo detectores), MSP (pulsadores de rociadores) y MHA (pulsadores 'hausalarm'); la central no permite configurar dispositivos que no cumplan los criterios del modo elegido. Nota: el modo de la zona inicial debe ser Mixta.
  atomic_facts:
  - texto: El máximo número de zonas disponibles en la serie 2X-A es 512 (para todas las centrales); el
      intervalo del número de zona va de 01 a 9.999
    tipo: core
