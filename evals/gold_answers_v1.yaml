    estado: presente
    valor: 80 %
    cita: p28 + p101 (7.6.1)
  - texto: El aviso «fallo flujo de aire» se dispara una vez transcurrido el tiempo de retardo de 300
      s de la LS-Ü (retardo ajustable que descarta turbulencias)
    tipo: core
