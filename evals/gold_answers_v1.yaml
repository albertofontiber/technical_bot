  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin afectar al resto
    del lazo?
  conducta_esperada: answer
  gold_answer: |-
    En la central Detnov CCD-103 NO es posible desactivar un detector de forma individual: al ser una central CONVENCIONAL (3 zonas de deteccion + 1 de extincion), no direcciona los detectores uno a uno. La desconexion/anulacion se realiza por ZONA completa: con la llave en posicion ON, pulsando 2 veces la tecla de la zona correspondiente, la zona queda desconectada (se enciende el indicador 'Anular' y el LED de fallo/anular/prueba de esa zona). Al desconectar la zona se anulan TODOS sus detectores (maximo 32 por zona), no uno solo.

    Si necesita actuar sobre un detector concreto, debe hacerse en la instalacion a traves del instalador/servicio tecnico; tenga en cuenta que cada zona se supervisa con una resistencia de fin de linea de 4K7, por lo que cualquier intervencion fisica en la zona afecta a esa supervision. El manual de la CCD-103 no contempla la desactivacion individual de detectores desde la central.
