      el flujo varia respecto al nominal (reset inicial con conducto limpio = 100 %) mas alla de la ventana
      de monitorizacion (por defecto +-20 %, EN 54-20)
    tipo: core
    estado: presente
    valor: fallo flujo de aire
    cita: p28 (2.2.10)
