  diag_modal: 'Acierta la estructura principal de la programación de maniobras en CAD-250: crear en Maniobras/Añadir,
    definir coincidencias, añadir eventos como entidad o condición temporal y añadir acciones como salidas.
    Queda incompleta/imprecisa en la parte de salidas por estar truncada y no explicitar claramente que
    las acciones actúan sobre sirenas o módulos de control; además omite la referencia al máximo de maniobras/eventos/acciones
