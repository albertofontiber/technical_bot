instrument: s116_raw_store_ab_prereg_v21
status: frozen_before_v21_baseline
supersedes: evals/s116_raw_store_ab_prereg_v2.yaml

source:
  store_slug: agent_anthropic-sonnet-45
  expected_json_files: 1069
  expected_records_processed: 1068
  expected_errors:
    - file: _failures.json
      error_type: AttributeError
      interpretation: store manifest, not an extraction record
  required_same_between_arms:
    - manifest_sha256
    - records_processed
    - exact ordered error tuples
    - every successfully processed filename

atomic_lineage_invariant_for_every_chunk:
  required_source_span: inclusive source_block_start and source_block_end resolve in flattened record
  required_common_lineage: exact common prefix over every block in span, including empty lineages
  empty_state: lineage empty, anchor null, section_title null, section_path null
  anchored_state: lineage nonempty, anchor equals last lineage occurrence, title and path derived from lineage
  target_metric: chunk_lineage_state_failures equals 0 in treatment

anchor_resolution:
  source_block_index: required explicit integer coordinate on anchor and resolved block
  source_page: integer or null and exact match to resolved block
  level: non-boolean integer in range 1 through 6
  title: string exactly reparsed from heading_text
  heading_sha256: internal consistency only, not persisted raw provenance

content_conservation:
  representation: SHA-256 of each document's ordered chunk-content stream joined by two newlines
  treatment_gate: exact equality for all 1068 document streams

dependency_gate:
  must_equal_between_baseline_and_treatment:
    - Python runtime version
    - scripts/s116_raw_store_ab_v21.py SHA-256
    - scripts/s116_raw_store_ab_v2.py SHA-256
    - src/reingest/metadata.py SHA-256
    - src/reingest/manufacturer_registry.py SHA-256
    - config/manufacturers/*.yaml manifest SHA-256
  only_allowed_dependency_difference:
    - src/reingest/chunk.py SHA-256

treatment_gate:
  required:
    - chunk_lineage_state_failures equals 0
    - orphan_or_stale_anchor_chunks equals 0
    - every chunk with section_title has internally verified anchor and resolved full lineage
    - exact per-document content stream equality
    - same source manifest, records, filenames and errors
    - dependencies obey dependency_gate
    - cleanup compares full lineage identities and never crosses anchored/unanchored or distinct occurrences
    - flow diagram merge protection remains
    - discarded noise cannot be hidden inside a claimed continuous merged source span
    - repeated byte-identical headings have distinct occurrence identities
    - chunks_total is at most 15 percent above baseline
  authorizes_only: fresh sealed held-out validation
  never_authorizes:
    - schema or database changes
    - reingestion or index changes
    - serving or production changes
    - fact relabeling

cost_contract:
  database_get_requests: 0
  database_writes: 0
  model_calls: 0
  network_calls: 0
