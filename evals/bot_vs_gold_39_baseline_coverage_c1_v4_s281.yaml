  bot_answer: '# Familia SharpEye 40/40 — ¿Qué modelo pedir?


    La denominación "40/40" es la raíz de una familia con **varias variantes no intercambiables
    entre sí**, que se diferencian por la tecnología de detección y el tipo de combustible/riesgo
    al que aplican. Antes de pedir, necesitas saber qué tecnología necesitas para
    tu aplicación:


    ---


    ## Variantes disponibles en la familia SharpEye 40/40


    - **S40/40I** — Detector de llama de **triple espectro infrarrojo (IR3)** [F1]

    - **S40/40L / LB / L4 / L4B** — Detector de llama **UV/IR** [F2]

    - **S40/40R** — Detector de llama **infrarrojo simple (Single IR)**, para combustibles
    de hidrocarburo y fuego de gases [F4][F9]

