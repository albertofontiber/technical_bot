    ## 1. Terminales de conexión


    Según el modelo:


    **ZX2e** [F2]: Los terminales de sirena se encuentran en la regleta inferior de
    la placa, etiquetados como:

    - **A+ A-** → Circuito de Sirena A

    - **B+ B-** → Circuito de Sirena B


    **ZX5e** [F2]: Los terminales se encuentran en el bloque **TB7**, etiquetados
    como:

    - **A- A+ B- B+ C- C+ D- D+** → Circuitos de Sirena A, B, C y D


    ---


    ## 2. Requisito de diodo en cada sirena


    Cada sirena convencional **debe tener un diodo integrado** para impedir el consumo
    en polarización inversa [F2].


    > El circuito se polariza en **inverso en reposo** para supervisar la línea, y
    cambia a polarización normal al dispararse la salida [F2].


    Si conectas dispositivos **no polarizados**, deberás añadir **diodos de polarización
    y protección en cada uno** [F2].


    ---


    ## 3. Resistencia final de línea (RFL)


    Instala una **resistencia final de línea de 6,8 kΩ (0,5 W mínimo)** al final de
    cada circuito de sirena [F11].


    - Se conecta entre los conductores **+** y **−** al final del ramal, después del
    último dispositivo.

    - Es imprescindible para la supervisión de circuito abierto y cortocircuito [F11].

    - El diagrama de la Figura 15 muestra la RFL de **6800 Ω** al final de cada circuito
    [F1].


    ---


    ## 4. Topología del cableado


    - Conecta las sirenas **en paralelo** entre los conductores + y − del circuito
    [F1].

    - Cada circuito admite un consumo máximo de **1 A** [F11].

    - **No enrolles el cable en los terminales**. Corta y empalma adecuadamente para
    mantener la supervisión de la línea [F1].

    - No se recomienda cable de longitud superior a **1 km**; por encima de esa longitud,
    la capacitancia e inductancia del lazo pueden afectar al funcionamiento [F1].


    ---


    ## 5. Verificación de tensión en sirenas


    Asegúrate de que la sección del cable es adecuada para garantizar la alimentación
    de las sirenas a las tensiones recomendadas por el fabricante, tanto con alimentación
    principal como en condiciones de **mínima tensión de baterías** (consulta las
    Tablas 10 y 11 del manual de instalación para las condiciones de tensión mínima
    del panel) [F1].


    ---


    ## 6. Supervisión activa


    Una vez conectadas, cualquier fallo en la línea (circuito abierto o cortocircuito)
    se mostrará en pantalla y quedará registrado en el sistema con un mensaje del
    tipo [F3]:


    ```

    !ATENCION!  CIRCUITO ABIERTO SIRENA B

    ```


    ---


    **Fuentes:**

    - Manual de Instalación ZX2e/ZX5e — Documento MIE-MI-530rv001 (sin revisión registrada)

    - Manual de Configuración ZX2e/ZX5e — Documento MIE-MP-530rv001 (sin revisión
    registrada)


    ---

    ⚠️ **Obligaciones de evidencia del manual:**

    - "(NOTA: Las salidas de relé no se activan nunca)." (MIE-MU-530rv001, p. 17)
    [F7]'
