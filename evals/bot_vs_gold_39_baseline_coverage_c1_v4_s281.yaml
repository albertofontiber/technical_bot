  bot_answer: "# Cableado y configuración de lazo — INSPIRE E10/E15\n\n---\n\n## PARTE\
    \ 1: CABLEADO FÍSICO DEL LAZO\n\n### Módulo de lazo OPAL X2 (HOP-433-100)\n\n\
    El módulo de lazo es de color **morado** [F2] y dispone de 10 terminales para\
    \ dos lazos [F2][F3]:\n\n**Lazo 1:**\n- Terminal **1** → Lazo 1 Salida +VE\n-\
    \ Terminal **2** → Lazo 1 Salida -VE\n- Terminal **3** → ⊕ (**NO usar para pantalla\
    \ de cable**)\n- Terminal **4** → Lazo 1 Entrada +VE\n- Terminal **5** → Lazo\
    \ 1 Entrada -VE\n\n**Lazo 2:**\n- Terminal **6** → Lazo 2 Salida +VE\n- Terminal\
    \ **7** → Lazo 2 Salida -VE\n- Terminal **8** → ⊕ (**NO usar para pantalla de\
    \ cable**)\n- Terminal **9** → Lazo 2 Entrada +VE\n- Terminal **10** → Lazo 2\
    \ Entrada -VE\n\n> ⚠️ **IMPORTANTE:** La pantalla del cable de lazo debe conectarse\
    \ a la **barra de tierra** de la central, NO a los terminales 3 u 8 [F2][F3].\n\
    \n---\n\n### Topología del lazo\n\nEl lazo se cablea en **bucle cerrado** (salida\
    \ de la central → dispositivos → entrada de la central) [F1]. Se recomienda conectar\
    \ el sistema con **cable de 2 hilos** [F10].\n\n---\n\n## PARTE 2: COMPROBACIONES\
    \ PREVIAS A LA CONEXIÓN\n\nAntes de conectar el lazo a la central, realiza las\
    \ siguientes verificaciones con multímetro [F10][F6]:\n\n> ⚠️ **NUNCA uses un\
    \ dispositivo de alta tensión (p.ej. comprobador de aislamiento) en el circuito\
    \ de lazo** [F10].\n\n**Paso 1 — Continuidad y resistencia:**\nComprueba la continuidad\
    \ de cada tramo del lazo y mide la resistencia extremo a extremo [F10]. Mide entre\
    \ **Lazo X Entrada -VE** y **Lazo X Salida -VE** con el lazo desconectado físicamente\
    \ de la central, multiplica el resultado por 2 y añade la resistencia de cada\
    \ aislador (**0,1 a 0,13 Ω** por aislador) [F6].\n\nLímites de resistencia máxima\
    \ [F6]:\n- Protocolo **OPAL**: resistencia inferior a **40 Ω**\n- Protocolo **CLIP**\
    \ (detección de dirección duplicada): inferior a **40 Ω**\n- Protocolo **CLIP**\
    \ (sin detección de dirección duplicada): inferior a **71 Ω**\n\nLa capacidad\
    \ del cable debe ser inferior a **0,5 µF** [F6].\n\n**Paso 2 — Pantalla del cable:**\n\
    - Comprueba continuidad de la pantalla de extremo a extremo (debe dar resistencia\
    \ muy baja) [F10].\n- Comprueba que NO hay continuidad entre la pantalla y los\
    \ cables +VE ni -VE [F10][F5].\n- Si la pantalla no está conectada a la barra\
    \ de tierra en la central, verifica que no tenga ninguna otra conexión a tierra\
    \ en ningún punto del recorrido [F5].\n\n**Paso 3 — Prueba de polaridad con multímetro\
    \ (función diodo):**\n\n1. Conecta el multímetro en **polaridad invertida** (+VE\
    \ del multímetro al negativo del lazo, -VE al positivo). Debe indicar símbolo\
    \ de diodo en polarización directa [F5].\n2. Conecta el multímetro en **polaridad\
    \ normal** (+VE al positivo, -VE al negativo). Al principio leerá resistencia\
    \ baja, que irá aumentando conforme se cargan los condensadores de los dispositivos\
    \ [F5].\n3. Si en el paso 2 aparece diodo en polarización directa, hay uno o varios\
    \ dispositivos conectados en polaridad inversa o un cortocircuito [F5].\n\n> ℹ️\
    \ Si se dispone de ella, se recomienda usar la herramienta **POL-200-TS** para\
    \ diagnósticos más detallados, ya que funciona con protocolos OPAL y CLIP [F7].\n\
    \n**Paso 4 — Dispositivos con aisladores:**\n- En bases **B501 AP** (OPAL): al\
    \ retirar el detector, los terminales **+2 y +4** mantienen la continuidad automáticamente\
    \ [F6].\n- En módulos de lazo y pulsadores OPAL con aisladores: terminales **+2\
    \ y +4** en módulos, terminales **+3 y +4** en pulsadores [F6].\n- Para dispositivos\
    \ **CLIP**: puentea temporalmente los terminales **2 y 4** de cada aislador para\
    \ las comprobaciones [F6].\n\n---\n\n## PARTE 3: CONEXIÓN A LA CENTRAL\n\n**Lazo\
    \ OPAL:** Una vez verificado el cableado, conecta el circuito al bloque de terminales\
    \ de lazo seleccionado en la central [F7].\n\n**Lazo CLIP:** [F7]\n1. Vuelve a\
    \ conectar los aisladores que se puentearon temporalmente.\n2. Conecta el circuito\
    \ al bloque de terminales de lazo seleccionado.\n\n---\n\n## PARTE 4: CONFIGURACIÓN\
    \ DEL LAZO EN CLSS\n\n### Configuración previa (software CLSS)\n\nAntes de realizar\
    \ la Auto Configuración, la central debe configurarse con el programa **CLSS**\
    \ [F9]:\n\n1. En **Ajustes → Ajustes HMI**, en **Tipo de Marca** selecciona **Notifier\
    \ EN** [F8][F9].\n2. Ve a **Configuración de lazo** [F8]:\n   - Si el lazo **no\
    \ se utiliza**: marca ☑ **Sin Uso** [F1][F8][F9].\n   - Si el lazo **se utiliza**:\
    \ establece el **Protocolo de Lazo** (Opal o Clip) [F8].\n   - Selecciona si aplica\
    \ el límite **VdS 2540** (Sí/No) — el valor de resistencia cambia según la selección\
    \ [F9].\n   - Introduce la **resistencia de los cables de lazo** (en Ω) [F8].\n\
    \   - Selecciona el **Tipo de Cable** [F8][F9].\n3. Envía el archivo de configuración\
    \ a la central [F8][F9].\n\n> ⚠️ De forma predeterminada, la central tiene licencia\
    \ para **protocolo OPAL avanzado únicamente**. Para usar CLIP o TC800 OPAL/CLIP\
    \ se requiere **licencia adicional** antes de realizar la Auto Configuración [F9].\n\
    \n### Auto Configuración (desde la central)\n\nUna vez enviada la configuración\
    \ [F12]:\n1. Selecciona **Auto Configuración** para buscar los dispositivos conectados\
    \ al circuito de lazo.\n2. Lee la información de la ventana emergente y confirma\
    \ seleccionando **Auto Configuración**.\n\n---\n\n## CAPACIDADES DEL LAZO\n\n\
    - Protocolo **OPAL**: hasta **159 detectores** + **159 módulos** por lazo [F2].\
    \ Corriente máxima por lazo: **750 mA** [F2].\n- Protocolo **CLIP**: hasta **99\
    \ detectores** + **99 módulos** por lazo [F2].\n- Longitud máxima del lazo: hasta\
    \ **3,5 km** dependiendo del tipo de carga y cable (calcular con la herramienta\
    \ CLSS) [F2].\n- **Restricción EN54-2, 13.7**: máximo **512 detectores y/o pulsadores**\
    \ por módulo de lazo (que comprende 2 circuitos de lazo) [F2].\n\n> ⚠️ **No se\
    \ permite mezclar dispositivos OPAL y CLIP en el mismo lazo** [F2].\n\n---\n\n\
    **Fuentes:**\n- HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha\
    \ INSPIRE E10/E15)\n- HOP-138-9ES issue 5, 11-2025 (Instalación INSPIRE E10)\n\
    - 4188-1132-ES issue 3, 04-2025 (Quick Reference CLSS-10)\n\n---\n\nTambién puedo\
    \ ayudarte con: **numeración de lazos en la E15 (doble fila de portamódulos)**,\
    \ **tipos de dispositivos compatibles con aisladores internos** o **envío de configuración\
    \ a la central paso a paso**."
