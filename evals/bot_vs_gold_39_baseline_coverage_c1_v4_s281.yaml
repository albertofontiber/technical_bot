  bot_answer: "# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE\
    \ E10/E15\n\n---\n\n## Códigos de acceso de fábrica\n\nAntes de cambiar nada,\
    \ ten en cuenta los códigos predeterminados de fábrica [F3]:\n- **Nivel 2:** `22222222`\n\
    - **Nivel 3:** `33333333`\n\nLos nuevos códigos deben tener entre **4 y 8 dígitos**\
    \ [F1][F2][F4].\n\n---\n\n## Cambio de contraseña de Nivel 2 (desde usuario Nivel\
    \ 2)\n\nProcedimiento desde el manual de operación [F2]:\n\n1. Selecciona el **icono\
    \ del menú** ① y luego **\"Configuración\"** ②. Inicia sesión como usuario de\
    \ **Nivel 2**.\n2. Selecciona la opción **\"Cambio del código de acceso\"** ③.\n\
    3. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y que el cursor\
    \ parpadee ⑤.\n4. Puedes ver el código introducido pulsando el **icono del ojo**\
    \ ⑥.\n5. Introduce el nuevo código de acceso (**4 a 8 dígitos**) con el teclado\
    \ ⑦.\n6. Confirma seleccionando el símbolo **✓** ⑧.\n7. Repite los pasos 3 a 6\
    \ para confirmar el código.\n\n---\n\n## Cambio de contraseña de Nivel 2 y/o Nivel\
    \ 3 (desde usuario Nivel 3)\n\nProcedimiento desde el manual de puesta en marcha\
    \ [F1]:\n\n> ⚠️ Si estás en Nivel 3, puedes cambiar tanto el código de Nivel 2\
    \ como el de Nivel 3. Si estás en Nivel 2, solo puedes cambiar el código de Nivel\
    \ 2 [F1].\n\n1. Selecciona el **icono del menú** ① → **\"Ajustes\"** ② → inicia\
    \ sesión como usuario de **Nivel 3**.\n2. Selecciona **\"Cambio del código de\
    \ acceso\"** ③.\n3. Asegúrate de que el nivel correcto (**Nivel 2 o Nivel 3**)\
    \ ④ esté seleccionado y el cursor parpadee ⑤.\n4. Puedes ver el código pulsando\
    \ el **icono del ojo** ⑥.\n5. Introduce el nuevo código (**4 a 8 dígitos**) con\
    \ el teclado ⑦.\n6. Confirma seleccionando el símbolo ⑧.\n7. Repite los pasos\
    \ 3 a 6 para confirmar.\n8. Observa el mensaje **\"Cambio de código de acceso\
    \ satisfactorio\"** → selecciona **Aceptar**.\n9. **Sincroniza el programa con\
    \ la central** y realiza una **copia de seguridad del cambio en la nube** [F1].\n\
    \n---\n\n## Nota de seguridad\n\n> ⚠️ Se recomienda cambiar los códigos de fábrica\
    \ por códigos exclusivos. Asegúrate de que solo los usuarios autorizados conozcan\
    \ los códigos [F4].\n\n---\n\n## Lectura del código AL2 desde herramienta CLSS\n\
    \nSi necesitas recuperar la contraseña de Nivel 2, la herramienta **CLSS Configuration\
    \ Tool** permite leer el fichero **\"AL2 password\"** desde la central mediante\
    \ la función **Sincronizar → Read file from Panel to Tool** [F8].\n\n---\n\n**Fuentes:**\n\
    - HOP-138-8ES issue 6_01-2026_Co (sin revisión registrada) — Manual de puesta\
