    \ entrada o salida\n- Ajuste de acción de fallo no AUX:* entrada de alarma o avería\n\
    - Ajuste de supervisión de avería de cortocircuito o circuito abierto\n- Periodo\
    \ de retardo de confirmación de alarma\n- Ajuste no silenciable para la función\
    \ de LED remoto (solo equipos Opal); respuesta a la orden SILENCIAR SIRENAS\n\
    - Ajuste de entrada enclavada\n- Ajuste de supresión de pestaña AUX*\n* El tipo\
    \ de equipo de acción auxiliar (AUX) se utiliza para equipos con entrada enclavada/no\
    \ enclavada (predeterminada), no de incendio con sistemas de alarma contra incendios\
    \ Notifier.\" [F8]\n\n---\n\U0001F4D6 **Obligaciones de evidencia del manual:**\n\
    - \"Las centrales Pearl admiten equipos que incorporen aisladores internos, siempre\
