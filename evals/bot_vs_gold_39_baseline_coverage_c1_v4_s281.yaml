  bot_answer: '## Acceso al menú de programación avanzada — CAD-250


    El acceso a la configuración avanzada requiere dos pasos: primero autenticarse
    como administrador y luego navegar al submenú correspondiente.


    ---


    ### Paso 1 — Acceder como administrador


    1. Desde la **PANTALLA DE REPOSO**, toca el icono del **candado (🔒)** en la pantalla
    táctil [F1][F2].

    2. Se abrirá la **PANTALLA DE ACCESO** solicitando contraseña [F1][F2].

    3. Introduce la clave de administrador por defecto: **2222** [F1][F2].


    > ⚠️ Asegúrate de tener la autorización y los conocimientos necesarios. El uso
    indebido del nivel de administrador puede provocar mal funcionamiento de la instalación
    [F1][F2].


    ---


    ### Paso 2 — Navegar a AVANZADO


    Una vez dentro de la pantalla de administrador, sigue esta ruta [F3]:


    **AJUSTES** (Menú principal) **→ AVANZADO** (Submenú)


    El menú **AVANZADO** dispone de **3 pestañas** [F3]:


    - **SISTEMA:** configura número de cabinas (Paneles: 1–4), número de lazos (2,
    4, 6, 8, hasta 32 según cabinas) y LEDs de zona (0 ó 1) [F3].

    - **OTROS:** interruptores de puesta en marcha (Tiempo de inactividad, Salto a
    scroll si incidentes, Saltar a último incidente prioritario si timeout) [F3][F8].

    - **REINICIAR:** devuelve la configuración completa a valores de fábrica [F8].


    > ⚠️ Por razones de seguridad y cumplimiento normativo, los interruptores de inactividad,
    timeout y scroll deben estar activados (en verde) por defecto [F8].


    ---


    ### Nota sobre niveles de acceso


    Este nivel corresponde al **Nivel 2 — Editar configuración**, que da acceso completo
    a todos los parámetros: lazos, sectorización, maniobras, logs, red, ajustes e
    instalación [F4]. Los usuarios con nivel de instalador también tienen acceso sin
    restricciones a estas funciones [F10].


    ---


    **Fuente:** CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)


    ---


    También puedo ayudarte con: **configuración de lazos y dispositivos**, **creación
    de maniobras** o **gestión de usuarios y niveles de acceso** en la CAD-250.'
