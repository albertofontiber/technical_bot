  bot_answer: '# Alimentación y parámetros de seguridad intrínseca del IS-mA1


    ## Certificación y zonas de uso


    El IS-mA1 es un avisador acústico certificado **Ex ia IIC T4 Ga** [F1], apto para
    uso en **zonas 0, 1 y 2** con gases y vapores inflamables de grupos **IIA, IIB
    e IIC**, clases de temperatura T1 a T4 [F1]. Rango de temperatura ambiente: **-40
    °C ≤ Ta ≤ +60 °C** [F1].


    Certificaciones: **SIRA 05ATEX2084X** / **IECEx SIR 06.0045X** [F1]. Cumple **EN54-3**
    [F1].


    ---


    ## Parámetros de seguridad intrínseca de entrada (Entity Parameters)


    ### Terminales **+** respecto a **−** (alimentación principal)


    - **Ui = 28 V** [F1]

    - **Ii = 93 mA** [F1]

    - **Pi = 660 mW** [F1]

    - **Ci = 0** [F1]

    - **Li = 0** [F1]


    > ⚠️ La capacitancia total conectada a los terminales +/− (cable + cualquier otra
    capacitancia) **no debe superar 83 nF** [F4].


    ### Terminales **S2 y S3** respecto a **−** (activación 2.ª y 3.ª etapa de alarma)


    - **Ui = 28 V** [F1]

    - **Ii = 0 mA** [F1]

    - **Ci = 0** [F3]


    Adicionalmente, los terminales S2/S3 tienen parámetros de salida (para el circuito
    de retorno): **Uo = 16,8 V**, **Io = 7,3 mA**, **Po = 31 mW** [F3].


    > ⚠️ La distancia entre terminales S2 y S3 es **inferior a 6 mm** — precaución
    en el conexionado [F3].


    ---


    ## Cómo alimentar el IS-mA1 desde zona segura


    Existen dos métodos principales:


    ### Opción A — Barreras Zener (requieren tierra de alta integridad)


    **Alimentación principal (terminales +/−):**

    Usar una barrera Zener de canal único con parámetros de salida: **Uo ≤ 28 V**,
    **Io ≤ 93 mA**, **Po ≤ 660 mW**, **Co ≥ Ccable**, **Lo ≥ Lcable** [F3].


    **Control de etapas S2/S3:**

    Conectar mediante **barreras de retorno de diodo** (*diode return barrier*) certificadas
    Ex ia por un Organismo Notificado, con caída de tensión **< 0,9 V** [F8]. Los
    parámetros requeridos: **Uo ≤ 28 V**, **Io = 0** [F3].


    - **Alarma de 1 etapa:** una sola barrera Zener en el positivo (Fig 4) [F5].

    - **Alarma de 2 etapas:** barrera Zener + 1 barrera de retorno de diodo para S2
    (Fig 5/6) [F6].

    - **Alarma de 3 etapas:** barrera Zener + 2 barreras de retorno de diodo para
    S2 y S3 (Fig 6) [F6].


    ### Opción B — Aisladores galvánicos (no requieren tierra de alta integridad)


    **Alimentación principal:** cualquier aislador galvánico con parámetros de salida
    dentro de los límites de la sección 4.3, certificado Ex ia [F10].


    **Control de etapas S2/S3:** mediante **relés galvánicamente aislados** certificados
    Ex ia, con parámetros dentro de los límites de la sección 4.4 [F10].


    > Los aisladores galvánicos simplifican la instalación en sistemas pequeños donde
    no se dispone de tierra de alta integridad [F10].


    ---


    ## Requisitos de instalación críticos


    1. La resistencia entre la tierra de seguridad intrínseca y la tierra de protección
    debe ser **< 1 Ω** (aplicable con barreras Zener) [F3].

    2. El aparato asociado debe estar **aprobado FM** (para instalaciones bajo normativa
    americana) [F3].

    3. La instalación debe realizarla **personal cualificado** [F1].

    4. Las reparaciones solo puede realizarlas el **fabricante** o según el código
    de práctica aplicable [F1].

    5. Para evitar cargas electrostáticas, **limpiar únicamente con paño húmedo**
    [F1].

    6. **Desconectar la alimentación antes de cualquier intervención** para evitar
    ignición de atmósferas inflamables [F3].


    ---


    Fuentes: IS5001-F_IS-mA1_EN (Issue F, 06-08-15); manual IS MA1 (Issue H, 03-01-2020)


    ---


    También puedo ayudarte con: **selección de tono y configuración de etapas de alarma**,
    **dimensionado del cable IS (Ccable/Lcable)** o **requisitos de caja y prensaestopas
    IP65** del IS-mA1.


    ---

    ⚠️ **Información adicional del manual:**

    - "CAUTION - The clearance between sounder terminals S2 and S3 is less than 6mm."
    [F4]

    - "CAUTION - Bonding between conduit connections is not automatic and must be
    provided as part of this installation." [F4]


    ---

    ⚠️ **Obligaciones de evidencia del manual:**

    - "The IS-mA1 minialarm is an ATEX and IECEx certified intrinsically safe sounder
    which produces a loud warning signal in a hazardous area." (IS5001-F_IS-mA1_EN,
    p. 1) [F11]'
