- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en revisar el parámetro r.I, averías enclavadas y el procedimiento
    de rearme, pero omite o trata de forma insuficiente puntos clave como ABORT enclavado,
    t.A/duración de descarga, Flow Press y zonas aún en alarma. Además introduce un
    parámetro/explicación 'ri' confusa o alucinada y confunde referencias como t.Fi
    frente a t.A, lo que puede inducir a error.
  bot_sources:
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103I_RP1r-Supra_lr
  - HLSI-MN-103_RP1r-Supra_lr
  coverage_status: appended
  coverage_appended_rows: 4
  release_profile: coverage_c1_v4
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: '# RP1r-Supra: Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento es **esperado por normativa** y está controlado por varios
    parámetros. Aquí tienes qué comprobar, por orden:


    ---


    ## 1. Parámetro **r.i** — Rearme inhibido tras extinción


    Este es el primer punto a verificar. Según la norma **UNE-EN 12094-1:2004, apartado
    4.12.2**, existe un intervalo de tiempo programable durante el cual la central
    **bloquea el rearme** [F13].


    Los valores posibles son [F13]:

    - **- -** → Rearme inhibido hasta finalizar extinción o cuando se agote el tiempo
    configurado en el parámetro **t.Fi** (t.A → 0 seg.)

    - **00** → Rearme permitido en cualquier momento *(valor por defecto)*

    - **De 01 a 30** → Rearme inhibido durante el intervalo definido (en minutos)


    **Acción:** Accede al modo de programación (nivel 3) y comprueba el valor del
    parámetro **r.i**. Si está configurado con un valor de 01 a 30, la central no
    permitirá el rearme hasta que transcurra ese tiempo.


    ---


    ## 2. Parámetro **ri** — Resumen inhibido tras extinción


    Relacionado con el anterior. Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2**,
    tras la extinción realizada, el sistema debe pasar a **estado inhibido** para
    evitar reiniciar el proceso de extinción [F2].


    Los valores posibles son [F2]:

    - **00** → Resumen inhibido desde finalizar extinción o cuando agotado el tiempo
    configurado en **ri** *(por defecto)*

    - **01 a 30** → Resumen inhibido después de intervención o reposición, en minutos


    **Acción:** Verifica el valor de **ri**. Si está activo, la central permanecerá
    en estado inhibido hasta que transcurra el tiempo configurado **o hasta que se
    realice la intervención/reposición manual**.


    ---


    ## 3. Averías enclavadas pendientes de rearme manual


    Todas las averías son **por defecto enclavadas** y requieren rearme manual de
    la central para su restablecimiento [F3]. Comprueba si hay alguno de estos LEDs
    activos en el panel frontal [F10]:


    - **Presión ⚠ Flujo** (señal de flujo activa)

    - **Presión ⚠ Baja** (baja presión)

    - **Cto. Supervisión ⚠ Paro**

    - **Cto. Supervisión ⚠ Espera**

    - **Cto. Supervisión ⚠ Puerta Abierta**

    - **Avería Extinción ⚠**

    - **Avería Circuito Extinción ⚠**


    Si alguno de estos LEDs está **intermitente**, hay una condición de avería activa
    que impide el retorno al estado normal. Resuelve la causa física antes de rearmar.


    > ⚠️ **Nota:** La excepción es la avería en el circuito de paro — esta NO puede
    configurarse como rearme automático. El resto sí pueden modificarse para rearme
    automático mediante las **funciones especiales (sección 5.4)** [F3].


    ---


    ## 4. Procedimiento de rearme


    Una vez resueltas las condiciones anteriores [F3] [F1]:

    1. Accede con **nivel 2** de acceso (código de usuario válido)

    2. Pulsa la tecla **"Rearme"**

    3. La central se reiniciará y todas las entradas enclavadas se restablecerán


    > ℹ️ Recuerda que según **UNE-EN 12094-1:2004, sección 4.12.2**, es posible que
    la función de rearme esté temporalmente inhibida una vez la central ha entrado
    en modo ACTIVADO, mediante el parámetro **[F.1]** [F12].


    ---


    **Resumen del flujo de diagnóstico:**

    1. ¿Está activo el temporizador de inhibición **r.i**? → Esperar o reconfigurar

    2. ¿Está activo el parámetro **ri** con tiempo de resumen inhibido? → Esperar
    o intervenir físicamente

    3. ¿Hay LEDs de avería intermitentes en el panel? → Resolver causa física primero

    4. Rearmar con nivel 2


    ---


    Fuentes: HLSI-MN-103_RP1r-Supra_lr (rev. v.07, 2018-05-01); HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
    (sin revisión registrada); HLSI-MN-103I_RP1r-Supra_lr (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración del parámetro r.i paso a paso**, **interpretación
    de LEDs de avería en el panel frontal** o **funciones especiales de rearme automático
    (sección 5.4)** de la RP1r-Supra.'
