  bot_answer: '# FAAST LT-200 — Salidas de relé y sirena


    Los fragmentos disponibles corresponden a **dos variantes** del FAAST LT-200 con
    diferencias importantes entre sí. Te presento la información de cada una por separado.


    ---


    ## 1. Versión Stand-Alone (HS) — Manual I56-6574-005_ES


    ### Relés disponibles y sus contactos [F6]


    **Relé de Alarma — Canal 1** (terminales T1):

    - Terminal 5: Relé de alarma **NC** — C1

    - Terminal 6: Relé de alarma **C** — C1

    - Terminal 7: Relé de alarma **NA** — C1


    **Relé de Alarma — Canal 2** (terminales T2):

    - Terminal 8: Relé de alarma **NC** — C2

    - Terminal 9: Relé de alarma **C** — C2

    - Terminal 10: Relé de alarma **NA** — C2


    **Relé de Avería — Canal 1** (terminales T3):

    - Terminal 11: Relé de avería **NC** — C1

    - Terminal 12: Relé de avería **C** — C1

    - Terminal 13: Relé de avería **NA** — C1


    **Relé de Avería AUX — Canal 2** (terminales T4):

    - Terminal 14: Relé de avería **NC** (AUX.) — C2

    - Terminal 15: Relé de avería **C** (AUX.) — C2

    - Terminal 16: Relé de avería **NA** (AUX.) — C2


    **Relé de Prealarma — Canal 1** (terminales T9):

    - Terminal 23: Relé de prealarma **NC** — C1

    - Terminal 24: Relé de prealarma **C** — C1

    - Terminal 25: Relé de prealarma **NA** — C1


    **Relé de Prealarma — Canal 2** (terminales T10):

    - Terminal 26: Relé de prealarma **NC** — C2

    - Terminal 27: Relé de prealarma **C** — C2

    - Terminal 28: Relé de prealarma **NA** — C2


    ### Salidas de sirena [F6]

    - Terminales T5: Salida sirena 1 — (terminal 17) y Salida sirena 1 + (terminal
    18) → **Resistencia de fin de línea de 47 kΩ**

    - Terminales T6: Salida sirena 2 — (terminal 19) y Salida sirena 2 + (terminal
    20) → **Resistencia de fin de línea de 47 kΩ**


    ### Comportamiento de los relés [F3]


    **Relé de Alarma 1 o 2:**

    - Se activa cuando se cumple la condición de alarma en un canal [F3]

    - Condición predeterminada = **Nivel 1** [F3]

    - El estado de alarma está **enclavado por defecto**; se necesita un **rearme
    manual** para desactivar el LED y el relé [F3]


    **Relé de Prealarma 1 o 2:**

    - Se activa cuando se cumple la condición de prealarma en un canal [F3]

    - Condición predeterminada = **Nivel 1** [F3]

    - Cuando Prealarma = Alarma = Nivel 1, la prealarma se activará al **70 % del
    nivel 1** [F3]


    **Relé de Avería 1 o 2:**

    - Se activa ante condición de avería en canal 1 o 2, o avería común [F3]

    - También se activa en **modo de servicio** y cuando se **desconecta la alimentación
    de la unidad** [F3]

    - El estado de avería **no está enclavado** (predeterminado) [F3]


    **Relé de Sirena 1 o 2:**

    - Se activa cuando el canal está en **ALARMA o PREALARMA** [F3]

    - Sirena 1 corresponde al canal 1; Sirena 2 corresponde al canal 2 [F3]

    - Estado predeterminado = establecido en **ALARMA** [F3]


    ---


    ## 2. Versión Loop — Manual I56-6575-005_ES


    ### Relés disponibles y sus contactos [F5]


    **Relé de Alarma — Canal 1** (terminales T2):

    - Terminal 5: Relé de alarma **NC** — C1

    - Terminal 6: Relé de alarma **C** — C1

    - Terminal 7: Relé de alarma **NA** — C1


    **Relé de Alarma — Canal 2** (terminales T3):

    - Terminal 8: Relé de alarma **NC** — C2

    - Terminal 9: Relé de alarma **C** — C2

    - Terminal 10: Relé de alarma **NA** — C2


    **Relé de Avería — Canal 1** (terminales T4):

    - Terminal 11: Relé de avería **NC** — C1

    - Terminal 12: Relé de avería **C** — C1

    - Terminal 13: Relé de avería **NA** — C1


    **Relé de Avería AUX — Canal 2** (terminales T5):

    - Terminal 14: Relé de avería **NC** (AUX.) — C2

    - Terminal 15: Relé de avería **C** (AUX.) — C2

    - Terminal 16: Relé de avería **NA** (AUX.) — C2


    > ⚠️ **Diferencia clave respecto a la versión Stand-Alone:** la versión Loop **no
    dispone de relés de prealarma** en los terminales de cableado [F5]. Los terminales
    23–28 en esta versión están asignados al lazo y al aislador [F5].


    ### Salidas de sirena [F5]

    - Terminales T6: Salida sirena 1 — (terminal 17) y Salida sirena 1 + (terminal
    18) → **Resistencia de fin de línea de 47 kΩ**

    - Terminales T7: Salida sirena 2 — (terminal 19) y Salida sirena 2 + (terminal
    20) → **Resistencia de fin de línea de 47 kΩ**


    ### Comportamiento de los relés [F4]


    **Relé de Alarma 1 o 2:**

    - Controlada por el panel cuando determina que se da la condición de alarma [F4]

    - Encendido y apagado por el panel; **no enclavado** [F4]


    **Relé de Avería 1 o 2:**

    - Se activa ante condición de avería en canal 1 o 2, o avería común [F4]

    - También se activa en **modo de servicio** y cuando se **desconecta la alimentación
    de la unidad** [F4]

    - El estado de avería **no está enclavado** [F4]


    **Relé de Sirena 1 o 2:**

