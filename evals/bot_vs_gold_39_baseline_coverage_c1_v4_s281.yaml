  bot_answer: "# Notifier PEARL — Capacidad de lazo SLC, límites de aisladores y alta/edición\
    \ de equipos\n\n---\n\n## 1. Capacidad máxima de equipos por lazo\n\n**Protocolo\
    \ Opal:**\n- Hasta **159 sensores + 159 módulos** por lazo [F1][F2]\n- Total:\
    \ **318 equipos por lazo** [F1]\n\n**Protocolo CLIP:**\n- Hasta **99 sensores\
    \ + 99 módulos** por lazo [F2]\n\n**Protocolo mixto Opal + CLIP:**\n- El límite\
    \ de equipos CLIP en lazo mixto es de **40** [F5]\n- Si se supera ese límite,\
    \ la autoconfiguración continúa pero señala fallos [F5]\n\n**Límite global del\
    \ sistema (ambos lazos):**\n- Máximo **512 sensores y/o pulsadores manuales**\
    \ en total entre los dos lazos analógicos, incluyendo detectores y pulsadores\
    \ de zona convencionales conectados (requisito **EN54-2: 13-7**) [F1]\n\n**Carga\
    \ máxima por lazo:** **0,75 A** [F2]\n\n---\n\n## 2. Límites de cableado — Aisladores\n\
    \n**Regla general EN54-2 (art. 12.5.2):** máximo **32 equipos entre aisladores**\
    \ [F1]\n\nPara la Pearl, los límites concretos son:\n\n- **Equipos sin aisladores\
    \ internos** (incluidos CLIP y algunos Opal): **no más de 20 equipos entre aisladores**\
    \ [F1]\n- **Equipos con aisladores internos** (con base **B501 AP**): el lazo\
    \ cumple directamente los requisitos de EN54-2 [F1]\n- La nota del diagrama de\
    \ cableado (sección 6.4.2) precisa: **no más de 25 equipos entre aisladores**\
    \ (20 si se usan aisladores FET) [F9]\n\n> ⚠️ **Importante para el arranque del\
    \ lazo:** la carga entre aisladores no debe superar **20 SU** para garantizar\
    \ que los aisladores se cierren al aplicar alimentación [F6]\n\n**Cargas SU de\
    \ equipos CLIP relevantes:**\n- Detector por rayo LPB-700: **6 SU** [F6]\n- Sirenas\
    \ de lazo: **3 SU** [F6]\n- Módulo ZMX-1: **3 SU** [F6]\n- Módulo MMX-10M/CMX10-RM:\
    \ **10 SU** [F6]\n- Resto de equipos: **1 SU** [F6]\n\n**Longitud máxima del lazo:**\
    \ **2000 metros** (longitud total del par de comunicaciones) [F10]\n\n**Resistencia\
    \ de cada aislador:** entre **0,1 y 0,13 ohms** [F12]\n\n**Capacitancia máxima\
    \ del cable:** inferior a **0,5 µF** [F12]\n\n> ⚠️ **NUNCA uses un multímetro\
    \ de alta tensión (tipo Megger) en el lazo** una vez conectados los equipos y\
    \ aisladores [F1]\n\n---\n\n## 3. Alta de equipos — Autoconfiguración\n\nLa forma\
    \ más rápida de dar de alta equipos es mediante la **autoconfiguración** desde\
    \ el menú de la central [F4]:\n\n1. Accede al menú de configuración (nivel de\
    \ acceso requerido) [F4]\n2. Selecciona **1: Autoconfiguración** [F4]\n3. Elige\
    \ si aplica a **todos los lazos** o a un **lazo específico** [F4]\n4. Selecciona\
    \ el protocolo:\n   - **1: Todos Prot. OPAL/CLIP** → detecta duplicidades de dirección\
    \ [F4]\n   - **2: OPAL/CLIP (No detecta duplicidad)** → más rápido, sin comprobación\
    \ de duplicados [F4]\n   - **3: Sólo con protocolo CLIP** → solo autoconfigura\
    \ equipos CLIP aunque haya Opal en el lazo [F4]\n5. Selecciona el modo de operación:\n\
    \   - **1: Permite Añadir/Borrar/Cambiar** [F5]\n   - **2: Sólo Añadir Nuevos\
    \ Equipos** [F5]\n6. El proceso se inicia automáticamente. Al finalizar se muestran\
    \ los resultados por lazo (navega con las teclas **◄/►**) [F5]\n\n> **Nota:**\
    \ Si se autoconfigura un equipo Opal, por defecto será Opal. Si el número de equipos\
    \ CLIP supera los 40, selecciona manualmente la opción «Sólo con protocolo CLIP»\
    \ [F5]\n\n> **Nota:** Los pulsadores CLIP se autoconfiguran como «MON» y **deben\
    \ cambiarse manualmente a tipo «cPUL»** [F8]\n\nLa configuración puede transferirse\
    \ a un ordenador portátil con el programa **ITS** para editarla y archivarla [F4].\
    \ Los equipos configurados pueden consultarse en cualquier momento desde el **nivel\
    \ de acceso 2 → «Resumen de Equipos»** [F4].\n\n---\n\n## 4. Edición individual\
    \ de equipos\n\nDesde el menú de configuración se puede editar cada sensor o módulo\
    \ individualmente [F3][F8].\n\n**Para sensores**, los parámetros editables incluyen\
    \ [F3]:\n- Tipo de equipo\n- Número de zona (hasta 255 locales o 8192 de red)\n\
    - Número de célula (hasta 255)\n- Ajuste de nivel de alarma, prealarma y alarma\
    \ horaria\n- Selección de programación horaria (cambio de sensibilidad)\n- Retardo\
    \ de alarma\n- Retardo de confirmación de coincidencia de detector (hasta **240\
    \ s / 4 min**) [F3]\n- Grupo AWACS (50 grupos, solo sensores CLIP salvo HEAT)\n\
    - Prioridad de interrogación (solo CLIP, limitada a **30 equipos**) [F3]\n- Acción\
    \ de parpadeo y color LED (solo Opal)\n- Ajuste LED remoto: «Seguir el equipo»\
    \ o «Controlada por reglas causa-efecto» (solo Opal)\n- Número de aplicación (solo\
    \ equipos SMART 4)\n- Operación solo modo térmico L6 (solo SMART y Optiplex)\n\
    \n**Para módulos**, los parámetros editables incluyen [F8]:\n- Tipo de equipo\n\
    - Número de zona (hasta 255 locales o 8192 de red)\n- Número de célula (hasta\
    \ 255)\n- Prioridad de interrogación (solo CLIP, limitada a **30 equipos**) [F8]\n\
    - Función de subdirecciones (entrada o salida)\n- Ajuste de acción de fallo no\
    \ AUX: entrada de alarma o avería\n- Supervisión de avería de cortocircuito o\
    \ circuito abierto\n- Periodo de retardo de confirmación de alarma\n- Ajuste de\
    \ entrada enclavada\n- Asignación para alimentación de potenciador de lazo (solo\
    \ alarma)\n- Ajuste LED remoto no silenciable (solo Opal)\n\n> ⚠️ Algunos ajustes\
    \ de retardo de alarma en módulos pueden **contravenir los requisitos de EN54-2**\
    \ [F8]\n\n---\n\n**Fuentes:**\n- Manual de instalación y puesta en marcha PEARL,\
    \ ref. 997-669-005-3 (sin revisión registrada)\n- Manual de configuración de la\
    \ central PEARL, ref. 997-671-005-3 (rev. 997-671-005-3)\n\n---\n\nTambién puedo\
    \ ayudarte con: **conexionado físico del lazo en la placa base**, **configuración\
    \ del Loop Splitter 795-131** o **reglas de causa-efecto para módulos de salida**.\n\
    \n---\n⚠️ **Información adicional del manual:**\n- \"La resistencia máxima del\
    \ lazo no debe superar los límites definidos en **«6.4.2 Comprobaciones del lazo\
    \ antes de conectar el cableado»**, paso 2.\" [F12]\n- \"Es de vital importancia\
    \ que el cable utilizado sea de buena calidad y que se instale de forma correcta.\"\
    \ [F12]\n- \"- Números de referencia de la zona de red\n- Tipo de equipo\n- Entorno\
    \ del número de referencia de zona (opcional)\n- Número de central (Central LOCAL;\
    \ 1-125: otras centrales de red). Esta columna no siempre se muestra, ya que depende\
    \ del tipo de numeración de zona seleccionada.\n- Número de zonas (hasta 255 zonas\
    \ locales o 8192 zonas de red)\n- Número de células (hasta 255)\n- Prioridad de\
    \ interrogación (operación solo protocolo CLIP: limitada a 30 equipos)\n- Acción\
    \ de parpadeo en equipo interrogado. Elección del color solo para equipos Opal.\n\
    - Opción de tipo de equipo (VIEW, Optiplex y SMART)\n- Ajuste del nivel de alarma\n\
    - Ajuste del nivel de alarma horaria\n- Ajuste del nivel de prealarma\n- Selección\
    \ de programación horaria (cambio de sensibilidad de sensor)\n- Grupo AWACS (50\
    \ grupos con todos los sensores CLIP salvo HEAT)\n- Retardo de alarma\n- Ajuste\
    \ no silenciable para la función de LED remoto (solo equipos Opal); respuesta\
    \ a la orden SILENCIAR SIRENAS.\n- Operación solo modo térmico (L6) (solo SMART\
    \ y Optiplex)\n- Número de aplicación (solo equipos SMART 4)\n- Ajuste de la función\
    \ LED remota (solo equipos Opal): las opciones son: Seguir el equipo (predeterminada)\
    \ o Controlada por las reglas de causa-efecto.\n- Retardo de confirmación de coincidencia\
    \ de detector; puede ajustarse hasta 240 s (4 min). Puede usarse con dependencia\
    \ tipo B.\" [F3]\n- \"- Números de referencia de la zona de red\n- Tipo de equipo\n\
    - Entorno del número de referencia de zona (opcional)\n- Número de central (Central\
    \ LOCAL; 1-64: otras centrales de red). Esta columna no siempre se muestra, ya\
    \ que depende del tipo de numeración de zona seleccionada.\n- Número de zonas\
    \ (hasta 255 zonas locales o 8192 zonas de red)\n- Número de células (hasta 255)\n\
    - Prioridad de interrogación (operación solo protocolo CLIP: limitada a 30 equipos)\n\
    - Acción de parpadeo en equipo interrogado. Elección del color solo para equipos\
