  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: '# ASD532 — Clases EN 54-20 y monitorización del flujo de aire


    ---


    ## 1. Clases de sensibilidad según EN 54-20


    El ASD 532 cumple los requisitos de la norma **EN 54-20** en sus tres clases [F7]:


    - **Clase A** — Sensibilidad muy alta

    - **Clase B** — Sensibilidad alta

    - **Clase C** — Sensibilidad normal


    La elección de la clase determina el sensor de humo a instalar y el umbral de
    alarma a configurar [F1]:


    - **SSD 532-1**: rango de sensibilidad **0,5 %/m hasta 10 %/m** [F1]

    - **SSD 532-2**: rango de sensibilidad **0,1 %/m hasta 10 %/m** [F1]

    - **SSD 532-3**: rango de sensibilidad **0,02 %/m hasta 10 %/m** [F1]


    La selección del tipo de sensor y el ajuste de sensibilidad se realiza mediante
    el mando del **AMB 32** (posiciones de conmutador predeterminadas, cap. 4.4.4
    a 4.4.4.3) o mediante el software de cálculo **«ASD PipeFlow»** junto con el software
    de configuración **«ASD Config»** (cap. 7.2.1) [F1].


    ---


    ## 2. Monitorización del flujo de aire


    ### Principio de funcionamiento


    La monitorización se basa en el **método de medición calorimétrico** (técnica
    de medición de flujo en masa) [F3]. El sensor de flujo de aire, ubicado en la
    caja del detector, detecta cambios en el conducto de aspiración (rotura de tubo
    u obstrucción) [F3].


    Durante el **reset inicial** (con el conducto de aspiración intacto), los valores
    de flujo se registran y memorizan como **valores nominales (100 %)**. El sistema
    crea electrónicamente una ventana de monitorización centrada en ese valor. Si
    los valores reales se salen de esa ventana, el ASD 532 dispara el aviso **«Fallo
    flujo de aire»** [F3].


    ### Requisito normativo EN 54-20


    Según **EN 54-20**, debe notificarse como fallo toda variación del flujo de aire
    superior a **±20 %** [F3]:

    - Por debajo del **80 %** → suciedad/obstrucción

    - Por encima del **120 %** → rotura de tubo


    En las posiciones de conmutador **A11 a C31**, una variación superior a ±20 %
    dispara el aviso «Fallo flujo de aire» una vez transcurrido el tiempo de retardo
    de **300 s** [F3].


    ---


    ## 3. Configuración de la monitorización del flujo de aire


    ### Vía A — Con homologación EN 54-20 (posiciones A11 a C31)


    Selecciona la posición de conmutador correspondiente a tu clase EN 54-20 [F5]:


    1. Determina la clase requerida (A, B o C).

    2. Si usas **«ASD PipeFlow»**: calcula el proyecto → introduce el resultado en
    **«ASD Config»** → selecciona posición **X01, X02 o X03** [F5].

    3. Si **no** usas «ASD PipeFlow» (EasyConfig): selecciona los límites del sistema
    según cap. 4.4.4.3 → selecciona posición **A11 a C31** [F5].


    ### Vía B — Sin homologación EN 54-20 (posiciones W01 a W44)


    Las posiciones **W01 a W44** cumplen la sensibilidad de alarma según EN 54-20
    (clases A–C), **pero NO los límites normativos de monitorización del flujo de
    aire** [F4].


    > ⚠️ **Advertencia**: Las posiciones W01 a W44 **únicamente deben utilizarse previa
    consulta con el fabricante** [F4][F5].


    Estas posiciones permiten configurar combinaciones de ventana de monitorización
    y tiempo de retardo distintas al estándar normativo [F2]:


    **Clase A (Sensibilidad muy alta) — Límite de sistema 1:**

    - W01: retardo **10 min**, desviación **±20 %** [F2]

    - W02: retardo **60 min**, desviación **±20 %** [F2]

    - W03: retardo **10 min**, desviación **±50 %** [F2]

    - W04: retardo **60 min**, desviación **±50 %** [F2]


    **Clase B (Sensibilidad alta) — Límite de sistema 1:**

    - W09: retardo **10 min**, desviación **±20 %** [F2]

    - W10: retardo **60 min**, desviación **±20 %** [F2]

    - W11: retardo **10 min**, desviación **±50 %** [F2]

    - W12: retardo **60 min**, desviación **±50 %** [F2]


    **Clase B — Límite de sistema 2:**

    - W17: retardo **10 min**, desviación **±20 %** [F2]

    - W18: retardo **60 min**, desviación **±20 %** [F2]

    - W19: retardo **10 min**, desviación **±50 %** [F2]

    - W20: retardo **60 min**, desviación **±50 %** [F2]


    **Clase C (Sensibilidad normal) — Límites de sistema 1, 2 y 3:**

    - W25–W28 (límite 1), W33–W36 (límite 2), W41–W44 (límite 3): mismas combinaciones
    de retardo (10/60 min) y desviación (±20 %/±50 %) [F2]


    ### Advertencias críticas de configuración


    > ⚠️ El aumento de los valores de monitorización por encima de **±20 % / 300 s**
    implica **incumplimiento de EN 54-20** y solo puede efectuarse previa consulta
    con el fabricante [F5].


    > ⚠️ El tamaño de la ventana **no debería quedar por debajo de ±20 %**. Si se
    usan ventanas más pequeñas, el tiempo de retardo debe aumentarse a **10 min como
    mínimo** para evitar avisos de fallo erróneos [F5].


    ---


    **Fuente:** ASD532_TD_T140421es_a (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de reset inicial y registro de valores
    nominales**, **selección del sensor SSD 532-x según clase EN 54-20** o **uso del
    software ASD Config para configuración avanzada**.


    ---

    ⚠️ **Obligaciones de evidencia del manual:**

    - "No obstante, el umbral de disparo definitivo nunca podrá ser inferior al umbral
    de disparo mínimo posible (dependerá del tipo de sensor de humo, véase ejemplo
    2) ni superior al umbral de disparo exigido para el cumplimiento de EN 54-20 (véase
    ejemplo 3)." (ASD532_TD_T140421es_a, p. 26) [F9]

    - "Con carácter general, para la instalación, el proyecto y el uso del detector
    de humos por aspiración ASD 532 serán aplicables las disposiciones y directrices
    específicas de cada país." (ASD532_TD_T140421es_a, p. 37) [F7]'
