    ## Terminales de lazo (comunes a ambos modos)


    Los terminales de conexión al lazo son [F1][F4][F7]:


    - **Terminal 1** → Lazo salida (–)

    - **Terminal 2** → Lazo salida (+) *(con aislador interno activo)*

    - **Terminal 3** → Lazo entrada (–)

    - **Terminal 4** → Lazo entrada (+)

    - **Terminal 5** → Lazo salida (+) alternativo *(sin aislador interno)*


    > ⚠️ **Aislador interno:** Si **no** se necesita aislamiento de cortocircuitos,
    conecta el positivo de salida del lazo al **Terminal 5** en lugar del Terminal
    2. El Terminal 5 está conectado internamente con el Terminal 4 [F4][F7].


    ---


    ## Modo 2 estados


    - La entrada de supervisión se conecta entre los **Terminales 6 y 7** [F1].

    - **Resistencia de fin de línea (RFL): 47 kΩ** en paralelo con la entrada [F1].

    - Comportamiento: **cortocircuito = alarma** [F1].


    ---


    ## Modo 3 estados


    - Se añade una **resistencia de 18 kΩ en serie** con cada contacto de alarma supervisado
    [F1][F2][F4][F7].

    - La RFL sigue siendo **47 kΩ** [F1].

    - Comportamiento: permite distinguir **cortocircuito como avería** (en lugar de
    alarma), siempre que la central lo permita [F2][F4].

    - En conexión a 2 hilos: la resistencia de **18 kΩ** va en serie con el contacto
    NA, y la de **47 kΩ** en paralelo al final de línea [F9].

    - En conexión a 4 hilos: la resistencia de **18 kΩ** va en serie con el contacto
    NA [F9].

    - Ambas resistencias: **5% ¼ W** [F9].


    ---


    ## Nota sobre terminales 8 y 9


    - En el **M710 / MI-DMMI** (entrada única): **no hay conexiones en los terminales
    8 y 9** [F4][F7].

