  bot_answer: "# Programación de ecuación CBE en AM-8200 para activar una salida\n\
    \n## Concepto previo\n\nLas **CBE (Control By Events)** son ecuaciones que activan\
    \ un comando (salida) en función de un evento [F2]. La longitud máxima de una\
    \ CBE es de **64 caracteres** [F2].\n\n> **IMPORTANTE:** Para los módulos de salida,\
    \ la central **no permite** programar una ecuación si el módulo tiene un TIPO\
    \ ID para señalizaciones de carácter general [F3].\n\n---\n\n## Paso a paso: Programar\
    \ la CBE en un módulo de salida\n\n### 1. Acceder al módulo de salida\n\nNavega\
    \ al menú: **MENÚ PROGRAMACIÓN → Puntos → Módulos** [F1]\n\n### 2. Seleccionar\
    \ el módulo de salida\n\nUsa las teclas **▲▼** para navegar hasta el módulo de\
    \ salida deseado [F2].\n\n### 3. Ir a la pestaña \"Programación\"\n\nSelecciona\
    \ la pestaña **Programmazione** con las teclas de navegación [F2].\n\n### 4. Editar\
    \ el campo CBE\n\n- Selecciona el parámetro **CBE** con las teclas **▲▼** [F2]\n\
    - Pulsa la tecla de confirmación **☑** para entrar en edición [F2]\n- Si ya hay\
    \ una ecuación configurada, se visualizará; si no, el campo estará vacío [F2]\n\
    \n### 5. Introducir la ecuación\n\nUsa el teclado alfanumérico para escribir la\
    \ ecuación [F2]. Pulsa **Enter** para confirmar [F2].\n\n---\n\n## Operadores\
    \ disponibles y ejemplos\n\n### OR — Al menos UN operando activo [F3]\n```\nOR\
    \ (G9 G15 G23)\n```\nSi el grupo G9, G15 **o** G23 está en alarma → la salida\
    \ se activa.\n*(El operador OR puede omitirse: `(G9 G15 G23)` es equivalente)*\
    \ [F3]\n\n---\n\n### AND — TODOS los operandos activos [F3]\n```\nAND (G9 G15\
    \ G23)\n```\nSolo si G9, G15 **y** G23 están en alarma simultáneamente → la salida\
    \ se activa.\n\n---\n\n### NOT — Niega el operando [F3]\n```\nNOT (G23)\n```\n\
    La salida estará activa mientras G23 **NO** esté en alarma. Cuando G23 entra en\
    \ alarma → la salida se desactiva.\n\n---\n\n### XGRP — Al menos DOS elementos\
    \ del grupo activos [F4]\n```\nXGRP (G23)\n```\nSe activa cuando al menos 2 dispositivos\
    \ del grupo G23 están activos (doble coincidencia = SÍ), o cuando un sensor térmico\
    \ y uno óptico del mismo grupo están activos (doble coincidencia = NO) [F4].\n\
    > **Nota:** No se permite `XGRP (G23 G24)` — solo un grupo por operador XGRP [F4].\n\
    \n---\n\n### DEL — Retardo de activación [F7]\n```\nDEL (MM.SS retardo  MM.SS\
    \ duración  (CONDICIÓN))\n```\nEjemplo: `DEL (00.30 01.30 (G21))` → activa la\
    \ salida 30 seg. después de que G21 se active, y permanece activa 1 min 30 seg\
    \ [F7].\n- Retardo máximo: **10 minutos** [F7]\n- Duración máxima: **10 minutos**\
    \ [F7]\n- Solo puede haber **un operador DEL por ecuación** [F7]\n\n---\n\n###\
    \ PRE — Estado de pre-alarma de un sensor [F6]\n```\nOR (PRE(C1L1S2) PRE(C2L1S10))\n\
    ```\nSi cualquiera de los sensores está en pre-alarma → la salida se activa [F6].\n\
    \n---\n\n### FLT — Estado de avería de un dispositivo o zona [F5]\n```\nOR (FLT(C1L1S2)\
    \ FLT(Z1))\n```\nSi el sensor o la zona está en avería → la salida se activa [F5].\n\
    \n---\n\n### DIS — Recuperación del estado de desactivación [F8]\n```\n(DIS(Z1))\n\
    ```\nCuando la Zona 1 está desactivada → el módulo de salida se activa [F8].\n\
    \n---\n\n## Restricciones importantes en grupos directos e inversos\n\n- **Grupos\
    \ directos:** No se puede escribir una CBE para un grupo directo si los operandos\
    \ tienen índice **menor** que el grupo destino [F3].\n  - ❌ `G33 = (G23 G24)`\
    \ → NO permitido\n  - ✅ `G21 = (G23 G24)` → Permitido\n\n- **Grupos inversos:**\
    \ No se puede escribir una CBE para un grupo inverso si los operandos tienen índice\
    \ **mayor** que el grupo destino [F3].\n  - ❌ `G305 = (G306 G307)` → NO permitido\n\
    \  - ✅ `G307 = (G305 G306)` → Permitido\n\n---\n\n## Ejemplo práctico completo\n\
    \nPara activar el módulo de salida **L01M01** cuando cualquiera de 16 grupos esté\
    \ en alarma, usando grupos inversos intermedios [F9]:\n\n```\nG301 = OR (G1 G2\
    \ G3 G4 G5 G6 G7 G8)\nG302 = OR (G9 G10 G11 G12 G13 G14 G15 G16)\nL01M01 CBE =\
    \ OR (G301 G302)\n```\n\n---\n\n> El manual remite al **Apéndice «A» Control By\
    \ Event** al final del manual para información completa sobre CBE [F2].\n\n**Fuente:**\
    \ AM-8200 Manual de programación — Doc. M-162.1-AM8200-ESP Rev A.3 (Honeywell\
    \ Life Safety Iberia)\n\n---\n\nTambién puedo ayudarte con: **asignación de grupos\
    \ software a sensores**, **programación de retardos de evacuación** o **configuración\
    \ del TIPO ID en módulos de salida**.\n\n---\n⚠️ **Información adicional del manual:**\n\
    - \"Si, por el contrario, el dispositivo en cuestión es un módulo de salida, esta\
    \ salida no se activará nunca, a no ser que se programe con software TIPO ID para\
    \ señalizaciones generales.\" [F3]\n- Nota: el manual también indica: \"Si **CUALQUIERA**\
    \ de los tres operandos de esta ecuación (G9 G15 G23) está en alarma, el módulo\
    \ de salida se activará, es decir:\" [F3] · \"- **SI** el grupo software 9 está\
    \ en alarma, o\n- **SI** el grupo software 15 está en alarma, o\n- **SI** el grupo\
    \ software 23 está en alarma\n- **ENTONCES** este módulo de salida se activará.\"\
    \ [F3]\n- \"**Zona** - número de zona asignada\n\n**CBE** - ecuación CBE del punto.\"\
    \ [F2]"
