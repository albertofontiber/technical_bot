  bot_answer: "# Conexión del módulo de aislamiento de línea en lazo ID2000\n\n##\
    \ Regla de instalación (requisito normativo)\n\nSegún **EN54-2: 12.5.2** [F5],\
    \ los aisladores son **obligatorios** en cada lazo analógico para separar sensores\
    \ y pulsadores. La regla de espaciado es:\n\n- **Máximo 25 equipos de lazo entre\
    \ aisladores** (regla general ID2000) [F5]\n- **Máximo 20 equipos entre aisladores\
    \ si se usan aisladores tipo FET** [F5]\n- El límite normativo EN54-2 es 32 equipos,\
    \ pero la ID2000 impone el límite más restrictivo de 25 (o 20 con FET) [F2][F5]\n\
    \n---\n\n## Posición en el lazo\n\nEl aislador se conecta **en serie dentro del\
    \ lazo**, con **4 terminales** numerados [F2]:\n\n- **Terminales 1 y 2** → entrada\
    \ del lazo (lado panel o aislador anterior)\n- **Terminales 3 y 4** → salida del\
    \ lazo (hacia los equipos siguientes)\n\nEl diagrama de conexiones típicas del\
    \ lazo muestra la secuencia: `Panel → equipos → Aislador (terminales 1-2-3-4)\
    \ → más equipos → final del lazo` [F2].\n\n---\n\n## Comprobaciones previas a\
    \ la conexión\n\n> ⚠️ Las comprobaciones de continuidad del lazo **deben realizarse\
    \ ANTES de conectar los aisladores** [F5].\n\n1. **Desconecta temporalmente los\
    \ aisladores** cortocircuitando los terminales **2 y 4** de cada aislador [F2].\n\
    2. Con el cableado del lazo **desconectado del panel**, comprueba la continuidad\
    \ y mide la resistencia final de línea [F2].\n3. Verifica que la resistencia es\
    \ inferior a los valores límite según el tipo de placa [F2]:\n   - **Placa base\
    \ y LIB — detección de dirección duplicada:** < **14,5 Ω**\n   - **Placa base\
    \ y LIB — sin detección de dirección duplicada:** < **28,5 Ω**\n   - (Valores\
    \ alternativos para otra configuración de placa base y LIB): < **18,5 Ω** con\
    \ duplicada / < **35,5 Ω** sin duplicada [F2]\n4. Comprueba con multímetro en\
    \ modo diodo (polaridad invertida: **+ al lazo −** y **− al lazo +**) que aparecen\
    \ múltiples diodos en paralelo. Si aparece un solo diodo, algún equipo está invertido\
    \ [F12].\n\n---\n\n## Parámetros de cableado del lazo\n\n- **Resistencia máxima\
    \ del lazo:** no superar **35 Ω** [F11]\n- **Capacidad máxima del cable:** inferior\
    \ a **0,5 µF** [F11]\n- **Longitud máxima del lazo:** **2000 metros** con cable\
    \ apantallado de **1,5 mm²** [F2][F11]\n- **Sección de cable admitida en terminales:**\
    \ entre **0,5 mm²** y **2,5 mm²** [F10]\n- Se recomienda conectar la pantalla\
    \ del cable **a tierra únicamente en el panel** [F12]\n\n---\n\n## Nota sobre\
    \ la documentación del aislador\n\n> ⚠️ El manual indica: **\"Consulte la documentación\
    \ que acompaña al equipo\"** [F13]. Las instrucciones de conexionado específicas\
    \ del modelo de aislador (terminales exactos, polaridad, tipo FET o estándar)\
    \ se encuentran en la hoja de instrucciones del propio módulo aislador.\n\n---\n\
    \n**Fuente:** Panel ID2000 - Manual de instalación y puesta en marcha (rev. MI-DT-180,\
    \ 2003-03-31)\n\n---\n\nTambién puedo ayudarte con: **comprobaciones del lazo\
    \ tras conectar el cableado**, **configuración del aislador en el software de\
    \ la ID2000** o **mensajes de avería de lazo y su diagnóstico**.\n\n---\n⚠️ **Información\
    \ adicional del manual:**\n- \"> ⚠️ **NO utilice NUNCA un multímetro de alta tensión\
    \ en el lazo.**\" [F5]\n- \"Es de vital importancia que el cable utilizado sea\
    \ de buena calidad y que se instale de forma correcta.\" [F11]\n\n---\n\U0001F4D6\
    \ **Obligaciones de evidencia del manual:**\n- \"La resistencia máxima del lazo\
    \ no debe superar los 35 ohmios. Puede comprobarlo uniendo los extremos B+ y B-\
    \ y midiendo a través de los extremos A+ y A-.\" (MIDT180, p. 17) [F11]"
