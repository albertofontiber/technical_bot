  bot_answer: "# Cálculo de capacidad de batería — AM-8200\n\nEl manual proporciona\
    \ una fórmula y tablas de trabajo para este cálculo. Aquí tienes el procedimiento\
    \ completo:\n\n---\n\n## Fórmula general\n\n**Ah Batería = (A + B) × 1,2** [F6]\n\
    \nDonde:\n- **A** = Amperios-hora en condición de reposo (espera)\n- **B** = Amperios-hora\
    \ en condición de alarma\n- **1,2** = Factor de corrección por tolerancias de\
    \ fabricación de las baterías [F1]\n\n---\n\n## Paso a paso\n\n**Paso 1 — Calcular\
    \ la corriente total en reposo (NO ALARMA)**\n\nSuma los consumos de todos los\
    \ componentes instalados en condición de NO ALARMA [F6]:\n\n- AM-8200 CPU (AM8200-KLCD):\
    \ **179 mA** [F6]\n- LIB-8200 (por cada tarjeta): **50 mA** [F6]\n- AM82-2S2C:\
    \ **28 mA** [F6]\n- AM82-BST-C: **39 mA** [F6]\n- Corriente de los lazos: consultar\
    \ **Tabla 3** del manual [F6]\n- Corriente salida usuario: máx. **2 A** [F6]\n\
    - LCD-8200, campanas, sirenas, flashes, otros dispositivos conectados\n\n→ Suma\
    \ todos = **Total reposo (A)**\n\n**Paso 2 — Convertir a Ah en reposo**\n\nMultiplica\
    \ el Total reposo por la duración de reserva requerida [F6]:\n\n- **(Total A)\
    \ × 24 h** (reserva de 24 horas)\n- o **(Total A) × 72 h** (reserva de 72 horas)\n\
    \n→ Resultado = **Espera (A) en Ah**\n\n**Paso 3 — Calcular la corriente total\
    \ en alarma**\n\nSuma los consumos de todos los componentes en condición de ALARMA\
    \ [F6]:\n\n- AM-8200 CPU (AM8200-KLCD): **345 mA** [F6]\n- LIB-8200 (por cada\
    \ tarjeta): **92 mA** [F6]\n- AM82-2S2C: **28 mA** [F6]\n- AM82-BST-C: **39 mA**\
    \ [F6]\n- Corriente de los lazos: consultar **Tabla 3** del manual [F6]\n- Corriente\
    \ salida usuario: máx. **2 A** [F6]\n- Sirenas, campanas, flashes y demás dispositivos\
    \ activos en alarma\n\n⚠️ Verificar que la corriente total de todos los lazos\
    \ sea **inferior a 750 mA** [F1]\n⚠️ Verificar que la corriente total de la salida\
    \ de 24 Vcc sea **inferior a 2 A** [F1]\n⚠️ Si el consumo total supera **3,5 A**,\
    \ la corriente en exceso durante alarma se extrae de las baterías [F1]\n\n→ Suma\
    \ todos = **Total alarma (B)**\n\n**Paso 4 — Convertir a Ah en alarma**\n\nMultiplica\
    \ el Total alarma por **0,5 h** (duración de alarma) [F6]:\n\n**(Total B) × 0,5\
    \ h** → Resultado = **Alarma (B) en Ah**\n\n**Paso 5 — Aplicar la fórmula final**\n\
    \n**Ah Batería = (A + B) × 1,2** [F6]\n\n---\n\n## Límites de la sección de baterías\n\
    \n- Capacidad mínima admitida: **7 Ah** [F10]\n- Capacidad máxima admitida: **18\
    \ Ah** [F10]\n- Configuración: **2 × 12 V** en serie [F10]\n- Corriente de carga:\
    \ **1 A** [F10]\n\n## Baterías recomendadas por el fabricante\n\n- Yuasa **NP18-12B**\
    \ o **NP7-12BFR** (UL94) — 12 V / 17,2 Ah [F10]\n- Fiamm **FG21803** o **FGV21803**\
    \ (UL94) — 12 V / 18 Ah [F10]\n\n---\n\n> **Nota:** Los consumos de los dispositivos\
    \ de campo (detectores, módulos, sirenas) deben obtenerse de las fichas técnicas\
    \ de cada fabricante e introducirse en la **Tabla 3** del manual para calcular\
    \ la corriente de los lazos [F1].\n\n---\n\nFuente: AM-8200 Manual de Instalación\
    \ (Doc. AM-8200-ESP Rev. A.3)\n\nTambién puedo ayudarte con: **consumos de la\
    \ AM-8200BB**, **límites de corriente por lazo** o **conexionado de baterías**.\n\
    \n---\n⚠️ **Información adicional del manual:**\n- \"4 La corriente en las condiciones\
    \ de reposo o alarma no puede superar, en ningún caso, la capacidad de la fuente\
    \ de alimentación.\" [F1]\n- \"* ► **Nota: prestar especial atención cuando la\
