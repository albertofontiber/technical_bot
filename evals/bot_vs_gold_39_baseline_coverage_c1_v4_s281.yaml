  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: "# ID3000 — Programar coincidencia de 2 detectores para activar sirena\n\
    \nHay **dos enfoques** según el nivel donde quieras aplicar la coincidencia. Te\
    \ explico ambos:\n\n---\n\n## ENFOQUE A — Coincidencia en la Matriz de Control\
    \ (nivel de salida)\n\nEste método comprueba la coincidencia **después** de que\
    \ el sistema haya entrado en alarma [F4].\n\n### Pasos en el panel (programación\
    \ directa):\n\n1. Accede a la **Matriz de Control** (también puedes pulsar **\\\
    <F6\\>** durante la edición de sensores/módulos) [F12].\n\n2. Crea o edita una\
    \ línea de matriz. Define la **ENTRADA** con los siguientes parámetros [F3]:\n\
    \   - **Zona**: selecciona `ZONA` o `SUBZONA` (la coincidencia solo funciona con\
    \ `ZONA`, `SUBZONA` o `CUALQUIERA`, **no** con equipo individual ni tecla) [F1].\n\
    \   - **Tipo de equipo**: selecciona el tipo analógico correspondiente, por ejemplo\
    \ `ANALÓGICO` (incluye detectores TÉRMICOS, IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR)\
    \ [F1].\n\n3. En el paso de **Coincidencia de equipos**, el menú mostrará [F3]:\n\
    \   ```\n   Indique tipo de coincidencia:\n    1: UN ÚNICO EQUIPO\n    2: COINCIDENCIA\
    \ 2 EQUIPOS\n    3: n COINCIDENCIA EQUIPOS\n    4: p COINCIDENCIA EQUIPOS\n  \
    \ ```\n   Selecciona **`2: COINCIDENCIA 2 EQUIPOS`** [F3].\n\n   > ⚠️ **IMPORTANTE:**\
    \ Esta opción solo aparece si en el paso anterior se ha seleccionado **`Única\
    \ zona`** y el tipo **no** es la opción 9, 10 u 11 (que ya incluyen coincidencia\
    \ propia) [F3].\n\n4. Define la **SALIDA** como el circuito de sirena correspondiente\
    \ [F12].\n\n---\n\n### ⚠️ Advertencia crítica — Pulsadores manuales (MCP/PUL)\n\
    \n**No incluyas pulsadores manuales en el grupo de coincidencia** (requisito **EN54-2:\
    \ 7.1.4**) [F1][F3].\n\nPara evitarlo, programa **dos instrucciones de Matriz\
    \ de Control separadas** [F1][F3]:\n\n- **Instrucción 1:** Entrada tipo `Pulsador\
    \ Manual (MCP)` → coincidencia `Simple` (sin coincidencia, un único equipo).\n\
    - **Instrucción 2:** Entrada tipo `ANALÓGICO` (u otro tipo de sensor) → coincidencia\
    \ `2 EQUIPOS`.\n\n---\n\n## ENFOQUE B — Coincidencia de equipos a nivel de central\
    \ (prealarma, Sección 4 del anexo v4.63)\n\nEste método es **independiente** de\
    \ la Matriz de Control y actúa **antes** de que el sistema entre en alarma: el\
    \ sistema queda en estado de **PRIMERA ALARMA / PREALARMA** hasta que se cumple\
    \ la coincidencia [F4].\n\n- Nivel aplicable para tu caso: **Nivel 2 — Dos o más\
    \ sensores en la misma zona** [F4].\n- La opción por defecto es **Nivel 1 (sin\
    \ coincidencia)** [F4].\n- **Limitación:** Los niveles de coincidencia **no se\
    \ pueden aplicar a módulos**; una entrada de alarma desde un módulo hace que el\
    \ sistema entre inmediatamente en alarma [F4].\n- Mientras no se cumple la coincidencia,\
    \ el **LED de ALARMA rojo no se iluminará** [F4].\n\n> ⚠️ Este enfoque es independiente\
    \ del Enfoque A. Ambos pueden coexistir, pero tienen comportamientos distintos\
    \ [F4].\n\n---\n\n## Configuración de niveles adicionales (si usas opciones n/p\
    \ en Matriz de Control)\n\nSi necesitas configurar los niveles 3 o 4 de coincidencia\
    \ de equipos (opciones `n` y `p`), debes hacerlo previamente en:\n\n- **Panel:**\
    \ `Configuración de la central → Niveles COINCIDENCIA en ALARMA` (opción 21 o\
    \ 22 según configuración) [F6].\n- **Software PK-ID3000:** `Modificar Opciones\
    \ de la Central → pestaña Coincidencia de Alarma` [F5].\n\nLos niveles 1 (= 1\
    \ equipo) y 2 (= 2 equipos) son **fijos** y siempre están disponibles sin configuración\
    \ previa [F6].\n\n---\n\n**Fuentes:**\n- MCDT190 (sin revisión registrada) — Panel\
    \ ID3000, Manual de configuración\n- MPDT190 (sin revisión registrada) — Panel\
    \ ID3000, Manual de programación\n- MADT190\\_14 (sin revisión registrada) — Anexo\
    \ ID3000, versión de software 4.63\n- MCDT191 / MC-DT-191\\_F v.2.17e (sin revisión\
    \ registrada) — ID3000, Manual del programa de configuración PK-ID3000\n\n---\n\
    \nTambién puedo ayudarte con: **configuración de la salida de sirena en la Matriz\
    \ de Control**, **programación de zonas y subzonas en la ID3000**, o **ajuste\
    \ del comportamiento de \"Cualquier Zona\" en la coincidencia**.\n\n---\n\U0001F4D6\
    \ **Información adicional del manual:**\n- \"- Radio button: Misma Central o Red\n\
    - Radio button: Siempre la misma Zona\" [F5]\n- \"- Radio button: Deber estar\
    \ en la misma Subzona\n- Radio button: Se extiende en el rango de Subzonas especificadas\
    \ (labeled as 4)\" [F5]\n\n---\n⚠️ **Obligaciones de evidencia del manual:**\n\
    - \"(«Debe registrar su copia del programa de configuarción ID3000 antes de poder\
    \ enviar cualquier archivo a un panel ID3000.\" (MCDT190, p. 10) [F13]\n- Nota:\
    \ la fuente es inconsistente: \"**La coincidencia de equipos está disponible pero\
    \ limitada SOLO a dos equipos**.\" (MPDT190, p. 74) [F2] declara 2 equipos y la\
    \ enumeración servida lista 4 (MPDT190, p. 73) [F3].\n- Nota: la fuente es inconsistente:\
    \ \"**La coincidencia de equipos está disponible pero SOLO para dos equipos**.\"\
    \ (MPDT190, p. 74) [F2] declara 2 equipos y la enumeración servida lista 4 (MPDT190,\
    \ p. 73) [F3]."
