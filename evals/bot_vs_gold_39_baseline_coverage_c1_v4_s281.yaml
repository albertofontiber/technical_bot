  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: "## Aviso de Tierra (Earth Fault) en la AFP-400\n\n### ¿Qué significa?\n\
    \nEl aviso **\"Tierra\"** (Earth Fault / Fallo de Tierra) indica que se ha detectado\
    \ una conexión no intencionada entre algún conductor del sistema y tierra (masa).\
    \ En la AFP-400, la **MPS-400** dispone de un **LED específico de \"Fallo de Tierra\"\
    ** en la placa de alimentación para indicar esta condición [F3].\n\nEl LED de\
    \ **\"Avería del Sistema\"** (amarillo) en el panel se activará: **parpadea**\
    \ cuando la avería no está reconocida, y queda **fijo** una vez reconocida [F1].\n\
    \n---\n\n### Localización del fallo\n\nLos fragmentos disponibles no describen\
    \ un procedimiento paso a paso específico para localizar un fallo de tierra en\
    \ la AFP-400. Sin embargo, sí identifican los elementos donde se monitoriza esta\
    \ condición:\n\n1. **Verifica el LED de \"Fallo de Tierra\" en la placa MPS-400**\
    \ — está físicamente ubicado en la placa de alimentación junto a los LEDs de alimentación\
    \ AC y circuitos de Aviso/Señalizaciones 1-4 [F3].\n\n2. **Revisa el lazo SLC**\
    \ — una falla de tierra en el SLC genera condición de **Alarma/Problema** independientemente\
    \ del estilo de cableado (Estilo 4, 6 o 7) [F5]. Inspecciona el cableado del lazo\
    \ buscando rozaduras, pinzamientos o contacto con la bandeja metálica.\n\n3. **Revisa\
    \ el cableado de tensión limitada vs. no limitada** — debe mantenerse una **distancia\
    \ mínima de 6 mm** entre circuitos de tensión limitada y no limitada [F9]. Un\
    \ cruce o contacto entre ambos puede generar fallo de tierra.\n\n4. **Comprueba\
    \ las conexiones de toma de tierra** en los terminales:\n   - **TB1-3** de la\
    \ MPS-400: Toma de Tierra [F3]\n   - **TB1-1** de la AVPS-24E: Entrada Toma de\
    \ Tierra → conectada al chasis o terminal de toma de tierra de la MPS-400 [F10]\n\
    \n5. **Revisa el jumper JP6 \"Ground Fault Disable\"** en la placa MPS-400 [F4]\
    \ — verifica que no esté en posición de inhibición si el fallo debe estar activo.\n\
    \n---\n\n> ⚠️ **Precaución:** Antes de intervenir en la MPS-400, desconecta **todas\
    \ las entradas de alimentación** (AC y baterías). El panel y sus equipos pueden\
    \ dañarse si se manipulan con tensión presente [F4].\n\n---\n\n**El manual no\
    \ especifica** un procedimiento detallado de aislamiento punto a punto del fallo\
    \ de tierra para la AFP-400 en los fragmentos disponibles. Para el procedimiento\
    \ completo de diagnóstico, consulta el **Manual de Instalación AFP-400 (Documento\
    \ 50253)** directamente.\n\n---\n\nFuentes: MFDT170 (sin revisión registrada);\
    \ MIDT170 (sin revisión registrada); 50253SP (sin revisión registrada)\n\n---\n\
    \nTambién puedo ayudarte con: **características del cableado del lazo SLC** (resistencia\
    \ máxima, distancias), **conexionado de la MPS-400** o **procedimiento de rearme\
    \ del sistema** tras eliminar la avería.\n\n---\n\U0001F4D6 **Información adicional\
    \ del manual:**\n- \"- **TB1** (top left): Terminal block with connections labeled\
    \ TB1\n- **TB2** (top center): Terminal block labeled TB2\n- **TB3-TB6** (top\
    \ right): Terminal blocks labeled TB3-TB6\n- **TB7-TB10** (far right): Terminal\
    \ blocks labeled TB7-TB10\n- **Interruptor de Selección de Voltaje 115V/230V**\
