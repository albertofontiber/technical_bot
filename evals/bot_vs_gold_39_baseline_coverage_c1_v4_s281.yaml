  bot_answer: '## Niveles de alarma y prealarma en detectores — Central Morley DXc
    (España)


    ### Detectores ópticos convencionales (OPT) — Protocolo Morley-IAS


    Para detectores ópticos estándar, los valores son en porcentaje [F1]:


    - **Prealarma por defecto: 80%**

    - **Alarma por defecto: 100%**

    - **Máximo configurable para alarma: 108%**


    Esto se confirma también en [F8]: *"Los valores normales son Prealarma = 80, Alarma
    = 100. Máximo 108."*


    ---


    ### Detectores Multicriterio (OTM) — Niveles de alarma


    Para los detectores óptico-térmicos multicriterio (OTM), los niveles se expresan
    como **niveles discretos** (no porcentaje) [F2]:


    - **Prealarma por defecto: Nivel 3 (Niv3)**

    - **Alarma por defecto: Nivel 4 (Niv4)**


    Esto se puede ver en las pantallas de ejemplo de la central [F1]:

    ```

    S001 OTM  Fuego:Niv4  Prealarma:Niv3

    S002 OTM  Fuego:Niv4  Prealarma:Niv3

    ```


    Los niveles disponibles para OTM van de **Nivel 1 a Nivel 6** [F2], con las siguientes
    sensibilidades:

    - Nivel 3 → 6,5% osc./m *(nivel de prealarma recomendado)*

    - Nivel 4 → 6,5% a 11,5% osc./m autoajustado *(nivel de alarma recomendado)*


    ---


    ### Detectores Láser (LSR)


    Para detectores láser, los niveles también son discretos [F2]:


    - **Prealarma por defecto: Nivel 4 (Niv4)**

    - **Alarma por defecto: Nivel 5 (Niv5)**


    Visible en pantalla de la central [F1]:

    ```

    S003 LSR  Fuego:Niv5  Prealarma:Niv4

    ```


    Los niveles disponibles para LSR van de **Nivel 1 a Nivel 9** [F2].


    ---


    ### Restricciones de configuración


    - El nivel de prealarma **no puede ser superior al nivel de alarma** [F5].

    - La central **no permite ajustar niveles que impidan el reconocimiento de alarmas**
    [F5].

    - Los valores modificados solo son efectivos cuando el **Modo Día Sensibilidad**
    está activo; fuera de ese horario, los sensores operan con sus valores normales
    [F8].


    ---


    **Fuente:** DXc_Manual variaciones de mercado (sin revisión registrada); DXc_Manual
    de configuración (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento para cambiar los niveles de sensibilidad
    en la DXc**, **configuración del Modo Día Sensibilidad** o **tabla completa de
    niveles del detector láser LSR**.


    ---

    📖 **Obligaciones de evidencia del manual:**

    - "el umbral de alarma de fuego depende del ajuste del nivel/modo y es diferente
    para cada nivel de alarma." (DXc_Manual variaciones de mercado, p. 5) [F2]

    - "Estos valores se definen para cada equipo y su configuración es automática
    en la central de forma que el valor del pulso analógico varia para cada equipo,
    pero los recomendados por el fabricante se corresponden siempre con «100» para
    alarma y «80» para prealarma." (MIE-MI-320, p. 3) [F7]

    - "El nivel de prealarma, debe ser siempre inferior al de alarma." (MIE-MP-530rv001,
    p. 24) [F10]'
