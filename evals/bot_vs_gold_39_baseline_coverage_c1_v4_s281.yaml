  bot_answer: '# Central de Detección de Gas Fidegas CS4 — Características Técnicas


    ## Especificaciones generales


    - **Tensión de alimentación:** 110-230 Vac, 50-60 Hz [F2]

    - **Potencia:** 30 W, Clase II [F2][F3]

    - **Sensores:** hasta 4 conexiones simultáneas (modo analógico o digital) [F2]

    - **Salidas:** 2 salidas conmutadas LP (relé apto para 230 Vac) con contactos
    NA-C-NC [F2]

    - **Corriente máxima:** 250 mA [F2]

    - **Rearme:** seleccionable manual o automático [F2]

    - **Dimensiones:** 90 x 106 x 58 mm [F2]

    - **Peso:** 300 g [F2]

    - **Firmware:** versión 1.2 (tanto en versión digital como analógica) [F3][F7]

    - **Instalación:** en carril DIN o en armario de superficie [F1]


    ---


    ## Indicaciones (LEDs y avisador)


    - **LED verde PWR:** alimentación presente (fijo) / corte de red (intermitente)
    [F1]

    - **LED bicolor ON/ALARM** (por sensor): sensor presente (verde) / alarma (rojo)
    [F1]

    - **LED amarillo ERROR** (por sensor): avería del sensor remoto [F1]

    - **LED verde OUT1 y OUT2:** salida activa (verde) / desactivada (apagado) [F1]

    - **Avisador acústico:** apoyo sonoro a las indicaciones ópticas [F1]


    ---


    ## Diferencias entre versión digital y analógica


    ### Código de producto

    - **Versión digital:** 3244 [F2]

    - **Versión analógica:** 3270 [F2]


    ### Tipo de entrada de señal

    - **Versión digital:** entradas 0-10/15 V [F1]

    - **Versión analógica:** entradas 4-20 mA [F1]


    ### Sensores compatibles

    **Versión analógica:** [F3]

    - Sensores S/3 gases combustibles

    - Sensores S/3 y S/2 gases tóxicos

    - Sensores S/10 gases tóxicos


    **Versión digital:** [F3]

    - Sensores S/10 gases combustibles


    ---


    ## Conexionado de sensores


    Los terminales de cada sensor son [F4]:

    - **1** — Positivo de alimentación (12 a 24 Vdc)

    - **2** — Entrada de señal

    - **3** — Negativo común de alimentación y señal


    ---


    ## Funcionamiento en alarma


    - El umbral de alarma es el **20% del fondo de escala** [F5]

    - Las alarmas son **enclavadas** hasta rearme manual mediante botón **RESET**
    [F1][F5]

    - Si la concentración de gas no ha disminuido, la alarma puede **silenciarse durante
    24 horas** con el botón RESET, pero la central no puede rearmarse [F5]

    - En alarma, las salidas OUT1/OUT2 asignadas al sensor pasan a **NA** [F5]


    ---


    > ⚠️ El enclavamiento del corte de red es configurable como rearme manual (de
    serie) o automático [F1].


    Fuente: Manual de Usuario CS4 (Analógica o Digital), Rev. 2, 10/2018 — fabricado
    por C.A.E., S.L. [F6]


    ---


    También puedo ayudarte con: **conexionado detallado de las salidas OUT1/OUT2**,
    **procedimiento de configuración de la CS4** o **características técnicas de los
    sensores S/3 o S/10 compatibles**.


    ---

    📋 **Obligaciones de evidencia del manual:**

    - Nota: la fuente es inconsistente: "Permite la conexión de hasta 4 sensores remotos
    simultaneos a través de sus 4 entradas digitales (0-10/15 v) o analógicas (4-20
    mA)." (Manual-de-Usuario-CS4, p. 4) [F1] declara 4 sensores y la enumeración servida
    lista 6 (Manual-de-Usuario-CS4, p. 4) [F1].

    - "Ningún sistema de detección de gas sustituye a una correcta instalación y mantenimiento
    de los aparatos quemadores de gas y debe ser colocado por una persona competente
    o un instalador autorizado." (Manual-de-Usuario-CS4, p. 2) [F7]'
