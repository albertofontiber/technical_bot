  bot_answer: "# Configuración de Maniobras (Causa-Efecto) en la CAD-250\n\n> ⚠️ La\
    \ programación de maniobras es una de las funciones más críticas de la configuración\
    \ del sistema. Requiere conocimiento específico del sistema instalado, del plan\
    \ de protección y del producto [F5].\n\n---\n\n## CONCEPTO PREVIO\n\nUna maniobra\
    \ es un conjunto de **Entradas (Eventos) → Lógica (Coincidencias) → Salidas (Acciones)**\
    \ [F1]. El sistema soporta hasta **100.000 entradas y salidas** configuradas en\
    \ distintas maniobras [F7].\n\nLa configuración gestiona **eventos** (cambios\
    \ de estado), no estados estáticos [F2].\n\n---\n\n## PASO 1 — ACCEDER AL MENÚ\
    \ DE MANIOBRAS\n\nRuta desde el panel táctil [F1]:\n\n**MENÚ → MANIOBRAS → +AÑADIR**\n\
    \nDesde el software PC [F6]:\n\nVentana **CREACIÓN DE MANIOBRA**\n\n---\n\n##\
    \ PASO 2 — CREAR LA MANIOBRA\n\nPulsa el botón **AÑADIR** [F4]. Se abre la pantalla\
    \ de edición de la maniobra con:\n\n- **Contador de maniobra:** número de orden\
    \ de la maniobra actual [F4]\n- **Campo COINCIDENCIAS:** número de eventos que\
    \ deben concurrir para que la función sea verdadera [F4]\n\n### Lógica de Coincidencias\
    \ [F4]:\n\n- **Coincidencias = 1** con 2 eventos → lógica **OR** (cualquiera de\
    \ los eventos activa la salida)\n- **Coincidencias = 2** con 2 eventos → lógica\
    \ **AND** (ambos eventos deben cumplirse)\n- **Coincidencias = 3** con 4 eventos\
    \ → lógica **3 de N** (3 eventos cualesquiera deben cumplirse)\n\n---\n\n## PASO\
    \ 3 — DEFINIR LAS ENTRADAS (EVENTOS)\n\n### 3.1 Añadir un evento\n\nPulsa **AÑADIR**\
    \ → selecciona **EVENTO** [F2].\n\nSe te ofrece elegir entre [F2]:\n- **ENTIDAD**\n\
    - **CONDICIÓN TEMPORAL**\n\n---\n\n### 3.2 Configurar un evento de ENTIDAD\n\n\
    Al seleccionar **ENTIDAD**, accedes a la pantalla **EVENTO DE LA ENTIDAD** [F2].\n\
    \n**Desde el software PC:** arrastra la entidad desde la ventana de eventos a\
    \ la sección de Maniobras [F9].\n\nLos parámetros configurables del evento son\
    \ [F5] [F9]:\n\n**ORIGEN:**\n- Local o red\n- Instalación, panel, lazo, área,\
    \ zona, dispositivo, grupo o modo virtual\n\n**CONDICIÓN DE ESTADO (Tipo):**\n\
    - **Alarma:** uno o más elementos en alarma\n- **Avería:** uno o más elementos\
    \ en avería\n- **Técnico:** una o más entradas activas\n\n**CONDICIÓN DE TIPO**\
    \ (restringe qué dispositivo hace verdadera la entrada) [F9]:\n- **Todos:** cualquier\
    \ dispositivo activo en la entidad\n- **Pulsadores:** únicamente pulsadores\n\
    - **Detectores:** únicamente detectores\n- **Entrada:** únicamente entradas\n\n\
    **REPETICIONES** [F9]:\n- Valor entero hasta **9999**\n- Número de sucesos necesarios\
    \ en la entidad para que la premisa sea verdadera\n- Ejemplo: zona en alarma de\
    \ detectores con Repeticiones = 3 → la condición es verdadera cuando **3 detectores**\
    \ estén en alarma\n\n**LÓGICO** [F5] [F9]:\n- **Normal:** la condición de estado\
    \ es verdadera\n- **No (Negado):** la condición de estado es falsa (p.ej. \"no\
    \ hay alarma\")\n\n> Desde la versión 1.1.1 es posible seleccionar un elemento\
    \ de **salida** como condición de entrada. En ese caso, será el cambio a condición\
    \ de avería el que hará verdadera la condición entrante. Para ello, desmarca la\
    \ casilla **\"Sólo dispositivos de entrada\"** [F6].\n\n---\n\n### 3.3 Configurar\
    \ una CONDICIÓN TEMPORAL\n\nAl seleccionar **CONDICIÓN TEMPORAL** [F8], se configura\
    \ un periodo bajo el cual la ecuación de entrada es válida o no:\n\n- **Desde\
    \ mes / Hasta mes:** intervalo en meses\n- **Desde día / Hasta día:** días de\
    \ la semana\n- **Desde hora / Hasta hora:** franja horaria\n- **Lógico:**\n  -\
    \ **Normal:** el periodo definido hace la condición verdadera\n  - **No:** el\
    \ periodo definido hace la condición falsa\n\nPulsa **GUARDAR** para confirmar\
    \ o **CANCELAR** para deshacer [F8].\n\n---\n\n## PASO 4 — DEFINIR LAS SALIDAS\
    \ (ACCIONES)\n\n### 4.1 Añadir una acción\n\nPulsa **AÑADIR** → selecciona **ACCIÓN**\
    \ [F3].\n\n**Desde el software PC:** arrastra la entidad desde la ventana de acciones\
    \ a la sección de Maniobras [F8].\n\n---\n\n### 4.2 Configurar la acción\n\nLos\
    \ parámetros configurables son [F3] [F5] [F8]:\n\n**RETRASO:**\n- Tiempo configurable\
    \ entre **0 y 600 segundos**\n- Se inicia a partir del momento en que la condición\
    \ de entrada es verdadera\n\n**DESTINO (Entidad):**\n- Panel, lazo, área, zona,\
    \ dispositivo, grupo o modo virtual\n- Las acciones siempre son relativas a la\
    \ entidad seleccionada [F3]\n- ⚠️ El programa **no permite mezclar acciones sobre\
    \ entidades de paneles diferentes** [F7]\n\n**TIPO DE ACCIÓN** [F5] [F8]:\n- **Activar**\
    \ las salidas\n- **Desactivar** las salidas\n- **Habilitar** la entidad\n- **Deshabilitar**\
    \ la entidad\n- **Test:** pone en modo test la entidad\n- **Reiniciar** la entidad\n\
    - **Pulso**\n\n**TIPO DE ELEMENTO** [F5]:\n- Todos, sirenas, relés, sirena discontinua\n\
    \nPulsa **GUARDAR** para confirmar o **CANCELAR** para deshacer [F7].\n\n---\n\
    \n## PASO 5 — HERRAMIENTAS ADICIONALES\n\n### Grupos [F1]\nPermiten asociar elementos\
    \ (áreas, zonas, dispositivos) para facilitar la creación de reglas de actuación\
    \ [F12].\n\n### Módulos Virtuales [F1] [F11]\nPermiten crear bucles interdependientes.\
    \ Un conjunto de entradas determina el estado del módulo virtual, que a su vez\
    \ puede actuar como entrada de otra maniobra. Útil para maniobras complejas de\
    \ varios niveles.\n\n### Estado VM [F1]\nPermite visualizar el estado de los módulos\
    \ virtuales, activarlos o usarlos como botones de acceso rápido desde la pantalla\
    \ principal.\n\n---\n\n## EJEMPLO DE MANIOBRA COMPLEJA [F10]\n\nEl manual incluye\
    \ un ejemplo de maniobra de media complejidad con:\n- Zona 1 en alarma con **R=2**\
    \ (2 detectores mínimo) **O** Zona 2 en alarma con **R=1** → activan un **Módulo\
    \ Virtual**\n- El Módulo Virtual + Pulsador + Puerta cerrada + Condición Temporal\
    \ (no fin de semana) → **Coincidencias = 4** (AND)\n- Salidas: paro de ventilación\
    \ (inmediato), señal de alerta (inmediata), evacuación (retardada)\n\n> Planifica\
    \ bien los escenarios, evita crear bucles y **prueba cada maniobra y escenario\
    \ completo** [F10].\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración\
    \ MC-380-es-2026-c (rev. c, 2026-04-23)\n- CAD-250 Manual de Software de Configuración\
    \ MS-416-es-2026-b (rev. b)\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de Grupos**, **creación de Módulos Virtuales** o **ejemplo paso a paso de una\
    \ maniobra específica** para tu instalación.\n\n---\n\U0001F4D6 **Obligaciones\
    \ de evidencia del manual:**\n- \"Seleccione el elemento de cualquiera de los\
    \ dos cuadrid de la maniobra, eventos o acciones y pulse este botón para borrarlo,\"\
    \ (CAD-250_Manual-software-configuracion-MS-416-es-2026-b, p. 56) [F7]\n- \"**Editar.**\
    \ Seleccione el elemento de cualquiera de los dos cuadrid de la maniobra, eventos\
    \ o acciones y pulse este botón para entrar en el menú de edición del elemento.\"\
    \ (CAD-250_Manual-software-configuracion-MS-416-es-2026-b, p. 56) [F7]\n- \"Defina\
    \ para cada salida el tipo de acción que debe realizarse cuando todos las condiciones\
    \ de los eventos de entrada sean verdderas.\" (CAD-250_Manual-software-configuracion-MS-416-es-2026-b,\
    \ p. 54) [F8]"
