  bot_answer: '## Conexión de baterías en la CAD-150-8


    ### Especificaciones de las baterías


    Las centrales analógicas CAD-150-8 requieren **dos baterías de 12V 7A/h** [F4].
    Se conectan **en serie** para obtener los 24V necesarios para el correcto funcionamiento
    [F4].


    > ⚠️ Verifica que las baterías tienen una tensión superior a **24V** antes de
    la puesta en marcha [F6].


    ---


    ### Procedimiento de conexión


    1. **Coloca las baterías** en la parte inferior de la caja, en el espacio reservado
    para ello, de forma **vertical** [F4].


    2. **Conecta el cable puente de batería** (suministrado con la central) uniendo
    el **polo positivo de una batería con el polo negativo de la otra**, conectándolas
    en serie [F4].


    3. **Conecta los cables del circuito** (rojo y negro) al **positivo y negativo**
    de las baterías. Recuerda conectar previamente entre sí las baterías con el cable
    puente antes de hacer esta conexión [F1].


    4. El conector de baterías en la PCB Base está identificado como **Conector Batería
    (posición 11)**, protegido por el **Fusible Baterías (posición 10)** [F2][F3].


    ---


    ### ⚠️ Orden de conexión obligatorio


    **Primero la red, después las baterías.** Si no se respeta este orden, el equipo
    podría sufrir daños [F4][F5].


    - Paso 1: Conectar la alimentación de red (**230VAC**) activando el magnetotérmico
    bipolar [F6].

    - Paso 2: Conectar las baterías [F6].


    > En caso de necesidad, se puede encender el equipo **solo con baterías**, pero
    es imprescindible pulsar el pulsador **BAT** para arrancar el equipo [F6].


    ---


    **Fuente:** 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB
    IT (sin revisión registrada); 55315008 Manual Centrales Analógicas CAD-150-8 Usuario
    ES FR GB IT (sin revisión registrada)


    ---

    📋 **Información adicional del manual:**

    - Nota: el manual también indica: "Las centrales analógicas requieren dos baterías
    de 12V 7A/h." [F4] · "| 1 | Conectores Bucle 1               | 7  | Fusibles salidas
    sirenas       |

    | - | -------------------------------- | -- | ------------------------------ |

    | 2 | Conectores Bucle 2               | 8  | Fusible salida 24 v auxiliares |

    | 3 | Conectores Bucle 3               | 9  | Tecla arranque por Batería     |

    | 4 | Conectores Bucle 4               | 10 | Fusible Baterías               |

    | 5 | Conectores relés Alarma y Avería | 11 | Conector Batería               |

    | 6 | Salida Sirena 1 y 2              |    |                                |"
    [F2]

    - "* Comprobar que el equipo se ha instalado correctamente.

    * Con la ayuda de un voltímetro verificar que en los lazos no existen ni cortocircuitos
    ni circuitos abiertos. Use el tester para comprobar la continuidad de la línea.

    * Verificar que las líneas de zona conectadas a módulos de zona tienen las resistencias
    de final de línea (4K7)

    * Verificar que las líneas de sirenas, conectadas a módulos de sirenas están conectadas
    respetando la polaridad, y que tienen las resistencias (4k7) de final de línea.

    * Verificar las conexiones de salida de la placa base. Compruebe que están correctamente
    instaladas.

    * Ajustar el retardo deseado de las sirenas.

    * Verificar que la tensión de red es de 230VAC mediante el uso de un voltímetro
    y compruebe que las baterías tienen una tensión superior a 24V." [F6]'
