  - 997-671-005-3_Configuration_ES
  coverage_status: appended
  coverage_appended_rows: 3
  release_profile: coverage_c1_v4
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de activación de salidas en la PEARL se configura mediante la **programación
    de causa-efecto (C&E)**. No existe un parámetro único de "retardo de alarma principal"
    — el retardo se define dentro de cada regla de causa-efecto y se le asigna un
    **tipo de retardo** [F1].


    ---


    ### Dónde se configura


    No puedo confirmar de forma segura el número de menú de Causa y Efecto con los
    fragmentos servidos. Confirma el manual y la revisión exactos antes de usar un
    número de menú.


    > ⚠️ **Importante:** Se recomienda usar el **programa de configuración por ordenador**
    como método principal. El menú de la central debe usarse solo para modificaciones
    menores [F12].


    ---


    ### Tipos de retardo disponibles


    Al crear o editar una regla C&E, puedes asignar uno de **seis tipos de retardo
    de salida** [F1]. El tipo determina qué acciones son posibles mientras el retardo
    está activo:


    **1. Fijo**

    - No se puede silenciar la salida pulsando SILENCIAR SIRENAS durante el retardo
    [F2]

    - No se puede anular con «Anular retardos» (nivel acceso 2) [F2]

    - No muestra tiempo restante en pestaña ALARMA [F2]

    - No se puede detener con FIN RETARDO [F2]

    - No responde a AMPLIAR RETARDO [F2]


    **2. Estándar**

    - La salida se detiene si se pulsa SILENCIAR SIRENAS durante el retardo [F2]

    - Anulable con «Anular retardos» en nivel de acceso 2 [F2]

    - Muestra tiempo restante en pestaña ALARMA [F2]

    - Detenible con FIN RETARDO en nivel de acceso 2 [F2]


    **3. No Silenc.**

    - No se detiene con SILENCIAR SIRENAS [F2]

    - Sí anulable con «Anular retardos» [F2]

    - Sí muestra tiempo restante [F2]

    - Sí detenible con FIN RETARDO [F2]


    **4. Est. Ext. (Estándar Extendido)**

    - Se detiene con SILENCIAR SIRENAS [F2]

    - Anulable con «Anular retardos» [F2]

    - Muestra tiempo restante [F2]

    - Detenible con FIN RETARDO [F2]

    - **La salida se detiene si se pulsa AMPLIAR RETARDO** [F2]


    **5. RetExtStd**

    - Se detiene con SILENCIAR SIRENAS [F2]

    - Anulable con «Anular retardos» [F2]

    - Muestra tiempo restante [F2]

    - Detenible con FIN RETARDO [F2]

    - **El temporizador comienza en RETARDO AMPLIADO** al pulsar AMPLIAR RETARDO [F2]


    **6. No Sil. Ext.**

    - No se detiene con SILENCIAR SIRENAS [F2]

    - Sí anulable con «Anular retardos» [F2]

    - Muestra tiempo restante [F2]

    - Detenible con FIN RETARDO [F2]

    - La salida se detiene si se pulsa AMPLIAR RETARDO [F2]


    **7. SinRetExt**

    - No se detiene con SILENCIAR SIRENAS [F2]

    - Sí anulable con «Anular retardos» [F2]

    - Muestra tiempo restante [F2]

    - Detenible con FIN RETARDO [F2]

    - El temporizador comienza en RETARDO AMPLIADO [F2]


    ---


    ### Funcionamiento operativo del retardo


    Una vez configurado, cuando se detecta una alarma [F4]:

    1. Se inicia el **primer temporizador** (retardo inicial)

    2. El personal autorizado (nivel acceso 2) puede pulsar **AMPLIAR RETARDO** para
    iniciar un segundo temporizador, normalmente más largo, que anula al primero [F4]

    3. Cualquier usuario de nivel 1 puede pulsar **FIN RETARDO** para terminar el
    retardo y pasar a condición de alarma completa [F4]

    4. Mientras el retardo está activo, el **LED de RETARDO ACTIVO** permanece encendido
    [F3]


    ---


    ### Anular/habilitar retardos en operación


    Desde el menú **Anular/Habilitar**, opción **«5: Retardo Activación Salidas»**
    [F3]:

    1. Pulsa **✓** para cambiar el estado entre HABILITADO y ANULADO [F3]

    2. Pulsa **✕** para salir [F3]


    > ⚠️ Esta opción solo está disponible si se han configurado retardos en alguna
    regla C&E [F3].


    ---


    ### Nota sobre el pulsador AMPLIAR RETARDO


    El pulsador **AMPLIAR RETARDO** puede desactivarse desde los parámetros de la
    central (opción **«10: Extend Delay Button»**) si no se requiere en el mercado
    de instalación [F5].


    ---


    **Fuentes:**

    - Manual de configuración de la central PEARL (rev. 997-671-005-3)

    - Manual de funcionamiento PEARL 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **creación de reglas C&E paso a paso**, **configuración
    del segundo temporizador (AMPLIAR RETARDO)** o **prueba funcional de los retardos
    configurados**.


    ---

    ⚠️ **Información adicional del manual:**

    - "**Al programar reglas de causa-efecto evite las lógicas contradictorias.**"
    [F12]

    - "**Es de vital importancia probar rigurosamente todas las reglas durante la
    puesta en marcha del sistema para verificar que no haya conflictos lógicos entre
    ellas.**" [F12]


    ---

    📋 **Obligaciones de evidencia del manual:**

    - Nota: la fuente es inconsistente: "Se puede asignar uno de seis tipos de retardo
    de salida a una regla, como se explica a continuación." (997-671-005-3_Configuration_ES,
    p. 44) [F1] declara 6 tipos y la enumeración servida lista 8 (997-671-005-3_Configuration_ES,
    p. 44) [F1].'
