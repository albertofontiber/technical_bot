  bot_answer: "# ASD535 — Alarma intermitente de flujo bajo: diagnóstico\n\n## Causa\
    \ más probable\n\nUna alarma de flujo bajo (valor por debajo del **80 %** del\
    \ nominal) indica **obstrucción en el conducto de aspiración** [F2]. El ASD535\
    \ registra el flujo nominal al **100 %** tras el reset inicial con el conducto\
    \ limpio e íntegro; cualquier caída superior al **±20 %** dispara el aviso «fallo\
    \ flujo de aire» una vez transcurrido el tiempo de retardo de **300 s** de la\
    \ LS-Ü [F1][F2].\n\nEl código de evento asociado es el **001 — Obstrucción, conducto\
    \ de aspiración** [F4].\n\nSi la alarma es **intermitente** (no sostenida), puede\
    \ indicar fluctuaciones puntuales en el flujo que cruzan el umbral repetidamente,\
    \ lo que apunta a una obstrucción parcial o progresiva.\n\n---\n\n## Procedimiento\
    \ de diagnóstico paso a paso\n\n> ⚠️ **Antes de iniciar**: bloquear o desconectar\
    \ el control de incendios y la alerta remota en la CDI de orden superior para\
    \ evitar disparos no deseados [F5].\n\n**1. Leer el valor de flujo actual**\n\
    - Coloca el conmutador en posición **V** (según cap. 7.6.1) [F5].\n- Compara el\
    \ valor leído con el protocolo de puesta en funcionamiento.\n- Si el valor está\
    \ **por debajo del 90 %** (con sensibilidad LS-Ü estándar de ±20 %), ya es necesaria\
    \ inspección del conducto [F5].\n  - Umbral de referencia: sensibilidad ±20 %\
    \ → inspeccionar si cae por debajo del **90 %** (mitad de la sensibilidad = ±10\
    \ %) [F5].\n\n**2. Inspección visual del conducto de aspiración**\nSegún código\
    \ **001** [F4], comprobar:\n- Orificios de aspiración: verificar que no estén\
    \ obstruidos.\n- Salida de aire del ASD: comprobar si hay suciedad o bloqueo.\n\
    - Caja de filtro / unidad de filtrado: inspeccionar y limpiar [F4].\n- Sensor\
    \ de flujo de aire: inspeccionar y limpiar [F4].\n\n**3. Verificar la tensión\
    \ de alimentación**\n- Medir en bornes **1 (+) y 2 (-)** [F5]:\n  - Funcionamiento\
    \ a **12 V-CC**: valor nominal **12,3 a 13,8 V-CC** [F5].\n  - Funcionamiento\
    \ a **24 V-CC**: valor nominal **21,6 a 27,6 V-CC** [F5].\n- Una tensión fuera\
