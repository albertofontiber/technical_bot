  bot_answer: "## Añadir un nuevo detector al lazo en la Morley DXc\n\nEl procedimiento\
    \ para añadir un nuevo detector tras la puesta en marcha inicial en la **DXc**\
    \ se realiza mediante la función **Autobúsqueda de equipos**, accesible desde\
    \ el **Nivel de acceso de Programador**. Los fragmentos no describen un procedimiento\
    \ de \"añadir equipo individual\" específico para la DXc (como sí existe en otras\
    \ centrales), por lo que el método documentado es el siguiente:\n\n---\n\n###\
    \ Paso previo: conexión física\n\n1. Conecta el nuevo detector al lazo siguiendo\
    \ el cableado en **bucle cerrado** [F2].\n2. Asegúrate de que el detector está\
    \ correctamente polarizado entre positivo y negativo [F2].\n3. Respeta el límite\
    \ de **máximo 32 sensores/pulsadores entre aisladores** según **EN54-2: 12.5.2**\
    \ [F2].\n\n---\n\n### Procedimiento de Autobúsqueda (menú de Lazos)\n\n1. Accede\
    \ al menú de **Lazo** en la central DXc [F1].\n\n2. Pulsa la tecla **'2'** para\
    \ seleccionar la función **'Autobusqueda'** [F1]:\n\n   ```\n   [Lazo]       \
    \          Mie 13/04/2011 17:33:50\n   1:Confg.Equipos        2:Autobusqueda\n\
    \   ```\n\n3. Si la central tiene más de un lazo, introduce el **número de lazo**\
    \ correspondiente y pulsa **⊙** [F1]:\n\n   ```\n   [Autobusqueda]  Mie 13/04/2011\
    \ 17:35:57\n   Sel.Num.Lazo (1-2) :1\n   OK:Confirm  1-2:↕:Edit        ←:Cancel\n\
    \   ```\n\n4. Confirma que deseas realizar la autobúsqueda pulsando **⊙** [F1]:\n\
    \n   ```\n   [Autobusqueda]  Mie 13/04/2011 17:35:57\n   Lazo: 1  Autobusqueda?\n\
    \   OK:Confirm                 ←:Cancel\n   ```\n\n5. La central ejecuta el reconocimiento.\
    \ La pantalla muestra la barra de progreso [F1]:\n\n   ```\n   [Autobusqueda]\
    \           Mie 13/04/2011 17:37:11\n   Lazo: 1 Reconocimiento en progreso...\n\
    \   █████████████████\n   ```\n\n6. Al finalizar, se muestra un **resumen de diferencias**:\
    \ total de equipos, nuevos, eliminados y modificados. El nuevo detector debe aparecer\
    \ en el campo **Nuevos** [F1]:\n\n   ```\n   [Lazo]                     Mie 13/04/2011\
    \ 17:37:31\n   Lazo: 1           Total: 13\n   Nuevos:0          Elimin.:0  Cambiad:0\n\
    \   ION: 0 OPT: 1 TMP: 1 MLT: 2\n   PUL: 4 MON: 0 SIR: 2 REL: 1 OTROS : 2\n  \
    \ ```\n\n7. **Verifica** que el número de equipos mostrado en pantalla corresponde\
    \ con los equipos y tipos instalados físicamente [F1].\n\n8. Pulsa **⊞** para\
    \ salir y regresar al menú de **Lazo** [F1].\n\n---\n\n> ⚠️ **Nota importante:**\
    \ En los mercados donde el protocolo es seleccionable, si se ha realizado un cambio\
    \ de protocolo previamente, **espera dos minutos** antes de ejecutar la autobúsqueda.\
    \ La central necesita ese tiempo para rearmar los equipos del lazo [F1].\n\n---\n\
    \n**Fuente:** DXc_Manual de configuracion (sin revisión registrada)\n\n---\n\n\
    También puedo ayudarte con: **configuración de equipos tras la autobúsqueda (Confg.Equipos)**,\
    \ **cableado del lazo con aisladores de cortocircuito** o **interpretación de\
