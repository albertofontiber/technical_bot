    para el circuito de aislador externo opcional [F4][F6][F7].


    ---


    ## Resumen de resistencias


    - **Fin de línea (RFL):** 47 kΩ [F1]

    - **Modo 3 estados (en serie con contacto):** 18 kΩ, 5% ¼ W [F1][F9]


