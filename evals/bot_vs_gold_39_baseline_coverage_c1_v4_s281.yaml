  question: ¿Cuál es la resistencia de fin de línea recomendada para los lazos de
    la central Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó al indicar que el lazo analógico direccionable de la ZXe no
    lleva RFL y se cablea en bucle cerrado con aisladores. Pero introduce circuitos
    de sirena y RS-485 como si fueran posibles 'lazos', lo que puede confundir ante
    una pregunta que en contexto PCI/ZXe se refiere al lazo analógico.
  bot_sources:
  - MIE-MI-530rv001
  - MIE-MP-530rv001
  coverage_status: no_append
  coverage_appended_rows: 0
  release_profile: coverage_c1_v4
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: 'La pregunta menciona "lazos de la central Morley ZXe" sin especificar
    el tipo de lazo. Los fragmentos del manual cubren **dos tipos de lazos distintos**
    con resistencias de fin de línea diferentes:


    ---


    ## 1. Circuitos de Sirenas (RFL)


    Debe instalarse una resistencia de **6,8 KΩ, 0,5 W mínimo** al final de cada circuito
    de sirenas [F5].


    - Se instala para supervisión ante cortocircuito y circuito abierto [F5].

    - El diagrama de conexionado la identifica como **RFL** [F1].

    - En caso de conectar dispositivos no polarizados, deberán usarse diodos de polarización
    y protección en cada uno [F2].


    ---


    ## 2. Lazo RS-485 (cadena abierta)


    Debe instalarse una resistencia de **150 Ω, 0,5 W mínimo** entre los terminales
    A y B en **cada extremo libre** de la cadena (inicio y final) [F10].


    - Solo aplica a la instalación en **cadena abierta** (no en bucle) [F10].

    - En instalación en **bucle cerrado RS-485**, los fragmentos no especifican resistencia
    de fin de línea [F10].


    ---


    ## 3. Lazo Analógico


    Los fragmentos **no especifican resistencia de fin de línea** para el lazo analógico.
    El lazo analógico se realiza en **bucle cerrado** con aisladores de cortocircuito
    [F3][F6], y el parámetro crítico de cableado es la **impedancia máxima de 40 Ω**
    total del cableado [F4][F8], no una RFL.


    ---


    **Fuente:** Manual de Instalación Paneles de Incendio ZX2e/ZX5e — Documento No.
    MIE-MI-530rv001 (sin revisión registrada)


    También puedo ayudarte con: **conexionado completo del circuito de sirenas**,
    **verificaciones de cableado previas a la puesta en servicio** o **cálculo de
    carga del lazo analógico**.


    ---

    ⚠️ **Información adicional del manual:**

    - "**Todo cableado debe ser verificado antes de su conexionado al panel.**" [F3]

    - "LAS SIGUIENTES MEDIDAS PRÁCTICAS SOBRE EL CABLEADO, DEBEN REALIZARSE ANTES
    DE CONECTAR AL PANEL, PARA ASEGURAR EL FUNCIONAMIENTO DEL SISTEMA Y EVITAR DAÑOS:"
    [F3]

    - "AISLADORES DE CORTOCIRCUITO: Si se han instalado aisladores estos deben puentearse
    antes o medir entre todos los aisladores (Los aisladores mantienen abierta la
    línea de señal de positivo hasta que se alimentan e impiden la verificación del
    cableado). De no tenerse en cuenta esta medida, podrá existir tensión externa
    en el cableado, que no sea posible medir y que al conectar el lazo al panel, se
    derive directamente a éste provocando daños irreparables.


    TENSIONES: Comprobar que no existe tensión de C.C. o C.A. entre ningún conductor,
    ni con pantalla o tierra de ningún lazo.


    CONTINUIDAD: Comprobar la continuidad independiente los conductores positivo,
    negativo y pantalla desde el inicio de lazo al final. Si hay ramales, estos deberán
    comprobarse por separado.


    DERIVACIONES: Comprobar que no existe continuidad entre los conductores de positivo,
    negativo y pantalla y que tampoco hay continuidad entre éstos y tierra." [F3]'
