  bot_answer: '# CAD-150-8: Alta de detector nuevo y prueba de funcionamiento


    ## PARTE 1 — Alta de un detector nuevo en el lazo


    Los fragmentos disponibles **no describen el procedimiento de alta/programación
    de un nuevo dispositivo en el lazo** (asignación de dirección, configuración de
    tipo de detector, etc.). Esta información no está en los fragmentos recuperados.


    Lo que sí se indica sobre el lazo físico es:


    - La instalación del bucle debe ser **cerrada** (cable de dos hilos apantallado
    que sale de la central y vuelve a ella) [F9]

    - Cable mínimo de **1,5 mm²**, trenzado y apantallado [F9]

    - Longitud máxima del lazo: **2 km** [F9]

    - Resistencia del cable del bucle: **inferior a 44 Ω** [F9]

    - Capacidad máxima de la línea: **inferior a 500 nF** [F9]

    - En cada conexión del bucle es imprescindible dar continuidad a la pantalla [F9]

    - Los conectores de bucle en la PCB Base están identificados como **Conectores
    Bucle 1, 2, 3 y 4** [F10]


    > ⚠️ Para el procedimiento de alta/programación del detector (dirección, tipo,
    zona asignada), consulta el manual de instalación completo de la CAD-150-8 o el
    software de configuración mencionado en [F6].


    ---


    ## PARTE 2 — Prueba de funcionamiento del detector


    Una vez instalado el detector, el procedimiento de prueba es el siguiente:


    ### Paso 1 — Acceder al menú de prueba

    Desde el menú principal, navega a:

    **ZONA → Prueba** [F1]


    Necesitas acceder con código de nivel usuario (**1111**) o instalador (**2222**)
    [F7].


    ### Paso 2 — Configurar el rango de zonas a probar

    En la pantalla aparecerá: [F1]

    ```

    PRUEBA ZONA

    RANGO  : [000] a [250]

    ACTIVAR SIRENAS: [SI]

    ```

    - Introduce el rango de zonas que quieres poner en modo prueba [F1]

    - Selecciona si deseas activar las sirenas durante la prueba (**SI/NO**) [F1]

    - Confirma con **ACEPTAR** [F2]


    ### Paso 3 — Realizar la prueba del detector

    - Activa el detector (humo, calor, etc.) de forma manual [F8]

    - Si configuraste **ACTIVAR SIRENAS: SI**, las sirenas se activarán unos segundos
    tras la alarma y se silenciarán automáticamente [F1]

    - Si había retardos programados en las sirenas, **quedan anulados en modo prueba**
    para agilizar el proceso [F1]


    ### Paso 4 — Tiempo límite del modo prueba

    - Si transcurren **20 minutos** sin que se produzca ningún disparo de alarma,
    el sistema **sale automáticamente del modo prueba** y vuelve a estado normal [F1]


    ### Paso 5 — Salir del modo prueba

    - Para salir manualmente del modo prueba, **conecta la zona** desde el menú correspondiente
    [F1]


    ### Verificación adicional (puesta en marcha)

    - Verifica que al provocar una alarma se activa el **relé de alarma** y se activan
    las **salidas de sirena** una vez transcurrido el tiempo de retardo programado
    [F7]


    ---


    > 📋 **Mantenimiento**: El manual indica que anualmente se debe poner el equipo
    en estado de prueba y verificar que todos los detectores y pulsadores funcionan
    de acuerdo con las especificaciones del fabricante, conforme a la norma **EN54
    parte 14** [F8].


    ---


    **Fuentes:**

    - 55315008-Manual-Centrales-Analogicas-CAD-150-8-Usuario-ES-FR-GB-IT (sin revisión
    registrada)

    - 55315013-Manual-Centrales-Analogicas-CAD-150-8-Instalacion-ES-FR-GB-IT (sin
    revisión registrada)


    ---


    También puedo ayudarte con: **conexionado físico del bucle**, **configuración
    de zonas desde teclado** o **interpretación de averías y LEDs** de la CAD-150-8.'
