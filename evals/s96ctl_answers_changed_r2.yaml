- bot_answer: '# Cálculo de capacidad de batería — AM-8200


    El manual define el procedimiento completo en la sección **11 - ALIMENTACIÓN -
    CÁLCULO DE CONSUMOS** [F2]. A continuación el método paso a paso:


    ---


    ## Fórmula final [F4]


    **Ah Batería = (A + B) × 1,2**


    Donde:

    - **A** = Amperios-hora en condiciones de espera (reposo)

    - **B** = Amperios-hora en condiciones de alarma

    - **1,2** = Factor de corrección por tolerancias de fabricación de las baterías
    [F3]


    ---


    ## Pasos del cálculo


    **Paso 1 — Corriente en reposo (columna A)**


    Suma los consumos de todos los elementos instalados en condiciones de NO ALARMA
    [F4]:


    - AM-8200 CPU (AM8200-KLCD): **179 mA** [F4]

    - LIB-8200 (por unidad): **50 mA** [F4]

    - AM82-2S2C (por unidad): **28 mA** [F4]

    - AM82-BST-C (por unidad): **39 mA** [F4]

    - Corriente de lazos: consultar Tabla 3 del manual [F3]

    - Corriente salida usuario: máx. **2 A** [F4]

    - LCD-8200, campanas, sirenas, flashes, otros dispositivos: añadir según instalación
    [F4]


    > Multiplica cada consumo unitario por la cantidad instalada (columna C) para
    obtener la corriente total de cada elemento.


    **Paso 2 — Calcular Ah en espera**


    Total corriente reposo (A) × duración de espera:

    - **× 24 h** o **× 72 h** según el tiempo de autonomía requerido [F4]


    → Resultado = **Espera (A) en Ah**


    **Paso 3 — Corriente en alarma (columna B)**


    Suma los consumos de todos los elementos en condiciones de ALARMA [F4]:


    - AM-8200 CPU (AM8200-KLCD): **345 mA** [F4]

    - LIB-8200 (por unidad): **92 mA** [F4]

    - AM82-2S2C (por unidad): **28 mA** [F4]

    - AM82-BST-C (por unidad): **39 mA** [F4]

    - Corriente de lazos en alarma: la central enciende **solo los primeros 6 LED**
    de detectores y módulos de entrada en alarma [F3]

    - Comprobar que la corriente total de todos los lazos sea **inferior a 750 mA**
    [F3]

    - Corriente salida usuario: máx. **2 A** [F4]


    **Paso 4 — Calcular Ah en alarma**


    Total corriente alarma (B) × **0,5 h** [F4]


    → Resultado = **Alarma (B) en Ah**


    **Paso 5 — Aplicar factor de corrección**


    **Ah Batería = (A + B) × 1,2** [F3][F4]


    ---


    ## Límites y restricciones a verificar


    - Si el valor de absorción calculado supera **3,5 A**, la corriente en exceso
    durante alarma se extrae de las baterías [F3]

    - Capacidad de baterías admitida: **2 × 12 V, mín. 7 Ah — máx. 18 Ah** [F1]

    - Corriente del cargador de baterías: **1 A** [F1]


    ---


    ## Nota sobre la variante AM-8200BB


    Si tu central es la **AM-8200BB**, los consumos de la CPU son distintos: **135
    mA** en reposo y **177 mA** en alarma [F5]. El procedimiento de cálculo es idéntico.


    ---


    **Fuente:** AM-8200 Manual de Instalación — Doc. AM-8200-ESP Rev. A.3 (sin fecha
    de revisión registrada)


    ---


    También puedo ayudarte con: **baterías recomendadas y dimensiones**, **límites
    de corriente por lazo (Tabla 3)** o **conexionado de la sección de carga de baterías**
    del AM-8200.'
