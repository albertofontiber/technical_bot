- bot_answer: '## RP1r — Sistema no vuelve a estado normal tras resetear después de
    descarga


    Hay dos causas principales documentadas. Comprueba en este orden:


    ---


    ### 1. Reset inhibido por temporización (parámetro r1)


    La central puede tener configurada una inhibición del reset tras el estado **Activado**
    [F1].


    - El parámetro **r1** define un tiempo de hasta **30 minutos** durante el cual
    el reset está bloqueado [F1].

    - Por defecto esta función está **deshabilitada** (microswitch **SW1-6 en posición
    OFF**) [F1].

    - Si SW1-6 está en **ON**, el reset solo se permite una vez transcurrido el tiempo
    configurado en r1 [F1].


    **Qué comprobar:**

    1. Verifica la posición del microswitch **SW1-6** en la placa de la central [F1].

    2. Si está en ON, entra en modo programación y consulta el valor del parámetro
    **r1** — puede estar configurado con un tiempo de espera activo [F1].

    3. Excepción: si la central está en modo **Abort/Hold**, el reset sí está disponible
    independientemente de r1 [F1].


    ---


    ### 2. Fallo de Sistema (System Fault) activo


    Si tras el reset aparece el LED **Fallo Sistema** encendido, la central no habrá
    completado correctamente la inicialización [F3].


    - Esto ocurre cuando el **microprocesador principal** tarda más de lo debido en
    inicializar, o hay una lectura de tensiones fuera de rango por perturbaciones
    externas [F3].

    - **Con Fallo de Sistema activo, la central NO realizará el proceso de extinción**
    al considerar que no está funcionando correctamente [F3].


    **Qué hacer:**

    1. Realiza un **REARME** (botón **Rearme** en el panel) [F4].

    2. Si el fallo desaparece tras el rearme, el sistema es funcional [F3].

    3. Si el fallo persiste, puede indicar una perturbación externa o un problema
    de alimentación — revisa tensiones de alimentación y baterías [F3].


    ---


    ### Resumen rápido


    - **Reset no responde** → Comprueba SW1-6 y el valor del parámetro r1 [F1].

    - **LED Fallo Sistema encendido** → Ejecuta REARME, no solo Reset [F3][F4].


    ---


    Fuentes: MN-DT-102I (sin revisión registrada); HLSI-BT-001 (sin revisión registrada,
    04/11/2011)


    ---


    También puedo ayudarte con: **configuración del parámetro r1 paso a paso**, **procedimiento
    de habilitación del Reset (SW1-6)** o **diagnóstico del LED Fallo de Alimentación**
    en la RP1r.'
