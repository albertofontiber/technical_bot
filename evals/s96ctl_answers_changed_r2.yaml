    ### Número máximo de lazos


    - La **AM2020** soporta un máximo de **10 lazos** [F4], alojados en un gabinete
    CAB-C3 con módulos LIB-400 exclusivamente [F4].

    - La **AFP1010** soporta un máximo de **4 lazos** [F2], alojados en un gabinete
    CAB-A3 con módulos LIB-400 exclusivamente [F2].


    ### Tarjetas de interfaz de lazo (LIB)


    Cada lazo requiere una tarjeta LIB. Los modelos mencionados son [F5]:

    - **LIB-200**

    - **LIB-200A**

    - **LIB-400**


    El sistema puede mostrar en pantalla qué tarjetas LIB están instaladas (posiciones
    1 a 10) [F1]:

    ```

    ESTAN INSTALADAS ESTAS TARJETAS LIB

    1=S,2=S,3=S,4=S,5=N,6=N,7=N,8=N,9=N,10=N

    ```


    ### Número de dispositivos por lazo


    Los fragmentos recuperados **no especifican** el número máximo de dispositivos
    direccionables por lazo. Consulta la sección de especificaciones técnicas del
    manual completo (PN 15088SP) para ese dato.


