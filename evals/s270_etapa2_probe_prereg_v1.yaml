proposito: >-
  Etapa 2 del contrato must-preserve: PROBE UNICO a los 4 targets synthesis-miss (cat018,
  hp002, hp011, hp017) con el mecanismo MUST_PRESERVE_CONTRACT sobre los contextos CONGELADOS
  s113 (sin retrieval). El gate y el instrumento quedan congelados AQUI, antes de construir el
