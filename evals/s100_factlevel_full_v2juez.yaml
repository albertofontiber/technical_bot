- qid: hp013
  question: ¿Cómo se cambia la batería tampón de la Detnov ADW535 sin perder configuración?
  answer: 'El manual del ADW535 **no describe un procedimiento específico para sustituir
    la batería tampón (batería de litio) de forma aislada** sin afectar a la configuración.


    Lo que sí indican los fragmentos es lo siguiente:


    **Sobre la batería de litio:**

    - El LMB 35 incorpora una **batería de litio** y un **módulo de reloj RTC** [F2].

    - El fallo de reloj (código **G80 / 008**) puede deberse a que "la cinta aislante
    de la batería de litio aún no se ha retirado" o a que la "batería de litio es
    defectuosa → Sustituir" [F8].

    - Justo antes del primer encendido del ADW 535, debe retirarse la cinta aislante
    de la batería de litio del LMB 35 [F9].


    **Implicación crítica si se sustituye el LMB 35 completo:**

    Si la batería de litio no es sustituible de forma independiente y requiere cambiar
    el LMB 35, ten en cuenta que:

    1. Tras la sustitución del LMB 35 es **imprescindible realizar un nuevo reset
    inicial** [F1].

    2. Deberán ajustarse nuevamente las **configuraciones específicas del cliente
    y del proyecto** desde el software «ADW Heat-Calc» [F1].

    3. Debe realizarse obligatoriamente una **verificación de la transmisión de alarmas**
    según el cap. 7.7.1 [F1].


    **Conclusión:**

    Los fragmentos disponibles no especifican si la batería de litio es extraíble
    directamente del LMB 35 sin sustituir la placa completa, ni describen un procedimiento
    paso a paso para cambiarla de forma aislada conservando la configuración. Consulta
    el manual físico completo del ADW535 (T 140 358 e es) o contacta con el soporte
    técnico de Securiton/Detnov para confirmar si la batería es reemplazable de forma
    independiente.


    ---


    Fuente: ADW535_TD_T140358es_e (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento completo de sustitución del LMB 35**,
    **reset inicial tras reparación** o **interpretación de códigos de fallo G80**.'
