- qid: hp012
  question: ¿Cuántos lazos direccionables soporta la Notifier AM2020/AFP1010 y cuántos
    dispositivos por lazo?
  answer: '## Lazos y dispositivos por lazo — AM2020 / AFP1010


    ### AM2020


    - **Número máximo de lazos:** hasta **10 lazos** [F6]

    - **Dispositivos por lazo:** hasta **99 detectores analógicos** y **99 módulos**
    (monitores o de control) por lazo [F6]


    ### AFP1010


    - **Número máximo de lazos:** limitado a un máximo de **2 tarjetas LIB-200**,
    lo que equivale a un máximo de **2 lazos** con ese tipo de tarjeta [F1]

    - **Total de dispositivos en el sistema AFP1010:** máximo **396 dispositivos**
    (con dos LIB-200) [F1]

    - Con tarjetas **LIB-400**, el AFP1010 puede alojar hasta **4 lazos** en un gabinete
    CAB-A3 [F3][F5]


    ### Tipos de tarjeta de lazo (LIB)


    Los lazos pueden equiparse con las siguientes tarjetas [F3][F4]:

    - **LIB-200**

    - **LIB-200A**

    - **LIB-400** (ocupa siempre dos posiciones de dirección) [F5]


    > ⚠️ **Nota importante:** El LIB-400 siempre ocupa ambas direcciones en el chasis
    ICA [F5]. No instales tarjetas LIB en las posiciones posteriores derecha o izquierda
    de la segunda fila, ni en la tercera fila [F5].


    ---


    **Fuentes:**

    - Manual MFDT280 (sin revisión registrada) — AM2020 y AFP1010

    - Manual 15088SP (sin revisión registrada) — AM-2020

    - Manual MPDT280 (rev. Rev A) — MPDT-280 / AM2020/AFP1010

    - Manual BTDT032 (sin revisión registrada) — AM2020/AFP1010


    ---


    También puedo ayudarte con: **capacidad de zonas de programación**, **conexionado
    del lazo SLC** o **funcionamiento en Modo Local de las tarjetas LIB**.'
