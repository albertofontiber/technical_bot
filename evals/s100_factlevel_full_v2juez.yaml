- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  answer: 'El manual de la CCD-103 **no describe un procedimiento para desactivar
    un detector individual** sin afectar al resto del lazo.


    Lo que sí especifica el manual sobre desconexión es lo siguiente:


    - La desconexión opera **a nivel de zona completa**, no de detector individual
    [F1].

    - Las **teclas de zona (A)** permiten poner una zona en modo prueba (primera pulsación)
    o en modo desconexión (segunda pulsación) [F1].

    - Al desconectar una zona, se activa el indicador de **anular** y el indicador
    de **fallo/anular/prueba** de esa zona [F1].

    - La llave **G** debe estar en posición abierta para que las pulsaciones del bloque
    de detección tengan efecto [F1].


    La CCD-103 es una central **convencional** con hasta **32 detectores por zona**
    [F4], y la arquitectura de conexionado es en serie con resistencia de final de
    línea de **4K7** [F3][F4]. En este tipo de conexionado, no existe direccionamiento
    individual de detectores.


    **El manual no especifica ningún mecanismo para aislar o desactivar un detector
    concreto dentro de una zona sin afectar al resto de esa zona.** Consulta directamente
    el soporte técnico de Detnov para confirmar si existe algún accesorio o procedimiento
    no documentado en este manual.


    Fuente: CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de puesta en modo prueba de zona**,
    **conexionado de detectores en la zona** o **interpretación de indicadores LED
    de fallo/anular**.'
