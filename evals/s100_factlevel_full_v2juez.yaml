- qid: hp019
  question: ¿Cuál es el rango de temperatura de funcionamiento del detector de aspiración
    ASD535 (Securiton, distribuido por Detnov)?
  answer: '## Rango de temperatura de funcionamiento — ASD 535


    Según la sección de datos técnicos del manual [F1], los rangos de temperatura
    son:


    **Caja del detector:**

    - Rango estándar: **–30 °C hasta +60 °C** [F1]

    - Según norma UL: máximo **+40 °C** [F1]

    - Según estándar australiano **AS 1603.8**: **–30 °C hasta +55 °C** [F1]


    **Conducto de aspiración:**

    - Rango estándar: **–30 °C hasta +60 °C** [F1]

    - Según estándar australiano **AS 1603.8**: **–30 °C hasta +55 °C** [F1]


    **Fluctuación máxima permitida durante el funcionamiento** (tanto en caja como
    en conducto): **20 °C** [F1] [F5]


    **Temperatura de almacenamiento** (sin condensación): **–30 °C hasta +70 °C**
    [F1]


    ---


    **Consideraciones adicionales importantes:**


    - Si las oscilaciones térmicas superan los **20 °C** (entre caja y conducto, o
    en cada uno por separado), pueden ser necesarios ajustes especiales: ventana de
    flujo de aire más grande, mayor tiempo de retardo, etc. [F5]

    - En recintos con temperatura superior a **50 °C** o humedad superior al **80
    % H rel.**, puede ser necesario instalar tramos de refrigeración en el conducto
    de aspiración [F6]

    - Para uso en **almacenes de ultracongelación**, el rango restringido aplicable
    es **–30 °C hasta 0 °C**, siguiendo la directriz **T 131 390** [F3]

    - Es posible acordar con el fabricante rangos de temperatura inferiores o superiores
    a los estándar [F2]


    ---


    **Fuente:** ASD535, Descripción técnica, T 131 192 h es (sin revisión registrada)


    ---


    También puedo ayudarte con: **consumos de corriente por variante (535-1 a 535-4)**,
    **condiciones de humedad ambiental** o **uso en condiciones adversas** del ASD
    535.'
