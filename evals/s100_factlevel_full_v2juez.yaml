  question: ¿Cómo se alimenta la sirena/avisador intrínsecamente seguro IS-mA1 en
    una zona peligrosa (ATEX) y cuáles son sus parámetros de seguridad intrínseca
    de entrada?
  answer: '# Alimentación e IS del IS-mA1 en zona peligrosa (ATEX)


    ## Clasificación ATEX y zonas de uso


    El IS-mA1 está certificado como [F1]:

    - **II 1G Ex ia IIC T4 Ga**

    - Apto para **zonas 0, 1 y 2** con gases y vapores inflamables, grupos **IIA,
    IIB e IIC**, clases de temperatura **T1 a T4** [F1]

    - Rango de temperatura ambiente: **-40 °C ≤ Ta ≤ +60 °C** [F1]

    - Certificado: **SIRA 05ATEX2084X** (sufijo X = condiciones especiales de uso)
    [F1]


    ---


    ## Parámetros de seguridad intrínseca de entrada (Entity Parameters)


    ### Terminales **+ respecto a −** (alimentación principal del avisador):


    - **Ui = 28 V** [F1]

    - **Ii = 93 mA** [F1]

    - **Pi = 660 mW** [F1]

    - **Ci = 0** [F1]

    - **Li = 0** [F1]


    ### Terminales **S2 y S3 respecto a −** (cambio de tono / multietapa):


    - **Ui = 28 V** [F5]

    - **Ii = 0 mA** [F5]


    > ⚠️ La corriente permitida en S2/S3 es **cero**. Esto condiciona directamente
    qué aparatos asociados pueden conectarse (ver más abajo).


    ---


    ## Cómo alimentar el IS-mA1: opciones de aparato asociado


    ### Opción A — Barreras Zener (shunt zener diode barrier)


    El aparato asociado en zona segura debe tener parámetros de salida **iguales o
    inferiores** a [F3]:

    - **Uo ≤ 28 V**

    - **Io ≤ 93 mA**

    - **Po ≤ 660 mW**

    - **Co ≥ Ccable**

    - **Lo ≥ Lcable**


    ⚠️ La capacitancia total conectada a los terminales +/− (cable + cualquier otra)
    **no debe superar 83 nF** [F3].


    Para el control de etapas (S2/S3) con barreras Zener, se usa una **barrera de
    retorno de diodo** con [F3]:

    - **Uo ≤ 28 V**

    - **Io = 0**

    - Solo se admiten barreras de retorno de diodo con **caída de tensión inferior
    a 0,9 V** [F5]


    ### Opción B — Aisladores galvánicos


    El aislador galvánico no requiere conexión a tierra de alta integridad [F10].
    Debe estar certificado **Ex ia** por un Organismo Notificado y tener parámetros
    de salida dentro de los límites especificados [F10]:

    - **Uo ≤ 28 V**

    - **Io ≤ 93 mA**

    - **Po ≤ 660 mW**

    - **Co ≥ Ccable** [F4]

    - **Lo ≥ Lcable** [F4]


    Para S2/S3 con aisladores galvánicos, se usan **relés galvánicamente aislados**
    con [F4]:

    - **Uo = 0**

    - **Io = 0**


    ---


    ## Esquemas de conexión disponibles


    ### Alarma de una sola etapa:

    - **Fig 4**: Barrera Zener de canal único (interruptor en positivo) [F8]

    - **Fig 5**: Barrera Zener + barrera de retorno de diodo (interruptor en negativo)
    [F8]

    - **Fig 7**: Aislador galvánico [F10]


    ### Alarma multietapa (2 o 3 tonos):

    - **Fig 6**: Barrera Zener principal + barreras de retorno de diodo para 2.ª y
    3.ª etapa [F7]

