- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov
    CAD-250: como se crea, como se definen las entradas/eventos que la disparan y
    como se asignan las salidas?'
  answer: "# Configuración de una Maniobra (Causa-Efecto) en la CAD-250\n\n> ⚠️ La\
    \ programación de maniobras es una de las funciones más críticas de la configuración\
    \ del sistema. Requiere conocimiento específico del sistema instalado, del plan\
    \ de protección y del producto [F6].\n\n---\n\n## CONCEPTO PREVIO\n\nUna maniobra\
    \ es un conjunto de acciones programadas en función de los estados del sistema.\
    \ Los cambios de estado se llaman **eventos** (entradas) y a cada evento se asocia\
    \ una **acción** (salida: sirenas, relés, etc.) [F1].\n\nLa estructura es siempre:\
    \ **Entradas → Lógica (Coincidencias) → Salidas** [F1].\n\nEl número máximo de\
    \ entradas y salidas configuradas entre todas las maniobras es de **100.000**\
    \ [F3][F8].\n\n---\n\n## PASO 1 — ACCEDER AL MENÚ DE MANIOBRAS\n\nRuta de navegación\
    \ [F1][F10]:\n\n**MENÚ** → **MANIOBRAS** → **MANIOBRAS** (submenú) → **+AÑADIR**\
    \ (barra de navegación inferior)\n\nEsto crea una nueva maniobra vacía (p. ej.\
    \ \"Maniobra 0001\") [F2].\n\n---\n\n## PASO 2 — DEFINIR LA LÓGICA DE COINCIDENCIAS\n\
    \nAntes de añadir eventos, configura el campo **COINCIDENCIAS**: indica cuántos\
    \ eventos deben cumplirse simultáneamente para que la maniobra se ejecute [F2]:\n\
    \n- **Coincidencias = 1** → lógica **OR**: basta con que se cumpla cualquiera\
    \ de los eventos [F2].\n- **Coincidencias = 2** (con 2 eventos) → lógica **AND**:\
    \ deben cumplirse todos [F2].\n- **Coincidencias = N de M** → se deben cumplir\
    \ N eventos cualesquiera de los M definidos [F2].\n\n---\n\n## PASO 3 — AÑADIR\
    \ EVENTOS (ENTRADAS)\n\n1. Pulsa **AÑADIR** en el margen inferior de la pantalla\
    \ [F3].\n2. En la ventana emergente, selecciona **EVENTO** [F3].\n3. Elige el\
    \ tipo de evento [F3]:\n   - **ENTIDAD**: cualquier elemento de la jerarquía del\
    \ sistema (instalación, panel, lazo, área, zona, dispositivo, grupo o módulo virtual),\
    \ tanto local como en red [F3][F6].\n   - **CONDICIÓN TEMPORAL**: establece un\
    \ periodo de tiempo para el que la ecuación de entrada sea verdadera [F3].\n\n\
    ### Si eliges ENTIDAD, configura los siguientes parámetros [F6][F7]:\n\n- **Origen:**\n\
    \  - Local o Red [F6][F7].\n  - Nivel jerárquico: instalación, panel, lazo, área,\
    \ zona, dispositivo, grupo o módulo virtual [F6][F7].\n\n- **Condición (estado):**\
    \ [F7]\n  - *Alarma*: uno o más elementos en alarma.\n  - *Avería*: uno o más\
    \ elementos en avería.\n  - *Técnico*: una o más entradas activas.\n\n- **Tipo\
    \ (discriminación de dispositivo):** [F6][F7]\n  - *Todos*: cualquier dispositivo\
    \ activo en la entidad.\n  - *Pulsadores*: únicamente pulsadores.\n  - *Detectores*:\
    \ únicamente detectores.\n  - *Entrada*: únicamente entradas.\n\n- **Lógico:**\
    \ [F7]\n  - *Normal*: la condición de estado es verdadera.\n  - *No (Negado)*:\
    \ invierte la condición (p. ej. \"no hay alarma\") [F6].\n\n- **Repeticiones:**\
    \ valor entero hasta **9999** [F6][F7]. Indica cuántas veces debe repetirse el\
    \ evento en la entidad para que la entrada sea válida. Ejemplo: zona en alarma\
    \ con repeticiones = 3 → la condición es verdadera cuando 3 detectores estén en\
    \ alarma [F7].\n\n> ⚠️ El sistema gestiona **eventos** (cambios de estado), no\
    \ estados estáticos. El evento es el cambio de estado; si coincide con la condición\
    \ establecida, activa las salidas [F3].\n\nPuedes añadir tantos eventos como necesites.\
    \ Repite el proceso para cada entrada [F5].\n\n**Nota:** Desde la versión 1.1.1\
    \ es posible seleccionar un elemento de salida como condición de entrada. En ese\
    \ caso, será el cambio a condición de avería el que hará verdadera la entrada.\
    \ Para ello, desmarca la casilla **\"Sólo dispositivos de entrada\"** [F5].\n\n\
    ---\n\n## PASO 4 — AÑADIR ACCIONES (SALIDAS)\n\n1. Pulsa **AÑADIR** en el margen\
    \ inferior de la pantalla [F4].\n2. En la ventana emergente, selecciona **ACCIÓN**\
    \ [F4].\n3. Configura los campos [F4][F6]:\n\n- **Retraso (s):** tiempo de espera\
    \ antes de ejecutar la acción, configurable entre **0 y 600 segundos** [F4][F6].\
    \ El retardo se inicia desde el momento en que la condición de entrada es verdadera\
    \ [F6].\n\n- **Entidad (destino):** panel, lazo, área, zona, dispositivo, grupo\
    \ o módulo virtual [F4][F6].\n  > Las acciones siempre son relativas a la entidad\
    \ seleccionada [F4][F8].\n  > El programa **no permite mezclar acciones sobre\
    \ entidades de paneles diferentes** [F8].\n\n- **Tipo de acción:** [F6]\n  - *Activar,\
    \ Desactivar, Habilitar, Deshabilitar, Test, Reiniciar o Pulso*.\n\n- **Tipo de\
    \ dispositivo afectado:** [F6]\n  - *Todos, Sirenas, Relés, Sirena discontinua*.\n\
    \nPuedes añadir tantas acciones como necesites. Repite el proceso para cada salida.\n\
    \n---\n\n## PASO 5 — GUARDAR LA MANIOBRA\n\nUna vez definidos todos los eventos\
    \ y acciones, pulsa **GUARDAR** para actualizar la base de datos [F8]. La pantalla\
    \ mostrará el listado completo de eventos y acciones de la maniobra.\n\n---\n\n\
    ## EJEMPLO PRÁCTICO (extraído del manual) [F9][F10]\n\nManiobra: *\"Alarma en\
    \ Panel HOSPITAL UNIVERSITARIO → Activar Panel HOSPITAL UNIVERSITARIO\"*\n\n1.\
    \ Menú → Maniobras → Maniobras → Añadir → nueva maniobra creada.\n2. Añadir →\
    \ **EVENTO** → **ENTIDAD** → **LOCAL** → pestaña **PANEL** → seleccionar \"HOSPITAL\
    \ UNIVERSITARIO\".\n3. Configurar: Tipo = *Alarma*, Lógico = *Normal*, Repeticiones\
    \ = 1 → **GUARDAR**.\n4. Añadir → **ACCIÓN** → Retraso = 0 → **ENTIDAD** → pestaña\
    \ **PANEL** → seleccionar \"HOSPITAL UNIVERSITARIO\".\n5. Configurar: Tipo = *Activar*,\
    \ Todos → **GUARDAR**.\n6. Maniobra completa.\n\n---\n\n## ELEMENTOS ADICIONALES\
    \ DEL MENÚ MANIOBRAS [F1]\n\n- **Grupos:** asociaciones de elementos (áreas, zonas,\
    \ dispositivos) para simplificar reglas de actuación.\n- **Módulos Virtuales:**\
    \ permiten crear bucles interdependientes; un conjunto de entradas determina el\
    \ estado del módulo virtual, que a su vez puede actuar como entrada de otra maniobra.\n\
    - **Estado VM:** visualización y activación de módulos virtuales, o uso como botones\
    \ de acceso rápido desde la pantalla principal.\n\n---\n\n**Fuentes:**\n- CAD-250\
    \ Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n- CAD-250 Manual\
    \ de Software de Configuración MS-416-es-2026-b (rev. b)\n- Manual de Instalación\
    \ CAD-250 MI-372-es-2024-e (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **configuración de Grupos**, **creación de Módulos Virtuales** o **ejemplo\
    \ de maniobra con condición temporal** en la CAD-250."
