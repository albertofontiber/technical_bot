- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  answer: '# RP1r: Sistema no vuelve a estado normal tras resetear después de extinción


    Este es un comportamiento **esperado y normativo**. Hay varias causas posibles
    según los fragmentos disponibles:


    ---


    ## Causa 1 — Parámetro **ri** (Resumen inhibido tras extinción) activo


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F10], tras la extinción
    realizada el sistema debe pasar a un estado de **sistema inhibido** durante un
    intervalo de tiempo programable, para evitar iniciar nuevamente el proceso de
    extinción.


    El parámetro **ri** controla este comportamiento [F10]:


    - **ri = 00**: Resumen inhibido desde finalizar extinción (por defecto)

    - **ri = 01 a 30**: Resumen inhibido después de intervención o reposición, en
    minutos


    **Acción:** Verifica el valor programado en el parámetro **ri**. Si está en 00
    (por defecto), el sistema permanecerá inhibido hasta que se realice la intervención/reposición
    manual. Esto es comportamiento correcto según norma.


    ---


    ## Causa 2 — Función de rearme inhibida (según EN12094:1, Sección 4.12.2)


    La norma **EN12094:1 Sección 4.12.2** permite inhibir la función de rearme una
    vez iniciado el estado de Activación [F1][F3]. En ese caso, el rearme estándar
    desde nivel 2 no funcionará.


    **Para habilitar el rearme en este caso** [F1][F3]:


    1. Sitúa el microinterruptor **SW1-6** en posición **ON**

    2. La pantalla de 7 segmentos mostrará **S1** (confirma cambio de configuración)

    3. Coloca un puente en la posición **PROG** (esquina inferior izquierda de la
    placa base)

    4. Pulsa la tecla **Rearme**

    5. El **led número 6** se iluminará en **rojo fijo** como confirmación


    ---


    ## Causa 3 — Fallo de Sistema activo


    Si aparece el indicador **Fallo Sistema** [F5][F6], la central puede no completar
    el rearme correctamente. Esto ocurre cuando el microprocesador principal tarda
    en inicializar o detecta tensiones fuera de rango [F5].


    **Acción:** Realiza un rearme completo. Si el **Fallo Sistema** persiste tras
    el rearme, desconecta alimentación principal y baterías, vuelve a conectar y rearma
    de nuevo [F5].


    ---


    ## Causa 4 — Entradas enclavadas con avería activa


    Todas las averías son **enclavadas por defecto** y requieren rearme manual [F7].
    Si alguna condición de avería sigue presente (presión baja, señal de flujo, puerta
    abierta, etc.), el sistema no volverá a estado normal aunque se pulse Rearme.


    **Acción:** Comprueba los LEDs de avería del panel:

    - **Presión Baja** (led 7/8)

    - **Presión/Flujo** (led 5/6)

    - **Cto. Supervisión Paro/Espera**

    - **Sirenas Fallo/Anuladas**

    - **Fallo Alimentación / Avería Alimentación Auxiliar**


    Resuelve la condición de avería antes de rearmar [F7].


    > ⚠️ **Recuerda:** Para rearmar siempre se requiere **nivel de acceso 2** (llave
    o teclado habilitado) [F3][F7].


    ---


    Fuentes: Manual de usuario RP1r (MNDT102, sin revisión); Boletín técnico HLSI-BT-001
    (04/11/2011); Información técnica HLSI-TI-005 (07/07/2011); Guía rápida RP1r-Supra
    (HLSI-MA-103_01 v.03); Manual MN-DT-102I (sin revisión)


    ---


    También puedo ayudarte con: **verificación del parámetro ri paso a paso**, **procedimiento
    de puesta en servicio nivel 3** o **diagnóstico del indicador Fallo Sistema en
    la RP1r**.'
