- qid: cat005
  question: ¿Cuáles son las características técnicas de la central de detección de
    gas Fidegas CS4, y en qué se diferencian las versiones digital y analógica?
  answer: "# Central de Alarmas FIDEGAS® CS4 — Características Técnicas\n\n## Especificaciones\
    \ generales\n\n- **Tensión de alimentación:** 110-230 Vac, 50-60 Hz [F2]\n- **Potencia:**\
    \ 30 W, Clase II [F2][F3]\n- **Número de sensores:** hasta 4 conexiones simultáneas\
    \ [F1][F2]\n- **Corriente máxima:** 250 mA [F2]\n- **Salidas:** 2 salidas conmutadas\
    \ LP (relé apto para 230 Vac) con contactos NA-C-NC [F1][F2]\n- **Rearme:** seleccionable\
    \ manual o automático [F2]\n- **Dimensiones:** 90 x 106 x 58 mm [F2]\n- **Peso:**\
    \ 300 g [F2]\n- **Instalación:** carril DIN o armario de superficie [F1]\n- **Firmware:**\
    \ versión 1.2 (tanto digital como analógica) [F3][F7]\n\n## Indicaciones (LEDs\
    \ y avisador)\n\n- **LED verde PWR:** alimentación presente (fijo) / corte de\
    \ red (intermitente) [F1]\n- **LED bicolor ON/ALARM** por sensor: sensor presente\
    \ (verde) / alarma (rojo) [F1]\n- **LED amarillo ERROR** por sensor: avería del\
    \ sensor remoto [F1]\n- **LED verde OUT1 y OUT2:** salida activa (verde) / desactivada\
    \ (apagado) [F1]\n- **Avisador acústico:** apoyo sonoro a las indicaciones ópticas\
    \ [F1]\n\n---\n\n## Diferencias entre versión Digital y Analógica\n\n### Tipo\
    \ de señal de entrada\n- **Versión digital:** entradas **0-10/15 V** [F1]\n- **Versión\
    \ analógica:** entradas **4-20 mA** [F1]\n\n### Código de producto\n- **Versión\
    \ digital:** código **3244** [F2]\n- **Versión analógica:** código **3270** [F2]\n\
    \n### Sensores compatibles\n- **Versión analógica:** [F3]\n  - Sensores S/3 gases\
    \ combustibles\n  - Sensores S/3 y S/2 gases tóxicos\n  - Sensores S/10 gases\
    \ tóxicos\n- **Versión digital:** [F3]\n  - Sensores S/10 gases combustibles\n\
    \n---\n\n## Umbral de alarma\n\nEl nivel de alarma se activa cuando la concentración\
    \ de gas supera el **20% del fondo de escala** [F6]. Las alarmas son **enclavadas**\
    \ y requieren pulsación del botón **RESET** para rearmar [F1][F6].\n\n> ⚠️ **Nota:**\
    \ Si la concentración de gas no ha disminuido, la central no puede ser rearmada,\
