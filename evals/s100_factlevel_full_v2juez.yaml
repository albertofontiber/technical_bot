- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  answer: "# Programación de coincidencia de 2 detectores → salida de sirena en ID3000\n\
    \n## Concepto previo importante\n\nLa función de coincidencia requiere que la\
    \ entrada de la Matriz de Control esté definida como **'ZONA'**, **'SUBZONA'**\
    \ o **'CUALQUIER ZONA'** — no funciona si la entrada es un equipo individual o\
    \ una tecla [F1].\n\n⚠️ **PRECAUCIÓN (EN54-2: 7.1.4):** No incluyas pulsadores\
    \ manuales (MCP/PUL) en el grupo de coincidencia [F1][F3].\n\n---\n\n## Procedimiento\
    \ de programación\n\n### Si usas el software PK-ID3000 (PC)\n\n1. Accede a la\
    \ **Matriz de Control** y crea o edita la línea de entrada correspondiente a la\
    \ zona de sirenas [F2][F6].\n\n2. En la ventana **\"Edición Evento de Entrada\
    \ en la Matriz de Control\"**, selecciona:\n   - **Tipo Evento:** `ALARMA`\n \
    \  - **Zona(s) Determinada:** introduce el número de zona (p. ej. De: 10 a: 10)\
    \ [F2]\n\n3. En el campo **\"Coincidencia de Equipos\"**, activa la casilla y\
    \ selecciona **2 equipos** [F2][F6].\n\n4. Pulsa **Aceptar** para confirmar.\n\
    \n---\n\n### Si programas desde el panel (teclado)\n\n1. Entra en **Matriz de\
    \ Control → Crear nuevo evento** [F3].\n\n2. En la selección de entrada, elige\
    \ **\"Única zona\"** (zona determinada) [F3].\n\n3. En **\"¿Limitado por TIPO?\"\
    **, selecciona el tipo de detector aplicable (p. ej. `CUALQUIER TIPO DE EQUIPO`,\
    \ o un tipo específico como `CUALQUIER SENSOR IÓNICO`, `CUALQUIER SENSOR TÉRMICO`,\
    \ etc.) [F3].\n\n   > **Nota:** No puedes combinar coincidencia de zona con limitación\
    \ por tipo en la misma entrada de matriz [F3].\n\n4. En **\"Indique tipo de coincidencia\"\
    **, selecciona:\n   ```\n   2: COINCIDENCIA 2 EQUIPOS\n   ```\n   [F3]\n\n5. Asigna\
    \ la salida de sirena correspondiente y confirma.\n\n---\n\n## Condición de funcionamiento\n\
    \nPara que se active la salida, **los dos equipos en alarma deben estar en la\
    \ misma zona o subzona** [F3]. Si la entrada es por subzona, la coincidencia está\
    \ limitada a dos equipos y el tipo es siempre \"cualquier tipo de equipo\" [F4].\n\
    \n---\n\n## Si hay pulsadores manuales en la misma zona\n\nDebes crear **dos instrucciones\
    \ separadas** en la Matriz de Control [F1][F3]:\n\n1. **Primera instrucción:**\
    \ entrada tipo `Pulsador Manual (MCP)` → coincidencia **Simple** (sin coincidencia,\
    \ un único equipo activa la salida).\n2. **Segunda instrucción:** entrada tipo\
    \ `ANALÓGICO` (detectores térmicos, iónicos, ópticos, VIEW, multisensor) → coincidencia\
    \ **2 equipos**.\n\n---\n\nFuentes:\n- MCDT190 (sin revisión registrada) — Sección\
    \ 6.1.5\n- MPDT190 (sin revisión registrada) — Secciones 7 y 11.21\n- MADT190_07\
    \ (sin revisión registrada) — Edición Evento de Entrada en la Matriz de Control\n\
    \nTambién puedo ayudarte con: **configuración de niveles de coincidencia avanzados\
    \ (n equipos)**, **comportamiento de coincidencia en sistemas de red** o **programación\
    \ de retardos de activación de sirena**."
