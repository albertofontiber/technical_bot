- qid: hp010
  question: En la Morley DXc, ¿cómo se añade un nuevo detector al lazo tras la puesta
    en marcha inicial?
  answer: "# Añadir un nuevo detector al lazo en la Morley DXc\n\nCuando se conecta\
    \ un nuevo detector al lazo tras la puesta en marcha, la central genera el evento\
    \ **\"EQUIPO NUEVO\"** [F2]. El procedimiento para aceptarlo es realizar una **Autobúsqueda\
    \ de equipos**:\n\n---\n\n## Pasos\n\n1. **Accede al menú de Lazos** (Nivel de\
    \ acceso de configuración).\n\n2. **Pulsa la tecla `2`** para seleccionar la función\
    \ **'Autobúsqueda'** [F1].\n\n3. Si la central tiene más de un lazo, **introduce\
    \ el número de lazo** donde está el nuevo detector y pulsa **⊙** para confirmar\
    \ [F1].\n\n4. Confirma que deseas realizar la autobúsqueda cuando aparezca la\
    \ pantalla:\n   ```\n   [Autobusqueda]  Lazo: X  Autobusqueda?\n   OK:Confirm\
    \          ←:Cancel\n   ```\n   Pulsa **⊙** para iniciar el proceso [F1].\n\n\
    5. Espera a que finalice el reconocimiento. La pantalla mostrará una barra de\
    \ progreso [F1].\n\n6. Al terminar, **verifica el resumen** en pantalla: comprueba\
    \ que el total de equipos y los tipos mostrados corresponden con los equipos físicamente\
    \ instalados [F1].\n   - Los campos mostrados son: `ION`, `OPT`, `TMP`, `MLT`,\
    \ `PUL`, `MON`, `SIR`, `REL`, `OTROS` [F1].\n   - El nuevo detector debe aparecer\
    \ reflejado en el contador correspondiente.\n\n7. Pulsa **⊞** para salir y regresar\
    \ al menú de Lazo [F1].\n\n---\n\n## ⚠️ Advertencias importantes\n\n- Si el protocolo\
    \ es seleccionable y se ha realizado un cambio de protocolo, **espera dos minutos\
    \ antes de ejecutar la autobúsqueda** [F1].\n- **No puentees los terminales**\
    \ en ningún punto del lazo al conectar el nuevo detector; corta el cable en cada\
    \ conexión para mantener la supervisión [F4].\n- Se recomienda instalar **aisladores\
    \ de cortocircuito** con un máximo de **32 sensores/pulsadores entre aisladores**\
    \ [F3].\n\n---\n\n## Eventos relacionados que pueden aparecer\n\n- **EQUIPO NUEVO**:\
    \ detector detectado pero no aceptado → solución: realizar autobúsqueda [F2].\n\
    - **DOBLE DIRECCION**: dos equipos con la misma dirección → cambiar la dirección\
    \ de uno de ellos [F2].\n- **TIPO EQUIPO CAMBIADO**: el tipo de equipo no coincide\
    \ con el configurado → repetir autobúsqueda o cambiar el tipo [F2].\n\n---\n\n\
    **Fuente:** DXc_Manual de configuracion (sin revisión registrada); Eventos-Averias-de-Equipos-en-DXc\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **verificación\
    \ del equipo añadido mediante \"Ver Equipos\"**, **configuración de zona y grupo\
    \ del nuevo detector** o **instalación del cableado del lazo analógico**."
