- qid: cat016
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo
    y como se prueba que funciona?
  answer: "# CAD-150-8: Alta de detector nuevo y prueba funcional\n\n## Parte 1: Alta\
    \ de un detector nuevo en el lazo\n\nLos fragmentos disponibles **no describen\
    \ el procedimiento específico de alta/programación de un detector nuevo** en el\
    \ lazo (asignación de dirección, tipo de detector, zona, etc.). Para ese procedimiento\
    \ necesitarás consultar el manual de instalación/programación completo o el software\
    \ de configuración.\n\nLo que sí indica el manual es que [F6]:\n- La configuración\
    \ básica puede realizarse desde el teclado de la central o mediante el **software\
    \ de configuración** (recomendado por ser más sencillo y rápido).\n- Antes de\
    \ conectar dispositivos al lazo, se recomienda alimentar y probar la central primero\
    \ [F10].\n\n---\n\n## Parte 2: Prueba funcional del detector\n\nUna vez instalado\
    \ el detector, el procedimiento de prueba es el siguiente [F1][F2]:\n\n1. **Accede\
    \ al menú ZONA** desde el menú principal (requiere código de nivel 2) [F5].\n\
    2. **Selecciona la opción PRUEBA** dentro del menú ZONA [F1].\n3. **Configura\
    \ el rango de zonas** a poner en prueba:\n   - Campo **RANGO**: introduce la zona\
    \ o rango de zonas (de **000** a **250**) [F1].\n4. **Selecciona si se activan\
    \ las sirenas** durante la prueba:\n   - **ACTIVAR SIRENAS: [SI]** → Las sirenas\
    \ se activarán unos segundos tras la alarma del detector y se silenciarán automáticamente\
    \ [F1].\n   - **ACTIVAR SIRENAS: [NO]** → La prueba se realiza sin activar sirenas\
    \ [F1].\n5. Pulsa **ACEPTAR** para confirmar [F2].\n6. **Activa el detector**\
    \ (aerosol de prueba, calor, etc.). Si el detector entra en alarma, el sistema\
    \ lo registra **sin necesidad de rearmar la central** [F1].\n\n### Comportamiento\
    \ del modo prueba [F1][F2]:\n- Si transcurren **20 minutos** desde la activación\
    \ del modo prueba sin que se haya disparado ninguna alarma, el sistema **vuelve\
    \ automáticamente al estado normal**.\n- Cualquier retardo programado en las sirenas\
    \ queda **anulado** durante la prueba para agilizarla.\n\n### Para salir del modo\
    \ prueba [F1]:\n- Accede al menú ZONA → selecciona **CONECTAR** la zona.\n\n---\n\
    \n### Verificación adicional del sistema [F7]:\n- Comprueba que al provocar la\
    \ alarma se activa el **relé de alarma** y las **salidas de sirena** una vez transcurrido\
    \ el tiempo de retardo programado.\n\n---\n\n**Fuentes:**\n- `55315008-Manual-Centrales-Analogicas-CAD-150-8-Usuario-ES-FR-GB-IT`\
    \ (sin revisión registrada)\n- `55315013 Manual Centrales Analogicas CAD-150-8\
    \ Instalacion ES FR GB IT` (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
