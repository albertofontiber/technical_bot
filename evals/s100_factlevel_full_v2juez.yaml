  question: ¿Qué detectores de humo analógicos son compatibles con la Notifier ID3000?
  answer: '## Detectores de humo analógicos compatibles con la ID3000


    Según los fragmentos disponibles, los detectores de humo analógicos compatibles
    con la **ID3000** (que utilizan protocolo de comunicaciones Notifier) son los
    siguientes:


    ### Detectores ópticos (humo por dispersión de luz)

    - **SDX-751EM** — Óptico [F1][F2]

    - **SDX-751** — Óptico [F2]

    - **SDX551E** — Óptico [F2]

    - **SDX-551THE** — Óptico [F2]

    - **HPX-751E** — HARSH/FILTREX (Óptico) [F1][F2]

    - **IDX-751** — HAZARD, óptico intrínsecamente seguro [F1][F2]


    ### Detectores iónicos

    - **CPX-751E** — Iónico (bajo perfil) [F1][F2]

    - **CPX-551E** — Iónico [F2]


    ### Detectores multicriterio (combinado humo + térmico)

    - **SDX-751TEM** — Optiplex (combinado térmico/humo) [F1][F2]

    - **SDX-751-TEM** — OptiPlex [F2]

    - **IRX-751TEM** — SMART 3 (multicriterio) [F2]

    - **IRX-751CTEM** — SMART 4 (multicriterio) [F2]


    ### Detectores VIEW™ (humo láser, alta sensibilidad)

    - **FSL-751E** — VIEW (humo láser) [F1][F2]

    - **LPX-751** — VIEW [F2]


    > **Nota sobre los VIEW™:** Estos sensores detectan cantidades muy pequeñas de
    humo de fuego incipiente. Se configuran con **9 niveles de sensibilidad** (L1
    más sensible, L9 menos sensible). La sensibilidad estándar es **2,44%/m (L8)**,
    alta entre **2,44%/m (L8) y 0,98%/m (L5)**, y muy alta a partir de **0,98%/m (L5)**
    [F4][F5][F6].


    > **Nota sobre el SMART4 (IRX-751CTEM):** Incorpora detección fotoeléctrica (óptica),
    por infrarrojos, térmica y de monóxido de carbono [F7].


    ### Detectores por rayo (barrera)

    - **LPB500** (máximo 4 por lazo) [F2]

    - **LBP-700 / LBP-700T** [F2]


    ---


    **Fuentes:**

    - MPDT190 — Panel ID3000, Manual de programación (sin revisión registrada)

    - MIDT190 — Panel ID3000, Manual de instalación y puesta en marcha (sin revisión
    registrada)

    - MCDT190 / MCDT191 — Panel ID3000, Manual de configuración (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de sensibilidad de los VIEW™**, **programación
    del tipo de sensor en el lazo** o **módulos de control y monitorización compatibles
    con la ID3000**.'
