- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '# Test anual del detector VESDA-E VEP


    ## Tareas que el manual asigna a frecuencia anual ("Una vez al año")


    Según la **Tabla 7-1** del manual [F1][F2], las comprobaciones de mantenimiento
    con periodicidad **anual** son las siguientes:


    - **Realizar una prueba de humos** para comprobar la integridad de la red de tubería
    [F1][F2]

    - **Comprobar el flujo** de la red de tubería [F1][F2]

    - **Limpiar los puntos de muestreo** [F1][F2]

    - **Limpiar con agua la red de tubería** [F1][F2]


    ---


    ## Cómo ejecutar las pruebas desde Xtralis VSC


    El software **Xtralis VSC** permite lanzar los siguientes comandos de prueba relevantes
    para el test anual [F5][F6]:


    - **"Start Alarm Test"** — Simula nivel de humo de escala completa, generando
    condiciones de Alerta, Acción, Fuego 1 y Fuego 2. Se activarán los relés de alarma
    salvo que el detector esté desactivado [F5][F6].

    - **"Start Air Flow Fault Test"** — Comprueba el sistema de detección de circulación
    del aire apagando el aspirador [F5][F6].

    - **"Start Relay Test"** — Activa y desactiva los relés disponibles para verificarlos
    [F5][F6].

    - **"Start Major Fault Test"** — Genera un fallo importante y desactiva el relé
    de fallo durante **2 minutos** [F5][F6].

    - **"Start Minor Fault Test"** — Genera un fallo menor y desactiva el relé de
    fallo durante **2 minutos** [F5][F6].


    ---


    ## Prueba de humos: referencia al procedimiento detallado


    El manual indica que los detalles del procedimiento de prueba de humos se encuentran
    en la **VESDA-E Commissioning Guide** (guía de puesta en marcha de VESDA-E) [F3].
    Los fragmentos disponibles no incluyen ese documento, por lo que el procedimiento
    paso a paso de la prueba de humos debe consultarse en dicha guía.


    ---


    ## Precauciones obligatorias antes de iniciar el mantenimiento


    ⚠️ **Antes de realizar cualquier prueba o mantenimiento** [F1][F2]:


    1. **Informe a la autoridad supervisora adecuada.**

    2. **Aísle los dispositivos dependientes del detector** antes de ponerlo en funcionamiento.

    3. Siga los procedimientos del sitio para evitar falsas alarmas en los servicios
    supervisados.


    > Cuando el detector está deshabilitado o en modo en espera, **no emitirá advertencias
    de fuego** [F1][F2].


    ---


    ## Modo en espera durante el mantenimiento de tubería


    Para trabajos en la red de tubería o puntos de muestreo, se recomienda poner el
    detector en **modo en espera** mediante Xtralis VSC: selecciona **"Go to Standby"**
    en el menú **Dispositivo ("Device")**. Para reactivar, selecciona **"End Standby"**
    [F4].


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


