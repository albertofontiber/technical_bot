- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  answer: "# Notifier PEARL — Capacidad de lazo SLC, aisladores y alta/edición de\
    \ equipos\n\n---\n\n## 1. Capacidad máxima por lazo\n\n- **Protocolo Opal:** hasta\
    \ **159 sensores + 159 módulos** por lazo [F1][F2]\n- **Protocolo CLIP:** hasta\
    \ **99 sensores + 99 módulos** por lazo [F2]\n- **Protocolo mixto (Opal + CLIP):**\
    \ el límite de equipos CLIP en lazo mixto es de **40**; si se supera, la autoconfiguración\
    \ continúa pero señala fallos [F7]\n- **Máximo total del sistema (ambos lazos):**\
    \ **512 sensores y/o pulsadores manuales** para cumplir EN54-2 [F1]\n- **Carga\
    \ máxima por lazo:** **0,75 A** [F2]\n\n---\n\n## 2. Requisitos de aisladores\
    \ (EN54-2: 12.5.2)\n\n- **Regla general EN54-2:** máximo **32 equipos entre aisladores**\
    \ [F1]\n- **Equipos SIN aislador interno** (incluidos CLIP y algunos Opal): **NO\
    \ más de 20 equipos entre aisladores** [F1]\n- **Equipos CON aislador interno**\
    \ (usados con base **B501 AP**): el lazo cumple directamente los requisitos de\
    \ EN54-2 [F1]\n- **Equipos Opal:** la mayoría incorporan aisladores FET internos;\
    \ con bases compatibles Opal, el aislador se conecta a los terminales **+2 y +4**\
    \ en el extremo positivo [F1]\n- **Arranque del lazo:** la carga entre aisladores\
    \ no debe superar **20 SU** para garantizar que los aisladores se cierren al aplicar\
    \ alimentación [F6]\n\n### Cargas SU (protocolo CLIP) [F6]:\n- Detector por rayo\
    \ LPB-700: **6 SU**\n- Sirenas de lazo: **3 SU**\n- Módulo ZMX-1: **3 SU**\n-\
    \ Módulo MMX-10M / CMX10-RM: **10 SU**\n- Resto de equipos: **1 SU**\n\n> ⚠️ **NUNCA\
    \ uses un multímetro de alta tensión (tipo Megger) en el lazo de detección.**\
    \ Si hay aisladores instalados, el conductor positivo (+) del lazo estará en circuito\
    \ abierto [F1].\n\n---\n\n## 3. Alta de equipos — Autoconfiguración\n\n### Acceso\
    \ al menú (nivel 3) [F10]\n1. Pulsa la tecla y selecciona **«Conf/Mant.Ingeniero»**\
    \ → introduce clave nivel 3 → pulsa ✓ → pulsa de nuevo para mostrar la pestaña\
    \ **CONFIG**\n   — O bien —\n   Gira la llave 90° en sentido horario → selecciona\
    \ **«5: Pestaña Configuración»** → introduce clave nivel 3\n\n2. En el **Menú\
    \ de Configuración de Central**, selecciona **«1: Editar Configuración»** [F10]\n\
    \n3. Navega a **Equipos de lazo → Autoconfigurar** [F8]\n\n### Proceso de autoconfiguración\
    \ [F3][F7]\n\n**Paso 1 — Seleccionar ámbito:**\n- Todos los lazos o un lazo específico\n\
    \n**Paso 2 — Seleccionar protocolo:**\n- **«1: Todos Prot. OPAL/CLIP»** → detecta\
    \ duplicidades de dirección *(recomendado)*\n- **«2: OPAL/CLIP (No detecta duplicidad)»**\
    \ → más rápido, sin comprobación de duplicados\n- **«3: Sólo con protocolo CLIP»**\
    \ → solo autoconfigura equipos CLIP\n\n**Paso 3 — Seleccionar modo de actualización:**\n\
    - **«1: Permite Añadir/Borrar/Cambiar»**\n- **«2: Sólo Añadir Nuevos Equipos»**\n\
    \nEl proceso se inicia automáticamente. Al finalizar, los resultados se muestran\
    \ por lazo; usa las teclas **◄/►** para navegar entre lazos [F7].\n\n> **Nota:**\
    \ Si un equipo Opal se autoconfigura, por defecto será Opal. Si los equipos CLIP\
    \ superan 40 en lazo mixto, selecciona manualmente la opción «Sólo con protocolo\
    \ CLIP» [F7].\n\nLa configuración puede transferirse a un ordenador portátil con\
    \ el programa **ITS** para editarla y archivarla [F3].\n\n---\n\n## 4. Edición\
    \ individual de equipos\n\nAccede desde: **Editar Configuración → Equipos de lazo\
    \ → Editar equipos** [F8][F5]\n\nPara **sensores**, los parámetros editables incluyen\
    \ [F4]:\n- Zona asignada (hasta **255 zonas locales** o **8192 zonas de red**)\n\
    - Tipo de equipo y número de célula (hasta 255)\n- Ajuste de nivel de alarma,\
    \ prealarma y alarma horaria\n- Retardo de alarma y retardo de confirmación de\
    \ coincidencia (hasta **240 s / 4 min**)\n- Prioridad de interrogación (solo CLIP,\
    \ limitada a **30 equipos**)\n- Grupo AWACS (50 grupos, solo sensores CLIP salvo\
    \ HEAT)\n- Selección de programación horaria (cambio de sensibilidad)\n- Acción\
    \ de parpadeo y color LED (solo Opal)\n- Opción de tipo: VIEW, Optiplex, SMART\n\
    - Número de aplicación (solo SMART 4)\n- Función LED remoto (solo Opal): «Seguir\
    \ el equipo» o «Controlada por reglas causa-efecto»\n- Operación solo modo térmico\
    \ L6 (solo SMART y Optiplex)\n\nLos equipos configurados pueden consultarse en\
    \ cualquier momento desde **nivel de acceso 2 → «Resumen de Equipos»** [F3].\n\
    \n---\n\n**También puedo ayudarte con: conexionado físico del lazo SLC, configuración\
    \ de zonas y reglas causa-efecto, o cálculo de baterías con el programa de lazo.**\n\
    \nFuentes: Manual de instalación y puesta en marcha 997-669-005-3_Instal-Comm_ES\
    \ (sin revisión registrada); Manual de configuración de la central 997-671-005-3_Configuration_ES\
    \ (sin revisión registrada)"
