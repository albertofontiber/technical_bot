- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura a través de las **reglas
    de causa-efecto** (Apéndice 5) [F1], accesibles desde el menú de configuración
    de nivel 3 [F7][F8].


    ---


    ### Paso 1 — Acceder al menú de Causa-Efecto


    Desde el menú principal de configuración (nivel de acceso 3) [F8]:


    1. Selecciona **«1: Editar Configuración»**

    2. Selecciona **«8: Causa y Efecto»** [F8]


    ---


    ### Paso 2 — Asignar el tipo de retardo en la regla


    Dentro de la matriz de causa-efecto, cada regla puede tener asignado **uno de
    seis tipos de retardo de salida** [F1]. Los tipos disponibles son [F2]:


    - **Fijo**: el retardo no puede detenerse con SILENCIAR SIRENAS, no muestra cuenta
    atrás, no puede anularse.

    - **Estándar**: la salida se detiene si se pulsa SILENCIAR SIRENAS; el retardo
    puede anularse en nivel de acceso 2; muestra tiempo restante en pantalla; puede
    detenerse con FIN RETARDO.

    - **No Silenc.**: no se detiene con SILENCIAR SIRENAS; sí puede anularse en nivel
    2; muestra tiempo restante; puede detenerse con FIN RETARDO.

    - **Est. Ext.**: igual que Estándar, y además la salida se detiene si se pulsa
    AMPLIAR RETARDO.

    - **RetExtStd**: igual que Estándar, y además el temporizador comienza en RETARDO
    AMPLIADO.

    - **No Sil. Ext**: no se detiene con SILENCIAR SIRENAS; sí se detiene con AMPLIAR
    RETARDO; puede anularse en nivel 2.

    - **SinRetExt**: el temporizador comienza en RETARDO AMPLIADO; no se detiene con
    SILENCIAR SIRENAS ni con AMPLIAR RETARDO [F2].


    ---


    ### Paso 3 — Borrar una regla si es necesario


    Si necesitas eliminar una regla existente: sitúa el cursor en cualquier columna
    de esa regla y pulsa **C** [F1].


    > ⚠️ La última regla (marcada con asterisco) **no puede borrarse** [F1].


    ---


    ### Paso 4 — Verificar el estado del retardo en operación


    Una vez configurado, el retardo activo se puede gestionar desde el panel [F3]:


    - **Menú Anular/Habilitar → «5: Retardo Activación Salidas»**: permite habilitar
    o anular globalmente los retardos configurados pulsando ✓ [F3].

    - El **LED de RETARDO ACTIVO** se enciende cuando hay un retardo en curso [F3].

    - El tiempo restante se muestra en la **pestaña ALARMA** (según el tipo de retardo
    configurado) [F2].


    ---


    ### Nota sobre el botón AMPLIAR RETARDO


    El pulsador **AMPLIAR RETARDO** puede desactivarse desde **Apéndice 1 → parámetro
    10: «Extend Delay Button»** si no se requiere en la instalación [F5].


    ---


    > ⚠️ **Importante**: el uso de retardos puede afectar al cumplimiento de la norma
    **EN54-2**, párrafos **7.4.2, 7.4.3** (condiciones de incendio) y **8.6.3** (condiciones
    de fallo) [F8].


    ---


    **Fuente:** Manual de configuración de la central PEARL (997-671-005-3\_Configuration\_ES,
    sin revisión registrada); Manual de funcionamiento PEARL (997-670-005-3\_Operating\_ES,
    sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de reglas de causa-efecto paso a paso**,
    **programación horaria de retardos** o **gestión del nivel de acceso 2 para anular
    retardos en campo**.'
