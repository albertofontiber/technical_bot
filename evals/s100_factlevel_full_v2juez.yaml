- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  answer: '# FAAST LT-200 — Salidas de relé y sirena: especificaciones completas


    ---


    ## 1. Tipos de relé disponibles


    El FAAST LT-200 dispone de los siguientes relés [F1][F2]:


    **Versión Stand-Alone (autónoma):**

    - **Relé de ALARMA 1 y 2** — Se activa cuando se cumple la condición de alarma
    en el canal correspondiente. Estado de alarma enclavado por defecto; requiere
    RESET manual para desactivar LED y relé [F1].

    - **Relé de PRE-ALARMA 1 y 2** — Se activa cuando se cumple la condición de pre-alarma
    en el canal. Cuando Pre-ALARMA = ALARMA = Nivel 1, la pre-alarma responde al 70%
    del Nivel 1 [F1].

    - **Relé de AVERÍA 1 y 2** — Se activa ante condición de avería en canal 1 o 2,
    o avería común [F1].

    - **SIRENA 1 y 2** — Se activa cuando el canal está en ALARMA o PRE-ALARMA. Sirena
    1 corresponde al canal 1, Sirena 2 al canal 2 [F1].


    **Versión Loop (en lazo):**

    - **Relé de ALARMA 1 y 2** — Controlado por el panel; no enclavado [F3][F4].

    - **Relé de AVERÍA 1 y 2** — Se activa ante condición de avería en canal 1 o 2,
    o avería común [F3][F4].

    - **SIRENA 1 y 2** — Se activa cuando el canal está en ALARMA [F3][F4].


    > **Nota importante:** La versión Stand-Alone incluye además relés de **PRE-ALARMA**
    (terminales T9 y T10), que no están presentes en la versión Loop [F6][F5].


    ---


    ## 2. Contactos de los relés (terminales de cableado)


    **Relé de ALARMA — Canal 1 (bloque T2)** [F5][F6]:

    - Terminal 5: NC Alarma — CH1

    - Terminal 6: C (común) Alarma — CH1

    - Terminal 7: NO Alarma — CH1


    **Relé de ALARMA — Canal 2 (bloque T3)** [F5][F6]:

    - Terminal 8: NC Alarma — CH2

    - Terminal 9: C (común) Alarma — CH2

    - Terminal 10: NO Alarma — CH2


    **Relé de AVERÍA — Canal 1 (bloque T4)** [F5][F6]:

    - Terminal 11: NC Avería — CH1

    - Terminal 12: C (común) Avería — CH1

    - Terminal 13: NO Avería — CH1


    **Relé de AVERÍA AUX — Canal 2 (bloque T5)** [F5][F6]:

    - Terminal 14: NC Avería (AUX) — CH2

    - Terminal 15: C (común) Avería (AUX) — CH2

    - Terminal 16: NO Avería (AUX) — CH2


    **Relés de PRE-ALARMA** (solo versión Stand-Alone):


    - Bloque T9 — Canal 1: terminales 23 (NC), 24 (C), 25 (NO) [F6]

    - Bloque T10 — Canal 2: terminales 26 (NC), 27 (C), 28 (NO) [F6]


    ---


    ## 3. Comportamiento del relé de avería ante fallo o corte de alimentación


    - El relé de avería se activa ante cualquier **condición de avería en CH1, CH2
    o avería común** [F1][F2].

    - También se activa cuando la unidad está en **modo de servicio** (puerta abierta)
    [F1][F2].

    - También se activa cuando la unidad está **sin alimentación** (desconectada)
    [F1][F2].

    - El estado de avería **no está enclavado** (no latched): se desactiva automáticamente
    cuando desaparece la condición de fallo, sin necesidad de reset manual [F1][F2].


    ---


    ## 4. Resistencia de fin de línea (EOL) en salidas de sirena


    Las salidas de sirena llevan una resistencia de fin de línea de **47 kΩ** [F5][F6][F7]:


    - Salida Sirena 1 (bloque T6): terminales 17 (−) y 18 (+) — **EOL 47 kΩ** [F5][F6]

    - Salida Sirena 2 (bloque T7): terminales 19 (−) y 20 (+) — **EOL 47 kΩ** [F5][F6]


    ---


    ## 5. Especificación eléctrica de los contactos de relé


    - Corriente máxima en DC: **2 A** a **30 VDC** (carga resistiva) [F1][F4]

    - Corriente máxima en AC: **0,5 A** a **30 VAC** (carga resistiva) [F1][F4]

    - Vida útil mínima: **10⁵ operaciones** [F1][F4]


    > ⚠️ **Advertencia para cargas inductivas:** Los fragmentos incluyen una advertencia
    específica sobre la conmutación de cargas inductivas, con diagramas de conexión
    correcta e incorrecta [F4]. Si vas a conectar cargas inductivas (bobinas, contactores,
    etc.), consulta el diagrama de protección con diodo del manual.


    ---


    **Fuentes:**

    - I56-6574-005_EN-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6574-005_ES-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6575-005_EN-FAAST-LT-200-Loop-QIG (sin revisión registrada)

