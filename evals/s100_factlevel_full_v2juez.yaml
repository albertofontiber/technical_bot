- qid: hp014
  question: ¿Cómo se conecta un módulo de aislamiento de línea en un lazo ID2000?
  answer: "## Conexión del módulo de aislamiento de línea en lazo ID2000\n\n### Requisito\
    \ de instalación (EN54-2)\n\nSegún la norma **EN54-2: 12.5.2** [F2], los aisladores\
    \ son **obligatorios** en cada lazo analógico y deben instalarse entre un máximo\
    \ de **32 equipos de lazo** [F2].\n\n⚠️ **Límite específico ID2000:** No colocar\
    \ más de **25 equipos de lazo entre aisladores** (o **20 equipos si se utilizan\
    \ aisladores tipo FET**) [F1][F2].\n\n---\n\n### Conexionado del aislador en el\
    \ lazo\n\nEl aislador dispone de **4 terminales** numerados **1, 2, 3 y 4** [F1]:\n\
    \n- **Terminales 1 y 2** → entrada del lazo (lado panel o aislador anterior)\n\
    - **Terminales 3 y 4** → salida del lazo (hacia los equipos siguientes)\n\nEl\
    \ lazo pasa a través del aislador en serie, de forma que en caso de cortocircuito,\
    \ el aislador desconecta la sección afectada [F3].\n\n---\n\n### Procedimiento\
    \ de comprobación del cableado antes de conectar al panel\n\n1. **Cortocircuita\
    \ temporalmente los terminales 2 y 4 de cada aislador** para desconectarlos durante\
    \ las pruebas de continuidad [F1].\n\n   > ⚠️ El cableado del lazo **DEBE estar\
    \ desconectado del panel** durante este procedimiento [F1].\n\n2. Comprueba la\
    \ continuidad de cada extremo del lazo y mide la resistencia final de línea. Verifica\
    \ que es inferior a [F1]:\n   - **Placa base y LIB (detección duplicada):** 14,5\
    \ Ω\n   - **Placa base y LIB (sin detección duplicada):** 28,5 Ω\n   - **Placa\
    \ base y LIB (detección duplicada, segunda variante):** 18,5 Ω\n   - **Placa base\
    \ y LIB (sin detección duplicada, segunda variante):** 35,5 Ω\n\n3. Con multímetro\
    \ en **modo prueba de diodo**, conecta en polaridad **invertida** (+ al lazo negativo,\
    \ − al lazo positivo). Debe indicar la presencia de diodos polarizados en paralelo\
    \ [F1].\n\n4. Una vez verificado el cableado, **retira los puentes de los terminales\
    \ 2-4** de cada aislador y conecta el lazo al panel [F1].\n\n---\n\n### Longitud\
    \ máxima del lazo\n\nLa longitud total del par de lazo de comunicaciones **no\
    \ puede exceder los 2000 metros**, y solo si se utiliza cable de **1,5 mm² de\
    \ sección o superior** [F1].\n\n---\n\n### Comportamiento en caso de cortocircuito\n\
    \nCuando se produce un cortocircuito entre dos aisladores, el sistema lo señaliza\
    \ como **'Posible corte'** y muestra **NO RESPONDE/PERDIDO** para los equipos\
    \ instalados entre los puntos de aislamiento, o **PÉRDIDA PARCIAL DEL LAZO** si\
    \ faltan más de tres equipos [F3].\n\n---\n\n> ⚠️ **Nota importante:** Las comprobaciones\
    \ de continuidad del lazo deben realizarse **antes de conectar los aisladores**\
    \ [F2]. Nunca uses multímetros de alta tensión (tipo \"Megger\") en el lazo una\
    \ vez conectados los equipos [F2].\n\n---\n\n**Fuente:** Manual de instalación\
    \ y puesta en marcha ID2000 — MI-DT-180, NOTIFIER ESPAÑA (sin revisión registrada);\
    \ Manual de programación ID2000 — MP-DT-180, NOTIFIER ESPAÑA (sin revisión registrada)\n\
    \n---\n\nTambién puedo ayudarte con: **capacidad máxima de equipos por lazo**,\
    \ **resolución de averías de cortocircuito en lazo** o **conexionado del lazo\
    \ a la placa base (terminales SK)**."
