- qid: cat023
  question: En el detector de humos por aspiración Securiton ASD532, ¿qué clases de
    sensibilidad según EN 54-20 ofrece y cómo se configura la monitorización del flujo
    de aire?
  answer: "## Clases de sensibilidad EN 54-20 del ASD 532 y configuración de monitorización\
    \ de flujo de aire\n\n---\n\n### Clases de sensibilidad según EN 54-20\n\nEl ASD\
    \ 532 cumple los requisitos de la norma **EN 54-20** en las tres clases [F7]:\n\
    \n- **Clase A** – Sensibilidad muy alta\n- **Clase B** – Sensibilidad alta\n-\
    \ **Clase C** – Sensibilidad normal\n\nLa clase se selecciona en función del sensor\
    \ de humo instalado y de los límites del sistema configurados. Los tres sensores\
    \ disponibles son [F2][F8]:\n\n- **SSD 532-1**: rango de sensibilidad de alarma\
    \ **0,5 %/m hasta 10 %/m**\n- **SSD 532-2**: rango de sensibilidad de alarma **0,1\
    \ %/m hasta 10 %/m**\n- **SSD 532-3**: rango de sensibilidad de alarma **0,02\
    \ %/m hasta 10 %/m**\n\n---\n\n### Configuración de la monitorización del flujo\
    \ de aire\n\n#### Principio de funcionamiento\n\nLa monitorización se basa en\
    \ el **método de medición calorimétrico** (técnica de medición de flujo en masa)\
    \ [F3]. Durante el **reset inicial**, con el conducto de aspiración intacto, el\
    \ sistema registra y guarda los valores de flujo como **valores nominales (100\
    \ %)**. A partir de ahí, el sistema crea una ventana de monitorización electrónica\
    \ [F3].\n\nSi los valores reales se salen de esa ventana (por obstrucción o rotura\
    \ de tubo), el ASD 532 dispara el aviso **«Fallo flujo de aire»** [F3].\n\n---\n\
    \n#### Parámetros configurables\n\nHay dos parámetros ajustables en la monitorización\
    \ del flujo [F5]:\n\n- **Tamaño de la ventana de monitorización** (desviación\
    \ permitida: ±xx %)\n- **Tiempo de retardo** del aviso de fallo\n\n---\n\n####\
    \ Posiciones de conmutador según EN 54-20 (normativas)\n\nLas posiciones **A11\
    \ a C31** son las homologadas según EN 54-20 [F3][F4]. En estas posiciones, una\
    \ variación superior a **±20 %** (por debajo del 80 % o por encima del 120 %)\
    \ dispara el aviso «Fallo flujo de aire» tras un tiempo de retardo de **300 s**\
    \ [F3].\n\n---\n\n#### Posiciones de conmutador NO normativas (W01 a W44)\n\n\
    Las posiciones **W01 a W44** permiten configurar combinaciones distintas de tiempo\
    \ de retardo y desviación, pero **no están homologadas según EN 54-20** [F1][F3][F4].\
    \ Solo deben usarse previa consulta con el fabricante [F4][F5].\n\nLa tabla de\
    \ combinaciones disponibles es [F1]:\n\n**Clase A (Sensibilidad muy alta):**\n\
    - W01: retardo **10 min**, desviación **±20 %**\n- W02: retardo **60 min**, desviación\
    \ **±20 %**\n- W03: retardo **10 min**, desviación **±50 %**\n- W04: retardo **60\
    \ min**, desviación **±50 %**\n\n**Clase B (Sensibilidad alta) – Límite 1:**\n\
    - W09: retardo **10 min**, desviación **±20 %**\n- W10: retardo **60 min**, desviación\
    \ **±20 %**\n- W11: retardo **10 min**, desviación **±50 %**\n- W12: retardo **60\
    \ min**, desviación **±50 %**\n\n**Clase B (Sensibilidad alta) – Límite 2:**\n\
    - W17: retardo **10 min**, desviación **±20 %**\n- W18: retardo **60 min**, desviación\
    \ **±20 %**\n- W19: retardo **10 min**, desviación **±50 %**\n- W20: retardo **60\
    \ min**, desviación **±50 %**\n\n**Clase C (Sensibilidad normal) – Límite 1:**\n\
    - W25: retardo **10 min**, desviación **±20 %**\n- W26: retardo **60 min**, desviación\
    \ **±20 %**\n- W27: retardo **10 min**, desviación **±50 %**\n- W28: retardo **60\
    \ min**, desviación **±50 %**\n\n**Clase C (Sensibilidad normal) – Límite 2:**\n\
    - W33: retardo **10 min**, desviación **±20 %**\n- W34: retardo **60 min**, desviación\
    \ **±20 %**\n- W35: retardo **10 min**, desviación **±50 %**\n- W36: retardo **60\
    \ min**, desviación **±50 %**\n\n**Clase C (Sensibilidad normal) – Límite 3:**\n\
    - W41: retardo **10 min**, desviación **±20 %**\n- W42: retardo **60 min**, desviación\
    \ **±20 %**\n- W43: retardo **10 min**, desviación **±50 %**\n- W44: retardo **60\
    \ min**, desviación **±50 %**\n\n---\n\n#### Advertencias críticas\n\n> ⚠️ El\
    \ aumento de los valores de monitorización por encima de **±20 % / 300 s** implica\
    \ el **incumplimiento de EN 54-20** y solo puede efectuarse previa consulta con\
    \ el fabricante [F5].\n\n> ⚠️ El tamaño de la ventana **no debería quedar por\
    \ debajo de ±20 %**. Si se usan ventanas más pequeñas, el tiempo de retardo debe\
    \ aumentarse a un mínimo de **10 min**. Combinar ventanas por debajo de ±20 %\
    \ con tiempos de retardo de ≤ 300 s aumenta el riesgo de avisos de fallo erróneos\
    \ [F5].\n\n---\n\n#### Proceso de configuración (resumen)\n\n1. **Con «ASD PipeFlow»**:\
    \ calcular el proyecto → introducir resultado en **«ASD Config»** → seleccionar\
    \ posición de conmutador **X01, X02 o X03** [F5].\n2. **Sin «ASD PipeFlow»** (EasyConfig):\
    \ seleccionar límites del sistema según cap. 4.4.4.3 [F5].\n   - Si la monitorización\
    \ de flujo debe cumplir EN 54-20 → posiciones **A11 a C31** [F5].\n   - Si no\
    \ se requiere cumplimiento normativo de flujo → posiciones **W01 a W44** (solo\
    \ con autorización del fabricante) [F5].\n\n---\n\n**Fuente:** ASD532_TD_T140421es_a\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **selección\
    \ del sensor SSD 532 según clase EN 54-20**, **procedimiento de reset inicial\
    \ y puesta en marcha**, o **conexionado del módulo XLM 35 para integración con\
    \ SecuriFire**."
