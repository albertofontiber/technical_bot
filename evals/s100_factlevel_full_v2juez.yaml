- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: "# Conexionado de sirenas convencionales en salidas de sirena — Morley ZXe\n\
    \n> **Nota previa:** Los fragmentos recuperados corresponden a los modelos **ZXAE/ZXEE**\
    \ y **ZX2e/ZX5e**. La denominación \"ZXe\" puede referirse a cualquiera de ellos.\
    \ A continuación se detalla el conexionado, que es común en concepto pero con\
    \ diferencias en número de salidas y terminales según modelo.\n\n---\n\n## Principio\
    \ de funcionamiento de la supervisión\n\n- Las salidas de sirenas son **supervisadas**\
    \ [F1].\n- La supervisión se realiza con una **corriente inversa** que lee la\
    \ **resistencia final de línea (RFL) de 6.800 Ω, 0,5 W mínimo**, instalada entre\
    \ + y − de la última sirena [F1].\n- Al activarse la salida, la corriente circula\
    \ en sentido normal con la polaridad indicada en los terminales [F1].\n- **Cada\
    \ circuito tiene un consumo máximo de 1 A** [F1].\n\n---\n\n## Pasos de conexionado\n\
    \n1. **Identifica los terminales de sirena en la placa:**\n   - **ZXAE:** 2 salidas\
    \ (Salida A y B) [F1].\n   - **ZXEE:** 4 salidas (Salida A, B, C y D), terminales\
    \ **TB7: S,A+ / S,A− / S,B+ / S,B− / S,C+ / S,D+ / S,D−** [F1].\n   - **ZX2e:**\
    \ terminales etiquetados **SOUNDERS / A+ A− B+ B−** [F4].\n   - **ZX5e:** terminales\
    \ **TB7: A− A+ B− B+ C− C+ D− D+** [F4].\n\n2. **Conecta las sirenas en serie\
    \ (línea directa, sin ramales):**\n   - Conecta el **+** de la salida al **+**\
    \ de la primera sirena.\n   - Continúa en cadena hasta la última sirena.\n   -\
    \ El **−** de la última sirena regresa al **−** de la salida [F2].\n   - ⚠️ **No\
    \ realices ramales paralelos**: la supervisión solo cubre la línea directa hasta\
    \ la RFL; los ramales no quedan supervisados [F2].\n\n3. **Sirenas con polaridad:**\n\
    \   - Conecta respetando la polaridad + / − de cada sirena [F2].\n   - Cada sirena\
    \ debe tener un **diodo integrado** para impedir consumo en polarización inversa\
    \ (supervisión) [F4].\n\n4. **Campanas/sirenas sin polaridad:**\n   - Instala\
    \ un **diodo** entre el + de la salida y uno de los terminales de alimentación\
    \ de la campana, para evitar consumos durante la supervisión [F1] [F4].\n\n5.\
    \ **Instala la resistencia final de línea (RFL):**\n   - Coloca la **RFL de 6.800\
    \ Ω, 0,5 W mínimo** entre + y − de la **última sirena** de la línea [F1].\n  \
    \ - Si **no hay sirenas conectadas** en esa salida, instala la RFL directamente\
    \ en los terminales de la central [F1].\n\n6. **Cableado:**\n   - Sección mínima:\
    \ **1,5 mm²** [F1].\n   - Para ZX2e/ZX5e: longitud **no superior a 1 km** (por\
    \ encima, la capacitancia e inductancia pueden afectar al funcionamiento) [F3].\n\
    \   - Verifica que la caída de tensión en la línea no impida la alimentación correcta\
    \ de las sirenas [F3].\n\n---\n\n## Resumen visual del circuito (Salida A)\n\n\
    ```\n+ Salida A ──[D]──[Sirena 1]──[D]──[Sirena 2]──[D]──[Sirena N]──┐\n     \
