- qid: cat012
  question: ¿Cómo se calcula la capacidad de batería (en Ah) necesaria para la central
    AM-8200?
  answer: '# Cálculo de capacidad de batería — AM-8200


    El manual proporciona un procedimiento estructurado en la **Tabla 1** (para la
    AM-8200 CPU) [F9] y la **Tabla 2** (para la AM-8200BB) [F10]. La fórmula final
    es la misma en ambos casos.


    ---


    ## Fórmula general


    **Ah Batería = (A + B) × 1,2** [F9][F10]


    Donde:

    - **A** = Amperios-hora en condición de reposo (No Alarma)

    - **B** = Amperios-hora en condición de alarma

    - **1,2** = Factor de corrección por tolerancias de fabricación de las baterías
    [F1]


    ---


    ## Pasos del cálculo


    **Paso 1 — Calcular la corriente total en reposo (No Alarma)**


    Suma las corrientes de todos los elementos del sistema usando la Tabla 1 [F9]:


    - AM-8200 CPU (AM8200-KLCD): **179 mA** [F9]

    - Cada LIB-8200 instalada: **50 mA** [F9]

    - Cada AM82-2S2C: **28 mA** [F9]

    - Cada AM82-BST-C: **39 mA** [F9]

    - Corriente de lazos (ver Tabla 3 del manual) [F9]

    - Corriente salida usuario: máx. **2 A** [F9]

    - Dispositivos LCD-8200, campanas, sirenas, flashes, etc.


    → Obtén el **Total en reposo** (en A).


    **Paso 2 — Multiplicar por el tiempo de reposo**


    Multiplica el Total en reposo por **24 h** o **72 h** según el tiempo de autonomía
    requerido [F9]:


    > **Espera (A) [Ah] = Total reposo (A) × 24 h** (o × 72 h)


    **Paso 3 — Calcular la corriente total en alarma**


    Suma las corrientes en condición de alarma de todos los elementos [F9]:


    - AM-8200 CPU (AM8200-KLCD): **345 mA** [F9]

    - Cada LIB-8200: **92 mA** [F9]

    - Cada AM82-2S2C: **28 mA** [F9]

    - Cada AM82-BST-C: **39 mA** [F9]

    - Corriente de lazos en alarma (ver Tabla 3) [F1] — ten en cuenta que la central
    enciende **solo los primeros 6 LED** de detectores y módulos de entrada en alarma
    [F1]

    - Corriente salida usuario: máx. **2 A** [F9]

    - Dispositivos de aviso (sirenas, campanas, flashes)


    ⚠️ Comprueba que la corriente total de todos los lazos sea **inferior a 750 mA**
    [F1] y que la corriente total de la línea de **24 Vcc sea inferior a 2 A** [F1].


    **Paso 4 — Multiplicar por el tiempo de alarma**


    > **Alarma (B) [Ah] = Total alarma (A) × 0,5 h** [F9]


    **Paso 5 — Aplicar la fórmula final**


    > **Ah Batería = (A + B) × 1,2** [F9]


    ---


    ## Límites de batería admitidos


    - Capacidad mínima: **7 Ah** [F5]

    - Capacidad máxima: **18 Ah** [F5]

    - Configuración: **2 × 12 V** en serie [F5]


    **Baterías recomendadas (17-18 Ah)** [F5]:

    - Yuasa NP18-12B o NP7-12BFR — 12 V / 17,2 Ah — 181 × 77 × 167 mm

    - Fiamm FG21803 o FGV21803 — 12 V / 18 Ah — 181 × 77 × 167 mm


    ---


    ## Nota importante sobre exceso de corriente


    Si el valor de absorción calculado supera **3,5 A**, la corriente en exceso durante
    condiciones de alarma se extrae de las baterías [F1]. Tenlo en cuenta al dimensionar.


    ---


    Fuente: AM-8200 Manual de Instalación — Doc. AM-8200-ESP Rev. A.3 (AM8200_manu-inst_ESP)


    También puedo ayudarte con: **consumos detallados de dispositivos de lazo (Tabla
    3)**, **conexionado de baterías** o **umbrales de señalización de la sección de
    carga**.'
