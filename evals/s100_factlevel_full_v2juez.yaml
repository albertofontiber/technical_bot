- qid: hp006
  question: La Notifier AFP-400 muestra el aviso 'Tierra' (Earth Fault). ¿Qué significa
    y cómo se localiza?
  answer: "## Fallo de Tierra (Earth Fault) en la AFP-400\n\n### ¿Qué significa?\n\
    \nEl aviso de **Tierra** (Earth Fault / Ground Fault) indica que existe una fuga\
    \ de corriente entre algún conductor del sistema y la tierra física (chasis, estructura\
    \ metálica, etc.). En el SLC, una falla de tierra genera condición de **Alarma/Problema**\
    \ independientemente del estilo de cableado (Estilo 4, 6 o 7) [F8].\n\nEl sistema\
    \ entra en modo **Avería**: el LED amarillo de *Avería del Sistema* parpadea,\
    \ suena el piezo interno y se activa el relé de avería [F3].\n\n---\n\n### Indicadores\
    \ físicos asociados\n\nLa placa **MPS-400** dispone de un **LED específico de\
    \ \"Fallo de Tierra\"** (Ground Fault LED) en la propia placa de alimentación\
    \ [F4]. Comprueba si ese LED está encendido para confirmar que el fallo está en\
    \ el circuito de alimentación o en el SLC.\n\n---\n\n### Procedimiento de localización\n\
    \n1. **Reconoce la avería**: Pulsa `<Aceptar>` para silenciar el piezo y cambiar\
    \ el LED de *Avería del Sistema* de intermitente a fijo [F3]. Anota el mensaje\
    \ que aparece en la pantalla LCD (zona, dirección, tipo de equipo) [F3].\n\n2.\
    \ **Identifica el circuito afectado**: El mensaje en pantalla indicará si el fallo\
    \ está en el SLC (lazo de comunicaciones) o en otro circuito. Localiza la zona\
    \ de software asignada que aparece en el mensaje de avería [F3].\n\n3. **Inspecciona\
    \ el cableado del SLC**: Revisa el cableado del lazo en la zona indicada. Busca:\n\
    \   - Conductores con aislamiento dañado en contacto con bandejas metálicas, cajas\
    \ o estructura.\n   - Terminaciones húmedas o con condensación.\n   - Empalmes\
    \ defectuosos.\n\n4. **Inspecciona el cableado de alimentación (MPS-400)**: Verifica\
    \ los terminales de la MPS-400 [F4]:\n   - **TB1-3**: Toma de Tierra\n   - **TB1-2**:\
    \ Neutro\n   - **TB1-4**: Fase\n   Comprueba que no haya contacto accidental entre\
    \ conductores activos y el chasis.\n\n5. **Verifica la resistencia del lazo SLC**:\
    \ La resistencia total DC desde la central hasta el extremo de cada derivación\
    \ **no puede superar los 40 Ω** [F9]. Un valor anómalo puede indicar un punto\
    \ de fuga.\n\n6. **Elimina la causa**: Una vez localizado y corregido el punto\
    \ de fallo, si la causa desaparece, la central vuelve automáticamente a modo Normal\
    \ y envía el mensaje de \"Sistema Normal\" [F3].\n\n---\n\n> ⚠️ **Nota de seguridad**:\
    \ Antes de intervenir en el cableado de la MPS-400, desconecta **todas** las entradas\
    \ de alimentación (red AC y baterías). El panel puede dañarse al manipular bornes\
    \ con tensión [F5].\n\n---\n\n**Fuentes:**\n- MFDT170 — Manual de uso AFP-400\
    \ (sin revisión registrada)\n- MIDT170 — Manual de instalación AFP-400 (sin revisión\
    \ registrada)\n- 50253SP — AFP-300/AFP-400 Installation (sin revisión registrada)\n\
    \n---\n\nTambién puedo ayudarte con: **resistencia máxima del lazo SLC**, **cableado\
    \ de la MPS-400 paso a paso** o **procedimiento de rearme tras eliminar la avería**."
