  answer: 'El consumo en alarma de la **MAD-472** (Sirena Analógica de Zócalo Detnov)
    es:


    - **Consumo en alarma: 17 mA (a 80 dB A)** [F1]

    - **Consumo en reposo: < 350 μA** [F1]


    > ⚠️ **Nota importante:** Los fragmentos del manual de la CAD-250 indican para
    la MAD-472 un consumo en alarma de **7 mA** [F5][F6][F7]. Existe una discrepancia
    entre el dato del manual propio de la sirena (17 mA) y el listado de dispositivos
    compatibles de la CAD-250 (7 mA). Para el cálculo de carga del lazo, verifica
    con Detnov cuál es el valor vigente, o consulta la revisión más reciente del manual
    de la MAD-472.


    **Otros datos técnicos del manual de la MAD-472** [F1]:

    - Tensión de funcionamiento: **22-38 VDC**

    - Alimentación: directamente del lazo (sin alimentación auxiliar)

    - Tipo de cable: **1,5 mm²** a regleta extraíble, par trenzado apantallado

    - Dimensiones: **100 Ø x 150 mm**

    - Direcciones de lazo: **1 dirección** (numeración 1 a 250)


