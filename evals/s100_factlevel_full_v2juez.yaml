- qid: hp009
  question: ¿Cuál es la resistencia de fin de línea recomendada para los lazos de
    la central Morley ZXe?
  answer: 'La pregunta menciona "ZXe" pero los fragmentos recuperados corresponden
    a las centrales **ZXAE/ZXEE** y **ZX2e/ZX5e**. Dado que la pregunta es sobre resistencias
    de fin de línea (RFL), tengo datos relevantes en ambos productos. Te los presento
    por separado:


    ---


    ## ZXAE / ZXEE — Salidas de sirenas de placa


    La resistencia final de línea (RFL) para las **salidas de sirenas** es:


    - **Valor:** 6.800 Ω (6K8) [F1][F2]

    - **Potencia mínima:** 0,5 W [F1]

    - Se instala entre **+** y **−** de la última sirena del circuito [F1]

    - Si no hay sirenas conectadas, la RFL se coloca directamente en los terminales
    de la central [F1]

    - **No se deben realizar ramales** en la línea de sirenas, ya que la supervisión
    solo cubre la línea directa hasta la RFL [F2]


    ---


    ## ZXAE / ZXEE — Lazo periférico (RS-485)


    Para el **lazo periférico**, la RFL es diferente:


    - **Valor:** 150 Ω [F3]

    - **Potencia mínima:** 0,5 W [F3]

    - Se coloca en **cada extremo** del lazo cuando se trabaja en configuración de
    **lazo abierto** [F3]


    ---


    ## ZX2e / ZX5e — Salidas de sirenas de placa


    - **Valor:** 6.800 Ω [F4]

    - Confirmado en el diagrama de circuito de sirenas convencionales (Figura 15)
    [F4]


    ---


    > ⚠️ **Importante:** Los fragmentos disponibles no especifican RFL para los **lazos
    analógicos** de detección de la ZXAE/ZXEE ni de la ZX2e/ZX5e. Los lazos analógicos
    de estas centrales trabajan con comunicación digital a dos hilos y no requieren
    RFL convencional según la descripción del sistema [F5].


    ---


    ¿Qué modelo concreto estás instalando? ¿Es la **ZXe** (ZX2e o ZX5e) o la **ZXAE/ZXEE**?
    Así puedo orientarte con más precisión.


    Fuentes: Manual de Instalación ZXAE/ZXEE (DOC.MIE-MI-310, sin revisión registrada);
    Manual de Instalación ZX2e/ZX5e (DOC.MIE-MI-530, rev. 001)'
