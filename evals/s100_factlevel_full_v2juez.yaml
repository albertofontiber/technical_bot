- qid: cat021
  question: Necesito un detector de llama SharpEye «40/40» (Spectrex / Notifier) para
    una instalación; ¿qué modelo pido?
  answer: '## Detector de llama SharpEye 40/40R — Cómo construir la referencia de
    pedido


    El modelo que buscas es el **S40/40R** (Single IR, infrarrojo simple) de Spectrex
    / Notifier [F1]. La referencia completa se construye con 5 dígitos adicionales
    según esta estructura [F2][F4]:


    ```

    40/40R – X X X X X

    ```


    **Posición 1 — Configuración de cableado:**

    - Ver Tabla 1 del manual (define las opciones de cableado disponibles) [F2][F4]


    **Posición 2 — Temperatura de trabajo:**

    - 1 → hasta **75 °C**

    - 2 → hasta **85 °C** [F2][F4]


    **Posición 3 — Entradas de cable:**

    - 1 → **M25**

    - 2 → **¾" NPT** [F2][F4]


    **Posición 4 — Carcasa:**

    - S → **Acero inoxidable**

    - A → **Aluminio** *(no disponible en versión FM)* [F4]


    **Posición 5 — Homologación Ex:**

    - F → **FM / CSA**

    - C → **ATEX / IECEx**

    - B → **Inmetro**

    - R → **TR-CU** [F4]


    ---


    ### Ejemplo práctico


    Si necesitas un detector para zona ATEX, carcasa de acero inoxidable, entrada
    M25 y temperatura máxima 75 °C, la referencia sería:


    **40/40R – [wiring] 1 1 S C**


    *(sustituye [wiring] por la opción de cableado que necesites según la Tabla 1
    del manual)*


    ---


    ### Nota importante


    La **Tabla 1** con las opciones de cableado (posición 1) no está completamente
    reproducida en los fragmentos disponibles [F2][F4]. Consulta el manual **MN-DT-724**
    o la guía en inglés **guide-40-40r-single-ir-flame-detector-spectrex-en-us-1459812**
    para seleccionar la opción de cableado correcta (relé, 4-20 mA, Modbus, etc.).


    ---


    **Fuentes:**

    - Manual de instrucciones S40/40R — MNDT724_40-40R (MN-DT-724, 10 octubre 2011,
    TM 40/40R Rev. 4) [F1][F2]

    - SharpEye Single IR Flame Detector User Guide — guide-40-40r-single-ir-flame-detector-spectrex-en-us-1459812
    [F3][F4]


    ---


    También puedo ayudarte con: **opciones de cableado y salidas disponibles (Tabla
    1)**, **especificaciones eléctricas y de instalación del S40/40R**, o **diferencias
    entre el S40/40R (IR simple) y otros modelos de la serie (IR3, UV/IR, Multi-IR)**.'
