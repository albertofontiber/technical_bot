  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  answer: '## Conexión de baterías en la CAD-150-8


    ### Especificaciones de las baterías


    Las centrales analógicas CAD-150-8 requieren **dos baterías de 12V 7A/h** conectadas
    **en serie** [F6].


    ### Procedimiento de conexión


    1. **Conectar el cable puente entre baterías**: Une el **polo positivo (+) de
    una batería con el polo negativo (-) de la otra**, usando el cable puente suministrado
    con la central [F6].


    2. **Colocar las baterías**: Se ubican en la **parte inferior de la caja**, en
    el espacio reservado para ello, de forma **vertical** [F6].


    3. **Conectar al circuito de la central**: Conecta los cables que salen del circuito
    (**rojo al positivo** y **negro al negativo**) de las baterías [F1].


    4. **Conectar al conector de placa**: El conector de batería en la PCB Base está
    identificado como **conector 11 (Conector Batería)**, protegido por el **fusible
    10 (Fusible Baterías)** [F2][F3].


    ### ⚠️ Orden de conexión obligatorio


    El orden correcto es **SIEMPRE** [F4][F6]:

    - **Primero**: conectar la red principal (**230VAC**) activando el magnetotérmico
    bipolar

    - **Segundo**: conectar las baterías


    > Si no se respeta este orden, el equipo podría sufrir daños [F4].


    ### Verificación previa


    Antes de conectar, comprueba con voltímetro que las baterías tienen una tensión
    **superior a 24V** [F5].


    ---


    **Fuente:** 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB
    IT (sin revisión registrada); 55315008 Manual Centrales Analógicas CAD-150-8 Usuario
    ES FR GB IT (sin revisión registrada)'
