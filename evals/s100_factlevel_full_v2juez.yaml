  question: ¿Cómo se cablea el módulo de entrada M710 / MI-DMMI en el lazo, y qué
    resistencias necesita (fin de línea y modo 3 estados)?
  answer: '# Conexionado del módulo M710 / MI-DMMI en el lazo


    ## Terminales de lazo (conexión en bucle)


    Los terminales de lazo son los mismos para ambos módulos [F1][F4][F7]:


    - **T1** → Salida del lazo **−**

    - **T2** → Salida del lazo **+** (con aislador interno activo)

    - **T3** → Entrada del lazo **−**

    - **T4** → Entrada del lazo **+**

    - **T5** → Salida del lazo **+** alternativa (sin aislador)


    > ⚠️ **Aislador interno:** Si **no** se necesita aislamiento de cortocircuitos,
    conecta la salida + del lazo al **terminal 5** en lugar del terminal 2. El terminal
    5 está conectado internamente con el terminal 4 [F4][F7].


    ---


    ## Modo 2 estados (por defecto)


    - Resistencia de fin de línea (RFL): **47 kΩ** [F1]

    - La entrada se conecta entre los terminales **6 y 7** [F1]

    - **Cortocircuito = Alarma** [F1]

    - **Circuito abierto = Avería**


    ---


    ## Modo 3 estados


    - Resistencia de fin de línea (RFL): **47 kΩ** [F1]

    - Resistencia adicional en serie con el contacto: **18 kΩ** [F1][F2][F4][F7]

    - La resistencia de **18 kΩ** se conecta **en serie con cada conmutador/contacto**
    que se desee supervisar [F4][F7]

    - Permite distinguir tres estados: **alarma** (cierre de contacto), **avería**
    (cortocircuito o circuito abierto) y **reposo**

    - ⚠️ Esta función requiere que la **central sea compatible** con supervisión de
    cortocircuito en modo 3 estados [F2][F7]


    ---


    ## Nota sobre terminales 8 y 9


    - El **M710 / MI-DMMI** (entrada única) **no tiene conexiones en los terminales
    8 y 9** [F6][F7]

    - Los terminales 8 y 9 son exclusivos del **M720 / MI-DMM2I** (entrada doble)
    [F7]


    ---


    **Fuentes:**

    - Conexionado-del-modulo-M710-MI-DMMI (sin revisión registrada)

    - I56-4404-001 M710E M720E M721E (sin revisión registrada)

