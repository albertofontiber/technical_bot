- qid: cat017
  question: ¿Como se cablea y se da de alta (configura) un lazo en la central Notifier
    INSPIRE (E10/E15)?
  answer: "# Cableado y configuración de lazo — INSPIRE E10/E15\n\n---\n\n## PARTE\
    \ 1: CABLEADO FÍSICO DEL LAZO\n\n### Módulo de lazo (OPAL X2 — HOP-433-100)\n\n\
    El módulo de lazo es de **color morado** [F3] y dispone de **10 terminales** distribuidos\
    \ en dos filas [F3]:\n\n**Lazo 1:**\n- Terminal **1** → Lazo 1 OUT +VE (Salida\
    \ +)\n- Terminal **2** → Lazo 1 OUT -VE (Salida -)\n- Terminal **3** → ⊕ (**NO\
    \ USAR** para pantalla de cable)\n- Terminal **4** → Lazo 1 IN +VE (Entrada +)\n\
    - Terminal **5** → Lazo 1 IN -VE (Entrada -)\n\n**Lazo 2:**\n- Terminal **6**\
    \ → Lazo 2 OUT +VE (Salida +)\n- Terminal **7** → Lazo 2 OUT -VE (Salida -)\n\
    - Terminal **8** → ⊕ (**NO USAR** para pantalla de cable)\n- Terminal **9** →\
    \ Lazo 2 IN +VE (Entrada +)\n- Terminal **10** → Lazo 2 IN -VE (Entrada -)\n\n\
    > ⚠️ **Los terminales 3 y 8 NO se deben usar para conectar la pantalla del cable\
    \ de lazo. La pantalla debe conectarse a la Barra de Tierra de la central.** [F2][F3]\n\
    \n> ℹ️ Se recomienda poner a tierra **un solo extremo** de la pantalla del cable\
    \ de lazo en la barra de tierra de la central [F7].\n\n---\n\n### Topología del\
    \ lazo\n\nEl lazo se cablea en **bucle cerrado**: la salida de la central llega\
    \ al primer dispositivo, continúa por todos los dispositivos en cadena, y el último\
    \ dispositivo retorna a la entrada de la central [F1].\n\n> ⚠️ **No mezclar dispositivos\
    \ OPAL y CLIP en el mismo lazo.** [F3]\n\n---\n\n### Capacidad del lazo\n\n**Protocolo\
    \ OPAL:**\n- Hasta **159 detectores OPAL** por lazo [F3]\n- Hasta **159 módulos\
    \ OPAL** por lazo (sirenas, pulsadores, módulos E/S) [F3]\n- Corriente máxima\
    \ por lazo: **750 mA** [F3]\n\n**Protocolo CLIP** (requiere licencia):\n- Hasta\
    \ **99 detectores CLIP** por lazo [F3]\n- Hasta **99 módulos CLIP** por lazo [F3]\n\
    \n> ⚠️ **Límite EN54-2 (13.7):** máximo **512 detectores y/o pulsadores** por\
    \ módulo de lazo (que comprende 2 circuitos de lazo) [F3].\n\n**Longitud máxima\
    \ del lazo:** hasta **3,5 km** dependiendo del tipo de carga y de cable — verificar\
    \ siempre con el **Calculador Global de Baterías de Bucle de CLSS Suite** [F3].\n\
    \n---\n\n## PARTE 2: COMPROBACIONES PREVIAS CON MULTÍMETRO\n\n> ⚠️ **NUNCA usar\
    \ dispositivos de alta tensión (p. ej. megóhmetro) en el circuito de lazo.** Solo\
    \ se permiten comprobadores de baja tensión como multímetro. [F5]\n\n### Pasos\
    \ de verificación:\n\n1. **Continuidad del lazo:** Mide la resistencia de extremo\
    \ a extremo entre **Lazo X Entrada -VE** y **Lazo X Salida -VE** con el lazo desconectado\
    \ físicamente de los terminales de la central. Multiplica el resultado por 2 y\
    \ añade la resistencia de cada aislador (**0,1 a 0,13 Ω** por aislador) [F6].\n\
    \n2. **Resistencia máxima admisible:** [F6]\n   - Protocolo **OPAL**: inferior\
    \ a **40 Ω**\n   - Protocolo **CLIP** (detección de dirección duplicada): inferior\
    \ a **40 Ω**\n   - Protocolo **CLIP** (sin detección de dirección duplicada):\
    \ inferior a **71 Ω**\n\n3. **Capacidad del cable:** debe ser inferior a **0,5\
    \ µF** [F6].\n\n4. **Continuidad de la pantalla:** resistencia muy baja de extremo\
    \ a extremo [F5].\n\n5. **Aislamiento pantalla/conductores:** comprobar que NO\
    \ hay continuidad entre la pantalla y los cables +VE y -VE [F5].\n\n> ℹ️ Con aisladores\
    \ en cada dispositivo OPAL, el conductor positivo del lazo aparecerá como **circuito\
    \ abierto** — es normal [F5][F6].\n> Para dispositivos CLIP con aisladores, puentea\
    \ temporalmente los terminales **2 y 4** de cada aislador durante las mediciones\
    \ [F6].\n\n> ℹ️ Si dispones de ella, usa la herramienta **POL-200-TS** para diagnósticos\
    \ más detallados antes de conectar los cables a la central. Funciona con protocolos\
    \ OPAL y CLIP [F7].\n\n---\n\n## PARTE 3: CONEXIÓN A LA CENTRAL\n\nUna vez verificado\
    \ el cableado:\n\n**Lazo OPAL:** Conecta directamente el circuito al bloque de\
    \ terminales de lazo seleccionado en la central [F7].\n\n**Lazo CLIP:**\n1. Vuelve\
    \ a conectar los aisladores que habías puenteado temporalmente [F7].\n2. Conecta\
    \ el circuito al bloque de terminales de lazo seleccionado [F7].\n\n---\n\n##\
    \ PARTE 4: CONFIGURACIÓN DEL LAZO (CLSS)\n\n### Paso previo — Configuración con\
    \ CLSS antes del primer encendido\n\n1. La primera vez que se enciende la central,\
    \ debe hacerse **sin el cableado externo conectado**, pero con la fuente de alimentación\
    \ y un circuito de lazo probado conectado [F1].\n\n2. Conecta la herramienta de\
    \ configuración CLSS a la central [F8].\n\n3. Ve a **Ajustes → Ajustes HMI** y\
    \ en **Tipo de marca** selecciona **Notifier EN** [F8].\n\n4. En **Ajustes de\
    \ lazo** [F8]:\n   - Si el lazo **no se usa**: marca ☑ **Sin Uso**\n   - Si el\
    \ lazo **se usa**: configura los siguientes parámetros:\n     - **Limitar a VdS\
    \ 2540**: Sí o No (el valor de resistencia cambia según la selección)\n     -\
    \ **Tipo de cable**: selecciona el tipo correspondiente\n     - **Protocolo de\
    \ lazo**: por defecto es **OPAL** (protocolo avanzado). Para CLIP o TC800 se requiere\
    \ **licencia adicional** [F8].\n\n5. Envía la configuración a la central siguiendo\
    \ los pasos de **\"Enviar configuración a la central\"** [F8].\n\n---\n\n## PARTE\
    \ 5: AUTO CONFIGURACIÓN (búsqueda de dispositivos)\n\n1. En la central, selecciona\
    \ **Auto Configuración** para buscar los dispositivos conectados al lazo [F9].\n\
    \n2. Lee la información del aviso emergente y confirma seleccionando **Auto Configuración**\
    \ / **Learn Devices** [F9].\n   > ℹ️ Si no hay protocolo especificado en la configuración,\
    \ el lazo usará por defecto el **protocolo OPAL** [F9].\n\n3. Una vez completada\
    \ la búsqueda, selecciona la **flecha derecha (>)** junto al botón Auto Búsqueda\
    \ para ver el estado de averías del lazo [F9].\n\n4. Si hay averías, lee los mensajes\
    \ y rectifica los problemas. Causas típicas [F9]:\n   - Discordancia entre diseño\
    \ e instalación\n   - Averías en el cableado\n   - Presencia de RFI\n   - Error\
    \ de módulo o fuente de alimentación\n   - Conexionado incorrecto en dispositivos\n\
    \n5. Selecciona **Hecho** al completar. Si no hay averías, vuelve a la página\
    \ **Información del sistema** [F9].\n\n6. **Repite los pasos 1 a 5 para cada lazo**\
    \ hasta descubrir todos los lazos del sistema [F9].\n\n---\n\n**Fuente:** HOP-138-8ES\
    \ issue 6 (01-2026) — Instrucciones de puesta en marcha INSPIRE E10/E15; HOP-138-9ES\
    \ issue 5 (11-2025) — Manual de instalación INSPIRE E10/E15 (sin revisión registrada\
    \ en los fragmentos).\n\n---\n\nTambién puedo ayudarte con: **numeración de circuitos\
    \ de lazo en el portamódulos**, **gestión de averías de lazo tras Auto Configuración**\
    \ o **detalles de licencias CLIP/TC800**."
