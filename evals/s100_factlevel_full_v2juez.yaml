- qid: cat020
  question: En una central Morley DXc instalada en Espana, ¿cual es el nivel de alarma
    y de prealarma por defecto de los detectores, y el maximo configurable?
  answer: '## Niveles de alarma y prealarma por defecto en la DXc — Variación España


    La respuesta depende del **tipo de detector** y del **protocolo** utilizado:


    ---


    ### Detectores con protocolo Morley-IAS (detectores ópticos convencionales / OPT)


    Según la sección **5.3.10.5.1** del manual de variaciones de mercado [F2]:


    - **Prealarma por defecto: 80%**

    - **Alarma por defecto: 100%**

    - **Nivel máximo configurable de alarma: 108%**


    > El valor analógico se normaliza entre **0% – 100%** independientemente del tipo
    de equipo [F2].


    ---


    ### Detectores Multicriterio OTM (óptico-térmicos)


    Según la sección **5.3.10.3** [F1], los niveles recomendados (marcados con \*P
    y \*A) son:


    - **Prealarma por defecto: Nivel 3** (valor analógico 72, sensibilidad 6,5% osc./m)

    - **Alarma por defecto: Nivel 4** (valor analógico 86, sensibilidad 6,5% a 11,5%
    osc./m, autoajustado)


    Esto se confirma también en las pantallas de ejemplo de la sección **5.3.10.4**
    [F2]:

    ```

    S001 OTM  Fuego:Niv4  Prealarma:Niv3

    S002 OTM  Fuego:Niv4  Prealarma:Niv3

    ```


    ---


    ### Detectores Láser LSR


    Según la sección **5.3.10.3** [F1], los niveles recomendados son:


    - **Prealarma por defecto: Nivel 4** (valor analógico 69, sensibilidad 0,32% osc./m)

    - **Alarma por defecto: Nivel 5** (valor analógico 76, sensibilidad 0,65% osc./m)


    Confirmado también en pantalla de ejemplo [F2]:

    ```

    S003 LSR  Fuego:Niv5  Prealarma:Niv4

    ```


    ---


    ### Restricción importante


    El manual indica que **el nivel de prealarma no puede ser superior al nivel de
    alarma**, y que **la central no permite ajustar niveles que impidan el reconocimiento
    de alarmas** [F3].


    ---


    **Fuentes:**

    - DXc Manual de variaciones de mercado (sin revisión registrada) — Secciones 5.3.10.3
    y 5.3.10.5.1

    - DXc Manual de configuración (sin revisión registrada) — Sección 5.3.10.2


    ---


    También puedo ayudarte con: **procedimiento paso a paso para cambiar el nivel
    de alarma de un detector**, **configuración de modos horarios de sensibilidad**
    o **diferencias de configuración entre detectores OTM y LSR** en la DXc.'
