- qid: cat022
  question: En los detectores de llama Spectrex SharpEye 40/40, ¿qué diferencia hay
    entre el modelo 40/40L y el 40/40L4, y qué significa el sufijo «B» (p. ej. 40/40LB)?
  answer: "## Diferencias entre 40/40L, 40/40L4 y sufijo «B»\n\n### 40/40L vs. 40/40L4\
    \ — Sensibilidad\n\nLa diferencia más clara entre ambos modelos que aparece en\
    \ los fragmentos es la **configuración de sensibilidad**:\n\n- **40/40L**: tiene\
    \ ajuste de sensibilidad con valor de **50/15 ft/m** (setting 15) [F1]\n- **40/40L4**:\
    \ tiene ajuste de sensibilidad con valor de **93/28 ft/m** (setting 28) [F1]\n\
    \nEsto indica que el **40/40L4 tiene mayor alcance de detección** que el 40/40L\
    \ en su configuración de sensibilidad disponible.\n\n> ⚠️ Los fragmentos disponibles\
    \ no describen otras diferencias técnicas entre ambos modelos (óptica, espectro,\
    \ tecnología de sensor, etc.). Para una comparativa completa, consulta las fichas\
    \ técnicas individuales de cada modelo.\n\n---\n\n### Sufijo «B» (p. ej. 40/40LB,\
    \ 40/40L4B)\n\nEl sufijo **«B»** indica que el modelo incluye **certificación\
    \ SIL-2 (TÜV)**, según IEC 61508.4, Capítulo 3.5.12 [F2].\n\nEspecíficamente:\n\
    - **40/40LB** y **40/40L4B** son los únicos modelos de la familia L/L4 con esta\
    \ certificación [F2]\n- La condición de alerta SIL-2 se puede implementar mediante:\n\
    \  - Una señal de alerta a través del lazo de **0-20 mA** [F2]\n  - Una señal\
    \ de alerta mediante **relé de alarma y avería** [F2]\n\nEl resto de certificaciones\
    \ (ATEX, IECEx, FM, CSA, EN54-10) son **comunes a todos los modelos** L, LB, L4\
    \ y L4B [F2].\n\n---\n\n### Resumen rápido\n\n- **40/40L**: alcance hasta **50/15\
    \ ft/m**, sin SIL-2 [F1][F2]\n- **40/40L4**: alcance hasta **93/28 ft/m**, sin\
    \ SIL-2 [F1][F2]\n- **40/40LB**: igual que el L pero **con certificación SIL-2**\
    \ [F2]\n- **40/40L4B**: igual que el L4 pero **con certificación SIL-2** [F2]\n\
    \n---\n\nFuente: Manual de usuario. Detector S40/40L-LB-L4-L4B (MN-DT-722_B, Honeywell\
    \ Life Safety Iberia); SharpEye™ 40/40 Flame Detectors User Guide (TM777050 Rev.\
    \ Da, October 2017)\n\n---\n\nTambién puedo ayudarte con: **conexionado eléctrico\
    \ del 40/40L**, **configuración de retardo de alarma** o **procedimiento de prueba\
    \ BIT manual**."
