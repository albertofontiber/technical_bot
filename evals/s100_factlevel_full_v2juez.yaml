- qid: hp020
  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE E10/E15


    ---


    ## Información general sobre contraseñas


    El código de acceso de fábrica para **Nivel 2** es **"22222222"** [F3]. Se recomienda
    cambiarlo por uno exclusivo de entre **4 y 8 dígitos** [F1][F2][F3].


    > ⚠️ Se recomienda cambiar siempre la contraseña de fábrica del nivel 2 [F3].


    ---


    ## Cambio de contraseña de Nivel 2 (desde usuario NI2)


    Procedimiento accesible con sesión de **Nivel de Acceso 2** [F2]:


    1. Selecciona el **icono del menú** ① y accede a **"Configuración"** ② [F2].

    2. Selecciona la opción **"Cambio del código de acceso"** ③ [F2].

    3. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y que el cursor
    parpadee ⑤ [F2].

    4. Pulsa el **icono del ojo** ⑥ si deseas visualizar la entrada del código [F2].

    5. Introduce el nuevo código de acceso (**mínimo 4 dígitos, máximo 8 dígitos**)
    con el teclado ⑦ [F2].

    6. Confirma la entrada seleccionando el símbolo **✓** ⑧ [F2].

    7. Repite los pasos 3 a 6 para confirmar el código [F2].


    ---


    ## Cambio de contraseña de Nivel 2 y/o Nivel 3 (desde usuario NI3)


    Procedimiento accesible con sesión de **Nivel de Acceso 3** — permite cambiar
    tanto NI2 como NI3 [F1]:


    1. Selecciona el **icono del menú** ① → **"Ajustes"** ② e inicia sesión como **usuario
    de Nivel 3** [F1].

    2. Selecciona **"Cambio del código de acceso"** ③ [F1].

    3. Asegúrate de que el nivel deseado (**Nivel 2 o Nivel 3**) ④ esté seleccionado
    y el cursor parpadee ⑤ [F1].

    4. Pulsa el **icono del ojo** ⑥ si deseas visualizar la entrada [F1].

    5. Introduce el nuevo código (**mínimo 4 dígitos, máximo 8 dígitos**) con el teclado
    ⑦ [F1].

    6. Confirma seleccionando el símbolo ⑧ [F1].

    7. Repite los pasos 3 a 6 para confirmar [F1].

    8. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1].

    9. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    ---


    ## Cierre de sesión automático


    Si el Nivel 2 no realiza ninguna acción durante **5 minutos**, la central cerrará
    sesión automáticamente y volverá al **Nivel de Acceso 1** [F3].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6 (01-2026) — Instrucciones de puesta en marcha INSPIRE E10/E15
    [F1]

    - HOP-338-9ES issue 4 (01-2026) — Instrucciones de usuario INSPIRE E10/E15 [F2][F3]


    ---


    También puedo ayudarte con: **sincronización de configuración con CLSS**, **niveles
    de acceso y permisos por nivel** o **copia de seguridad de contraseñas en la nube**.'
