- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  answer: "## Alarma de flujo bajo en ASD535 — Diagnóstico\n\n### Causa más probable\n\
    \nUn valor de flujo **por debajo del 80 %** del nominal indica **obstrucción en\
    \ el conducto de aspiración** [F2]. El ASD535 dispara el aviso «fallo flujo de\
    \ aire» una vez transcurrido el tiempo de retardo de **300 s** de la LS-Ü [F1][F2].\
    \ El código de evento asociado es el **código 001** (Obstrucción, conducto de\
    \ aspiración) [F4].\n\n---\n\n### Procedimiento de diagnóstico paso a paso\n\n\
    **1. Leer el valor de flujo actual**\n- Coloca el conmutador en **posición V**\
    \ para leer el valor de flujo del conducto de aspiración [F7].\n- Compara con\
    \ el valor registrado en el protocolo de puesta en funcionamiento [F7].\n- Interpretación:\n\
    \  - Valor **< 100 %** → apunta a **obstrucción** [F1]\n  - Valor **> 100 %**\
    \ → apunta a **rotura de tubo** [F1]\n\n**2. Verificar el umbral de actuación**\n\
    - Con sensibilidad LS-Ü estándar de **±20 %** (conforme a EN 54-20): inspecciona\
    \ el conducto si el valor cae por debajo del **90 %** (la mitad de la sensibilidad\
    \ = ±10 %) [F7].\n- El fallo se dispara formalmente al caer por debajo del **80\
    \ %** [F2].\n\n**3. Inspeccionar el conducto de aspiración (código 001)**\nSegún\
    \ el código 001 [F4], comprueba en este orden:\n- Orificios de aspiración: verificar\
    \ si están obstruidos (suciedad, polvo, objetos)\n- Salida de aire del ASD: comprobar\
    \ si hay obstrucción\n- Caja de filtro / unidad de filtrado: inspeccionar y limpiar\n\
    - Sensor de flujo de aire: inspeccionar y limpiar [F4]\n\n**4. Comprobar la tensión\
    \ de servicio**\n- Abre la cubierta y mide en los bornes **1 (+) y 2 (-)** del\
    \ AMB 35 [F7]:\n  - Funcionamiento a 12 V-CC: valor nominal **12,3 a 13,8 V-CC**\
    \ [F7]\n  - Funcionamiento a 24 V-CC: valor nominal **21,6 a 27,6 V-CC** [F7]\n\
    \n**5. Consultar la memoria de eventos**\n- Coloca el conmutador en **posición\
    \ E** del AMB 35 para leer el código de evento y delimitar el patrón de error\
    \ [F3].\n- Capítulos de referencia para los códigos: **8.5.3.3 y 10.3.1** [F3].\n\
    \n---\n\n### ⚠️ Advertencia importante sobre el reset inicial\n\n> Si se realiza\
    \ un reset inicial con los orificios de aspiración obstruidos, existe el riesgo\
    \ de que la toma de muestras resulte imposible o insuficiente, lo que puede impedir\
    \ que el ASD535 dispare la alarma [F5].\n\n**No ejecutes un reset inicial hasta\
    \ haber limpiado completamente el conducto de aspiración**, incluyendo la instalación\
    \ de un nuevo elemento de filtro si es necesario [F5].\n\n---\n\n### Si el sensor\
    \ de flujo de aire está dañado\n\nSi tras la limpieza el fallo persiste, considera\
    \ el **código 008** (sensor de flujo de aire defectuoso/inexistente) [F4]:\n-\
    \ Verificar que el sensor está conectado y el cable de conexión está en buen estado\n\
    - Si está defectuoso → **sustituir** (ver cap. **9.4.3** del manual) [F9]\n\n\
    > ⚠️ La sustitución de componentes solo puede efectuarse **sin tensión** (desconectar\
    \ bloque de bornes 1/2 y, en su caso, 3/4 del AMB 35) [F5].\n\n---\n\n**Fuente:**\
    \ ASD535, Descripción técnica, T 131 192 h es (sin revisión registrada)\n\n---\n\
    \nTambién puedo ayudarte con: **procedimiento de reset inicial tras la limpieza**,\
    \ **sustitución del sensor de flujo de aire (cap. 9.4.3)** o **sustitución del\
    \ filtro en la unidad de filtrado**."
