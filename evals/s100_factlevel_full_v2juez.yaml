  question: ¿Qué resistencia de fin de línea (EOL) hay que instalar en las líneas
    de zona de la central convencional NFS Supra?
  answer: "# Resistencia de Fin de Línea (EOL) — NFS Supra\n\n## Opciones disponibles\n\
    \nLa central NFS Supra admite **dos modos de supervisión de líneas de zona**,\
    \ seleccionables por configuración [F1]:\n\n---\n\n### Modo por defecto — EFL\
    \ Capacitivo\n- **Condensador de 47 µF** instalado entre positivo y negativo de\
    \ la línea, en el último equipo [F3]\n- Es el modo de fábrica (por defecto) [F1]\n\
    - El LED 2 (Anulada, ámbar) encendido indica que está activo este modo [F1]\n\n\
    ### Modo alternativo — RFL Resistivo\n- **Resistencia de 6K8 Ω** instalada entre\
    \ positivo y negativo de la línea, en el último equipo [F3]\n- El LED 1 (Alarma,\
    \ rojo) encendido indica que está activo este modo [F1]\n- En modo RFL, la central\
    \ admite un **rango de resistencia final de línea entre 3 KΩ y 7 KΩ** [F3]:\n\
    \  - **3 KΩ** → consumo máx. por zona **2,5 mA**\n  - **7 KΩ** → consumo máx.\
    \ por zona **4 mA**\n\n---\n\n## Puntos clave de instalación\n\n- El EFL/RFL debe\
    \ instalarse en **todas las zonas, incluso las no usadas** [F3]\n- Se coloca **entre\
    \ positivo y negativo de la línea, a la salida del último equipo** [F2]\n- El\
    \ condensador de 47 µF se suministra con la central [F3]\n- La resistencia de\
    \ 6K8 Ω **no se menciona como suministrada** — verifica disponibilidad con el\
    \ instalador\n\n---\n\n## Cómo cambiar entre modo capacitivo y resistivo\n\n1.\
    \ Pulsa simultáneamente **Tecla TECLADO = ON + Tecla EVACUACIÓN = ON** para acceder\
    \ al menú de configuración de Final de Línea [F1]\n2. Usa la **Tecla REARME**\
    \ para cambiar cíclicamente entre opciones [F1]\n   - LED 1 Alarma (rojo) ON →\
    \ **Resistivo 6K8 Ω**\n   - LED 2 Anulada (ámbar) ON → **Capacitivo 47 µF** (por\
    \ defecto)\n3. Requiere **Nivel de acceso 3** [F1]\n\n---\n\n> ⚠️ El consumo máximo\
    \ total admisible en cada zona para detectar avería es de **3 mA** en reposo.\
    \ Consumos superiores provocarán mal funcionamiento [F2].\n\n---\n\n**Fuente:**\
    \ HLSI-MN-025_NFS Supra (v.05, sin revisión registrada)\n\n---\n\nTambién puedo\
    \ ayudarte con: **conexionado de detectores por zona**, **conexionado de pulsadores\
    \ con diodo Zener** o **configuración de sirenas SND1/SND2** en la NFS Supra."
