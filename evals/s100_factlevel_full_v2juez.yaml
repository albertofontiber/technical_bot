- qid: cat013
  question: Tengo una central Detnov CAD-150 y me ha sobrado de otra instalacion un
    detector optico Notifier SDX-751; ¿es compatible / puedo montarlo en su lazo?
  answer: '## Compatibilidad SDX-751 (Notifier) con CAD-150 (Detnov)


    La respuesta directa es: **no puedo confirmarte compatibilidad entre ambos equipos**,
    y te explico por qué:


    ---


    ### Lo que dicen los fragmentos


    **Sobre el SDX-751 (Notifier):**

    El SDX-751 es un detector analógico fotoeléctrico de bajo perfil [F5] que se conecta
    al lazo de la central **AFP-200** de Notifier mediante la base **BX-501** [F2],
    o a la central **ID-200** de Notifier mediante la base **B501** [F3]. En ambos
    casos, la dirección se ajusta mediante microinterruptores rotatorios decádicos
    [F2][F3].


    **Sobre la CAD-150-8 (Detnov):**

    El manual de instalación de la CAD-150-8 describe sus conectores de bucle [F9][F10],
    sirenas, relés y alimentación, pero **en ningún fragmento disponible se menciona
    una lista de detectores compatibles con su lazo analógico** [F1][F9][F10].


    ---


    ### Conclusión


    No tengo documentación en mi base que acredite que el **SDX-751 de Notifier**
    sea compatible con el lazo analógico de la **CAD-150 de Detnov**. Se trata de
    productos de **fabricantes distintos**, y el protocolo de comunicación analógica
    del lazo puede diferir entre ambos.


    > ⚠️ **No instales el detector sin verificar compatibilidad oficial.** Usar un
    dispositivo de lazo no homologado puede provocar fallos de comunicación, falsas
    alarmas o que el detector no sea reconocido por la central.


    **Pasos recomendados:**

    1. Consulta a **Detnov** (soporte técnico) la lista oficial de detectores compatibles
    con el lazo de la CAD-150.

    2. Consulta a **Notifier** si el SDX-751 tiene protocolo abierto o propietario.

    3. Verifica en la documentación completa de la CAD-150 si existe una lista de
    dispositivos de lazo homologados.


    ---


    Fuente: 55315013 Manual Centrales Analógicas CAD-150-8 Instalación (sin revisión
    registrada); MNDT120 AFP-200 (sin revisión registrada); MNDT150 ID-200 (sin revisión
    registrada)'
