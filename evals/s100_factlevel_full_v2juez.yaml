- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: "## Acceso al menú de Programación Avanzada — CAD-250\n\nLa ruta de acceso\
    \ es la siguiente [F1]:\n\n1. Desde la **PANTALLA DE REPOSO**, toca el icono del\
    \ **candado** (\U0001F512) [F4].\n2. Introduce tu código de acceso. La clave de\
    \ instalador por defecto es **2222** [F3] (nivel administrador/instalador). Con\
    \ la clave de usuario **1111** [F4] el acceso estará restringido.\n3. Una vez\
    \ dentro del menú principal, navega:\n\n   **AJUSTES** (Menú principal) **→ AVANZADO**\
    \ (Submenú) [F1]\n\nDentro de **AVANZADO** encontrarás **3 pestañas** [F1]:\n\n\
    - **SISTEMA:** configura número de cabinas (Paneles: 1–4), número de lazos (2,\
    \ 4, 6, 8... hasta 32 según cabinas) y LEDes de zona (0 ó 1) [F1].\n- **OTROS:**\
    \ interruptores de puesta en marcha y mantenimiento (Tiempo de inactividad, Salto\
    \ a scroll si incidentes, Saltar a último incidente prioritario si timeout, entre\
    \ otros) [F5].\n- **REINICIAR:** devuelve los valores de configuración del panel\
    \ a fábrica (no afecta a entidades, lazos, maniobras, grupos, módulos virtuales,\
    \ modos especiales, filtros de red ni registros de eventos) [F5].\n\n> ⚠️ Para\
    \ validar cambios en la pestaña SISTEMA, debes pulsar el botón **\"Guardar y Reiniciar\"\
    ** [F1].\n\n> ⚠️ Por razones de seguridad y cumplimiento normativo, los interruptores\
    \ de inactividad, timeout y scroll deben permanecer activados (en verde) por defecto\
    \ [F5][F6].\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración MC-380-es-2026-c\
    \ (rev. c, 2026-04-23)\n- Manual de Instalación CAD-250 MI-372-es-2024-e (sin\
    \ revisión registrada)\n- CAD-250 Manual de Usuario MU-376-es-2024-f (sin revisión\
    \ registrada)\n- CAD-250 Manual Software Configuración MS-416-es-2026-b (rev.\
    \ b)\n\n---\n\nTambién puedo ayudarte con: **configuración del número de lazos\
    \ en SISTEMA**, **gestión de usuarios y contraseñas** o **función AUTO-BÚSQUEDA\
    \ tras la configuración avanzada**."
