- qid: cat018
  question: ¿Como se programa una ecuacion causa-efecto (CBE) en la Notifier AM-8200
    para que un evento active una salida?
  answer: "# Programación de ecuación CBE en AM-8200 para activar una salida\n\n##\
    \ Concepto previo\n\nLas ecuaciones **CBE (Control By Event)** [F1] permiten activar\
    \ un módulo de salida en función de eventos lógicos usando operadores como **OR,\
    \ AND, NOT, DEL, XGRP**, etc. [F2]. La longitud máxima de una CBE es de **64 caracteres**\
    \ [F2].\n\n---\n\n## Procedimiento paso a paso\n\n### 1. Acceder al módulo de\
    \ salida\n\nNavega en el menú hasta:\n`MENU PROGRAMMAZIONE \\ Punti \\ Moduli`\
    \ [F3]\n\n### 2. Seleccionar el módulo de salida a programar\n\nUsa los botones\
    \ **CPU / LINEA / MOD. / SUB** para localizar el módulo de salida concreto [F3].\n\
    \n### 3. Ir al campo CBE\n\n- Selecciona el parámetro **CBE** con las teclas flecha\
    \ **▲▼** [F2].\n- Pulsa la tecla de confirmación **☑** para entrar a editar [F2].\n\
    - Si ya hay una ecuación configurada, se mostrará; si no, el campo estará vacío\
    \ [F2].\n\n### 4. Introducir la ecuación CBE\n\nUsa el teclado alfanumérico del\
    \ panel para escribir la ecuación. Pulsa **Enter** para confirmar [F2].\n\n---\n\
    \n## Operadores disponibles y ejemplos prácticos\n\n**OR** — Se activa si AL MENOS\
    \ UN operando está activo [F5]:\n```\nOR (G9 G15 G23)\n```\n→ Si el grupo G9,\
    \ G15 **o** G23 entra en alarma, la salida se activa.\n*(También válido omitir\
    \ OR: simplemente `(G9 G15 G23)`)* [F5]\n\n---\n\n**AND** — Se activa solo si\
    \ TODOS los operandos están activos [F5]:\n```\nAND (G9 G15 G23)\n```\n→ La salida\
    \ se activa únicamente si G9, G15 **y** G23 están en alarma simultáneamente.\n\
    \n---\n\n**NOT** — NIEGA el operando [F5]:\n```\nNOT (G23)\n```\n→ La salida permanece\
    \ activa mientras G23 **no** esté en alarma.\n\n---\n\n**XGRP** — Se activa si\
    \ AL MENOS DOS elementos del grupo están activos (doble coincidencia) [F6]:\n\
    ```\nXGRP (G23)\n```\n⚠️ Solo se permite **un único grupo** en XGRP. `XGRP (G23\
    \ G24)` **no está permitido** [F6].\n\n---\n\n**DEL** — Activa con retardo y duración\
    \ opcionales [F9]:\n```\nDEL (00.30 01.30 (G21))\n```\n→ Tras **30 segundos**\
    \ desde la activación de G21, la salida se activa y permanece activa **1 minuto\
    \ y 30 segundos**.\n- Retardo máximo: **10 minutos** [F9]\n- Duración máxima:\
    \ **10 minutos** [F9]\n- Solo puede haber **un operador DEL por ecuación** [F9]\n\
    \n---\n\n**PRE** — Usa el estado de pre-alarma de un sensor [F8]:\n```\nOR (PRE\
    \ (C1L1S2) PRE (C2L1S10))\n```\n→ Si cualquiera de los dos sensores está en pre-alarma,\
    \ la salida se activa.\n\n---\n\n**FLT** — Usa el estado de avería de un dispositivo\
    \ o zona [F7]:\n```\nOR (FLT (Z1) FLT (Z2))\n```\n→ Si la zona Z1 o Z2 está en\
    \ avería, la salida se activa.\n\n---\n\n## Reglas críticas a respetar\n\n- **Para\
    \ grupos directos**: los operandos dentro del paréntesis deben tener índice **mayor**\
    \ que el grupo al que se asocia la CBE [F5].\n  - ✅ Permitido: `G21 = (G23 G24)`\n\
    \  - ❌ No permitido: `G33 = (G23 G24)`\n\n- **Para grupos inversos**: los operandos\
    \ deben tener índice **menor** que el grupo al que se asocia la CBE [F5].\n  -\
    \ ✅ Permitido: `G307 = (G305 G306)`\n  - ❌ No permitido: `G305 = (G306 G307)`\n\
    \n- **Los módulos de salida con TIPO ID para señalizaciones generales no admiten\
    \ programación de ecuación CBE** [F5].\n\n---\n\n## Ejemplo completo: OR de muchos\
    \ grupos (función predeterminada)\n\nSi necesitas un OR de 16 grupos pero la memoria\
    \ no lo permite, usa grupos inversos intermedios [F10]:\n```\nG301 = OR (G1 G2\
    \ G3 G4 G5 G6 G7 G8)\nG302 = OR (G9 G10 G11 G12 G13 G14 G15 G16)\nL01M01 CBE =\
    \ OR (G301 G302)\n```\n\n---\n\nFuente: AM-8200 Manual de programación (Doc. M-162.1-AM8200-ESP\
    \ Rev A.3) — HONEYWELL LIFE SAFETY IBERIA; AM-8200 Manual de instalación (Doc.\
    \ AM-8200-ESP Rev. A.3) — NOTIFIER\n\n---\n\nTambién puedo ayudarte con: **operador\
    \ SDEL o TIM en CBE**, **programación de grupos lógicos (G)**, o **asignación\
    \ de zona a un módulo de salida**."
