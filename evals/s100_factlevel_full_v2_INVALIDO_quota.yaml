- qid: cat016
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo
    y como se prueba que funciona?
  answer: "# CAD-150-8: Alta de detector nuevo y prueba funcional\n\n## Parte 1: Alta\
    \ de un detector nuevo en el lazo\n\nLos fragmentos disponibles **no describen\
    \ el procedimiento específico de alta/programación de un nuevo detector en el\
    \ lazo** (asignación de dirección, configuración de tipo de detector, vinculación\
    \ a zona, etc.).\n\nPara ese procedimiento, consulta directamente el manual de\
    \ instalación completo o el software de configuración. El manual sí menciona que\
    \ la configuración básica puede realizarse desde el teclado de la central, pero\
    \ **recomienda usar el software de configuración** por ser más sencillo y rápido\
    \ [F6].\n\n---\n\n## Parte 2: Prueba funcional del detector\n\nUna vez instalado\
    \ el detector, el procedimiento de prueba es el siguiente:\n\n### Paso 1 — Acceder\
    \ al menú de prueba de zona\n\nDesde el menú principal, navega a:\n**ZONA → PRUEBA**\
    \ [F1]\n\n### Paso 2 — Configurar el rango de zonas a probar\n\nEn la pantalla\
    \ de PRUEBA ZONA, configura:\n- **RANGO**: selecciona el número de zona donde\
    \ está el detector (de **000** a **250**) [F1]\n- **ACTIVAR SIRENAS**: selecciona\
    \ **SI** o **NO** según necesites [F1]\n  - Si seleccionas **SI**: las sirenas\
    \ se activarán unos segundos tras la alarma del detector y se silenciarán automáticamente\
    \ [F1]\n  - Cualquier retardo programado en sirenas queda **anulado** en modo\
    \ prueba para agilizar el proceso [F1]\n\n### Paso 3 — Aceptar y activar el modo\
    \ prueba\n\nPulsa **< Aceptar >** [F1]. La zona queda en modo prueba.\n\n### Paso\
    \ 4 — Provocar la alarma en el detector\n\nActiva el detector (aerosol de prueba,\
    \ fuente de calor calibrada, etc.). El sistema debe entrar en alarma sin necesidad\
    \ de rearmar la central [F1].\n\n### Paso 5 — Salir del modo prueba\n\nPara salir\
    \ del modo prueba, **conecta la zona** desde el menú ZONA → CONECTAR [F1].\n\n\
    ---\n\n### ⚠️ Aviso importante — Tiempo límite de prueba\n\nSi transcurridos **20\
    \ minutos** desde la activación del modo prueba el sistema no detecta ningún disparo\
    \ de alarma, el equipo **vuelve automáticamente al estado normal**, cancelando\
    \ el modo prueba [F1][F2].\n\n---\n\n### Verificación adicional del sistema\n\n\
    Tras la prueba del detector, verifica también [F7]:\n- Que al provocar la alarma\
    \ se activa el **relé de alarma**\n- Que se activan las **salidas de sirena**\
    \ una vez transcurrido el tiempo de retardo programado\n\n---\n\n**Fuentes:**\n\
    - 55315008-Manual-Centrales-Analogicas-CAD-150-8-Usuario-ES-FR-GB-IT (sin revisión\
    \ registrada)\n- 55315013-Manual-Centrales-Analogicas-CAD-150-8-Instalacion-ES-FR-GB-IT\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **conexionado\
    \ eléctrico del lazo**, **configuración de zonas desde teclado** o **mantenimiento\
    \ periódico de la CAD-150-8**."
