- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  answer: 'La **CCD-103** es una central convencional con gestión por **zonas completas**,
    no por detector individual. Los fragmentos del manual no describen ningún procedimiento
    para desactivar un detector de forma individual sin afectar al resto del lazo.


    Lo que sí permite el manual a nivel de desconexión es lo siguiente:


    **Desconexión por zona completa** [F1]:

    1. Pulsa la **tecla de zona (A)** correspondiente una primera vez → la zona entra
    en **modo prueba**.

    2. Pulsa la **tecla de zona (A)** una segunda vez → la zona entra en **modo desconexión**.

    3. Se activa el **indicador de anular** y el **indicador de fallo/anular/prueba**
    de esa zona [F1].


    Esto desconecta **toda la zona**, no un detector individual.


    ---


    **Sobre la arquitectura del lazo** [F4]:

    - Los detectores se conectan **en serie** dentro de cada zona.

    - Máximo **32 detectores o pulsadores por zona** [F4].

    - La resistencia de final de línea es de **4K7 Ω** [F3][F4].


    Dado que el cableado es en serie, la desconexión física de un detector individual
    sin afectar al resto requeriría intervención en el cableado (puente físico en
    los bornes del detector), pero **el manual no describe este procedimiento**.


    ---


    **El manual no especifica** ningún mecanismo software ni hardware para aislar
    un único detector dentro de una zona sin afectar al resto del lazo. Consulta directamente
    el soporte técnico de Detnov o el manual completo para confirmar si existe algún
    accesorio de aislamiento compatible.


    Fuente: CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    ---


    También puedo ayudarte con: **verificación de avería en zona**, **conexionado
    de detectores** o **modos de funcionamiento del bloque de detección** de la CCD-103.'
