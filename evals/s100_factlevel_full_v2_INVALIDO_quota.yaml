- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov
    CAD-250: como se crea, como se definen las entradas/eventos que la disparan y
    como se asignan las salidas?'
  answer: "# Configuración de una Maniobra completa en la CAD-250\n\n> ⚠️ La programación\
    \ de maniobras es una de las funciones más críticas de la configuración del sistema.\
    \ Requiere conocimiento específico del sistema instalado, del plan de protección\
    \ y del producto [F6].\n\n---\n\n## Concepto previo\n\nUna **maniobra** es un\
    \ conjunto de acciones programadas en función de los estados del sistema, áreas,\
    \ zonas o dispositivos [F1]. El sistema gestiona **eventos** (cambios de estado),\
    \ no estados estáticos — cuando el evento coincide con la condición establecida,\
    \ se activan las salidas [F3].\n\n**Capacidad máxima:** hasta **100.000** entradas\
    \ y salidas configuradas en distintas maniobras [F3][F8].\n\n---\n\n## PASO 1\
    \ — Acceder al menú y crear la maniobra\n\n1. Desde el panel, navega a: **MENÚ\
    \ > MANIOBRAS > MANIOBRAS** [F1]\n2. Pulsa **+AÑADIR** en la barra de navegación\
    \ inferior [F1][F10]\n3. Se abre la pantalla de edición de la maniobra (ej. \"\
    Maniobra 0001\") [F2]\n\n---\n\n## PASO 2 — Definir el número de Coincidencias\
    \ (lógica AND/OR)\n\nEn el campo **COINCIDENCIAS** indica cuántos eventos deben\
    \ cumplirse simultáneamente para que la maniobra se ejecute [F2]:\n\n- **Coincidencias\
    \ = 1** → lógica **OR**: cualquiera de los eventos activa la salida [F2]\n- **Coincidencias\
    \ = N (igual al total de eventos)** → lógica **AND**: todos los eventos deben\
    \ cumplirse [F2]\n- **Coincidencias = X (menor que el total)** → lógica **X de\
    \ N**: se necesitan X eventos cualesquiera de los N definidos [F2]\n\n---\n\n\
    ## PASO 3 — Añadir Entradas (Eventos)\n\n1. Pulsa **AÑADIR** en el margen inferior\
    \ → selecciona **EVENTO** [F3]\n2. Elige el tipo de evento:\n   - **ENTIDAD**:\
    \ cualquier elemento de la jerarquía del sistema [F3]\n   - **CONDICIÓN TEMPORAL**:\
    \ periodo de tiempo durante el que la ecuación de entrada es verdadera [F3]\n\n\
    ### Si eliges ENTIDAD:\n\n3. Selecciona el origen: **LOCAL** (central actual)\
    \ o **RED** (cualquier central en red) [F3][F10]\n4. Selecciona la entidad desencadenante\
    \ mediante pestañas: **Instalación, Panel, Lazo, Área, Zona, Dispositivo, Grupo\
    \ o Módulo Virtual** [F10]\n5. Configura los parámetros del evento [F6][F7]:\n\
    \n   - **Condición (estado):**\n     - *Alarma*: uno o más elementos en alarma\
    \ [F7]\n     - *Avería*: uno o más elementos en avería [F7]\n     - *Técnico*:\
    \ una o más entradas activas [F7]\n\n   - **Tipo de dispositivo:**\n     - *Todos*\
    \ / *Pulsadores* / *Detectores* / *Entrada* [F6][F7]\n\n   - **Repeticiones:**\
    \ número entero (hasta **9999**) — cuántas veces debe darse el evento en la entidad\
    \ para que la entrada sea válida. Ejemplo: zona en alarma con 3 repeticiones →\
    \ condición verdadera cuando 3 detectores estén en alarma [F7]\n\n   - **Lógico:**\n\
    \     - *Normal*: la condición de estado es verdadera [F7]\n     - *No (Negado)*:\
    \ invierte la condición — p.ej. \"no hay alarma\" [F6][F7]\n\n6. Pulsa **GUARDAR**\
    \ para confirmar el evento [F9]\n7. Repite desde el punto 1 para añadir más eventos\
    \ si la maniobra lo requiere [F5]\n\n> **Nota:** Desde la versión 1.1.1 es posible\
    \ seleccionar un elemento de salida como condición de entrada. En ese caso, el\
    \ cambio a condición de avería hace verdadera la entrada. Para ello, desmarca\
    \ la casilla **\"Sólo dispositivos de entrada\"** [F5].\n\n---\n\n## PASO 4 —\
    \ Añadir Salidas (Acciones)\n\n1. Pulsa **AÑADIR** en el margen inferior → selecciona\
    \ **ACCIÓN** [F3][F4]\n2. Configura los campos de la acción [F4][F6]:\n\n   -\
    \ **Retraso:** tiempo de 0 a **600 segundos** antes de iniciar la acción, contado\
    \ desde que la condición de entrada es verdadera [F6][F10]\n\n   - **Entidad de\
    \ destino** (siempre local): **Panel, Lazo, Área, Zona, Dispositivo, Grupo o Módulo\
    \ Virtual** [F4]\n     > ⚠️ El programa no permite mezclar acciones sobre entidades\
    \ de paneles diferentes [F8]\n\n   - **Tipo de acción:** Activar, Desactivar,\
    \ Habilitar, Deshabilitar, Test, Reiniciar o Pulso [F6]\n\n   - **Tipo de elemento:**\
    \ Todos, Sirenas, Relés, Sirena discontinua [F6]\n\n3. Pulsa **GUARDAR** → la\
    \ pantalla vuelve al listado de la maniobra con el evento y la acción completos\
    \ [F9]\n4. Repite para añadir más acciones si es necesario [F3]\n\n---\n\n## Resumen\
    \ del flujo completo\n\n```\nENTRADAS (Eventos)  →  LÓGICA (Coincidencias)  →\
    \  SALIDAS (Acciones)\n• Entidad/Condición    • 1 de N = OR              • Retardo\
    \ 0-600 s\n• Estado (alarma,      • N de N = AND             • Entidad destino\n\
    \  avería, técnico)     • X de N = X de N          • Acción (activar,\n• Tipo\
    \ dispositivo                                   desactivar, etc.)\n• Repeticiones\
    \                                     • Tipo (sirenas,\n• Lógico (normal/no) \
    \                                relés, etc.)\n```\n[F1][F6]\n\n---\n\n## Ejemplo\
    \ práctico (del manual)\n\nManiobra: **alarma en Panel \"HOSPITAL UNIVERSITARIO\"\
    \ → activar todos los dispositivos del mismo panel** [F9]:\n\n1. Crear maniobra\
    \ → AÑADIR\n2. AÑADIR → EVENTO → ENTIDAD → LOCAL → pestaña PANEL → seleccionar\
    \ \"HOSPITAL UNIVERSITARIO\"\n3. Tipo: *Alarma*, Todos, Lógico: Normal, Repeticiones:\
    \ 1 → GUARDAR\n4. AÑADIR → ACCIÓN → Retraso: 0 → ENTIDAD → pestaña PANEL → \"\
    HOSPITAL UNIVERSITARIO\"\n5. Tipo: *Activar*, Todos → GUARDAR\n\n---\n\n**Fuentes:**\n\
    - CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n- CAD-250\
    \ Manual de Software de Configuración MS-416-es-2026-b (rev. b)\n- Manual de Instalación\
    \ CAD-250 MI-372-es-2024-e (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **configuración de Grupos**, **uso de Módulos Virtuales** o **Condiciones\
    \ Temporales** en maniobras de la CAD-250."
