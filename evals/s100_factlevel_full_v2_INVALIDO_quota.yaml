- qid: cat021
  question: Necesito un detector de llama SharpEye «40/40» (Spectrex / Notifier) para
    una instalación; ¿qué modelo pido?
  answer: '## Detector de llama SharpEye 40/40R — Cómo construir la referencia de
    pedido


    La familia "40/40" de Spectrex/Notifier incluye **varios modelos distintos** según
    el tipo de detección. Para llamas de hidrocarburo con **infrarrojo simple (Single
    IR)**, el modelo que necesitas es el **S40/40R** [F1].


    ---


    ### Estructura de la referencia de pedido


    La referencia completa se construye así [F2][F4]:


    ```

    40/40R – [Cableado] [Temperatura] [Entradas] [Carcasa] [Homologación]

    ```


    **Posición 1 — Configuración de cableado** [F2]:

    - Ver Tabla 1 del manual (opciones de cableado detalladas)


    **Posición 2 — Rango de temperatura** [F2][F4]:

    - 1 → 75 °C

    - 2 → 85 °C


    **Posición 3 — Entradas de cable** [F2][F4]:

    - 1 → M25

    - 2 → ¾" NPT


    **Posición 4 — Tipo de carcasa** [F2][F4]:

    - S → Acero inoxidable

    - A → Aluminio *(no disponible en versión FM)* [F4]


    **Posición 5 — Homologación Ex** [F2][F4]:

    - F → FM / CSA

    - C → ATEX / IECEx

    - B → Inmetro [F4]

    - R → TR-CU [F4]


    ---


    ### Ejemplo de referencia


    Si necesitas un detector para Europa (ATEX), temperatura hasta 75 °C, entrada
    M25 y carcasa de aluminio:

    → **40/40R-11AC**


    *(Sustituye cada posición según tus requisitos reales de instalación.)*


    ---


    ### ⚠️ Nota importante


    La **Posición 1 (configuración de cableado)** requiere consultar la **Tabla 1**
    del manual MN-DT-724 [F2], ya que los fragmentos disponibles no incluyen el detalle
    completo de esa tabla. Consúltala antes de cerrar el pedido.


    ---


    ### Otros modelos de la familia 40/40 disponibles


    Si tu aplicación no es IR simple, ten en cuenta que existen otras variantes [F7]:

    - **S40/40I** → Triple infrarrojo IR3 [F5]

    - **S40/40M** → Multi IR (hidrógeno e hidrocarburo) [F6]

    - **S40/40L / LB / L4 / L4B** → UV/IR [F10]

    - **S40/40U / UB** → UV [F9]


    ---


    Fuente: Manual de instrucciones S40/40R (MN-DT-724, 10 octubre 2011, TM 40/40R
    Rev. 4) [F1][F2]; SharpEye Single IR Flame Detector User Guide (guide-40-40r-single-ir-flame-detector-spectrex-en-us-1459812)
    [F3][F4]


    ---


    También puedo ayudarte con: **opciones de cableado (Tabla 1 del S40/40R)**, **especificaciones
    de instalación y conexionado**, o **diferencias entre el S40/40R y el S40/40I**
    si necesitas comparar tecnologías de detección.'
