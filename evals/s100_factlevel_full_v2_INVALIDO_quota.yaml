- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  answer: '# FAAST LT-200 — Salidas de relé y sirena: especificaciones completas


    ---


    ## 1. Tipos de relé disponibles


    El FAAST LT-200 dispone de los siguientes relés [F1][F6]:


    **Versión Stand-Alone (modo autónomo):**

    - **Relé de ALARMA 1 y 2** (uno por canal)

    - **Relé de PRE-ALARMA 1 y 2** (uno por canal)

    - **Relé de AVERÍA 1 y 2** (uno por canal)

    - **Salida SIRENA 1 y 2** (una por canal)


    **Versión Loop (en lazo):**

    - **Relé de ALARMA 1 y 2** (uno por canal)

    - **Relé de AVERÍA 1 y 2** (uno por canal)

    - **Salida SIRENA 1 y 2** (una por canal)


    > **Nota:** El relé de PRE-ALARMA **solo aparece en la versión Stand-Alone** [F6].
    La versión Loop no lo incluye en su tabla de terminales [F5].


    ---


    ## 2. Contactos de cada relé (terminales de cableado)


    Todos los relés de alarma y avería disponen de **contacto NC, C (común) y NA**
    [F5][F6]:


    **Versión Stand-Alone** [F6]:

    - Relé ALARMA CH1 → terminales **5 (NC), 6 (C), 7 (NA)** — bloque T2

    - Relé ALARMA CH2 → terminales **8 (NC), 9 (C), 10 (NA)** — bloque T3

    - Relé AVERÍA CH1 → terminales **11 (NC), 12 (C), 13 (NA)** — bloque T4

    - Relé AVERÍA CH2 (AUX) → terminales **14 (NC), 15 (C), 16 (NA)** — bloque T5

    - Relé PRE-ALARMA CH1 → terminales **23 (NC), 24 (C), 25 (NA)** — bloque T9

    - Relé PRE-ALARMA CH2 → terminales **26 (NC), 27 (C), 28 (NA)** — bloque T10


    **Versión Loop** [F5]:

    - Relé ALARMA CH1 → terminales **5 (NC), 6 (C), 7 (NA)** — bloque T2

    - Relé ALARMA CH2 → terminales **8 (NC), 9 (C), 10 (NA)** — bloque T3

    - Relé AVERÍA CH1 → terminales **11 (NC), 12 (C), 13 (NA)** — bloque T4

    - Relé AVERÍA CH2 (AUX) → terminales **14 (NC), 15 (C), 16 (NA)** — bloque T5


    ---


    ## 3. Comportamiento del relé de AVERÍA ante fallo o corte de alimentación


    El relé de avería se activa en las siguientes condiciones [F1][F2][F3]:


    - Condición de **AVERÍA en el canal 1 o 2**

    - **AVERÍA común** del sistema

    - Cuando la unidad está en **modo de servicio** (puerta abierta) [F10]

    - Cuando la unidad está **sin alimentación** (corte de corriente)


    **Estado de enclavamiento:** El relé de avería **NO está enclavado** (no latched)
    [F1][F2][F3]. Esto significa que se desactiva automáticamente cuando desaparece
    la condición de fallo, sin necesidad de reset manual.


    ---


    ## 4. Resistencia de fin de línea en las salidas de sirena


    Las salidas de sirena llevan una resistencia de fin de línea de **47 kΩ** [F5][F6][F7]:


    - Salida SIRENA 1 → terminales **17 (–) y 18 (+)** — bloque T6 — EOL **47 kΩ**

    - Salida SIRENA 2 → terminales **19 (–) y 20 (+)** — bloque T7 — EOL **47 kΩ**


    ---


    ## 5. Especificación eléctrica de los contactos de relé


    Los contactos de todos los relés tienen la siguiente especificación [F1][F4]:


    - Corriente máxima en **CC:** **2 A** a **30 VDC** (carga resistiva)

    - Corriente máxima en **CA:** **0,5 A** a **30 VAC** (carga resistiva)

    - Vida útil mínima: **10⁵ operaciones**


    > ⚠️ **Advertencia para cargas inductivas:** El manual incluye un aviso específico
    sobre la conmutación de cargas inductivas [F4]. Si la carga es inductiva (bobinas,
    contactores, etc.), se requiere protección adicional (diodo tipo **1N6284CA**
    según el diagrama del manual). La conexión directa a carga inductiva sin protección
    está marcada como incorrecta.


    ---


    ## Diferencias clave entre versión Stand-Alone y Loop


    - La versión **Stand-Alone** incluye relés de **PRE-ALARMA** y el relé de ALARMA
    es **enclavado por defecto** (requiere reset manual) [F1]

    - La versión **Loop** no tiene relé de PRE-ALARMA y el relé de ALARMA es **controlado
    por el panel** (no enclavado) [F3][F4]


    ---


    **Fuentes:**

    - I56-6574-005_EN-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6574-005_ES-HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-6575-005_EN-FAAST-LT-200-Loop-QIG (sin revisión registrada)

    - I56-6577-006_EN Notifier FAAST LT-200 QIG (sin revisión registrada)

    - I56-6577-006_ES FAAST Notifier LT-200 QIG (sin revisión registrada)

    - I56-6575-005_ES FAAST LT-200 Loop QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **conexionado de la entrada configurable de rearme**,
    **procedimiento de sustitución de sensores** o **configuración de niveles de alarma
    y pre-alarma** del FAAST LT-200.'
