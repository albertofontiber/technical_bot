- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  answer: '# RP1r — Sistema no vuelve a estado normal tras resetear después de extinción


    Este es un escenario con varias causas posibles documentadas. Comprueba en este
    orden:


    ---


    ## 1. Parámetro **"ri" — Resumen inhibido tras extinción**


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F2], el sistema tiene
    un intervalo de tiempo programable tras el cual pasa del estado de extinción realizada
    al estado de sistema inhibido. El parámetro **ri** controla este comportamiento:


    - **ri = 00**: Resumen inhibido desde que finaliza la extinción (por defecto)
    [F2]

    - **ri = 01 a 30**: Resumen inhibido después de intervención o reposición, en
    minutos [F2]


    **Acción:** Verifica el valor configurado en el parámetro **ri**. Si está en 00,
    el sistema permanecerá en estado inhibido hasta que se realice una intervención
    manual. Si está en 01–30, el sistema esperará ese tiempo antes de permitir el
    rearme completo.


    ---


    ## 2. Función de rearme inhibida tras activación (parámetro **F.1**)


    Según **EN12094:1 Sección 4.12.2**, la función de rearme puede estar inhibida
    temporalmente una vez iniciado el modo de activación [F3][F4][F5]. En la RP1r-Supra,
    el parámetro **[F.1]** configura el período de inhibición del rearme desde el
    modo de programación [F8].


    **Acción:** Accede al nivel de programación (nivel 3) y revisa el parámetro **[F.1]**
    para comprobar si hay un tiempo de inhibición activo.


    ---


    ## 3. Averías enclavadas que impiden el restablecimiento


    Todas las averías son **por defecto enclavadas y requieren rearme manual** [F9].
    Si existe alguna condición de avería activa (circuito de extinción, sirenas, zonas,
    pulsador de paro, etc.), la central no volverá a estado normal aunque se pulse
    Rearme.


    **Acción:** Revisa los LEDs de avería activos en el panel:

    - **Avería Circuito Extinción**: LED intermitente → revisar circuito CCT EXT 1/2
    [F10]

    - **Sirenas Fallo/Anuladas**: LED intermitente → revisar EOL en circuitos SND1/SND2
    [F10]

    - **Cto. Supervisión Paro (Abort Switch)**: Este circuito **requiere rearme manual
    obligatorio** y no admite rearme automático [F10]

    - **Disparo Manual Activo**: LED fijo → revisar circuito AUX. MAN.REL. [F10]


    ---


    ## 4. Fallo de sistema al arranque


    Si aparece el indicador **"Fallo Sistema"**, la central no realizará el proceso
    de extinción ni volverá a estado normal hasta que se rearme [F6]. Esto puede ocurrir
    si el microprocesador principal tardó en inicializar o hubo una lectura de tensiones
    fuera de rango [F6].


    **Acción:** Realiza un **Rearme** desde nivel de acceso 2 pulsando la tecla **Rearme**
    [F5][F9]. Si el fallo desaparece, era una perturbación transitoria al arranque.


    ---


    ## 5. Procedimiento de rearme correcto


    Para rearmar la central [F5][F9]:

    1. Accede al **nivel de acceso 2** (código de usuario válido)

    2. Pulsa la tecla **Rearme**

    3. Las entradas enclavadas se reiniciarán


    Si el rearme está bloqueado y necesitas habilitarlo manualmente [F3][F4]:

    1. Sitúa el microinterruptor **SW1-6 en posición ON**

    2. La pantalla de 7 segmentos mostrará **S1**

    3. Coloca un puente en la posición **PROG** (parte inferior izquierda de la placa
    base)

    4. Pulsa la tecla **Rearme**

    5. El LED número 6 se iluminará en **rojo fijo**


    ---


    > ⚠️ **Importante:** Si el circuito de **paro (Abort Switch)** está activo, es
    el único que **no admite rearme automático** bajo ninguna configuración [F10].
    Debe resolverse físicamente antes de poder rearmar.


    ---


    Fuentes: HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr (sin revisión registrada); HLSI-BT-001
    (sin revisión registrada); MN-DT-102I (sin revisión registrada); MIEMN570 rev.
    Rev 008; HLSI-MN-103_RP1r-Supra_lr (sin revisión registrada); HLSI-MN-103I_RP1r-Supra_lr
    (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración del parámetro ri paso a paso**, **interpretación
    de LEDs de avería específicos** o **procedimiento de puesta en servicio tras reposición
    del agente extintor**.'
