- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  answer: "## Alarma de flujo bajo en ASD535 — Diagnóstico\n\n### Causa más probable\n\
    \nUn valor de flujo **por debajo del 80 %** del nominal indica **obstrucción en\
    \ el conducto de aspiración** [F2]. El ASD535 dispara el aviso «fallo flujo de\
    \ aire» una vez transcurrido el tiempo de retardo de **300 s** de la LS-Ü [F1][F2].\n\
    \nEl código de evento asociado es el **código 001: Obstrucción, conducto de aspiración**\
    \ [F4].\n\n---\n\n### Procedimiento de diagnóstico paso a paso\n\n**1. Leer el\
    \ valor de flujo actual**\n- Coloca el conmutador en **posición V** para leer\
    \ el valor de flujo del conducto de aspiración [F8].\n- Compara con el valor registrado\
    \ en el protocolo de puesta en funcionamiento [F8].\n- Si el valor está **por\
    \ debajo del 90 %** (con sensibilidad LS-Ü estándar de ±20 %), ya es señal de\
    \ obstrucción inminente [F8].\n- Si está **por debajo del 80 %**, el fallo ya\
    \ está activo o es inminente [F2].\n\n**2. Consultar el código de evento en el\
    \ AMB 35**\n- Coloca el conmutador en **posición E** para leer el código de evento\
    \ [F3].\n- **Código 001** → Obstrucción en conducto de aspiración [F4].\n- **Código\
    \ 002** → Rotura de tubo (flujo alto, >120 %) — descártalo si el flujo es bajo\
    \ [F4].\n- **Código 004** → Parámetros LS-Ü no válidos / sensor fuera de rango\
    \ [F4].\n- **Código 008** → Sensor de flujo defectuoso o no conectado [F4].\n\n\
    **3. Inspección física del conducto de aspiración** (código 001 confirmado)\n\
    - Comprobar si los **orificios de aspiración** están obstruidos [F4].\n- Comprobar\
    \ la **salida de aire** del ASD [F4].\n- **Inspeccionar y limpiar la caja de filtro\
    \ / unidad de filtrado** [F4].\n- **Inspeccionar y limpiar el sensor de flujo\
    \ de aire** [F4].\n\n**4. Verificar la tensión de alimentación**\n- Medir en bornes\
    \ **1 (+) y 2 (-)** del AMB 35 [F8]:\n  - Funcionamiento a 12 V-CC → valor nominal\
    \ **12,3 a 13,8 V-CC** [F8].\n  - Funcionamiento a 24 V-CC → valor nominal **21,6\
    \ a 27,6 V-CC** [F8].\n\n**5. Si el sensor de flujo está sucio o defectuoso**\n\
    - Limpiar el sensor de flujo de aire [F4].\n- Si está defectuoso → **sustituir**\
    \ [F4]. La sustitución debe realizarse **sin tensión** (desconectar bloque de\
    \ bornes 1/2 y, en su caso, 3/4 del AMB 35) [F5].\n\n---\n\n### ⚠️ Advertencia\
    \ importante tras los trabajos\n\nSi se realizan trabajos en el conducto de aspiración\
    \ y es necesario ejecutar un **reset inicial**, este **solo debe realizarse cuando\
    \ el conducto esté completamente limpio**. Ejecutar el reset con orificios obstruidos\
    \ puede impedir que el ASD535 dispare la alarma ante un incendio real [F5].\n\n\
    ---\n\n**Fuente:** ASD535 Descripción técnica, T 131 192 h es (sin revisión registrada)\n\
    \n---\n\nTambién puedo ayudarte con: **procedimiento de sustitución del sensor\
    \ de flujo de aire**, **ejecución del reset inicial tras mantenimiento** o **sustitución\
    \ del filtro en la unidad de filtrado**."
