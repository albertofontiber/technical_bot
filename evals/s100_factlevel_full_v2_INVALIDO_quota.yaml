- qid: hp006
  question: La Notifier AFP-400 muestra el aviso 'Tierra' (Earth Fault). ¿Qué significa
    y cómo se localiza?
  answer: '## Fallo de Tierra (Earth Fault) en la AFP-400


    ### ¿Qué significa?


    El aviso de **Tierra** (Earth Fault / Ground Fault) indica que existe una fuga
    de corriente entre el cableado del sistema y la tierra física (masa). En la AFP-400,
    este fallo se detecta y señaliza mediante un **LED específico de "Fallo de Tierra"**
    ubicado en la placa de alimentación **MPS-400** [F4].


    Cuando se produce, el sistema entra en modo **Avería** [F3]:

    - El piezo interno suena [F3]

    - El LED de **Avería del Sistema** (amarillo) parpadea [F1]

    - Se activa el relé de avería [F3]

    - Aparece un mensaje en la pantalla LCD [F3]


    ---


    ### Impacto según el tipo de lazo SLC


    El fallo de tierra en el SLC tiene consecuencias distintas según el estilo de
    cableado configurado [F8]:


    - **Estilo 4:** genera señal de **Alarma/Problema**

    - **Estilo 6:** genera señal de **Alarma/Problema**

    - **Estilo 7:** genera señal de **Alarma/Problema**


    En todos los estilos, un fallo de tierra en el SLC genera al menos una señal de
    problema [F8].


    ---


    ### Procedimiento de actuación inmediata


    1. Pulsa **\<Aceptar>** para silenciar el piezo y cambiar el LED de Avería del
    Sistema de intermitente a fijo [F3].

    2. Anota el mensaje que aparece en la pantalla LCD — incluirá el tipo de equipo,
    descripción de ubicación, zona y hora [F3].


    ---


    ### Localización del fallo


    Los fragmentos disponibles no describen un procedimiento paso a paso específico
    para localizar un fallo de tierra en la AFP-400. Sin embargo, sí indican:


    - La placa **MPS-400** dispone de un **LED de "Fallo de Tierra"** (Ground Fault
    LED) que se activa cuando se detecta la fuga [F4][F5].

    - Existe un **jumper JP6 "Ground Fault Disable"** en la placa MPS-400 [F5] — su
    estado puede ser relevante durante el diagnóstico.

    - El cableado del lazo SLC tiene una **resistencia máxima de lazo de 40 Ω** [F9];
