- qid: cat023
  question: En el detector de humos por aspiración Securiton ASD532, ¿qué clases de
    sensibilidad según EN 54-20 ofrece y cómo se configura la monitorización del flujo
    de aire?
  answer: "## Clases de sensibilidad EN 54-20 del ASD 532 y configuración de monitorización\
    \ de flujo\n\n---\n\n### Clases de sensibilidad según EN 54-20\n\nEl ASD 532 cumple\
    \ los requisitos de la norma **EN 54-20** en las tres clases [F7]:\n\n- **Clase\
    \ A** – Sensibilidad muy alta\n- **Clase B** – Sensibilidad alta\n- **Clase C**\
    \ – Sensibilidad normal\n\nEl sensor de humo instalado determina el rango de sensibilidad\
    \ disponible [F2][F8]:\n\n- **SSD 532-1**: rango de alarma **0,5 %/m hasta 10\
    \ %/m**\n- **SSD 532-2**: rango de alarma **0,1 %/m hasta 10 %/m**\n- **SSD 532-3**:\
    \ rango de alarma **0,02 %/m hasta 10 %/m**\n\nLa elección del sensor adecuado\
    \ para cada clase debe realizarse según el cap. 4.4.4.3 o con el software **«ASD\
    \ PipeFlow»** [F2].\n\n---\n\n### Principio de funcionamiento de la monitorización\
    \ del flujo de aire\n\nLa monitorización se basa en el **método de medición calorimétrico**\
    \ (técnica de medición de flujo en masa) [F3]. El sensor de flujo detecta cambios\
    \ en el conducto de aspiración (rotura de tubo u obstrucción).\n\n**Proceso de\
    \ referencia (reset inicial)** [F3]:\n1. Con el conducto de aspiración intacto,\
    \ se realiza un **reset inicial**.\n2. Los valores de flujo medidos se registran\
    \ y guardan como **valores nominales (100 %)**.\n3. El sistema crea electrónicamente\
    \ una **ventana de monitorización** centrada en ese valor nominal.\n4. Si los\
    \ valores reales se salen de la ventana (por obstrucción o rotura), el ASD 532\
    \ dispara el aviso **«Fallo flujo de aire»**.\n\nEl ASD 532 incluye un **circuito\
    \ de compensación de temperatura** para mitigar fluctuaciones de temperatura ambiente,\
    \ y una función de **tiempo de retardo** ajustable para descartar turbulencias\
    \ [F3].\n\n---\n\n### Configuración de la monitorización del flujo: posiciones\
    \ de conmutador\n\nExisten dos grupos de posiciones de conmutador [F5]:\n\n**Grupo\
    \ normativo (homologado EN 54-20): posiciones A11 a C31**\n- Variación máxima\
    \ permitida: **±20 %**\n- Tiempo de retardo: **300 s**\n- Una variación superior\
    \ al ±20 % (flujo < 80 % por obstrucción, o > 120 % por rotura de tubo) dispara\
    \ el aviso de fallo [F3].\n- Se seleccionan cuando la monitorización del flujo\
    \ **sí** debe cumplir EN 54-20 [F5].\n\n**Grupo no normativo: posiciones W01 a\
    \ W44**\n- Permiten configurar ventanas y tiempos de retardo distintos [F1]:\n\
    \n  - Tiempo de retardo: **10 min** o **60 min**\n  - Desviación de ventana: **±20\
    \ %** o **±50 %**\n\n- Asignación por clase y posición de conmutador [F1]:\n\n\
    \  **Clase A (Sens. muy alta):**\n  - W01: 10 min / ±20 %\n  - W02: 60 min / ±20\
    \ %\n  - W03: 10 min / ±50 %\n  - W04: 60 min / ±50 %\n\n  **Clase B (Sens. alta):**\n\
    \  - W09: 10 min / ±20 %\n  - W10: 60 min / ±20 %\n  - W11: 10 min / ±50 %\n \
    \ - W12: 60 min / ±50 %\n  - W17: 10 min / ±20 %\n  - W18: 60 min / ±20 %\n  -\
    \ W19: 10 min / ±50 %\n  - W20: 60 min / ±50 %\n\n  **Clase C (Sens. normal):**\n\
    \  - W25 a W28, W33 a W36, W41 a W44 (mismas combinaciones de 10/60 min y ±20\
    \ %/±50 %)\n\n> ⚠️ **ADVERTENCIA**: Las posiciones **W01 a W44 NO están homologadas\
    \ según EN 54-20** para la monitorización del flujo de aire. Solo deben utilizarse\
    \ **previa consulta con el fabricante** [F3][F4][F5].\n\n---\n\n### Ajuste mediante\
    \ software\n\nSi se usa el software **«ASD PipeFlow»** para el cálculo del proyecto\
    \ [F5]:\n1. Crear y calcular el proyecto en «ASD PipeFlow».\n2. Introducir el\
    \ resultado en el software de configuración **«ASD Config»**.\n3. Seleccionar\
    \ las posiciones de conmutador **X01, X02 o X03** en el ASD para memorizar los\
    \ resultados.\n\nSi **no** se usa «ASD PipeFlow» (EasyConfig) [F5]:\n- Seleccionar\
    \ los límites del sistema según cap. 4.4.4.3.\n- Si la monitorización del flujo\
    \ debe cumplir EN 54-20 → posiciones **A11 a C31**.\n- Si no se requiere cumplimiento\
    \ normativo del flujo → posiciones **W01 a W44** (solo con autorización del fabricante).\n\
    \n> ⚠️ **ADVERTENCIA**: Aumentar los valores de la LS-Ü por encima de **±20 %\
    \ o 300 s** implica **incumplimiento de EN 54-20** y solo puede efectuarse previa\
    \ consulta con el fabricante. No se recomienda usar ventanas inferiores a ±20\
    \ % salvo que el tiempo de retardo se aumente a un mínimo de **10 min** [F5].\n\
    \n---\n\n**Fuente:** ASD532_TD_T140421es_a (sin revisión registrada)\n\n---\n\n\
    También puedo ayudarte con: **procedimiento de reset inicial y puesta en marcha**,\
    \ **selección del sensor SSD 532 según clase EN 54-20** o **conexionado del ASD\
    \ 532 a la central de incendios**."
