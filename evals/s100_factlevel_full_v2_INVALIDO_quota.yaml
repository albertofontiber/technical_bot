- qid: hp012
  question: ¿Cuántos lazos direccionables soporta la Notifier AM2020/AFP1010 y cuántos
    dispositivos por lazo?
  answer: '## Lazos y dispositivos por lazo — AM2020 / AFP1010


    ### AM2020


    - **Número máximo de lazos:** **10** [F6]

    - **Dispositivos por lazo:** hasta **99 detectores analógicos** y **99 módulos**
    (monitores o de control) [F6]


    ### AFP1010


    - **Número máximo de lazos:** **2 tarjetas LIB-200** como máximo [F1], lo que
    equivale a un máximo de **4 lazos** si se usan LIB-400 exclusivamente (según la
    figura del gabinete CAB-A3) [F3][F5]

    - **Total de dispositivos en el sistema AFP1010:** limitado a **396 dispositivos**
    [F1]

    - **Dispositivos por lazo:** el fragmento no especifica un límite distinto al
    de la AM2020 para el AFP1010 de forma independiente; el límite global del sistema
    es 396 dispositivos [F1]


    ---


    ### Tarjetas de lazo compatibles


    Ambas centrales admiten las siguientes tarjetas LIB [F4]:

    - **LIB-200**

    - **LIB-200A**

    - **LIB-400**


    ---


    > **Nota importante:** El AFP1010 está limitado a un máximo de **dos LIB-200**
    (396 dispositivos en total en el sistema) [F1], mientras que la AM2020 puede alojar
    hasta **10 lazos** con hasta **99 detectores + 99 módulos por lazo** [F6].


    ---


    Fuentes: Manual MFDT280 (sin revisión registrada); Manual 15088SP (sin revisión
    registrada); Manual BTDT032 (sin revisión registrada); Manual MPDT280 (rev. Rev
    A)


    ---


    También puedo ayudarte con: **tipos de cableado por estilo NFPA en cada lazo**,
    **modo local de las tarjetas LIB** o **capacidad de zonas de programación de la
    AM2020/AFP1010**.'
