- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: "# Conexionado de sirenas convencionales en salidas de sirena — Morley ZXe\n\
    \n> **Nota:** Los fragmentos recuperados corresponden a los modelos **ZXAE/ZXEE**\
    \ y **ZX2e/ZX5e**. Dado que preguntas por la \"ZXe\", asumo que te refieres a\
    \ alguno de estos modelos. El procedimiento de conexionado es esencialmente el\
    \ mismo en ambos casos. Si tu equipo es diferente, indícamelo.\n\n---\n\n## Número\
    \ de salidas disponibles\n\n- **ZXAE:** 2 salidas supervisadas para sirenas convencionales\
    \ (Salida A y B) [F1]\n- **ZXEE:** 4 salidas supervisadas para sirenas convencionales\
    \ (Salida A, B, C y D) [F1]\n- **ZX2e:** 2 salidas (A y B) — terminales **A+ A-\
    \ B+ B-** en bloque **SOUNDERS** [F3]\n- **ZX5e:** 4 salidas (A, B, C, D) — terminales\
    \ **A- A+ B- B+ C- C+ D- D+** en bloque **TB7** [F3]\n\n---\n\n## Procedimiento\
    \ de conexionado\n\n### 1. Polaridad de las sirenas\n\n- Las salidas tienen **polaridad\
    \ definida** (+) y (−) [F1]\n- Conecta las sirenas **con polaridad** respetando\
    \ el signo de cada terminal [F2]\n- Para **campanas/sirenas sin polaridad**, instala\
    \ un **diodo** entre el terminal (+) y uno de los terminales de alimentación de\
    \ la campana, para evitar consumo durante la supervisión [F1]\n\n### 2. Topología\
    \ del cableado\n\n- El cableado debe ir en **línea directa** desde la central\
    \ hasta la última sirena [F2]\n- **No realizar ramales (derivaciones paralelas):**\
    \ la supervisión se realiza sobre la línea directa hasta la resistencia final\
    \ de línea, y los ramales no quedan supervisados [F2]\n\n### 3. Resistencia Final\
    \ de Línea (RFL)\n\n- Instala siempre una **RFL de 6.800 Ω, 0,5 W mínimo** entre\
    \ los terminales (+) y (−) de la **última sirena** de cada circuito [F1]\n- Si\
    \ **no se conecta ninguna sirena** en una salida, la RFL debe colocarse directamente\
    \ en los terminales de la central [F1]\n\n### 4. Supervisión del circuito\n\n\
    - La supervisión se realiza mediante una **corriente inversa** que lee la RFL\
    \ [F1]\n- En reposo, la polarización es **inversa** (supervisión); al dispararse,\
    \ la corriente circula en sentido normal [F1] [F3]\n- Cualquier fallo de línea\
    \ (apertura o cortocircuito) se mostrará en pantalla como avería [F5]\n\n### 5.\
    \ Corriente máxima por circuito\n\n- Cada circuito de sirenas tiene un **consumo\
    \ máximo de 1 A** [F1]\n- Ten en cuenta el consumo total de la central para no\
    \ exceder el límite con todas las sirenas activadas [F1]\n\n### 6. Sección de\
    \ cable y longitud\n\n- **Sección mínima de cable: 1,5 mm²** — secciones inferiores\
    \ provocan caídas de tensión excesivas [F1]\n- Para la **ZX2e/ZX5e**, no se recomienda\
    \ longitud superior a **1 km** — por encima, la capacitancia e inductancia del\
    \ lazo pueden afectar al funcionamiento [F4]\n\n---\n\n## Resumen del esquema\
    \ de conexión (por circuito)\n\n```\n(+) Salida A ──┬──[SIRENA 1+]──[SIRENA 2+]──[SIRENA\
    \ N+]──┐\n               │    [diodo]      [diodo]       [diodo]     │ RFL 6800\
    \ Ω\n(−) Salida A ──┴──[SIRENA 1-]──[SIRENA 2-]──[SIRENA N-]──┘\n```\n*(Para campanas\
    \ sin polaridad, añadir diodo de protección en cada una)* [F2] [F1]\n\n---\n\n\
    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada);\
    \ Manual de Instalación ZX2e/ZX5e — DOC.MIE-MI-530, Revisión 001"
