- qid: hp013
  question: ¿Cómo se cambia la batería tampón de la Detnov ADW535 sin perder configuración?
  answer: '## Sustitución de la batería de litio del ADW535


    Los fragmentos disponibles del manual **ADW535_TD_T140358es_e** no describen un
    procedimiento específico paso a paso para sustituir únicamente la **batería de
    litio** del LMB 35.


    Lo que sí consta en los fragmentos es lo siguiente:


    **Sobre la batería de litio:**

    - El LMB 35 incorpora una **batería de litio** y un **módulo de reloj RTC** [F2].

    - En la primera puesta en marcha, debe retirarse la **cinta aislante de la batería
    de litio** antes del primer encendido [F8].

    - El fallo de reloj (código **G80 / 008**) puede deberse a que la cinta aislante
    no se ha retirado, a que el reloj no está ajustado, o a que la **batería de litio
    está defectuosa → sustituir** [F10].


    **Sobre la conservación de la configuración:**

    - La configuración del ADW535 se almacena en **Flash-PROM** y **EEPROM** del microprocesador
    del LMB 35 [F2]. Los fragmentos no especifican si la sustitución de la batería
    de litio (sin sustituir el LMB completo) provoca pérdida de configuración.

    - Lo que sí indica el manual es que la sustitución del **LMB 35 completo** requiere
    un **nuevo reset inicial** y reconfiguración completa del sistema [F1]. Pero esto
    aplica al cambio de placa, no necesariamente al cambio de batería.


    **Conclusión:**

    El manual no especifica el procedimiento de sustitución de la batería de litio
    de forma aislada (sin cambiar el LMB 35), ni indica si dicha operación provoca
    pérdida de configuración. Para este procedimiento concreto, consulta directamente
    el soporte técnico de **Detnov/Securiton** o el manual completo en papel.


    ---


    También puedo ayudarte con: **procedimiento de reset inicial**, **sustitución
    del LMB 35 completo** o **interpretación de códigos de fallo G80** del ADW535.


    Fuente: ADW535_TD_T140358es_e (sin revisión registrada)'
