  question: Necesito un detector de humos analógico direccionable «751» para una instalación
    Notifier; ¿cuál es el modelo correcto?
  answer: '## Detectores de humo analógicos direccionables «751» en Notifier


    Hay **varios modelos** con sufijo «751» en el catálogo Notifier. El modelo correcto
    depende del tipo de detección y de la central que vayas a usar. Aquí tienes los
    disponibles según los fragmentos:


    ---


    ### Detectores ópticos (fotoeléctricos)


    - **SDX-751** — Sensor óptico de bajo perfil [F7]

    - **SDX-751E** — Detector fotoeléctrico analógico de bajo perfil [F9][F10]

    - **SDX-751TEM** — Sensor combinado óptico-térmico (58°C), microprocesador, certificado
    **EN54:2000 partes 5 y 7 y CEA4021** [F2][F3]

    - **SDX-751XXXX** — Sensor óptico de bajo perfil (variante) [F6]


    ### Detectores iónicos


    - **CPX-751** — Sensor iónico de bajo perfil [F7][F8]

    - **CPX-751E** — Sensor iónico analógico direccionable de bajo perfil [F4][F6][F9][F10]


    ### Detectores multicriterio


    - **IRX-751TEM** — Sensor multicriterio SMART 3 [F6]

    - **IRX-751CTEM** — Sensor multicriterio SMART 4 [F6]

    - **IPX-751** — Detector analógico con microprocesador: combinación fotoeléctrico
    + iónico + térmico [F9]


    ### Detector intrínsecamente seguro


    - **IDX-751** — Sensor de humo óptico analógico de **seguridad intrínseca** (requiere
    barrera y traductor **IMX-1**) [F1]


    ### Detector láser


    - **FSL-751E** — Sensor de humo láser VIEW [F6]

    - **LPX-751** — Sensor de humo láser VIEW de bajo perfil [F6]


    ---


    ### ¿Cuál elegir?


    Para orientarte necesito saber:


    1. **¿Qué central Notifier tienes?** (AFP-400, AFP4000, AM-6000, AM-2000, ID50/60…)
    — la compatibilidad varía según el panel.

    2. **¿Qué tipo de detección necesitas?** — solo óptico, iónico, combinado óptico-térmico,
    o multicriterio.

    3. **¿Es zona con atmósfera potencialmente explosiva?** — en ese caso el IDX-751
    con barrera sería el indicado [F1].


    ---


    También puedo ayudarte con: **especificaciones eléctricas del SDX-751TEM**, **bases
    compatibles (B501, B524I…)** o **procedimiento de direccionamiento**.


