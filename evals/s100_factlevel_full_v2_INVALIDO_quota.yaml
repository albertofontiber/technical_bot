- qid: cat008
  question: ¿Cómo se cablea el módulo de entrada M710 / MI-DMMI en el lazo, y qué
    resistencias necesita (fin de línea y modo 3 estados)?
  answer: '# Conexionado del módulo M710 / MI-DMMI en el lazo


    ## Terminales de lazo (conexión estándar con aislador interno activo)


    - **T1** → Salida del lazo – [F4][F8]

    - **T2** → Salida del lazo + [F4][F8]

    - **T3** → Entrada del lazo – [F4][F8]

    - **T4** → Entrada del lazo + [F4][F8]


    > **Nota sobre el aislador interno:** Si **no** se necesita aislamiento de cortocircuitos,
    conecta la salida + del lazo al **terminal 5** en lugar del terminal 2. El terminal
    5 está conectado internamente con el terminal 4 [F4][F8].


    ---


    ## Modo 2 estados (contacto seco)


    - **Resistencia de fin de línea (RFL): 47 kΩ** en paralelo con la entrada [F1]

    - Funcionamiento: **cortocircuito = alarma** [F1]

    - La entrada se conecta entre los terminales **6 y 7** [F1]


    ---


    ## Modo 3 estados (supervisión de cortocircuito)


    - **Resistencia de fin de línea (RFL): 47 kΩ** [F1]

    - **Resistencia en serie con el contacto: 18 kΩ**, en serie con cada conmutador/dispositivo
    que se desee supervisar [F1][F2][F4][F8]

    - Funcionamiento: permite distinguir **cortocircuito como avería** (en lugar de
    alarma), siempre que el panel de control lo permita [F2][F4]

    - La entrada se conecta entre los terminales **6 y 7** [F1]


    > ⚠️ **Importante:** El modo 3 estados requiere que la central sea compatible
    con esta función [F4][F8].


    ---


    ## Resumen de resistencias


    - **Fin de línea (RFL):** **47 kΩ** [F1]

    - **Serie con contacto (modo 3 estados):** **18 kΩ** por cada dispositivo supervisado
    [F1][F2][F4][F8]


    ---


    ## Nota sobre terminales 8 y 9


    El circuito de aislador externo conectado a los terminales 8 y 9 **solo está disponible
