- qid: cat017
  question: ¿Como se cablea y se da de alta (configura) un lazo en la central Notifier
    INSPIRE (E10/E15)?
  answer: "# Cableado y configuración de lazo — INSPIRE E10/E15\n\n---\n\n## PARTE\
    \ 1: CABLEADO DEL LAZO\n\n### Módulo de lazo (OPAL X2 — HOP-433-100)\n\nEl módulo\
    \ de doble lazo tiene código de color **morado** [F3] y se identifica como **LAZO\
    \ OPAL X2** [F2].\n\n**Terminales del módulo** [F3]:\n\n- **Terminal 1:** Lazo\
    \ 1 OUT +VE\n- **Terminal 2:** Lazo 1 OUT -VE\n- **Terminal 3:** ⊕ — **NO USAR**\
    \ (pantalla)\n- **Terminal 4:** Lazo 1 IN +VE\n- **Terminal 5:** Lazo 1 IN -VE\n\
    - **Terminal 6:** Lazo 2 OUT +VE\n- **Terminal 7:** Lazo 2 OUT -VE\n- **Terminal\
    \ 8:** ⊕ — **NO USAR** (pantalla)\n- **Terminal 9:** Lazo 2 IN +VE\n- **Terminal\
    \ 10:** Lazo 2 IN -VE\n\n> ⚠️ **CRÍTICO:** No utilices los terminales 3 y 8 para\
    \ la pantalla del cable de lazo. La pantalla debe conectarse a la **Barra de Tierra**\
    \ de la central [F3][F2].\n\n### Topología del lazo\n\nEl lazo es un **bucle cerrado**\
    \ (anillo): la salida de la central llega al primer dispositivo, pasa por todos\
    \ los dispositivos en cadena, y regresa a la entrada de la central [F1].\n\nSe\
    \ recomienda conectar el sistema **solo con un cable de 2 hilos** [F5].\n\nSe\
    \ recomienda poner a tierra **un extremo** de la pantalla del cable de lazo a\
    \ la barra de tierra de la central [F7].\n\n### Numeración de circuitos de lazo\n\
    \nLos circuitos se numeran **secuencialmente de izquierda a derecha** del portamódulos.\
    \ El primer módulo de lazo instalado en la ranura izquierda tiene los lazos 1\
    \ y 2; los siguientes módulos continúan la numeración [F3]. En la E15 (dos filas\
    \ de portamódulos), la segunda fila continúa desde la primera [F3].\n\n---\n\n\
    ## PARTE 2: COMPROBACIONES PREVIAS CON MULTÍMETRO\n\n> ⚠️ **NUNCA** uses un dispositivo\
    \ de alta tensión (p. ej. comprobador de resistencia de aislamiento) en el circuito\
    \ de lazo. Solo comprobadores de baja tensión como multímetro [F5].\n\n**Pasos\
    \ de verificación** [F5][F6]:\n\n1. Comprueba la **continuidad** de cada parte\
    \ del lazo y mide la resistencia de extremo a extremo.\n2. Comprueba la **continuidad\
    \ de la pantalla** del cable (debe dar resistencia muy baja).\n3. Verifica que\
    \ **no hay continuidad** entre la pantalla y los cables +VE y -VE.\n\n**Resistencia\
    \ máxima admisible** [F6]:\n- Lazo **protocolo OPAL:** < **40 Ω**\n- Lazo **protocolo\
    \ CLIP:** < **40 Ω** (para detección de dirección duplicada) / < **71 Ω** (si\
    \ no se necesita detección de dirección duplicada)\n\nPara medir: mide entre *Lazo\
    \ X Entrada -VE* y *Lazo X Salida -VE* con el lazo desconectado físicamente de\
    \ los terminales, multiplica el resultado por 2 y añade la resistencia de cada\
    \ aislador (**0,1 a 0,13 Ω** por aislador) [F6].\n\n**Capacidad del cable:** debe\
    \ ser inferior a **0,5 µF** [F6].\n\n> ℹ️ Herramienta recomendada: **POL-200-TS**\
    \ para comprobar y medir circuitos de lazo antes de conectar a la central. La\
    \ herramienta **POL-200** permite diagnósticos más detallados y funciona con protocolos\
    \ OPAL y CLIP [F7].\n\n### Particularidades de los aisladores\n\n- En bases **OPAL\
    \ (B501 AP)**: al retirar el detector, los terminales **+2 y +4** se cortocircuitan\
    \ automáticamente, manteniendo la continuidad [F6].\n- En módulos y pulsadores\
    \ con aisladores: terminales **+2 y +4** en módulos, terminales **+3 y +4** en\
    \ pulsadores [F6].\n- Para dispositivos **CLIP**: puentea temporalmente los terminales\
    \ **2 y 4** de cada aislador para verificar continuidad [F6].\n\n---\n\n## PARTE\
    \ 3: CONEXIÓN A LA CENTRAL\n\n### Lazo OPAL [F7]\nUna vez verificado el cableado,\
    \ conecta el circuito del lazo al bloque de terminales de lazo seleccionado en\
    \ la central.\n\n### Lazo CLIP [F7]\n1. Vuelve a conectar los aisladores que puenteaste\
    \ temporalmente.\n2. Conecta el circuito del lazo al bloque de terminales seleccionado\
    \ en la central.\n\n---\n\n## PARTE 4: CONFIGURACIÓN DEL LAZO (CLSS + Auto Configuración)\n\
    \n### Paso previo — Configuración con CLSS [F8]\n\nAntes de realizar la Auto Configuración,\
    \ la central debe configurarse con el **programa de configuración de CLSS** [F8].\n\
    \n> ⚠️ Por defecto, la central tiene licencia solo para **protocolo OPAL avanzado**.\
    \ Para usar CLIP o TC800, se necesita **licencia adicional** antes de la Auto\
    \ Configuración [F8].\n\n**Pasos en CLSS** [F8]:\n\n1. Ve a **\"Ajustes\"** →\
    \ **\"Ajustes HMI\"** → en **Tipo de marca** selecciona **Notifier EN**.\n2. Ve\
    \ a **\"Ajustes de lazo\"**:\n   - Si el lazo **no se usa**: marca ☑ **Sin Uso**.\n\
    \   - Si el lazo se usa: selecciona **\"Limitar a VdS 2540\"** (Sí/No) — el valor\
    \ de resistencia cambia según la selección.\n   - Selecciona el **tipo de cable**.\n\
    3. Envía la configuración a la central (pasos \"Enviar configuración a la central\"\
    ).\n\n### Auto Configuración desde la central [F9]\n\n1. Selecciona **Auto Configuración**\
    \ en la central para buscar dispositivos conectados al lazo. Confirma en la ventana\
    \ emergente seleccionando **Auto Configuración** / **Learn Devices**.\n2. Una\
    \ vez completada, selecciona la **flecha derecha (>)** junto al botón Auto Búsqueda\
    \ para ver el estado de averías del lazo.\n3. Lee los mensajes de avería y rectifica\
    \ los problemas detectados. Selecciona **Hecho** al completar.\n4. Si se han rectificado\
    \ averías, **repite los pasos 1 a 3**.\n5. Repite el proceso para **cada lazo**\
    \ hasta descubrir todos.\n\n**Causas típicas de averías tras Auto Configuración**\
    \ [F9]:\n- Discordancia entre diseño de instalación y cableado\n- Averías en el\
    \ cableado\n- Presencia de fuente de RFI fuerte\n- Error de módulo o fuente de\
    \ alimentación\n- Conexionado incorrecto en dispositivos\n\n---\n\n## CAPACIDADES\
    \ DEL LAZO (referencia rápida)\n\n**Protocolo OPAL** [F3]:\n- Hasta **159 detectores**\
    \ OPAL por lazo\n- Hasta **159 módulos** OPAL por lazo\n- Corriente máxima por\
    \ lazo: **750 mA**\n\n**Protocolo CLIP** [F3]:\n- Hasta **99 detectores** CLIP\
    \ por lazo\n- Hasta **99 módulos** CLIP por lazo\n\n> ⚠️ **EN54-2 (13.7):** Restricción\
    \ de **512 detectores y/o pulsadores** por módulo de lazo (2 circuitos) [F3].\n\
    \n> ⚠️ **NO mezclar** dispositivos OPAL y CLIP en el mismo lazo [F3].\n\nLa longitud\
    \ máxima del cable de lazo puede ser de **hasta 3,5 km** dependiendo del tipo\
    \ de carga y de cable — verificar siempre con el **Calculador Global de Baterías\
    \ de Bucle en CLSS Suite** [F3][F6].\n\n---\n\n**Fuente:** HOP-138-8ES issue 6\
    \ (01-2026) — Instrucciones de puesta en marcha INSPIRE E10/E15; HOP-138-9ES issue\
    \ 5 (11-2025) — Instrucciones de instalación INSPIRE E10\n\n---\n\nTambién puedo\
    \ ayudarte con: **primer encendido de la central**, **mensajes de avería de lazo\
    \ y sus significados**, o **conexionado de módulos de salida y relés** de la INSPIRE\
    \ E10/E15."
