- qid: cat018
  question: ¿Como se programa una ecuacion causa-efecto (CBE) en la Notifier AM-8200
    para que un evento active una salida?
  answer: "# Programación de ecuación CBE en la AM-8200\n\n## Concepto previo\n\n\
    Las ecuaciones **CBE (Control By Event)** permiten activar un módulo de salida\
    \ en función de eventos lógicos combinados mediante operadores [F1]. La longitud\
    \ máxima de una CBE es de **64 caracteres** [F2].\n\n---\n\n## Procedimiento paso\
    \ a paso\n\n### 1. Acceder al punto de salida a programar\n\nNavega en el menú\
    \ hasta el módulo de salida correspondiente:\n`MENU PROGRAMMAZIONE → Punti → Moduli`\
    \ [F3]\n\n### 2. Seleccionar el campo CBE\n\n- Usa las teclas **▲▼** para desplazarte\
    \ hasta el campo **CBE** [F2]\n- Pulsa la tecla de confirmación **☑** para entrar\
    \ en edición [F2]\n- Si ya hay una ecuación configurada, se mostrará; si no, el\
    \ campo estará vacío [F2]\n\n### 3. Escribir la ecuación\n\nUsa el teclado alfanumérico\
    \ del panel para introducir la ecuación [F2]. Los operadores disponibles son:\n\
    \n- **OR** → se activa si AL MENOS UN operando está activo [F5]\n- **AND** → se\
    \ activa solo si TODOS los operandos están activos [F5]\n- **NOT** → niega el\
    \ operando o serie de operandos [F5]\n- **XGRP** → se activa si AL MENOS DOS elementos\
    \ del grupo están activos [F6]\n- **DEL** → añade retardo de activación (máx.\
    \ **10 minutos** de retardo y **10 minutos** de duración) [F9]\n- **PRE** → usa\
    \ el estado de pre-alarma de un sensor [F8]\n- **FLT** → usa el estado de avería\
    \ de un dispositivo o zona [F7]\n- **TAC(SYS)** → se activa cuando se ejecuta\
    \ el comando de silencio sirena [F9]\n\n### 4. Confirmar la ecuación\n\nPulsa\
    \ la tecla **Enter** para confirmar la ecuación introducida [F2].\n\n---\n\n##\
    \ Ejemplos prácticos\n\n**Ejemplo OR** — activar la salida si cualquiera de los\
    \ grupos G9, G15 o G23 entra en alarma [F5]:\n```\nOR (G9 G15 G23)\n```\n*(El\
    \ operador OR puede omitirse: `(G9 G15 G23)` es equivalente)* [F5]\n\n**Ejemplo\
    \ AND** — activar la salida solo si los tres grupos están simultáneamente en alarma\
    \ [F5]:\n```\nAND (G9 G15 G23)\n```\n\n**Ejemplo con retardo** — activar el módulo\
    \ 30 segundos después de que L1S1 y L1S4 estén en alarma, durante 30 segundos\
    \ [F9]:\n```\nDEL (00.30 00.30 (AND(L1S1 L1S4)))\n```\n\n**Ejemplo con avería**\
    \ — activar la salida si la zona Z1 o Z2 está en avería [F7]:\n```\nOR (FLT(Z1)\
    \ FLT(Z2))\n```\n\n**Ejemplo con grupos inversos** — cuando la memoria no permite\
    \ un OR de muchos grupos, se usan grupos inversos intermedios [F10]:\n```\nG301\
    \ = OR (G1 G2 G3 G4 G5 G6 G7 G8)\nG302 = OR (G9 G10 G11 G12 G13 G14 G15 G16)\n\
    L01M01 CBE = OR (G301 G302)\n```\n\n---\n\n## ⚠️ Restricciones importantes\n\n\
    - **Para grupos directos**: no se permite que los operandos dentro del paréntesis\
    \ sean grupos con índice **menor** que el grupo al que se asocia la CBE [F5]\n\
    \  - ❌ `G33 = (G23 G24)` → NO permitido\n  - ✅ `G21 = (G23 G24)` → Permitido\n\
    - **Para grupos inversos**: no se permite que los operandos sean grupos con índice\
    \ **mayor** que el grupo al que se asocia la CBE [F5]\n  - ❌ `G305 = (G306 G307)`\
    \ → NO permitido\n  - ✅ `G307 = (G305 G306)` → Permitido\n- **XGRP** solo admite\
    \ un grupo en el paréntesis: `XGRP (G23)` — no se pueden poner varios grupos [F6]\n\
    - **Solo puede existir un operador DEL por ecuación** [F9]\n- **Los módulos de\
    \ salida con TIPO ID para señalizaciones generales no permiten programar una ecuación\
    \ CBE** [F5]\n\n---\n\n**Fuente:** AM-8200 Manual de programación (Doc. M-162.1-AM8200-ESP\
    \ Rev A.3) — Honeywell Life Safety Iberia; AM-8200 Manual de instalación (Doc.\
    \ AM-8200-ESP Rev. A.3) — Notifier\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de grupos lógicos (G)**, **programación del operador XGRP para doble coincidencia**\
    \ o **asignación de zonas a puntos** en la AM-8200."
