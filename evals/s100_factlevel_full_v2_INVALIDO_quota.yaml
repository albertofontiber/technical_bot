per_gold:
- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  answer: "# Notifier PEARL — Lazo SLC: capacidad, aisladores y alta/edición de equipos\n\
    \n---\n\n## 1. Capacidad máxima por lazo\n\n- **Protocolo Opal:** hasta **159\
    \ sensores + 159 módulos** por lazo [F1][F2]\n- **Protocolo CLIP:** hasta **99\
    \ sensores + 99 módulos** por lazo [F2]\n- **Protocolo mixto Opal + CLIP:** el\
    \ límite de equipos CLIP en lazo mixto es de **40**; si se supera, la autoconfiguración\
    \ continúa pero señala fallos [F7]\n- **Carga máxima de lazo:** **0,75 A** por\
    \ lazo [F2]\n- **Límite global del sistema (EN54-2):** máximo **512 sensores y/o\
    \ pulsadores manuales** entre ambos lazos [F1]\n- **Máximo total por lazo:** **318\
    \ equipos** (159 sensores + 159 módulos) [F1]\n\n---\n\n## 2. Requisitos de aisladores\
    \ (EN54-2: 12.5.2)\n\n- **Equipos SIN aisladores internos** (incluidos CLIP y\
    \ algunos Opal): **NO más de 20 equipos entre aisladores** [F1]\n- **Equipos CON\
    \ aisladores internos** (con base B501 AP): los lazos deben cumplir los requisitos\
    \ de EN54-2, que establece **máximo 32 equipos entre aisladores** [F1]\n- Los\
    \ equipos Opal con aislador interno FET usan bases compatibles Opal; el aislador\
    \ se conecta a los terminales **+2 y +4** en el extremo positivo [F1]\n- Para\
    \ que los aisladores se cierren al aplicar alimentación, la carga entre aisladores\
    \ **no debe superar 20 SU** [F6]\n\n> ⚠️ **NUNCA utilices un multímetro de alta\
    \ tensión (tipo Megger) en el lazo de detección.** Si hay aisladores instalados,\
    \ el conductor positivo (+) del lazo será circuito abierto [F1].\n\n---\n\n##\
    \ 3. Alta de equipos: Autoconfiguración\n\nLa forma más rápida de dar de alta\
    \ equipos es mediante la **autoconfiguración** desde el nivel de acceso 3 [F3][F5].\n\
    \n### Acceso al menú de configuración (nivel 3)\n\nDos métodos [F9]:\n\n1. Pulsa\
    \ la tecla de acceso → selecciona **«Conf/Mant.Ingeniero»** → introduce clave\
    \ de nivel 3 → pulsa la pestaña **CONFIG**\n2. Gira la llave 90° en sentido horario\
    \ → selecciona **«5: Pestaña Configuración»** → introduce clave de nivel 3\n\n\
    ### Ruta de menú para autoconfiguración\n\n**Menú de Configuración de Central\
    \ → 1: Editar Configuración → Equipos de lazo → Autoconfigurar** [F8]\n\n### Pasos\
    \ de autoconfiguración [F3][F7]\n\n1. Selecciona **«1: Autoconfiguración»**\n\
    2. Elige si aplica a **todos los lazos** o a un **lazo específico**\n3. Selecciona\
    \ el modo:\n   - **«1: Todos Prot. OPAL/CLIP»** — detecta duplicidades de dirección\
    \ ✓ (recomendado)\n   - **«2: OPAL/CLIP (No detecta duplicidad)»** — más rápido,\
    \ sin comprobación de duplicados\n   - **«3: Sólo con protocolo CLIP»** — solo\
    \ autoconfigura equipos CLIP\n4. Selecciona el modo de cambios:\n   - **«1: Permite\
    \ Añadir/Borrar/Cambiar»**\n   - **«2: Sólo Añadir Nuevos Equipos»**\n5. El proceso\
    \ se inicia automáticamente. Al finalizar, se muestran los resultados en pantalla\
    \ LCD por lazo (navega con teclas **◄/►**) [F7]\n\n> **Nota:** Si el número de\
    \ equipos CLIP supera 40 en lazo mixto, selecciona manualmente la opción **«Sólo\
    \ con protocolo CLIP»** [F7].\n\n---\n\n## 4. Edición individual de equipos\n\n\
    Ruta: **Editar Configuración → Equipos de lazo → Editar equipos** [F5][F8]\n\n\
    Parámetros editables para **sensores** [F4]:\n\n- Número de zona (hasta **255\
    \ zonas locales** o **8192 zonas de red**)\n- Tipo de equipo y entorno de zona\n\
    - Número de células (hasta **255**)\n- Ajuste de nivel de alarma, prealarma y\
