- qid: cat013
  question: Tengo una central Detnov CAD-150 y me ha sobrado de otra instalacion un
    detector optico Notifier SDX-751; ¿es compatible / puedo montarlo en su lazo?
  answer: '## Compatibilidad SDX-751 (Notifier) con CAD-150 (Detnov)


    La respuesta corta es: **no puedo confirmarte compatibilidad**, y te explico por
    qué:


    ---


    ### Lo que dicen los fragmentos


    **Sobre el SDX-751 (Notifier):**


    Los fragmentos recuperados muestran el SDX-751 como detector analógico fotoeléctrico
    de bajo perfil compatible con las centrales **AFP-200** [F5] e **ID-200** [F6]
    de Notifier, usando la base **BX-501** (AFP-200) [F2] o **B501** (ID-200) [F3].
    Su protocolo de comunicación es el propio de las centrales Notifier mencionadas.


    **Sobre la CAD-150 (Detnov):**


    Los fragmentos del manual de la CAD-150-8 [F1, F4, F7, F9, F10] no mencionan en
    ningún momento el SDX-751 ni ningún detector Notifier como dispositivo compatible.
    Tampoco se especifica en los fragmentos disponibles qué detectores de lazo son
    compatibles con la CAD-150.


    ---


    ### Conclusión


    No tengo documentación en los fragmentos recuperados que acredite compatibilidad
    entre el **SDX-751 (Notifier)** y la **CAD-150 (Detnov)**. Se trata de productos
    de **fabricantes distintos**, con protocolos de lazo analógico-direccionable propios
    de cada fabricante, y la compatibilidad entre ellos **debe verificarse directamente
    con Detnov y/o Notifier** antes de cualquier instalación.


    > ⚠️ **Advertencia:** Instalar un detector de lazo de un fabricante en la central
    de otro sin confirmación de compatibilidad puede provocar fallos de comunicación,
    falsas alarmas, fallos de supervisión o que el detector directamente no sea reconocido
    por la central.


    ---


    **Recomendación práctica:** Consulta la lista oficial de dispositivos compatibles
    con la CAD-150 en la documentación técnica de Detnov o contacta con su soporte
    técnico.


    ---


    Fuente: 55315013 Manual Centrales Analógicas CAD-150-8 Instalación (sin revisión
    registrada); MNDT120 Manual AFP-200 (sin revisión registrada); MNDT150 Manual
    ID-200 (sin revisión registrada)


    ---


    También puedo ayudarte con: **lista de detectores compatibles con la CAD-150**,
    **conexionado de lazo en la CAD-150** o **puesta en marcha de la CAD-150**.'
