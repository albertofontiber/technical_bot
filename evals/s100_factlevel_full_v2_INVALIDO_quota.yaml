- qid: cat012
  question: ¿Cómo se calcula la capacidad de batería (en Ah) necesaria para la central
    AM-8200?
  answer: "# Cálculo de capacidad de batería — AM-8200\n\nEl manual proporciona un\
    \ procedimiento estructurado en pasos usando la **Tabla 1** (para la AM-8200 CPU)\
    \ [F9] y la **Tabla 2** (para la AM-8200BB) [F10]. La fórmula final es la misma\
    \ en ambos casos.\n\n---\n\n## Fórmula final [F9][F10]\n\n**Ah Batería = (A +\
    \ B) × 1,2**\n\nDonde:\n- **A** = Amperios-hora en condición de espera (reposo)\n\
    - **B** = Amperios-hora en condición de alarma\n- **1,2** = Factor de corrección\
    \ por tolerancias de fabricación de las baterías [F1]\n\n---\n\n## Pasos del cálculo\n\
    \n**Paso 1 — Corriente en reposo (No Alarma)**\n\nSuma las corrientes de todos\
    \ los elementos del sistema en condición de NO ALARMA [F9]:\n\n- AM-8200 CPU (AM8200-KLCD):\
    \ **179 mA** [F9]\n- Cada LIB-8200 instalada: **50 mA** [F9]\n- Cada AM82-2S2C:\
    \ **28 mA** [F9]\n- Cada AM82-BST-C: **39 mA** [F9]\n- Corriente de los lazos\
    \ (ver Tabla 3 del manual) [F9]\n- Corriente salida usuario: máx. **2 A** [F9]\n\
    - Dispositivos adicionales (LCD-8200, campanas, sirenas, flashes, otros)\n\n→\
    \ Obtén el **Total en reposo** y multiplícalo por la duración de espera requerida:\n\
    **(Total reposo) × 24 h** o **(Total reposo) × 72 h** según la autonomía exigida\
    \ → resultado = **A (Ah)** [F9]\n\n**Paso 2 — Corriente en alarma**\n\nSuma las\
    \ corrientes de todos los elementos en condición de ALARMA [F9]:\n\n- AM-8200\
    \ CPU (AM8200-KLCD): **345 mA** [F9]\n- Cada LIB-8200: **92 mA** [F9]\n- Cada\
    \ AM82-2S2C: **28 mA** [F9]\n- Cada AM82-BST-C: **39 mA** [F9]\n- Corriente de\
    \ los lazos en alarma (ver Tabla 3 del manual) [F1]\n  - ⚠️ En alarma, la central\
    \ enciende **solo los primeros 6 LED** de detectores y módulos de entrada [F1]\n\
    \  - ⚠️ La corriente total de todos los lazos no puede superar **750 mA** [F1]\n\
    - Corriente salida de 24 Vcc: no puede superar **2 A** [F1]\n\n→ Multiplica el\
    \ total por **0,5 h** (duración de alarma) → resultado = **B (Ah)** [F9]\n\n**Paso\
    \ 3 — Aplicar factor de corrección**\n\n**Ah Batería = (A + B) × 1,2** [F9][F1]\n\
    \n**Paso 4 — Verificar límites del cargador**\n\n- Si la corriente calculada supera\
    \ **3,5 A**, el exceso durante alarma se extrae de las baterías [F1]\n- La corriente\
    \ de carga de baterías de la AM-8200 es de **1 A máx.** [F5]\n\n---\n\n## Límites\
    \ de batería admitidos [F5][F6]\n\n- Mínimo: **2 × 12 V / 7 Ah**\n- Máximo: **2\
    \ × 12 V / 18 Ah**\n\n## Baterías recomendadas [F5]\n\n- Yuasa NP18-12B o NP7-12BFR\
    \ (UL94) — 12 V / 17,2 Ah — 181 × 77 × 167 mm\n- Fiamm FG21803 o FGV21803 (UL94)\
    \ — 12 V / 18 Ah — 181 × 77 × 167 mm\n\n---\n\n> ⚠️ **Nota importante:** La Tabla\
    \ 3 del manual (corrientes de lazo) es necesaria para completar el cálculo. Los\
    \ fragmentos disponibles la referencian pero no incluyen sus valores — consulta\
