- qid: cat022
  question: En los detectores de llama Spectrex SharpEye 40/40, ¿qué diferencia hay
    entre el modelo 40/40L y el 40/40L4, y qué significa el sufijo «B» (p. ej. 40/40LB)?
  answer: "## Diferencias entre 40/40L, 40/40L4 y el sufijo «B»\n\n### 40/40L vs.\
    \ 40/40L4 — Longitud de onda IR\n\nLa diferencia principal es la **longitud de\
    \ onda del sensor IR** [F1]:\n\n- **S40/40L**: sensor IR que funciona a una longitud\
    \ de onda entre **2,5 y 3,0 µm**. Es adecuado para detectar:\n  - Combustibles\
    \ a base de hidrocarburos y fuegos de gas\n  - Fuegos de hidróxido e hidrógeno\n\
    \  - Fuegos de metales o materia inorgánica\n\n- **S40/40L4**: sensor IR que funciona\
    \ a una longitud de onda de **4,5 µm**. Es adecuado **únicamente** para la detección\
    \ de **fuegos de hidrocarburos** [F1].\n\nAmbos modelos comparten la misma combinación\
    \ UV/IR y la misma ventana óptica calefactada [F1].\n\n---\n\n### Sufijo «B» (p.\
    \ ej. 40/40LB, 40/40L4B)\n\nEl sufijo **«B»** indica que el modelo incorpora la\
    \ función de **Prueba incorporada (BIT — Built-In Test)** [F1]:\n\n> *\"La función\
    \ de Prueba incorporada (BIT) solo se incluye en los modelos S40/40LB y 40/40L4B.\"\
    *\n\nAdicionalmente, los modelos con sufijo «B» tienen implicaciones en certificación\
    \ [F2]:\n\n- **Certificación SIL-2 (TÜV)**: disponible **exclusivamente** en los\
    \ modelos **S40/40LB y L4B**, basada en IEC 61508.4, Capítulo 3.5.12.\n\n---\n\
    \n### Resumen rápido\n\n- **40/40L** → IR a 2,5–3,0 µm · detección amplia (HC,\
    \ H₂, metales) · sin BIT\n- **40/40LB** → igual que L + función BIT + certificación\
    \ SIL-2\n- **40/40L4** → IR a 4,5 µm · solo hidrocarburos · sin BIT\n- **40/40L4B**\
    \ → igual que L4 + función BIT + certificación SIL-2\n\n---\n\nFuente: Manual\
    \ de usuario. Detector S40/40L-LB-L4-L4B — MNDT722_40-40L (MN-DT-722_B, Honeywell\
    \ Life Safety Iberia, sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **especificaciones eléctricas de consumo**, **procedimiento de prueba BIT**\
    \ o **conexionado típico** de estos detectores."
