- qid: hp014
  question: ¿Cómo se conecta un módulo de aislamiento de línea en un lazo ID2000?
  answer: "## Conexión del módulo de aislamiento de línea en lazo ID2000\n\n### Requisitos\
    \ de instalación (norma EN54-2)\n\nSegún los fragmentos disponibles, los puntos\
    \ clave sobre los aisladores en el lazo ID2000 son:\n\n**Límite de equipos entre\
    \ aisladores:**\n- Máximo **32 equipos** de lazo entre aisladores según **EN54-2:\
    \ 12.5.2** [F2]\n- En la central ID2000, **no más de 25 equipos** entre aisladores\
    \ [F2]\n- Si se utilizan **aisladores tipo FET**, el límite se reduce a **20 equipos**\
    \ entre aisladores [F2]\n\n**Longitud máxima del lazo:**\n- La longitud total\
    \ del par de lazo no puede exceder los **2000 metros**, y solo si se utiliza cable\
    \ de **1,5 mm² de sección o superior** [F1]\n\n---\n\n### Terminales del aislador\n\
    \nEl diagrama de conexiones típicas del lazo muestra que el aislador dispone de\
    \ **4 terminales numerados: 1, 2, 3 y 4** [F1].\n\n---\n\n### Procedimiento de\
    \ comprobación del cableado con aisladores instalados\n\n1. **Antes de conectar\
    \ el panel**, desconecta los aisladores temporalmente **cortocircuitando los terminales\
    \ 2 y 4** de cada aislador [F1].\n\n   > ⚠️ El cableado del lazo **DEBE desconectarse\
    \ del panel** mientras realizas este procedimiento [F1].\n\n2. Comprueba la continuidad\
    \ de cada extremo del lazo y mide la resistencia final de línea. Verifica que\
    \ es inferior a [F1]:\n   - **Con placa base y LIB:**\n     - **14,5 Ω** para\
    \ detección de dirección duplicada\n     - **28,5 Ω** si no es necesaria la detección\
    \ de dirección duplicada\n   - **Con placa base y LIB (segundo caso):**\n    \
    \ - **18,5 Ω** para garantizar detección de dirección duplicada\n     - **35,5\
    \ Ω** si no es necesaria la detección de dirección duplicada\n\n3. Con un multímetro\
    \ en modo prueba de diodo, conecta en **polaridad invertida** (positivo al lazo\
    \ negativo y negativo al lazo positivo). El multímetro debe indicar la presencia\
    \ de un número de diodos polarizados en paralelo [F1].\n\n4. **Las comprobaciones\
    \ de continuidad del lazo deben realizarse antes de conectar los aisladores**\
    \ [F2].\n\n---\n\n### Comportamiento ante cortocircuito\n\nCuando se produce un\
    \ cortocircuito entre dos aisladores, el sistema lo señaliza como **'Posible corte'**\
    \ (no como cortocircuito directo), ya que los aisladores desconectan la sección\
    \ afectada [F3]. Los equipos instalados entre los puntos de aislamiento aparecerán\
    \ como **NO RESPONDE / PERDIDO**, o como **PÉRDIDA PARCIAL DEL LAZO** si faltan\
    \ más de tres equipos [F3].\n\n---\n\n**Nota importante:** Los fragmentos disponibles\
    \ no incluyen el esquema de conexionado físico detallado del módulo aislador (modelo\
    \ específico, colores de cable, polaridad de cada terminal). El manual indica\
    \ que *\"estos equipos van acompañados de instrucciones en las que se muestran\
    \ las interconexiones adecuadas para cada aplicación\"* [F2]. Consulta las instrucciones\
    \ específicas del modelo de aislador que estés instalando.\n\n---\n\nFuente: Panel\
    \ ID2000 - Manual de instalación y puesta en marcha, MI-DT-180, NOTIFIER ESPAÑA\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **comprobación\
    \ de averías de lazo tras la conexión**, **límites de capacidad del lazo (sensores\
    \ y módulos)** o **cableado de la placa base (lazos 1 y 2)**."
