- qid: hp008
  question: ¿Qué detectores de humo analógicos son compatibles con la Notifier ID3000?
  answer: '## Detectores de humo analógicos compatibles con la ID3000


    Según los fragmentos disponibles, los detectores de humo analógicos compatibles
    con la **ID3000** (que utilizan protocolo de comunicaciones Notifier) son los
    siguientes:


    ### Detectores ópticos (humo por dispersión de luz)

    - **SDX-751EM** — Óptico [F1][F2]

    - **SDX-751** — Óptico [F2]

    - **SDX551E** — Óptico [F2]

    - **SDX-551THE** — Óptico [F2]

    - **HPX-751E** — HARSH/FILTREX (Óptico) [F1][F2]

    - **IDX-751** — HAZARD, óptico intrínsecamente seguro [F1][F2]


    ### Detectores iónicos (humo por ionización)

    - **CPX-751E** — Iónico (bajo perfil) [F1][F2]

    - **CPX-551E** — Iónico [F2]


    ### Detectores multicriterio (humo + temperatura)

    - **SDX-751TEM** — Optiplex, combinado térmico/humo [F1][F2]

    - **IRX-751TEM** — SMART 3, multicriterio [F2]

    - **IRX-751CTEM** — SMART 4, multicriterio (óptico/térmico/infrarrojo/CO) [F2][F7]


    ### Detector de humo láser (VIEW™)

    - **FSL-751E / LPX-751** — VIEW, humo láser de alta sensibilidad [F1][F2]


    ---


    **Nota sobre el SMART 4:** El sensor **IRX-751CTEM** (SMT4) incorpora detección
    fotoeléctrica, infrarroja, térmica y de monóxido de carbono [F7]. Dispone además
    de modo de funcionamiento "solo térmico" [F7].


    **Nota sobre el VIEW™:** Configurable con 9 niveles de sensibilidad (L1 más sensible,
    L9 menos sensible). Sensibilidad estándar: **2,44%/m (L8)**; alta: entre **2,44%/m
    (L8)** y **0,98%/m (L5)**; muy alta: **0,98%/m (L5)** o superior [F4][F5][F6].


    ---


    Fuentes: MPDT190 (sin revisión registrada); MIDT190 (sin revisión registrada);
    MCDT191 (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de sensibilidad de los detectores
    VIEW o MULTI**, **conexionado de detectores al lazo** o **programación del tipo
    de sensor en la ID3000**.'
