- qid: hp019
  question: ¿Cuál es el rango de temperatura de funcionamiento del detector de aspiración
    ASD535 (Securiton, distribuido por Detnov)?
  answer: '## Rango de temperatura de funcionamiento — ASD 535


    Según la sección de datos técnicos del manual [F1], los rangos de temperatura
    son:


    **Caja del detector:**

    - Rango estándar: **–30 °C hasta +60 °C** [F1]

    - Según normativa UL: máximo **+40 °C** [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]


    **Conducto de aspiración:**

    - Rango estándar: **–30 °C hasta +60 °C** [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]


    **Restricción adicional importante:**

    - La fluctuación máxima de temperatura permitida durante el funcionamiento (tanto
    en la caja como en el conducto) es de **20 °C** [F1]

    - En entornos con oscilaciones térmicas superiores a 20 °C pueden ser necesarios
    ajustes especiales (ventana de flujo de aire más grande, mayor tiempo de retardo,
    etc.) [F5]


    **Temperatura de almacenamiento** (sin condensación):

    - **–30 °C hasta +70 °C** [F1]


    **Caso especial — almacenes de ultracongelación:**

    - Rango restringido: **–30 °C hasta 0 °C**, siguiendo la directriz T 131 390 [F3]


