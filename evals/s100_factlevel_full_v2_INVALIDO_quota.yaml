- qid: hp020
  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE E10/E15


    ## Consideraciones previas


    - La contraseña debe tener entre **4 y 8 dígitos** [F1][F2].

    - El código de fábrica del Nivel 2 es **"22222222"** [F3]. Se recomienda cambiarlo
    [F3].

    - Si estás en **Nivel 2**, solo puedes cambiar la contraseña de Nivel 2. Si estás
    en **Nivel 3**, puedes cambiar la contraseña de Nivel 2 **o** Nivel 3 [F1].


    ---


    ## Cambio de contraseña desde Nivel 3 (NI2 y/o NI3)


    1. Selecciona el **icono del menú** ① y luego **"Ajustes"** ② [F1].

    2. Inicia sesión como usuario de **Nivel de Acceso 3** [F1].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F1].

    4. Asegúrate de que el **Nivel de Acceso 2 o 3** ④ esté seleccionado y que el
    cursor parpadee en el campo de entrada ⑤ [F1].

    5. Opcionalmente, pulsa el **icono del ojo** ⑥ para visualizar la entrada del
    código [F1].

    6. Introduce el nuevo código de acceso (4–8 dígitos) con el teclado numérico ⑦
    [F1].

    7. Confirma la entrada seleccionando el **símbolo ✓** ⑧ [F1].

    8. Repite los pasos 4 a 7 para confirmar el código [F1].

    9. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1].

    10. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    ---


    ## Cambio de contraseña desde Nivel 2 (solo NI2)


    1. Selecciona el **icono del menú** ① y luego **"Configuración"** ② [F2].

    2. Inicia sesión como usuario de **Nivel de Acceso 2** [F2].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F2].

    4. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y el cursor parpadee
    ⑤ [F2].

    5. Pulsa el **icono del ojo** ⑥ si deseas ver la entrada [F2].

    6. Introduce el nuevo código (4–8 dígitos) con el teclado ⑦ [F2].

    7. Confirma seleccionando el **símbolo ✓** ⑧ [F2].

    8. Repite los pasos 4 a 7 para confirmar [F2].


    ---


    ## Buenas prácticas de seguridad


    - No uses datos personales (fechas, DNI, etc.) como contraseña [F8].

    - Combina números variados y evita secuencias predecibles [F8].

    - Mantén los códigos seguros y accesibles solo a usuarios autorizados [F3][F8].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6_01-2026 (Instrucciones de puesta en marcha INSPIRE E10/E15)
    [F1]

    - HOP-338-9ES issue 4_01-2026 (Instrucciones de usuario INSPIRE E10/E15) [F2][F3]

    - 4188-1122-ES issue 4_04-2025 (Ciberseguridad INSPIRE) [F8]


    ---


    También puedo ayudarte con: **sincronización de configuración con CLSS**, **gestión
    de niveles de acceso** o **procedimiento de puesta en marcha inicial** de la INSPIRE
    E10/E15.'
