- qid: hp003
  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  answer: "## Conexión de baterías en la CAD-150-8\n\n### Especificaciones de las\
    \ baterías\n\nLas centrales analógicas CAD-150-8 requieren **dos baterías de 12V\
    \ 7A/h** conectadas en **serie** para obtener los 24V de funcionamiento [F5].\n\
    \n### Procedimiento de conexión\n\n1. **Coloca las baterías** en la parte inferior\
    \ de la caja, en el espacio reservado para ello, de forma vertical [F5].\n\n2.\
    \ **Conecta el cable puente** (suministrado con la central) uniendo el **polo\
    \ positivo (+) de una batería con el polo negativo (-) de la otra**, para conectarlas\
    \ en serie [F5].\n\n3. **Conecta los cables del circuito** al conjunto de baterías:\n\
    \   - Cable **rojo** → polo **positivo (+)**\n   - Cable **negro** → polo **negativo\
    \ (-)** [F1]\n\n4. El conector de batería en la placa base está identificado como\
    \ **conector Batería (11)**, protegido por el **fusible de baterías (10)** [F2][F3].\n\
    \n### ⚠️ Orden de conexión obligatorio\n\nEl orden de conexión es **crítico**\
    \ para evitar daños en el equipo [F4][F5]:\n\n- **Primero:** conectar la alimentación\
    \ de red (230VAC), activando el magnetotérmico bipolar\n- **Segundo:** conectar\
    \ las baterías\n\n### Verificación previa a la puesta en marcha\n\nAntes de energizar,\
    \ comprueba que las baterías tienen una **tensión superior a 24V** [F6].\n\n>\
    \ **Nota:** En caso de necesidad, el equipo puede arrancarse solo con baterías,\
    \ pero es imprescindible pulsar el **pulsador BAT (9)** de la placa base para\
    \ iniciar el arranque [F6].\n\n---\n\nFuente: 55315013 Manual Centrales Analógicas\
    \ CAD-150-8 Instalación ES FR GB IT (sin revisión registrada)\n\nTambién puedo\
    \ ayudarte con: **conexión del bucle analógico**, **conexión de sirenas** o **puesta\
    \ en marcha y verificación del sistema** de la CAD-150-8."
