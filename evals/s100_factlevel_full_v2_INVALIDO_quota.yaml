- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  answer: '# Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura a través de las **reglas
    de causa-efecto** (Apéndice 5) [F1], accesibles desde el menú de configuración
    de nivel 3 [F7][F8].


    ---


    ## Ruta de acceso a la configuración


    1. Accede al nivel de acceso **3** (clave de nivel 3) [F8]

    2. Entra en **«Editar Configuración»** → opción **«8: Causa y Efecto»** [F8]

    3. Dentro de la matriz de causa-efecto, edita o crea la regla a la que quieres
    asignar el retardo [F1]


    ---


    ## Tipos de retardo disponibles


    Al configurar una regla de causa-efecto, puedes asignar **uno de seis tipos de
    retardo de salida** [F1]. Cada tipo determina el comportamiento durante la cuenta
    atrás:


    - **Fijo**: No se puede silenciar con SILENCIAR SIRENAS, no se puede anular, no
    muestra cuenta atrás en LCD, no responde a AMPLIAR RETARDO ni a FIN RETARDO [F2]

    - **Estándar**: Se detiene si se pulsa SILENCIAR SIRENAS; se puede anular (nivel
    2); muestra tiempo restante en pestaña ALARMA; se puede detener con FIN RETARDO
    (nivel 2) [F2]

    - **No Silenc.**: No se detiene con SILENCIAR SIRENAS; sí se puede anular (nivel
    2); muestra tiempo restante; se puede detener con FIN RETARDO [F2]

    - **Est. Ext.**: Se detiene con SILENCIAR SIRENAS; se puede anular; muestra tiempo
    restante; se detiene también con AMPLIAR RETARDO [F2]

    - **RetExtStd**: Se detiene con SILENCIAR SIRENAS; se puede anular; muestra tiempo
    restante; al pulsar AMPLIAR RETARDO inicia un temporizador de retardo ampliado
    [F2]

    - **No Sil. Ext**: No se detiene con SILENCIAR SIRENAS; se puede anular; muestra
    tiempo restante; se detiene con AMPLIAR RETARDO [F2]

    - **SinRetExt**: No se detiene con SILENCIAR SIRENAS; se puede anular; muestra
    tiempo restante; al pulsar AMPLIAR RETARDO inicia temporizador de retardo ampliado
    [F2]


    ---


    ## Funcionamiento del retardo ampliado


    Cuando se detecta una alarma con retardo activo, la persona autorizada (con llave
    de nivel 2) puede pulsar **AMPLIAR RETARDO** para iniciar un segundo temporizador
    (normalmente más largo que el primero) que anula al primero, dando tiempo para
    realizar una búsqueda [F4].


    Para terminar cualquier retardo activo y pasar a condición de alarma completa,
    se pulsa **FIN RETARDO** (disponible en nivel de acceso 1) [F4].


    ---


    ## Opción adicional: habilitar/deshabilitar el pulsador AMPLIAR RETARDO


    Desde **Apéndice 1 → parámetro 10: «Extend Delay Button»** se puede habilitar
    o deshabilitar el pulsador AMPLIAR RETARDO, ya que esta función no se requiere
    en algunos mercados [F5].


    ---


    ## Anulación operativa del retardo (sin reprogramar)


    Si necesitas anular temporalmente los retardos en operación (sin cambiar la programación),
    accede desde el panel a:

    **Menú Anular/Habilitar → «5: Retardo Activación Salidas»** → pulsa ✓ para cambiar
    entre HABILITADO/ANULADO [F3]


    ---


    > ⚠️ **Nota**: El uso de retardos puede afectar al cumplimiento de la norma **EN54-2**,
    párrafos **7.4.2, 7.4.3** (condiciones de incendio) y **8.6.3** (condiciones de
    fallo) [F8].


    ---


    **Fuente:** Manual de configuración de la central PEARL 997-671-005-3 (sin revisión
    registrada); Manual de funcionamiento PEARL 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **programación detallada de reglas de causa-efecto**,
    **configuración del tiempo de retardo ampliado** o **gestión de niveles de acceso
    (nivel 1/2/3)** en la PEARL.'
