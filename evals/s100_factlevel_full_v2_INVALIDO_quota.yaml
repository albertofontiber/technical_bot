- qid: hp010
  question: En la Morley DXc, ¿cómo se añade un nuevo detector al lazo tras la puesta
    en marcha inicial?
  answer: '## Añadir un nuevo detector al lazo en la DXc (tras puesta en marcha)


    El procedimiento es el siguiente:


    ---


    ### Paso 1 — Conectar físicamente el detector


    Conecta el nuevo detector al lazo analógico respetando la polaridad (positivo/negativo)
    [F3]. Recuerda:


    - No puentees los terminales: corta el cable en cada conexión para mantener la
    supervisión [F4].

    - Si instalas el detector entre aisladores de cortocircuito, asegúrate de no superar
    **32 equipos entre aisladores** [F3].


    ---


    ### Paso 2 — La central detectará el equipo nuevo


    Una vez conectado, la central generará el evento **"EQUIPO NUEVO"**, que indica
    que se ha detectado un equipo nuevo en el lazo [F2].


    ---


    ### Paso 3 — Realizar la Autobúsqueda para aceptar el nuevo equipo


    Accede al menú de **Lazos** y ejecuta la función **Autobúsqueda** [F1] [F2]:


    1. Pulsa la tecla **''2''** en el menú de Lazos para seleccionar **''Autobúsqueda''**
    [F1].

    2. Si la central tiene más de un lazo, introduce el número de lazo correspondiente
    y pulsa **⊙** [F1].

    3. Confirma que deseas realizar la autobúsqueda pulsando **⊙** [F1].

    4. Espera a que finalice el proceso (se mostrará una barra de progreso en pantalla)
    [F1].


    > ⚠️ **Aviso importante:** En mercados donde el protocolo es seleccionable, si
    se ha realizado un cambio de protocolo previo, **espera dos minutos** antes de
    ejecutar la autobúsqueda [F1].


    ---


    ### Paso 4 — Verificar el resultado


    Al finalizar, la pantalla mostrará un resumen con el total de equipos y las diferencias
    encontradas (nuevos, eliminados, cambiados) [F1]. Ejemplo de pantalla:


    ```

    [Lazo]                     Mie 13/04/2011 17:37:31

    Lazo: 1           Total: 13

    Nuevos:1          Elimin.:0  Cambiad:0

    ```


    Comprueba que el número de equipos y tipos mostrados corresponde con lo instalado
    físicamente [F1].


    ---


    ### Nota adicional


    Si tras la autobúsqueda aparece el evento **"TIPO EQUIPO CAMBIADO"**, significa
    que el tipo del nuevo detector no coincide con el que había configurado anteriormente
    en esa dirección. En ese caso, repite la autobúsqueda o cambia manualmente el
    tipo de equipo [F2].


    ---


    **Fuente:** DXc_Manual de configuracion (sin revisión registrada); Eventos-Averias-de-Equipos-en-DXc
    (sin revisión registrada)


    ---


    También puedo ayudarte con: **verificación del valor analógico del nuevo detector**
    (Ver Equipos), **asignación de zona al nuevo detector** o **instalación de aisladores
    de cortocircuito en el lazo**.'
