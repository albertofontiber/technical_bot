- qid: cat009
  question: ¿Qué resistencia de fin de línea (EOL) hay que instalar en las líneas
    de zona de la central convencional NFS Supra?
  answer: "## Resistencia de Fin de Línea (EOL) — NFS Supra\n\nLa central **NFS Supra**\
    \ admite **dos modos de supervisión de zona**, y el equipo final de línea (EFL/RFL)\
    \ depende del modo configurado:\n\n---\n\n### Modo por defecto: **Capacitivo (EFL)**\n\
    \n- **Condensador de 47 µF** instalado entre positivo y negativo de la línea,\
    \ en el último equipo de la zona [F4].\n- Es el modo de fábrica [F1].\n\n---\n\
    \n### Modo alternativo: **Resistivo (RFL)**\n\n- **Resistencia de 6K8 Ω** instalada\
    \ entre positivo y negativo de la línea, en el último equipo de la zona [F4].\n\
    - En modo RFL, la central admite un rango de resistencia final de línea entre\
    \ **3 KΩ** y **7 KΩ** [F4].\n\n---\n\n### Puntos clave de instalación\n\n- **Todas\
    \ las zonas**, incluso las no usadas, deben tener instalado su final de línea\
    \ según la configuración del sistema (EFL o RFL) [F4].\n- El EFL/RFL se coloca\
    \ **en el último equipo de la zona**, entre positivo y negativo de la línea [F2].\n\
    - Si hay detectores autónomos con relé de avería (NC), el EFL/RFL se coloca **después\
    \ del contacto NC del relé de avería** [F3].\n\n---\n\n### Cómo cambiar entre\
    \ modo Capacitivo y Resistivo\n\n1. Pulsa simultáneamente **Tecla TECLADO = ON\
    \ + Tecla EVACUACIÓN = ON** para acceder al menú de configuración de Final de\
    \ Línea [F1].\n2. Usa la **Tecla REARME** para cambiar la opción (requiere Nivel\
    \ de acceso 3) [F1]:\n   - **LED 1 Alarma Rojo encendido** → Final de Línea Resistivo\
    \ **6K8 Ω** [F1].\n   - **LED 2 Anulada Ámbar encendido** → Final de Línea Capacitivo\
    \ **47 µF** (por defecto) [F1].\n\n---\n\n**Fuente:** HLSI-MN-025_NFS Supra, Manual\
    \ de usuario HLS-MN-025 v.05 (sin revisión registrada)\n\nTambién puedo ayudarte\
    \ con: **conexionado de pulsadores con diodo Zener**, **circuitos de sirena y\
    \ su EOL** o **umbrales de tensión de zona para diagnóstico de fallos** en la\
    \ NFS Supra."
