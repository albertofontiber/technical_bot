- qid: cat020
  question: En una central Morley DXc instalada en Espana, ¿cual es el nivel de alarma
    y de prealarma por defecto de los detectores, y el maximo configurable?
  answer: '## Niveles de alarma y prealarma por defecto en la DXc (España)


    La respuesta depende del **tipo de detector** (protocolo Morley-IAS con valor
    analógico normalizado, o detectores multicriterio/láser con niveles numerados):


    ---


    ### Detectores con protocolo Morley-IAS (valor analógico normalizado 0–100%)


    Estos son los valores aplicables para España según el manual de variaciones de
    mercado:


    - **Prealarma por defecto: 80%** [F2]

    - **Alarma por defecto: 100%** [F2]

    - **Nivel máximo configurable de alarma: 108%** [F2]


    > El valor analógico es un número normalizado entre **0% y 100%** independientemente
    del tipo de equipo [F2]. En pantalla se ve como el detector S004 OPT del ejemplo:
    `Fuego:100% Prealarma: 80%` [F2].


    ---


    ### Detectores multicriterio OTM (óptico-térmicos)


    Los niveles se expresan como **Nivel 1 a Nivel 6** (no en porcentaje). Los valores
    recomendados por el manual son [F1]:


    - **Prealarma recomendada: Nivel 3** (valor analógico 72, sensibilidad 6,5% osc./m)
    — marcado como \*P [F1]

    - **Alarma recomendada: Nivel 4** (valor analógico 86, sensibilidad 6,5% a 11,5%
    osc./m autoajustado) — marcado como \*A [F1]


    En pantalla se muestra como: `Fuego: Niv4 / Prealarma: Niv3` [F1][F2]


    ---


    ### Detectores láser LSR


    Los niveles van de **Nivel 1 a Nivel 9**. Los valores recomendados son [F1]:


    - **Prealarma recomendada: Nivel 4** (valor analógico 69, sensibilidad 0,32% osc./m)
    — marcado como \*P [F1]

    - **Alarma recomendada: Nivel 5** (valor analógico 76, sensibilidad 0,65% osc./m)
    — marcado como \*A [F1]


    En pantalla: `Fuego: Niv5 / Prealarma: Niv4` [F2]


    ---


    ### Restricciones de configuración


    - El nivel de prealarma **no puede ser superior al nivel de alarma** [F3]

    - La central **no permite ajustar niveles que impidan el reconocimiento de alarmas**
    [F3]

    - El ajuste se realiza desde **Nivel de acceso 3** (instalador/técnico) a través
    del menú Modo Horario → Sensibilidad [F3]


    ---


    Fuente: DXc_Manual variaciones de mercado (sin revisión registrada); DXc_Manual
    de configuración (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento paso a paso para cambiar el nivel
    de sensibilidad**, **configuración de modos horarios** o **compatibilidad de versiones
    del software MK-DXC Configuration Tools**.'
