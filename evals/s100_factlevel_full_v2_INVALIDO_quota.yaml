- qid: cat010
  question: ¿Cómo se alimenta la sirena/avisador intrínsecamente seguro IS-mA1 en
    una zona peligrosa (ATEX) y cuáles son sus parámetros de seguridad intrínseca
    de entrada?
  answer: '# Alimentación e IS del IS-mA1 en zona peligrosa (ATEX)


    ## Parámetros de seguridad intrínseca de entrada (Entity Parameters)


    ### Terminales + / − (alimentación principal)


    - **Ui = 28 V** [F1][F3]

    - **Ii = 93 mA** [F1][F3]

    - **Pi = 660 mW** [F1][F3]

    - **Ci = 0** [F1][F3]

    - **Li = 0** [F1][F3]


    ### Terminales S2 y S3 / − (cambio de tono/etapa de alarma)


    - **Ui = 28 V** [F3][F5]

    - **Ii = 0 mA** [F3][F5]

    - **Ci = 0** [F3]

    - **Uo = 16,8 V** (salida desde el propio terminal) [F3]

    - **Io = 7,3 mA** [F3]

    - **Po = 31 mW** [F3]


    ---


    ## Clasificación ATEX


    - Marcado: **II 1G Ex ia IIC T4 Ga** [F1]

    - Temperatura ambiente: **−40 °C ≤ Ta ≤ +60 °C** [F1]

    - Apto para zonas **0, 1 y 2** con gases y vapores inflamables, grupos **IIA,
    IIB e IIC**, clases de temperatura **T1 a T4** [F1]

    - Certificado: **SIRA 05ATEX2084X** (sufijo X = condiciones especiales de uso)
    [F1]


    ---


    ## Opciones de alimentación desde zona segura


    ### Opción A — Barreras Zener


    **Alarma de una sola etapa:**

    - Si el interruptor de control está en el positivo: basta con **una barrera Zener
    de un solo canal** (28 V / 93 mA) — ver Fig 4 [F8][F9]

    - Si el interruptor está en el negativo: se añade además una **barrera de retorno
    de diodo** en el negativo — ver Fig 5 [F8][F9]


    **Alarma multietapa (S2 / S3):**

    - Barrera Zener principal (28 V / 93 mA) para la alimentación [F9]

    - **Barrera de retorno de diodo** adicional para activar la 2.ª etapa (S2) y otra
    para la 3.ª etapa (S3) — ver Fig 6 [F7][F9]

    - Conectar S2 o S3 a **0 V (terminal −)** activa la 2.ª o 3.ª etapa respectivamente
    [F7]


    > ⚠️ **Restricción crítica para S2/S3:** Como Ii = 0 mA, estos terminales **solo
    pueden conectarse** a: barrera de retorno de diodo, relé intrínsecamente seguro
    o aislador galvánico, todos certificados Ex ia por un Organismo Notificado. Solo
    se admiten barreras de retorno de diodo con **caída de tensión < 0,9 V** [F5][F6].


    ### Opción B — Aisladores galvánicos


    - Para la alimentación principal: cualquier aislador galvánico con parámetros
    de salida dentro de los límites de la sección 4.3, certificado Ex ia [F10]

    - Para S2/S3 (multietapa): **relés galvánicamente aislados** con parámetros dentro
    de los límites de la sección 4.4, certificados Ex ia [F10]

    - Ventaja: **no requieren conexión a tierra de alta integridad**, lo que simplifica
    la instalación en sistemas pequeños [F10]


    ---


    ## Restricciones de cableado importantes


    - La **capacitancia total** conectada a los terminales +/− (cable + cualquier
    otra capacitancia) **no debe superar 83 nF** [F3][F4]

    - La Lcable y Ccable de los cables a S2/− y S3/− deben ser **≤** a los del cable
    de alimentación principal +/− [F3]

    - La resistencia entre la tierra intrínsecamente segura y la tierra de protección
    debe ser **< 1 Ω** (instalación con barreras Zener) [F4]

    - La unión entre conexiones de conducto **no es automática** y debe garantizarse
    en la instalación [F3][F4]

    - La distancia entre terminales S2 y S3 es **inferior a 6 mm** — precaución en
    el conexionado [F3][F4]

    - La carcasa es de **plástico ABS** — limpiar únicamente con **paño húmedo** para
    evitar carga electrostática [F1]


    ---


    También puedo ayudarte con: **selección de tono y configuración de los interruptores
    de tono**, **diagramas de conexionado multietapa con aisladores galvánicos** o
    **requisitos de instalación IP65 y entradas de cable**.


    Fuentes: IS5001-F_IS-mA1_EN (Issue E, 27-11-09); manual IS MA1 (Issue H, 03-01-2020)'
