- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  answer: "# Programación de coincidencia de 2 detectores en ID3000\n\n## Concepto\
    \ previo importante\n\nLa función de coincidencia **solo se aplica si la entrada\
    \ de la Matriz de Control está definida como 'ZONA', 'SUBZONA' o 'CUALQUIER ZONA'**\
    \ — no si es un equipo individual o una tecla [F1].\n\n⚠️ **PRECAUCIÓN (EN54-2:\
    \ 7.1.4):** No incluyas pulsadores manuales (MCP/PUL) en el grupo de coincidencia\
    \ [F1][F4].\n\n---\n\n## Procedimiento de programación\n\n### Paso 1 — Crear la\
    \ entrada de Matriz de Control\n\nEn el menú de programación, crea un nuevo evento\
    \ de Matriz de Control y selecciona la definición de entrada [F4]:\n\n- Selecciona\
    \ **'ZONA'** (una zona determinada) como ámbito de la entrada.\n- Selecciona el\
    \ **tipo de equipo** al que se aplicará la coincidencia (p. ej. `CUALQUIER TIPO\
    \ DE EQUIPO`, o un tipo específico como `CUALQUIER SENSOR ÓPTICO`, etc.) [F4].\n\
    \n> **Nota:** No puedes usar simultáneamente la función de coincidencia de zonas\
    \ y la limitación por tipo en la misma entrada de Matriz de Control [F4].\n\n\
    ---\n\n### Paso 2 — Seleccionar \"Coincidencia de 2 equipos\"\n\nCuando el sistema\
    \ te presente el menú de tipo de coincidencia, selecciona la opción [F4]:\n\n\
    ```\nIndique tipo de coincidencia:\n 1: UN ÚNICO EQUIPO\n 2: COINCIDENCIA 2 EQUIPOS\
    \   ← Selecciona esta\n 3: n COINCIDENCIA EQUIPOS\n 4: p COINCIDENCIA EQUIPOS\n\
    ```\n\nCon esta opción, **deben activarse las alarmas de dos equipos de esa zona\
    \ antes de que se active la salida** [F1].\n\n> **Condición:** Para que tenga\
    \ lugar la coincidencia, los equipos en alarma deben estar en la **misma zona\
    \ o subzona** [F4].\n\n---\n\n### Paso 3 — Excluir pulsadores manuales (obligatorio)\n\
    \nPara evitar que los pulsadores manuales queden incluidos en el grupo de coincidencia,\
    \ debes programar **dos instrucciones separadas** en la Matriz de Control [F1][F4]:\n\
    \n1. **Primera instrucción:** Define la entrada de tipo **'Pulsador Manual' (MCP)**\
    \ con coincidencia **'UN ÚNICO EQUIPO'** (sin coincidencia).\n2. **Segunda instrucción:**\
    \ Define la entrada del tipo analógico (p. ej. `ANALÓGICO`, que incluye detectores\
    \ térmicos, iónicos, ópticos, VIEW y multisensor) con **'COINCIDENCIA 2 EQUIPOS'**\
    \ [F1].\n\n---\n\n### Paso 4 — Asignar la salida de sirena\n\nUna vez configurada\
    \ la entrada con coincidencia de 2 equipos, asigna como salida la **zona/circuito\
    \ de sirenas** correspondiente en la misma línea de Matriz de Control.\n\n---\n\
    \n## Verificación en el software PK-ID3000\n\nSi usas el software de configuración,\
    \ en la ventana **\"Edición Evento de Entrada en la Matriz de Control\"** verás\
    \ el campo [F2][F6]:\n\n- **\"Coincidencia de [ ] Equipos ☐\"** → activa la casilla\
    \ e introduce **2**.\n- Selecciona el rango de zona(s) determinada(s) donde están\
    \ los detectores.\n\n---\n\n## Nota sobre subzonas\n\nSi la entrada está definida\
    \ como **'SUBZONA'**, la coincidencia de equipos también está disponible pero\
    \ **limitada a dos equipos como máximo** [F3]. El comportamiento (misma subzona\
    \ o rango de subzonas) se configura en la **Sección 11.21** de configuración de\
    \ la central [F7][F8].\n\n---\n\nFuentes:\n- MCDT190 (sin revisión registrada)\n\
    - MPDT190 (sin revisión registrada)\n- MADT190_07 (sin revisión registrada)\n\
    - MCDT191_F v. 2.17e (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **configuración de la Sección 11.21 para ajustar el alcance de la coincidencia**,\
    \ **exclusión de pulsadores manuales paso a paso**, o **programación de retardos\
    \ de activación en la salida de sirena**."
