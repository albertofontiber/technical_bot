- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: '## Acceso al menú de programación avanzada — CAD-250


    El acceso al menú **AVANZADO** se realiza desde el nivel de configuración (Nivel
    2). El procedimiento completo es:


    ### Paso 1 — Desbloquear la central

    Desde la **PANTALLA DE REPOSO**, toca el icono del **candado (🔒)** en la pantalla
    táctil [F4]. Aparecerá la **PANTALLA DE ACCESO** solicitando contraseña [F3].


    ### Paso 2 — Introducir credenciales

    Introduce la clave de **instalador** (nivel de configuración completo) [F8]. La
    clave de administrador por defecto es **2222** [F3].


    > ⚠️ El uso indebido del nivel de acceso de instalador puede provocar un mal funcionamiento
    de la instalación. Asegúrate de tener la autorización necesaria [F3].


    ### Paso 3 — Navegar al menú AVANZADO

    Una vez dentro del nivel de configuración, la ruta de navegación es:


    **AJUSTES** (Menú principal) **> AVANZADO** (Submenú) [F2]


    ### Contenido del menú AVANZADO

    Dispone de **3 pestañas** [F2]:


    - **SISTEMA:** Configuración del número de cabinas (PANELES: 1 a 4), número de
    lazos (2, 4, 6, 8... hasta 32 según cabinas) y cabina de LEDs de zona (0 ó 1)
    [F2].

    - **OTROS:** Interruptores de puesta en marcha y mantenimiento — Tiempo de inactividad,
    Salto a scroll si incidentes, Saltar a último incidente prioritario si timeout,
    Recordar estado de módulos virtuales, y Salir del modo de test automáticamente
    (configurable entre 1 y 24 horas) [F5].

    - **REINICIAR:** Devuelve los valores de configuración del panel a fábrica. **No
    afecta** a entidades, lazos, maniobras, grupos, módulos virtuales, modos especiales,
    filtros de red ni registros de eventos [F5].


    > ⚠️ Por razones de seguridad y cumplimiento normativo, los interruptores de inactividad,
    timeout y scroll deben estar activados (en verde) por defecto [F5][F6].


    Para validar cambios en la pestaña SISTEMA, pulsa el botón **"Guardar y reiniciar"**
    [F2].


    ---


    **Fuentes:**

    - CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)

    - CAD-250 Manual de Software de Configuración MS-416-es-2026-b (rev. b)

    - Manual de Usuario CAD-250 MU-376-es-2024-f (sin revisión registrada)

    - Manual de Instalación CAD-250 MI-372-es-2024-e (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración del número de lazos y cabinas**, **gestión
    de usuarios y contraseñas** o **modos especiales de instalación** en la CAD-250.'
