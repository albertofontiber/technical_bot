- qid: cat024
  question: ¿Cuál es el consumo en alarma de la sirena analógica de zócalo Detnov
    MAD-472?
  answer: 'El consumo en alarma de la **MAD-472** (Sirena Analógica de Zócalo Detnov)
    es:


    - **Consumo en alarma: 7 mA** [F6, F7, F8]


    Hay una discrepancia entre fuentes que conviene tener en cuenta:


    - El manual propio de la MAD-472 indica **17 mA (a 80 dB A)** [F1]

    - Las tablas de dispositivos compatibles de la CAD-250 indican **7 mA** [F6, F7,
    F8]


    Para el cálculo de carga del lazo en la **CAD-250**, usa el valor de **7 mA**
    que figura en su tabla de dispositivos compatibles [F6]. Para las características
    técnicas propias del dispositivo, el manual de la sirena indica **17 mA** [F1].


    Te recomiendo verificar con Detnov cuál de los dos valores es el correcto para
    tu aplicación, ya que existe esta discrepancia entre documentos.


    ---


    Fuentes:

    - Manual Sirena Analógica MAD-472 (55347200 Manual Sirena Analogica MAD-472 ES
    GB FR IT_V2, sin revisión registrada)

