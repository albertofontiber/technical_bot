- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '# Test anual del detector VESDA-E VEP


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido**, las tareas que corresponden
    a realizarse **una vez al año** son las siguientes [F1] [F2]:


    ---


    ## Tareas anuales obligatorias


    **1. Prueba de humos para comprobar la integridad de la tubería**

    - Introduce una muestra de humo en el orificio de muestreo más alejado [F3]

    - Mide el tiempo de transporte hasta que el humo llega al detector [F3]

    - Registra los resultados y compáralos con pruebas anteriores para detectar variaciones
    del sistema [F3]

    - Para el procedimiento detallado, el manual remite a la **VESDA-E Commissioning
    Guide** [F3]


    **2. Comprobar el flujo de la red de tubería** [F1]


    **3. Limpiar los puntos de muestreo** [F1]


    **4. Limpiar con agua la red de tubería** [F1]


    ---


    ## Antes de realizar cualquier prueba — Precauciones obligatorias


    ⚠️ **IMPORTANTE** [F1]:

    - Informa a la **autoridad supervisora adecuada** antes de comenzar

    - Asegúrate de que se **aíslen todos los dispositivos** que dependan del detector
    antes de ponerlo en funcionamiento

    - Cuando el detector está deshabilitado o en espera, **no emitirá advertencias
    de fuego**

    - Sigue los **procedimientos del sitio** para evitar falsas alarmas en los servicios
    supervisados


    ---


    ## Poner el detector en modo "En espera" durante el mantenimiento


    Para realizar el mantenimiento de la red de tubería o los puntos de muestreo sin
    generar alarmas [F6]:


    1. Abre **Xtralis VSC**

    2. En el menú **Dispositivo ("Device")**, selecciona **"Ir a modo en espera" ("Go
    to Standby")**

    3. El LED desactivado parpadeará y se apagará el aspirador

    4. Una vez finalizado el mantenimiento, selecciona **"Finalizar modo en espera"
    ("End Standby")** en el mismo menú


    > ⚠️ En modo en espera se desactiva la detección de alarmas, aunque la detección
    y señalización de fallos sigue activa [F6]


    ---


    ## Frecuencia de otras tareas (referencia)


    - **Cada 3 meses:** Fuente de alimentación y batería [F1]

    - **Cada 6 meses:** Comprobar la red de tubería [F1]

    - **Cada 2 años:** Sustitución del filtro [F1]


    ---


    > **Nota:** La frecuencia de las comprobaciones puede variar según los códigos
    y normas locales y el entorno de la instalación [F1]. El procedimiento detallado
    de la prueba de humos se encuentra en la **VESDA-E Commissioning Guide** [F3],
    documento separado no incluido en los fragmentos disponibles.


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **sustitución del filtro cada 2 años**, **configuración
    del modo en espera mediante Xtralis VSC** o **procedimiento de normalización del
    flujo** del VEP.'
