# Conflicto = Opus y GPT discrepan en QUÉ PRODUCTOS cubre el doc (uno lista X, el otro ni lo menciona).
# Ya filtrado el ruido de superficie (canon-merge por aliases) y el cross-brand (residual de curación, apartado).
#
# Cada entrada: lo que SOLO dijo Opus, lo SOLO dijo GPT, mi recomendación + porqué, y un campo `decision:` para ti.
# Rellena `decision:` con uno de: merge_same | opus | gpt | union | <texto libre>.  (vacío = aceptas mi recomendación)
#
# Leyenda de recomendación:
#   merge_same = mismo producto, solo nombre distinto (descriptivo vs SKU) -> 1 registro
#   opus       = el set de Opus es lo cubierto; GPT sobre-listó sistemas COMPATIBLES/objetivo como cubiertos
#   gpt        = el set de GPT es lo cubierto; Opus nombró una herramienta/genérico o se quedó corto
#   union      = ambos cubren de verdad -> unión (secundarios = candidate)
#   his_call   = frontera genuina, sin default fuerte -> tu criterio

