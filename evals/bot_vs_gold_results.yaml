    Tools**, **resolución del evento "DOBLE DIRECCIÓN"** o **conexionado físico del
    lazo con aisladores**.'
- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en comprobar Abort, zonas, flujo/presión y averías persistentes,
    pero omite puntos clave del manual como la inhibición temporal de rearme P.18
    y el tiempo de descarga P.02. Además introduce imprecisiones sobre terminales
    y rearme automático de entradas/averías que pueden confundir al técnico.
  bot_sources:
  - MNDT102
  bot_answer: '## RP1R – Sistema no vuelve a estado normal tras resetear después de
    descarga


    Los fragmentos disponibles del manual MNDT102 no describen un procedimiento específico
    de rearme post-descarga paso a paso, pero sí aportan información relevante sobre
    las causas más comunes que impiden el retorno al estado normal.


    ---


    ### Comprobaciones a realizar (por orden de probabilidad):


    **1. Verifica el circuito de Extinción (CCT EXT 1 / CCT EXT 2)**


    Tras la descarga, los circuitos de extinción quedan abiertos (el agente ya no
    está). Si la central detecta circuito abierto o ausencia de RFL **6K8** en los
    terminales **10 (CCT EXT 2)** o **11 (CCT EXT 1)**, mostrará avería con el LED
    de "Avería Circuito de Extinción" intermitente [F3].


    - Comprueba que los circuitos de extinción tienen su **RFL de 6K8** correctamente
    instalada o que el circuito está físicamente repuesto.

    - Estos circuitos tienen **rearme automático** [F3], pero solo si la avería desaparece
    (es decir, si el circuito vuelve a estar supervisado correctamente).


    ---


    **2. Verifica el estado del Pulsador de Paro de Emergencia (Abort) — terminal
    F**


    Esta es una causa muy frecuente de bloqueo post-descarga. La entrada de Abort
    es **enclavada**: una vez activada, **requiere rearme manual obligatorio** para
    salir del estado [F7].


    - Comprueba que el pulsador de Abort (terminal **F**) está en posición normal
    (no activado).

    - Si estaba activo durante la descarga, el sistema **no saldrá del estado de extinción
    anulada** hasta que se realice el rearme manual con el pulsador de Abort en reposo
    [F7].

    - Verifica también que el LED de "Avería Paro" (intermitente) o "Paro" (fijo)
    no esté encendido [F3].


    ---


    **3. Verifica las zonas de detección (terminales H, I, J)**


    Si alguna zona sigue en alarma (detector activado, pulsador accionado, o RFL ausente),
    la central no puede volver a estado normal [F3].


    - Comprueba que todos los detectores han vuelto a estado de reposo.

    - Verifica que las **RFL de 6K8** están presentes al final de cada zona [F1][F3].

    - Si el LED de zona parpadea de forma intermitente → avería de supervisión (circuito
    abierto o cortocircuito) [F3].


    ---


    **4. Verifica el circuito de Flujo (FLOW PRESS — terminal D) y Baja Presión (LOW
    PRESS — terminal C)**


    Tras la descarga, es habitual que los sensores de flujo y presión queden en estado
    activo o en avería si el sistema no ha sido repuesto [F3].


    - Ambos tienen **rearme automático**, pero solo si la condición de avería desaparece
    [F3].

    - Si el agente no ha sido repuesto, estos circuitos pueden mantener la central
    fuera del estado normal.


    ---


    **5. Verifica el estado del Pulsador de Espera (HOLD — terminal G)**


    Si hay una avería en el circuito de supervisión del pulsador de espera, la central
    activa el relé de espera (HOLD) y puede quedar en modo "Extinción Anulada" [F6].


    - Comprueba que el circuito del pulsador de espera está correctamente supervisado
    con su RFL.

    - El LED de "Avería Espera" intermitente o "Espera" fijo indicaría este problema
    [F3].


    ---


    ### Resumen de causas bloqueantes:


    - **Abort activo o en avería** → único que requiere rearme manual obligatorio
    [F7]

    - **CCT EXT sin RFL** (agente descargado, circuito abierto) → avería persistente
    [F3]

    - **Zona de detección en alarma o avería** → impide retorno a normal [F3]

    - **FLOW / LOW PRESS activos** → sistema de agente no repuesto [F3]

    - **HOLD activo o en avería** → central en modo extinción anulada [F6]


    ---


    Fuente: MNDT102 – Manual de usuario. Central de extinción RP1R (sin revisión registrada,
    22 junio 2011)


    ---


    También puedo ayudarte con: **procedimiento de programación de microinterruptores
    SW1/SW2/SW3**, **conexionado de los circuitos de extinción CCT EXT** o **configuración
    del retardo de disparo (parámetro dL)** de la RP1R.'
