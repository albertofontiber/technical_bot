  - Rearme-remoto-en-central-DXc-Connexion
  bot_answer: '## Añadir un nuevo detector al lazo en la Morley DXc tras la puesta
    en marcha


    Cuando se conecta un nuevo detector al lazo después de la puesta en marcha inicial,
    la central lo detecta automáticamente y genera el evento **"EQUIPO NUEVO"** [F5].


    ### Procedimiento


    1. **Conecta físicamente el detector al lazo**, respetando el cableado de datos/alimentación
    (+) SALIDA y (-) SALIDA / (+) RETORNO y (-) RETORNO [F10]. Recuerda no puentear
    los terminales — corta el cable en cada conexión para mantener la supervisión
    [F15].


    2. **La central mostrará el evento "EQUIPO NUEVO"** en pantalla, indicando que
    ha detectado un dispositivo no registrado en su configuración [F5].


    3. **Realiza una autobúsqueda** para que la central acepte e incorpore el nuevo
    equipo a su configuración [F5].


    > ⚠️ **Nota importante sobre aisladores:** Si el lazo supera los **32 puntos direccionables**
    entre aisladores, instala un aislador de cortocircuito en el punto adecuado del
    lazo (límites entre zonas) [F15].


    ---


    ### Tras la autobúsqueda


    Una vez aceptado el equipo, deberás programarlo (zona, etiqueta, tipo) mediante
    el software **MK-DXC Configuration Tools** [F1], descargable desde **www.morley-ias.es**
    como usuario registrado [F3]. Asegúrate de usar la versión del software compatible
    con la versión de firmware de tu central [F3].


    ---


    **Fuentes:**

    - Eventos/Averías de Equipos en DXc (sin revisión registrada)

    - DXc\_Manual de configuración (sin revisión registrada)

