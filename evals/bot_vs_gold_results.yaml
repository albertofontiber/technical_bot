  - 55315013 Manual Centrales Analogicas CAD-150-8 Instalacion ES FR GB IT
  - 55315501 CAD150R Instalacion ES GB 191018
  bot_answer: "## Conexión de baterías en la CAD-150\n\n⚠️ **Importante:** La pregunta\
    \ menciona la \"CAD-150\" sin especificar variante. Los fragmentos disponibles\
    \ cubren la **CAD-150-8** (central analógica) y la **CAD-150R** (repetidor analógico).\
    \ El procedimiento de baterías es similar en ambas, pero hay diferencias en las\
    \ capacidades disponibles. A continuación te detallo ambas:\n\n---\n\n### Procedimiento\
    \ general (válido para CAD-150-8 y CAD-150R)\n\n1. **Desconecta la alimentación\
    \ de red** antes de manipular las baterías. Desconecta siempre el magnetotérmico\
    \ bipolar exterior [F3][F1].\n\n2. **Orden de conexión obligatorio:** primero\
    \ la red eléctrica, y posteriormente las baterías [F3][F1].\n\n3. **Conecta las\
    \ dos baterías en serie** mediante el cable puente suministrado:\n   - Conecta\
    \ el **polo + de una batería** al **polo - de la otra** con el cable puente [F1][F3].\n\
    \n4. **Conecta los cables de alimentación al conector de la placa principal:**\n\
    \   - Cable **rojo → polo +** de las baterías\n   - Cable **negro → polo -** de\
    \ las baterías [F1][F5]\n\n5. **Coloca las baterías** en el espacio reservado\
    \ en la parte inferior de la caja [F1][F3].\n\n---\n\n### Diferencias según variante\n\
    \n**CAD-150-8** (central analógica) [F3]:\n- Requiere **dos baterías de 12V 7A/h**\
    \ conectadas en serie\n- Se colocan en la parte inferior de la caja, en posición\
    \ **vertical**\n- Conector de batería: posición **11** en la PCB base [F7][F13]\n\
    - Fusible de baterías: posición **10** en la PCB base [F7][F13]\n\n**CAD-150R**\
    \ (repetidor analógico) [F1]:\n- Admite **dos baterías de 12V**, en versión de\
    \ **2A/h o 7A/h**, conectadas en serie\n- Conector de batería: posición **13**\
    \ en la placa principal [F6]\n- Fusible de batería: **2A**, posición **14** en\
    \ la placa principal [F6]\n\n---\n\n### Verificación previa a la puesta en marcha\n\
    \nAntes de energizar, comprueba con voltímetro que **las baterías tienen una tensión\
    \ superior a 24V** [F8][F9].\n\n---\n\nFuente: Manual de instalación CAD-150-8\
    \ (55315013 Manual Centrales Analogicas CAD-150-8 Instalacion ES FR GB IT, sin\
    \ revisión registrada); Manual de instalación CAD-150R (55315501 CAD150R Instalacion\
    \ ES GB 191018, sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con:\
    \ **verificación del lazo de bucle**, **conexión de sirenas** o **puesta en marcha\
    \ y arranque por batería** de la CAD-150."
