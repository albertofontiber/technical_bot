- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó en identificar la función de coincidencia en la Matriz de Control
    y en advertir que no deben incluirse pulsadores manuales. Pero es incompleto para
    un técnico: no detalla la secuencia de programación de entrada/salida en la ID3000,
    la selección de ALARMA/zona/tipo/“COINCIDENCIA 2 EQUIPOS”, ni cómo asignar la
    salida de sirena y confirmar la instrucción; además mezcla referencias de PK-ID3000
    y notas de red que no sustituyen el procedimiento solicitado.'
  bot_sources:
  - MADT190_02
  - MADT190_05
  - MADT190_06
  - MADT190_07
  - MCDT190
  - MCDT191
  - MIDT190
  - MPDT190
  bot_answer: '## Programación de coincidencia de dos detectores en ID3000


    La función que necesitas es la **Coincidencia** en la Matriz de Control. Aquí
    tienes el procedimiento basado en lo que especifica el manual:


    ---


    ### Concepto clave


    Si en la columna **Coincidencia** de la Matriz de Control se establece **''SÍ''**,
    deben activarse las alarmas de **dos equipos de esa zona/subzona** antes de que
    se active la salida [F6].


    Esta función solo se aplica si la entrada está especificada como **''ZONA''**,
    **''SUBZONA''** o **''CUALQUIERA''** — no si es un equipo individual o una tecla
    [F6].


    ---


    ### Consideración crítica: Pulsadores Manuales


    ⚠️ **Atención (EN54-2: 7.1.4):** No incluyas pulsadores manuales en un grupo de
    coincidencia [F6].


    Para evitarlo, debes programar **dos instrucciones separadas** en la Matriz de
    Control [F6]:


    1. **Primera instrucción:** Define la entrada de tipo **''Pulsador Manual'' (MCP)**
    como **''Simple''** (sin coincidencia).

    2. **Segunda instrucción:** Define el tipo de entrada al que se aplicará la coincidencia
    (por ejemplo, **''ANALÓGICA''**). El grupo ANALÓGICO incluye detectores **TÉRMICOS,
    IÓNICOS, ÓPTICOS, VIEW y MULTISENSOR** [F6].


    ---


    ### Activar la coincidencia


    - En la columna **Coincidencia** de la instrucción correspondiente, pulsa la **barra
    ESPACIADORA** para cambiar de **NO** a **SÍ** [F6].


    ---


    ### Nota sobre redes


    Si estás programando un sistema en red y la columna **''CENTRAL''** muestra **''CLQ''**,
    la coincidencia se aplica a dos eventos cualesquiera de **toda la red**. Si la
    columna indica una central específica (maestra o esclava), puedes designar el
    panel entero o un número de zona, pero **no un número de subzona** [F6].


    ---


    ### Ejemplo práctico de referencia


    El manual incluye una guía de extinción [F5] donde se describe un escenario similar:

    - Con **1 detector en alarma** → activa sirena (sin coincidencia).

    - Con **2 detectores en alarma** → activa solenoide y cartel (con coincidencia
    + retardo de **30 seg.**) [F5].


    Este ejemplo puede servirte como referencia de estructura de programación para
    tu caso de sirena con doble detector.


    ---


    **Fuente:** Manual de programación ID3000 (MCDT190, sin revisión registrada);
    Guía rápida extinción PK-ID3000 rev. 2.03G (MADT190_07, 14-12-05)


    ---


    También puedo ayudarte con: **configuración del retardo de activación de la salida**,
    **programación de la Matriz de Control paso a paso con PK-ID3000** o **tipos de
    entrada disponibles en la Matriz de Control**.'
