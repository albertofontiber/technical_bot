    \ — se requiere **PIN de 4 dígitos** para funciones administrativas [F5]\n5. Ejecuta\
    \ las pruebas funcionales desde el menú de comandos de Xtralis VSC [F8][F15]\n\
    6. Realiza la prueba de humos física en los puntos de muestreo y verifica el tiempo\
    \ de transporte [F11]\n7. Comprueba el flujo de tubería y limpia puntos de muestreo\
    \ y red de tubería [F10]\n8. Restablece el detector al estado normal al finalizar\n\
    \n> \U0001F4DD **Nota** [F10]: La frecuencia necesaria puede variar en función\
    \ de los códigos y normas locales y del entorno de instalación. El mantenimiento\
    \ puede realizarlo el instalador original, un distribuidor autorizado o el contratista\
    \ de servicio.\n\n---\n\n**Fuentes:**\n- `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores`\
    \ (sin revisión registrada)\n- `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores`\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **sustitución\
