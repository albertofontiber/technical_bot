  bot_answer: 'El manual del ADW535 **no describe un procedimiento específico para
    cambiar la batería tampón sin perder configuración**. Lo que sí puedo indicarte
    a partir de los fragmentos disponibles es lo siguiente:


    ---


    ## Lo que el manual especifica sobre la batería de litio del ADW535


    **Tipo de batería:**

    La batería es una **batería de litio BR 2032** [F12], ubicada en el **Main Board
    LMB 35** [F7][F9].


    **Número de artículo de repuesto:**

    - Batería de litio BR 2032 → N.º de artículo **11-4000008-01-XX** [F12]


    **Función de la batería:**

    Alimenta el **módulo de reloj RTC** [F7]. El fallo de batería genera el código
    **G80 / código 008: "Fallo reloj"** [F11].


    **Dato crítico sobre la configuración:**

    El manual indica expresamente que **"el reset inicial no anula los parámetros
    específicos del sistema que se hayan definido previamente (clase de respuesta)"**
    [F14]. La configuración del sistema se almacena en **EEPROM y Flash-PROM** del
    LMB 35 [F7], no en la batería de litio.


    ---


    ## Lo que el manual NO especifica


    Los fragmentos disponibles **no describen el procedimiento paso a paso para sustituir
    físicamente la batería** (apertura del equipo, extracción, inserción, precauciones
    durante el cambio).


    Lo que sí indica el manual para trabajos en el interior del equipo:


    - **"Los recableados en el dispositivo solo podrán realizarse en ausencia de tensión"**
    [F8]

    - Tras trabajos de reparación en el LMB 35, **es obligatorio realizar un reset
    inicial** [F14]

    - Tras sustituir el LMB 35 completo, también se requiere reset inicial [F14]


    > ⚠️ **Importante:** El manual indica que después de la sustitución de la batería
    puede aparecer el fallo G80/008 si el reloj no está ajustado [F11]. Tras el cambio,
    deberás **ajustar fecha/hora** desde **ADW Config** [F9].


    ---


    ## Recomendación


    Consulta el procedimiento físico de sustitución directamente con **Securiton/Detnov**
    o en el manual completo, ya que los fragmentos recuperados no cubren ese procedimiento
    detallado.


