- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en que se accede desde la pantalla de reposo pulsando el candado
    e introduciendo un código, pero omite la clave de administrador por defecto 2222
    y destaca la clave de usuario 1111, que no da acceso completo a la programación
    avanzada. Además mezcla el acceso al nivel administrador con la ruta Ajustes >
    Avanzado, que no responde de forma suficiente a cómo entrar al menú de programación
    avanzada.
  bot_sources:
  - CAD-250-MC-380-es
  - CAD-250-MS-416-es
  - Manual instalacion CAD-250 (MI_372_es_2024 e)
  - Manual usuario CAD-250 (MU 376 es 2024 f)
  bot_answer: "## Acceso al menú de programación avanzada en la CAD-250\n\nEl acceso\
    \ al menú **AVANZADO** se realiza desde la interfaz táctil siguiendo esta ruta\
    \ [F3]:\n\n**AJUSTES** (Menú principal) **> AVANZADO** (Submenú)\n\n---\n\n###\
    \ Pasos detallados:\n\n1. Desde la **PANTALLA DE REPOSO**, pulsa el candado (\U0001F512\
    ) para acceder a la pantalla de acceso [F9].\n2. Introduce el **código de acceso**\
    \ en el teclado numérico [F9]. La clave de usuario por defecto es **1111** [F9].\n\
    \   > ⚠️ Para acceder al nivel de configuración completo (Nivel 2), se requiere\
    \ la clave de nivel de configuración. Con la clave de usuario estándar, ciertos\
    \ parámetros no estarán disponibles [F9].\n3. Una vez dentro, selecciona **AJUSTES**\
    \ en el menú lateral izquierdo [F3].\n4. En el submenú derecho, selecciona **AVANZADO**\
    \ [F3].\n\n---\n\n### Contenido del menú AVANZADO:\n\nDispone de **3 pestañas**\
    \ [F3]:\n\n- **SISTEMA:** Configuración del número de paneles (1 a 4), número\
    \ de lazos (2, 4, 6, 8... hasta 32 según cabinas) y LEDs de zona (0 ó 1) [F3].\n\
    - **OTROS:** Interruptores para facilitar tareas de puesta en marcha y mantenimiento,\
    \ incluyendo el control del **Tiempo de inactividad** [F3].\n- **REINICIAR:**\
    \ (disponible en la pestaña, contenido no detallado en los fragmentos recuperados).\n\
    \nPara validar cualquier cambio en este menú, pulsa el botón **\"Guardar y reiniciar\"\
    ** [F3].\n\n---\n\n### Contexto de niveles de acceso:\n\nEl menú AVANZADO forma\
    \ parte del **Nivel 2 - Editar configuración**, que también incluye los submenús:\
    \ Lazo, Sectorización, Maniobras, Logs, Red, Ajustes e Instalación [F7].\n\n---\n\
    \n**Fuente:** Manual de configuración avanzada CAD-250 (CAD-250-MC-380-es, sin\
    \ revisión registrada); Manual de usuario CAD-250 (MU 376 es 2024 f, sin revisión\
    \ registrada)\n\n---\n\nTambién puedo ayudarte con: **configuración de lazos y\
    \ número de paneles**, **creación de maniobras** o **configuración de red (ModBus/Ethernet)**\
    \ en la CAD-250."
- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó en que el problema se relaciona con la monitorización de flujo
    LS-Ü y en citar obstrucciones, filtros y revisión de eventos/conducto como pasos
    útiles. Pero es incompleto: no explica que no es una alarma de ''flujo bajo''
    sino fallo de flujo, no da los umbrales respecto al reset inicial, no indica leer
    V01/V02 para distinguir obstrucción de rotura, ni menciona retardo/ventana de
    monitorización ni el reset inicial tras corregir la causa.'
  bot_sources:
  - ASD535_TD_T131192es_h
  bot_answer: '## Alarma de flujo bajo en ASD535 — Diagnóstico


    Los fragmentos recuperados del manual **ASD535_TD_T131192es_h** contienen información
    estructural y de configuración del equipo, pero **la sección específica de diagnóstico
    de fallos de flujo bajo (capítulo 10.3 "Detección y subsanación de errores")**
    no está incluida en los fragmentos disponibles [F8].


    Lo que sí puedo confirmar del manual es lo siguiente:


    ---


    ### Lo que el manual indica sobre la monitorización de flujo


    - El ASD535 dispone de un **sistema de monitorización del flujo de aire (LS-Ü)**
    que detecta en cada tubería las obstrucciones y roturas que puedan producirse
    en el conducto de aspiración [F3].

    - El componente responsable de esta medición es el **AFS 35 (Air Flow Sensor /
    Sensor de flujo de aire)** [F12].

    - La unidad de ventilación para la aspiración es la **AFU 35** [F12].

    - En entornos con mucha presencia de **polvo o suciedad**, se requieren accesorios
    adicionales como caja de filtro, trampa para polvo, separador de polvo, etc. [F1].


    ---


    ### Causas probables según el manual (inferibles de la documentación disponible)


    El manual menciona explícitamente los siguientes elementos que pueden afectar
    al flujo:


    1. **Obstrucción en el conducto de aspiración** — el sistema de monitorización
    detecta obstrucciones en la tubería [F3].

    2. **Rotura en el conducto de aspiración** — también detectada por el sistema
    LS-Ü [F3].

    3. **Filtro obstruido** — en instalaciones con unidades de filtrado de polvo,
    el filtro puede estar colmatado [F1]. El manual tiene una sección específica:
    **cap. 9.3.1 "Sustitución del filtro en unidades de filtrado de polvo"** [F8].

    4. **Orificios de aspiración con rebabas o perforación incorrecta** — pueden alterar
    el flujo de aire [F15].

    5. **Fallo del sensor de flujo de aire (AFS 35)** — el manual contempla su sustitución
    en el **cap. 9.4.3** [F8].

    6. **Fallo de la unidad de ventilación (AFU 35)** — contemplada en el **cap. 9.4.2**
    [F8].


    ---


    ### Pasos de diagnóstico recomendados por el manual


    1. Consulta la **memoria de eventos** del ASD535 desde el Main Board AMB 35 (indicación
    alfanumérica + visualizadores de 7 segmentos) para identificar el código de evento
    exacto — **cap. 8.5.3** [F8].

    2. Revisa el estado de los **LEDs en la unidad de control** — **cap. 8.5.1** [F8].

    3. Inspecciona visualmente el **conducto de aspiración** buscando obstrucciones,
    roturas o desconexiones.

    4. Si hay unidad de filtrado instalada, comprueba y sustituye el **filtro** según
    **cap. 9.3.1** [F8].

    5. Si el problema persiste, revisa el **AFS 35** y la **AFU 35** según los procedimientos
    de sustitución de los **cap. 9.4.2 y 9.4.3** [F8].


    ---


    ### ⚠️ Importante


    El capítulo **10.3 "Detección y subsanación de errores"** del manual (pág. 127)
    [F8] contiene la tabla completa de fallos con causas y acciones correctivas. **No
    está disponible en los fragmentos recuperados.** Para el diagnóstico definitivo,
    consulta directamente esa sección del manual físico.


    ---


    Fuente: ASD535 Descripción técnica T 131 192 h es (Índice h, 31.10.2016)


    ---


    También puedo ayudarte con: **sustitución del sensor de flujo AFS 35**, **limpieza
    y mantenimiento del conducto de aspiración** o **lectura de la memoria de eventos
    del AMB 35**.'
