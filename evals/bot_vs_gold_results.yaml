    \ Resistencia Final de Línea (RFL)** entre **+** y **−** de la última sirena:\n\
    \   - Valor: **6.800 Ω, mínimo 0,5 W** [F3]\n\n5. **Si no instalas sirenas** en\
    \ una salida, conecta igualmente la RFL directamente en los terminales de esa\
    \ salida [F3]\n\n---\n\n### Requisitos de cableado\n\n- Sección mínima: **1,5\
