    ---


    ## Requisitos de instalación de aisladores en lazo ID2000


    ### Normativa aplicable


    Según la norma **EN54-2: 12.5.2** [F9], los aisladores son obligatorios en cada
    lazo analógico para separar sensores y pulsadores manuales.


    ### Límites de equipos entre aisladores


    - **Máximo 32 equipos** de lazo entre aisladores según EN54-2 [F9].

    - **En la ID2000, el límite práctico es 25 equipos entre aisladores** [F9].

    - **Si se usan aisladores tipo FET, el límite baja a 20 equipos** [F9].


    > ⚠️ Superar estos límites contraviene la norma EN54-2 en caso de avería en la
    transmisión [F9].


    ### Comportamiento ante cortocircuito


    Cuando ocurre un cortocircuito entre dos aisladores, el sistema lo señaliza como
    **''Posible corte''** [F15]. Los aisladores desconectan la sección afectada y
    los equipos entre los puntos de aislamiento aparecen como **NO RESPONDE / PERDIDO**
    o **PÉRDIDA PARCIAL DEL LAZO** si faltan más de tres equipos [F15].


    ### Comprobaciones previas a la conexión


    Las comprobaciones de continuidad del lazo **deben realizarse antes de conectar
    los aisladores** [F9].


    ---


    ### Lo que NO está en los fragmentos recuperados


