  - 33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores
  bot_answer: "# Test anual del detector VESDA-E VEP\n\n## Tareas de mantenimiento\
    \ anual\n\nSegún el calendario de mantenimiento del VEP-A10-P [F10], las comprobaciones\
    \ con frecuencia **anual (una vez al año)** son:\n\n- **Realizar una prueba de\
    \ humos** para comprobar la integridad de la red de tubería\n- **Comprobar el\
    \ flujo** de la red de tubería\n- **Limpiar los puntos de muestreo**\n- **Limpiar\
    \ con agua la red de tubería**\n\n> ⚠️ **Precaución antes de cualquier prueba**\
    \ [F10]: Informa a la autoridad supervisora adecuada y asegúrate de que se aíslen\
    \ los dispositivos existentes que dependan del detector antes de comenzar. Cuando\
    \ el detector está deshabilitado o en espera, **no emitirá advertencias de fuego**.\n\
    \n---\n\n## Pruebas funcionales ejecutables desde Xtralis VSC\n\nTodos estos comandos\
    \ se ejecutan exclusivamente desde el **software Xtralis VSC** [F8][F15]:\n\n\
    **1. Prueba de alarma** (`Start Alarm Test`)\n- Simula nivel de humo de escala\
    \ completa\n- Activa condiciones de Alerta, Acción, Fuego 1 y Fuego 2\n- Se activarán\
    \ los relés de alarma (salvo que el detector esté desactivado)\n\n**2. Prueba\
    \ de fallo de circulación del aire** (`Start Air Flow Fault Test`)\n- Comprueba\
    \ el sistema de detección de flujo apagando el aspirador\n\n**3. Prueba de relés**\
    \ (`Start Relay Test`)\n- Activa y desactiva cada relé individualmente para verificar\
    \ su conexión con el panel de incendios\n- Asignaciones predeterminadas de relés\
    \ [F12][F14]:\n  - Relé 1 → Deshabilitar\n  - Relé 2 → Fallo leve\n  - Relé 3\
    \ → Fallo urgente\n  - Relé 4 → Alerta\n  - Relé 5 → Acción\n  - Relé 6 → Fuego\
    \ 1\n  - Relé 7 → Fuego 2\n\n**4. Prueba de fallo importante** (`Start Major Fault\
    \ Test`)\n- Genera un fallo importante y desactiva el relé de fallo durante **2\
    \ minutos** [F15]\n\n**5. Prueba de fallo menor** (`Start Minor Fault Test`)\n\
    - Genera un fallo menor y desactiva el relé de fallo durante **2 minutos** [F15]\n\
    \n**6. Prueba de LED** (`Start LED Test`)\n- Realiza un ciclo de prueba de todos\
    \ los indicadores LED del panel de visualización [F15]\n\n---\n\n## Procedimiento\
    \ general recomendado\n\n1. Informa a la central receptora / autoridad supervisora\
    \ [F10]\n2. Aísla los dispositivos dependientes del detector [F10]\n3. Conecta\
    \ un PC con **Xtralis VSC** al detector (USB para acceso directo, o Ethernet/WiFi\
