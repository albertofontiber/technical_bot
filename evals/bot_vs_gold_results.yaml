- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  conducta_esperada: admit_no_info
  conducta_bot: admit_no_info
  veredicto: PASS
  diagnostico: Acierta al indicar que la CCD-103 es convencional y no permite desactivar
    detectores individualmente desde la central, solo zonas completas. También describe
    correctamente la desconexión por zona y advierte que cualquier aislamiento individual
    tendría que hacerse físicamente, sin inventar un procedimiento del manual.
  bot_sources:
  - CCD-103_Manual_ES_FR_GB_IT
  bot_answer: 'La CCD-103 es una central convencional de 3 zonas [F15]. La desactivación
    opera **a nivel de zona completa**, no detector individual. Esto es lo que el
    manual especifica:


    ---


    ## Desconexión por zona (única opción disponible en panel)


    Las **teclas de zona (A)** permiten [F1]:


    1. **Primera pulsación** → zona pasa a **modo prueba** (se activa el indicador
    de fallo/anular/prueba de esa zona).

    2. **Segunda pulsación** → zona pasa a **modo desconexión** (se activa el indicador
    de anular y el indicador de fallo/anular/prueba correspondiente).


    > ⚠️ **Importante:** La llave de bloqueo de teclado (G) debe estar en posición
    **abierta** para que las pulsaciones tengan efecto [F1].


    ---


    ## Limitación importante


    El manual **no describe ningún procedimiento para desactivar un detector individual**
    sin afectar al resto de la zona. La CCD-103 gestiona la desconexión a nivel de
    zona completa [F1].


    La arquitectura de conexionado es **serie convencional**: los detectores van conectados
    en cadena dentro de la zona, con una resistencia de final de línea de **4K7 Ω**
    al final [F9][F12]. No existe mecanismo de direccionamiento individual por detector.


    Si necesitas aislar un detector concreto sin desconectar toda la zona, deberás
    actuar **físicamente en el cableado** (extracción del detector de su base). El
    manual no especifica el procedimiento para esta operación.


    ---


    Fuente: CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    ---


