    \ a la **ZXe**. Te doy la información disponible de los modelos más próximos,\
    \ pero verifica que coincide con tu equipo.\n\n---\n\n### Principio de funcionamiento\
    \ del circuito\n\n- La supervisión se realiza con **corriente inversa** que lee\
    \ la resistencia final de línea [F3]\n- En reposo: el circuito se polariza en\
    \ **inverso** para supervisar la línea [F4]\n- En alarma: la polarización cambia\
    \ a **normal**, permitiendo el disparo de las sirenas [F4]\n- Corriente máxima\
    \ por circuito: **1 A** [F3]\n\n---\n\n### Requisitos de las sirenas\n\n- **Solo\
    \ sirenas polarizadas con diodo integrado**, para impedir consumo en polarización\
    \ inversa (supervisión) [F4]\n- Si conectas dispositivos **no polarizados** (campanas\
    \ sin polaridad), debes instalar un **diodo de polarización y protección** en\
    \ cada uno [F4] [F3]\n- Las sirenas sin polaridad (baja impedancia) pueden causar\
    \ falsa avería por cortocircuito en la línea si no se instala el diodo [F1]\n\n\
    ---\n\n### Pasos de conexionado\n\n1. **Identifica los terminales de sirena en\
    \ la placa:**\n   - En la **ZX2e**: terminales etiquetados **A+ A- B+ B-** en\
    \ el bloque **SOUNDERS** [F4]\n   - En la **ZX5e**: terminales **A- A+ B- B+ C-\
