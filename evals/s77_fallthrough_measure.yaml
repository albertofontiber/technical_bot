  - CAD-150-8
  - CAD-150-8
  - CAD-150-8
  - CAD-150-8
  answer: "# CAD-150-8: Alta de detector nuevo y prueba funcional\n\n## PARTE 1 — Alta de un detector\
    \ nuevo en el lazo\n\nLos fragmentos disponibles **no describen el procedimiento específico de alta/enrolamiento\
    \ de un detector nuevo** en el lazo analógico (asignación de dirección, escaneo de dispositivos, configuración\
    \ desde software, etc.).\n\nLo que sí indica el manual de instalación es que, antes de energizar el\
    \ sistema, debes verificar [F3]:\n\n1. Que el equipo esté instalado correctamente.\n2. Comprobar con\
    \ voltímetro que en los lazos **no existen cortocircuitos ni circuitos abiertos** — verificar continuidad\
    \ de línea.\n3. Verificar las conexiones de salida de la placa base.\n\nPara el procedimiento completo\
    \ de enrolamiento/alta de dispositivos, consulta el manual de instalación completo o el software de\
    \ configuración. El propio manual indica que **\"la configuración básica se recomienda realizar con\
    \ el software de configuración, ya que el proceso será más sencillo y rápido\"** [F3].\n\n---\n\n\
    ## PARTE 2 — Prueba del detector\n\nUna vez instalado el detector, tienes **dos métodos** para probarlo:\n\
    \n### Método A — Prueba desde menú ZONA (recomendado para pruebas sin rearme)\n\n1. Accede al **menú\
    \ ZONA → opción PRUEBA** [F1].\n2. Selecciona el **rango de zonas** a poner en prueba (campo `RANGO:\
    \ [000] a [250]`) [F1].\n3. El sistema preguntará **\"ACTIVAR SIRENAS: [SI/NO]\"** [F1]:\n   - **SI**\
    \ → las sirenas se activarán unos segundos tras la alarma del detector y se silenciarán automáticamente.\n\
    \   - **NO** → la alarma se registra sin activar sirenas.\n4. Provoca el disparo del detector (aerosol,\
    \ calor, etc.).\n5. Verifica que la central registra la alarma.\n6. **Para salir del modo prueba**:\
    \ conecta la zona desde el menú CONECTAR [F1].\n\n> ⚠️ **Importante**: Si en **20 minutos** no se\
    \ produce ningún disparo de alarma, el sistema cancela automáticamente el modo prueba y vuelve a estado\
    \ normal [F1][F2].\n\n> ✅ **Ventaja clave**: En modo prueba, los retardos de sirena quedan **anulados**\
    \ para agilizar la verificación [F1][F2].\n\n### Método B — Prueba de sistema general (puesta en marcha)\n\
    \nDesde el manual de instalación [F4]:\n1. Provoca una **alarma** en el detector.\n2. Verifica que\
    \ se activa el **relé de alarma**.\n3. Verifica que se activan las **salidas de sirena** una vez transcurrido\
    \ el tiempo de retardo programado.\n\n### Mantenimiento periódico (referencia)\n\nEl manual indica\
    \ que **anualmente** se debe poner el equipo en estado de prueba y verificar que todos los detectores\
    \ funcionan según especificaciones del fabricante [F5]. **Mensualmente**, el usuario debe disparar\
    \ un detector o pulsador, probando una zona diferente cada mes [F5].\n\n---\n\n**Fuentes:**\n- `55315008-Manual-Centrales-Analogicas-CAD-150-8-Usuario-ES-FR-GB-IT`\
    \ (sin revisión registrada)\n- `55315013-Manual-Centrales-Analogicas-CAD-150-8-Instalacion-ES-FR-GB-IT`\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **conexionado del lazo analógico**,\
    \ **configuración de zonas desde teclado** o **códigos de acceso y niveles de usuario de la CAD-150-8**."
