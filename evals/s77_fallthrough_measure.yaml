  - CAD-150-8
  - CAD-150-8
  answer: 'La pregunta es **cross-brand**: estás preguntando por compatibilidad entre una central **Detnov
    CAD-150** y un detector **Notifier SDX-751**.


    No tengo documentación del **SDX-751 de Notifier** en mi base, y los fragmentos recuperados de la
    CAD-150 no incluyen ninguna lista de dispositivos compatibles con su lazo analógico — solo cubren
    conexionado de sirenas, puesta en marcha y descripción de componentes físicos [F1][F3][F4][F5].


    Por tanto, **no puedo confirmar ni descartar la compatibilidad** entre ambos equipos. Afirmar cualquier
    cosa en un sentido u otro sería inventar datos que no tengo.


    **Lo que debes hacer:**

    Consulta directamente a **Detnov** (soporte técnico) para que confirmen si el protocolo de lazo de
    la CAD-150 es compatible con el SDX-751. La compatibilidad en lazos analógicos depende del protocolo
    propietario de cada fabricante, y eso debe venir del fabricante de la central.


    ---


    Fuente: 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB IT (sin revisión registrada)'
- qid: cat016
  tipo: catalog-miss
  conducta_esperada: answer
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo y como se prueba que
    funciona?
  model_extraido: CAD-150
  lookup_model_manufacturer: null
  target_models:
  - CAD-150
