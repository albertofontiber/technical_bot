  - ZXAE/ZXEE
  answer: 'El manual de instalación de la **ZXAE/ZXEE** distingue dos tipos de lazos con resistencias
    de fin de línea diferentes:


    ---


    **1. Lazo analógico (detectores y módulos)**


    Los fragmentos disponibles **no especifican una resistencia de fin de línea (RFL) para el lazo analógico**
    [F4][F5]. El lazo analógico opera con comunicación digital a dos hilos y el manual describe la verificación
    de continuidad e impedancia del lazo, pero no menciona una RFL para este circuito.


    ---


    **2. Salidas de sirenas convencionales (ZXAE y ZXEE)**


    - RFL: **6.800 Ω (6K8 ohmios)** [F2][F3]

    - Potencia mínima: **0,5 W** [F2]

    - Se instala entre **+** y **−** de la última sirena del circuito [F2]

    - Si no hay sirenas conectadas, la RFL se coloca directamente en los terminales de salida de la central
    [F2]


    ---


    **3. Lazo periférico RS-485 (ZXAE y ZXEE)**


    - RFL: **150 Ω** [F1]

    - Potencia mínima: **0,5 W** [F1]

    - Se instala en **cada extremo** del lazo cuando se trabaja en configuración de lazo abierto [F1]


    ---


    > ⚠️ Si tu pregunta se refiere específicamente al lazo analógico de detección, el manual no especifica
    una RFL para ese circuito en los fragmentos disponibles. Consulta el manual completo o el soporte
    técnico de Morley-IAS.


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)


    ---


    También puedo ayudarte con: **longitudes máximas de cableado del lazo analógico**, **conexionado de
    sirenas convencionales** o **instalación de aisladores de línea** en la ZXAE/ZXEE.'
