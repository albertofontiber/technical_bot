  answer: 'El detector de llama SharpEye de la familia **40/40** existe en varias variantes según el principio
    de detección. Con los fragmentos disponibles, identifico los siguientes modelos:


    ---


    ## Variantes disponibles de la familia SharpEye 40/40


    - **S40/40R** — Detector de llama **infrarrojo (IR simple)** [F1]

    - **S40/40U / S40/40UB** — Detector de llama **ultravioleta (UV)**, con o sin BIT (prueba incorporada)
    [F3]

    - **S40/40L / S40/40LB / S40/40L4 / S40/40L4B** — Detector de llama **UV/IR** [F5]


    ---


    ## Cómo construir la referencia de pedido (modelo IR — S40/40R)


    El código de modelo se compone de 5 sufijos [F2]:


    - **Configuración de cableado** (posición 1): ver Tabla 1 del manual

    - **Rango de temperatura** (posición 2): **1** = 75 °C / **2** = 85 °C

    - **Entrada de cable** (posición 3): **1** = M25 / **2** = ¾" NPT

    - **Carcasa** (posición 4): **S** = acero inoxidable / **A** = aluminio *(aluminio no disponible en
    versión FM)* [F2]

    - **Homologación** (posición 5): **B** = Inmetro / **F** = FM/CSA / **C** = ATEX/IECEx / **R** = TR-CU
    [F2]


    **Ejemplo de referencia suministrada por defecto por Honeywell Life Safety Iberia** (para el modelo
    UV): `S40/40xx-412AC` [F3], que corresponde a:

    - Cableado opción 4, temperatura 75 °C, entrada ¾" NPT, carcasa aluminio, homologación ATEX/IECEx.


    ---


    ## ¿Qué modelo necesitas exactamente?


    Para afinar la referencia de pedido, necesito que me confirmes:


    1. **Principio de detección requerido**: ¿IR simple (40/40R), UV (40/40U/UB) o UV/IR (40/40L)?

    2. **Homologación necesaria**: ATEX/IECEx, FM/CSA u otra.

    3. **Entrada de cable**: M25 o ¾" NPT.

    4. **Rango de temperatura**: 75 °C o 85 °C.

    5. **Material de carcasa**: acero inoxidable o aluminio.


    Con esos datos puedo darte la referencia completa.


    ---


    Fuente: MNDT724_40-40R (MN-DT-724, 10 octubre 2011, TM 40/40R Rev. 4); guide-40-40r-single-ir-flame-detector-spectrex-en-us-1459812
    (sin revisión registrada); MNDT723_40-40U (MN-DT-723_B); MNDT722_40-40L (MN-DT-722_B, 10 octubre 2011,
    TM 40/40L Rev. 5)'
