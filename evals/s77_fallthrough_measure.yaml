  answer: '## Conexionado de sirenas convencionales en salidas de sirena de la Morley ZXe (ZXAE/ZXEE)


    ### Número de salidas disponibles


    - **ZXAE**: 2 salidas supervisadas para campanas convencionales (Salida A y B) [F2]

    - **ZXEE**: 4 salidas supervisadas para sirenas convencionales (Salida A, B, C y D) [F2]


    ---


    ### Parámetros eléctricos clave


    - **Corriente máxima por circuito**: 1 A [F2]

    - **Resistencia Final de Línea (RFL)**: **6.800 Ω (6K8), 0,5 W mínimo** [F2]

    - **Sección mínima de cable**: **1,5 mm²** [F2]


    ---


    ### Procedimiento de conexionado


    1. **Conecta las sirenas en serie en la línea**, respetando la polaridad (+ y –) de cada sirena con
    polaridad [F1]. Las sirenas se conectan en cadena desde los terminales de salida de la central.


    2. **Instala la RFL (6K8 Ω, 0,5 W mín.) entre + y – al final de la última sirena** de la línea, para
    supervisión de apertura/cierre de línea [F2].


    3. **Si no hay sirenas instaladas** en una salida, conecta la RFL directamente entre + y – en el terminal
    de la central [F2].


    4. **Para campanas sin polaridad**: instala un diodo entre el terminal + y uno de los terminales de
    alimentación de la campana. Esto es obligatorio para evitar consumos durante la supervisión, ya que
    las bobinas de estas campanas no tienen polaridad [F2].


    5. **No realices ramales (derivaciones paralelas)** en la línea de sirenas. La supervisión se realiza
    sobre la línea directa hasta la RFL; los ramales paralelos no quedan supervisados [F1].


    ---


    ### Funcionamiento de la supervisión


    - La supervisión se realiza con una **corriente inversa** que lee la RFL [F2].

    - La tensión de supervisión tiene **polaridad inversa** a la de activación [F2].

    - Al activarse la salida, la corriente circula en sentido normal con la polaridad indicada en los
    terminales [F2].


    ---


    ### Terminales de conexión (ZXEE)


    Según el diagrama de la Figura 15 [F2], los terminales en la ZXEE son:

    - **TB7**: S,A+ / S,A– / S,B+ / S,C+ / S,D+ / S,D–


    Para la ZXAE, los terminales corresponden a las Salidas A y B según la Figura 15 de la ZXAE [F2].


    ---


    > ⚠️ **Advertencia**: Controla el consumo total de la central con todas las sirenas activadas para
    no superar el límite de **1 A por circuito** ni el consumo total del equipo [F2].


    ---


    **Fuente:** Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)


    También puedo ayudarte con: **configuración de zonas de disparo de sirenas**, **conexionado de sirenas
    direccionables en lazo analógico** o **placas de sirenas del lazo periférico (4-Sirena)**.'
