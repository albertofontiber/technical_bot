- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  answer: 'La CCD-103 es una central **convencional** y el manual no describe un procedimiento
    para desactivar un detector **individual** de forma independiente dentro de una
    zona.


    Lo que sí permite el manual es la **desconexión a nivel de zona completa**:


    1. Asegúrate de que la llave de bloqueo de teclado (G) esté en posición **abierta**
    (desbloqueada) [F1].

    2. Pulsa la **tecla de zona (A)** correspondiente una primera vez → la zona entra
    en **modo prueba** [F1].

    3. Pulsa la **tecla de zona (A)** una segunda vez → la zona entra en **modo desconexión**
    [F1].

    4. En ese estado se activa el **indicador de anular** y el **indicador de fallo/anular/prueba**
    de esa zona [F1].


    ---


    **Lo que el manual NO especifica:**


    El manual no describe ningún mecanismo para aislar o desactivar un único detector
    dentro de una zona sin afectar al resto de detectores de esa misma zona. Los fragmentos
    disponibles solo cubren la desconexión por zona completa [F1] y el conexionado
    en serie de detectores con resistencia de final de línea de **4K7** [F3][F4].


    Dado que la arquitectura es convencional con detectores en serie por zona [F3][F4],
    para intervenir sobre un detector individual sin afectar al lazo deberás consultar
    directamente el manual completo de la CCD-103 o el soporte técnico de Detnov.


    ---


    **Fuente:** CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    También puedo ayudarte con: **verificación de avería en zona**, **conexionado
    de la resistencia de final de línea** o **modos de funcionamiento del bloque de
    detección** de la CCD-103.'
