- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov
    CAD-250: como se crea, como se definen las entradas/eventos que la disparan y
    como se asignan las salidas?'
  answer: "# Configuración de una Maniobra (Causa-Efecto) en la CAD-250\n\n> ⚠️ La\
    \ programación de maniobras es una de las funciones más críticas de la configuración\
    \ del sistema. Requiere conocimiento específico del sistema instalado y del plan\
    \ de protección [F6].\n\n---\n\n## CONCEPTO PREVIO\n\nUna maniobra es un conjunto\
    \ de **entradas (eventos)** → **lógica (coincidencias)** → **salidas (acciones)**\
    \ [F1].\n\n- El **evento** es el cambio de estado, no el estado en sí [F3].\n\
    - El número máximo de entradas y salidas configuradas en distintas maniobras es\
    \ **100.000** [F10].\n- El retardo de acción es configurable entre **0 y 600 segundos**\
    \ [F6].\n\n---\n\n## PASO 1 — ACCEDER AL MENÚ DE MANIOBRAS\n\nNavega por el panel:\n\
    \n**MENÚ** → **MANIOBRAS** → **+AÑADIR** (barra de navegación inferior) [F1]\n\
    \n---\n\n## PASO 2 — CREAR LA MANIOBRA Y DEFINIR COINCIDENCIAS\n\nAl pulsar **AÑADIR**\
    \ accedes a la pantalla de edición de la maniobra [F2].\n\nConfigura el campo\
    \ **Coincidencias**: número de eventos que deben cumplirse simultáneamente para\
    \ que la salida se ejecute [F2]:\n\n- **Coincidencias = 1** → lógica **OR**: cualquier\
    \ evento dispara la acción [F2].\n- **Coincidencias = 2** (con 2 eventos) → lógica\
    \ **AND**: todos los eventos deben cumplirse [F2].\n- **Coincidencias = 3** (con\
    \ 4 eventos) → lógica **3 de N**: 3 eventos cualesquiera deben cumplirse [F2].\n\
    \n---\n\n## PASO 3 — AÑADIR EVENTOS (ENTRADAS)\n\n1. Pulsa **AÑADIR** en el margen\
    \ inferior → selecciona **EVENTO** [F3].\n2. Elige el tipo de evento [F3]:\n \
    \  - **ENTIDAD**: cualquier elemento de la jerarquía del sistema.\n   - **CONDICIÓN\
    \ TEMPORAL**: periodo de tiempo durante el que la ecuación de entrada es verdadera.\n\
    3. Si seleccionas **ENTIDAD**, elige el origen [F7]:\n   - **Local** (central\
    \ actual) o **Red** (cualquier central en red) [F3].\n   - Nivel jerárquico: Instalación,\
    \ Panel, Lazo, Área, Zona, Dispositivo, Grupo o Módulo Virtual [F6].\n\n### Parámetros\
    \ del evento a configurar [F6][F7]:\n\n- **Condición (estado):**\n  - *Alarma*:\
    \ uno o más elementos en alarma [F7].\n  - *Avería*: uno o más elementos en avería\
    \ [F7].\n  - *Técnico*: una o más entradas activas [F7].\n\n- **Tipo de dispositivo:**\n\
    \  - Todos / Pulsadores / Detectores / Entradas [F7].\n\n- **Lógico:**\n  - *Normal*:\
    \ la condición es verdadera [F7].\n  - *No (Negado)*: invierte la condición (p.\
    \ ej. \"no hay alarma\") [F7].\n\n- **Repeticiones:** valor entero hasta **9999**;\
    \ número de veces que el evento debe darse en la entidad para que la entrada sea\
    \ válida [F7]. Ejemplo: zona en alarma con 3 repeticiones → condición verdadera\
    \ cuando 3 detectores estén en alarma [F7].\n\n4. Pulsa **GUARDAR** para confirmar\
    \ el evento.\n5. Repite para añadir más eventos si la maniobra lo requiere.\n\n\
    > \U0001F4A1 Desde la versión **1.1.1** es posible seleccionar un elemento de\
    \ salida como condición de entrada; en ese caso, el cambio a condición de avería\
    \ hace verdadera la entrada. Para ello, desmarca la casilla **\"Sólo dispositivos\
    \ de entrada\"** [F5].\n\n---\n\n## PASO 4 — AÑADIR ACCIONES (SALIDAS)\n\n1. Pulsa\
    \ **AÑADIR** en el margen inferior → selecciona **ACCIÓN** [F4].\n2. Configura\
    \ los campos [F4][F6]:\n\n   - **Retraso (s):** tiempo de espera antes de ejecutar\
    \ la acción, de **0 a 600 segundos** [F4].\n   - **Entidad destino:** Panel, Lazo,\
    \ Área, Zona, Dispositivo, Grupo o Módulo Virtual [F4].\n     > Las acciones siempre\
    \ son relativas a la entidad seleccionada [F4].\n     > El sistema **no permite\
    \ mezclar acciones sobre entidades de paneles diferentes** [F10].\n\n   - **Acción:**\
    \ Activar / Desactivar / Habilitar / Deshabilitar / Test / Reiniciar / Pulso [F6].\n\
    \   - **Tipo de elemento:** Todos / Sirenas / Relés / Sirena discontinua [F6].\n\
    \n3. Pulsa **GUARDAR** para confirmar la acción.\n4. Repite para añadir más acciones\
    \ si es necesario.\n\n---\n\n## PASO 5 — VERIFICAR LA MANIOBRA COMPLETA\n\nLa\
    \ pantalla de la maniobra mostrará [F10]:\n- **Cuadro izquierdo (Eventos):** todas\
    \ las entradas configuradas.\n- **Cuadro derecho (Acciones):** todas las salidas\
    \ que se ejecutarán cuando se cumplan las condiciones.\n\nPuedes **editar o borrar**\
    \ cualquier elemento individual seleccionándolo y pulsando **EDITAR** o **BORRAR\
    \ ELEMENTO** [F10].\n\n---\n\n## RESUMEN DEL FLUJO\n\n```\nENTRADAS (Eventos)\
    \          LÓGICA              SALIDAS (Acciones)\n• Entidad/Condición  →   Coincidencias\
    \   →   • Retardo + Entidad\n  - Origen                (OR / AND / N de M)   -\
    \ Acción (Activar...)\n  - Condición                                   - Tipo\
    \ (Sirenas...)\n  - Tipo dispositivo\n  - Lógico (Normal/No)\n  - Repeticiones\n\
    ```\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración MC-380-es-2026-c\
    \ (rev. c, 2026-04-23)\n- CAD-250 Manual de Software de Configuración MS-416-es-2026-b\
    \ (rev. b)\n- Manual de Instalación CAD-250 MI-372-es-2024-e (sin revisión registrada)\n\
    \n---\n\nTambién puedo ayudarte con: **configuración de Grupos**, **Módulos Virtuales**\
    \ o **Condiciones Temporales** en la CAD-250."
