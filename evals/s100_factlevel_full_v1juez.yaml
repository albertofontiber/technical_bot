  question: Necesito un detector de llama SharpEye «40/40» (Spectrex / Notifier) para
    una instalación; ¿qué modelo pido?
  answer: '## Familia SharpEye 40/40 — Modelos disponibles


    La denominación genérica "40/40" engloba **varios modelos distintos** de la serie
    SharpEye (Spectrex / Notifier). Necesito que me indiques qué tipo de detección
    necesitas para darte la referencia exacta.


    Estos son los modelos documentados en mi base:


    - **S40/40R** — Detector de llama infrarrojo simple (Single IR) [F1]

    - **S40/40M** — Detector de llama de múltiple infrarrojo, para llamas de hidrógeno
    e hidrocarburo [F2]

    - **S40/40I** — Detector de llama de triple espectro infrarrojo (IR3) [F3]

    - **S40/40L / LB** — Detector de llama UV/IR (hidrocarburos, gas, hidrógeno, metales)
    [F4]

    - **S40/40L4 / L4B** — Detector de llama UV/IR a 4,5 µm, solo hidrocarburos [F8]

    - **S40/40U / UB** — Detector de llama UV [F5]

    - **40/40UFL** — SharpEye Ultra Fast UV/IR [F10]

    - **40/40UFI** — SharpEye Ultra Fast IR3 [F10]


    Todos los modelos comparten carcasa antideflagrante certificada **ATEX/IECEx**
    con clasificación **EExde IIB+ H2 T5 (75°C)** y homologaciones **FM y CSA** Clase
    I Div. 1 Grupos B, C, D [F1][F2][F4].


    ---


    **Para pedirte el modelo correcto, dime:**


    1. ¿Qué tipo de combustible/fuego necesitas detectar? (hidrocarburos, hidrógeno,
    metales, fuego UV…)

    2. ¿Necesitas función de prueba incorporada (BIT)?

    3. ¿Hay requisito de velocidad de detección ultrarrápida?


    Con esos datos te indico la referencia exacta incluyendo el sufijo de configuración
    (opciones de cableado, rango de temperatura, tipo de entrada de cable, carcasa
    y homologación requerida) [F6][F7][F8].


    ---


    Fuentes: MNDT724_40-40R; MNDT725_40-40M; MNDT721_40-40I; MNDT722_40-40L; MNDT723_40-40U;
    manual-sharpeye-40-40-series-winhost-spectrex-en-us-4845694 (TM777050 Rev. Da,
    octubre 2017) — todos sin revisión de edición española registrada.'
