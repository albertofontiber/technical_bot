- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  answer: "# Notifier PEARL — Capacidad de lazo SLC, aisladores y alta/edición de\
    \ equipos\n\n---\n\n## 1. Capacidad máxima por lazo\n\n- **Máximo 318 equipos\
    \ por lazo analógico**: hasta **159 sensores** + **159 módulos** (protocolo Opal)\
    \ [F1]\n- En protocolo **CLIP**: hasta **99 sensores + 99 módulos** por lazo [F2]\n\
    - En lazos de **protocolo mixto** (Opal + CLIP): el límite de equipos CLIP es\
    \ de **40**; si se supera, la autoconfiguración continúa pero señala fallos [F6]\n\
    - **Límite global del sistema**: máximo **512 sensores y/o pulsadores manuales**\
    \ entre los dos lazos analógicos (requisito EN54-2: 13-7), incluyendo detectores\
    \ de zona convencionales conectados [F1]\n- **Carga máxima por lazo**: **0,75\
    \ A** [F2]\n\n---\n\n## 2. Requisitos de aisladores (EN54-2: 12.5.2)\n\n- **Máximo\
    \ 32 equipos entre aisladores** según EN54-2 [F1]\n- **Equipos SIN aisladores\
    \ internos** (incluidos CLIP y algunos Opal): no colocar más de **20 equipos entre\
    \ aisladores** [F1]\n- **Equipos CON aisladores internos** (usados con base **B501\
    \ AP**): el lazo cumple directamente los requisitos de EN54-2 [F1]\n- La mayoría\
    \ de equipos Opal tienen **aisladores internos FET**; con bases compatibles Opal,\
    \ el aislador se conecta a los terminales **+2 y +4** en el extremo positivo [F1]\n\
    - ⚠️ Para que los aisladores se cierren al aplicar alimentación, la carga entre\
    \ aisladores no debe superar **20 SU** (unidades de carga) [F7]\n\n**Cargas SU\
    \ de equipos CLIP** [F7]:\n- Detector por rayo LPB-700: **6 SU**\n- Sirenas de\
    \ lazo: **3 SU**\n- Módulo ZMX-1: **3 SU**\n- Módulo MMX-10M/CMX10-RM: **10 SU**\n\
    - El resto: **1 SU**\n\n> ⚠️ **NUNCA uses multímetro de alta tensión (tipo Megger)\
    \ en el lazo.** Si hay aisladores instalados, el conductor positivo (+) del lazo\
    \ estará en circuito abierto. Usa solo multímetros de baja tensión [F1].\n\n---\n\
    \n## 3. Alta de equipos: Autoconfiguración\n\nEl método más rápido para dar de\
    \ alta equipos es la **autoconfiguración** desde el nivel de acceso 3 [F3].\n\n\
    ### Acceso al menú de configuración (nivel 3) [F10]\n\n**Método 1 (clave):**\n\
    1. Pulsa la tecla para mostrar la pantalla de introducción de clave nivel 2/3\n\
    2. Selecciona **«Conf/Mant.Ingeniero»** y pulsa ✓\n3. Introduce la clave de nivel\
    \ 3 → pulsa ✓\n4. Pulsa de nuevo para mostrar la pestaña **CONFIG**\n\n**Método\
    \ 2 (llave):**\n1. Gira la llave de acceso 90° en sentido horario\n2. En el menú\
    \ principal selecciona **«5: Pestaña Configuración»** → pulsa ✓\n3. Introduce\
    \ la clave de nivel 3 → pulsa ✓\n\nUna vez dentro: **«1: Editar Configuración»**\
    \ → **«Equipos de lazo»** → **«Autoconfigurar»** [F8]\n\n### Proceso de autoconfiguración\
    \ [F3][F6]\n\n1. Selecciona **«1: Autoconfiguración»**\n2. Elige si aplica a **todos\
    \ los lazos** o a un **lazo específico**\n3. Selecciona el protocolo:\n   - **«1:\
    \ Todos Prot. OPAL/CLIP»** — detecta duplicidades de dirección\n   - **«2: OPAL/CLIP\
    \ (No detecta duplicidad)»** — más rápido, sin comprobación de duplicados\n  \
    \ - **«3: Sólo con protocolo CLIP»** — solo autoconfigura equipos CLIP\n4. Selecciona\
    \ el modo de operación:\n   - **«1: Permite Añadir/Borrar/Cambiar»**\n   - **«2:\
    \ Sólo Añadir Nuevos Equipos»**\n5. El proceso se inicia automáticamente; al finalizar\
    \ se muestran los resultados en pantalla (sensores/módulos por tipo y protocolo)\n\
    6. Usa las teclas **◁/▷** para navegar por los resultados de cada lazo [F6]\n\n\
    > Los resultados también pueden consultarse en cualquier momento desde nivel de\
    \ acceso 2, opción **«Resumen de Equipos»** [F3].\n\n---\n\n## 4. Edición individual\
    \ de equipos\n\nDesde **«Editar Configuración»** → **«Equipos de lazo»** → **«Editar\
    \ equipos»** [F5][F8]\n\nParámetros editables para **sensores** [F4]:\n- Tipo\
    \ de equipo\n- Zona asignada (hasta **255 zonas locales** o **8192 zonas de red**)\n\
    - Número de célula (hasta **255**)\n- Ajuste de nivel de alarma, prealarma y alarma\
    \ horaria\n- Retardo de alarma\n- Retardo de confirmación de coincidencia (hasta\
    \ **240 s / 4 min**)\n- Selección de programación horaria (cambio de sensibilidad)\n\
    - Grupo AWACS (50 grupos, solo sensores CLIP salvo HEAT)\n- Prioridad de interrogación\
    \ (solo CLIP, limitada a **30 equipos**)\n- Acción de parpadeo / color LED (solo\
    \ Opal)\n- Opción de tipo de equipo (VIEW, Optiplex, SMART)\n- Operación solo\
    \ modo térmico L6 (solo SMART y Optiplex)\n- Número de aplicación (solo equipos\
    \ SMART 4)\n- Función LED remoto (solo Opal): «Seguir el equipo» o «Controlada\
    \ por reglas causa-efecto»\n- Ajuste no silenciable para LED remoto (solo Opal)\n\
    \n> \U0001F4A1 La configuración puede realizarse también con el programa **ITS**\
    \ (software de configuración externo), que permite editar y archivar la configuración\
    \ en un ordenador portátil [F3].\n\n---\n\n**Fuente:** Manual de instalación y\
    \ puesta en marcha 997-669-005-3 (sin revisión registrada); Manual de configuración\
    \ de la central 997-671-005-3 (sin revisión registrada)\n\n---\n\nTambién puedo\
    \ ayudarte con: **cálculo de carga de lazo y longitud máxima de cableado**, **configuración\
    \ de zonas y reglas causa-efecto** o **puesta en marcha de la red ID²net** en\
    \ la Pearl."
