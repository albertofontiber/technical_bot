- qid: hp012
  question: ¿Cuántos lazos direccionables soporta la Notifier AM2020/AFP1010 y cuántos
    dispositivos por lazo?
  answer: '## Lazos y dispositivos por lazo — AM2020 / AFP1010


    ### AM2020


    - **Número máximo de lazos:** hasta **10 lazos** [F6]

    - **Dispositivos por lazo:** hasta **99 detectores analógicos** y **99 módulos
    monitores o de control** por lazo [F6]

    - El diagrama de la Figura 12 confirma la numeración de lazos del 1 al 10 con
    tarjetas **LIB-400**, **LIB-200** o **LIB-200A** [F3]

    - Para alojar los 10 lazos con LIB-400 exclusivamente se utiliza un gabinete **CAB-C3**
    [F5]


    ### AFP1010


    - **Número máximo de lazos:** limitado a un máximo de **dos tarjetas LIB-200**,
    lo que supone un total de **396 dispositivos en el sistema** [F1]

    - El gabinete **CAB-A3** con LIB-400 exclusivamente puede alojar un máximo de
    **cuatro lazos** [F3]


    ### Tarjetas de lazo compatibles


    Las tarjetas de interfaz de lazo (LIB) compatibles con ambas centrales son [F4]:

    - **LIB-200**

    - **LIB-200A**

    - **LIB-400**


    ---


    ⚠️ **Nota importante:** El AFP1010 tiene una capacidad significativamente inferior
    al AM2020. Si necesitas más de dos lazos o más de 396 dispositivos en total, debes
    usar la AM2020.


    ---


    Fuentes: Manual MFDT280 (sin revisión registrada); Manual 15088SP (sin revisión
    registrada); Manual MPDT280 (rev. Rev A)


    ---


    También puedo ayudarte con: **tipos de cableado de lazo (Estilo 4 vs Estilo 6)**,
    **funcionamiento en Modo Local de las tarjetas LIB** o **programación de dispositivos
    en la AM2020/AFP1010**.'
