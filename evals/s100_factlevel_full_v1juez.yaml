    \ de rearmar la central [F1].\n\n### Paso 5 — Salir del modo prueba\nPara salir\
    \ del modo prueba, **conecta la zona** desde el menú ZONA → CONECTAR [F1].\n\n\
    > ⚠️ **Tiempo límite**: Si transcurren **20 minutos** desde la activación del\
    \ modo prueba sin que se produzca ningún disparo de alarma, el sistema saldrá\
    \ automáticamente del modo prueba y volverá al estado normal [F1][F2].\n\n---\n\
    \n## Verificación post-prueba (mantenimiento)\nSegún el manual, anualmente se\
    \ debe poner el equipo en estado de prueba y verificar que **todos los detectores\
    \ y pulsadores funcionan de acuerdo con las especificaciones del fabricante**\
    \ [F8].\n\n---\n\nTambién puedo ayudarte con: **conexionado del lazo analógico**,\
