- qid: cat023
  question: En el detector de humos por aspiración Securiton ASD532, ¿qué clases de
    sensibilidad según EN 54-20 ofrece y cómo se configura la monitorización del flujo
    de aire?
  answer: '# ASD532 — Clases EN 54-20 y configuración de monitorización de flujo de
    aire


    ---


    ## Clases de sensibilidad según EN 54-20


    El ASD 532 cumple los requisitos de la norma **EN 54-20** en las tres clases [F7]:


    - **Clase A** — Sensibilidad muy alta

    - **Clase B** — Sensibilidad alta

    - **Clase C** — Sensibilidad normal


    Esto se refleja también en la placa de características del equipo, donde aparece
    marcado como **EN 54-20 A/B/C** [F6].


    ---


    ## Principio de funcionamiento de la monitorización del flujo de aire


    El ASD 532 utiliza el **método de medición calorimétrico** (técnica de medición
    de flujo en masa) [F2]. El sensor de flujo de aire, ubicado en la caja del detector,
    detecta cambios en el conducto de aspiración (rotura de tubo u obstrucción) [F2].


    Durante el **reset inicial** (con el conducto de aspiración intacto), el sistema
    registra y memoriza los valores de flujo como **valores nominales al 100 %**,
    colocándolos en el centro de una ventana de monitorización electrónica [F2].


    Si los valores reales se salen de la ventana de monitorización (±xx %), el ASD
    532 dispara el aviso **«Fallo flujo de aire»** [F2].


    > ⚠️ **Importante:** Para el correcto funcionamiento, es imprescindible registrar
    el flujo de aire específico durante la puesta en funcionamiento. Sin el reset
    inicial, los valores nominales no quedan memorizados [F2].


    ---


    ## Configuración de la monitorización del flujo de aire


    Existen **dos vías de configuración** según si se usa o no el software de cálculo
    [F5]:


    **1. Con software «ASD PipeFlow»:**

    - Calcular el proyecto → introducir resultado en el software de configuración
    **«ASD Config»** → seleccionar posiciones de conmutador **X01, X02 o X03** [F5].


    **2. Sin «ASD PipeFlow» (EasyConfig):**

    - Seleccionar los límites del sistema según el cap. 4.4.4.3 [F5].

    - Si la monitorización del flujo **sí debe cumplir EN 54-20** → usar posiciones
    de conmutador **A11 a C31** [F5].

    - Si la monitorización del flujo **no necesita cumplir EN 54-20** → usar posiciones
    de conmutador **W01 a W44** ⚠️ solo previa consulta con el fabricante [F5].


    ---


    ## Parámetros de la ventana de monitorización (posiciones A11–C31, conformes EN
    54-20)


    Según EN 54-20, debe notificarse como fallo toda variación del flujo de aire superior
    a **±20 %** [F2]:


    - Por debajo del **80 %** → suciedad/obstrucción → fallo [F2]

    - Por encima del **120 %** → rotura de tubo → fallo [F2]

    - Tiempo de retardo estándar conforme EN 54-20: **300 s** [F5]


    ---


    ## Posiciones de conmutador W01–W44 (no homologadas EN 54-20)


    Estas posiciones permiten configurar combinaciones de ventana y tiempo de retardo
    distintas a las normativas [F1]:


    **Clase A (Sensibilidad muy alta):**

    - W01: retardo 10 min / desviación ±20 %

    - W02: retardo 60 min / desviación ±20 %

    - W03: retardo 10 min / desviación ±50 %

    - W04: retardo 60 min / desviación ±50 %


    **Clase B (Sensibilidad alta):**

    - W09: retardo 10 min / desviación ±20 %

    - W10: retardo 60 min / desviación ±20 %

    - W11: retardo 10 min / desviación ±50 %

    - W12: retardo 60 min / desviación ±50 %

    - W17–W20: mismas combinaciones para límite de sistema 2


    **Clase C (Sensibilidad normal):**

    - W25–W28: límite sistema 1 (10/60 min × ±20/±50 %)

    - W33–W36: límite sistema 2 (10/60 min × ±20/±50 %)

    - W41–W44: límite sistema 3 (10/60 min × ±20/±50 %)


    [F1]


    > ⚠️ **Advertencia crítica:** Las posiciones W01–W44 **no están homologadas según
    EN 54-20** para la monitorización del flujo de aire. Solo deben utilizarse previa
    consulta con el fabricante [F2][F4][F5].


    ---


    ## Límites de ajuste a respetar


    - El aumento de los valores de monitorización por encima de **±20 % o 300 s**
    implica incumplimiento de EN 54-20 [F5].

    - El tamaño de ventana **no debería quedar por debajo de ±20 %**. Si se usan ventanas
    más pequeñas, el tiempo de retardo debe aumentarse a un mínimo de **10 min** [F5].

    - Ventanas por debajo de ±20 % con retardo ≤ 300 s aumentan el riesgo de **avisos
    de fallo erróneos** [F5].


    ---


    **Fuente:** ASD532_TD_T140421es_a (sin revisión registrada)


    ---


    También puedo ayudarte con: **selección del sensor de humo SSD 532-1/2/3 según
    clase EN 54-20**, **procedimiento de reset inicial y puesta en funcionamiento**,
    o **conexionado del módulo XLM 35 para integración con SecuriFire**.'
