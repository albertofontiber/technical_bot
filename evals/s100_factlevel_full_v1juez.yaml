  question: Necesito un detector de humos analógico direccionable «751» para una instalación
    Notifier; ¿cuál es el modelo correcto?
  answer: '## Detectores de humo analógicos direccionables «751» de Notifier


    Hay **varios modelos** con sufijo «751» en el catálogo Notifier, y el modelo correcto
    depende del tipo de detección y de la central que uses. Aquí tienes los disponibles
    según los fragmentos:


    ---


    ### Detectores ópticos (fotoeléctricos)


    - **SDX-751** — Sensor óptico de bajo perfil [F7]

    - **SDX-751E** — Detector fotoeléctrico analógico de bajo perfil [F9][F10]

    - **SDX-751TEM** — Sensor combinado óptico + térmico fijo (58°C), multicriterio
    [F2][F9]

    - **FSL-751E** — Sensor de humo láser VIEW [F6]

    - **LPX-751** — Sensor de humo láser VIEW (bajo perfil) [F6]


    ### Detectores iónicos


    - **CPX-751** — Sensor iónico de bajo perfil [F7][F8]

    - **CPX-751E** — Sensor iónico de bajo perfil (versión E) [F4][F6][F9][F10]


    ### Detectores multicriterio


    - **IRX-751TEM** — Sensor multicriterio SMART 3 [F6]

    - **IRX-751CTEM** — Sensor multicriterio SMART 4 [F6]

    - **IPX-751** — Combinación fotoeléctrico + iónico + térmico [F9]


    ### Detector intrínsecamente seguro


    - **IDX-751** — Sensor óptico analógico para zonas ATEX (requiere traductor **IMX-1**
    y barrera galvánica) [F1][F6]


    ---


    ### ¿Cuál elegir?


    Para una instalación estándar de humos óptico direccionable, los modelos más habituales
    son el **SDX-751E** (solo óptico) o el **SDX-751TEM** (óptico + térmico). Si necesitas
    ionización, el **CPX-751E**. Si el entorno es ATEX, el **IDX-751**.


    > ⚠️ La compatibilidad de cada modelo depende de la central instalada. Por ejemplo,
    la **AFP-400** lista el **CPX-751** [F8], la **AFP4000** el **SDX-751** y **CPX-751**
    [F7], y las centrales **ID50/60** y **AM-6000/AM-2000** incluyen el **SDX-751TEM**,
    **SDX-751E**, **CPX-751E**, **FSL-751E**, etc. [F6][F9][F10]. Verifica siempre
    la lista de compatibles de tu central.


    ---


    **¿Qué central tienes instalada?** Con ese dato puedo confirmarte qué modelos
    «751» son compatibles y cuál se ajusta mejor a tu aplicación.


