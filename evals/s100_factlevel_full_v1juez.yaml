- qid: cat012
  question: ¿Cómo se calcula la capacidad de batería (en Ah) necesaria para la central
    AM-8200?
  answer: '# Cálculo de capacidad de batería — AM-8200


    El manual proporciona un procedimiento estructurado en pasos usando las **Tabla
    1** (para AM-8200) y **Tabla 2** (para AM-8200BB) [F9][F10]. Aquí tienes el método
    completo:


    ---


    ## Paso 1 — Calcular la corriente en reposo (condición NO ALARMA)


    Suma las corrientes de todos los componentes instalados en condición de reposo
    [F9]:


    - **AM-8200 CPU (AM8200-KLCD):** 179 mA [F9]

    - **LIB-8200** (por cada tarjeta instalada): 50 mA [F9]

    - **AM82-2S2C** (por unidad): 28 mA [F9]

    - **AM82-BST-C** (por unidad): 39 mA [F9]

    - Corriente de lazos (ver Tabla 3 del manual) [F9]

    - Corriente salida usuario: máx. 2 A [F9]

    - Dispositivos LCD-8200, campanas, sirenas, flashes, otros


    → **Total reposo = Σ corrientes × tiempo de espera (24 h o 72 h) = valor A (en
    Ah)** [F9]


    ---


    ## Paso 2 — Calcular la corriente en alarma (condición ALARMA)


    Suma las corrientes de todos los componentes en condición de alarma [F9]:


    - **AM-8200 CPU:** 345 mA [F9]

    - **LIB-8200** (por unidad): 92 mA [F9]

    - **AM82-2S2C** (por unidad): 28 mA [F9]

    - **AM82-BST-C** (por unidad): 39 mA [F9]

    - Corriente de lazos (ver Tabla 3 del manual) [F9]

    - Corriente salida usuario: máx. 2 A [F9]

    - Dispositivos de aviso (sirenas, campanas, flashes, etc.)


    > ⚠️ **Límites a verificar:**

    > - Corriente total de todos los lazos: **< 750 mA** [F1]

    > - Corriente total salida 24 Vcc: **< 2 A** [F1]

    > - Si la absorción total supera **3,5 A**, la corriente en exceso durante alarma
    se extrae de las baterías [F1]


    → **Total alarma = Σ corrientes × 0,5 h = valor B (en Ah)** [F9]


    ---


    ## Paso 3 — Aplicar factor de corrección y obtener Ah necesarios


    La fórmula final es [F9]:


    **Ah Batería = (A + B) × 1,2**


    El factor **1,2** compensa las tolerancias de fabricación de las baterías [F1].


    ---


    ## Paso 4 — Verificar contra los límites de la sección de carga


    La AM-8200 admite [F5]:

    - **Mínimo:** 2 × 12 V / **7 Ah**

    - **Máximo:** 2 × 12 V / **18 Ah**


    Baterías recomendadas (capacidad máxima estándar 17-18 Ah) [F5]:

    - Yuasa **NP18-12B** o **NP7-12BFR** (UL94) — 12 V / 17,2 Ah — 181 × 77 × 167
    mm

    - Fiamm **FG21803** o **FGV21803** (UL94) — 12 V / 18 Ah — 181 × 77 × 167 mm


    ---


    > 📋 **Nota:** La Tabla 3 del manual (corrientes de lazo) es necesaria para completar
    el cálculo. Los fragmentos disponibles la referencian pero no la incluyen — consúltala
    en el manual físico.


    ---


    **Fuente:** AM-8200 Manual de Instalación, Doc. AM-8200-ESP Rev. A.3


    También puedo ayudarte con: **verificación de corriente máxima de lazo**, **conexionado
    de baterías** o **interpretación de fallos de batería (códigos 103/104)** en la
    AM-8200.'
