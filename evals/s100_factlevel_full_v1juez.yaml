- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: '## Acceso al menú de Programación Avanzada — CAD-250


    El menú de configuración avanzada se encuentra dentro de **AJUSTES > AVANZADO**.
    El procedimiento completo es:


    ### Paso 1 — Acceder al nivel de configuración


    1. Desde la **PANTALLA DE REPOSO**, toca el icono del **candado** (🔒) [F6].

    2. Se abrirá la **PANTALLA DE ACCESO** solicitando contraseña [F5].

    3. Introduce la clave de **instalador** (nivel de configuración completo). La
    clave de administrador por defecto es **2222** [F5].


    > ⚠️ El uso indebido del nivel de acceso con privilegios de administrador puede
    provocar un mal funcionamiento de la instalación [F5].


    ---


    ### Paso 2 — Navegar hasta AVANZADO


    Una vez dentro del menú principal, sigue esta ruta:


    **AJUSTES** (Menú principal) **> AVANZADO** (Submenú) [F2]


    En la columna izquierda selecciona **AJUSTES**, y en la columna derecha (submenú)
    selecciona **AVANZADO** [F2].


    ---


    ### Paso 3 — Pestañas disponibles en AVANZADO


    Dentro de este submenú encontrarás **3 pestañas** [F2]:


    - **SISTEMA:** Configura número de cabinas (Paneles: 1 a 4), número de lazos (2,
    4, 6, 8... hasta 32 según cabinas) y si hay cabina con LEDs de zona (0 ó 1) [F2].

    - **OTROS:** Interruptores de puesta en marcha y mantenimiento: Tiempo de inactividad,
    Salto a scroll si incidentes, Saltar a último incidente prioritario si timeout,
    Recordar estado de módulos virtuales, y Salir del modo de test automáticamente
    (configurable entre **1 y 24 horas**) [F3].

    - **REINICIAR:** Devuelve los valores de configuración de panel a valores por
    defecto. **No afecta** a configuración de entidades, lazos, maniobras, grupos,
    módulos virtuales, modos especiales, filtros de red ni registros de eventos [F3].


    > ⚠️ Por razones de seguridad y cumplimiento normativo, por defecto todos los
    interruptores de inactividad, timeout y scroll deben estar **activados (en verde)**
    [F3].


    Para validar cambios en la pestaña SISTEMA, pulsa el botón **"Guardar y Reiniciar"**
    [F2].


    ---


    Fuentes:

    - CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)

    - CAD-250 Manual de Software de Configuración MS-416-es-2026-b (rev. b)

    - Manual de Instalación CAD-250 MI-372-es-2024-e

    - Manual de Usuario CAD-250 MU-376-es-2024-f


    ---


    También puedo ayudarte con: **configuración del número de lazos y paneles**, **gestión
    de usuarios y contraseñas** o **configuración de maniobras** en la CAD-250.'
