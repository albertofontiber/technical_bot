- qid: cat016
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo
    y como se prueba que funciona?
  answer: "# CAD-150-8: Alta de detector nuevo y prueba funcional\n\n## Parte 1: Alta\
    \ de un detector nuevo en el lazo\n\nLos fragmentos disponibles **no describen\
    \ el procedimiento específico de alta/direccionamiento de un detector nuevo**\
    \ en el lazo (asignación de dirección física, configuración de tipo de detector,\
    \ vinculación a zona, etc.).\n\nLo que sí indican los fragmentos es que la configuración\
    \ básica de la central puede realizarse desde el teclado o mediante software de\
    \ configuración, siendo este último el método recomendado por ser más sencillo\
    \ y rápido [F6].\n\n> ⚠️ Para el procedimiento completo de alta de un dispositivo\
    \ en el lazo, consulta el manual de instalación completo (55315013) o el software\
    \ de configuración de Detnov — los fragmentos recuperados no cubren ese procedimiento.\n\
    \n---\n\n## Parte 2: Prueba funcional del detector\n\nUna vez el detector está\
    \ instalado, el procedimiento para probarlo es el siguiente:\n\n### Paso 1 — Acceder\
    \ al menú de usuario\nIntroduce el código de nivel usuario (**1111**) o instalador\
    \ (**2222**) para acceder al menú de navegación [F7].\n\n### Paso 2 — Poner la\
    \ zona en modo PRUEBA\nDesde el menú principal, navega a:\n\n**ZONA → PRUEBA**\
    \ [F1]\n\nSe mostrará la pantalla:\n```\nPRUEBA ZONA\nRANGO  : [000] a [250]\n\
    ACTIVAR SIRENAS: [SI]\n```\n\n### Paso 3 — Configurar el rango y las sirenas\n\
    - Introduce el rango de zonas a probar (puedes poner una sola zona) [F1]\n- Selecciona\
    \ si quieres activar las sirenas durante la prueba:\n  - **SÍ**: las sirenas se\
    \ activarán unos segundos tras la alarma del detector y se silenciarán automáticamente\
    \ [F1]\n  - **NO**: la alarma se registra sin activar sirenas [F1]\n- Pulsa **ACEPTAR**\
    \ para confirmar [F2]\n\n> \U0001F4A1 En modo prueba, cualquier retardo programado\
    \ en las sirenas queda **anulado** para agilizar la prueba [F1]\n\n### Paso 4\
    \ — Activar el detector\nProvoca la alarma en el detector (aerosol de prueba,\
