- qid: cat010
  question: ¿Cómo se alimenta la sirena/avisador intrínsecamente seguro IS-mA1 en
    una zona peligrosa (ATEX) y cuáles son sus parámetros de seguridad intrínseca
    de entrada?
  answer: '# Alimentación e IS del IS-mA1 en zona peligrosa (ATEX)


    ## Clasificación ATEX y zonas de uso


    El IS-mA1 está certificado como [F1]:

    - **Ex ia IIC T4 Ga**

    - Apto para **zonas 0, 1 y 2** con gases y vapores inflamables, grupos **IIA,
    IIB e IIC**, clases de temperatura **T1 a T4**

    - Rango de temperatura ambiente: **-40 °C ≤ Ta ≤ +60 °C**

    - Certificado: **SIRA 05ATEX2084X** (sufijo X = condiciones especiales de uso)
    [F1]


    ---


    ## Parámetros de seguridad intrínseca de entrada (Entity Parameters)


    ### Terminales **+ / −** (alimentación principal del avisador) [F3]:

    - **Ui = 28 V**

    - **Ii = 93 mA**

    - **Pi = 660 mW**

    - **Ci = 0**

    - **Li = 0**


    ### Terminales **S2 y S3** respecto a terminal **−** (cambio de tono/etapa de
    alarma) [F3][F5]:

    - **Ui = 28 V**

    - **Ii = 0 mA** ← corriente de entrada permitida = cero

    - **Ci = 0**

    - **Uo = 16,8 V** (salida interna)

    - **Io = 7,3 mA**

    - **Po = 31 mW**


    > ⚠️ **IMPORTANTE:** Como la corriente permitida en S2/S3 es **0 mA**, estos terminales
    **solo pueden conectarse** a [F5][F6]:

    > - Barrera de diodo de retorno (diode return barrier) con caída de tensión **<
    0,9 V**

    > - Relé intrínsecamente seguro

    > - Aislador galvánico

    > — Todos ellos deben estar **certificados Ex ia por un Organismo Notificado CE**.

    > — Alternativamente, pueden conectarse directamente a un **interruptor de accionamiento
    mecánico** en la zona peligrosa.


    ---


    ## Aparato asociado requerido (lado seguro)


    ### Opción A — Barreras Zener [F4][F8][F9]


    **Para terminales +/−:**

    - Barrera Zener de diodo shunt, canal único, aprobada FM

    - Parámetros de salida requeridos: **Uo ≤ 28 V / Io ≤ 93 mA / Po ≤ 660 mW**

    - La resistencia entre tierra IS y tierra de protección debe ser **< 1 Ω** [F4]


    **Para terminales S2 y S3:**

    - Barrera de diodo de retorno (Diode Return Barrier): **Uo ≤ 28 V / Io = 0** [F4]


    **Alarma de una sola etapa:** basta con una barrera Zener de canal único en los
    terminales +/− [F8]


    **Alarma multietapa:** se añaden barreras de diodo de retorno para S2 (2.ª etapa)
    y S3 (3.ª etapa) [F7][F9]


    ---


    ### Opción B — Aisladores galvánicos [F10]


    - No requieren conexión a tierra de alta integridad

    - El aislador galvánico debe tener parámetros de salida dentro de los límites
    de los terminales +/− y estar **certificado Ex ia por un Organismo Notificado
    CE**

    - Para multietapa: se usan **relés galvánicamente aislados** con parámetros dentro
    de los límites de S2/S3, también certificados Ex ia [F10]


    ---


    ## Restricción crítica de capacitancia de cable [F3][F4]


    > ⚠️ La **capacitancia total** conectada a los terminales +/− (cable + cualquier
    otra capacitancia) **no debe superar 83 nF**.


    Además, la Ccable y Lcable de los cables hacia S2/− y S3/− deben ser **≤** a los
    del cable de alimentación principal +/− [F3].


    ---


    ## Advertencias adicionales [F1][F3]


    - Carcasa en **plástico ABS** — proteger de sustancias agresivas (ácidos, disolventes)

    - **IP 65** — si se suministra sin prensaestopas, instalar racores metálicos o
    plásticos que garanticen esa protección

    - **Desconectar la alimentación antes de cualquier intervención** para evitar
    ignición

    - La separación entre terminales S2 y S3 es **inferior a 6 mm** — precaución en
    el conexionado

    - La unión (bonding) entre conexiones de conducto **no es automática** y debe
    realizarse como parte de la instalación


