- qid: hp008
  question: ¿Qué detectores de humo analógicos son compatibles con la Notifier ID3000?
  answer: '## Detectores de humo analógicos compatibles con la ID3000


    Según los fragmentos disponibles, los detectores de humo analógicos compatibles
    con la **ID3000** son los siguientes:


    ### Detectores ópticos (humo por dispersión de luz)

    - **SDX-751EM** — Óptico [F1][F2]

    - **SDX-751** — Óptico [F2]

    - **SDX-551E** — Óptico [F2]

    - **SDX-551THE** — Óptico [F2]


    ### Detectores combinados humo/temperatura (multicriterio)

    - **SDX-751TEM** — Optiplex (combinado térmico/humo) [F1][F2]

    - **IRX-751TEM** — SMART 3 (multicriterio) [F2]

    - **IRX-751CTEM** — SMART 4 (óptico/térmico/infrarrojo/CO) [F2][F7]


