- qid: hp003
  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  answer: "## Conexión de baterías en la CAD-150-8\n\n### Especificaciones de las\
    \ baterías\n\nLas centrales analógicas CAD-150-8 requieren **dos baterías de 12V\
    \ 7A/h** [F4]. Las baterías deben conectarse **en serie** para obtener los 24V\
    \ de funcionamiento [F4].\n\n---\n\n### Procedimiento de conexión\n\n1. **Coloca\
    \ las baterías** en la parte inferior de la caja, en el espacio reservado para\
    \ ello, de forma vertical [F4].\n\n2. **Conecta el cable puente** (suministrado\
    \ con la central) uniendo el **polo positivo (+) de una batería con el polo negativo\
    \ (-) de la otra**, conectándolas así en serie [F4].\n\n3. **Conecta los cables\
    \ del circuito** al conjunto de baterías:\n   - Cable **rojo** → polo **positivo\
    \ (+)** [F1]\n   - Cable **negro** → polo **negativo (-)** [F1]\n\n4. El conector\
    \ de batería en la placa base está identificado como **Conector Batería (posición\
    \ 11)**, protegido por el **Fusible Baterías (posición 10)** [F2][F3].\n\n---\n\
    \n### ⚠️ Orden de conexión obligatorio\n\nEl orden de conexión es **crítico**\
    \ para evitar daños en el equipo [F6]:\n\n- **Primero:** conectar la alimentación\
    \ de red (230VAC) activando el magnetotérmico bipolar [F4][F6]\n- **Segundo:**\
    \ conectar las baterías [F4][F6]\n\n> **Nunca conectes las baterías antes que\
    \ la red.** Si no se respeta este orden, el equipo podría sufrir daños [F6].\n\
    \n---\n\n### Verificación previa a la puesta en marcha\n\nAntes de energizar,\
    \ comprueba que las baterías tienen una tensión **superior a 24V** [F5].\n\n---\n\
    \nFuente: 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB\
    \ IT (sin revisión registrada)"
