- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  answer: '# RP1r — Sistema no vuelve a estado normal tras resetear después de extinción


    Este es un escenario con varias causas posibles según los fragmentos disponibles.
    Comprueba en este orden:


    ---


    ## 1. Función de inhibición de rearme tras extinción (parámetro `ri`)


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2** [F2], tras una extinción
    realizada el sistema entra en **estado inhibido** para evitar reiniciar el proceso
    de extinción. Esto es comportamiento normal y esperado.


    El parámetro **`ri`** controla este comportamiento [F2]:

    - **`00`**: Resumen inhibido desde finalizar extinción (valor por defecto)

    - **`01` a `30`**: Resumen inhibido durante X minutos tras finalizar extinción
    o intervención/reposición


    **Acción:** Verifica el valor configurado en el parámetro `ri`. Si está en `00`,
    el sistema permanecerá inhibido hasta que se realice una intervención manual.
    Si está en `01`–`30`, espera a que transcurra el tiempo configurado antes de intentar
    el rearme.


    ---


    ## 2. Inhibición de la función Rearme tras activación (SW1-6)


    Según **EN12094:1 Sección 4.12.2** [F3][F4][F5], la función de rearme puede estar
    **inhibida temporalmente** una vez iniciado el modo de activación.


    Para habilitar el rearme en este caso [F5]:

    1. Sitúa el microinterruptor **SW1-6 en posición ON**

    2. La pantalla de 7 segmentos mostrará **`S1`** (confirma cambio en SW1)

    3. Coloca un puente en la posición **PROG** (parte inferior izquierda de la placa
    base)

    4. Pulsa la tecla **Rearme**

    5. El **led número 6 se iluminará en rojo fijo** como confirmación


    ---


    ## 3. Averías enclavadas pendientes de resolver


    Todas las averías son **por defecto enclavadas y requieren rearme manual** [F9].
    Si existe alguna condición de avería activa (circuito de extinción, sirenas, zonas,
    pulsador de paro, etc.), el sistema no volverá a estado normal hasta que:


    - Se resuelva la causa de la avería

    - Se realice el rearme desde **nivel de acceso 2** pulsando la tecla **Rearme**
    [F9]


    **Excepción importante:** El circuito de **pulsador de paro (ABORT SWITCH)** siempre
    requiere rearme manual y **no admite rearme automático** [F10]. Comprueba si el
    led **"Cto. Supervisión Paro"** está activo.


    ---


    ## 4. Fallo de sistema al arranque


    Si aparece el indicador **"Fallo Sistema"**, la central no realizará el proceso
    de extinción al considerar que no está funcionando correctamente [F6]. En este
    caso:


    - **Rearma la central** — si el fallo fue transitorio (perturbación en tensiones
    al arrancar), el rearme lo elimina [F6]

    - Si persiste tras el rearme, revisa la alimentación principal y baterías


    ---


    ## Resumen de comprobaciones


    - **Parámetro `ri`**: ¿cuánto tiempo de inhibición está configurado? [F2]

    - **SW1-6**: ¿está en ON para permitir el rearme post-activación? [F5]

    - **LEDs de avería activos**: ¿hay algún circuito en fallo (especialmente pulsador
    de paro)? [F10]

    - **LED "Fallo Sistema"**: ¿está activo? → rearmar [F6]

    - **Nivel de acceso**: el rearme requiere **nivel de acceso 2** [F9]


    ---


    **Fuentes:** HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr (sin revisión registrada);
    MN-DT-102I (sin revisión registrada); MIEMN570 rev. Rev 008; MIEMN570I rev. Rev
    008; HLSI-BT-001 (sin revisión registrada); HLSI-MN-103_RP1r-Supra_lr (sin revisión
    registrada)


    ---


    También puedo ayudarte con: **configuración del parámetro `ri`**, **procedimiento
    completo de niveles de acceso** o **diagnóstico de LEDs de avería activos** en
    la RP1r.'
