- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura a través de las **reglas
    de causa-efecto** (Apéndice 5) [F1], accesibles desde el menú de configuración
    de nivel 3 [F7].


    ---


    ### Paso 1 — Acceder al menú de Causa-Efecto


    Desde el menú principal de configuración (nivel de acceso 3) [F8]:


    1. Selecciona **«1: Editar Configuración»**

    2. Selecciona **«8: Causa y Efecto»** [F8]


    ---


    ### Paso 2 — Configurar el retardo en la regla de causa-efecto


    Dentro de la regla correspondiente a la salida de alarma principal, se asigna
    el **tipo de retardo de salida** [F1]. Hay **seis tipos disponibles** [F1]:


    - **Fijo**: el retardo no puede ser detenido ni ampliado por el usuario [F2]

    - **Estándar**: la salida se detiene si se pulsa SILENCIAR SIRENAS; el retardo
    puede anularse (nivel 2) y detenerse con FIN RETARDO [F2]

    - **No Silenc.**: no se detiene con SILENCIAR SIRENAS, pero sí puede anularse
    y detenerse con FIN RETARDO [F2]

    - **Est. Ext.**: igual que Estándar, y además la salida se detiene si se pulsa
    AMPLIAR RETARDO [F2]

    - **RetExtStd**: igual que Estándar, y además el temporizador comienza en RETARDO
    AMPLIADO [F2]

    - **No Sil. Ext**: no se detiene con SILENCIAR SIRENAS, pero sí se detiene con
    AMPLIAR RETARDO [F2]

    - **SinRetExt**: el temporizador comienza en RETARDO AMPLIADO, sin otras opciones
    de parada [F2]


    ---


    ### Paso 3 — Comportamiento durante el retardo activo


    Según el tipo seleccionado, el usuario dispone de las siguientes acciones [F2]:


    - **SILENCIAR SIRENAS**: detiene la salida solo en tipos Estándar, Est.Ext. y
    RetExtStd

    - **AMPLIAR RETARDO**: detiene la salida en Est.Ext. y No Sil.Ext; inicia temporizador
    ampliado en RetExtStd y SinRetExt

    - **FIN RETARDO** (nivel de acceso 1): finaliza cualquier retardo activo (excepto
    tipo Fijo) [F4]

    - **Anular retardos** (nivel de acceso 2): disponible en todos los tipos excepto
    Fijo [F2]

    - El tiempo restante se muestra en la **pestaña ALARMA** en todos los tipos excepto
    Fijo [F2]


    ---


    ### Paso 4 — Verificar habilitación del pulsador AMPLIAR RETARDO


    Comprueba que el parámetro **«10: Extend Delay Button»** esté en **Enabled** en
    el menú «Editar Parámetros de la Central» [F5], ya que puede desactivarse si no
    se requiere en el mercado de instalación.


    ---


    ### Paso 5 — Anular/Habilitar retardos en operación


    Si necesitas activar o desactivar los retardos configurados sin reprogramar, desde
    el **Menú Anular/Habilitar** (nivel de acceso 2) [F3]:


    1. Selecciona **«5: Retardo Activación Salidas»**

    2. Pulsa **✓** para cambiar entre estado HABILITADO / ANULADO

    3. Pulsa **✕** para salir [F3]


    ---


    > ⚠️ **Nota**: El uso de retardos puede afectar al cumplimiento de la norma **EN54-2**,
    párrafos **7.4.2, 7.4.3** (condiciones de incendio) y **8.6.3** (condiciones de
    fallo) [F8].


    ---


    **Fuente:** Manual de configuración de la central PEARL 997-671-005-3 (sin revisión
    registrada); Manual de funcionamiento PEARL 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **programación de reglas de causa-efecto paso a paso**,
    **configuración de coincidencia de zona** o **gestión de niveles de acceso de
    usuario** en la PEARL.'
