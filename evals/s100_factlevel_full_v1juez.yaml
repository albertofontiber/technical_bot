- qid: cat009
  question: ¿Qué resistencia de fin de línea (EOL) hay que instalar en las líneas
    de zona de la central convencional NFS Supra?
  answer: "# Resistencia de Fin de Línea (EOL) — NFS Supra\n\nLa central **NFS Supra**\
    \ admite **dos modos de supervisión de líneas de zona**, y el equipo final de\
    \ línea (EFL) depende del modo configurado:\n\n---\n\n## Modo por defecto: **Capacitivo\
    \ (EFL)**\n\n- **Condensador de 47 µF** instalado entre positivo y negativo de\
    \ la línea, en el último equipo [F3].\n- Este es el modo de fábrica [F1].\n\n\
    ## Modo alternativo: **Resistivo (RFL)**\n\n- **Resistencia de 6K8 Ω** instalada\
    \ entre positivo y negativo de la línea, en el último equipo [F3].\n- En este\
    \ modo, la central admite un rango de resistencia final de línea entre **3 KΩ**\
    \ y **7 KΩ** [F3].\n\n---\n\n## Puntos clave de instalación\n\n- El EFL/RFL debe\
    \ instalarse en **todas las zonas, incluso las no usadas** [F3].\n- Se coloca\
    \ entre positivo y negativo de la línea, **en la salida del último equipo** [F2].\n\
    - El EFL estabiliza la zona a la tensión de reposo de **25 V** (estado normal/reposo)\
    \ [F3].\n\n---\n\n## Cómo cambiar entre modo Capacitivo y Resistivo\n\n1. Pulsa\
    \ simultáneamente **(Tecla TECLADO=ON + Tecla EVACUACIÓN=ON)** para acceder al\
    \ menú de configuración de Final de Línea [F1].\n2. Usa la tecla **REARME** para\
    \ cambiar la opción (requiere **Nivel de acceso 3**) [F1]:\n   - **LED 1 Alarma\
    \ Rojo encendido** → Final de Línea Resistivo **6K8 Ω** [F1].\n   - **LED 2 Anulada\
    \ Ámbar encendido** → Final de Línea Capacitivo **47 µF** (por defecto) [F1].\n\
    \n---\n\n> ⚠️ **Importante:** El consumo máximo total admisible en cada zona para\
    \ detectar avería es de **3 mA** en reposo. Consumos superiores provocarán mal\
    \ funcionamiento [F2].\n\n---\n\nFuente: HLSI-MN-025_NFS Supra (rev. sin revisión\
    \ registrada)\n\nTambién puedo ayudarte con: **conexionado de detectores por zona**,\
    \ **cálculo del número máximo de sensores por zona** o **configuración de las\
    \ salidas de sirena** de la NFS Supra."
