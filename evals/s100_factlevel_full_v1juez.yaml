- qid: cat022
  question: En los detectores de llama Spectrex SharpEye 40/40, ¿qué diferencia hay
    entre el modelo 40/40L y el 40/40L4, y qué significa el sufijo «B» (p. ej. 40/40LB)?
  answer: "## Diferencias entre el 40/40L, el 40/40L4 y el sufijo «B»\n\n### 40/40L\
    \ vs. 40/40L4 — Longitud de onda del sensor IR\n\nAmbos modelos son detectores\
    \ UV/IR, pero difieren en la longitud de onda de trabajo del sensor infrarrojo\
    \ [F1]:\n\n- **S40/40L**: el sensor IR opera entre **2,5 y 3,0 µm**. Detecta:\n\
    \  - Combustibles a base de hidrocarburos y fuegos de gas\n  - Fuegos de hidróxido\
    \ e hidrógeno\n  - Fuegos de metales o materia inorgánica\n\n- **S40/40L4**: el\
    \ sensor IR opera a **4,5 µm**. Detecta **únicamente fuegos de hidrocarburos**.\
    \ No es adecuado para hidrógeno, metales ni materia inorgánica [F1].\n\n> En resumen:\
    \ el **L4** tiene mayor especificidad espectral (4,5 µm) y queda limitado a hidrocarburos,\
    \ mientras que el **L** es más versátil en tipos de fuego.\n\n---\n\n### Sufijo\
    \ «B» — Función BIT incorporada\n\nEl sufijo **«B»** indica que el modelo incluye\
    \ la función de **Prueba Incorporada (BIT)** [F1]:\n\n- **S40/40LB** y **S40/40L4B**:\
    \ incluyen BIT.\n- **S40/40L** y **S40/40L4** (sin «B»): **no** incluyen BIT.\n\
    \nAdicionalmente, el sufijo «B» tiene implicaciones en certificaciones [F2]:\n\
    \n- La certificación **SIL-2 (TÜV)** según **IEC 61508** está disponible **exclusivamente**\
    \ en los modelos **S40/40LB y L4B**.\n- Los modelos sin «B» no tienen certificación\
    \ SIL-2.\n\n---\n\n### Resumen rápido\n\n- **L vs. L4**: longitud de onda IR diferente\
    \ → rango de detección diferente.\n- **Sin B vs. con B**: sin BIT vs. con BIT\
    \ integrado + certificación SIL-2.\n\n---\n\nTambién puedo ayudarte con: **procedimiento\
    \ de prueba BIT manual**, **configuración de sensibilidad del 40/40L4** o **conexionado\
    \ eléctrico y consumos** de estos detectores.\n\nFuente: Manual de usuario. Detector\
    \ S40/40L-LB-L4-L4B — MNDT722_40-40L (rev. sin revisión registrada) — Honeywell\
    \ Life Safety Iberia"
