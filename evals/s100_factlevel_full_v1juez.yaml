- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  answer: '# FAAST LT-200 — Salidas de relé y sirena: especificación completa


    ---


    ## 1. Relés disponibles y su comportamiento


    El FAAST LT-200 dispone de los siguientes relés [F1][F2]:


    **Relé de ALARMA 1 y 2**

    - Se activa cuando se cumple la condición de alarma en el canal correspondiente
    [F1]

    - En la versión Stand-Alone: estado enclavado por defecto; requiere RESET manual
    para desactivar LED y relé [F1]

    - En la versión Loop (conectada a panel): activado y desactivado por el panel;
    **no enclavado** [F3][F4]


    **Relé de PRE-ALARMA 1 y 2** *(solo versión Stand-Alone)*

    - Se activa cuando se cumple la condición de pre-alarma en el canal [F1]

    - Condición por defecto = Nivel 1. Cuando Pre-ALARMA = ALARMA = Nivel 1, la pre-alarma
    responde al **70% del Nivel 1** [F1]


    **Relé de AVERÍA 1 y 2**

    - Se activa ante condición de avería en el canal 1 o 2, o ante una avería común
    [F1][F2]

    - También se activa en **modo servicio** y cuando la unidad está **sin alimentación**
    [F1][F2]

    - Estado de avería **no enclavado** (por defecto) [F1][F2]


    **Salida SIRENA 1 y 2**

    - Se activa cuando el canal está en ALARMA [F1][F2]

    - Sirena 1 → Canal 1 / Sirena 2 → Canal 2 [F1][F2]

    - Condición por defecto: activada en ALARMA [F1][F2]


    ---


    ## 2. Contactos de los relés (terminales de cableado)


    Cada relé dispone de **3 contactos: NC (normalmente cerrado), C (común) y NO (normalmente
    abierto)** [F5][F6]:


    **Versión Stand-Alone** [F6]:

    - Terminales T2 (bornes 5-6-7): NC / C / NO — Relé Alarma CH1

    - Terminales T3 (bornes 8-9-10): NC / C / NO — Relé Alarma CH2

    - Terminales T4 (bornes 11-12-13): NC / C / NO — Relé Avería CH1

    - Terminales T5 (bornes 14-15-16): NC / C / NO — Relé Avería CH2 (AUX)

    - Terminales T9 (bornes 23-24-25): NC / C / NO — Relé Pre-Alarma CH1

    - Terminales T10 (bornes 26-27-28): NC / C / NO — Relé Pre-Alarma CH2


    **Versión Loop** [F5]:

    - Terminales T2 (bornes 5-6-7): NC / C / NO — Relé Alarma CH1

    - Terminales T3 (bornes 8-9-10): NC / C / NO — Relé Alarma CH2

    - Terminales T4 (bornes 11-12-13): NC / C / NO — Relé Avería CH1

    - Terminales T5 (bornes 14-15-16): NC / C / NO — Relé Avería CH2 (AUX)

    - *(Sin relé de Pre-Alarma en esta versión)*


    ---


    ## 3. Comportamiento del relé de avería ante fallo o corte de alimentación


    El relé de avería se activa (condición de avería señalizada) en los siguientes
    casos [F1][F2][F4]:

    - Condición de avería en el canal 1 o 2

    - Avería común del sistema

    - Cuando la unidad está en **modo servicio**

    - Cuando la unidad está **sin alimentación** (desconexión de la alimentación)


    El estado de avería **no está enclavado** — se desactiva automáticamente al resolverse
    la condición [F1][F2].


    ---


    ## 4. Resistencia de fin de línea en salidas de sirena


    Las salidas de sirena llevan una resistencia de fin de línea de **47 kΩ** [F5][F6][F7]:


    - Salida Sirena 1 (terminales T6, bornes 17−/18+): **47 kΩ EOL** [F5][F6]

    - Salida Sirena 2 (terminales T7, bornes 19−/20+): **47 kΩ EOL** [F5][F6]


    ---


    ## 5. Especificación eléctrica de los contactos de relé


    - Corriente máxima en CC: **2 A** a **30 V CC** (carga resistiva) [F1][F4]

    - Corriente máxima en CA: **0,5 A** a **30 V CA** (carga resistiva) [F1][F4]

    - Vida útil mínima: **10⁵ operaciones** [F1][F4]


    > ⚠️ **Advertencia — cargas inductivas:** Las cargas inductivas pueden generar
    sobretensiones de desconexión que dañen los contactos. Se debe instalar un supresor
    de tensión transitoria (p. ej. **1N6284CA**) en paralelo con la carga. Para aplicaciones
    CC sin supervisión, se puede usar un diodo con tensión de ruptura inversa superior
    a diez veces la tensión del circuito [F4].


    ---


    **Fuentes:**

    - I56-6574-005_EN-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6577-006_EN Notifier FAAST LT-200 QIG (sin revisión registrada)

    - I56-6577-006_ES FAAST Notifier LT-200 QIG (sin revisión registrada)

    - I56-6575-005_EN-FAAST-LT-200-Loop-QIG (sin revisión registrada)

    - I56-6575-005_ES FAAST LT-200 Loop QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **conexionado de la alimentación principal y auxiliar**,
    **configuración de la entrada configurable (rearme)** o **uso del aislador de
    lazo** del FAAST LT-200.'
