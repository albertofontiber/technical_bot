- qid: cat018
  question: ¿Como se programa una ecuacion causa-efecto (CBE) en la Notifier AM-8200
    para que un evento active una salida?
  answer: "# Programación de ecuación CBE en AM-8200 para activar una salida\n\n##\
    \ Concepto previo\n\nLas ecuaciones **CBE** (*Control By Event*) permiten activar\
    \ un módulo de salida en función de eventos lógicos (alarmas, averías, pre-alarmas,\
    \ etc.) [F4]. La CBE se programa directamente sobre el punto de salida (módulo\
    \ de salida) [F2].\n\n---\n\n## Procedimiento paso a paso\n\n### 1. Acceder al\
    \ módulo de salida\n\nNavega al menú: **MENU PROGRAMMAZIONE → Punti → Moduli**\
    \ [F2]\n\nSelecciona el módulo de salida que quieres programar usando los controles\
    \ de CPU, LINEA, MOD. y SUB [F2].\n\n### 2. Asignar zona\n\nEn el campo **Zona**,\
    \ asigna el número de zona correspondiente al módulo [F2].\n\n### 3. Editar el\
    \ campo CBE\n\n- Selecciona el campo **CBE** con las teclas flecha **▲▼** [F1]\n\
    - Pulsa la tecla de confirmación **☑** para entrar en edición [F1]\n- Si ya hay\
    \ una ecuación configurada, se mostrará; si no, el campo estará vacío [F1]\n-\
    \ La **longitud máxima de una CBE es de 64 caracteres** [F1]\n\n### 4. Escribir\
    \ la ecuación\n\nUsa el teclado alfanumérico disponible en pantalla. Los operadores\
    \ disponibles son [F1]:\n\n- **OR, AND, NOT, DEL, SDEL, XGRP, TIM, DIS, PRE, FLT,\
    \ TAC, TONE**\n\n### 5. Confirmar\n\nPulsa **Enter** para confirmar la ecuación\
    \ introducida [F1].\n\n---\n\n## Operadores principales y ejemplos\n\n**OR** —\
    \ Se activa la salida si AL MENOS UN operando está activo [F5]:\n- Ejemplo: `OR\
    \ (G9 G15 G23)` → si cualquiera de los grupos G9, G15 o G23 está en alarma, se\
    \ activa la salida\n- También válido omitiendo OR: `(G9 G15 G23)` [F5]\n\n**AND**\
    \ — Se activa la salida solo si TODOS los operandos están activos [F5]:\n- Ejemplo:\
    \ `AND (G9 G15 G23)` → solo si los tres grupos están en alarma simultáneamente\n\
    \n**NOT** — NIEGA el operando; la salida está activa mientras el operando NO esté\
    \ en alarma [F5]:\n- Ejemplo: `NOT (G23)` → la salida se desactiva cuando G23\
    \ entra en alarma\n\n**XGRP** — Se activa si AL MENOS DOS elementos del grupo\
    \ indicado están activos [F6]:\n- Ejemplo: `XGRP (G23)`\n- ⚠️ No se permite usar\
    \ más de un grupo: `XGRP (G23 G24)` **no está permitido** [F6]\n\n**DEL** — Permite\
    \ programar retardos de activación [F9]:\n- Formato: `DEL (MM.SS (retardo) MM.SS\
    \ (duración - opcional) (CONDICIÓN))`\n- Ejemplo: `DEL (00.30 01.30 (G21))` →\
    \ activa la salida 30 seg. después de que G21 esté en alarma, permanece activa\
    \ 1 min 30 seg.\n- ⚠️ Solo puede haber **un operador DEL por ecuación** [F9]\n\
    - ⚠️ Tiempo máximo de retardo y duración: **10 minutos** [F9]\n\n**PRE** — Utiliza\
    \ el estado de pre-alarma de un sensor [F7]:\n- Ejemplo: `OR (PRE (C1L1S2) PRE\
    \ (C2L1S10))` → activa la salida si cualquiera de los dos sensores está en pre-alarma\n\
    \n**FLT** — Utiliza el estado de avería de un dispositivo o zona [F8]:\n- Ejemplo:\
    \ `OR (FLT (Z1) FLT (Z2))` → activa la salida si cualquiera de las dos zonas está\
    \ en avería\n\n---\n\n## Reglas importantes\n\n- Si el módulo de salida tiene\
    \ un **TIPO ID para señalizaciones generales**, la central **no permite programar\
    \ una ecuación CBE** sobre él [F5]\n- Para grupos directos: no se puede escribir\
    \ una CBE donde los operandos tengan índice **menor** que el grupo destino [F5]\n\
    \  - ❌ `G33 = (G23 G24)` → no permitido\n  - ✅ `G21 = (G23 G24)` → permitido\n\
    - Para grupos inversos: no se puede escribir una CBE donde los operandos tengan\
    \ índice **mayor** que el grupo destino [F5]\n  - ❌ `G305 = (G306 G307)` → no\
    \ permitido\n  - ✅ `G307 = (G305 G306)` → permitido\n\n---\n\n## Ejemplo práctico\
    \ completo\n\nActivar el módulo de salida **L01M01** si cualquiera de los grupos\
    \ G1 a G16 está en alarma [F10]:\n\n```\nG301 = OR (G1 G2 G3 G4 G5 G6 G7 G8)\n\
    G302 = OR (G9 G10 G11 G12 G13 G14 G15 G16)\nL01M01 CBE = OR (G301 G302)\n```\n\
    \n> \U0001F4D6 Para información completa sobre CBE, el manual remite al **Apéndice\
    \ «A» Control By Event** al final del manual [F1].\n\n---\n\n**Fuente:** AM-8200\
    \ Manual de programación — Doc. M-162.1-AM8200-ESP Rev A.3, Honeywell Life Safety\
    \ Iberia\n\n---\n\nTambién puedo ayudarte con: **operadores TAC y TONE**, **programación\
    \ de grupos lógicos (G)** o **configuración de retardos DEL** en la AM-8200."
