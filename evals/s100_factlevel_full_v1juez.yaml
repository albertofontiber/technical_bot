- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  answer: "## Alarma de flujo bajo en ASD535 — Diagnóstico\n\n### Causa más probable\n\
    \nUn valor de flujo **por debajo del 80 %** del valor nominal (100 %) indica **obstrucción\
    \ en el conducto de aspiración** [F2]. El ASD535 dispara el aviso «fallo flujo\
    \ de aire» una vez transcurrido el tiempo de retardo de **300 s** de la LS-Ü [F1][F2].\n\
    \nEl código de evento asociado es el **código 001: Obstrucción, conducto de aspiración**\
    \ [F4].\n\n---\n\n### Procedimiento de diagnóstico paso a paso\n\n**1. Leer el\
    \ valor de flujo actual**\n- Coloca el conmutador en posición **V** para leer\
    \ el valor de flujo del conducto de aspiración [F7].\n- Compara con el valor registrado\
    \ en el protocolo de puesta en funcionamiento [F7].\n- Si el valor está **por\
    \ debajo del 90 %** (con sensibilidad LS-Ü estándar de ±20 %), ya es señal de\
    \ obstrucción inminente y requiere inspección [F7].\n\n**2. Verificar el código\
    \ de evento**\n- Coloca el conmutador en posición **E** (AMB 35) para leer el\
    \ código de evento y delimitar el patrón de error [F3].\n- Código **001** → obstrucción\
    \ [F4].\n- Código **002** → rotura de tubo (flujo alto, >120 %) [F4].\n- Código\
    \ **004** → parámetros LS-Ü no válidos / sensor fuera de rango [F4].\n- Código\
    \ **008** → sensor de flujo defectuoso o no conectado [F4].\n\n**3. Inspección\
    \ física del conducto de aspiración** (código 001 confirmado)\n- Comprobar si\
    \ los **orificios de aspiración** están obstruidos [F4].\n- Comprobar la **salida\
    \ de aire** del ASD [F4].\n- Inspeccionar y limpiar la **caja de filtro / unidad\
    \ de filtrado** [F4].\n- Inspeccionar y limpiar el **sensor de flujo de aire**\
    \ [F4].\n\n**4. Comprobar la tensión de servicio**\n- Medir en los bornes **1\
    \ (+) y 2 (-)** del AMB 35 [F7]:\n  - Funcionamiento a 12 V-CC → valor nominal\
    \ **12,3 a 13,8 V-CC** [F7].\n  - Funcionamiento a 24 V-CC → valor nominal **21,6\
    \ a 27,6 V-CC** [F7].\n\n---\n\n### ⚠️ Advertencia importante tras la limpieza\n\
    \nSi se realizan trabajos en el conducto de aspiración, **no ejecutes un reset\
    \ inicial hasta tener la seguridad de que el conducto está completamente limpio**\
    \ (incluyendo la instalación de un nuevo elemento de filtro si procede). Un reset\
    \ inicial con orificios obstruidos puede impedir que el ASD535 dispare la alarma\
    \ [F5].\n\n---\n\n**Fuente:** ASD535, Descripción técnica, T 131 192 h es (sin\
    \ revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **procedimiento de\
    \ reset inicial tras la limpieza**, **sustitución del sensor de flujo de aire**\
    \ (cap. 9.4.3) o **comprobación funcional de la monitorización de flujo** mediante\
    \ la prueba de tapado de orificios."
