- qid: hp010
  question: En la Morley DXc, ¿cómo se añade un nuevo detector al lazo tras la puesta
    en marcha inicial?
  answer: "# Añadir un nuevo detector al lazo en la DXc (tras puesta en marcha)\n\n\
    Cuando se conecta un nuevo detector al lazo, la central lo detectará como **\"\
    EQUIPO NUEVO\"** y generará una avería [F2]. El procedimiento para aceptarlo es\
    \ realizar una **Autobúsqueda de equipos**.\n\n---\n\n## Procedimiento paso a\
    \ paso\n\n1. **Accede al Nivel 2** pulsando la tecla `5` (Menú) desde la pantalla\
    \ de estado [F9], e introduce la clave de Nivel 2 (por defecto **1234**) [F9].\n\
    \n2. **Desde el menú de Nivel 2**, selecciona la opción `7: Programacion/Niv3`\
    \ para acceder al nivel de configuración [F9].\n\n3. **Navega hasta el menú de\
    \ Lazos** y pulsa la tecla `2` para seleccionar la función **Autobúsqueda** [F1]:\n\
    \n   ```\n   [Lazo]\n   1:Confg.Equipos    2:Autobusqueda\n   ```\n\n4. **Selecciona\
    \ el número de lazo** donde has conectado el nuevo detector (si la central tiene\
    \ más de un lazo) [F1]:\n\n   ```\n   [Autobusqueda]\n   Sel.Num.Lazo (1-2) :1\n\
    \   ```\n\n5. **Confirma la autobúsqueda** pulsando `⊙` cuando aparezca la pantalla\
    \ de confirmación [F1]:\n\n   ```\n   [Autobusqueda]\n   Lazo: 1  Autobusqueda?\n\
    \   OK:Confirm    ←:Cancel\n   ```\n\n6. **Espera** a que finalice el proceso\
    \ de reconocimiento [F1]:\n\n   ```\n   [Autobusqueda]\n   Lazo: 1 Reconocimiento\
    \ en progreso...\n   ```\n\n7. **Verifica el resultado** en la pantalla de resumen.\
    \ Comprueba que el campo **Nuevos** refleja el detector añadido y que el total\
    \ de equipos y tipos coincide con lo instalado [F1]:\n\n   ```\n   [Lazo]\n  \
    \ Lazo: 1           Total: 13\n   Nuevos:1          Elimin.:0  Cambiad:0\n   ```\n\
    \n8. Pulsa `⊞` para regresar al menú de Lazo [F1].\n\n---\n\n## ⚠️ Aviso importante\n\
    \n> Si en tu instalación el protocolo es seleccionable y has realizado un cambio\
    \ de protocolo, **espera 2 minutos antes de lanzar la autobúsqueda**, ya que la\
    \ central necesita tiempo para rearmar los equipos del lazo [F1].\n\n---\n\n##\
    \ Sobre el cableado del nuevo detector\n\n- Conecta el detector manteniendo la\
    \ **polaridad correcta** (positivo y negativo) [F3].\n- **No puentees los terminales**:\
    \ corta el cable en cada conexión para mantener la supervisión [F4].\n- Si el\
    \ nuevo detector queda entre aisladores de cortocircuito, verifica que no superas\
    \ **32 sensores/pulsadores entre aisladores** [F3].\n\n---\n\n**Fuentes:**\n-\
    \ Eventos/Averias de Equipos en DXc (sin revisión registrada)\n- DXc Manual de\
    \ configuración (sin revisión registrada)\n- DXc Manual de usuario (sin revisión\
    \ registrada)\n\n---\n\nTambién puedo ayudarte con: **configuración de zona/grupo\
    \ del nuevo detector**, **verificación del tipo de equipo reconocido** o **anulación\
    \ temporal del detector durante las pruebas**."
