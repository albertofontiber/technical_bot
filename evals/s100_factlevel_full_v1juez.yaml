  question: ¿Cómo se cambia la batería tampón de la Detnov ADW535 sin perder configuración?
  answer: 'El procedimiento específico de sustitución de la **batería de litio** del
    ADW535 (ubicada en el **Main Board LMB 35** [F2][F6]) **no está descrito en los
    fragmentos recuperados**.


    Lo que sí consta en los fragmentos es:


    - La batería de litio está ubicada en el **LMB 35** [F2][F6], junto al módulo
    de reloj RTC [F2].

    - Antes del primer encendido, debe retirarse la **cinta aislante de la batería
    de litio** [F9].

    - El fallo de reloj (código **G80 / 008**) puede deberse a batería de litio defectuosa
    o a que la cinta aislante no se ha retirado [F8].

    - La configuración del ADW535 se almacena en **EEPROM** y **Flash-PROM** del microprocesador
    del LMB 35 [F2], pero el manual **no especifica** si esa memoria es volátil o
    no durante el cambio de batería, ni si se pierde configuración al sustituirla.

    - Si se sustituye el **LMB 35 completo** (no solo la batería), sí se pierde la
    configuración y es obligatorio realizar un **nuevo reset inicial** y reconfigurar
    los parámetros específicos del proyecto desde **«ADW Heat-Calc»** [F1].


    ---


    **Recomendación:** Consulta directamente el capítulo de mantenimiento del manual
    físico **ADW535_TD_T140358es_e** (sección 9.4 y siguientes) o contacta con el
    soporte técnico de **Detnov/Securiton** para el procedimiento exacto de sustitución
    de la batería de litio sin pérdida de configuración.


    ---


    Fuente: ADW535_TD_T140358es_e (sin revisión registrada)


    ---


    También puedo ayudarte con: **sustitución del LMB 35**, **interpretación de códigos
    de fallo G80** o **procedimiento de reset inicial** del ADW535.'
