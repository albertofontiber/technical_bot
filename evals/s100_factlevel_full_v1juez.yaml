- qid: cat020
  question: En una central Morley DXc instalada en Espana, ¿cual es el nivel de alarma
    y de prealarma por defecto de los detectores, y el maximo configurable?
  answer: '## Niveles de alarma y prealarma en la Morley DXc — Protocolo Morley-IAS


    Los valores dependen del **tipo de detector**. El fragmento distingue dos casos:


    ---


    ### Detectores OPT (ópticos convencionales analógicos)


    Trabajan con **porcentaje directo** (0%–100%):


    - **Prealarma por defecto: 80%** [F1]

    - **Alarma por defecto: 100%** [F1]

    - **Máximo configurable para alarma: 108%** [F1]


    ---


    ### Detectores OTM (óptico-térmicos multicriterio)


    Trabajan con **niveles discretos** (Niv1 a Niv6):


    - **Prealarma por defecto: Nivel 3** [F1][F2]

    - **Alarma por defecto: Nivel 4** [F1][F2]


    Los niveles disponibles y su sensibilidad equivalente son [F2]:


    - Nivel 1 → 3,2% osc./m

    - Nivel 2 → 3,2% a 6,5% osc./m (autoajustado)

    - Nivel 3 → 6,5% osc./m *(prealarma recomendada)*

    - Nivel 4 → 6,5% a 11,5% osc./m (autoajustado) *(alarma recomendada)*

    - Nivel 5 → 11,5% osc./m

    - Nivel 6 → Solo temperatura


    ---


    ### Detectores LSR (láser)


    Trabajan con **niveles discretos** (Niv1 a Niv9):


    - **Prealarma por defecto: Nivel 4** [F1][F2]

    - **Alarma por defecto: Nivel 5** [F1][F2]


    Los niveles disponibles son [F2]:


    - Nivel 1 → 0,06% osc./m

    - Nivel 2 → 0,10% osc./m

    - Nivel 3 → 0,16% osc./m

    - Nivel 4 → 0,32% osc./m *(prealarma recomendada)*

    - Nivel 5 → 0,65% osc./m *(alarma recomendada)*

    - Nivel 6 → 1,64% osc./m

    - Nivel 7 → 3,28% osc./m

    - Nivel 8 → 4,92% osc./m

    - Nivel 9 → 6,5% osc./m


    ---


    ### Restricciones de configuración


    - El **nivel de prealarma no puede ser superior al nivel de alarma** [F3]

    - La central **no permite ajustar niveles que impidan el reconocimiento de alarmas**
    [F3]

    - El ajuste máximo para el nivel de alarma en detectores OPT es **108%** [F1]


    > ⚠️ El manual no especifica el nivel máximo configurable para detectores OTM
    y LSR (en niveles discretos) más allá de los niveles listados en la tabla.


    ---


    **Fuente:** DXc_Manual variaciones de mercado (sin revisión registrada); DXc_Manual
    de configuración (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento paso a paso para modificar los niveles
    desde el menú**, **configuración de modos horarios con sensibilidad variable**
    o **diferencias de comportamiento entre OTM y LSR en prealarma**.'
