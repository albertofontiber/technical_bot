- qid: hp006
  question: La Notifier AFP-400 muestra el aviso 'Tierra' (Earth Fault). ¿Qué significa
    y cómo se localiza?
  answer: "## Fallo de Tierra (Earth Fault) en la AFP-400\n\n### ¿Qué significa?\n\
    \nUn fallo de tierra indica que existe una conexión no intencionada entre algún\
    \ conductor del sistema (lazo SLC, NAC, alimentación DC) y la tierra física. En\
    \ el SLC, independientemente del estilo de cableado (Estilo 4, 6 o 7), una falla\
    \ de tierra genera condición de **Alarma/Problema** [F10].\n\nEl sistema entrará\
    \ en modo **Avería**: el LED amarillo de *Avería del Sistema* parpadeará, sonará\
    \ el piezo interno y se mostrará un mensaje en la pantalla LCD [F3].\n\n---\n\n\
    ### Indicadores físicos asociados\n\nLa placa **MPS-400** dispone de un **LED\
    \ específico de \"Fallo de Tierra\"** (Ground Fault LED) visible en la propia\
    \ placa de alimentación [F4][F5]. Localízalo en la MPS-400 para confirmar visualmente\
    \ que el fallo está activo.\n\n---\n\n### Procedimiento de localización\n\n1.\
    \ **Pulsa `<Aceptar>`** en el panel para silenciar el piezo y cambiar el LED de\
    \ Avería de intermitente a fijo. Anota el mensaje que aparece en la pantalla LCD\
    \ (tipo de equipo, zona, descripción de ubicación) [F3].\n\n2. **Consulta el mensaje\
    \ en pantalla LCD.** El formato del mensaje de avería incluye: tipo de evento,\
    \ tipo de equipo, zona de software asignada, tipo de avería y fecha/hora [F3].\
    \ Esto te orientará hacia el circuito o zona afectada.\n\n3. **Ve a la placa MPS-400**\
    \ y verifica el **LED de Fallo de Tierra** [F4]. Confirma que está encendido.\n\
    \n4. **Comprueba el cableado del lazo SLC:**\n   - La resistencia máxima de lazo\
    \ es **40 Ω** [F8][F9].\n   - Desconecta derivaciones del SLC una a una para aislar\
    \ el tramo con fuga a tierra. Cuando al desconectar una derivación el LED de fallo\
    \ de tierra se apague, habrás localizado el tramo afectado [F9].\n\n5. **Comprueba\
    \ los circuitos NAC (TB7–TB10)** y las salidas de alimentación DC **(TB2)** de\
    \ la MPS-400 por si el fallo está en esos circuitos en lugar del SLC [F4].\n\n\
    6. **Verifica el terminal TB1-3 (Toma de Tierra)** de la MPS-400 para asegurarte\
    \ de que la tierra de protección está correctamente conectada y no hay derivaciones\
    \ indeseadas [F4].\n\n---\n\n### Nota sobre el jumper JP6\n\nLa placa MPS-400\
    \ dispone de un jumper **JP6 \"Ground Fault Disable\"** [F5]. Verifica que no\
    \ esté activado inadvertidamente, ya que deshabilitaría la detección de fallo\
    \ de tierra.\n\n---\n\n> ⚠️ **Precaución:** Antes de intervenir en la MPS-400,\
    \ desconecta todas las entradas de alimentación (AC y baterías). El panel y sus\
    \ equipos pueden dañarse si se manipulan con tensión presente [F5].\n\n---\n\n\
    **Fuentes:**\n- MFDT170 — AFP-400 Manual de Usuario (sin revisión registrada)\n\
    - MIDT170 — AFP-400 Manual de Instalación (sin revisión registrada)\n- 50253SP\
    \ — AFP-300/AFP-400 Installation (sin revisión registrada)\n\n---\n\nTambién puedo\
    \ ayudarte con: **rearme del sistema tras eliminar el fallo**, **verificación\
    \ del cableado del lazo SLC** o **interpretación de mensajes de avería en pantalla\
    \ LCD** de la AFP-400."
