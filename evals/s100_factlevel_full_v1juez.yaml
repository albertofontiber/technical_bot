- qid: cat005
  question: ¿Cuáles son las características técnicas de la central de detección de
    gas Fidegas CS4, y en qué se diferencian las versiones digital y analógica?
  answer: "# Central de Detección de Gas FIDEGAS® CS4 — Características Técnicas\n\
    \n## Especificaciones generales\n\n- **Tensión de alimentación:** 110-230 Vac,\
    \ 50-60 Hz [F2]\n- **Potencia:** 30 W [F2]\n- **Clase de aislamiento:** Clase\
    \ II [F3][F7]\n- **Número de sensores:** hasta 4 conexiones simultáneas [F2]\n\
    - **Salidas:** 2 salidas conmutadas LP (relé apto para 230 Vac) con contactos\
    \ NA-C-NC [F2]\n- **Corriente máxima:** 250 mA [F2]\n- **Rearme:** seleccionable\
    \ manual o automático [F2]\n- **Dimensiones:** 90 x 106 x 58 mm [F2]\n- **Peso:**\
    \ 300 g [F2]\n- **Firmware:** versión 1.2 [F3][F7]\n- **Instalación:** carril\
    \ DIN o armario de superficie [F1]\n\n---\n\n## Indicaciones (LEDs y avisador)\n\
    \n- **LED verde PWR:** alimentación presente (fijo) / corte de red (intermitente)\
    \ [F1]\n- **LED bicolor ON/ALARM** (por sensor): sensor presente (verde) / alarma\
    \ (rojo) [F1]\n- **LED amarillo ERROR** (por sensor): avería del sensor remoto\
    \ [F1]\n- **LED verde OUT1 / OUT2:** salida activa (verde) / desactivada (apagado)\
    \ [F1]\n- **Avisador acústico:** apoyo sonoro a las indicaciones ópticas [F1]\n\
    \n---\n\n## Diferencias entre versión Digital y Analógica\n\n### Tipo de señal\
    \ de entrada\n- **Versión digital:** entradas **0-10/15 V** [F1]\n- **Versión\
    \ analógica:** entradas **4-20 mA** [F1]\n\n### Código de producto\n- **Versión\
    \ digital:** código **3244** [F2]\n- **Versión analógica:** código **3270** [F2]\n\
    \n### Sensores compatibles\n- **Versión analógica:** [F3]\n  - Sensores S/3 gases\
    \ combustibles\n  - Sensores S/3 y S/2 gases tóxicos\n  - Sensores S/10 gases\
    \ tóxicos\n- **Versión digital:** [F3]\n  - Sensores S/10 gases combustibles\n\
    \n---\n\n## Conexionado de sensores\n\nLos conectores de cada sensor tienen la\
    \ siguiente asignación [F4]:\n- **Terminal 1:** positivo de alimentación (12 a\
