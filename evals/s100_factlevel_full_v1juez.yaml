- qid: hp009
  question: ¿Cuál es la resistencia de fin de línea recomendada para los lazos de
    la central Morley ZXe?
  answer: 'La pregunta menciona "lazos de la central Morley ZXe" — necesito aclarar
    a qué tipo de lazo te refieres, ya que la ZXe tiene varios circuitos con resistencias
    de fin de línea distintas:


    **Circuitos de sirenas (salidas de sirenas):**

    La RFL es de **6.800 Ω (6K8), 0,5 W mínimo** [F1][F2][F8]. Debe instalarse entre
    + y − de la última sirena del circuito. Si no hay sirenas conectadas, se coloca
    directamente en los terminales de la central [F1].


    **Lazo periférico RS-485:**

    La RFL es de **150 Ω, 0,5 W mínimo** [F9], colocada entre los terminales A y B
    en cada extremo libre de la cadena.


    **Lazo analógico:**

    Los fragmentos disponibles no especifican una resistencia de fin de línea para
    el lazo analógico. El lazo analógico se instala en **bucle cerrado** [F10], por
    lo que no requiere RFL en sus extremos.


    ---


    ⚠️ **Nota importante sobre ramales en sirenas:** No se deben realizar ramales
    en la conexión de sirenas convencionales, ya que la supervisión no alcanzará los
    ramales paralelos [F2].


    ---


    ¿Sobre qué circuito concreto necesitas más detalle?


    **Fuentes:**

    - Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)

    - Manual de Instalación ZX2e/ZX5e — MIE-MI-530, Revisión 001


    También puedo ayudarte con: **verificación del cableado antes de conexionado**,
    **longitudes máximas de lazo analógico** o **instalación de aisladores de cortocircuito**
    en la ZXe.'
