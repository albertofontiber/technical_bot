- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  answer: '# Programación de coincidencia de 2 detectores en ID3000


    ## Concepto previo importante


    La función de coincidencia **solo se aplica si la entrada de la Matriz de Control
    está definida como ''ZONA'', ''SUBZONA'' o ''CUALQUIER ZONA''**, no si es un equipo
    individual o una tecla [F1].


    ⚠️ **PRECAUCIÓN EN54-2: 7.1.4** — No incluyas pulsadores manuales (MCP/PUL) en
    el grupo de coincidencia [F1][F3].


    ---


    ## Procedimiento de programación


    ### Paso 1 — Crear la instrucción de Matriz de Control


    Accede a la Matriz de Control y crea un nuevo evento de entrada [F3].


    ### Paso 2 — Seleccionar el tipo de entrada


    Cuando el sistema pregunte **"¿Limitado por TIPO?"**, selecciona el tipo de detector
    que corresponda. Por ejemplo [F3]:

    - **Opción 1:** CUALQUIER TIPO DE EQUIPO

    - **Opción 2:** CUALQUIER SENSOR TÉRMICO

    - **Opción 3:** CUALQUIER SENSOR IÓNICO

    - (u otras opciones de la lista según el detector instalado)


    > **Nota:** No puedes usar simultáneamente la coincidencia de zonas y la limitación
    por tipo en la misma entrada de Matriz de Control [F3].


    ### Paso 3 — Seleccionar la zona


    Elige **"Zona(s) Determinada"** e introduce el número de zona donde están los
    detectores [F2].


    ### Paso 4 — Seleccionar el tipo de coincidencia


    Cuando el sistema muestre el menú **"Indique tipo de coincidencia"**, selecciona
    [F3]:


    - **Opción 2: COINCIDENCIA 2 EQUIPOS**


    > Para que se active la coincidencia, los equipos en alarma deben estar en la
    **misma zona o subzona** [F3].


    ### Paso 5 — Definir la salida de sirena


    Asigna la salida de sirena correspondiente a esta instrucción de Matriz de Control.
    La salida solo se activará cuando dos detectores de esa zona estén en alarma simultáneamente.


    ---


    ## Si hay pulsadores manuales en la misma zona


    Debes crear **dos instrucciones separadas** en la Matriz de Control [F1][F3]:


    1. **Primera instrucción:** Entrada de tipo **''Pulsador Manual'' (MCP)** → configurada
    como **''Simple''** (sin coincidencia), apuntando a la misma salida de sirena.

    2. **Segunda instrucción:** Entrada de tipo **''ANALÓGICA''** (o el tipo de detector
    aplicable) → con **coincidencia de 2 equipos**.


    > El grupo ''ANALÓGICO'' incluye detectores TÉRMICOS, IÓNICOS, ÓPTICOS, VIEW y
    MULTISENSOR [F1].


    ---


    ## Verificación del comportamiento en subzonas


    Si la zona está dividida en subzonas, ten en cuenta [F4]:

    - La coincidencia de equipos en subzonas está **limitada a dos equipos** como
    máximo.

    - Por defecto, los dos equipos deben estar en la **misma subzona** [F9].

    - Si necesitas que la coincidencia se extienda a un rango de subzonas, configúralo
    en **Sección 11.21** de la central [F9].


    ---


    **Fuentes:**

    - MCDT190 (sin revisión registrada) — Sección 6.1.5

    - MPDT190 (sin revisión registrada) — Secciones 7 y 11.21

    - MADT190_07 (sin revisión registrada) — Edición Evento de Entrada en la Matriz
    de Control


    ---


    También puedo ayudarte con: **configuración de niveles de coincidencia múltiple
    (3 o más equipos)**, **comportamiento de coincidencia en sistemas de red ID3000**
    o **programación de la salida de sirena en la Matriz de Control**.'
