- qid: hp020
  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE E10/E15


    ---


    ## Consideraciones previas


    - La contraseña debe tener entre **4 y 8 dígitos** [F1][F2].

    - El código de fábrica del Nivel 2 es **"22222222"** — se recomienda cambiarlo
    [F3].

    - Si estás en Nivel 2, solo puedes cambiar la contraseña de **Nivel 2**. Si estás
    en Nivel 3, puedes cambiar la de **Nivel 2 o Nivel 3** [F1].


    ---


    ## Cambio de contraseña de Nivel 2 (desde usuario Nivel 2)


    1. Selecciona el **icono del menú** ① y luego **"Configuración"** ② [F2].

    2. Inicia sesión como usuario de **Nivel de Acceso 2** [F2].

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F2].

    4. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y el cursor parpadee
    ⑤ [F2].

    5. Pulsa el icono del **ojo** ⑥ si quieres visualizar la entrada [F2].

    6. Introduce el nuevo código de **4 a 8 dígitos** con el teclado ⑦ [F2].

    7. Confirma pulsando el símbolo **✓** ⑧ [F2].

    8. Repite los pasos 3 a 7 para confirmar el código [F2].


    ---


    ## Cambio de contraseña de Nivel 2 o Nivel 3 (desde usuario Nivel 3)


    1. Selecciona el **icono del menú** ① y luego **"Ajustes"** ② [F1].

    2. Inicia sesión como usuario de **Nivel de Acceso 3** [F1].

    3. Selecciona **"Cambio del código de acceso"** ③ [F1].

    4. Selecciona el nivel a modificar: **Nivel 2 o Nivel 3** ④, y verifica que el
    cursor parpadea ⑤ [F1].

    5. Pulsa el icono del **ojo** ⑥ para visualizar la entrada si es necesario [F1].

    6. Introduce el nuevo código de **4 a 8 dígitos** con el teclado ⑦ [F1].

    7. Confirma pulsando el símbolo **✓** ⑧ [F1].

    8. Repite los pasos 4 a 7 para confirmar el código [F1].

    9. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1].


    > ⚠️ **Importante:** Tras el cambio, debes **sincronizar el programa con la central**
    y realizar una **copia de seguridad del cambio en la nube** [F1].


    ---


    ## Buenas prácticas de seguridad


    - No uses datos personales como contraseña [F9].

    - Evita contraseñas fácilmente adivinables o frases comunes [F9].

    - Mantén los códigos seguros y accesibles solo a usuarios autorizados [F3].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha INSPIRE E10/E15)

    - HOP-338-9ES issue 4, 01-2026 (Instrucciones de usuario INSPIRE E10/E15)

    - 4188-1122-ES issue 4, 04-2025 (Ciberseguridad INSPIRE)


    ---


    También puedo ayudarte con: **cierre de sesión automático por inactividad**, **sincronización
    de configuración con CLSS** o **lectura/envío de contraseña AL2 desde la herramienta
    CLSS**.'
