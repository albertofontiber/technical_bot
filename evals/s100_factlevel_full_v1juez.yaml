- qid: cat017
  question: ¿Como se cablea y se da de alta (configura) un lazo en la central Notifier
    INSPIRE (E10/E15)?
  answer: "# Cableado y configuración de lazo — INSPIRE E10/E15\n\n---\n\n## PARTE\
    \ 1: CABLEADO DEL LAZO\n\n### Terminales del módulo LAZO OPAL X2\n\nEl módulo\
    \ de doble lazo tiene código de color **morado** (referencia **HOP-433-100**)\
    \ [F3] y sus terminales son [F2][F3]:\n\n**Lazo 1:**\n- Terminal **1** → Lazo\
    \ 1 OUT +VE (Salida +)\n- Terminal **2** → Lazo 1 OUT -VE (Salida -)\n- Terminal\
    \ **3** → ⊕ (**NO USAR** para pantalla de cable)\n- Terminal **4** → Lazo 1 IN\
    \ +VE (Entrada +)\n- Terminal **5** → Lazo 1 IN -VE (Entrada -)\n\n**Lazo 2:**\n\
    - Terminal **6** → Lazo 2 OUT +VE (Salida +)\n- Terminal **7** → Lazo 2 OUT -VE\
    \ (Salida -)\n- Terminal **8** → ⊕ (**NO USAR** para pantalla de cable)\n- Terminal\
    \ **9** → Lazo 2 IN +VE (Entrada +)\n- Terminal **10** → Lazo 2 IN -VE (Entrada\
    \ -)\n\n> ⚠️ **Los terminales 3 y 8 NO se deben usar para conectar la pantalla\
    \ del cable de lazo. La pantalla debe conectarse a la Barra de Tierra de la central.**\
    \ [F2][F3]\n\n> ⚠️ **No se permite mezclar dispositivos OPAL y CLIP en el mismo\
    \ lazo.** [F3]\n\n---\n\n### Topología del lazo\n\nEl lazo se cablea en **bucle\
    \ cerrado** (anillo): la salida de la central llega al primer dispositivo, pasa\
    \ por todos los dispositivos en cadena, y el retorno vuelve a la entrada de la\
    \ central [F1]. Se recomienda conectar solo con **cable de 2 hilos** [F5].\n\n\
    Se recomienda poner a tierra **un extremo** de la pantalla del cable de lazo a\
    \ la barra de tierra de la central [F4].\n\n---\n\n### Capacidad por lazo [F3][F7]\n\
    \n**Protocolo OPAL:**\n- Hasta **159 detectores OPAL** + **159 módulos OPAL**\
    \ por lazo\n- Corriente máxima por lazo: **750 mA**\n\n**Protocolo CLIP** (requiere\
    \ licencia):\n- Hasta **99 detectores CLIP** + **99 módulos CLIP** por lazo\n\n\
    > ⚠️ Según **EN54-2, apartado 13.7**, hay una restricción de **512 detectores\
    \ y/o pulsadores** por módulo de lazo (que comprende 2 circuitos) [F3].\n\n---\n\
    \n### Numeración de lazos [F3]\n\nLos circuitos de lazo se numeran **secuencialmente\
    \ de izquierda a derecha** del portamódulos. El primer módulo instalado en la\
    \ ranura izquierda tiene los lazos 1 y 2; los siguientes módulos continúan la\
    \ numeración. En la E15 (dos filas de portamódulos), la segunda fila continúa\
    \ desde la primera.\n\n---\n\n## PARTE 2: COMPROBACIONES ANTES DE CONECTAR\n\n\
    ### Herramienta recomendada\n\nUsa la herramienta **POL-200-TS** (o **POL-200**)\
    \ para comprobar y medir los circuitos de lazo **antes** de conectar los cables\
    \ a los terminales de la central. La POL-200 funciona con protocolos OPAL y CLIP\
    \ [F4].\n\n> ⚠️ **NUNCA uses un dispositivo de alta tensión (p. ej. comprobador\
    \ de resistencia de aislamiento) en el circuito de lazo.** Solo se permiten comprobadores\
    \ de baja tensión como el multímetro. [F5]\n\n---\n\n### Comprobaciones con multímetro\
    \ [F5][F6]\n\n1. Comprueba la **continuidad** de cada parte del lazo y mide la\
    \ **resistencia de extremo a extremo**.\n2. Comprueba la **continuidad de la pantalla**\
    \ del cable (debe dar un valor de resistencia muy bajo).\n3. Verifica que **no\
    \ hay continuidad** entre la pantalla y los conductores +VE y -VE.\n\n**Resistencias\
    \ máximas admisibles** [F6]:\n- Lazo **OPAL**: resistencia < **40 Ω** para comunicación\
    \ correcta\n- Lazo **CLIP**:\n  - < **40 Ω** para detección de dos dispositivos\n\
    \  - < **71 Ω** si no se necesita detección de dirección duplicada\n- Capacidad\
    \ del cable: inferior a **0,5 µF** [F6]\n\n> ℹ️ Para medir: desconecta físicamente\
    \ el lazo de los terminales de la central, mide entre Lazo X Entrada -VE y Lazo\
    \ X Salida -VE, multiplica el resultado por 2 y añade la resistencia de cada aislador\
    \ (**0,1 a 0,13 Ω** por aislador) [F6].\n\nLa longitud máxima del cable se calcula\
    \ con el **programa de cálculo de lazo y batería de CLSS**, y puede ser de hasta\
    \ **3,5 km** dependiendo del tipo de carga y de cable [F3].\n\n---\n\n## PARTE\
    \ 3: CONFIGURACIÓN (ALTA DEL LAZO)\n\n### Paso previo — Primer encendido\n\nLa\
    \ primera vez, enciende la central **sin cableado externo conectado**, pero con\
    \ la fuente de alimentación y un circuito de lazo probado [F1].\n\n1. Conecta\
    \ el cableado del lazo y el cable HMI de la puerta a la CPU [F1].\n2. Conecta\
    \ la corriente principal y las baterías [F1].\n3. Al arrancar, el **LED verde\
    \ \"Alimentación\"** se encenderá. Si hay averías, se encenderá el **LED de AVERÍA\
    \ amarillo** y sonará el zumbador — pulsa **Silenciar Zumbador/Mute** [F10].\n\
    4. Selecciona **país** e **idioma** [F10].\n5. Ajusta **fecha y hora** (deben\
    \ coincidir con el ordenador portátil para sincronización con CLSS) [F10].\n\n\
    ---\n\n### Configuración del lazo desde CLSS [F8]\n\n> ⚠️ Para lazos CLIP o TC800\
    \ OPAL/CLIP, la central debe configurarse previamente con CLSS antes de hacer\
    \ Auto Configuración. Por defecto, la central solo tiene licencia para **protocolo\
    \ OPAL avanzado** [F8].\n\n1. Conecta la herramienta de configuración CLSS al\
    \ panel.\n2. Ve a **Ajustes → Ajustes HMI** y en **Tipo de marca** selecciona\
    \ **Notifier EN** [F8].\n3. Ve a **Ajustes de lazo**:\n   - Si el lazo **no se\
    \ usa**: marca ☑ **Sin Uso** [F1][F8].\n   - Si el lazo **se usa**: selecciona\
    \ **Limitar a VdS 2540** (Sí/No) — el valor de resistencia cambia según la selección.\
    \ Selecciona el **tipo de cable** [F8].\n4. Envía la configuración a la central\
    \ siguiendo los pasos de **\"Enviar configuración a la central\"** [F8].\n\n---\n\
    \n### Auto Configuración (búsqueda de dispositivos) [F9]\n\n1. Selecciona **Auto\
    \ Configuración** en el panel para buscar dispositivos conectados al lazo.\n2.\
    \ Lee la ventana emergente y confirma seleccionando **Auto Configuración** / **Learn\
    \ Devices**.\n3. Una vez completada, selecciona la flecha **>** junto al botón\
    \ Auto Búsqueda para ver el estado de averías del lazo.\n4. Lee los mensajes de\
    \ avería y rectifica los problemas detectados. Selecciona **Hecho** al completar.\n\
    5. Si se han rectificado averías, **repite los pasos 1 a 4**.\n6. **Repite el\
    \ proceso para cada lazo** hasta descubrir todos los lazos del sistema [F9].\n\
    \n**Causas típicas de averías tras Auto Configuración** [F9]:\n- Discordancia\
    \ entre diseño de instalación y cableado\n- Averías en el cableado\n- Presencia\
    \ de fuente de RFI fuerte\n- Error de módulo o fuente de alimentación\n- Conexionado\
    \ incorrecto en dispositivos\n\n---\n\n**Fuente:** HOP-138-8ES issue 6 (01-2026)\
    \ — Instrucciones de puesta en marcha INSPIRE E10/E15; HOP-138-9ES issue 5 (11-2025)\
    \ — Instalación INSPIRE E10\n\n---\n\nTambién puedo ayudarte con: **comprobación\
    \ de averías de lazo y sus mensajes**, **configuración de zonas y dispositivos\
    \ en CLSS** o **conexionado de módulos de salida y relés** de la INSPIRE E10/E15."
