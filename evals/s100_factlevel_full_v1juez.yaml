- qid: hp014
  question: ¿Cómo se conecta un módulo de aislamiento de línea en un lazo ID2000?
  answer: "# Conexión del módulo de aislamiento de línea en lazo ID2000\n\n## Requisitos\
    \ de instalación (EN54-2)\n\nSegún los fragmentos disponibles, los puntos clave\
    \ sobre los aisladores en el lazo ID2000 son:\n\n- **Máximo 32 equipos** (sensores\
    \ y/o pulsadores manuales) entre aisladores, según **EN54-2: 12.5.2** [F2]\n-\
    \ En la central **ID2000**, el límite es más restrictivo: **no más de 25 equipos\
    \ de lazo entre aisladores** [F2]\n- Si se utilizan **aisladores tipo FET**, el\
    \ límite se reduce a **20 equipos entre aisladores** [F2] [F1]\n\n## Terminales\
    \ del aislador\n\nEl aislador dispone de **4 terminales numerados: 1, 2, 3 y 4**\
    \ [F1].\n\n## Procedimiento de comprobación del cableado antes de conectar\n\n\
    1. **Cortocircuita temporalmente los terminales 2 y 4** de cada aislador para\
    \ desconectarlos del lazo [F1]\n\n   > ⚠️ El cableado del lazo **DEBE estar desconectado\
    \ del panel** mientras realizas este procedimiento [F1]\n\n2. Con los aisladores\
    \ puenteados, comprueba la continuidad de cada extremo del lazo y mide la resistencia\
    \ final de línea [F1]:\n   - **Placa base y LIB** — detección dirección duplicada:\
    \ **< 14,5 Ω** [F1]\n   - **Placa base y LIB** — sin detección dirección duplicada:\
    \ **< 28,5 Ω** [F1]\n   - **Placa base y LIB** (segundo rango): **< 18,5 Ω** con\
    \ duplicada / **< 35,5 Ω** sin duplicada [F1]\n\n3. Con multímetro en **modo prueba\
    \ de diodo**, conecta en **polaridad invertida** (+ al lazo − y − al lazo +).\
    \ Debe indicar la presencia de diodos polarizados en paralelo [F1]\n\n   > ⚠️\
    \ **NUNCA uses multímetro de alta tensión (tipo \"Megger\") en el lazo** [F2]\n\
    \n4. Las comprobaciones de continuidad del lazo deben realizarse **antes de conectar\
    \ los aisladores** [F2]\n\n## Longitud máxima del lazo\n\n- La longitud total\
    \ del par de lazo **no puede exceder los 2000 metros**, y solo con **cable de\
    \ 1,5 mm² de sección o superior** [F1]\n\n## Comportamiento ante cortocircuito\n\
    \nCuando se produce un cortocircuito entre dos aisladores, el sistema lo señaliza\
    \ como **'Posible corte'** (no como cortocircuito directo), ya que los aisladores\
    \ desconectan la sección afectada [F3].\n\n---\n\n**Nota:** Los fragmentos disponibles\
    \ no incluyen el esquema de conexionado interno del aislador (patillaje pin a\
    \ pin con polaridades exactas). Para ese detalle, consulta las instrucciones específicas\
    \ del modelo de aislador que estés instalando.\n\n**Fuente:** Manual de instalación\
    \ y puesta en marcha Panel ID2000 — MI-DT-180, NOTIFIER ESPAÑA (sin revisión registrada);\
    \ Manual de programación Panel ID2000 — MP-DT-180, NOTIFIER ESPAÑA (sin revisión\
    \ registrada)"
