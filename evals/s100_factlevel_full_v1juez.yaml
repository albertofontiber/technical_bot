- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: "# Conexionado de sirenas convencionales en salidas de sirena — Morley ZXe\n\
    \nAntes de responder, una aclaración importante: los fragmentos recuperados corresponden\
    \ a los modelos **ZXAE/ZXEE** [F1][F2] y **ZX2e/ZX5e** [F3][F4]. La denominación\
    \ \"ZXe\" puede referirse a cualquiera de ellos. A continuación te doy la información\
    \ de conexionado que aplica a ambas familias, ya que el principio es el mismo.\n\
    \n---\n\n## Principios generales del circuito [F1]\n\n- Las salidas son **supervisadas**\
    \ y **limitadas en corriente**: máximo **1 A por circuito** [F1].\n- La supervisión\
    \ se realiza con **corriente inversa** (polaridad inversa a la de activación)\
    \ [F1].\n- Al activarse la salida, la corriente circula en sentido normal con\
    \ la polaridad indicada en los terminales [F1].\n\n---\n\n## Pasos de conexionado\n\
    \n**1. Identifica los terminales de sirena en la placa:**\n\n- **ZXAE:** terminales\
    \ de Salida A y Salida B (2 salidas) [F1]\n- **ZXEE:** terminales TB7 → `S,A+`\
    \ `S,A-` `S,B+` `S,B-` `S,C+` `S,C-` `S,D+` `S,D-` (4 salidas) [F1]\n- **ZX2e:**\
    \ bloque `SOUNDERS` con terminales `A+` `A-` `B+` `B-` [F4]\n- **ZX5e:** bloque\
    \ TB7 con terminales `A-` `A+` `B-` `B+` `C-` `C+` `D-` `D+` [F4]\n\n**2. Conecta\
    \ las sirenas en serie (línea directa, sin ramales):**\n\n- Conecta el `+` de\
    \ la salida al `+` de la primera sirena, el `-` de la primera al `+` de la siguiente,\
    \ y así sucesivamente [F2].\n- **No realices ramales paralelos**: la supervisión\
    \ se hace sobre la línea directa hasta la RFL, y los ramales no quedan supervisados\
    \ [F2].\n\n**3. Sirenas con polaridad vs. sin polaridad:**\n\n- **Sirenas con\
    \ polaridad:** conéctala directamente respetando `+` y `-` [F2].\n- **Campanas/sirenas\
    \ sin polaridad:** instala un **diodo** entre el `+` de la línea y uno de los\
    \ terminales de alimentación de la campana, para evitar consumo durante la supervisión\
    \ (corriente inversa) [F1][F4].\n\n**4. Instala la Resistencia Final de Línea\
    \ (RFL):**\n\n- Valor: **6.800 Ω (6K8), 0,5 W mínimo** [F1].\n- Se coloca entre\
    \ `+` y `-` **al final de la última sirena** [F1].\n- Si no hay ninguna sirena\
    \ conectada en esa salida, conecta la RFL directamente en los terminales de la\
    \ central [F1].\n\n**5. Cableado:**\n\n- Sección mínima: **1,5 mm²** [F1].\n-\
    \ Para ZX2e/ZX5e: longitud no superior a **1 km** (por encima, la capacitancia\
    \ e inductancia pueden afectar al funcionamiento) [F3].\n- Evita longitudes excesivas\
    \ que provoquen caídas de tensión [F1].\n- **No enrolles el cable en los terminales**:\
    \ corta y empalma correctamente para mantener la supervisión [F3].\n\n---\n\n\
    ## Resumen del circuito (esquema simplificado) [F2]\n\n```\n+ Salida A ──[+Sirena1-]──[+Sirena2-]──[+Sirena3-]──┐\n\
    \                                                      RFL 6K8Ω\n- Salida A ───────────────────────────────────────────┘\n\
    ```\n\n---\n\n## Supervisión y avisos de fallo [F5]\n\nCualquier fallo en la línea\
    \ (circuito abierto o cortocircuito) se mostrará en pantalla, por ejemplo:\n```\n\
    !ATENCION!  CIRCUITO ABIERTO SIRENA B\n```\n\n---\n\n**Fuentes:**\n- MIE-MI-310\
