  question: ¿Cómo se cablea el módulo de entrada M710 / MI-DMMI en el lazo, y qué
    resistencias necesita (fin de línea y modo 3 estados)?
  answer: '# Conexionado del módulo M710 / MI-DMMI en el lazo


    ## Terminales de lazo (comunes a ambos modos)


    La asignación de terminales es la siguiente [F1][F4][F7]:


    - **Terminal 1:** − Lazo salida (Loop Output −)

    - **Terminal 2:** + Lazo salida (Loop Output +) → **con aislador interno activo**

    - **Terminal 3:** − Lazo entrada (Loop Input −)

    - **Terminal 4:** + Lazo entrada (Loop Input +)

    - **Terminal 5:** + Lazo salida alternativo → **si NO se necesita aislador de
    cortocircuito**, conectar aquí en lugar del terminal 2. El terminal 5 está conectado
    internamente con el terminal 4 [F4][F7]


    > ⚠️ **Nota sobre el aislador interno:** Para eliminar el aislador interno, los
    positivos in/out de lazo deben conectarse a los terminales 4 y 5 [F1].


    ---


    ## Modo 2 estados


    - La entrada se conecta entre los **terminales 6 y 7** [F1]

    - Resistencia de fin de línea: **47 kΩ** (referencia M200-EOL-R) [F1][F10]

    - **Un cortocircuito se señaliza como ALARMA** [F1]


    ---


    ## Modo 3 estados


    - Se añade una **resistencia de 18 kΩ en serie con cada contacto de alarma** [F1][F4][F7]

    - Resistencia de fin de línea: **47 kΩ** [F1]

    - Con esta configuración, el cortocircuito puede señalizarse como **AVERÍA** en
    lugar de alarma (siempre que la central lo permita) [F2][F4]

    - **Un cortocircuito se señaliza como AVERÍA; el cierre del contacto NA se señaliza
    como ALARMA** [F1]


    ---


    ## Resumen de resistencias


    - **Fin de línea (EOL):** 47 kΩ [F1][F10]

    - **Serie con contacto (modo 3 estados):** 18 kΩ por cada contacto supervisado
    [F1][F4][F7]


    ---


    ## Nota sobre terminales 8 y 9


    El M710 / MI-DMMI **no tiene conexiones en los terminales 8 y 9** [F4][F7]. Esos
    terminales son exclusivos del M720E / MI-DMM2I (versión de doble entrada).


    ---


    Fuente: Conexionado-del-modulo-M710-MI-DMMI (sin revisión registrada); I56-4404-001
    M710E M720E M721E (sin revisión registrada); I56-2006-004 MI-DMMI_DMM2I_D2ICMO
    (sin revisión registrada)'
