- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '## Test anual del detector VESDA-E VEP según el manual del fabricante


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido** [F1], las tareas
    que corresponden realizarse **una vez al año** son las siguientes:


    ---


    ### Tareas anuales obligatorias


    - **Realizar una prueba de humos** para comprobar la integridad de la red de tubería
    [F1]

    - **Comprobar el flujo de la red de tubería** [F1]

    - **Limpiar los puntos de muestreo** [F1]

    - **Limpiar con agua la red de tubería** [F1]


    ---


    ### Sobre la prueba de humos


    La prueba de humos consiste en introducir una muestra de humo en el **orificio
    de muestreo más alejado** y medir el tiempo que tarda en llegar al detector [F3].
    Los resultados deben registrarse y compararse con pruebas posteriores para detectar
    variaciones del sistema [F3].


    El procedimiento detallado de la prueba de humos se encuentra en la **VESDA-E
    Commissioning Guide** (guía de puesta en marcha de VESDA-E) [F3].


    ---


    ### Precauciones previas obligatorias antes de cualquier mantenimiento


    1. **Informar a la autoridad supervisora adecuada** antes de comenzar [F1]

    2. **Aislar todos los dispositivos** que dependan del detector antes de ponerlo
    en funcionamiento [F1]

    3. Cuando el detector está deshabilitado o en espera, **no emitirá advertencias
    de fuego** [F1]


    ---


    ### Modo en espera durante el mantenimiento


    Si vas a trabajar sobre la red de tubería o los puntos de muestreo, es recomendable
    establecer el detector en **modo en espera** para apagar el aspirador [F6]:


    - Desde **Xtralis VSC**: selecciona *"Go to Standby"* en el menú *"Device"* [F6]

    - El LED desactivado parpadeará y se detendrá el aspirador [F6]

    - Para reactivar: selecciona *"End Standby"* en el menú *"Device"* [F6]


    > ⚠️ En modo en espera se desactiva la detección de alarmas, aunque sí se mantiene
    la detección y señalización de fallos [F6].


    ---


    ### Nota sobre frecuencias


    Las frecuencias indicadas son las recomendadas por el fabricante. La frecuencia
    real puede variar según los **códigos y normas locales** y el **entorno de la
    instalación** [F1].


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de modo en espera paso a paso**, **comprobación
    del flujo de tubería** o **sustitución del filtro cada dos años** del VESDA-E
    VEP.'
