  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '# Test anual del detector VESDA-E VEP según el manual del fabricante


    ## Tareas que el manual asigna a frecuencia anual ("Una vez al año")


    Según la **Tabla 7-1** del calendario de mantenimiento [F1][F2], las comprobaciones
    anuales son:


    1. **Realizar una prueba de humos** para comprobar la integridad de la red de
    tubería

    2. **Comprobar el flujo** de la red de tubería

    3. **Limpiar los puntos de muestreo**

    4. **Limpiar con agua la red de tubería**


    ---


    ## Detalle de la prueba de humos anual


    El manual describe que la prueba de humo consiste en [F3][F4]:

    - Introducir una muestra de humo en el **orificio de muestreo más alejado**

    - Medir el **tiempo de transporte** hasta que el humo llega al detector

    - Registrar los resultados y compararlos con pruebas anteriores para detectar
    variaciones del sistema


    > ⚠️ El procedimiento detallado paso a paso de la prueba de humos se encuentra
    en la **VESDA-E Commissioning Guide** (guía de puesta en marcha de VESDA-E), no
    en la Guía del Producto [F3][F4]. Deberás consultar ese documento para el procedimiento
    completo.


    ---


    ## Pruebas funcionales disponibles vía software Xtralis VSC


    Desde el software **Xtralis VSC** se pueden ejecutar los siguientes comandos de
    prueba, relevantes para el mantenimiento anual [F5][F6]:


    - **Start Alarm Test** ("Iniciar prueba de alarma"): simula nivel de humo de escala
    completa, generando condiciones de Alerta, Acción, Fuego 1 y Fuego 2. Los relés
    de alarma se activarán salvo que el detector esté desactivado.

    - **Start Air Flow Fault Test** ("Inicio de la prueba de fallo de circulación
    del aire"): comprueba el sistema de detección de flujo apagando el aspirador.

    - **Start Relay Test** ("Iniciar prueba de relés"): activa y desactiva los relés
    disponibles para probarlos.

    - **Start Major Fault Test** / **Start Minor Fault Test**: generan un fallo importante/menor
    y desactivan el relé de fallo durante **2 minutos** [F5][F6].

    - **Start LED Test** ("Iniciar prueba de LED"): realiza un ciclo de prueba de
    cada indicador LED del panel de visualización.


    ---


    ## Precauciones obligatorias antes de realizar el mantenimiento


    El manual establece las siguientes precauciones [F1][F2]:


    - **Informar a la autoridad supervisora adecuada** antes de iniciar cualquier
    prueba o mantenimiento.

    - **Aislar los dispositivos existentes** que dependan del detector antes de ponerlo
    en funcionamiento.

    - Cuando el detector está deshabilitado o en espera, **no emitirá advertencias
    de fuego**.

    - Seguir los **procedimientos del sitio** para evitar falsas alarmas en los servicios
    supervisados.


    ---


    ## Modo en espera durante el mantenimiento


    Para trabajos en la red de tubería o puntos de muestreo, se recomienda poner el
    detector en **modo en espera** [F10]:

    - Desde **Xtralis VSC**: menú Dispositivo → "Go to Standby" (Ir a modo en espera)

    - El aspirador se desactiva y se detiene la detección de alarmas (la detección
    de fallos continúa activa)

    - Para reactivar: menú Dispositivo → "End Standby" (Finalizar modo en espera)


    ---


    ## Nota sobre la sustitución del filtro


    La **sustitución del filtro** tiene frecuencia **bienal** (cada dos años), no
    anual [F1][F2].


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de modo en espera detallado**, **comandos
    disponibles desde el botón físico del detector** o **comprobaciones de mantenimiento
    trimestral y semestral** del VESDA-E VEP.'
