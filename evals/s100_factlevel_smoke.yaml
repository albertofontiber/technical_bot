- qid: cat005
  question: ¿Cuáles son las características técnicas de la central de detección de
    gas Fidegas CS4, y en qué se diferencian las versiones digital y analógica?
  answer: "# Central de Alarmas FIDEGAS® CS4 — Características Técnicas y Diferencias\
    \ entre Versiones\n\n## Características técnicas generales\n\n- **Tensión de alimentación:**\
    \ 110-230 Vac, 50-60 Hz [F2]\n- **Potencia:** 30 W, Clase II [F2][F3]\n- **Firmware:**\
    \ versión 1.2 (tanto en versión digital como analógica) [F3][F7]\n- **Sensores:**\
    \ hasta 4 conexiones simultáneas en modo analógico o digital [F2]\n- **Salidas:**\
    \ 2 salidas conmutadas LP (relé apto para 230 Vac) con contactos NA-C-NC [F2]\n\
    - **Corriente máxima:** 250 mA [F2]\n- **Rearme:** seleccionable manual o automático\
    \ [F2]\n- **Indicaciones:** presencia, alarma y avería por sensor; avería de central;\
    \ corte de red [F2]\n- **Dimensiones:** 90 x 106 x 58 mm [F2]\n- **Peso:** 300\
    \ g [F2]\n- **Instalación:** carril DIN o armario de superficie [F1]\n\n---\n\n\
    ## Indicaciones luminosas y acústicas\n\n- **LED verde PWR:** alimentación presente\
    \ (fijo) / corte de red (intermitente) [F1]\n- **LED bicolor ON/ALARM** (por sensor):\
    \ sensor conectado (verde) / alarma (rojo) [F1]\n- **LED amarillo ERROR** (por\
    \ sensor): avería del sensor remoto [F1]\n- **LED verde OUT1 / OUT2:** salida\
    \ activa (verde) / desactivada (apagado) [F1]\n- **Avisador acústico:** apoyo\
    \ sonoro a las indicaciones ópticas [F1]\n\n---\n\n## Diferencias entre versión\
    \ digital y analógica\n\n**Código de producto:**\n- Versión digital: **3244**\
    \ [F2]\n- Versión analógica: **3270** [F2]\n\n**Tipo de entrada de señal:**\n\
    - Versión digital: entradas **0-10/15 V** [F1]\n- Versión analógica: entradas\
    \ **4-20 mA** [F1]\n\n**Sensores compatibles:**\n- Versión analógica [F3]:\n \
    \ - Sensores S/3 gases combustibles\n  - Sensores S/3 y S/2 gases tóxicos\n  -\
    \ Sensores S/10 gases tóxicos\n- Versión digital [F3]:\n  - Sensores S/10 gases\
    \ combustibles\n\n---\n\n## Conexionado de sensores\n\nLos conectores de cada\
    \ sensor tienen la siguiente asignación [F4]:\n- **Terminal 1:** positivo de alimentación\
    \ (12 a 24 Vdc)\n- **Terminal 2:** entrada de señal\n- **Terminal 3:** negativo\
    \ común de alimentación y señal\n\n---\n\n## Umbral de alarma\n\nLa alarma se\
    \ activa cuando la concentración de gas supera el **20% del fondo de escala**\
    \ [F5]. Las alarmas son enclavadas y requieren pulsación del botón **RESET** para\
    \ rearmar. Si la concentración no ha disminuido, la alarma puede silenciarse durante\
    \ **24 horas** con el botón RESET pero no se puede rearmar [F5].\n\n---\n\n> ⚠️\
    \ **Nota:** Durante los primeros **30 segundos** tras el encendido, el LED PWR\
    \ parpadea y las salidas OUT1/OUT2 permanecen en posición NA. El enclavamiento\
    \ del corte de red es configurable como rearme manual (de serie) o automático\
    \ [F1][F5].\n\n---\n\n**Fuente:** Manual de Usuario CS4 (Analógica o Digital),\
    \ elaborado y aprobado en Revisión 2, 10/2018. Fabricado por C.A.E., S.L. [F6]\n\
    \n---\n\nTambién puedo ayudarte con: **procedimiento de configuración de la CS4**,\
    \ **conexionado de las salidas OUT1/OUT2** o **funcionamiento del rearme automático\
    \ vs. manual**."
