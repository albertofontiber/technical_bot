- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  answer: '# FAAST LT-200 — Salidas de relé y sirena: especificaciones completas


    ---


    ## 1. Tipos de relés disponibles


    Los fragmentos cubren **dos variantes** del FAAST LT-200 con diferente dotación
    de relés:


    ### Variante Stand-Alone (HS)


    Dispone de los siguientes relés [F1] [F6]:


    - **ALARMA 1 y 2** — Se activa cuando se cumple la condición de alarma en el canal
    correspondiente. Estado predeterminado = Nivel 1. El estado de alarma queda **enclavado**
    por defecto; se requiere RESET manual para desactivar el LED y el relé.

    - **PRE-ALARMA 1 y 2** — Se activa cuando se cumple la condición de pre-alarma
    en el canal. Estado predeterminado = Nivel 1. Nota: cuando Pre-ALARMA = ALARMA
    = Nivel 1, la Pre-ALARMA responde al **70% del Nivel 1**.

    - **AVERÍA 1 y 2** — Se activa ante condición de avería en CH1 o CH2, o ante avería
    común. También se activa en modo servicio y cuando la unidad está **sin alimentación**.
    Estado de avería **no enclavado** (por defecto).

    - **SIRENA 1 y 2** — Se activa cuando el canal está en ALARMA o PRE-ALARMA. Sirena
    1 → CH1; Sirena 2 → CH2. Estado predeterminado = activado en ALARMA.


    ### Variante Loop (lazo) y variante Notifier Loop


    Dispone de [F3] [F4]:


    - **ALARMA 1 y 2** — Controlada por el panel cuando determina que se cumple la
    condición de alarma. Activada y desactivada por el panel; **no enclavada**.

    - **AVERÍA 1 y 2** — Igual comportamiento que en la variante Stand-Alone. Estado
    **no enclavado**.

    - **SIRENA 1 y 2** — Igual que en Stand-Alone. Estado predeterminado = activado
    en ALARMA.


    > ⚠️ **Diferencia clave entre variantes**: la variante Stand-Alone incluye relés
    de **PRE-ALARMA** y el relé de ALARMA es **enclavado**; en la variante Loop, el
    relé de ALARMA es **no enclavado** y no hay relé de PRE-ALARMA.


    ---


    ## 2. Contactos de los relés (terminales de bornes)


    ### Variante Stand-Alone [F6]


    - **Relé ALARMA CH1** (bloque T2): terminales 5 (NC), 6 (C), 7 (NO)

    - **Relé ALARMA CH2** (bloque T3): terminales 8 (NC), 9 (C), 10 (NO)

    - **Relé AVERÍA CH1** (bloque T4): terminales 11 (NC), 12 (C), 13 (NO)

    - **Relé AVERÍA CH2 / AUX** (bloque T5): terminales 14 (NC), 15 (C), 16 (NO)

    - **Relé PRE-ALARMA CH1** (bloque T9): terminales 23 (NC), 24 (C), 25 (NO)

    - **Relé PRE-ALARMA CH2** (bloque T10): terminales 26 (NC), 27 (C), 28 (NO)


    ### Variante Loop / Notifier Loop [F5] [F7]


    - **Relé ALARMA CH1** (bloque T2): terminales 5 (NC), 6 (C), 7 (NO)

    - **Relé ALARMA CH2** (bloque T3): terminales 8 (NC), 9 (C), 10 (NO)

    - **Relé AVERÍA CH1** (bloque T4): terminales 11 (NC), 12 (C), 13 (NO)

    - **Relé AVERÍA CH2 / AUX** (bloque T5): terminales 14 (NC), 15 (C), 16 (NO)

    - Los terminales 23–28 en esta variante corresponden a **entradas de lazo**, no
    a relés de pre-alarma.


    Todos los relés disponen de contacto **NC, C (común) y NO**.


    ---


    ## 3. Comportamiento del relé de avería ante fallo o corte de alimentación


    El relé de AVERÍA se activa en los siguientes casos [F1] [F2] [F3] [F4]:


    - Condición de avería en **CH1 o CH2**

    - **Avería común**

    - Cuando la unidad está en **modo servicio** (puerta abierta) [F8] [F9]

    - Cuando la unidad está **sin alimentación** (desconectada)


    El estado de avería **no está enclavado** por defecto [F1] [F2].


    ---


    ## 4. Resistencia de fin de línea (EOL) en salidas de sirena


    Las salidas de sirena llevan una resistencia de fin de línea de **47 kΩ** [F5]
    [F6] [F7]:


    - **Salida Sirena 1** (bloque T6): terminales 17 (–) y 18 (+) — resistencia EOL
    de **47 kΩ**

    - **Salida Sirena 2** (bloque T7): terminales 19 (–) y 20 (+) — resistencia EOL
    de **47 kΩ**


    ---


    ## 5. Especificación eléctrica de los contactos de relé


    Según la Tabla 3a [F1] [F4]:


    - **Corriente máxima (DC):** 2 A a 30 VDC (carga resistiva)

    - **Corriente máxima (AC):** 0,5 A a 30 VAC (carga resistiva)

    - **Vida útil mínima:** 10⁵ operaciones


    > ⚠️ **Advertencia para cargas inductivas**: los fragmentos incluyen diagramas
    de advertencia sobre la conmutación de cargas inductivas [F4]. Si conectas cargas
    inductivas, consulta el esquema de protección con diodo (referencia **1N6284CA**)
    indicado en el manual.


    ---


    **Fuentes:**

    - I56-6574-005_EN-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6574-005_ES-HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-6575-005_EN-FAAST-LT-200-Loop-QIG (sin revisión registrada)

    - I56-6577-006_EN Notifier FAAST LT-200 QIG (sin revisión registrada)

    - I56-6577-006_ES FAAST Notifier LT-200 QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **conexionado de la alimentación principal y auxiliar**,
    **configuración de la entrada configurable (Reset)** o **procedimiento de sustitución
    de sensores** del FAAST LT-200.'
