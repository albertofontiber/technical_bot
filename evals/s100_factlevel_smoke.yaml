- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: '# Conexionado de sirena convencional en salidas de sirena de la ZXe


    > **Nota previa:** Los fragmentos recuperados corresponden a los manuales de instalación
    de la **ZXAE/ZXEE** y la **ZX2e/ZX5e**. La denominación "ZXe" puede referirse
    a cualquiera de estas variantes. A continuación te doy la información de conexionado
    que aplica a ambas, indicando las diferencias.


    ---


    ## Número de salidas disponibles


    - **ZXAE:** 2 salidas supervisadas para sirenas convencionales (Salida A y B)
    [F1]

    - **ZXEE:** 4 salidas supervisadas para sirenas convencionales (Salida A, B, C
    y D) [F1]

    - **ZX2e/ZX5e:** 2 salidas de sirena (A y B); la ZX5e añade C y D [F4]


    ---


    ## Parámetros eléctricos de las salidas


    - **Corriente máxima por circuito:** 1 A [F1]

    - **Resistencia final de línea (RFL):** **6.800 Ω, 0,5 W mínimo** [F1]

    - **Sección mínima de cable:** **1,5 mm²** [F1]

    - **Longitud máxima de cable (ZX2e/ZX5e):** no se recomienda superar **1 km**
    [F3]


    ---


    ## Procedimiento de conexionado


    1. **Conecta las sirenas en serie** (en línea directa, sin ramales) entre los
    terminales **+** y **−** de la salida correspondiente [F2].


    2. **Sirenas con polaridad:** conecta respetando la polaridad + / − de cada sirena
    [F2].


    3. **Campanas/sirenas sin polaridad:** instala un **diodo** entre el terminal
    + de la salida y uno de los terminales de alimentación de la campana, para evitar
    consumos durante la supervisión [F1].


    4. **Resistencia final de línea (RFL):** coloca una resistencia de **6.800 Ω**
    entre el terminal **+** y **−** de la **última sirena** de la línea. Esta RFL
    es imprescindible para la supervisión de apertura y cierre de línea [F1].


    5. **Si no hay sirenas conectadas en esa salida:** conecta la RFL de **6.800 Ω**
    directamente entre los terminales + y − de la salida en la central [F1].


    6. **No realices ramales paralelos:** la supervisión se realiza sobre la línea
    directa hasta la RFL; los ramales paralelos no quedan supervisados [F2].


    ---


    ## Funcionamiento de la supervisión


    - La supervisión utiliza una **corriente inversa** que lee la RFL [F1].

    - La corriente de supervisión tiene **polaridad inversa** a la de activación [F1].

    - Al activarse la salida, la corriente circula en sentido normal con la polaridad
    indicada en los terminales [F1].

    - Cualquier fallo en la línea (apertura o cortocircuito) se mostrará en pantalla
    y quedará registrado en el sistema [F4].


    ---


    ## Advertencia sobre el consumo total


    Verifica que el consumo total de la central (con todas las sirenas activadas)
    no supere el límite del sistema. Cada salida admite **máximo 1 A** [F1].


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE (DOC.MIE-MI-310, sin revisión registrada);
    Manual de Instalación ZX2e/ZX5e (DOC.MIE-MI-530, rev. 001)'
