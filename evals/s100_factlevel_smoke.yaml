- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  answer: '## Salidas de relé y sirena del FAAST LT-200


    ### Relés disponibles y comportamiento


    El FAAST LT-200 dispone de los siguientes relés [F1][F2]:


    **Relé de ALARMA 1 y 2:**

    - Se activa cuando se cumple la condición de alarma en el canal correspondiente
    [F1]

    - En la versión Stand-Alone: estado enclavado por defecto; requiere RESET manual
    para desactivar LED y relé [F1]

    - En la versión Loop (con panel): controlado por el panel, se activa y desactiva
    por el panel; **no enclavado** [F3][F4]

    - Condición por defecto = Nivel 1 [F1]


    **Relé de PRE-ALARMA 1 y 2** *(solo versión Stand-Alone)*:

    - Se activa cuando se cumple la condición de pre-alarma en el canal [F1]

    - Condición por defecto = Nivel 1. Nota: cuando Pre-ALARMA = ALARMA = Nivel 1,
    el relé de Pre-Alarma responde al **70% del Nivel 1** [F1]


    **Relé de AVERÍA 1 y 2:**

    - Se activa ante condición de avería en canal 1 o 2, o ante avería común [F1][F2]

    - También se activa en **modo de servicio** y cuando la **unidad está sin alimentación**
    [F1][F2]

    - **Estado NO enclavado** (por defecto) [F1][F2]


    **Relé de SIRENA 1 y 2:**

    - Se activa cuando el canal está en ALARMA (Sirena 1 → Canal 1; Sirena 2 → Canal
    2) [F1][F2]

    - Condición por defecto = activado en ALARMA [F1][F2]


    ---


    ### Contactos de los relés (terminales de cableado)


    Todos los relés disponen de contacto **NC (normalmente cerrado), C (común) y NO
    (normalmente abierto)** [F5][F6]:


    **Versión Stand-Alone** [F6]:

    - Terminales 5-6-7: NC / C / NO — Relé de Alarma CH1 (bloque T2)

    - Terminales 8-9-10: NC / C / NO — Relé de Alarma CH2 (bloque T3)

    - Terminales 11-12-13: NC / C / NO — Relé de Avería CH1 (bloque T4)

    - Terminales 14-15-16: NC / C / NO — Relé de Avería AUX CH2 (bloque T5)

    - Terminales 23-24-25: NC / C / NO — Relé de Pre-Alarma CH1 (bloque T9)

    - Terminales 26-27-28: NC / C / NO — Relé de Pre-Alarma CH2 (bloque T10)


    **Versión Loop** [F5][F7]:

    - Terminales 5-6-7: NC / C / NO — Relé de Alarma CH1 (bloque T2)

    - Terminales 8-9-10: NC / C / NO — Relé de Alarma CH2 (bloque T3)

    - Terminales 11-12-13: NC / C / NO — Relé de Avería CH1 (bloque T4)

    - Terminales 14-15-16: NC / C / NO — Relé de Avería AUX CH2 (bloque T5)

    - *(Los terminales 23-28 en esta versión son para lazo, no para Pre-Alarma)* [F5][F7]


    ---


    ### Comportamiento del relé de avería ante fallo o corte de alimentación


    El relé de avería se activa (indica avería) en los siguientes casos [F1][F2][F9]:

    - Condición de avería en canal 1 o canal 2

    - Avería común

    - Cuando la unidad está en **modo de servicio** (puerta abierta durante funcionamiento
    normal) [F9]

    - Cuando la unidad está **sin alimentación** [F1][F2]


    El estado de avería **no está enclavado** por defecto [F1][F2].


    ---


    ### Resistencia de fin de línea en salidas de sirena


    - **Salida Sirena 1** (terminales 17−/18+): resistencia de fin de línea de **47
    kΩ** [F5][F6][F8]

    - **Salida Sirena 2** (terminales 19−/20+): resistencia de fin de línea de **47
    kΩ** [F5][F6][F8]


    ---


    ### Especificación eléctrica de los contactos de relé


    - Corriente máxima: **2 A** a **30 VDC** (carga resistiva) [F1][F4]

    - Corriente máxima: **0,5 A** a **30 VAC** (carga resistiva) [F1][F4]

    - Vida útil mínima: **10⁵ operaciones** [F1][F4]


    > ⚠️ **Advertencia:** Para cargas inductivas, se requiere protección adicional
    (diodo supresión tipo 1N6284CA). El conexionado directo a carga inductiva sin
    protección está indicado como incorrecto [F4].


    ---


    Fuentes:

    - I56-6574-005_EN-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6577-006_ES FAAST Notifier LT-200 QIG (sin revisión registrada)

    - I56-6577-006_EN Notifier FAAST LT-200 QIG (sin revisión registrada)

    - I56-6575-005_EN-FAAST-LT-200-Loop-QIG (sin revisión registrada)

    - I56-6575-005_ES FAAST LT-200 Loop QIG (sin revisión registrada)

    - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **conexionado de la entrada configurable de rearme**,
    **sustitución de sensores o filtros** o **diferencias de cableado entre la versión
    Stand-Alone y la versión Loop**.'
