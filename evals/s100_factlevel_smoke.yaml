- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: '# Conexionado de sirena convencional en salidas de sirena de la ZXe


    **Nota previa:** Los fragmentos recuperados corresponden a los modelos **ZXAE/ZXEE**
    y **ZX2e/ZX5e**. La denominación "ZXe" puede referirse a cualquiera de ellos.
    A continuación se detalla el conexionado, que es común en sus principios, indicando
    las diferencias por modelo.


    ---


    ## Número de salidas disponibles


    - **ZXAE / ZX2e:** 2 salidas supervisadas para sirenas convencionales (Salida
    A y B) [F1]

    - **ZXEE / ZX5e:** 4 salidas supervisadas para sirenas convencionales (Salida
    A, B, C y D) [F1]


    ---


    ## Procedimiento de conexionado


    ### 1. Identificar los terminales de sirena en la placa


    - **ZX2e:** Terminales etiquetados como **AUX RELAY A+ A- B+ B-** en el bloque
    de sirenas [F4]

    - **ZX5e:** Terminales en **TB7**, etiquetados como **A- A+ B- B+ C- C+ D- D+**
    [F4]

    - **ZXAE:** Terminales de Salida A y B de sirenas de placa [F1]

    - **ZXEE:** Terminales en **TB7**: **S,A+ S,A- S,B+ S,C+ S,D+ S,D-** [F1]


    ### 2. Conectar las sirenas en serie (línea directa, sin ramales)


    - Conecta el **+** de la salida al **+** de la primera sirena [F2]

    - Conecta el **-** de la primera sirena al **+** de la siguiente, y así sucesivamente
    [F2]

    - El **-** de la última sirena conecta al **-** de la salida [F2]

    - ⚠️ **No realizar ramales paralelos** — la supervisión se realiza en línea directa
    hasta la RFL; los ramales no quedan supervisados [F2]


    ### 3. Instalar la Resistencia Final de Línea (RFL)


    - Coloca una **RFL de 6.800 Ω (6K8), mínimo 0,5 W** entre el **+** y el **-**
    de la última sirena de cada circuito [F1]

    - Si **no se instala ninguna sirena** en la salida, conecta la RFL directamente
    en los terminales de la central [F1]


    ### 4. Sirenas con polaridad vs. sin polaridad (campanas)


    - **Sirenas con polaridad:** Conectar respetando la polaridad + / - indicada [F2]

    - **Campanas/sirenas sin polaridad:** Es **obligatorio instalar un diodo** entre
    el **+** de la salida y uno de los terminales de alimentación de la campana, para
    evitar consumo durante la supervisión (la corriente de supervisión es de polaridad
    inversa) [F1][F2]

    - En el caso de otros dispositivos no polarizados conectados a la línea, también
    se deben usar **diodos de polarización y protección en cada uno** [F4]


    ### 5. Verificar límites de corriente y cableado


    - Corriente máxima por circuito: **1 A** [F1]

    - Sección mínima de cable: **1,5 mm²** [F1]

    - Longitud máxima recomendada (ZX2e/ZX5e): **no superior a 1 km** — por encima,
    la capacitancia e inductancia pueden afectar al funcionamiento [F3]

    - ⚠️ Verificar que la caída de tensión en la línea no impida la alimentación correcta
    de las sirenas, tanto en condiciones de red como de mínima tensión de baterías
    [F3]

    - ⚠️ **No enrollar el cable en los terminales** — cortar y empalmar adecuadamente
    para mantener la supervisión [F3]


    ---


    ## Funcionamiento de la supervisión


    La supervisión opera con **corriente inversa** en reposo: la central lee la RFL
    con una pequeña tensión de polaridad inversa a la de activación. Al dispararse
    la salida, la corriente circula en sentido normal con la polaridad indicada en
    los terminales [F1]. Cualquier apertura o cortocircuito en la línea generará una
    avería de supervisión visible en pantalla [F5].


    ---


    **Fuentes:**

    - Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada)

    - Manual de Instalación ZX2e/ZX5e — DOC.MIE-MI-530, Revisión 001

    - Manual de Configuración ZX2e/ZX5e — DOC.MIE-MP-530, Revisión 001'
