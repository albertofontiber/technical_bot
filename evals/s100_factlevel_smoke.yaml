- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '## Test anual del detector VESDA-E VEP según el manual del fabricante


    ### Tareas anuales obligatorias


    Según la **Tabla 7-1: Calendario de mantenimiento sugerido**, las comprobaciones
    a realizar **una vez al año** son [F1][F2]:


    1. **Realizar una prueba de humos** para comprobar la integridad de la red de
    tubería

    2. **Comprobar el flujo** de la red de tubería

    3. **Limpiar los puntos de muestreo**

    4. **Limpiar con agua la red de tubería**


    ---


    ### Sobre la prueba de humos anual


    La prueba de humos consiste en [F3][F4]:

    - Introducir una muestra de humo en el **orificio de muestreo más alejado**

    - Medir el **tiempo de transporte** hasta que el humo llega al detector

    - Registrar los resultados y compararlos con pruebas anteriores para detectar
    variaciones del sistema


    > El manual indica que los detalles completos del procedimiento de prueba de humo
    se encuentran en la **VESDA-E Commissioning Guide** (guía de puesta en marcha
    de VESDA-E) [F3][F4]. Los fragmentos disponibles no incluyen ese documento.


    ---


    ### Pruebas funcionales ejecutables desde software (Xtralis VSC)


    Adicionalmente, el detector permite ejecutar las siguientes pruebas mediante el
    **software Xtralis VSC** [F5][F6]:


    - **Start Alarm Test**: simula nivel de humo de escala completa, generando condiciones
    de Alerta, Acción, Fuego 1 y Fuego 2. Activa los relés de alarma salvo que el
    detector esté desactivado.

    - **Start Air Flow Fault Test**: comprueba el sistema de detección de circulación
    del aire apagando el aspirador.

    - **Start Major Fault Test**: genera un fallo importante y desactiva el relé de
    fallo durante **2 minutos**.

    - **Start Minor Fault Test**: genera un fallo menor y desactiva el relé de fallo
    durante **2 minutos**.

    - **Start Relay Test**: activa y desactiva los relés disponibles para probarlos.

    - **Start LED Test**: realiza un ciclo de prueba de cada indicador LED del panel
    de visualización.


    ---


    ### ⚠️ Precauciones previas al mantenimiento


    Antes de realizar cualquier prueba o mantenimiento [F1][F2]:


    - **Informe a la autoridad supervisora adecuada**

    - **Aísle los dispositivos existentes** que dependan del detector antes de ponerlo
    en funcionamiento

    - Cuando el detector está deshabilitado o en espera, **no emitirá advertencias
    de fuego**

    - Siga los **procedimientos del sitio** para evitar falsas alarmas en los servicios
    supervisados


    ---


    ### Nota sobre quién puede realizar el mantenimiento


    El mantenimiento puede ser realizado por [F1][F2]:

    - El instalador original

    - Un distribuidor autorizado

    - El contratista de servicio


    La frecuencia puede variar según los **códigos y normas locales** y el **entorno
    de la instalación** [F1][F2].


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de AutoLearn Flow**, **comandos disponibles
    desde el botón del detector** o **lista de verificación de instalación** del VESDA-E
    VEP.'
