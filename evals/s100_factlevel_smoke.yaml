- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: "# Acceso al menú AVANZADO en la CAD-250\n\n## Ruta de acceso\n\nEl acceso\
    \ al menú de programación avanzada se realiza desde el menú principal siguiendo\
    \ esta ruta [F1]:\n\n**AJUSTES** (Menú principal) **> AVANZADO** (Submenú)\n\n\
    ## Pasos detallados\n\n1. Desde la **PANTALLA DE REPOSO**, toca el icono del candado\
    \ (\U0001F512) [F4].\n2. Introduce tu código de acceso en la **PANTALLA DE ACCESO**\
    \ [F4].\n   - Clave de usuario por defecto: **1111** [F4]\n   - Clave de administrador\
    \ por defecto: **2222** [F3]\n   > ⚠️ Para acceder a AVANZADO necesitas nivel\
    \ de instalador. El nivel de usuario tiene acceso restringido a algunas funciones\
    \ de configuración [F7].\n3. Una vez dentro, selecciona **AJUSTES** en el menú\
    \ principal (barra lateral izquierda) [F1].\n4. En el submenú derecho, selecciona\
    \ **AVANZADO** [F1].\n\n## Contenido del menú AVANZADO\n\nUna vez dentro, dispones\
    \ de **3 pestañas** [F1]:\n\n- **SISTEMA:** Configura número de cabinas (Paneles:\
    \ 1 a 4), número de lazos (2, 4, 6, 8... hasta 32 según cabinas) y cabina de LEDs\
    \ de zona (0 ó 1) [F1].\n- **OTROS:** Interruptores para facilitar puesta en marcha\
    \ y mantenimiento (tiempo de inactividad, salto a scroll, timeout, etc.) [F5].\n\
    - **REINICIAR:** Devuelve los valores de configuración del panel a valores por\
    \ defecto. No afecta a entidades, lazos, maniobras, grupos, módulos virtuales,\
    \ modos especiales, filtros de red ni registros de eventos [F5].\n\n> ⚠️ Tras\
    \ modificar parámetros en la pestaña SISTEMA, debes pulsar el botón **\"Guardar\
    \ y Reiniciar\"** para validar los cambios [F1].\n\n---\n\n**Fuentes:**\n- CAD-250\
    \ Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n- Manual de Usuario\
    \ CAD-250 MU-376-es-2024-f (sin revisión registrada)\n- Manual de Instalación\
    \ CAD-250 MI-372-es-2024-e (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **configuración de lazos en AVANZADO > SISTEMA**, **gestión de usuarios\
    \ y niveles de acceso** o **opciones de la pestaña OTROS para puesta en marcha**."
