- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: '## Acceso al menú de programación avanzada — CAD-250


    El acceso al nivel de configuración avanzada se realiza en **dos fases**: primero
    autenticarse como administrador y luego navegar al submenú correspondiente.


    ---


    ### Paso 1 — Acceder desde la pantalla de reposo


    1. En la **PANTALLA DE REPOSO**, toca el icono del **candado (🔒)** en el centro
    de la pantalla [F1][F2].

    2. Se abrirá la **PANTALLA DE ACCESO**, que solicita un código numérico [F1][F2].


    ---


    ### Paso 2 — Introducir la clave de administrador


    3. Introduce la clave de administrador por defecto: **2222** [F1][F2].


    > ⚠️ **AVISO:** El uso indebido del nivel de administrador puede provocar un mal
    funcionamiento de la instalación. Asegúrate de tener la autorización necesaria
    antes de operar en este nivel [F1][F2].


    ---


    ### Paso 3 — Navegar al menú de configuración avanzada


    Una vez dentro del **NIVEL DE CONFIGURACIÓN (Nivel 2)**, la ruta para acceder
    a los ajustes avanzados es [F8]:


    **AJUSTES** (Menú principal) **→ AVANZADO** (Submenú)


    Dentro de **AVANZADO** encontrarás **3 pestañas** [F8]:


    - **SISTEMA:** Configuración de número de cabinas (Paneles: 1–4), número de lazos
    (2, 4, 6, 8... hasta 32 según cabinas) y LEDs de zona (0 ó 1) [F8].

    - **OTROS:** Interruptores de puesta en marcha y mantenimiento (tiempo de inactividad,
    salto a scroll, timeout, módulos virtuales, modo test) [F9].

    - **REINICIAR:** Devuelve los valores de configuración del panel a valores por
    defecto (no afecta a entidades, lazos, maniobras, grupos, módulos virtuales, modos
    especiales, filtros de red ni registros de eventos) [F9].


    ---


    ### Referencia: estructura completa del Nivel 2


    Desde este nivel también tienes acceso a todos los parámetros de la central [F3]:


    - **Lazo:** Dispositivos, Valor Analógico, Salidas, Auto-búsqueda, Calidad comunicación,
    Programación de dirección

    - **Sectorización:** Áreas, Zonas

    - **Maniobras:** Maniobras, Grupos, Módulos virtuales, Estado VM

    - **Logs:** Todos, Alarma, Avería, Técnico, Test, Información, Borrar Logs

    - **Red:** Configuración de red, Filtros de red, Configuración de ModBus

    - **Ajustes:** General, Versiones, Usuarios, **Avanzado**, Conectividad, Impresora,
    Logs, Test

    - **Instalación:** Modos especiales, Retardo en dos fases, Panel, Lazo


    ---


    Fuentes:

    - CAD-250 Manual de Configuración (MC-380-es-2026-c, rev. c, 2026-04-23)

    - Manual de Instalación CAD-250 (MI_372_es_2024 e)

    - Manual de Usuario CAD-250 (MU_376_es_2024 f)

    - CAD-250 Manual Software Configuración (MS-416-es-2026-b, rev. b)


    ---


    También puedo ayudarte con: **configuración de lazos en AVANZADO > SISTEMA**,
    **opciones de la pestaña OTROS** o **creación de maniobras desde el Nivel 2**.'
