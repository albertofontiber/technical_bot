- qid: cat005
  question: ¿Cuáles son las características técnicas de la central de detección de
    gas Fidegas CS4, y en qué se diferencian las versiones digital y analógica?
  answer: '# Central de Alarmas Fidegas CS4 — Características Técnicas


    ## Especificaciones generales


    - **Tensión de alimentación:** 110-230 Vac, 50-60 Hz [F2]

    - **Potencia:** 30 W, Clase II [F2][F3]

    - **Firmware:** versión 1.2 (tanto en versión digital como analógica) [F3][F7]

    - **Número de sensores:** hasta 4 conexiones simultáneas [F1][F2]

    - **Salidas:** 2 salidas conmutadas LP (relé apto para 230 Vac) con contactos
    NA-C-NC [F1][F2]

    - **Corriente máxima:** 250 mA [F2]

    - **Rearme:** seleccionable manual o automático [F2]

    - **Dimensiones:** 90 x 106 x 58 mm [F2]

    - **Peso:** 300 g [F2]

    - **Instalación:** carril DIN o armario de superficie [F1]


    ## Indicaciones


    - **LED verde PWR:** alimentación presente (fijo) / corte de red (intermitente)
    [F1]

    - **LED bicolor ON/ALARM** por sensor: presencia de sensor remoto (verde) / alarma
    (rojo) [F1]

    - **LED amarillo ERROR** por sensor: avería de sensor remoto [F1]

    - **LED verde OUT1 y OUT2:** salida activa (verde) / desactivada (apagado) [F1]

    - **Avisador acústico:** apoyo sonoro a las indicaciones ópticas [F1]


    ## Diferencias entre versión digital y analógica


    ### Tipo de entrada de señal

    - **Versión digital:** entradas 0-10/15 V [F1]

    - **Versión analógica:** entradas 4-20 mA [F1]


    ### Código de producto

    - **Versión digital:** código **3244** [F2]

    - **Versión analógica:** código **3270** [F2]


    ### Sensores compatibles

    - **Versión analógica:** sensores S/3 gases combustibles; sensores S/3 y S/2 gases
    tóxicos; sensores S/10 gases tóxicos [F3]

    - **Versión digital:** sensores S/10 gases combustibles [F3]


    ## Umbral de alarma

    - La alarma se activa cuando la concentración de gas supera el **20% del fondo
    de escala** [F5]

    - Las alarmas son **enclavadas** y requieren rearme manual mediante pulsador **RESET**
    (salvo configuración automática) [F1][F5]

    - Si la concentración no ha disminuido, la alarma puede silenciarse durante **24
    horas** con el botón RESET, pero la central no puede rearmarse [F5]


    ## Secuencia de arranque

    1. Al encender, el LED verde PWR parpadea durante **30 segundos**; durante este
    tiempo las salidas OUT1 y OUT2 están en posición NA [F5]

    2. Se realiza un chequeo de memorias digitales y un test de salidas [F5]

    3. Si el modo de rearme es manual y hubo corte de red, es necesario pulsar RESET
    para completar el arranque [F5]


    ---


    También puedo ayudarte con: **conexionado de sensores S/3 o S/10**, **configuración
    de salidas OUT1/OUT2** o **procedimiento de rearme y silenciado de alarmas** de
    la CS4.


    Fuente: Manual de Usuario CS4 (Analógica o Digital), Rev. 2, 10/2018'
