- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: '## Acceso al menú de programación avanzada — CAD-250


    El acceso al nivel de configuración avanzada se realiza en dos pasos: primero
    acceder como administrador (nivel 3), y luego navegar al submenú correspondiente.


    ---


    ### Paso 1 — Acceder desde la pantalla de reposo


    1. En la **PANTALLA DE REPOSO**, toca el icono del **candado (🔒)** [F1][F2].

    2. Se abrirá la **PANTALLA DE ACCESO**, que solicita un código numérico [F1][F2].

    3. Introduce la **clave de administrador por defecto: `2222`** [F1][F2].


    > ⚠️ El uso indebido del nivel de administrador puede provocar un mal funcionamiento
    de la instalación. Asegúrate de tener la autorización necesaria [F1][F2].


    ---


    ### Paso 2 — Navegar al menú de configuración avanzada


    Una vez dentro del nivel de administrador (nivel 3), tienes acceso completo a
    todos los parámetros de configuración [F3][F10]. La estructura de menús es la
    siguiente:


    **Para acceder a AJUSTES AVANZADOS:**


    **AJUSTES** (Menú principal) **→ AVANZADO** (Submenú) [F7]


    Dentro de **AVANZADO** dispones de 3 pestañas [F7][F8]:

    - **SISTEMA**: número de cabinas (paneles 1–4), número de lazos (2, 4, 6, 8...
    hasta 32), y LEDs de zona (0 ó 1) [F7].

    - **OTROS**: interruptores de puesta en marcha y mantenimiento (tiempo de inactividad,
    salto a scroll, timeout, módulos virtuales, salida automática del modo test) [F8].

    - **REINICIAR**: devuelve los valores de configuración del panel a valores por
    defecto (no afecta a entidades, lazos, maniobras, grupos, módulos virtuales, modos
    especiales, filtros de red ni registros de eventos) [F8].


    > ⚠️ Para validar cambios en la pestaña SISTEMA, debes pulsar el botón **"Guardar
    y Reiniciar"** [F7].


    ---


    ### Referencia de niveles de acceso


    - **Nivel 1**: sin contraseña — visualización y funciones básicas de control [F10].

    - **Nivel 2** (usuario, clave por defecto `1111`): deshabilitaciones, logs, ajustes
    generales [F4][F10].

    - **Nivel 3** (administrador/configuración, clave por defecto `2222`): acceso
    completo a toda la configuración [F1][F3][F10].


    ---


    **Fuentes:**

    - CAD-250 Manual de Configuración (MC-380-es-2026-c, rev. c, 2026-04-23)

    - Manual de Instalación CAD-250 (MI_372_es_2024 e, sin revisión registrada)

    - Manual de Usuario CAD-250 (MU_376_es_2024 f, sin revisión registrada)

    - Manual de Software de Configuración CAD-250 (MS-416-es-2026-b, rev. b)


    ---


    También puedo ayudarte con: **configuración de lazos y dispositivos**, **creación
    de maniobras** o **gestión de usuarios y contraseñas** en la CAD-250.'
