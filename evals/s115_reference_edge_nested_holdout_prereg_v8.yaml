potential_definition: >-
  A parsed explicit reference edge with at least one exact-section candidate that
  shares the served row's valid document_id and extraction_sha256.
false_negative_classes:
  selector_false_negative: valid unique byte anchor and decisive contract-bearing evidence exists
  upstream_unresolvable: relevant content exists but no valid byte-backed section anchor/provenance exists

single_unseal_rules:
  - Freeze implementation, config, tests, runner and runner-test hashes first.
  - Do not inspect nested question text, candidates or results before that freeze.
  - Audit every selected card and every potential-not-selected edge.
  - Ambiguous counts as non-relevant.
  - Require zero high/medium contamination and zero visible selector_false_negative.
  - Report upstream_unresolvable separately; never relax provenance to convert it.
  - Fewer than five selections or zero potentials is inconclusive and must not trigger tuning.
  - Any post-unseal selector or config change invalidates the smoke result.

authorization_boundary:
  local_shadow_implementation: allowed
  nested_unseal: not_yet_allowed
  answer_regression: not_allowed
  serving_integration: not_allowed
