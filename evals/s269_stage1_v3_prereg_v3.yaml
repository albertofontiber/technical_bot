    del fragmento citado NO es ruido — es la CONDUCTA OBJETIVO del contrato (s243 mandatory_safety_omission:
    el miss canónico es exactamente la respuesta que da el procedimiento y omite el callout adyacente);
    esos anexos se reportan aparte como mandatory_conduct_appends'
  scoring: por MUTACIÓN individual (átomo), no booleano de familia (C1); cobertura = filas puntuables
