binding_contract: 'v2 + apriete F-BUNDLE (adjudicaciones del coordinador post-seed-270 y post-seed-271):
  presencia PARCIAL por familia — F-RANGE ≥1 número PROPIO (extremos/paso/tolerancia, excl. 0/1) o scope-id;
  F-BUNDLE ≥2 tokens PROPIOS (miembros∪cabecera; p.ej. 1 de miembro + 1 de cabecera — paralelo del criterio
  número-o-2-tokens del resto); F-COUNT conteo declarado/enumerado o sustantivo; el solape genérico de
  anchors ya no liga. F-MANDATORY contrato propio: exigible con ≥2 tokens de contexto PROCEDIMENTAL del
  fragmento en la ventana; supresión de duplicados vía atom_satisfied; cap 4 intacto. Motivación taxonomy-derived
  s243: 11/12 misses = pérdida parcial dentro de estructura TOCADA + callouts obligatorios adyacentes
  a procedimientos que la respuesta da. Ver docstring de src/rag/must_preserve.py::atom_exigible_in'
