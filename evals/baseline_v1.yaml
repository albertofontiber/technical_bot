# Baseline eval set for the PCI Technical Bot — v1 (17 Apr 2026)
# =================================================================
# Purpose:
#   Give the bot a repeatable, measurable benchmark. Every meaningful
#   change (chunker, retriever, reranker, prompt, translation, re-ingest)
#   must run this eval before/after and report the delta per category.
#
# IMPORTANT — this is a DRAFT for human review:
#   - Questions were drafted by the assistant based on (a) products known to
#     exist in the DB (see `scripts/run_ingestion.py` logs + manufacturer
#     breakdown), and (b) the question archetypes agreed with Alberto:
#     "programming, out-of-the-ordinary alarms, edge cases where a mid-level
#     technician would get stuck".
#   - Expected answers / keywords are the assistant's BEST GUESS from the
#     manuals. Alberto (or a technician) MUST validate them before the eval
#     is trustworthy. Marked `verified: false` by default; flip to `true` once
#     reviewed.
#
# Schema per question:
#   id                   — short unique identifier
#   category             — one of: happy_path | ambiguous_model | missing_context
#                                  | not_in_db | cross_manual
#   question_type        — programming | troubleshooting | wiring | spec |
#                          compatibility | procedure
#   question             — the query as a technician would phrase it in Spanish
#   expected_behavior    — answer | ask_clarification | admit_no_info
#   expected_keywords    — list of terms/values that MUST appear in the answer.
#                          Matching is substring + lowercased. For numeric specs,
#                          include the value (e.g. "24 vdc", "100 ma").
#                          OR-syntax: an entry with '|' is treated as any-of.
#                          Ex: "manual|documentación" counts as hit if either
#                          word appears. Use for legitimate synonyms the bot
#                          may substitute.
#   forbidden_keywords   — list of terms that MUST NOT appear (e.g. inventing
#                          a model the bot doesn't know). Optional.
#   expected_sources     — list of source_file substrings that should appear in
#                          the bot's citations. Optional (loosely enforced).
#   expected_has_diagram — true if the answer should include a diagram image.
#                          false if textual answer is enough. null if undecided.
#   verified             — set to true once Alberto or a technician has
#                          validated the expected_keywords / behavior.
#   notes                — optional rationale / edge cases / review comments
#
# Distribution target (stretches as we add more questions):
#   happy_path        ~40% (~20)
#   ambiguous_model   ~15% (~8)
#   missing_context   ~15% (~8)
#   not_in_db         ~15% (~8)
#   cross_manual      ~15% (~8)

version: 1
created: 2026-04-17
distribution_target:
  happy_path: 20
  ambiguous_model: 8
  missing_context: 8
  not_in_db: 8
  cross_manual: 8

questions:

