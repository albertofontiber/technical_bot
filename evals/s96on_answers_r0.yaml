- bot_answer: "# Configuración de una Maniobra (Causa-Efecto) en la CAD-250\n\n##\
    \ Concepto general\n\nUna maniobra es un conjunto de acciones programadas en función\
    \ de los estados del sistema (áreas, zonas, dispositivos). Los cambios de estado\
    \ se llaman **eventos** y a cada evento se le asocia una **acción** (activación\
    \ de sirenas, relés, etc.) [F4].\n\nLa estructura es siempre: **Entradas (Eventos)\
    \ → Lógica (Coincidencias) → Salidas (Acciones)** [F4].\n\n---\n\n## PASO 1 —\
    \ Acceder al menú de Maniobras\n\nNavega por el panel siguiendo esta ruta [F4]:\n\
    \n**MENÚ** → **MANIOBRAS** → pulsa **+AÑADIR** en la barra de navegación inferior\n\
    \n---\n\n## PASO 2 — Crear la maniobra\n\n1. Pulsa el botón **AÑADIR** en la pantalla\
    \ de Maniobras [F1].\n2. Se abre la pantalla de edición de la maniobra (ej: *Maniobra\
    \ 0001*) [F1].\n3. Configura el campo **Coincidencias**: indica cuántos eventos\
    \ deben cumplirse simultáneamente para que la salida se active [F1]:\n   - **Coincidencias\
    \ = 1** → lógica **OR**: cualquiera de los eventos activa la salida [F1].\n  \
    \ - **Coincidencias = N (igual al total de eventos)** → lógica **AND**: todos\
    \ los eventos deben cumplirse [F1].\n   - **Coincidencias = valor intermedio**\
    \ → lógica **N de M**: se deben cumplir N eventos cualesquiera de los M definidos\
    \ [F1].\n\n> ⚠️ La maniobra gestiona **eventos** (cambios de estado), no estados\
    \ estáticos. Es el cambio de estado el que dispara la condición [F2].\n\n---\n\
    \n## PASO 3 — Definir las entradas (Eventos)\n\n1. En la pantalla de edición de\
    \ la maniobra, pulsa **AÑADIR** en el margen inferior [F2].\n2. En la pantalla\
    \ emergente, selecciona **EVENTO** [F2].\n3. Se mostrará una nueva pantalla para\
    \ elegir el tipo de evento [F2]:\n\n   **Opción A — ENTIDAD:**\n   - Es cualquier\
    \ elemento de la jerarquía del sistema: instalación, panel, lazo, área, zona,\
    \ dispositivo, grupo o módulo virtual [F2].\n   - Puede ser un elemento del sistema\
    \ **local** (central actual) o de la **red** (cualquier central en red) [F2].\n\
    \   - Al configurar el evento de entidad, define el parámetro **REPETICIONES**:\
    \ número de elementos de esa entidad que deben cumplir la condición para que la\
    \ entrada sea verdadera [F2].\n   - Desde la versión **1.1.1** también es posible\
    \ seleccionar un **elemento de salida** como condición de entrada (el cambio a\
    \ condición de avería activa la entrada). Para ello, desmarca la casilla **\"\
    Sólo dispositivos de entrada\"** [F5].\n\n   **Opción B — CONDICIÓN TEMPORAL:**\n\
    \   - Permite establecer un periodo de tiempo durante el cual la ecuación de entrada\
    \ sea verdadera [F2].\n\n4. Puedes añadir **tantos eventos como necesites** repitiendo\
    \ este paso [F5].\n5. Para cada evento añadido, edita sus premisas haciendo **doble\
    \ clic** sobre él o seleccionándolo y pulsando **EDITAR** [F5]. Un evento es verdadero\
    \ cuando se cumplen **todas** las premisas establecidas para ese evento [F5].\n\
    \n> ℹ️ El número máximo de maniobras entre eventos y acciones es de **100.000**\
    \ [F2].\n\n---\n\n## PASO 4 — Definir las salidas (Acciones)\n\n1. En la misma\
    \ pantalla de edición de la maniobra, pulsa de nuevo **AÑADIR** en el margen inferior\
    \ [F3].\n2. En la pantalla emergente, selecciona **ACCIÓN** [F3].\n3. Se presentan\
    \ dos campos a configurar [F3]:\n\n   - **Retraso:** tiempo de espera antes de\
    \ ejecutar la acción. Admite hasta **600 segundos** [F3].\n   - **Entidad:** elemento\
    \ del sistema local (panel, lazo, área, zona, dispositivo, grupo o módulo virtual)\
    \ sobre el que se ejecutará la acción [F3].\n\n4. En la pantalla **ACCIÓN DE LA\
    \ ENTIDAD** configura [F3]:\n   - **Retraso:** puedes modificar aquí el valor\
    \ definido anteriormente [F3].\n   - **Tipo:** identifica la acción y el tipo\
    \ de elemento al que se aplicará dentro de la entidad [F3].\n\n5. Repite el paso\
    \ para añadir tantas acciones como necesites.\n\n> ⚠️ Las acciones siempre son\
    \ relativas a la **entidad local** seleccionada (no admiten entidades en red como\
    \ destino de acción) [F3].\n\n---\n\n## Resumen del flujo completo\n\n```\nMENÚ\
    \ > MANIOBRAS > AÑADIR\n       ↓\n  Configurar Coincidencias (lógica OR / AND\
    \ / N de M)\n       ↓\n  AÑADIR > EVENTO > ENTIDAD o CONDICIÓN TEMPORAL\n  (repetir\
    \ para cada entrada)\n       ↓\n  AÑADIR > ACCIÓN > Retraso + Entidad + Tipo\n\
    \  (repetir para cada salida)\n```\n\n---\n\n**Fuente:** CAD-250 Manual de Configuración\
    \ MC-380-es-2026-c (rev. c, 2026-04-23); CAD-250 Manual Software de Configuración\
    \ MS-416-es-2026-b (rev. b)\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de Grupos**, **creación de Módulos Virtuales** o **uso de Condiciones Temporales**\
    \ en maniobras de la CAD-250."
