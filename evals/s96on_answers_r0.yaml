- bot_answer: '## Añadir un nuevo detector al lazo en la DXc tras la puesta en marcha


    El proceso se divide en dos partes: **conexión física** y **reconocimiento por
    software**.


    ---


    ### PARTE 1 — Conexión física del detector


    1. **Corta el cable del lazo** en el punto donde vayas a insertar el nuevo detector.
    No puentees los terminales en ningún punto del lazo [F4].

    2. Conecta el detector respetando la polaridad positivo/negativo [F3].

    3. Si el nuevo detector queda entre aisladores de cortocircuito, verifica que
    no superas **32 sensores/pulsadores entre aisladores** [F3].

    4. Asegúrate de que el lazo sigue cerrado en bucle (salida y retorno conectados
    a la placa base) [F3].


    ---


    ### PARTE 2 — Reconocimiento del nuevo equipo (Autobúsqueda)


    Cuando la central detecte el nuevo detector, generará el evento **"EQUIPO NUEVO"**
    [F2]. Para aceptarlo:


    1. Accede al menú de **Lazos** y pulsa la tecla **''2''** para seleccionar **''Autobúsqueda''**
    [F1].

    2. Si la central tiene más de un lazo, introduce el número de lazo correspondiente
    y pulsa **⊙** [F1].

    3. Confirma la autobúsqueda pulsando **⊙** cuando aparezca el mensaje de confirmación
    [F1].

    4. Espera a que finalice el proceso (se muestra una barra de progreso en pantalla)
    [F1].

    5. Al terminar, verifica en el resumen que el contador **"Nuevos"** refleja el
    detector añadido y que el tipo de equipo es correcto [F1].

    6. Pulsa **⊞** para salir y volver al menú de Lazo [F1].


    > ⚠️ **Importante:** Si en tu instalación el protocolo es seleccionable y has
    realizado algún cambio de protocolo, espera **dos minutos** antes de lanzar la
    autobúsqueda [F1].


    ---


    ### Posibles eventos tras la adición


    - **EQUIPO NUEVO** → Normal al añadir un detector. Se resuelve con la autobúsqueda
    [F2].

    - **DOBLE DIRECCION** → Dos equipos responden a la misma dirección. Cambia la
    dirección de uno de ellos [F2].

    - **NO RESPONDE** → El equipo no se encuentra. Comprueba que el lazo está cerrado
    y el detector bien conectado [F2].


