- bot_answer: '## Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe


    > **Nota previa:** Los fragmentos recuperados corresponden a los modelos **ZXAE/ZXEE**
    [F1][F2] y **ZX2e/ZX5e** [F3][F4], que son las variantes de la familia ZX con
    documentación disponible. El principio de conexionado es el mismo en ambas. Confirma
    tu modelo exacto si necesitas datos específicos de terminales.


    ---


    ### Principio de funcionamiento del circuito


    - Las salidas de sirena son **supervisadas** mediante una corriente inversa que
    lee la **resistencia final de línea (RFL) de 6.800 Ω, 0,5 W mínimo** [F2].

    - En reposo, el circuito se polariza en **inverso** para supervisar la línea.
    Al activarse la alarma, la polaridad cambia a la normal y las sirenas disparan
    [F4].

    - Cada salida tiene un **consumo máximo de 1 A** [F2].


    ---


    ### Pasos de conexionado


    1. **Conecta las sirenas en serie/cadena** desde los terminales `+` y `−` de la
    salida correspondiente (Salida A, B, C o D según modelo) [F2].


    2. **Respeta la polaridad** en cada sirena polarizada: conecta `+` al `+` y `−`
    al `−` de cada dispositivo [F1][F2].


    3. **Sirenas sin polaridad (campanas):** instala un **diodo** entre el terminal
    `+` de la línea y uno de los terminales de alimentación de la campana, para evitar
    consumo durante la supervisión en inverso [F2][F4].


    4. **Instala la RFL al final de la línea:** coloca la resistencia de **6.800 Ω,
    0,5 W mínimo** entre `+` y `−` de la **última sirena** de la cadena [F2].


    5. **Si no hay sirenas conectadas** en una salida, instala igualmente la RFL directamente
    en los terminales de la central [F2].


    6. **No realices ramales (derivaciones paralelas):** la supervisión se realiza
    sobre la línea directa hasta la RFL; los ramales paralelos **no serán supervisados**
    [F1].


    7. **No enrolles el cable en los terminales:** corta y empalma las conexiones
    adecuadamente para mantener la supervisión de la línea [F3].


    ---


    ### Terminales físicos según modelo


    **ZXAE** (2 salidas: A y B) [F2]:

    - Terminales en bloque inferior de placa, etiquetados `SOUNDERS` / `A+ A- B+ B-`


    **ZXEE** (4 salidas: A, B, C y D) [F2][F5]:

    - Terminales en **TB7**: `S,A+ / S,A- / S,B+ / S,B- / S,C+ / S,C- / S,D+ / S,D-`


    **ZX2e** (2 salidas: A y B) [F4]:

    - Terminales etiquetados `SOUNDERS` / `A+ A- B+ B-`


    **ZX5e** (4 salidas: A, B, C y D) [F4]:

    - Terminales en **TB7**: `A- A+ B- B+ C- C+ D- D+`


    ---


    ### Advertencias clave


    - ⚠️ **Sección mínima de cable: 1,5 mm²**. Secciones inferiores o longitudes excesivas
    provocan caídas de tensión en la línea [F2].

    - ⚠️ Para la **ZX2e/ZX5e**, no se recomienda cable de longitud superior a **1
    km**; por encima de esa longitud, la capacitancia e inductancia pueden afectar
    al funcionamiento [F3].

    - ⚠️ Verifica el consumo total de la central con todas las sirenas activadas para
    no superar el límite de **1 A por circuito** [F2].


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada);
    Manual de Instalación ZX2e/ZX5e — DOC.MIE-MI-530, Revisión 001 (sin revisión registrada)'
