- bot_answer: '# Cableado y configuración de lazo — INSPIRE E10/E15


    ---


    ## 1. MÓDULO DE LAZO (OPAL X2)


    El módulo de doble lazo tiene referencia **HOP-433-100** [F2] y código de color
    **morado** [F2]. Proporciona dos circuitos de lazo independientes con los siguientes
    terminales [F2][F3]:


    **Lazo 1:**

    - Terminal **1**: Lazo 1 Salida +VE (OUT +VE)

    - Terminal **2**: Lazo 1 Salida -VE (OUT -VE)

    - Terminal **3**: ⊕ — **NO usar para pantalla de cable**

    - Terminal **4**: Lazo 1 Entrada +VE (IN +VE)

    - Terminal **5**: Lazo 1 Entrada -VE (IN -VE)


    **Lazo 2:**

    - Terminal **6**: Lazo 2 Salida +VE (OUT +VE)

    - Terminal **7**: Lazo 2 Salida -VE (OUT -VE)

    - Terminal **8**: ⊕ — **NO usar para pantalla de cable**

    - Terminal **9**: Lazo 2 Entrada +VE (IN +VE)

    - Terminal **10**: Lazo 2 Entrada -VE (IN -VE)


    > ⚠️ **La pantalla del cable de lazo debe conectarse a la barra de tierra de la
    central, NO a los terminales 3 u 8** [F2][F3].


    ---


    ## 2. NUMERACIÓN DE LAZOS


    Los circuitos de lazo se numeran **secuencialmente de izquierda a derecha** del
    portamódulos [F2]. El primer módulo instalado en la ranura izquierda tiene los
    lazos 1 y 2; los siguientes módulos continúan la numeración. En la **E15**, la
    segunda fila de portamódulos continúa la numeración desde la primera fila [F2].


    ---


    ## 3. CAPACIDAD POR LAZO


    **Modo OPAL** [F2][F4]:

    - Hasta **159 detectores OPAL** por lazo

    - Hasta **159 módulos OPAL** por lazo (sirenas, pulsadores, módulos E/S)

    - Corriente máxima: **750 mA por lazo** [F2]


    **Modo CLIP** (requiere licencia) [F4]:

    - Hasta **99 detectores CLIP** por lazo

    - Hasta **99 módulos CLIP** por lazo


    > ⚠️ **No se permite mezclar dispositivos OPAL y CLIP en el mismo lazo** [F2].


    > ⚠️ **Restricción EN54-2, art. 13.7**: máximo **512 detectores y/o pulsadores**
    por módulo de lazo (los 2 circuitos en conjunto) [F2].


    **Longitud máxima de cable**: hasta **3,5 km** dependiendo del tipo de carga y
    cable [F2]. Calcular siempre con el **programa de cálculo de lazo y batería de
    CLSS** [F2].


    ---


    ## 4. PROCEDIMIENTO DE CABLEADO


    ### Paso previo — Comprobación antes de conectar


    1. Utiliza la herramienta **POL-200-TS** (recomendada) para comprobar y medir
    el circuito de lazo **antes** de conectar los cables a los terminales de la central
    [F5]. La herramienta **POL-200** funciona tanto en protocolo OPAL como CLIP [F5].


    ### Para lazo OPAL [F5]:

    1. Comprueba el cableado del lazo con el multímetro / POL-200-TS.

    2. Una vez verificado que es correcto, conecta el circuito al bloque de terminales
    del lazo seleccionado en la central (terminales 1-2 / 4-5 para lazo 1, o 6-7 /
    9-10 para lazo 2) [F5][F3].

    3. Conecta la pantalla del cable a la **barra de tierra** [F5].


    ### Para lazo CLIP [F5]:

    1. Verifica el cableado del lazo.

    2. Vuelve a conectar los **aisladores desconectados temporalmente**, los módulos
    de lazo y los pulsadores.

    3. Conecta el circuito al bloque de terminales de lazo seleccionado en la central
    [F5].


    ---


    ## 5. CONFIGURACIÓN (ALTA EN SOFTWARE CLSS)


    ### Lazo sin uso:

    Si un circuito de lazo **no se va a utilizar**, marca la casilla ☑ **"Sin Uso"**
    en **"Configuración de tarjeta de lazo"** dentro del programa de configuración
    **CLSS** [F1].


    ### Primer encendido [F1]:

    1. Realiza el primer encendido **sin cableado externo conectado**, pero con la
    fuente de alimentación y un circuito de lazo probado conectado.

    2. Conecta el cableado del lazo y el cable HMI de la puerta a la CPU.

    3. Conecta la corriente principal y las baterías (**2 x 12 V 24 Ah** para E10/E15)
    [F1].


    > ⚠️ Toma precauciones para evitar la activación inadvertida de equipos conectados
    (módulos con salidas a centros de control, etc.) durante el encendido [F1].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha INSPIRE E10/E15)

    - HOP-138-9ES issue 5, 11-2025 (Manual de instalación INSPIRE E10/E15)


