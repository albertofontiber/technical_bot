- bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura dentro de las **reglas
    de causa-efecto**. No existe un único parámetro global de "retardo de alarma principal";
    el retardo se define por regla y se le asigna un **tipo de retardo** [F1].


    ---


    ### Paso 1 — Acceder a la programación de causa-efecto


    El retardo se configura en la **matriz de causa-efecto** (Apéndice 5 del manual
    de configuración) [F1]. Cada regla puede tener asignado un retardo de salida con
    un tipo específico.


    ---


    ### Paso 2 — Seleccionar el tipo de retardo


    A cada regla se le asigna uno de los siguientes **seis tipos de retardo de salida**
    [F1][F2]:


    - **Fijo**: No silenciable, no ampliable, no muestra cuenta atrás en LCD.

    - **Estándar**: Silenciable con SILENCIAR SIRENAS, anulable en nivel 2, muestra
    cuenta atrás.

    - **No Silenc.**: No silenciable con SILENCIAR SIRENAS, pero sí anulable en nivel
    2, muestra cuenta atrás.

    - **Est. Ext.**: Silenciable, ampliable con AMPLIAR RETARDO, anulable en nivel
    2, muestra cuenta atrás.

    - **RetExtStd**: Silenciable, inicia temporizador de RETARDO AMPLIADO, anulable
    en nivel 2, muestra cuenta atrás.

    - **No Sil. Ext**: No silenciable, pero ampliable con AMPLIAR RETARDO, anulable
    en nivel 2, muestra cuenta atrás.

    - **SinRetExt**: No silenciable, inicia temporizador de RETARDO AMPLIADO, anulable
    en nivel 2, muestra cuenta atrás [F2].


    ---


    ### Paso 3 — Comportamiento durante el retardo activo


    Cuando el retardo está activo, el **LED de RETARDO ACTIVO** se enciende en el
    panel [F3]. El tiempo restante se muestra en la **pestaña ALARMA** (excepto en
    tipo Fijo) [F2].


    Acciones disponibles según nivel de acceso [F4]:

    - Tecla **AMPLIAR RETARDO** (nivel de acceso 2): extiende el retardo con un segundo
    temporizador, normalmente más largo que el primero.

    - Tecla **FIN RETARDO** (nivel de acceso 1): finaliza el retardo e introduce la
    condición de alarma completa.


    ---


    ### Paso 4 — Anular/habilitar retardos en operación


    Si necesitas anular temporalmente todos los retardos configurados (sin reprogramar):


    1. Accede al **Menú Anular/Habilitar**.

    2. Selecciona **«5: Retardo Activación Salidas»** [F3].

    3. Pulsa **✓** para cambiar el estado entre HABILITADO y ANULADO [F3].

    4. Pulsa **✕** para salir [F3].


    ---


    ### Paso 5 — Verificar el pulsador AMPLIAR RETARDO


    Si el pulsador AMPLIAR RETARDO no está operativo, comprueba el parámetro **«10:
    Extend Delay Button»** en **Editar Parámetros de la Central** — debe estar en
