eligible_relation_contract:
  required:
    - exact source span from one governed extraction
    - normalized subject and object, with at least one exact object mention
    - explicit directional predicate in the source
    - polarity preserved
    - qualifiers preserved when stated
    - document_id, extraction_sha256, chunk_id, offsets and quote hash
  allowed_predicate_families:
    - supports
    - compatible_with
    - listed_for
    - requires
    - uses_protocol
    - connects_to
    - excludes
  forbidden_inference:
    - shared protocol implies compatibility
    - matching voltage or topology implies compatibility
    - relation reciprocity
    - transitive compatibility
    - combining independent statements into a new direct relation
  fail_closed_when:
    - subject or object is unresolved
    - direction is unclear
    - statement is recommendation-free descriptive proximity only
    - exact evidence crosses unrelated chunks

census_method:
  stage_1: deterministic local candidate scan of headings, tables, lists and sentences
  stage_2: source-first adjudication against the frozen eligibility contract
  outputs:
    - every candidate with exact receipts and disposition
    - deduplicated eligible relations
    - counts by relation-closed class and predicate
  no_tuning_after_results: true

gate:
  go_requires:
    minimum_eligible_relations: 5
    minimum_relation_closed_classes: 3
    exact_provenance_rate: 1.0
    hard_negative_acceptances: 0
  no_go_otherwise: true
  authorizes_on_go: deterministic offline extractor design only
  never_authorizes:
    - production integration
    - network probe
    - database writes
    - model extraction
    - facts moved to OK

budget:
  model_calls: 0
  network_calls: 0
  database_reads: 0
  database_writes: 0
