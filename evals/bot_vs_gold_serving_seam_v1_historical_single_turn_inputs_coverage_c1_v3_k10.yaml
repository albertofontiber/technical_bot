    minutos si hubo cambio de protocolo. Queda incompleto frente al gold porque no
    detalla el acceso a Nivel 3 ni el desbloqueo de memoria, no menciona la edición
    posterior del equipo ni el evento ''EQUIPO NUEVO'', y añade notas/fragmentos de
    evidencia algo confusos.'
  bot_sources:
