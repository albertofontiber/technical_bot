  release_profile: coverage_c1_v3
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe


    ## Terminales de conexión


    **ZX2e:** Los circuitos de sirena se ubican en el bloque de terminales etiquetado
    **"AUX RELAY A+ A- B+ B- SOUNDERS"** / **"B+ B- A+ A-"** [F2].


    **ZX5e:** Los circuitos de sirena se ubican en el bloque **TB7**, con terminales
    etiquetados **A- A+ B- B+ C- C+ D- D+** [F2].


    ---


    ## Requisitos previos obligatorios


    Antes de conectar, ten en cuenta estos puntos críticos:


    1. **Diodo integrado en cada sirena:** Cada sirena deberá tener un diodo integrado
    para impedir el consumo en polarización inversa. El circuito se polariza en inverso
    en reposo para supervisar la línea, y cambia a polarización normal al dispararse
    [F2].


    2. **Dispositivos no polarizados:** Si conectas dispositivos no polarizados a
    la línea de sirenas, deberán usarse **diodos de polarización y protección en cada
    uno** [F2].


    3. **Resistencia final de línea (RFL):** Debe instalarse una resistencia de **6,8
    kΩ, 0,5 W mínimo** al final de cada circuito para la supervisión ante cortocircuito
    y circuito abierto [F11].


    4. **Corriente máxima por circuito:** Cada circuito admite un consumo máximo de
    **1 A** [F11].


    ---


    ## Esquema de conexión (Figura 15)


    Según el diagrama de la **Figura 15 – Circuito de sirenas convencionales** [F1]:


    - **SIRENA A (+)** → hilo positivo (rojo) conectando las sirenas en serie → **RFL
    (6800 Ω)** al final

    - **SIRENA A (-)** → hilo negativo (negro) en paralelo por debajo

    - Igual para **SIRENA B (+) / SIRENA B (-)** [F1]


    ---


    ## Advertencias de instalación


    - **No enrolles el cable en los terminales.** Corta y empalma las conexiones adecuadamente
    para mantener la supervisión de la línea [F1].

    - **Longitud máxima recomendada:** No se recomienda cable superior a **1 km**;
    por encima de esa longitud, la capacitancia e inductancia del lazo pueden afectar
    al funcionamiento [F1].

    - Asegúrate de que la sección del cable garantiza la alimentación de las sirenas
    a las tensiones recomendadas por el fabricante, tanto en alimentación principal
    como en condiciones de **mínima tensión de baterías** (consulta las tablas 10
    y 11 del manual) [F1].


    ---


    ## Supervisión de averías


    Cualquier fallo en la línea de sirena (circuito abierto, cortocircuito) se mostrará
    en pantalla con un mensaje del tipo:


    ```

    !ATENCION!  CIRCUITO ABIERTO SIRENA B

    ```

    [F3]


    ---


    Fuente: Manual de Instalación Paneles de Incendio ZX2e/ZX5e — MIE-MI-530rv001
    (sin revisión registrada); Manual de Configuración ZX2e/ZX5e — MIE-MP-530rv001
    (sin revisión registrada)


    ---

    📖 **Información adicional del manual:**

    - "- SIRENA A (+) - red line connecting four circular siren devices in series,
    ending with RFL (6800Ω) resistor

    - SIRENA A (-) - black line running parallel below, with notation "Equipo no polarizado"
    (non-polarized equipment) with symbol" [F1]

    - "- SIRENA B (+) - red line connecting four circular siren devices in series,
    ending with RFL (6800Ω) resistor

    - SIRENA B (-) - black line running parallel below" [F1]'
