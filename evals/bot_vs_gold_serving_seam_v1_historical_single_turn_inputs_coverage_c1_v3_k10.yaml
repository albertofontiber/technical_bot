  bot_answer: "# Configuración de una maniobra completa en la CAD-250\n\n> ⚠️ La programación\
    \ de maniobras es una de las funciones más críticas de la configuración del sistema.\
    \ Requiere conocimiento específico del sistema instalado, del plan de protección\
    \ y del producto [F5].\n\n---\n\n## Concepto general\n\nUna maniobra es un conjunto\
    \ de acciones programadas en función de los estados del sistema, áreas, zonas\
    \ o dispositivos. La estructura es siempre [F1]:\n\n- **Entradas** (Eventos) →\
    \ **Lógica** (Coincidencias, Negación, Retardos) → **Salidas** (Acciones)\n\n\
    El sistema soporta hasta **100.000 entradas y salidas** configuradas en distintas\
    \ maniobras [F10].\n\n---\n\n## PASO 1 — Crear la maniobra\n\n**Desde el panel\
    \ táctil (MC-380):**\n\n1. Accede a **MENÚ > MANIOBRAS** [F1]\n2. Pulsa **+AÑADIR**\
    \ en la barra de navegación inferior [F1]\n3. Se abre la pantalla de edición de\
    \ la maniobra. El contador muestra el número de maniobra actual [F4]\n\n**Desde\
    \ el software de configuración (MS-416):**\n\n1. Accede a la ventana de **MANIOBRAS**\
    \ [F10]\n2. Pulsa **NUEVO** [F10]\n\n---\n\n## PASO 2 — Definir el campo COINCIDENCIAS\n\
    \nAntes de añadir eventos, configura el campo **Coincidencias**: indica cuántos\
    \ eventos deben cumplirse simultáneamente para que la maniobra se ejecute [F4]:\n\
    \n- **Coincidencias = 1** → lógica **OR**: cualquiera de los eventos activa la\
    \ salida [F4]\n- **Coincidencias = 2** (con 2 eventos) → lógica **AND**: ambos\
    \ eventos deben cumplirse [F4]\n- **Coincidencias = N de M** → N eventos cualesquiera\
    \ de los M configurados deben cumplirse [F4]\n\n---\n\n## PASO 3 — Añadir EVENTOS\
    \ (entradas)\n\n1. Pulsa **AÑADIR** en el margen inferior de la pantalla [F2]\n\
    2. En la pantalla emergente, selecciona **EVENTO** [F2]\n3. Elige el tipo de evento\
    \ [F2]:\n   - **ENTIDAD**: cualquier elemento de la jerarquía del sistema\n  \
    \ - **CONDICIÓN TEMPORAL**: un periodo de tiempo como condición\n\n### Si eliges\
    \ ENTIDAD:\n\nSelecciona el **origen** de la entidad [F5] [F7]:\n- **Local** o\
    \ **Red** (cualquier central del sistema en red) [F2]\n- Nivel jerárquico: Instalación,\
    \ Panel, Lazo, Área, Zona, Dispositivo, Grupo o Módulo virtual [F5]\n\nConfigura\
    \ los parámetros del evento [F7]:\n\n- **Condición de estado** — qué estado hace\
    \ verdadero el evento:\n  - *Alarma*: uno o más elementos en alarma [F7]\n  -\
    \ *Avería*: uno o más elementos en avería [F7]\n  - *Técnico*: una o más entradas\
    \ activas [F7]\n\n- **Condición de tipo** — restringe qué dispositivo activa el\
    \ evento [F7]:\n  - *Todos*: cualquier dispositivo activo\n  - *Pulsadores*: únicamente\
    \ pulsadores\n  - *Detectores*: únicamente detectores\n  - *Entrada*: únicamente\
    \ entradas\n\n- **Repeticiones** — número de veces que el evento debe repetirse\
    \ en la entidad para que la entrada sea válida. Valor entero hasta **9999** [F5]\
    \ [F7]. Ejemplo: zona en alarma con 3 repeticiones → condición verdadera cuando\
    \ 3 detectores estén en alarma [F7]\n\n- **Lógico** — estado lógico de la condición\
    \ [F5] [F7]:\n  - *Normal*: la condición de estado es verdadera\n  - *No (Negado)*:\
    \ la condición de estado es falsa (p.ej. \"no hay alarma\")\n\n> **Nota (software\
    \ MS-416):** Desde la versión **1.1.1** es posible seleccionar un elemento de\
    \ salida como condición de entrada. En ese caso, será el cambio a condición de\
    \ avería el que hará verdadera la condición entrante. Para ello, desmarca la casilla\
    \ **\"Sólo dispositivos de entrada\"** [F6].\n\n### Si eliges CONDICIÓN TEMPORAL:\n\
    \nConfigura el periodo de tiempo bajo el cual la ecuación de entrada es válida\
    \ [F8] [F9]:\n\n- **Desde mes / Hasta mes**: intervalo en meses\n- **Desde día\
    \ / Hasta día**: intervalo en días de la semana\n- **Desde hora / Hasta hora**:\
    \ franja horaria\n- **Lógico**:\n  - *Normal*: el periodo definido hace la condición\
    \ verdadera\n  - *No*: el periodo definido hace la condición falsa\n\nPulsa **GUARDAR**\
    \ para confirmar o **CANCELAR** para deshacer [F8].\n\nPuedes añadir tantos eventos\
    \ como necesites. Un evento es verdadero cuando se cumplen **todas** las premisas\
    \ establecidas para ese evento [F6].\n\n---\n\n## PASO 4 — Añadir ACCIONES (salidas)\n\
    \n1. Pulsa **AÑADIR** en el margen inferior de la pantalla [F3]\n2. En la pantalla\
    \ emergente, selecciona **ACCION** [F3]\n3. Configura los parámetros de la acción\
    \ [F3] [F5] [F8]:\n\n- **Retraso**: tiempo de espera antes de ejecutar la acción,\
    \ configurable entre **0 y 600 segundos** [F5] [F8]. El retardo se inicia a partir\
    \ del momento en que la condición de entrada es verdadera [F5]\n\n- **Entidad\
    \ de destino** (solo entidades locales) [F3] [F10]:\n  - Panel, Lazo, Área, Zona,\
    \ Dispositivo, Grupo o Módulo virtual\n\n- **Tipo de acción** [F5] [F8]:\n  -\
    \ *Activar*: activa las salidas\n  - *Desactivar*: desactiva las salidas\n  -\
    \ *Habilitar*: habilita la entidad\n  - *Deshabilitar*: deshabilita la entidad\n\
    \  - *Test*: pone en modo test la entidad\n  - *Reiniciar*: reinicia la entidad\n\
    \  - *Pulso*: acción de pulso sobre la entidad\n\n- **Tipo de elemento** sobre\
    \ el que aplica la acción [F5]:\n  - Todos, Sirenas, Relés, Sirena discontinua\n\
    \n> ⚠️ Las acciones siempre son relativas a la entidad seleccionada. El programa\
    \ **no permite mezclar acciones sobre entidades de paneles diferentes** [F10].\n\
    \n---\n\n## Elementos adicionales del menú de maniobras\n\nDesde el submenú **MANIOBRAS**\
    \ también están disponibles [F1]:\n\n- **Grupos**: asociaciones de elementos (áreas,\
    \ zonas, dispositivos) para facilitar la creación de reglas de actuación [F1]\n\
    - **Módulos virtuales**: permiten crear bucles interdependientes. Un conjunto\
    \ de entradas determina el estado del módulo virtual, que a su vez puede actuar\
    \ como entrada de otra maniobra [F1]\n- **Estado VM**: visualización y activación\
    \ de módulos virtuales, o uso como botones de acceso rápido desde la pantalla\
    \ principal [F1]\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración MC-380-es-2026-c\
    \ (rev. c, 2026-04-23)\n- CAD-250 Manual de Software de Configuración MS-416-es-2026-b\
    \ (rev. b)\n\n---\n\nTambién puedo ayudarte con: **configuración de Grupos**,\
    \ **programación de Módulos Virtuales** o **ejemplo práctico de maniobra doble\
    \ knock (2 detectores en alarma activan sirena)** en la CAD-250.\n\n---\n\U0001F4D6\
    \ **Obligaciones de evidencia del manual:**\n- \"Defina para cada salida el tipo\
    \ de acción que debe realizarse cuando todos las condiciones de los eventos de\
    \ entrada sean verdderas.\" (CAD-250_Manual-software-configuracion-MS-416-es-2026-b,\
    \ p. 54) [F8]\n- \"Seleccione el elemento de cualquiera de los dos cuadrid de\
    \ la maniobra, eventos o acciones y pulse este botón para borrarlo,\" (CAD-250_Manual-software-configuracion-MS-416-es-2026-b,\
    \ p. 56) [F10]\n- \"**Editar.** Seleccione el elemento de cualquiera de los dos\
    \ cuadrid de la maniobra, eventos o acciones y pulse este botón para entrar en\
    \ el menú de edición del elemento.\" (CAD-250_Manual-software-configuracion-MS-416-es-2026-b,\
    \ p. 56) [F10]"
