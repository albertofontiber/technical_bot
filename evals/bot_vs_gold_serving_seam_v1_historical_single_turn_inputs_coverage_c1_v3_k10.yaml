  bot_answer: "# Cableado y configuración de lazo — INSPIRE E10/E15\n\n---\n\n## PARTE\
    \ 1: CABLEADO FÍSICO DEL LAZO\n\n### Módulo de lazo OPAL X2 (HOP-433-100)\n\n\
    El módulo de lazo tiene **color morado** y dispone de 10 terminales [F2]:\n\n\
    **Lazo 1:**\n- Terminal **1** → Lazo 1 Salida +VE (OUT +VE)\n- Terminal **2**\
    \ → Lazo 1 Salida -VE (OUT -VE)\n- Terminal **3** → ⊕ (**NO USAR para pantalla\
    \ de cable**)\n- Terminal **4** → Lazo 1 Entrada +VE (IN +VE)\n- Terminal **5**\
    \ → Lazo 1 Entrada -VE (IN -VE)\n\n**Lazo 2:**\n- Terminal **6** → Lazo 2 Salida\
    \ +VE (OUT +VE)\n- Terminal **7** → Lazo 2 Salida -VE (OUT -VE)\n- Terminal **8**\
    \ → ⊕ (**NO USAR para pantalla de cable**)\n- Terminal **9** → Lazo 2 Entrada\
    \ +VE (IN +VE)\n- Terminal **10** → Lazo 2 Entrada -VE (IN -VE)\n\n> ⚠️ **La pantalla\
    \ del cable de lazo debe conectarse a la barra de tierra de la central, NO a los\
    \ terminales 3 u 8** [F2]. Se recomienda poner a tierra un solo extremo de la\
    \ pantalla [F11].\n\n> ⚠️ **No mezclar dispositivos OPAL y CLIP en el mismo lazo**\
    \ [F2].\n\n---\n\n### Capacidad del lazo [F2][F5]\n\n**Modo OPAL:**\n- Hasta **159\
    \ detectores OPAL** + **159 módulos OPAL** por lazo\n- Corriente máxima por lazo:\
    \ **750 mA**\n\n**Modo CLIP** (requiere licencia):\n- Hasta **99 detectores CLIP**\
    \ + **99 módulos CLIP** por lazo\n\n> ⚠️ **EN54-2 (13.7):** Restricción de **512\
    \ detectores y/o pulsadores** por módulo de lazo (2 circuitos) [F2].\n\n**Longitud\
    \ máxima del lazo:** hasta **3,5 km** dependiendo del tipo de carga y cable, calculada\
    \ con el programa CLSS [F2].\n\n---\n\n### Numeración de lazos [F2]\n\nLos circuitos\
    \ de lazo se numeran secuencialmente de **izquierda a derecha** del portamódulos.\
    \ El primer módulo de lazo instalado en la ranura izquierda tiene el lazo 1. En\
    \ la E15 (dos filas de portamódulos), la segunda fila continúa la numeración desde\
    \ la primera.\n\n---\n\n## PARTE 2: COMPROBACIONES PREVIAS AL ENCENDIDO\n\nAntes\
    \ de conectar el lazo a la central, realiza estas verificaciones con multímetro\
    \ [F6][F7][F8]:\n\n> ⚠️ **NUNCA uses un comprobador de alta tensión (megóhmetro)\
    \ en el circuito de lazo** [F6].\n\n1. Comprueba la **continuidad de cada parte\
    \ del lazo** y mide la resistencia extremo a extremo [F6].\n\n2. Comprueba la\
    \ **continuidad de la pantalla** del cable (debe dar resistencia muy baja) [F6].\n\
    \n3. Verifica que **no hay continuidad entre la pantalla y los cables +VE/-VE**\
    \ [F6].\n\n4. Con el multímetro en **función de prueba de diodo**, conecta en\
    \ **polaridad invertida** (+VE del multímetro al negativo del lazo, -VE al positivo).\
    \ Debe indicar **símbolo de diodo en polarización directa** [F7].\n\n5. Conecta\
    \ el multímetro en **polaridad normal** (+VE al positivo del lazo). Al principio\
    \ debe leer resistencia baja, que **aumenta progresivamente** al cargarse los\
    \ condensadores de los dispositivos [F7].\n   - Si indica diodo en polarización\
    \ directa en este paso → uno o varios dispositivos están conectados en **polaridad\
    \ inversa** o hay un cortocircuito [F7].\n\n6. Verifica los **límites de resistencia**\
    \ del lazo [F8]:\n   - Protocolo **OPAL**: resistencia < **40 Ω**\n   - Protocolo\
    \ **CLIP** (detección de dirección duplicada): < **40 Ω**\n   - Protocolo **CLIP**\
    \ (sin detección de dirección duplicada): < **71 Ω**\n   - Capacidad del cable:\
    \ < **0,5 µF** [F8]\n\n   > Para medir: mide entre \"Lazo X Entrada -VE\" y \"\
    Lazo X Salida -VE\" con el lazo desconectado de la central, multiplica el resultado\
    \ por 2 y añade la resistencia de cada aislador (**0,1 a 0,13 Ω** por aislador)\
    \ [F8].\n\n7. Para dispositivos OPAL con base **B501 AP**: al retirar el detector,\
    \ la continuidad se mantiene automáticamente por los terminales +2 y +4 de la\
    \ base [F8].\n   Para dispositivos CLIP: puentea temporalmente los terminales\
    \ **2 y 4 de cada aislador** [F8].\n\n8. Una vez verificado el cableado, **conecta\
    \ el circuito de lazo al bloque de terminales** del módulo correspondiente en\
    \ la central [F11].\n\n---\n\n## PARTE 3: CONFIGURACIÓN DEL LAZO (Software CLSS)\n\
    \n### Configuración inicial previa [F9]\n\n> ⚠️ Para lazos CLIP o TC800 OPAL/CLIP,\
    \ la central debe configurarse previamente con CLSS **antes** de realizar la Auto\
    \ Configuración. Por defecto, la central tiene licencia solo para **protocolo\
    \ OPAL avanzado** [F9].\n\n1. Conecta la herramienta de configuración CLSS a la\
    \ central [F10].\n\n2. Ve a **\"Ajustes\" → \"Ajustes HMI\"** y en **Tipo de marca**\
    \ selecciona **Notifier EN** [F9].\n\n3. En **\"Ajustes de lazo\"** [F9]:\n  \
    \ - Si el lazo **no se utiliza**: marca ☑ **Sin Uso**\n   - Si el lazo se utiliza:\
    \ selecciona **\"Limitar a VdS 2540\"** (Sí/No) — el valor de resistencia cambia\
    \ según la selección\n   - Selecciona el **tipo de cable**\n\n4. Envía la configuración\
    \ a la central (pasos \"Enviar configuración a la central\" del CLSS) [F9].\n\n\
    ---\n\n### Auto Configuración (búsqueda de dispositivos) [F10]\n\n1. En la central,\
    \ selecciona **Auto Configuración** para buscar dispositivos conectados al lazo.\
    \ Lee la ventana emergente y confirma seleccionando **Auto Configuración** / **Learn\
    \ Devices** [F10].\n\n   > Si no hay protocolo especificado en la configuración,\
    \ el lazo usará por defecto el **protocolo OPAL** [F10].\n\n2. Una vez completada\
    \ la búsqueda, selecciona la **flecha derecha (>)** junto al botón Auto Búsqueda\
    \ para ver el estado de averías del lazo [F10].\n\n3. Lee los **mensajes de avería**\
    \ y rectifica los problemas detectados. Las causas típicas son [F10]:\n   - Discordancia\
    \ entre diseño e instalación\n   - Averías en el cableado\n   - Presencia de fuente\
    \ de RFI\n   - Error de módulo o fuente de alimentación\n   - Conexionado incorrecto\
    \ en dispositivos\n\n4. Selecciona **Hecho** al completar. Si no hay averías,\
    \ vuelve a la página **Información del sistema** [F10].\n\n5. **Repite los pasos\
    \ 1 a 4 para cada lazo** hasta descubrir todos los lazos del sistema [F10].\n\n\
    ---\n\n**Fuentes:**\n- HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en\
    \ marcha INSPIRE E10/E15)\n- HOP-138-9ES issue 5, 11-2025 (Instrucciones de instalación\
    \ INSPIRE E10)\n- 4188-1132-ES issue 3, 04-2025 (Guía rápida CLSS-10)\n\n---\n\
    \nTambién puedo ayudarte con: **conexionado de módulos de E/S al lazo**, **interpretación\
    \ de mensajes de avería tras la Auto Configuración**, o **cálculo de resistencia\
    \ y longitud de lazo con CLSS**."
- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov
    CAD-250: como se crea, como se definen las entradas/eventos que la disparan y
    como se asignan las salidas?'
  gold_estado: verificado
