  bot_answer: "## Conexión del módulo de aislamiento de línea en lazo ID2000\n\n###\
    \ Requisitos de instalación (EN54-2)\n\nAntes de conectar el aislador, ten en\
    \ cuenta los límites obligatorios [F5]:\n\n- **Máximo 32 equipos de lazo** entre\
    \ aisladores (requisito EN54-2: 12.5.2) [F5]\n- **En la ID2000: máximo 25 equipos\
    \ entre aisladores** (o **20 si son aisladores tipo FET**) [F5]\n\n### Terminales\
    \ del aislador\n\nEl aislador dispone de **4 terminales numerados: 1, 2, 3 y 4**\
    \ [F1].\n\nPara las comprobaciones previas a la conexión, el manual indica que\
    \ se cortocircuitan los **terminales 2 y 4** de cada aislador para desconectarlos\
    \ temporalmente del lazo [F1].\n\n### Procedimiento de conexión\n\n1. **Antes\
    \ de conectar los aisladores**, realiza las comprobaciones de continuidad y aislamiento\
    \ del lazo con multímetro de baja tensión [F5]:\n   - ⚠️ **NUNCA uses un multímetro\
    \ de alta tensión (tipo \"Megger\") en el lazo** [F5]\n   - Las comprobaciones\
    \ de continuidad **deben realizarse antes de conectar los aisladores** [F5]\n\n\
    2. **Para las pruebas previas**, desconecta temporalmente los aisladores cortocircuitando\
    \ los **terminales 2 y 4** de cada aislador. El cableado del lazo debe estar desconectado\
    \ del panel durante este procedimiento [F1].\n\n3. **Comprueba la resistencia\
    \ del lazo**:\n   - La resistencia máxima del lazo no debe superar los **35 ohmios**\
    \ [F11]\n   - La capacidad del cable debe ser inferior a **0,5 µF** [F11]\n  \
    \ - La longitud total del par de lazo no puede exceder los **2000 metros** con\
    \ cable de **1,5 mm² de sección o superior** [F1]\n\n4. **Comprueba la polaridad**\
    \ con multímetro en modo prueba de diodo, en polaridad invertida (positivo al\
    \ lazo negativo, negativo al lazo positivo). Si indica un solo diodo polarizado,\
    \ algún equipo puede estar invertido [F1] [F12].\n\n5. **Conecta el cableado del\
    \ lazo al panel** una vez superadas las comprobaciones [F1].\n\n### Comportamiento\
    \ ante cortocircuito\n\nCuando se produce un cortocircuito entre dos aisladores,\
    \ el sistema lo señaliza como **'Posible corte'** [F6]. Los equipos instalados\
    \ entre los puntos de aislamiento aparecerán como **NO RESPONDE/PERDIDO**, o como\
    \ **PÉRDIDA PARCIAL DEL LAZO** si faltan más de tres equipos [F6].\n\n> ⚠️ **Nota\
    \ importante**: El manual indica que cada aislador viene acompañado de sus propias\
    \ instrucciones con las interconexiones adecuadas para cada aplicación [F5]. Consulta\
