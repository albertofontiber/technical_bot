  release_profile: coverage_c1_v3
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: "# ASD535 — Alarma de flujo bajo: diagnóstico\n\n## Causa más probable\n\
    \nUn valor de flujo **por debajo del 100 %** apunta a **obstrucción en el conducto\
    \ de aspiración** [F2]. Según la norma **EN 54-20**, una variación superior al\
    \ **±20 %** debe notificarse como fallo [F3]. El fallo se dispara cuando el flujo\
    \ cae **por debajo del 80 %**, una vez transcurrido el tiempo de retardo de **300\
    \ s** de la LS-Ü [F3].\n\n---\n\n## Procedimiento de diagnóstico paso a paso\n\
    \n### 1. Leer el valor de flujo actual\n\n- Coloca el conmutador en **posición\
    \ V** para leer el valor de flujo del conducto de aspiración [F6].\n- Compara\
    \ el valor leído con el protocolo de puesta en funcionamiento [F6].\n- **Referencia\
    \ de interpretación:**\n  - Valor **< 100 %** → apunta a **obstrucción** [F2]\n\
    \  - Valor **> 100 %** → apunta a **rotura de tubo** [F2]\n\n> ⚠️ Si la sensibilidad\
    \ LS-Ü está configurada en **±20 %** (estándar), realiza inspección del conducto\
    \ cuando el valor caiga **por debajo del 90 %** (la mitad de la sensibilidad)\
    \ [F6].\n\n---\n\n### 2. Verificar el código de evento\n\n- Coloca el conmutador\
    \ en **posición E** del AMB 35 para leer el código de evento [F4].\n- Para flujo\
    \ bajo, el código relevante es:\n  - **Código 001** — Obstrucción en conducto\
    \ de aspiración [F1]\n\n---\n\n### 3. Comprobaciones físicas del conducto (código\
    \ 001)\n\nSegún el código **001** [F1]:\n\n1. Comprobar si los **orificios de\
    \ aspiración** están obstruidos [F1]\n2. Comprobar la **salida de aire** del ASD\
    \ [F1]\n3. **Inspeccionar y limpiar la caja de filtro / unidad de filtrado** [F1]\n\
    4. **Inspeccionar y limpiar el sensor de flujo de aire** [F1]\n\n---\n\n### 4.\
    \ Comprobaciones adicionales de mantenimiento\n\nAbre la cubierta de la caja del\
    \ detector (**atención: conexión de cable plano**) [F6] y verifica:\n\n- **Tensión\
    \ de servicio** en bornes **1 (+) y 2 (−)**:\n  - Valor nominal: **12,3 a 13,8\
    \ V CC** (funcionamiento a 12 V CC)\n  - Valor nominal: **21,6 a 27,6 V CC** (funcionamiento\
    \ a 24 V CC) [F6]\n- Comprobar que la **entrada del conducto de aspiración** y\
    \ los tapones de tubo del orificio de entrada no utilizados están en posición\
    \ correcta [F6]\n- Comprobar si existe **suciedad en la salida de aire** y limpiarla\
    \ si es necesario [F6]\n- Si el ASD vigila equipos con transiciones de tubo rígido\
    \ a flexible, verificar que **no hay fugas** en dichas transiciones [F6]\n\n---\n\
    \n### 5. Si el sensor de flujo está implicado\n\n- **Código 004** — Parámetros\
    \ LS-Ü no válidos: inspeccionar y limpiar el sensor de flujo; si está defectuoso,\
    \ **sustituirlo** [F1]\n- **Código 008** — Sensor de flujo defectuoso/inexistente:\
    \ verificar cable de conexión; si el sensor está defectuoso, **sustituirlo** [F1]\n\
    \n---\n\n### 6. Tras la intervención\n\n- Realizar un **reset inicial** del ASD\
    \ 535 (preferentemente desde la CDI) [F5]\n- Devolver el conducto de aspiración\
    \ a su estado original (abrir orificios tapados, cerrar orificio de inspección)\
    \ [F5]\n- Desbloquear el control de incendios y la alerta remota en la CDI [F6]\n\
    \n> ⚠️ **Importante:** Antes de cualquier trabajo de mantenimiento, bloquear o\
    \ desconectar el control de incendios y la alerta remota en la CDI para evitar\
    \ disparos no deseados [F6].\n\n---\n\n**Fuente:** ASD535_TD_T131192es_h (sin\
    \ revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **procedimiento de\
    \ reset inicial del ASD535**, **limpieza de sensores de humo** o **prueba funcional\
    \ de monitorización de flujo** (sección 7.7).\n\n---\n⚠️ **Información adicional\
    \ del manual:**\n- \"Para evitar que los controles de incendios, las alertas remotas\
    \ y las zonas de extinción se disparen al llevar a cabo los trabajos de mantenimiento,\
    \ es **imprescindible** bloquearlos o desconectarlos previamente.\" [F6]\n- Nota:\
    \ el manual también indica: \"1. Bloquear o desconectar el control de incendios\
    \ y la alerta remota en la CDI de orden superior.\n2. La tensión de alimentación\
    \ de la CDI debe estar configurada para la central conforme a la normativa de\
    \ mantenimiento.\n3. Debe comprobarse que la entrada del conducto de aspiración\
    \ y los tapones de tubo del orificio de entrada de la caja del detector que no\
    \ está en uso (ASD 535-1 y ASD 535-3) están en la posición correcta.\n4. Debe\
    \ comprobarse si existe suciedad en la salida de aire, en cuyo caso deberá limpiarse.\n\
    5. En caso de que el ASD 535 se utilice para la vigilancia de equipos y se hayan\
    \ instalado transiciones insertadas de tubo rígido a tubo flexible, debe comprobarse\
    \ que dichas transiciones están colocadas correctamente (sin fugas).\n6. Debe\
    \ abrirse la cubierta de la caja del detector y fijarse en la posición media de\
    \ anclaje del fondo de la caja. **Atención**: conexión de cable plano (véanse\
    \ también los cap. 5.4.1 y 7.1). Deberán efectuarse las siguientes mediciones:\n\
    \   * Medir la tensión de servicio en los bornes 1 (+), 2 (-) \U0001F87A Valor\
    \ nominal = 12,3 a 13,8 V-CC (funcionamiento a 12 V-CC) o 21,6 a 27,6 V-CC (funcionamiento\
    \ a 24 V-CC).\n   * Leer el valor de flujo de aire del conducto de aspiración\
    \ en la posición de conmutador V (véase para ello el cap. 7.6.1) y comparar con\
    \ el protocolo de puesta en funcionamiento. Si existe una desviación superior\
    \ a la mitad de la sensibilidad establecida (véanse ejemplos ➀ y ➁), deberá realizarse\
    \ una inspección del conducto de aspiración de la siguiente manera:\n     - Un\
    \ **aumento** del valor (superior al 100 %) implica una **rotura de tubo** inminente\
    \ \U0001F87A Comprobar si el conducto de aspiración tiene fugas (puntos de unión,\
    \ racores, etc.)\n     - Una **disminución** del valor (inferior al 100 %) implica\
    \ una **obstrucción** inminente \U0001F87A Comprobar si el conducto de aspiración\
    \ está obstruido y limpiarlo según el **punto 9** o el **punto 10**.\n   * ➀ Sensibilidad\
    \ de LS-Ü establecida = ±20 % (estándar); la mitad = ±10 %. También deberá realizarse\
    \ una inspección del conducto de aspiración cuando el valor caiga por debajo del\
    \ 90 % o suba por encima del 110 %.\n   * ➁ Sensibilidad de LS-Ü establecida =\
    \ ±50 % (no conforme a EN 54-20); la mitad = ±25 %. También deberá realizarse\
    \ una inspección del conducto de aspiración cuando el valor caiga por debajo del\
    \ 75 % o suba por encima del 125 %.\n7. Debe desconectarse el ASD (extraer el\
    \ bloque de bornes 1/2 y, en su caso, 3/4 del AMB 35), desconectar con cuidado\
    \ la conexión de cable plano con la unidad de control y retirar completamente\
    \ la cubierta de la caja del detector. Una vez desconectado el cable plano de\
    \ los sensores de humo, estos deberán extraerse del ASD con cuidado.\n8. El espacio\
    \ interior de las cámaras de los sensores de humo y la rejilla protectora contra\
    \ insectos deberán limpiarse con un pincel suave y seco. Para la limpieza también\
    \ puede emplearse nitrógeno o aire comprimido sin aceite.\" [F6]\n- Nota: el manual\
    \ también indica: \"En las posiciones de conmutador A11 a C32, cualquier variación\
    \ de este valor que supere el ±20 % – es decir, por debajo del 80 % (suciedad/obstrucción)\
    \ o por encima del 120 % (rotura de tubo) – disparará un aviso «fallo flujo de\
    \ aire» una vez transcurrido el tiempo de retardo de 300 s de la LS-Ü.\" [F3]"
- qid: hp009
  question: ¿Cuál es la resistencia de fin de línea recomendada para los lazos de
    la central Morley ZXe?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acertó al indicar que el lazo analógico direccionable de detección
    de la ZX2e/ZX5e va en bucle cerrado y no tiene RFL, citando el manual. Sin embargo,
    añade resistencias de sirenas y RS-485 bajo la idea de 'lazos', lo que puede confundir
    ante una pregunta que en PCI normalmente se refiere al lazo analógico de detección.
  bot_sources:
  - MIE-MI-530rv001
  - MIE-MU-530rv001
  coverage_status: no_append
  coverage_appended_rows: 0
  release_profile: coverage_c1_v3
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: 'La pregunta hace referencia a los "lazos de la central Morley ZXe",
    que es una denominación de familia. Los fragmentos disponibles corresponden a
    los modelos **ZX2e y ZX5e**. Asumiré que tu pregunta aplica a estos modelos, pero
    si tienes un modelo distinto, indícamelo.


    ---


    Los fragmentos distinguen **dos tipos de lazo** con resistencias de fin de línea
    diferentes:


    ## Circuitos de Sirenas (salidas de aviso)


    - **RFL requerida: 6.800 Ω (6,8 kΩ), 0,5 W mínimo** [F3]

    - Se instala al final de cada circuito de sirenas para supervisión ante cortocircuito
    y circuito abierto [F3]

    - Aplica a los circuitos Sirena A y B (ZX2e) y Sirenas A, B, C y D (ZX5e) [F3]

    - Los dispositivos conectados deben ser polarizados (con diodo integrado); si
    no lo son, deben añadirse diodos de polarización y protección en cada uno [F7]


    ## Lazo RS-485 (red de centrales o periféricos)


    - **RFL requerida: 150 Ω, 0,5 W mínimo** [F9]

    - Se coloca **en ambos extremos libres** de la cadena (inicio y final) [F9]

    - Solo aplica a la instalación en cadena abierta; en bucle cerrado el fragmento
    no especifica RFL [F9]


    ## Lazo Analógico (detección)


    - El lazo analógico **se realiza en bucle cerrado** con aisladores de cortocircuito
    [F2][F4]

    - El manual **no especifica resistencia de fin de línea para el lazo analógico**
    en los fragmentos disponibles — la supervisión se gestiona mediante la arquitectura
    de bucle cerrado y los aisladores, no mediante RFL


    ---


    Fuente: Manual de Instalación Paneles de Incendio ZX2e/ZX5e — Documento No. MIE-MI-530rv001
    (sin revisión registrada)


    También puedo ayudarte con: **conexionado de sirenas paso a paso**, **requisitos
    de cableado del lazo analógico** o **instalación de aisladores de cortocircuito**
    en los ZX2e/ZX5e.


    ---

    ⚠️ **Información adicional del manual:**

    - "**Todo cableado debe ser verificado antes de su conexionado al panel.**" [F2]

    - "LAS SIGUIENTES MEDIDAS PRÁCTICAS SOBRE EL CABLEADO, DEBEN REALIZARSE ANTES
    DE CONECTAR AL PANEL, PARA ASEGURAR EL FUNCIONAMIENTO DEL SISTEMA Y EVITAR DAÑOS:"
    [F2]

    - Nota: el manual también indica: "El panel de detección y control de incendio
    ZX2e tiene 2 circuitos de sirenas supervisados y limitados en corriente (Sirenas
    A y B)." [F3] · "| \[EN54 Warning Triangle Icon] | **EN54-2 12.5.2**                                                 |
    **Para la mayor protección y los mejores resultados:**<br/><br/>El lazo analógico
    debe realizarse en bucle cerrado con aisladores de cortocircuito necesarios. Esto
    permite al sistema seguir funcionando según determina la norma EN54, tanto para
    circuito abierto como para cortocircuito. Se recomienda la instalación de aisladores
    de cortocircuito cada 32 equipos de alarma o cada zona física de equipos según
    define la EN54-14. No obstante la mayoría de estos elementos no admiten más de
    20/25 unidades de instalación, debiendo reducirse si hay sirenas instaladas. |

    | ----------------------------- | -----------------------------------------------------------------
    | -----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
    |

    |                               | **Máximo 32<br/>Sensores /<br/>Pulsadores entre<br/>aisladores.**
    |                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     |"
    [F4]

    - Nota: el manual también indica: "El panel de detección y control de incendio
    ZX5e tiene 4 circuitos de sirenas supervisados y limitados en corriente (Sirenas
    A, B, C y D)." [F3] · "| \[EN54 Warning Triangle Icon] | **EN54-2 12.5.2**                                                 |
    **Para la mayor protección y los mejores resultados:**<br/><br/>El lazo analógico
    debe realizarse en bucle cerrado con aisladores de cortocircuito necesarios. Esto
