    de cortocircuito cada 32 equipos de alarma o cada zona física de equipos según
    define la EN54-14. No obstante la mayoría de estos elementos no admiten más de
    20/25 unidades de instalación, debiendo reducirse si hay sirenas instaladas. |

    | ----------------------------- | -----------------------------------------------------------------
    | -----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
    |

    |                               | **Máximo 32<br/>Sensores /<br/>Pulsadores entre<br/>aisladores.**
    |                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     |"
    [F4]'
- qid: hp010
  question: En la Morley DXc, ¿cómo se añade un nuevo detector al lazo tras la puesta
    en marcha inicial?
  gold_estado: verificado
