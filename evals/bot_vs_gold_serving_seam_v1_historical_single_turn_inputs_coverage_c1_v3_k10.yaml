  release_profile: coverage_c1_v3
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: "# Añadir un nuevo detector al lazo en la Morley DXc\n\nEl procedimiento\
    \ para incorporar un nuevo detector tras la puesta en marcha inicial se realiza\
    \ mediante la función **Autobúsqueda de equipos**. A continuación los pasos según\
    \ el manual de la DXc:\n\n---\n\n## Paso previo: conexión física\n\nConecta el\
    \ nuevo detector al lazo en bucle cerrado, respetando la polaridad positivo/negativo\
    \ [F2]. Asegúrate de que el equipo queda correctamente polarizado antes de proceder\
    \ a la búsqueda [F2].\n\n---\n\n## Procedimiento de Autobúsqueda\n\n1. **Accede\
    \ al menú de Lazos** desde el nivel de programación correspondiente [F1].\n\n\
    2. **Pulsa la tecla `2`** para seleccionar la función **'Autobúsqueda'** [F1]:\n\
    \n   ```\n   [Lazo]\n   1:Confg.Equipos    2:Autobusqueda\n   ```\n\n3. **Si la\
    \ central tiene más de un lazo**, introduce el número del lazo donde has conectado\
    \ el nuevo detector y pulsa **⊙** para confirmar [F1]:\n\n   ```\n   [Autobusqueda]\n\
    \   Sel.Num.Lazo (1-2) :1\n   OK:Confirm  1-2:↕:Edit  ←:Cancel\n   ```\n\n4. **Confirma\
    \ que deseas realizar la autobúsqueda** pulsando **⊙** [F1]:\n\n   ```\n   [Autobusqueda]\n\
    \   Lazo: 1  Autobusqueda?\n   OK:Confirm    ←:Cancel\n   ```\n\n5. **Espera**\
    \ a que finalice el proceso. La pantalla mostrará una barra de progreso [F1]:\n\
    \n   ```\n   [Autobusqueda]\n   Lazo: 1 Reconocimiento en progreso...\n   █████████████████\n\
    \   ```\n\n6. **Verifica el resumen de resultados**. Al finalizar, la pantalla\
    \ muestra el total de equipos encontrados, los nuevos, los eliminados y los modificados\
    \ [F1]. Comprueba que el número de equipos nuevos coincide con los detectores\
    \ que has añadido:\n\n   ```\n   [Lazo]\n   Lazo: 1           Total: 13\n   Nuevos:0\
    \          Elimin.:0  Cambiad:0\n   ION: 0 OPT: 1 TMP: 1 MLT: 2\n   PUL: 4 MON:\
    \ 0 SIR: 2 REL: 1 OTROS: 2\n   ```\n\n7. **Pulsa ⊞** para salir de la pantalla\
    \ de resultados y regresar al menú de 'Lazo' [F1].\n\n---\n\n## ⚠️ Aviso importante\n\
    \n> Si en tu instalación el protocolo es seleccionable y has realizado un cambio\
    \ de protocolo previamente, **espera dos minutos antes de ejecutar la autobúsqueda**.\
    \ La central necesita ese tiempo para rearmar los equipos del lazo [F1].\n\n---\n\
    \n**Fuente:** DXc_Manual de configuracion (sin revisión registrada)\n\n---\n\n\
    También puedo ayudarte con: **configuración manual de la dirección del nuevo detector**,\
    \ **verificación de aisladores de cortocircuito en el lazo** o **interpretación\
    \ de las abreviaturas de tipos de equipo (Tabla 4)**.\n\n---\n\U0001F4CB **Obligaciones\
    \ de evidencia del manual:**\n- Nota: la fuente es inconsistente: \"PUL: 4 MON:\
    \ 0 SIR: 2 REL: 1 OTROS : 2\" (DXc_Manual de configuracion, p. 48) [F1] declara\
    \ 1 OTROS y la enumeración servida lista 5 (DXc_Manual de configuracion, p. 48)\
    \ [F1]."
- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acertó al señalar el parámetro r.I de inhibición de rearme, el rearme
    en nivel 2 y las averías enclavadas, pero queda incompleto: omite comprobar Abort,
    Flow Press, t.A/duración de descarga y zonas en alarma. Además introduce un parámetro/explicación
    ''ri/Resumen inhibido'' confusa o alucinada y mezcla referencias de parámetros,
    lo que puede desorientar al técnico.'
  bot_sources:
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103I_RP1r-Supra_lr
  - HLSI-MN-103_RP1r-Supra_lr
  coverage_status: appended
  coverage_appended_rows: 3
  release_profile: coverage_c1_v3
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: '## RP1r-Supra: Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento está directamente relacionado con el **parámetro de rearme
    inhibido tras extinción**. Hay que verificar varios puntos:


    ---


    ### 1. Verificar el parámetro **r.i** (Rearme inhibido tras extinción)


    De acuerdo con la norma **UNE-EN 12094-1:2004, apartado 4.12.2**, la central puede
    tener configurado un intervalo de tiempo durante el cual el rearme queda inhibido
    tras la extinción [F13].


    Los valores posibles son [F13]:

    - **- -** → Rearme inhibido hasta finalizar extinción o cuando se agota el tiempo
    configurado en el parámetro **t.Fi** (t.A → 0 seg.)

    - **00** → Rearme permitido en cualquier momento *(valor por defecto)*

    - **01 a 30** → Rearme inhibido durante el intervalo definido en minutos


    **Acción:** Accede al modo de programación (nivel 3) y comprueba el valor del
    parámetro **r.i**. Si está configurado con un valor de 01 a 30, la central no
    permitirá el rearme hasta que transcurra ese tiempo.


    ---


    ### 2. Verificar el parámetro **ri** (Resumen inhibido tras extinción)


    Existe también el parámetro **ri** que controla el paso al estado de sistema inhibido
    tras la extinción [F1]:

    - **00** → Resumen inhibido desde finalizar extinción o cuando agotado tiempo
    configurado en parámetro ri *(por defecto)*

    - **01 a 30** → Resumen inhibido después de intervención o reposición, en minutos


    **Acción:** Comprueba también este parámetro en la programación.


    ---


    ### 3. Verificar la inhibición temporal del rearme por norma


    Según la sección **4.12.2 de la norma UNE-EN 12094-1:2004**, existe la posibilidad
    de inhibir temporalmente la función de rearme una vez la central ha entrado en
    modo **ACTIVADO** [F12]. Esta inhibición se configura mediante el parámetro **[F.1]**
    desde el modo de programación [F7].


    **Acción:** Comprueba si la central está aún dentro del período de inhibición
    de rearme configurado.


    ---


    ### 4. Procedimiento de rearme correcto


    Para realizar el rearme correctamente [F9]:

    1. Accede a la central con **nivel 2** de acceso

    2. Pulsa la tecla **"Rearme"**

    3. Esta acción reinicia la central y restablece todas las entradas enclavadas


    > ⚠️ **Importante:** Por defecto, **todas las averías son enclavadas y requieren
    rearme manual** [F9]. Si hay alguna condición de avería activa (presión baja,
    flujo, puerta abierta, etc.), la central no volverá a estado normal aunque se
    rearme, hasta que se resuelva la causa.


    ---


    ### 5. Comprobar el estado normal esperado


    Tras un rearme exitoso, la central debe mostrar [F6]:

    - Led **"Servicio"** iluminado en verde

    - Zumbador en **silencio**

    - Relé avería general **(GEN.FAULT) activado** ≡ en reposo (continuidad entre
    C y NO)


    Si alguno de estos indicadores no se cumple, hay una condición activa que impide
    el retorno al estado normal.


    ---


    **Fuentes:**

