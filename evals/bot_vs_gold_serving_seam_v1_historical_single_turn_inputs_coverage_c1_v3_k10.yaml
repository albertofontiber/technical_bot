- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: 'Acierta la causa principal probable (obstrucción/filtro/sensor) y
    el diagnóstico básico mediante lectura de flujo, eventos e inspección física.
    Pero omite aspectos importantes para una alarma intermitente: turbulencias/fluctuaciones
    ambientales, revisión de ventana/retardo LS-Ü configurados, y las precauciones
    clave del reset inicial; además introduce algunos códigos/detalles no contrastados
    con la referencia.'
  bot_sources:
  - 04-4001-501-2009-12_r012_modulaser_en_54-20_installation_manual_es_edwards_0
  - ASD532_TD_T140421es_a
  - ASD533_TD_T140287es_e
  - ASD535_TD_T131192es_h
  coverage_status: appended
