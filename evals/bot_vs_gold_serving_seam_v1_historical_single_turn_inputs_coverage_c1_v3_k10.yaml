  bot_answer: "## Programación del retardo de salida de alarma en la Notifier PEARL\n\
    \nEl retardo de salida de alarma en la PEARL se configura a través de la **matriz\
    \ de causa-efecto** (Apéndice 5 del Manual de configuración) [F1][F12]. A continuación\
    \ te explico los aspectos clave:\n\n---\n\n### 1. Dónde se configura\n\nEl retardo\
    \ se define dentro de las **reglas de causa-efecto** [F1]. Para acceder:\n\nNo\
    \ puedo confirmar de forma segura el número de menú de Causa y Efecto con los\
    \ fragmentos servidos. Confirma el manual y la revisión exactos antes de usar\
    \ un número de menú.\n\n---\n\n### 2. Tipos de retardo disponibles\n\nSe puede\
    \ asignar **uno de seis tipos de retardo de salida** a cada regla [F1]. Los tipos\
    \ disponibles son [F1][F2]:\n\n- **Estándar**\n- **Fijo**\n- **Est. Ext.** (Estándar\
    \ con extensión)\n- **No Silenc.** (No silenciable)\n- **No Sil. Ext** (No silenciable\
    \ con extensión)\n- **SinRetExt** (Sin retardo extendido)\n\n---\n\n### 3. Comportamiento\
    \ de cada tipo de retardo\n\nLas diferencias clave entre tipos son [F2]:\n\n-\
    \ **La salida se detiene al pulsar SILENCIAR SIRENAS durante el retardo:**\n \
    \ - Sí: Estándar, Est. Ext., RetExtStd\n  - No: Fijo, No Silenc., No Sil. Ext,\
    \ SinRetExt\n\n- **El retardo puede anularse (nivel acceso 2, opción «Anular retardos»):**\n\
    \  - Sí: Estándar, No Silenc., Est. Ext., RetExtStd, No Sil. Ext, SinRetExt\n\
    \  - No: Fijo\n\n- **El tiempo restante se muestra en la pestaña ALARMA:**\n \
    \ - Sí: Estándar, No Silenc., Est. Ext., RetExtStd, No Sil. Ext, SinRetExt\n \
    \ - No: Fijo\n\n- **El retardo puede detenerse pulsando FIN RETARDO (nivel acceso\
    \ 2):**\n  - Sí: Estándar, No Silenc., Est. Ext., RetExtStd, No Sil. Ext, SinRetExt\n\
    \  - No: Fijo\n\n- **La salida se detiene al pulsar AMPLIAR RETARDO:**\n  - Sí:\
    \ Est. Ext., No Sil. Ext\n  - No: el resto\n\n- **El temporizador comienza en\
    \ RETARDO AMPLIADO:**\n  - Sí: RetExtStd, SinRetExt\n  - No: el resto\n\n---\n\
    \n### 4. Funcionamiento operativo del retardo\n\nUna vez activo el retardo [F4]:\n\
    \n1. La detección de alarma inicia el **primer temporizador** configurado.\n2.\
    \ El personal autorizado (nivel acceso 2) puede pulsar **AMPLIAR RETARDO** para\
    \ iniciar un segundo temporizador (normalmente más largo que el primero), que\
    \ anula al primero [F4].\n3. Pulsar **FIN RETARDO** (disponible en nivel de acceso\
    \ 1) pone fin a cualquier retardo y activa la condición de alarma completa [F4].\n\
    4. Mientras el retardo está activo, el **LED de RETARDO ACTIVO** permanece encendido\
    \ [F3].\n\n---\n\n### 5. Anular/habilitar retardos desde el panel (operación)\n\
    \nDesde el menú **Anular/Habilitar**, opción **«5: Retardo Activación Salidas»**\
    \ [F3]:\n\n- Pulsa **✓** para cambiar el estado entre ANULADO y HABILITADO.\n\
    - Pulsa **✕** para salir.\n\n> ⚠️ Esta opción solo está disponible si se han configurado\
    \ retardos en alguna regla de causa-efecto [F3].\n\n---\n\n### 6. Pulsador AMPLIAR\
    \ RETARDO — configuración\n\nEl pulsador **AMPLIAR RETARDO** puede desactivarse\
    \ desde los parámetros de la central (parámetro **«10: Extend Delay Button»**)\
    \ si no se requiere en la instalación [F5].\n\n---\n\n**Fuentes:**\n- Manual de\
    \ configuración de la central PEARL (rev. 997-671-005-3)\n- Manual de funcionamiento\
    \ PEARL 997-670-005-3 (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **creación de reglas de causa-efecto paso a paso**, **configuración del\
    \ segundo temporizador (retardo ampliado)** o **prueba funcional de los retardos\
    \ en puesta en marcha**.\n\n---\n⚠️ **Información adicional del manual:**\n- \"\
    **Es de vital importancia probar rigurosamente todas las reglas durante la puesta\
    \ en marcha del sistema para verificar que no haya conflictos lógicos entre ellas.**\"\
    \ [F12]\n- \"**Al programar reglas de causa-efecto evite las lógicas contradictorias.**\"\
    \ [F12]\n\n---\n\U0001F4CB **Obligaciones de evidencia del manual:**\n- Nota:\
    \ la fuente es inconsistente: \"Se puede asignar uno de seis tipos de retardo\
    \ de salida a una regla, como se explica a continuación.\" (997-671-005-3_Configuration_ES,\
    \ p. 44) [F1] declara 6 tipos y la enumeración servida lista 8 (997-671-005-3_Configuration_ES,\
    \ p. 44) [F1]."
