provenance_contract:
  version: 1
  name: s116_section_lineage_v1
  deterministic_id_inputs:
    - extraction_sha256
    - chunk_index
    - content_sha256
    - provenance_version
  required_fields:
    - raw_artifact_sha256
    - chunker_sha256
    - content_sha256
    - source_block_start
    - source_block_end
    - section_anchor
    - section_lineage
  validation:
    - exact content hash
    - exact deterministic UUIDv5
    - exact empty versus anchored state
    - exact anchor internal consistency
    - exact anchor resolution against raw flattened blocks
    - exact common lineage over every block in the inclusive source span
    - unique chunk IDs and unique document ordinals

sql_static_gate:
  required:
    - creates public.chunks_v3 without altering or renaming public.chunks_v2
    - no data copy from chunks_v2
    - RLS enabled and privileges revoked from PUBLIC anon and authenticated
    - service_role receives only required shadow access
    - RPCs are security invoker with empty search_path
    - document_id and duplicate_of foreign keys are indexed
    - HNSW is deferred until after validated bulk load
    - rollback drops only v3 objects

local_replay_gate:
  required:
    - development and independent source manifests match frozen inputs
    - 1068 development and 12 independent records materialize
    - development produces exactly 31212 chunks and 29399 titled chunks
    - development content stream manifest remains exactly frozen
    - independent produces exactly 836 chunks and 784 titled chunks
    - zero provenance validation failures
    - zero duplicate deterministic IDs or document ordinals
    - second independent execution is byte-logically identical
  decision_if_go: authorize read-only chunks_v2 reuse analysis and explicit-cost planning
  never_authorizes:
    - Supabase schema or data writes
    - paid contextualization or embedding
    - HNSW construction, reindexing, serving or deployment
    - fact relabeling or an OK-rate claim

