- bot_answer: '# Cálculo de capacidad de batería — AM-8200


    El manual define una fórmula y un procedimiento estructurado en dos partes: **corriente
    en espera (A)** y **corriente en alarma (B)** [F3][F4].


    ---


    ## Fórmula general


    **Ah Batería = (A + B) × 1,2** [F3][F4]


    Donde:

    - **A** = Corriente total en reposo (No Alarma) × duración en horas

    - **B** = Corriente total en alarma × duración en horas

    - **1,2** = Factor de corrección por tolerancias de fabricación de las baterías
    [F2]


    ---


    ## Pasos del cálculo


    **1. Calcular la corriente total en condición de NO ALARMA (Espera)**


    Para cada elemento del sistema, multiplica el número de unidades (C) × consumo
    unitario. Los valores de consumo de la central son [F4]:


    - AM-8200 CPU (AM8200-KLCD): **179 mA** en reposo

    - LIB-8200: **50 mA** en reposo

    - AM82-2S2C: **28 mA** en reposo

    - AM82-BST-C: **39 mA** en reposo

    - Corriente de lazos: consultar **Tabla 3** del manual [F4]

    - Corriente salida usuario: máx. **2 A** [F4]


    Suma todos los consumos → **Total en reposo (mA)**


    Multiplica por la duración de espera requerida: **(× 24 h) o (× 72 h)** según
    la normativa aplicable → resultado en **Ah = valor A** [F4]


    > ⚠️ Si el valor de absorción calculado supera **3,5 A**, la corriente en exceso
    durante alarma se extrae de las baterías [F2].


    ---


    **2. Calcular la corriente total en condición de ALARMA**


    Misma estructura, con los consumos en alarma [F4]:


    - AM-8200 CPU: **345 mA** en alarma

    - LIB-8200: **92 mA** en alarma

    - AM82-2S2C: **28 mA** en alarma

    - AM82-BST-C: **39 mA** en alarma

    - Corriente de lazos: consultar **Tabla 3** [F4]

    - Dispositivos de aviso (campanas, sirenas, flashes): añadir consumo real de cada
    uno


    > ⚠️ En alarma, la central enciende **solo los primeros 6 LED** de detectores
    y módulos de entrada [F2]. Tenlo en cuenta al consultar las fichas de los dispositivos.


    Suma todos los consumos → **Total en alarma (mA)**


    Multiplica por **× 0,5 h** → resultado en **Ah = valor B** [F3][F4]


    ---


    **3. Aplicar la fórmula final**


    **Ah Batería = (A + B) × 1,2** [F3][F4]


    El resultado debe estar dentro del rango admitido por la central:

    - Mínimo: **7 Ah** (2 × 12 V)

    - Máximo: **18 Ah** (2 × 12 V) [F5]


    ---


    ## Baterías recomendadas por el fabricante [F5]


    - Yuasa **NP18-12B** o **NP7-12BFR** (UL94) — 12 V / 17,2 Ah — 181 × 77 × 167
    mm

    - Fiamm **FG21803** o **FGV21803** (UL94) — 12 V / 18 Ah — 181 × 77 × 167 mm


    ---


    Fuente: AM-8200 Manual de Instalación (Doc. AM-8200-ESP Rev. A.3)


    ---


    También puedo ayudarte con: **consumos detallados de dispositivos de lazo (Tabla
    3)**, **conexionado de baterías** o **umbrales de señalización del cargador**
    de la AM-8200.'
