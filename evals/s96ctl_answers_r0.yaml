- bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe


    > **Nota previa:** Los fragmentos recuperados corresponden a los modelos **ZXAE/ZXEE**
    [F1][F2] y **ZX2e/ZX5e** [F3][F4], que son las variantes documentadas de la familia
    ZX. El procedimiento es esencialmente el mismo en ambas. Si tu equipo es uno de
    estos modelos concretos, aplica directamente lo siguiente.


    ---


    ## Principio de funcionamiento


    Las salidas de sirenas son **supervisadas** [F2]. La supervisión se realiza mediante
    una **corriente inversa** que lee la **resistencia final de línea (RFL) de 6.800
    Ω / 0,5 W mínimo** instalada al final del circuito [F2]. En reposo, el circuito
    se polariza en inverso para supervisar; al activarse, la corriente circula en
    sentido normal [F4].


    ---


    ## Pasos de conexionado


    1. **Conecta las sirenas en serie (daisy-chain)**, respetando la polaridad (+/−)
    de cada dispositivo [F1][F2].


    2. **Sirenas con polaridad:** conéctalas directamente respetando los terminales
    + y − [F1].


    3. **Campanas/dispositivos sin polaridad:** instala un **diodo** entre el terminal
    + de la línea y uno de los terminales de alimentación del dispositivo, para evitar
    consumo durante la supervisión en polarización inversa [F2][F4].


    4. **Al final de la línea**, instala la **RFL de 6.800 Ω / 0,5 W mínimo** entre
    el conductor + y el conductor − de la última sirena [F2].


    5. **Si no hay ninguna sirena conectada** en esa salida, instala la RFL directamente
    en los terminales de la central [F2].


    6. **No realices ramales (derivaciones paralelas):** la supervisión solo cubre
    la línea directa hasta la RFL; los ramales no quedan supervisados [F1].


    ---


    ## Parámetros clave


    - **Resistencia final de línea (RFL):** 6.800 Ω / 0,5 W mínimo [F2]

    - **Corriente máxima por circuito:** 1 A [F2]

    - **Sección mínima de cable:** 1,5 mm² [F2]

    - **Longitud máxima recomendada (ZX2e/ZX5e):** no superior a 1 km (por capacitancia
    e inductancia del lazo) [F3]


    ---


    ## Número de salidas según modelo


    - **ZXAE:** 2 salidas supervisadas (Salida A y B) [F2]

    - **ZXEE:** 4 salidas supervisadas (Salida A, B, C y D) [F2]

    - **ZX2e:** 2 circuitos de sirena (A y B), terminales en bloque `SOUNDERS A+ A-
    B+ B-` [F4]

    - **ZX5e:** 4 circuitos de sirena (A, B, C, D), terminales en bloque `TB7: A-
    A+ B- B+ C- C+ D- D+` [F4]


    ---


    ⚠️ **Advertencia:** Verifica que el consumo total de todas las sirenas activadas
    no supere la capacidad total de la central [F2]. Comprueba también que la tensión
    en los terminales de la última sirena sea suficiente según las especificaciones
    del fabricante de la sirena, especialmente en condiciones de mínima tensión de
    baterías [F3].


    ---


    **Fuentes:**

    - MIE-MI-310 — Manual de Instalación ZXAE/ZXEE (sin revisión registrada)

    - MIE-MI-530rv001 — Manual de Instalación ZX2e/ZX5e (Rev. 001)'
