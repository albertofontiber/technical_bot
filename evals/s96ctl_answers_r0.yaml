- bot_answer: '## Programación de coincidencia de dos detectores en la ID3000


    La función de **coincidencia de dos equipos** en la Matriz de Control de la ID3000
    se configura así:


    ---


    ### Paso 1 — Crear la instrucción de Matriz de Control para los detectores


    Accede a la Matriz de Control y crea un nuevo evento [F3]:


    1. En la selección de definición de **ENTRADA**, elige el tipo de equipo al que
    se aplicará la coincidencia (por ejemplo, `CUALQUIER TIPO DE EQUIPO`, `CUALQUIER
    SENSOR TÉRMICO`, `CUALQUIER SENSOR IÓNICO`, etc.) [F3].

    2. Cuando el sistema pregunte el tipo de coincidencia, selecciona la opción **`2:
    COINCIDENCIA 2 EQUIPOS`** [F3].

    3. En el campo de zona, selecciona **Zona única/determinada** (no "Cualquier zona")
    — esto es condición necesaria para que aparezca la opción de coincidencia de equipos
    [F3].


    > ⚠️ **IMPORTANTE:** La opción de coincidencia de equipos **solo aparece** si
    se ha seleccionado "Única zona" en el paso de selección de zona, y el tipo elegido
    no es la opción 9, 10 u 11 (que ya incluyen coincidencia propia) [F3].


    ---


    ### Paso 2 — Excluir los pulsadores manuales del grupo de coincidencia


    ⚠️ **EN54-2: 7.1.4 — No incluyas pulsadores manuales en un grupo de coincidencia**
    [F1][F3].


    Para evitarlo, debes programar **dos instrucciones separadas** en la Matriz de
    Control [F1][F3]:


    - **Instrucción 1:** Define la entrada de tipo **Pulsador Manual (MCP/PUL)** como
    **Simple** (sin coincidencia, un único equipo) [F1].

    - **Instrucción 2:** Define la entrada del tipo analógico/detector (p. ej. `ANALÓGICO`,
    que incluye detectores térmicos, iónicos, ópticos, VIEW y multisensor) con **coincidencia
    activada** [F1].


    ---


    ### Paso 3 — Condición para que se active la coincidencia


    Para que la coincidencia tenga lugar, los **dos equipos en alarma deben estar
    en la misma zona o subzona** [F3].


    - Si usas **ZONA**: la coincidencia de 2 equipos está disponible con todas las
    opciones de tipo [F3].

    - Si usas **SUBZONA**: la coincidencia está disponible pero **limitada exclusivamente
    a dos equipos**, y el tipo de equipo de entrada es siempre `CUALQUIER TIPO DE
    EQUIPO` (sin más opciones) [F4].


    ---


    ### Paso 4 — Asignar la salida de sirena


    Una vez configurada la entrada con coincidencia, asigna la **salida de sirena**
    a esta instrucción de Matriz de Control. La salida solo se activará cuando dos
    detectores de esa zona estén en alarma simultáneamente.


    ---


    ### Nota sobre sistemas en red


    Si trabajas en un sistema de red [F5]:

    - **Zona especificada en otra central:** se requieren dos sensores en alarma en
    esa zona concreta.

    - **Cualquier zona en cualquier central:** se requieren dos sensores en alarma
    en cualquier punto de la red, incluso en centrales diferentes.


