- bot_answer: '## ASD532 — Clases EN 54-20 y configuración de monitorización de flujo
    de aire


    ---


    ### 1. Clases de sensibilidad según EN 54-20


    El ASD532 ofrece las tres clases definidas por EN 54-20 [F3]:


    - **Clase A** — Sensibilidad muy alta

    - **Clase B** — Sensibilidad alta

    - **Clase C** — Sensibilidad normal


    La elección del sensor de humo condiciona el rango disponible [F3]:

    - **SSD 532-1**: rango de sensibilidad de alarma **0,5 %/m hasta 10 %/m**

    - **SSD 532-2**: rango de sensibilidad de alarma **0,1 %/m hasta 10 %/m**

    - **SSD 532-3**: rango de sensibilidad de alarma **0,02 %/m hasta 10 %/m**


    ---


    ### 2. Cómo funciona la monitorización del flujo de aire


    El ASD532 usa el **método calorimétrico** (medición de flujo en masa) mediante
    un sensor de flujo integrado en la caja del detector [F2].


    **Proceso de referenciado:**

    1. Al ejecutar el **reset inicial** (con el conducto de aspiración intacto), el
    sistema registra los valores de flujo como **valores nominales = 100 %** [F2].

    2. El sistema crea electrónicamente una **ventana de monitorización** centrada
    en ese 100 % [F2].

    3. Si el flujo real se sale de esa ventana (por obstrucción o rotura de tubo),
    se dispara el aviso **«Fallo flujo de aire»** [F2].


    **Parámetros ajustables** (mediante software «ASD Config») [F5]:

    - **Tamaño de la ventana de monitorización** (desviación permitida en %)

    - **Tiempo de retardo** del aviso de fallo


    ---


    ### 3. Configuración según EN 54-20 (posiciones de conmutador A11–C31)


    Para cumplir EN 54-20, los valores normativos son [F2]:

    - **Desviación máxima**: **±20 %** (por debajo del 80 % = obstrucción; por encima
    del 120 % = rotura de tubo)

    - **Tiempo de retardo**: **300 s**


    Estas condiciones se cumplen seleccionando las posiciones de conmutador **A11
    a C31** [F5].


    ---


    ### 4. Posiciones de conmutador W01–W44 (uso NO normativo)


    Las posiciones **W01 a W44** permiten configurar combinaciones distintas de desviación
    y tiempo de retardo [F1]:


    **Clase A (Sensibilidad muy alta):**

    - W01: retardo 10 min / desviación ±20 %

    - W02: retardo 60 min / desviación ±20 %

    - W03: retardo 10 min / desviación ±50 %

    - W04: retardo 60 min / desviación ±50 %


    **Clase B (Sensibilidad alta):**

    - W09–W12 (Límite 1) y W17–W20 (Límite 2), con las mismas combinaciones de 10/60
    min y ±20 %/±50 %


    **Clase C (Sensibilidad normal):**

    - W25–W28 (Límite 1), W33–W36 (Límite 2), W41–W44 (Límite 3)


    > ⚠️ **ADVERTENCIA**: Las posiciones W01–W44 **no están homologadas según EN 54-20**
    para la monitorización del flujo de aire. Solo deben utilizarse **previa consulta
    con el fabricante** [F2][F4][F5].


    ---


    ### 5. Advertencia adicional sobre ajustes manuales


    Si se modifican los valores de LS-Ü mediante «ASD Config» [F5]:

    - Aumentar la ventana por encima de **±20 %** o el tiempo de retardo por encima
    de **300 s** → **incumple EN 54-20**

    - El tamaño de ventana **no debería quedar por debajo de ±20 %** salvo que simultáneamente
    se aumente el tiempo de retardo a **10 min como mínimo**

