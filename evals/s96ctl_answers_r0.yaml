- bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura dentro de las **reglas
    de causa-efecto**. No existe un único parámetro global de "retardo de alarma principal",
    sino que el retardo se asigna a cada regla de causa-efecto individualmente, eligiendo
    uno de los **seis tipos de retardo** disponibles [F1].


    ---


    ### Tipos de retardo disponibles


    Los seis tipos son [F1][F2]:


    - **Fijo**: Sin posibilidad de silenciar ni ampliar. El temporizador no se muestra
    en LCD.

    - **Estándar**: La salida se detiene si se pulsa SILENCIAR SIRENAS. Permite anular
    retardo (nivel acceso 2), muestra cuenta atrás en pestaña ALARMA, permite FIN
    RETARDO.

    - **No Silenc.**: No se detiene con SILENCIAR SIRENAS. Sí permite anular retardo
    y FIN RETARDO.

    - **Est. Ext.**: Como Estándar, pero además la salida se detiene si se pulsa AMPLIAR
    RETARDO.

    - **RetExtStd**: Permite SILENCIAR SIRENAS y cuando se pulsa AMPLIAR RETARDO,
    inicia el temporizador de retardo ampliado.

    - **No Sil. Ext**: No se detiene con SILENCIAR SIRENAS, pero sí se detiene con
    AMPLIAR RETARDO.

    - **SinRetExt**: No se detiene con SILENCIAR SIRENAS ni AMPLIAR RETARDO, pero
    sí inicia el temporizador de retardo ampliado.


    ---


    ### Funcionamiento operativo del retardo


    Una vez configurado el retardo en la regla de causa-efecto [F4]:


    1. Al detectarse una alarma, se inicia la cuenta atrás del **primer temporizador**.

    2. El operador con llave (nivel de acceso 2) puede pulsar **AMPLIAR RETARDO**
    para iniciar un segundo temporizador (normalmente más largo que el primero), que
    anula al primero [F4].

    3. Cualquier operador de nivel de acceso 1 puede pulsar **FIN RETARDO** para terminar
    el retardo y pasar a condición de alarma completa [F4].


    ---


    ### Parámetro adicional: habilitar/deshabilitar el pulsador AMPLIAR RETARDO


    Desde la configuración de la central, parámetro **10: Extend Delay Button**, se
    puede habilitar o deshabilitar el pulsador AMPLIAR RETARDO [F5]:


    - Ruta: **Editar Parámetros de la Central → opción 10: Extend Delay Button**

    - Valor por defecto visible en el fragmento: **Enabled** [F5]


    ---


    ### Anulación global de retardos en operación


    Desde el menú **Anular/Habilitar → opción 5: Retardo Activación Salidas** (nivel
    de acceso 2), se pueden anular o habilitar todos los retardos configurados pulsando
    ✓ [F3].


    ---


    > ⚠️ **Nota importante**: Los fragmentos disponibles describen los *tipos* de
    retardo y su comportamiento, pero **no especifican el procedimiento paso a paso
    para asignar el valor numérico del tiempo de retardo** (en segundos/minutos) dentro
    del editor de reglas de causa-efecto. Para ese detalle, consulta el Apéndice 5
    completo del manual de configuración.


    ---


