- bot_answer: "# Configuración de una Maniobra (Causa-Efecto) en la CAD-250\n\n##\
    \ Concepto general\n\nUna maniobra es un conjunto de acciones programadas en función\
    \ de los estados del sistema. Los cambios de estado se llaman **eventos** (entradas)\
    \ y a cada evento se asocia una **acción** (salida: sirenas, relés, etc.) [F4].\
    \ El sistema gestiona **eventos** (cambios de estado), no estados estáticos [F2].\n\
    \n---\n\n## PASO 1 — Acceder al menú de Maniobras\n\nNavega por el panel:\n\n\
    **MENÚ** (Menú principal) **→ MANIOBRAS** (Submenú) **→ +AÑADIR** (Barra de Navegación\
    \ Inferior) [F4]\n\n---\n\n## PASO 2 — Crear la maniobra\n\n1. Pulsa el botón\
    \ **AÑADIR** para crear una nueva maniobra [F1].\n2. Se accede a la pantalla de\
    \ edición de la maniobra (ej. \"Maniobra 0001\") [F1].\n3. Configura el campo\
    \ **COINCIDENCIAS**: indica cuántos eventos de entrada deben cumplirse simultáneamente\
    \ para que la maniobra se active [F1]:\n   - **Coincidencias = 1** → lógica **OR**:\
    \ cualquiera de los eventos activa la salida [F1].\n   - **Coincidencias = N (igual\
    \ al total de eventos)** → lógica **AND**: todos los eventos deben cumplirse [F1].\n\
    \   - **Coincidencias = valor intermedio** → lógica **N de M**: se requiere que\
    \ ese número de eventos (cualesquiera) sean verdaderos [F1].\n\n---\n\n## PASO\
    \ 3 — Añadir Eventos de Entrada\n\n1. Pulsa **AÑADIR** en el margen inferior de\
    \ la pantalla principal [F2].\n2. En la pantalla emergente, selecciona **EVENTO**\
    \ [F2].\n3. Se mostrará una nueva pantalla para escoger entre [F2]:\n   - **ENTIDAD**:\
    \ cualquier elemento de la jerarquía del sistema (instalación, panel, lazo, área,\
    \ zona, dispositivo, grupo o módulo virtual), tanto del sistema local como de\
    \ la red [F2].\n   - **CONDICIÓN TEMPORAL**: establece un periodo de tiempo para\
    \ el que la ecuación de entrada sea verdadera [F2].\n\n4. Si seleccionas **ENTIDAD**,\
    \ accedes a la pantalla **EVENTO DE LA ENTIDAD** donde configuras [F2]:\n   -\
    \ **REPETICIONES**: condición numérica que indica el número de elementos de la\
    \ entidad que harán verdadera la entrada [F2].\n   - Si la entidad es local o\
    \ de red (otra central en red) [F2].\n\n5. Para cada evento añadido, edita sus\
    \ premisas haciendo **doble clic** sobre él o seleccionándolo y pulsando **EDITAR**\
    \ [F5]. Un evento es verdadero cuando se cumplen **todas** las premisas establecidas\
    \ para ese evento [F5].\n\n> **Nota:** Desde la versión **1.1.1** es posible seleccionar\
    \ un elemento de **salida** como condición de entrada (el cambio a condición de\
    \ avería hará la condición entrante verdadera). Para ello, desmarca la casilla\
    \ **\"Sólo dispositivos de entrada\"** [F5].\n\n---\n\n## PASO 4 — Añadir Acciones\
    \ de Salida\n\n1. Pulsa **AÑADIR** en el margen inferior de la pantalla principal\
    \ [F3].\n2. En la pantalla emergente, selecciona **ACCIÓN** [F3].\n3. Se presentan\
    \ dos campos [F3]:\n   - **RETRASO**: tiempo de hasta **600 segundos** antes de\
    \ iniciar la acción [F3].\n   - **ENTIDAD**: elemento de la jerarquía del sistema\
    \ local (panel, lazo, área, zona, dispositivo, grupo o módulo virtual) sobre el\
    \ que se ejecutará la acción [F3].\n\n4. En la pantalla **ACCIÓN DE LA ENTIDAD**\
    \ configuras [F3]:\n   - **Retraso**: modificable aquí también [F3].\n   - **Tipo**:\
    \ identifica la acción y el tipo de elemento al que se aplicará dentro de la entidad\
    \ [F3].\n\n> **Nota:** Las acciones siempre son relativas a la entidad seleccionada\
    \ [F3].\n\n---\n\n## Límites y capacidad\n\n- El número máximo de maniobras entre\
    \ eventos y acciones salientes es de **100.000** [F2].\n- Cada maniobra puede\
    \ incorporar innumerables entradas (eventos) e innumerables acciones [F4].\n\n\
    ---\n\n## Resumen del flujo completo\n\n```\nMENÚ → MANIOBRAS → AÑADIR\n     \
    \  ↓\n  Configurar COINCIDENCIAS (lógica OR / AND / N de M)\n       ↓\n  AÑADIR\
    \ → EVENTO → ENTIDAD o CONDICIÓN TEMPORAL\n  (repetir para cada evento de entrada)\n\
    \       ↓\n  AÑADIR → ACCIÓN → RETRASO + ENTIDAD + TIPO\n  (repetir para cada\
    \ acción de salida)\n```\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de Grupos**, **creación de Módulos Virtuales** o **uso de Condiciones Temporales**\
    \ en maniobras de la CAD-250.\n\n**Fuente:** CAD-250 Manual de Configuración MC-380-es-2026-c\
    \ (rev. c, 2026-04-23); CAD-250 Manual Software de Configuración MS-416-es-2026-b\
    \ (rev. b)"
