- bot_answer: '# Cableado y configuración de lazo — INSPIRE E10/E15


    ---


    ## 1. MÓDULO DE LAZO (OPAL X2)


    El módulo de doble lazo tiene referencia **HOP-433-100** [F2] y código de color
    **morado** [F2]. Proporciona conexión a **dos circuitos de lazo** de dispositivos
    OPAL o CLIP [F2].


    > ⚠️ **No se permite mezclar dispositivos OPAL y CLIP en el mismo lazo** [F2].


    ---


    ## 2. IDENTIFICACIÓN DE TERMINALES


    ### Lazo 1:

    - **Terminal 1:** Lazo 1 Salida +VE

    - **Terminal 2:** Lazo 1 Salida -VE

    - **Terminal 3:** ⊕ (tierra — **NO usar para pantalla de cable**)

    - **Terminal 4:** Lazo 1 Entrada +VE

    - **Terminal 5:** Lazo 1 Entrada -VE


    ### Lazo 2:

    - **Terminal 6:** Lazo 2 Salida +VE

    - **Terminal 7:** Lazo 2 Salida -VE

    - **Terminal 8:** ⊕ (tierra — **NO usar para pantalla de cable**)

    - **Terminal 9:** Lazo 2 Entrada +VE

    - **Terminal 10:** Lazo 2 Entrada -VE


    [F2] [F3]


    > ⚠️ **La pantalla del cable de lazo debe conectarse a la barra de tierra de la
    central, NO a los terminales 3 u 8** [F2] [F3].


    ---


    ## 3. TOPOLOGÍA DE CABLEADO


    El lazo se cablea en **bucle cerrado** (salida de la central → dispositivos en
    cadena → retorno a la entrada de la central) [F1]:


    - Salida (+VE / -VE) → primer dispositivo → ... → último dispositivo → Entrada
    (+VE / -VE) de la central [F1].

    - Se recomienda poner a tierra **un extremo** de la pantalla del cable a la barra
    de tierra de la central [F5].


    ---


    ## 4. CAPACIDAD DEL LAZO


    ### Modo OPAL:

    - Hasta **159 detectores OPAL** por lazo

    - Hasta **159 módulos OPAL** por lazo (sirenas, pulsadores, módulos E/S)

    - Total máximo: **318 dispositivos** por lazo [F2] [F4]


    ### Modo CLIP (requiere licencia):

    - Hasta **99 detectores CLIP** por lazo

    - Hasta **99 módulos CLIP** por lazo [F2] [F4]


    ### Restricción EN54:

    - Máximo **512 detectores y/o pulsadores** por módulo de lazo (2 circuitos) según
    **EN54-2, apartado 13.7** [F2].


    ### Corriente máxima:

    - **750 mA por lazo** [F2].


    ### Longitud máxima:

    - Hasta **3,5 km**, dependiendo del tipo de carga y de cable, calculada con el
    programa **CLSS** [F2].


    ---


    ## 5. NUMERACIÓN DE LAZOS


    Los circuitos de lazo se numeran **secuencialmente de izquierda a derecha** del
    portamódulos [F2]. En la E15 (dos filas de portamódulos), la segunda fila continúa
    la numeración desde la primera fila [F2].


    ---


    ## 6. COMPROBACIÓN PREVIA A LA CONEXIÓN


    Antes de conectar los cables a la central [F5]:


    1. Utiliza la herramienta **POL-200-TS** (recomendada) para comprobar y medir
    el circuito de lazo. Compatible con protocolos OPAL y CLIP [F5].

    2. Verifica que los dispositivos están instalados en las ubicaciones correctas
    según los esquemas del proyecto [F4].


    ---


    ## 7. CONEXIÓN Y PRIMER ENCENDIDO


    ### Lazo OPAL [F5]:

    1. Una vez verificado el cableado, conecta el circuito al bloque de terminales
    de lazo seleccionado en la central.


    ### Lazo CLIP [F5]:

    1. Reconecta los aisladores desconectados temporalmente, los módulos de lazo y
    los pulsadores.

    2. Conecta el circuito al bloque de terminales de lazo seleccionado.

    3. Al encender, la central comprobará si persiste algún problema.


    ### Primer encendido general [F1]:

    - El primer encendido debe realizarse **sin el cableado externo conectado**, pero
    con la fuente de alimentación y un circuito de lazo probado conectado.

    - Conecta el cableado del lazo → cable HMI de puerta a CPU → corriente principal
    → baterías (**2 × 12 V 24 Ah** para E10/E15) [F1].


    ---


    ## 8. CONFIGURACIÓN (ALTA DE LAZO EN CLSS)


    - Si un circuito de lazo **no se va a utilizar**, marca la casilla ☑ **"Sin Uso"**
    en **"Configuración de tarjeta de lazo"** dentro del programa de configuración
    **CLSS** [F1].

    - Usa el **programa de cálculo de lazo y batería de CLSS** para verificar que
    la configuración del sistema cumple con los estándares [F2].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha INSPIRE E10/E15)

    - HOP-138-9ES issue 5, 11-2025 (Instalación INSPIRE E10)


