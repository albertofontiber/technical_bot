- bot_answer: '## RP1r — Sistema no vuelve a estado normal tras resetear después de
    descarga


    Hay dos causas principales documentadas. Comprueba en este orden:


    ---


    ### 1. Inhibición de reset activa (parámetro r1)


    La central puede tener configurado un **tiempo de inhibición de reset** tras el
    estado Activado [F1].


    - Por defecto esta función está **deshabilitada** (microswitch **SW1-6 en posición
    OFF**) [F1].

    - Si SW1-6 está en **ON**, el reset queda bloqueado durante el tiempo programado
    en el parámetro **r1** (hasta **30 minutos**) [F1].

    - Mientras ese tiempo no haya transcurrido, el reset no se ejecutará aunque pulses
    la tecla.


    **Qué comprobar:**

    1. Verifica la posición del microswitch **SW1-6** en la placa de la central [F1][F2].

    2. Entra en modo programación y consulta el valor del parámetro **r1** [F1].

    3. Si r1 > 00 minutos, espera a que transcurra el tiempo configurado, o reduce
    el valor a **00** si procede [F1].


    > **Nota:** Cuando la central está en modo **Abort/Hold**, el reset sí está disponible
    independientemente de r1 [F1].


    ---


    ### 2. Fallo de Sistema (FALLO DE SISTEMA) — requiere Rearme, no Reset


    Si tras el reset el panel muestra el indicador **Fallo Sistema** [F4], el problema
    es distinto:


    - La central **RP1r** dispone de dos microprocesadores [F3].

    - Si el microprocesador principal tarda en inicializar o detecta tensiones fuera
    de rango, activa **FALLO DE SISTEMA** [F3].

    - En este estado, la central **no ejecutará el proceso de extinción** al considerar
    que no funciona correctamente [F3].

    - La solución es **REARMAR** la central (tecla **Rearme**), no simplemente resetear
    [F3][F4].


    **Qué comprobar:**

    1. Observa si el LED **Fallo Sistema** está encendido en el panel [F4].

    2. Si es así, pulsa la tecla **Rearme** [F3][F4].

    3. Verifica que no haya perturbaciones externas en la alimentación que provoquen
    lecturas de tensión fuera de rango [F3].


    ---


    ### Resumen de acciones


    - **LED Fallo Sistema encendido** → pulsar **Rearme** [F3]

    - **Reset bloqueado sin fallo visible** → comprobar SW1-6 y parámetro r1 [F1]

    - **Reset disponible** → nivel de acceso 2 + tecla **Reset** [F2]


    ---


    Fuentes: MN-DT-102I (sin revisión registrada); HLSI-BT-001 (sin revisión registrada,
    04/11/2011)


