    \n## Concepto previo\n\nLas ecuaciones **CBE (Control By Event)** permiten activar\
    \ un módulo de salida en función de eventos lógicos usando operadores como **OR,\
    \ AND, NOT, XGRP**, etc. [F1][F4]\n\nLa longitud máxima de una ecuación CBE es\
    \ de **64 caracteres** [F2].\n\n---\n\n## Pasos para programar la CBE en un módulo\
    \ de salida\n\n1. **Accede al menú de programación de módulos:**\n   Navega a\
    \ `MENU PROGRAMMAZIONE \\ Punti \\ Moduli` [F3].\n\n2. **Selecciona el módulo\
    \ de salida** que quieres programar.\n\n3. **Navega hasta el campo CBE:**\n  \
    \ Usa las teclas flecha **▲▼** para seleccionar el parámetro CBE y pulsa la tecla\
    \ de confirmación **☑** para entrar a editarlo [F2].\n\n4. **Introduce la ecuación**\
    \ usando el teclado alfanumérico disponible [F2]:\n   - Operadores disponibles:\
    \ `NOT`, `AND`, `OR`, `DEL`, `SDEL`, `XGRP`, `TIM`, `DIS`, `PRE`, `FLT`, `TAC`,\
    \ `TONE` [F2]\n   - Los operandos son grupos software con formato **GXXX** (G1\
    \ a G400) [F4]\n\n5. **Confirma** pulsando la tecla **Enter** [F2].\n\n---\n\n\
    ## Ejemplos de ecuaciones según lógica deseada\n\n**Activar la salida si AL MENOS\
    \ UN grupo está en alarma (OR):**\n```\nOR (G9 G15 G23)\n```\nTambién válido omitiendo\
    \ OR: `(G9 G15 G23)` [F4]\n\n**Activar la salida solo si TODOS los grupos están\
    \ en alarma (AND):**\n```\nAND (G9 G15 G23)\n```\n[F4]\n\n**Activar la salida\
    \ hasta que un grupo entre en alarma (NOT):**\n```\nNOT (G23)\n```\n[F4]\n\n**Activar\
    \ la salida si AL MENOS DOS dispositivos del grupo están activos (doble coincidencia):**\n\
    ```\nXGRP (G23)\n```\n⚠️ Con XGRP solo se permite **un único grupo** entre paréntesis\
    \ — `XGRP (G23 G24)` **no está permitido** [F5].\n\n---\n\n## ⚠️ Restricciones\
    \ importantes\n\n- **Un módulo de salida con TIPO ID para señalizaciones generales\
    \ NO puede tener ecuación CBE programada** [F4].\n- Para **grupos directos**:\
    \ los operandos dentro del paréntesis deben tener índice **mayor** que el grupo\
    \ al que se asigna la CBE. Ejemplo permitido: `G21 = (G23 G24)` [F4].\n- Para\
    \ **grupos inversos**: los operandos deben tener índice **menor** que el grupo\
    \ al que se asigna la CBE. Ejemplo permitido: `G307 = (G305 G306)` [F4].\n\n---\n\
    \n> \U0001F4D6 Para la referencia completa de operadores CBE, el manual indica\
    \ consultar el **Apéndice «A» Control By Event** al final del manual de programación\
    \ [F2].\n\n**Fuente:** AM-8200 Manual de programación (Doc. M-162.1-AM8200-ESP\
    \ Rev A.3) — Honeywell Life Safety Iberia; AM-8200 Manual de instalación (Doc.\
