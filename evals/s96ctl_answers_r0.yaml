- bot_answer: '## Rango de temperatura de funcionamiento — ASD 535


    Según los datos técnicos del manual [F1], los rangos de temperatura son:


    **Caja del detector:**

    - Funcionamiento estándar: **–30 °C hasta +60 °C** (norma UL: máx. +40 °C) [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]

    - Almacenamiento (sin condensación): **–30 °C hasta +70 °C** [F1]


    **Conducto de aspiración:**

    - Funcionamiento estándar: **–30 °C hasta +60 °C** [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]


    **Fluctuación máxima permitida durante el funcionamiento** (caja + conducto):
    **20 °C** [F1]


    **Nota importante:** Es posible acordar con el fabricante rangos de temperatura
    inferiores o superiores. La instalación en rango de condensación solo podrá llevarse
    a cabo previa consulta con el fabricante [F2].


    **Caso especial — almacenes de ultracongelación:** El ASD 535 puede usarse en
    este entorno respetando la directriz T 131 390, con un rango restringido de **–30
    °C hasta 0 °C** [F3].


    ---


    Fuente: ASD535_TD_T131192es_h (sin revisión registrada)


    ---


    También puedo ayudarte con: **consumos de corriente por variante (535-1 a 535-4)**,
    **longitud y dimensionado del conducto de aspiración** o **sensores de humo compatibles
    (SSD 535)**.'
