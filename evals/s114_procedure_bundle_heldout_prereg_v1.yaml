  selector:
    path: src/rag/procedure_bundle_coverage.py
    sha256: cbd3902b823fa7d7d4fb4c9c3f6ba3781a5492c0b2e7be6364291d1cd9461a76
  historical_hyq_source:
    path: evals/s99_hyq_generated.jsonl
    sha256: 5fb56f1739f8713c263d331b5393ef1904d9a5311ba3f1ac15bd81828b86f8e7
  known_cohort_replay:
    path: evals/s114_procedure_bundle_replay_v1.json
