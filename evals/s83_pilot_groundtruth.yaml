_meta: >
  Ground-truth ADJUDICADO POR ALBERTO sobre los 15 docs del piloto v3 (s83). Es el denominador
  de PRECISION (no solo acuerdo Opus<->GPT). Cada doc: covered = SKU de producto con fuente
  sustantiva (regla: covered = el doc es FUENTE real de X; mencion = referencia de paso).
  family_scope = familia/linea (no es covered). 'open' = pendiente de confirmar. status low_ocr /
  fuzzy = la FUENTE limita la extraccion (confidence low, no es fallo del modelo).
  Uso: comparar opus_covered y gpt_covered del jsonl contra 'covered' -> precision/recall por modelo.

adjudicador: Alberto
