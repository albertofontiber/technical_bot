instrument: s112_synthesis_root_cause_audit_v1
scope:
  freeze: evals/s112_synthesis_context_freeze_v1.json
  questions: 12
  projected_synthesis_facts: 15
  method: exact_served_evidence_and_latest_answer_relational_review
decision_policy:
  synthesis_candidate: >-
    The complete relation is explicitly present in product-aligned served
    evidence and a manufacturer-independent obligation schema can express it.
  hold_upstream_or_gold: >-
    Do not count as synthesis repair when evidence is conflicting, belongs to
    a sibling product, omits a required relation, or supports only an absence
    inference.
rows:
