    classification: hold_document_conflict
    reason: >-
      Served sources reverse T1/T2 versus T3/T4 input/output assignments and
      also contain terminal OCR ambiguity. Resolve model and revision visually.
  - fact_key: "cat016#1:menu ZONA + ELEMENTO"
    classification: synthesis_candidate
    obligation_family: commissioning_menu_bundle
    reason: BUCLE, ZONA and ELEMENTOS actions are explicit in one aligned source.
  - fact_key: "cat017#2:licencia CLIP por lazo"
    classification: hold_evidence_partial
    reason: >-
      The sources require a CLIP loop licence but do not explicitly establish
      the evaluated one-licence-per-each-loop quantifier.
  - fact_key: "cat018#1:pestana Programacion: Zona + CBE"
    classification: synthesis_candidate
    obligation_family: point_programming_fields
    reason: The Program tab, Zone field and CBE field are explicit in one source.
  - fact_key: "cat018#2:Tipo SW / asociacion CBE"
    classification: synthesis_candidate
    obligation_family: typed_output_and_cbe_relation
    reason: >-
      Served aligned sources explicitly define point CBE activation and output
      modules programmed with software type SND; guided synthesis must join them.
  - fact_key: "hp001#2:1111"
