    reason: >-
      Section 7.6.1 and the below/above 100 percent interpretation are served,
      but V01 and V02 are absent from the served evidence.
  - fact_key: "hp003#0:12V"
    classification: synthesis_candidate
    obligation_family: battery_series_spec
    reason: Two 12 V 7 Ah batteries in series are explicit in one aligned source.
  - fact_key: "hp003#1:cable puente"
