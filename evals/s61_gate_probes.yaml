# s61 — Probe-set CONGELADO del gate (D1 vía-2 + D2) — diseño _s61_lever_design.md §5 (G6 r2)
# CONGELADO ANTES del paso B del gate (regla G6: las anclas exactas se fijan pre-datos).
# Matcher: scripts/strict_match.py — anchor_present(ancla, norm_ocr(content));
#   numéricas = frontera de dígito, texto = frontera de palabra (token completo).
# Semántica: hecho PRESENTE en la vista := ∃ chunk de la vista-del-generador
#   (top-5 con similarity>=0.4) cuyo content contiene TODAS las anclas del hecho (AND).
# Anclaje en sustento real (pre-check 2026-06-11, _tmp_s61_probe_check.py):
#   - D1: cada hecho verificado PRESENTE en la vista del frozen s58 del gold (donde su
#     PASS unánime se sostuvo). cat010-h1 además AUSENTE en s59 (donde cat010 CAYÓ) —
#     las anclas detectan exactamente la pérdida de sustento que deben detectar.
#   - D2: verificado contra el frozen s59 de la rama de preservación (donde la ganancia
#     ocurrió). hp001-h3 (clave usuario 1111, MU-376 p10) AUSENTE también en s59: la
#     ganancia NO la necesitó → INFORMATIVA, fuera de la condición D2.
#   - cat022: el doc mezcla convención decimal entre chunks (OCR): "2,5"/"3,0"/"4,5"
#     con coma verificadas presentes; "2.5"/"3.0" con punto ausentes en s58.
#   - cat012-h1 ("1,2" sola): ancla numérica corta DECLARADA débil (frontera de dígito
#     mitiga; el gold aporta h2-h4 fuertes).
