  required_generation_inputs:
    - provenance contract and version
    - chunker SHA-256
    - ordered extraction/raw-artifact SHA-256 pairs
    - materializer and validator SHA-256
  required_row_inputs:
    - materialization id
    - extraction SHA-256
    - chunk ordinal
    - hash of content, raw, chunker, structural span, anchor and full lineage

