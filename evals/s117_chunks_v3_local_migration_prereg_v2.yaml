M0a_M1_gate:
  required:
    - exact frozen source manifests and counts
    - exact frozen development content-stream manifest
    - exact expected chunk and titled-chunk counts in both stores
    - zero row, raw-resolution, duplicate, identity or generation validation failures
    - byte-logically identical second execution
    - property tests cover arbitrary headings, repeated headings, empty lineage, oversized splits and malformed envelopes
    - no code branch depends on a frozen document SHA, filename or manufacturer
    - SQL contract models immutable generations, same-generation duplicate FK, atomic publication, RLS and least privileges
    - SQL file passes static checks but remains NO-GO for DB until M0b executes on disposable PostgreSQL plus pgvector
  decision_if_go: authorize read-only chunks_v2 reuse analysis only
  never_authorizes:
    - Supabase schema/data reads or writes other than a separately authorized M2 read-only analysis
    - paid context or embedding generation
    - DB load, HNSW, funnel, serving, deploy or fact relabeling

future_gates:
  M0b: real PostgreSQL plus pgvector apply/catalog/grants/RLS/RPC/rollback execution
  M2: exact read-only donor analysis with legacy provenance labels
  M2_5: cost-capped enriched snapshot and receipt
  M3: separately authorized shadow schema and load
  M4a: separately authorized HNSW build and ANALYZE
  M4b: frozen retrieval-rerank-synthesis-fact regression
  M5: explicit human GO, default-off canary and rehearsed rollback

cost_contract: {model_calls: 0, network_calls: 0, database_reads: 0, database_writes: 0}
