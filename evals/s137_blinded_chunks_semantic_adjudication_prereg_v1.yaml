    - document_id
    - chunk_id
    - extraction_sha256
    - strict_context_donor
    - is_gold_member
    - context
    - s135_classification
    - s136_classification
  judge_tools: false
  judge_repo_access: false

rubric:
  relevance_labels: [DIRECT, SUPPORTING, IRRELEVANT, UNCERTAIN]
  answerability_labels: [COMPLETE, PARTIAL, NONE]
  confidence_labels: [HIGH, MEDIUM, LOW]
  every_evidence_item_exactly_once: true
  minimum_sufficient_set_known_ids_only: true
  complete_requires_nonempty_minimum_set: true
  minimum_set_relevance_allowed: [DIRECT, SUPPORTING]
  minimum_set_requires_direct_item: true
  no_reference_answer: true
  max_rationale_words_per_question: 90

models:
  primary:
    provider: openai
    model: gpt-5.6-sol
    api: responses
    reasoning_effort: xhigh
    reasoning_mode: standard
    structured_output: true
    max_output_tokens: 12000
    max_counted_input_tokens: 120000
  independent:
    provider: anthropic
    model: claude-fable-5
    api: messages
    thinking: adaptive
    effort: xhigh
    structured_output: true
    max_output_tokens: 8000
    max_counted_input_tokens: 120000
  optional_arbitration:
    trigger: terminal_decision_disagreement_only
    provider: openai
    model: gpt-5.6-sol
    api: responses
    reasoning_effort: xhigh
    reasoning_mode: standard
    structured_output: true
    max_output_tokens: 8000
    max_counted_input_tokens: 180000
    judge_identities_visible: false

terminal_rule:
  success: >-
    answerability is COMPLETE, minimum_sufficient_evidence_ids is non-empty,
    and every selected item has frozen candidate rank <= 10
  success_label: CANDIDATE_SUCCESS_AT_10
  failure_label: REAL_CANDIDATE_RETRIEVAL_LOSS
  unresolved_label: HOLD
  initial_convergence: same terminal label from both independent judges
  disagreement: optional_arbitration_once
  arbitration_failure: HOLD

promotion_gate:
  required_terminal_successes: 3
  required_holds: 0
  packet_valid: true
  responses_valid: true
  population_drift: 0
  actual_external_usd_lt: 10
  facts_moved_to_ok: 0

