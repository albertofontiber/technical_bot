mechanisms:
  C1:
    name: coverage_mandatory_callout_card
    flag: COVERAGE_MANDATORY_CALLOUT       # _strict_on_off, default off, byte-identico off
    where: src/rag/post_rerank_coverage.py::_build_served_coverage_cards
    contract: >-
      1 card extra maxima por chunk de lane validada: oraciones con trigger del lexico
      CERRADO F-MANDATORY (las _mandatory_triggers de must_preserve) FUERA de los spans
      ya servidos; contiguas mergeadas; <=600 chars; mandatory_callout: true;
      exact_source_span_validated: true; receipted y revalidada por
      has_exact_served_coverage_receipt igual que toda card. La vista abierta la ven
      generador Y detector (paridad _chunk_text intacta).
    target: obl_0d6a30948dfd
    confidence: alta
  C2:
    name: served_not_cited_binding
    where: src/rag/must_preserve.py (apply + bind)
    contract: >-
      Atomos de fragmentos servidos+ATTESTADOS sin cita [Fn]: attestation identica
      (fail-closed); binding sobre la RESPUESTA COMPLETA con umbral REFORZADO (>=3
      tokens propios, o numero propio + >=1 token propio; MANDATORY: contexto
      procedimental >=3); anexo cita [Fn] del fragmento fuente.
    target: obl_2f5d79e354b9
    confidence: media
  D1a:
    name: defline_equals_separator
    where: src/rag/must_preserve.py::_DEFLINE
    contract: "separador '=' (rodeado de espacios) como separador de definicion, det+hibrido"
    targets: [obl_015f9b9aaa3a]
    confidence: baja                        # el binding de 015f sigue sin resolver (declarado)
  D1b:
    name: hybrid_family_f_relation
    where: src/rag/must_preserve.py (prompt hibrido + shape-check en codigo)
    contract: >-
      Familia F-RELATION (clausula relacional/definicional, el LLM-assist declarado en
      el diseno §1.1): span verbatim + grounding fold-tolerante sin cambios; shape =
      clausula completa con verbo conjugado >=40 chars (reusa span_good_form) Y (>=1
      numero-con-unidad O >=2 tokens distintivos propios); binding presencia-parcial
      (>=2 tokens propios / numero propio); render whitelist v5 sin cambios.
    targets: [obl_a5d9fa1f9253, obl_7aa723717412, obl_b2043cd4379b]
    confidence: media
  D1c:
    name: stem_tolerant_binding
    where: src/rag/must_preserve.py::atom_exigible_in
    contract: >-
      match token-propio <-> token-ventana con tolerancia de plural es/en via
      _noun_stem (ya vivo en F-COUNT v4); generico, no por-target.
    targets: [obl_a5d9fa1f9253]
    confidence: media
  D2:
    name: single_distinctive_token_binding
    where: src/rag/must_preserve.py::atom_exigible_in
    contract: >-
      bind valido con 1 solo token propio SI es DISTINTIVO (definicion CERRADA
      determinista, sin DB runtime): no-stopword y (acronimo [A-Z]{2,6} en superficie
      original, o alfanumerico con digito, o identificador del catalogo gobernado en
      memoria). 'cbe' califica; 'sistema'/'ajuste' (clase seed-271) NO. idf-de-corpus
      en runtime DESCARTADO (dependencia DB + drift).
    target: obl_7bba8d03d496
    confidence: media

