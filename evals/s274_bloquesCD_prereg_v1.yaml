  probe_number: 4
  prior_probes: {v1: 0.75, v2: 1.09, v3: 1.14}
  anti_overfit: >-
    Riesgo creciente DECLARADO (4o probe a los mismos 4 targets). Mitigaciones: (1)
    cambios exclusivamente GENERICOS justificados por los diagnosticos §diagnostics_basis,
    jamas por los textos gold; (2) validacion fresca P1 (seed nueva, exclusiones
    acumuladas) SIEMPRE antes del probe; (3) UN solo probe consolidado C+D (P2), sin
    re-runs ni retry; (4) gates de dano heredados pareados CONTEMPORANEOS (leccion v3
    Bloque B: jamas referencia congelada); (5) sin probe #5: lo no convertido queda
    residual por-clase; reapertura = evidencia nueva + permiso explicito (patron
    DEC-126/132b).

phases:
  - id: P0
    name: build_flagoff_tests_duo
    db_writes: 0
    cost_ceiling_usd: 0.30                 # lado Sol del duo
    procedure: >-
      Build de C1/C2/D1a/D1b/D1c/D2 flag-off + tests unitarios sin red (casos pineados
      de los DIAGNOSTICOS, no de los golds) + duo Protocolo 3 (Fable sub-agente + Sol
      xhigh con repo) del build completo.
    gate: "tests verdes + duo sin criticos abiertos"
  - id: P1
    name: etapa1_v9_validacion_fresca
    db_writes: 0
    cost_ceiling_usd: 2.50
    procedure: >-
      Cohorte de mutaciones FRESCA (seed nueva; exclusiones acumuladas v1+s270-274):
      gates v8 INTEGROS (recall por familia + checks v4-v8) + clases nuevas:
      defline_equals (recall en mutados, FP=0 en clean), f_relation_recall (mutacion
      qualifier_loss), served_not_cited (FP=0 en clean), single_distinctive_token
      (FP=0 en clean + re-clase seed-271 = 0), stem_binding (FP=0 en clean).
      Brazo det $0 + brazo hibrido pagado.
    gate: >-
      GO por-fix independiente: un NO-GO mata SOLO su fix (los demas siguen); los gates
      v8 heredados en NO-GO matan TODO el bloque D.
  - id: P2
    name: probe_consolidado_CD
    db_writes: 0
    cost_ceiling_usd: 6.00
    procedure: >-
      UNICO probe (el #4). hp017: generacion fresca PAREADA OFF/ON de C1 (K=3, ambos
      brazos MUST_PRESERVE_CONTRACT=on = estado prod DEC-131; flip solo de
      COVERAGE_MANDATORY_CALLOUT call-time; misma DB GET-only, mismo dia, temp=0).
      cat018/hp002: apply-side C2+D sobre borradores OFF ALMACENADOS v3 (0 generacion)
      con brazo hibrido Haiku; hp011 (2f5d): apply-side C2 sobre almacenados. Matcher
      determinista NFKD s163 (0 juez); checks por-obligacion IDENTICOS al probe v3 +
      merged_warning_block + disclosure opcion-1 (DEC-128) sin cambios.
    gates:
      conversion: "estable >=2/3 por candidato; se reporta TODO (tambien 015f, sin gatear)"
      protegidas: "obl_05482a6b3f0e / obl_0db2b9f2842a / obl_5784f16b1a11 estables-en-OFF no caen en ON"
      conflictos: "0 conflictos nuevos"
      anclas: "matriz per-fact pareada +0/-0 con STOP duro en la union s104+s105"
      retrieval_invariante: "appended_ids/pool identicos OFF/ON en C1 (la card cambia la vista, no el pool)"
    stop_rule: >-
      STOP en cualquier gate de dano => el fix causante queda cerrado sin re-run (no
      hay probe #5); las conversiones de fixes limpios se conservan.
  - id: P3
    name: negcontrol_vivo_smoke
    db_writes: 0
    cost_ceiling_usd: 1.50
    procedure: >-
      5 golds sanos del smoke Etapa-3 con flags ON (pareado): 0 apendices espurios
      nuevos, 0 anclas perdidas, monotonia ON = OFF + apendice opcional.
    gate: "0 espurios / 0 anclas perdidas"
  - id: P4
    name: cierre_banking
    db_writes: 0
    cost_ceiling_usd: 0.00
    procedure: >-
      Banking SOLO de conversiones certificadas segun el path del flag de prod (patron
      DEC-131: certificacion + recibo vivo); DECs; closeout; LEVER_DIGEST.
    gate: "aritmetica determinista SHA-pineada (patron s270/s272)"

