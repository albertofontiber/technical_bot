# Resolución estructurada de los 29 conflicts (traducción de las decisiones de Alberto a campos explícitos).
# Buckets:
#   primary    = modelos cubiertos principales (role=primary)
#   secondary  = módulos/accesorios cubiertos en detalle (role=secondary)
#   candidate  = cubiertos con info limitada / tienen manual propio / 1 sola fuente (role=secondary, candidate=true)
#   software   = sujeto cubierto que es SOFTWARE (category=software)
#   compat     = compatible_with (aplicabilidad/objetivo, NO covered)
#   mention    = mencionado, NO covered
#   drop       = NO-producto a excluir (config .exe, SKU de soporte, PCB interno)
#   aliases    = {canonical: [alias,...]} solo donde el nombre necesita puente explícito
# El build parte de la UNIÓN canónica (build_models, igual que los 985) salvo replace=true, y la adjudicación
# MODIFICA encima (drop/compat/mention quitan; buckets reclasifican rol; no-nombrados con primary adjudicado -> secondary).
# Los nombres que Alberto AÑADIÓ y no están en crudo entran como found_by=adjudication (metadata vacía).

# ── GRUPO 1 ───────────────────────────────────────────────────────────────────
- sf: "55393002 Manual Fuentes de Alimentacion FAD-905 ES FR GB IT_V2"
  replace: true
  primary: ["FAD-902", "FAD-905"]
  aliases: {"FAD-902": ["Fuente de Alimentación 2A"], "FAD-905": ["Fuente de Alimentación 5A"]}
  note: "2 productos distintos (2A=FAD-902, 5A=FAD-905); GPT solo vio el 905. replace=override (la extracción tenía descriptivos falsos 'FAD-905 2A/5A'). Datasheet Detnov DS-361."

- sf: "FS2-1"
