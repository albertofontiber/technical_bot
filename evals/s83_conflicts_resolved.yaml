  aliases: {"FS-1": ["Panel de Control de 1 Zona"], "FS-2": ["Panel de Control de 2 Zonas"], "FS-4": ["Panel de Control de 4 Zonas"]}
  note: "Familia FS por nº de zonas (manual FS-1-4). 'FS2-1' = mis-parse; replace=override de los descriptivos crudos. Designación FS-1/FS-2/FS-4 CONFIRMADA por Alberto."

