- qid: cat010
  question: ¿Cómo se alimenta la sirena/avisador intrínsecamente seguro IS-mA1 en
    una zona peligrosa (ATEX) y cuáles son sus parámetros de seguridad intrínseca
    de entrada?
  answer: '# Alimentación e IS del IS-mA1 en zona peligrosa (ATEX)


    ## Clasificación ATEX y zonas de uso


    El IS-mA1 está certificado como [F1]:

    - **II 1G Ex ia IIC T4 Ga**

    - Temperatura ambiente: **-40 °C ≤ Ta ≤ +60 °C**

    - Certificado: **SIRA 05ATEX2084X** (sufijo ''X'' → condiciones especiales de
    uso)

    - Apto para zonas **0, 1 y 2** con gases y vapores inflamables, grupos **IIA,
    IIB e IIC**, clases de temperatura **T1 a T4** [F1]


    ---


    ## Parámetros de seguridad intrínseca de entrada (Entity Parameters)


    ### Terminales **+ / −** (alimentación principal del avisador)


    | Parámetro | Valor |

    |---|---|


    - **Ui = 28 V** [F1][F3]

    - **Ii = 93 mA** [F1][F3]

    - **Pi = 660 mW** [F1][F3]

    - **Ci = 0** [F1][F3]

    - **Li = 0** [F1][F3]


    > ⚠️ La capacitancia total conectada a los terminales +/− (cable + cualquier otra
    capacitancia) **no debe superar 83 nF** [F3][F4].


    ### Terminales **S2 y S3** (cambio de tono / etapas de alarma)


    - **Ui = 28 V** [F1][F3]

    - **Ii = 0 mA** [F1][F3]

    - **Ci = 0** [F3]

    - **Uo = 16,8 V** [F3]

    - **Io = 7,3 mA** [F3]

    - **Po = 31 mW** [F3]


    > ⚠️ La corriente de entrada permitida es **cero**, por lo que S2 y S3 **solo
    pueden conectarse** a [F5][F6]:

    > - Barrera de diodo de retorno (diode return barrier), con caída de tensión **<
    0,9 V**

    > - Relé intrínsecamente seguro

    > - Aislador galvánico

    > - Todos deben estar **certificados Ex ia por un Organismo Notificado**

    > - Alternativamente, pueden conectarse directamente a un **interruptor de accionamiento
    mecánico** en la zona peligrosa


    ---


    ## Aparato asociado requerido (lado seguro)


    ### Opción A — Barreras Zener


    El aparato asociado en zona segura debe proporcionar [F3][F4]:

    - **Uo ≤ 28 V**

    - **Io ≤ 93 mA**

    - **Po ≤ 660 mW**

    - **Co ≥ Ccable**

    - **Lo ≥ Lcable**


    Para los terminales S2/S3 se usan **barreras de diodo de retorno** con [F4]:

    - **Uo ≤ 28 V**

    - **Io = 0**


    > La resistencia entre la tierra intrínsecamente segura y la tierra de protección
    debe ser **< 1 Ω** [F4].


    ### Opción B — Aisladores galvánicos


    Los aisladores galvánicos **no requieren conexión de tierra de alta integridad**,
    lo que simplifica la instalación en sistemas pequeños [F10]. El IS-mA1 puede ser
    alimentado por cualquier aislador galvánico con parámetros de salida dentro de
    los límites especificados, certificado **Ex ia** por un Organismo Notificado [F10].


    Para las etapas 2ª y 3ª (S2/S3) se usan **relés galvánicamente aislados** certificados
    Ex ia [F10].


    ---


    ## Configuraciones de alarma


    - **Alarma monofásica**: una sola barrera Zener de canal único (interruptor en
    positivo) o dos canales (interruptor en negativo) [F8]

    - **Alarma multifásica**: conectar S2 a 0 V activa la 2ª etapa; S3 a 0 V activa
    la 3ª etapa [F7][F9]


    ---


    ## Advertencias de seguridad


    - **Desconectar la alimentación antes de cualquier intervención** para evitar
    ignición de atmósferas inflamables [F3][F4]

    - La sustitución de componentes puede comprometer la seguridad intrínseca [F3][F4]

    - La carcasa es de **plástico ABS** — protegerla de sustancias agresivas (ácidos,
    disolventes) [F1]

    - Protección de envolvente: **IP 65** [F3][F4]

    - Limpieza **solo con paño húmedo** para evitar cargas electrostáticas [F1]

    - La instalación debe realizarla **personal cualificado** [F1]


    ---


    **Fuentes:**

    - IS5001-F_IS-mA1_EN (Issue F, 06-08-15)

    - manual IS MA1 (Issue H, 03-01-2020)


    ---


    También puedo ayudarte con: **selección de tono y configuración de los switches
    1-6**, **dimensionado del cable IS entre barrera y avisador**, o **procedimiento
    de inspección periódica en zona ATEX**.'
