- qid: cat017
  question: ¿Como se cablea y se da de alta (configura) un lazo en la central Notifier
    INSPIRE (E10/E15)?
  answer: "# Cableado y configuración de lazo — INSPIRE E10/E15\n\n---\n\n## PARTE\
    \ 1: CABLEADO DEL LAZO\n\n### Terminales del módulo LAZO OPAL X2\n\nEl módulo\
    \ de doble lazo tiene código de color **morado** (referencia **HOP-433-100**)\
    \ [F3] y sus terminales son [F2][F3]:\n\n**Lazo 1:**\n- Terminal **1** → Lazo\
    \ 1 OUT +VE (Salida +)\n- Terminal **2** → Lazo 1 OUT -VE (Salida -)\n- Terminal\
    \ **3** → ⊕ (**NO USAR** para pantalla de cable)\n- Terminal **4** → Lazo 1 IN\
    \ +VE (Entrada +)\n- Terminal **5** → Lazo 1 IN -VE (Entrada -)\n\n**Lazo 2:**\n\
    - Terminal **6** → Lazo 2 OUT +VE (Salida +)\n- Terminal **7** → Lazo 2 OUT -VE\
    \ (Salida -)\n- Terminal **8** → ⊕ (**NO USAR** para pantalla de cable)\n- Terminal\
    \ **9** → Lazo 2 IN +VE (Entrada +)\n- Terminal **10** → Lazo 2 IN -VE (Entrada\
    \ -)\n\n> ⚠️ **IMPORTANTE:** Los terminales 3 y 8 NO deben usarse para la pantalla\
    \ del cable de lazo. La pantalla debe conectarse a la **Barra de Tierra** de la\
    \ central [F2][F3]. Se recomienda poner a tierra **un solo extremo** de la pantalla\
    \ [F7].\n\n---\n\n### Topología del lazo\n\nEl lazo se cablea en **bucle cerrado**\
    \ (anillo): la salida de la central llega al primer dispositivo, pasa por todos\
    \ los dispositivos en serie, y el retorno vuelve a la entrada de la central [F1].\
    \ Los dispositivos OPAL incorporan **aisladores internos** en las bases (tipo\
    \ **B501 AP**), por lo que el conductor positivo del lazo aparecerá como circuito\
    \ abierto al medir con multímetro [F5][F6].\n\n> ⚠️ **NO mezclar dispositivos\
    \ OPAL y CLIP en el mismo lazo** [F3].\n\n---\n\n### Capacidad por lazo\n\n**Protocolo\
    \ OPAL** [F3][F4]:\n- Hasta **159 detectores** OPAL\n- Hasta **159 módulos** OPAL\
    \ (sirenas, pulsadores, módulos E/S)\n- Corriente máxima por lazo: **750 mA**\
    \ [F3]\n\n**Protocolo CLIP** (requiere licencia) [F4]:\n- Hasta **99 detectores**\
    \ + **99 módulos** por lazo\n\n> ⚠️ Según **EN54-2, apartado 13.7**, hay una restricción\
    \ de **512 detectores y/o pulsadores** por módulo de lazo (que comprende 2 circuitos)\
    \ [F3].\n\n---\n\n### Numeración de lazos\n\nLos circuitos se numeran **secuencialmente\
    \ de izquierda a derecha** del portamódulos. El primer módulo instalado en la\
    \ ranura izquierda tiene los lazos 1 y 2; los siguientes módulos continúan la\
    \ numeración. En la E15 (dos filas de portamódulos), la segunda fila continúa\
    \ desde la primera [F3].\n\n---\n\n## PARTE 2: COMPROBACIONES PREVIAS CON MULTÍMETRO\n\
    \nAntes de conectar el lazo a la central [F5][F6]:\n\n1. **Comprueba la continuidad**\
    \ de cada tramo del lazo y mide la resistencia extremo a extremo.\n2. **Resistencia\
    \ máxima admisible** [F6]:\n   - Protocolo **OPAL**: < **40 Ω**\n   - Protocolo\
    \ **CLIP** (con detección de dirección duplicada): < **40 Ω**\n   - Protocolo\
    \ **CLIP** (sin detección de dirección duplicada): < **71 Ω**\n   - Para medir:\
    \ desconecta el lazo de los terminales de la central, mide entre *Lazo X Entrada\
    \ -VE* y *Lazo X Salida -VE*, multiplica el resultado por 2 y suma la resistencia\
    \ de cada aislador (**0,1 a 0,13 Ω** por aislador) [F6].\n3. **Capacidad del cable**:\
    \ debe ser inferior a **0,5 µF** [F6].\n4. Comprueba la continuidad de la **pantalla\
    \ del cable** (resistencia muy baja) y verifica que **no hay continuidad** entre\
    \ la pantalla y los conductores +VE/-VE [F5].\n5. Para dispositivos OPAL: al retirar\
    \ el detector de la base B501 AP, los terminales **+2 y +4** de la base se cortocircuitan\
    \ automáticamente, manteniendo la continuidad del lazo [F6].\n\n> ℹ️ Se recomienda\
    \ usar la herramienta **POL-200-TS** para diagnósticos detallados del lazo antes\
    \ de conectar a la central. La herramienta **POL-200** es compatible con protocolos\
    \ OPAL y CLIP [F7].\n\n> ⚠️ **NUNCA uses un comprobador de alta tensión (megóhmetro)\
    \ en el circuito de lazo** [F5].\n\n---\n\n## PARTE 3: CONFIGURACIÓN DEL LAZO\
    \ (CLSS + PANEL)\n\n### Paso 1 — Primer encendido\n\n1. Conecta el cableado del\
    \ lazo y el cable HMI de la puerta a la CPU [F1].\n2. Conecta la alimentación\
    \ principal y las baterías (**2 × 12 V 24 Ah** para E10/E15) [F1].\n3. Al arrancar,\
    \ el **LED verde \"Alimentación\"** se encenderá fijo. Si hay averías, se encenderá\
    \ el **LED amarillo de AVERÍA** y sonará el zumbador — pulsa **Silenciar Zumbador**\
    \ [F10].\n4. Selecciona **país** e **idioma** [F10].\n5. Ajusta **hora y fecha**\
    \ (deben coincidir con el ordenador que ejecuta CLSS) [F10].\n\n### Paso 2 — Verificar\
    \ módulo de lazo\n\n6. Ve a la página **Información del Sistema**, despliega el\
    \ módulo de lazo con ▽. Inicialmente mostrará **\"Lazo X: 0 Dispositivos — Inicializando...\"\
    ** [F10].\n\n### Paso 3 — Configuración previa en CLSS (obligatoria para CLIP\
    \ o TC800)\n\n7. Conecta la herramienta de configuración **CLSS** [F8].\n8. Ve\
    \ a **Ajustes → Ajustes HMI** y en **Tipo de marca** selecciona **Notifier EN**\
    \ [F8].\n9. En **Ajustes de lazo** [F8]:\n   - Si el lazo **no se usa**: marca\
    \ ☑ **Sin Uso** [F1][F8].\n   - Si el lazo **se usa**: selecciona **Limitar a\
    \ VdS 2540** (Sí/No) — el valor de resistencia cambia según la selección. Selecciona\
    \ el **tipo de cable**.\n   - El protocolo por defecto es **OPAL** (modo 'Protocolo\
    \ avanzado'). Para usar **CLIP o TC800**, se requiere **licencia adicional** antes\
    \ de proceder [F8].\n10. Envía la configuración a la central siguiendo los pasos\
    \ de **\"Enviar configuración a la central\"** [F8].\n\n### Paso 4 — Auto Configuración\
    \ (búsqueda de dispositivos)\n\n11. En el panel, selecciona **Auto Configuración**\
    \ para buscar dispositivos en el lazo. Confirma en la ventana emergente [F9].\n\
    12. Una vez completada, selecciona la flecha **>** junto al botón para ver el\
    \ estado de averías del lazo [F9].\n13. Si hay averías, léelas y corrígelas (causas\
    \ típicas: discordancia de diseño/cableado, avería de cableado, RFI, error de\
    \ módulo, conexionado incorrecto) [F9].\n14. Selecciona **Hecho** al completar.\
    \ Si no hay averías, vuelve a la página **Información del Sistema** [F9].\n15.\
    \ **Repite los pasos 11–14 para cada lazo** hasta descubrir todos los dispositivos\
    \ [F9].\n\n---\n\n**Fuente:** HOP-138-8ES issue 6 (01-2026) — Instrucciones de\
    \ puesta en marcha INSPIRE E10/E15; HOP-138-9ES issue 5 (11-2025) — Instalación\
    \ INSPIRE E10 (sin revisión registrada en fragmentos)\n\n---\n\nTambién puedo\
    \ ayudarte con: **averías típicas tras Auto Configuración**, **longitud máxima\
    \ de cable de lazo y cálculo con CLSS**, o **conexionado de dispositivos OPAL\
    \ específicos (bases, módulos, pulsadores)**."
