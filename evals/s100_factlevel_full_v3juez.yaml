- qid: hp010
  question: En la Morley DXc, ¿cómo se añade un nuevo detector al lazo tras la puesta
    en marcha inicial?
  answer: "## Añadir un nuevo detector al lazo en la DXc (tras puesta en marcha)\n\
    \nCuando se conecta un nuevo detector al lazo, la central lo detectará como **\"\
    EQUIPO NUEVO\"** [F2]. El procedimiento para aceptarlo es realizar una **Autobúsqueda**\
    \ desde el menú de Lazos.\n\n---\n\n### Pasos:\n\n1. **Accede al menú de Lazos**\
    \ (Nivel de programación correspondiente).\n\n2. **Pulsa la tecla `2`** para seleccionar\
    \ la función **'Autobúsqueda'** [F1].\n\n3. Si la central tiene más de un lazo,\
    \ **introduce el número de lazo** donde está el nuevo detector y pulsa **⊙** para\
    \ confirmar [F1].\n\n4. Confirma que deseas realizar la autobúsqueda cuando aparezca\
    \ la pantalla:\n   ```\n   [Autobusqueda]\n   Lazo: 1  Autobusqueda?\n   OK:Confirm\
    \    ←:Cancel\n   ```\n   Pulsa **⊙** para iniciar [F1].\n\n5. Espera a que finalice\
    \ el proceso. En pantalla aparecerá el progreso con una barra [F1].\n\n6. Al terminar,\
    \ **verifica el resumen** que muestra la pantalla [F1]:\n   - **Total** de equipos\
    \ encontrados\n   - **Nuevos**: debe mostrar al menos **1** (el detector recién\
    \ añadido)\n   - **Eliminados** y **Cambiados**: deben ser **0** si no hay otros\
    \ cambios\n   - Subtotales por tipo: ION, OPT, TMP, MLT, PUL, MON, SIR, REL, OTROS\n\
    \n7. Pulsa **⊞** para salir y regresar al menú de Lazo [F1].\n\n---\n\n### ⚠️\
    \ Advertencia importante\n\n> Si en tu mercado el **protocolo es seleccionable**,\
    \ tras un cambio de protocolo **espera 2 minutos** antes de realizar la autobúsqueda.\
    \ La central necesita ese tiempo para rearmar los equipos del lazo [F1].\n\n---\n\
    \n### Eventos relacionados a tener en cuenta [F2]:\n\n- **EQUIPO NUEVO**: la central\
    \ ha detectado el nuevo detector → solución: realizar autobúsqueda ✓\n- **DOBLE\
    \ DIRECCION**: dos equipos responden a la misma dirección → cambia la dirección\
    \ de uno de ellos\n- **NO RESPONDE**: el equipo no se encuentra → comprueba que\
    \ el lazo está cerrado y el detector bien conectado\n- **TIPO EQUIPO CAMBIADO**:\
    \ si sustituiste un detector por uno de tipo diferente → repite la autobúsqueda\n\
    \n---\n\n**Fuente:** DXc_Manual de configuracion (sin revisión registrada); Eventos-Averias-de-Equipos-en-DXc\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **verificación\
    \ del cableado del lazo con aisladores**, **anulación temporal del detector durante\
    \ la instalación** o **consulta del valor analógico del nuevo detector tras la\
    \ autobúsqueda**."
