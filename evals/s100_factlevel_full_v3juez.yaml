- qid: cat022
  question: En los detectores de llama Spectrex SharpEye 40/40, ¿qué diferencia hay
    entre el modelo 40/40L y el 40/40L4, y qué significa el sufijo «B» (p. ej. 40/40LB)?
  answer: "## Diferencias entre 40/40L, 40/40L4 y el sufijo «B»\n\n### 40/40L vs 40/40L4\
    \ — Longitud de onda del sensor IR\n\nLa diferencia principal está en la longitud\
    \ de onda de trabajo del sensor infrarrojo [F1]:\n\n- **S40/40L**: sensor IR que\
    \ funciona a una longitud de onda entre **2,5 y 3,0 µm**. Apto para detectar:\n\
    \  - Combustibles a base de hidrocarburos y fuegos de gas\n  - Fuegos de hidróxido\
    \ e hidrógeno\n  - Fuegos de metales o materia inorgánica\n\n- **S40/40L4**: sensor\
    \ IR que funciona a una longitud de onda de **4,5 µm**. Apto **únicamente** para:\n\
    \  - Detección de fuegos de hidrocarburos\n\nAmbos modelos comparten la misma\
    \ arquitectura UV/IR y la ventana óptica calefactada [F1].\n\n---\n\n### Sufijo\
    \ «B» — Función BIT incorporada\n\nEl sufijo **«B»** indica que el modelo incluye\
    \ la función de **Prueba Incorporada (BIT)** [F1]:\n\n- **40/40LB** y **40/40L4B**\
    \ → incluyen BIT\n- **40/40L** y **40/40L4** → **no** incluyen BIT\n\nAdicionalmente,\
    \ los modelos con sufijo «B» tienen certificación **SIL-2 (TÜV)** según **IEC\
    \ 61508.4, Capítulo 3.5.12**, que no está disponible en los modelos sin sufijo\
    \ «B» [F2].\n\nLa condición de alerta SIL-2 se implementa mediante [F2]:\n- Señal\
    \ de alerta a través del lazo de **0-20 mA**, o\n- Señal de alerta mediante relé\
    \ de alarma y avería\n\n---\n\n### Resumen rápido\n\n- **40/40L** → IR a 2,5–3,0\
    \ µm, sin BIT, sin SIL-2\n- **40/40LB** → IR a 2,5–3,0 µm, **con BIT**, **con\
    \ SIL-2**\n- **40/40L4** → IR a 4,5 µm (solo hidrocarburos), sin BIT, sin SIL-2\n\
    - **40/40L4B** → IR a 4,5 µm (solo hidrocarburos), **con BIT**, **con SIL-2**\n\
    \nTodos los modelos comparten las certificaciones **ATEX/IECEx**, **FM/CSA** y\
    \ **EN54-10** [F2].\n\n---\n\nFuente: Manual de usuario. Detector S40/40L-LB-L4-L4B\
    \ — MNDT722_40-40L (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **rangos de sensibilidad por modelo**, **conexionado eléctrico** o **procedimientos\
    \ de prueba BIT** del S40/40L."
