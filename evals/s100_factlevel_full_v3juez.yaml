- qid: hp017
  question: ¿Cómo se programa el retardo de salida de alarma principal en la Notifier
    PEARL?
  answer: '# Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura a través de las **reglas
    de causa-efecto** (Apéndice 5) [F1], accesibles desde el menú de configuración
    de nivel 3 [F7][F8].


    ---


    ## Dónde se configura


    La ruta de acceso es [F8]:


    1. Accede al nivel de acceso **L3** (clave de nivel 3)

    2. Menú principal → **«1: Editar Configuración»**

    3. Selecciona **«8: Causa y Efecto»**


    ---


    ## Tipos de retardo disponibles


    Al definir una regla de causa-efecto, puedes asignar uno de los siguientes **seis
    tipos de retardo de salida** [F1][F2]:


    - **Fijo**: el retardo no puede ser detenido ni ampliado por el usuario; el tiempo
    restante no se muestra en LCD [F2]

    - **Estándar**: la salida se detiene si se pulsa SILENCIAR SIRENAS; el retardo
    puede anularse (nivel 2) y el tiempo restante se muestra en LCD [F2]

    - **No Silenc.**: el retardo NO se detiene con SILENCIAR SIRENAS; sí puede anularse
    en nivel 2 y muestra tiempo restante [F2]

    - **Est. Ext.**: la salida se detiene con SILENCIAR SIRENAS o con AMPLIAR RETARDO;
    puede anularse en nivel 2 [F2]

    - **RetExtStd**: similar al Estándar pero el temporizador comienza en RETARDO
    AMPLIADO al pulsar esa tecla [F2]

    - **No Sil. Ext**: no se detiene con SILENCIAR SIRENAS, pero sí con AMPLIAR RETARDO;
    puede anularse en nivel 2 [F2]

    - **SinRetExt**: el temporizador comienza en RETARDO AMPLIADO; no responde a SILENCIAR
    SIRENAS ni a AMPLIAR RETARDO para detener la salida [F2]


    ---


    ## Comportamiento operativo del retardo


    Una vez activo el retardo [F4]:


    - El **LED de RETARDO ACTIVO** se enciende en el panel [F3]

    - El tiempo restante se muestra en la **pestaña ALARMA** (según el tipo configurado)
    [F2]

    - La tecla **AMPLIAR RETARDO** (nivel de acceso 2) permite extender el tiempo
    [F4]

    - La tecla **FIN RETARDO** (nivel de acceso 1) termina el retardo inmediatamente
    y activa las salidas [F4]


    ---


    ## Nota sobre el pulsador AMPLIAR RETARDO


    El pulsador **AMPLIAR RETARDO** puede habilitarse o deshabilitarse desde [F5]:


    - Ruta: **Apéndice 1 → parámetro 10: «Extend Delay Button»**

    - Valores: **Enabled / Disabled**


    Esta opción existe porque la función no es requerida en todos los mercados [F5].


    ---


    > ⚠️ **Importante**: Los fragmentos disponibles describen los tipos de retardo
    y su comportamiento, pero **no especifican el procedimiento paso a paso para introducir
    el valor numérico del tiempo de retardo** dentro del editor de reglas de causa-efecto.
    Para ese detalle concreto, consulta el Apéndice 5 completo del manual físico.


    ---


    **Fuente:** Manual de configuración de la central PEARL — 997-671-005-3 (sin revisión
    registrada); Manual de funcionamiento PEARL — 997-670-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **borrar o editar una regla de causa-efecto**, **anular/habilitar
    retardos desde el menú de operación** o **configurar el pulsador AMPLIAR RETARDO**.'
