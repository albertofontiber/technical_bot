- qid: hp003
  question: ¿Cómo se conectan las baterías de 24V en la Detnov CAD-150?
  answer: "## Conexión de baterías en la CAD-150-8\n\n### Especificaciones de las\
    \ baterías\n\n- **Tipo requerido:** dos baterías de **12V 7A/h** [F4]\n- **Configuración:**\
    \ en **serie** (para obtener 24V) [F4]\n- **Verificación previa:** comprobar que\
    \ las baterías tienen una tensión superior a **24V** antes de conectar [F5]\n\n\
    ---\n\n### Procedimiento de conexión\n\n1. **Coloca las baterías** en la parte\
    \ inferior de la caja, en el espacio reservado para ello, de forma **vertical**\
    \ [F4].\n\n2. **Conecta el cable puente** (suministrado con la central) uniendo\
    \ el **polo positivo (+) de una batería con el polo negativo (-) de la otra**,\
    \ para ponerlas en serie [F4].\n\n3. **Conecta los cables del circuito** al conjunto\
    \ de baterías:\n   - Cable **rojo → polo positivo (+)**\n   - Cable **negro →\
    \ polo negativo (-)** [F1]\n\n4. El conector de batería en la placa base está\
    \ identificado como **Conector Batería (posición 11)**, protegido por el **Fusible\
    \ Baterías (posición 10)** [F2][F3].\n\n---\n\n### ⚠️ Orden de conexión obligatorio\n\
    \n> **SIEMPRE primero la red (230VAC) y después las baterías.** Si se invierte\
    \ el orden, el equipo puede sufrir daños [F4][F6].\n\nSi necesitas encender el\
    \ equipo **solo con baterías** (sin red), es imprescindible pulsar el botón **BAT**\
    \ (posición 9 en la placa base) para arrancar el equipo [F5].\n\n---\n\n**Fuente:**\
    \ 55315013 Manual Centrales Analógicas CAD-150-8 Instalación ES FR GB IT (sin\
    \ revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **conexión del bucle\
    \ analógico**, **conexión de sirenas** o **puesta en marcha y verificación del\
    \ sistema** de la CAD-150-8."
