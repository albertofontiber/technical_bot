- qid: cat008
  question: ¿Cómo se cablea el módulo de entrada M710 / MI-DMMI en el lazo, y qué
    resistencias necesita (fin de línea y modo 3 estados)?
  answer: "# Conexionado del módulo M710 / MI-DMMI en el lazo\n\n## Terminales de\
    \ lazo (conexión estándar)\n\nLa asignación de terminales es la siguiente [F1][F4][F8]:\n\
    \n- **Terminal 1:** − Lazo salida (Loop Output −)\n- **Terminal 2:** + Lazo salida\
    \ (Loop Output +) → **con aislador interno activo**\n- **Terminal 3:** − Lazo\
    \ entrada (Loop Input −)\n- **Terminal 4:** + Lazo entrada (Loop Input +)\n- **Terminal\
    \ 5:** + Lazo salida alternativo → **si NO se necesita aislador interno**\n\n\
    > ⚠️ **Aislador interno:** Si no se requiere aislamiento de cortocircuitos, conecta\
    \ el + de salida del lazo al **terminal 5** en lugar del terminal 2. El terminal\
    \ 5 está conectado internamente con el terminal 4 [F4][F8].\n\n---\n\n## Modo\
    \ 2 estados\n\n- Resistencia de fin de línea (RFL): **47 kΩ** en paralelo con\
    \ la entrada [F1]\n- Un **cortocircuito** en la entrada se señaliza como **alarma**\
    \ [F1]\n- Un **circuito abierto** se señaliza como **avería**\n\n---\n\n## Modo\
    \ 3 estados\n\n- Resistencia de fin de línea (RFL): **47 kΩ** [F1]\n- Resistencia\
    \ adicional: **18 kΩ en serie con cada contacto de alarma** que se desee supervisar\
    \ [F1][F2][F4]\n- Con esta configuración:\n  - **Circuito abierto** → avería\n\
    \  - **Cortocircuito** → avería (en lugar de alarma)\n  - **Cierre del contacto\
    \ NA** → alarma [F1]\n\n> ⚠️ El modo 3 estados requiere que la **central sea compatible**\
    \ con esta función [F2][F4].\n\n---\n\n## Terminales de entrada (señal)\n\n- **Terminal\
    \ 6:** Entrada A [F1]\n- **Terminal 7:** Retorno de entrada A [F1]\n- **Terminales\
    \ 8 y 9:** Solo disponibles en el **M720E / MI-DMM2I** (entrada doble). El **M710\
    \ / MI-DMMI no tiene conexiones en estos terminales** [F4][F8]\n\n---\n\n## Resumen\
    \ de resistencias\n\n- **RFL (fin de línea):** **47 kΩ** — siempre necesaria [F1]\n\
    - **Resistencia de supervisión (modo 3 estados):** **18 kΩ** en serie con cada\
    \ contacto [F1][F2][F4]\n\n---\n\nFuentes:\n- Conexionado-del-modulo-M710-MI-DMMI\
    \ (sin revisión registrada)\n- I56-2006-004 MI-DMMI_DMM2I_D2ICMO (sin revisión\
    \ registrada)\n- I56-4404-001 M710E M720E M721E (sin revisión registrada)\n\n\
    También puedo ayudarte con: **programación del M710 en la central ID3000**, **diferencias\
    \ entre M710 y M720 (entrada simple vs. doble)** o **uso del aislador interno\
    \ y cuándo eliminarlo**."
