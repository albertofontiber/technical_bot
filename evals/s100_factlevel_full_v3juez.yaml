- qid: hp007
  question: ¿Cómo se realiza el test anual de un detector VESDA-E VEP según el manual
    del fabricante?
  answer: '# Test anual del detector VESDA-E VEP según el manual del fabricante


    ## Tareas anuales obligatorias (Tabla 7-1)


    Según el calendario de mantenimiento [F1][F2], las comprobaciones que deben realizarse
    **una vez al año** son:


    - **Realizar una prueba de humos** para comprobar la integridad de la red de tubería

    - **Comprobar el flujo** de la red de tubería

    - **Limpiar los puntos de muestreo**

    - **Limpiar con agua la red de tubería**


    ---


    ## Procedimiento previo obligatorio antes de cualquier prueba


    ⚠️ **Precaución** [F1][F2]: Antes de iniciar el mantenimiento o las pruebas:


    1. Informa a la autoridad supervisora adecuada.

    2. Asegúrate de que se aíslen todos los dispositivos que dependan del detector
    antes de comenzar.

    3. Sigue los procedimientos del sitio para evitar falsas alarmas en los servicios
    supervisados.


    ---


    ## Poner el detector en modo "En espera" antes de trabajar en la tubería


    Para trabajar en la red de tubería o puntos de muestreo [F4]:


    1. Desde el software **Xtralis VSC**, selecciona **"Go to Standby"** en el menú
    **"Device"**.

    2. El LED desactivado parpadeará y se detendrá el aspirador.

    3. Al terminar, selecciona **"End Standby"** en el menú **"Device"** para reactivar
    la unidad.


    > Nota: En modo en espera se desactiva el aspirador y se detiene la detección
    de alarmas, pero **no** la detección ni señalización de fallos [F4].


    ---


    ## Prueba de humos anual


    La prueba de humos consiste en introducir una muestra de humo en el **orificio
    de muestreo más alejado** y medir el tiempo que tarda en llegar al detector [F3].
    Los resultados se registran y se comparan con pruebas posteriores para detectar
    variaciones del sistema [F3].


    > El manual remite al detalle completo del procedimiento a la **VESDA-E Commissioning
    Guide** (Guía de puesta en marcha de VESDA-E) [F3].


    ---


    ## Comandos de prueba disponibles desde Xtralis VSC


    Estos comandos están disponibles para verificar el correcto funcionamiento del
    sistema [F5][F6]:


    - **"Start Alarm Test"**: Simula nivel de humo de escala completa → activa condiciones
    de Alerta, Acción, Fuego 1 y Fuego 2.

    - **"Start Air Flow Fault Test"**: Comprueba el sistema de detección de circulación
    del aire apagando el aspirador.

    - **"Start Relay Test"**: Activa y desactiva los relés disponibles para probarlos.

    - **"Start LED Test"**: Realiza un ciclo de prueba de todos los indicadores LED.

    - **"Start Major Fault Test"**: Genera un fallo importante y desactiva el relé
    de fallo durante **2 minutos**.

    - **"Start Minor Fault Test"**: Genera un fallo menor y desactiva el relé de fallo
    durante **2 minutos**.


    Todos estos comandos se ejecutan **exclusivamente desde el software Xtralis VSC**
    [F5][F6].


    ---


    ## Nota sobre frecuencias


    La frecuencia de las comprobaciones puede variar en función de los códigos y normas
    locales, y del entorno de la instalación [F1][F2].


    ---


    **Fuentes:**

    - `33977_13_VESDA-E_VEP-A10-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)

    - `33976_13_VESDA-E_VEP-A00-P_Product_Guide_A4_Spanish_lores` (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento detallado de limpieza de tubería**,
    **comprobación semestral de la red de tubería** o **sustitución del filtro (cada
    2 años)** del VESDA-E VEP.'
