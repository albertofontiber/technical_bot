  question: ¿Cómo se cambia la batería tampón de la Detnov ADW535 sin perder configuración?
  answer: '## Sustitución de la batería de litio del ADW535


    Los fragmentos disponibles del manual **ADW535_TD_T140358es_e** mencionan la batería
    de litio en varios contextos, pero **no incluyen un procedimiento paso a paso
    específico para sustituir únicamente la batería de litio** del LMB 35.


    Lo que sí está documentado en los fragmentos:


    ---


    ### Lo que el manual SÍ indica sobre la batería de litio:


    **Sobre la puesta en marcha inicial:**

    - "Justo antes del primer encendido del ADW 535, debe retirarse la cinta aislante
    de la batería de litio (LMB 35)" [F8]


    **Sobre el fallo de reloj (código G80 – 008):**

    - Causa posible: "La cinta aislante de la batería de litio aún no se ha retirado
    → Retirar" [F10]

    - Causa posible: "Batería de litio defectuosa → Sustituir" [F10]


    **Sobre la ubicación:**

    - La batería de litio está ubicada en el **Main Board LMB 35** [F2] [F7]


    ---


    ### Implicación importante si necesitas acceder al LMB 35:


    El manual sí describe la sustitución completa del LMB 35 [F1], y advierte que
    tras esa operación:

    - Es **imprescindible realizar un nuevo reset inicial** [F1]

    - Deben ajustarse nuevamente las configuraciones específicas del cliente y del
    proyecto desde el software **«ADW Heat-Calc»** o **«ADW Config»** [F1]

    - Debe realizarse una **verificación de la transmisión de alarmas** según el cap.
    7.7.1 [F1]


    > ⚠️ Esto implica que si la sustitución de la batería requiere reemplazar el LMB
    35 completo, **se perderá la configuración** y habrá que reprogramar.


    ---


    ### Conclusión:


    El manual **no especifica** si la batería de litio del LMB 35 es sustituible de
    forma independiente (sin reemplazar la placa completa), ni describe un procedimiento
    concreto para hacerlo sin pérdida de configuración. Los fragmentos disponibles
    solo cubren la sustitución completa del LMB 35 y las causas de fallo de la batería.


    **Recomendación:** Consulta directamente al soporte técnico de Detnov/Securiton
    o el manual físico completo para confirmar si la batería es reemplazable de forma
    independiente y el procedimiento exacto.


    ---


    Fuente: ADW535_TD_T140358es_e (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de reset inicial tras reparación**,
    **sustitución del LMB 35 completo** o **interpretación de códigos de fallo G80**
    del ADW535.'
