- qid: hp015
  question: En la Detnov CCD-103, ¿cómo se desactiva un detector individualmente sin
    afectar al resto del lazo?
  answer: 'La **CCD-103** es una central convencional con zonas completas como unidad
    mínima de gestión. Los fragmentos del manual no describen ningún procedimiento
    para desactivar un **detector individual** sin afectar al resto del lazo.


    Lo que sí documenta el manual es la **desconexión por zona completa**:


    **Desconexión de zona completa (sección 6.3.1):**


    1. Primera pulsación de la **tecla de zona (A)** correspondiente → la zona entra
    en **modo prueba** [F1]

    2. Segunda pulsación de la **tecla de zona (A)** → la zona entra en **modo desconexión**
    [F1]

    3. En estado de desconexión se activa el **indicador de anular** y el **indicador
    de fallo/anular/prueba** de esa zona [F1]


    > ⚠️ Esta operación desconecta **toda la zona**, no un detector individual.


    ---


    **Sobre la arquitectura del lazo:**


    La CCD-103 conecta los detectores en **serie daisy-chain** por zona [F3][F4],
    con el positivo en el contacto **1** y el negativo entrando por el contacto **4**
    y saliendo por el **3** al siguiente detector [F3][F4]. No hay direccionamiento
    individual de detectores en este sistema convencional.


    El manual **no especifica** ningún mecanismo de aislamiento o desactivación de
    un detector individual dentro de una zona. Para intervenir sobre un detector concreto
    sin afectar al lazo, consulta directamente el soporte técnico de Detnov o el manual
    completo, ya que los fragmentos disponibles no cubren ese procedimiento.


    ---


    Fuente: CCD-103_Manual_ES_FR_GB_IT (sin revisión registrada)


    También puedo ayudarte con: **verificación de avería en zona**, **conexionado
    de resistencia de final de línea (4K7)** o **modos de prueba de zona** de la CCD-103.'
