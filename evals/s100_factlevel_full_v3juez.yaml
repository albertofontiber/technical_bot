- qid: hp014
  question: ¿Cómo se conecta un módulo de aislamiento de línea en un lazo ID2000?
  answer: "## Conexión del módulo de aislamiento de línea en lazo ID2000\n\n### Requisito\
    \ normativo y regla de instalación\n\nSegún la norma **EN54-2: 12.5.2** [F2],\
    \ los aisladores son **obligatorios** en cada lazo analógico para separar sensores\
    \ y pulsadores. La regla de instalación es:\n\n- **Máximo 25 equipos de lazo entre\
    \ aisladores** en la central ID2000 [F2]\n- **Máximo 20 equipos si se utilizan\
    \ aisladores tipo FET** [F2]\n- El límite normativo general de EN54-2 es 32 equipos\
    \ entre aisladores, pero la ID2000 impone un límite más restrictivo [F2]\n\n---\n\
    \n### Conexionado del aislador\n\nEl aislador se conecta **en serie dentro del\
    \ lazo**, utilizando sus **4 terminales** [F1]:\n\n- **Terminales 1 y 2**: entrada\
    \ del lazo (lado panel o aislador anterior)\n- **Terminales 3 y 4**: salida del\
    \ lazo (hacia los equipos siguientes)\n\nEl diagrama de conexiones típicas del\
    \ lazo muestra el aislador con terminales **1, 2, 3, 4** intercalado entre equipos\
    \ del lazo [F1].\n\n---\n\n### Procedimiento de comprobación del cableado con\
    \ aisladores instalados\n\nAntes de conectar el lazo al panel [F1]:\n\n1. **Desconecta\
    \ temporalmente todos los aisladores** cortocircuitando los terminales **2 y 4**\
    \ de cada aislador.\n\n   > ⚠️ El cableado del lazo **DEBE estar desconectado\
    \ del panel** durante este procedimiento [F1].\n\n2. Comprueba la continuidad\
    \ de cada extremo del lazo y mide la resistencia final de línea. Verifica que\
    \ es inferior a [F1]:\n   - **14,5 Ω** (placa base y LIB, con detección de dirección\
    \ duplicada)\n   - **28,5 Ω** (placa base y LIB, sin detección de dirección duplicada)\n\
    \   - **18,5 Ω** (placa base y LIB, garantizando detección de dirección duplicada\
    \ — valor alternativo)\n   - **35,5 Ω** (placa base y LIB, sin detección de dirección\
    \ duplicada — valor alternativo)\n\n3. Con un multímetro en modo prueba de diodo,\
    \ conecta en **polaridad invertida** (+ al lazo − y − al lazo +). Debe indicar\
    \ la presencia de diodos polarizados en paralelo [F1].\n\n4. Una vez verificado\
    \ el cableado, **retira los cortocircuitos** de los terminales 2 y 4 de cada aislador\
    \ para restaurar su función.\n\n---\n\n### Advertencias importantes\n\n- **No\
    \ uses multímetros de alta tensión (tipo \"Megger\")** en el lazo una vez conectados\
    \ los equipos [F2].\n- Las comprobaciones de continuidad del lazo deben realizarse\
    \ **antes de conectar los aisladores** [F2].\n- La longitud total del par de lazo\
    \ no puede exceder los **2000 metros**, y solo con cable de **1,5 mm² de sección\
    \ o superior** [F1].\n- Si ocurre un cortocircuito entre dos aisladores, el sistema\
    \ lo señalizará como **'Posible corte'** en lugar de cortocircuito [F3].\n\n---\n\
    \n**Fuente:** Manual de instalación y puesta en marcha Panel ID2000 — MIDT180\
    \ (sin revisión registrada)"
