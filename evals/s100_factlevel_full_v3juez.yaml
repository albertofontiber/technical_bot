- qid: cat024
  question: ¿Cuál es el consumo en alarma de la sirena analógica de zócalo Detnov
    MAD-472?
  answer: 'Hay una **discrepancia entre fuentes** para el consumo en alarma del **MAD-472**.
    Te detallo ambos valores:


    ---


    **Según el manual propio del MAD-472** [F1]:

    - Consumo en alarma: **17 mA (80 dB A)**


    **Según las tablas de dispositivos compatibles de la CAD-250** [F4][F5][F6]:

    - Consumo en alarma: **7 mA**


    ---


    **Otros datos del MAD-472 confirmados en ambas fuentes:**

    - Consumo en reposo: **< 350 μA** [F1] / **0,35 mA** [F4][F5][F6]

    - Tensión de funcionamiento: **22-38 VDC** [F1]

    - Ocupa **1 dirección** de lazo [F1][F4]

    - Sin aislador incorporado [F4][F5][F6]

    - Se alimenta directamente del lazo, sin alimentación auxiliar [F1]


    ---


    ⚠️ **Recomendación:** Para el cálculo de carga del lazo, utiliza el valor del
    **manual propio del dispositivo (17 mA)** [F1] como dato más conservador, y verifica
    con Detnov cuál es el valor actualizado, ya que existe discrepancia entre documentos.


    ---


    Fuentes: 55347200 Manual Sirena Analógica MAD-472 ES GB FR IT_V2 (sin revisión
    registrada); Manual instalacion CAD-250 (MI_372_es_2024 e) (sin revisión registrada);
