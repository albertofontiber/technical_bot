- qid: cat018
  question: ¿Como se programa una ecuacion causa-efecto (CBE) en la Notifier AM-8200
    para que un evento active una salida?
  answer: "# Programación de ecuación CBE en AM-8200 para activar una salida\n\n##\
    \ Concepto previo\n\nUna ecuación **CBE (Control By Event)** define la condición\
    \ lógica que debe cumplirse para que un módulo de salida se active [F1]. La ecuación\
    \ se asigna directamente al módulo de salida en su campo **CBE** [F3].\n\n---\n\
    \n## Procedimiento paso a paso\n\n### 1. Acceder al módulo de salida\nNavega al\
    \ menú: **MENU PROGRAMMAZIONE → Punti → Moduli** [F3]\n\n### 2. Localizar el módulo\
    \ de salida\nUsa los botones **CPU / LINEA / MOD. / SUB** para seleccionar el\
    \ módulo de salida que quieres programar [F3].\n\n### 3. Seleccionar el campo\
    \ CBE\n- Con las teclas **▲▼** selecciona el parámetro **CBE** [F2]\n- Pulsa la\
    \ tecla de confirmación **☑** para entrar en edición [F2]\n- Si ya hay una ecuación\
    \ configurada, se mostrará; si no, el campo estará vacío [F2]\n\n### 4. Escribir\
    \ la ecuación\nUsa el teclado alfanumérico para introducir la ecuación [F2]. La\
    \ **longitud máxima es de 64 caracteres** [F2].\n\nConfirma con la tecla **Enter**\
    \ [F2].\n\n---\n\n## Operadores disponibles y ejemplos prácticos\n\n**OR** — Se\
    \ activa si AL MENOS UN operando está activo [F5]:\n```\nOR (G9 G15 G23)\n```\n\
    → La salida se activa si el grupo G9, G15 **o** G23 entra en alarma.\n*(También\
    \ válido omitir OR: simplemente `(G9 G15 G23)`)* [F5]\n\n---\n\n**AND** — Se activa\
    \ solo si TODOS los operandos están activos [F5]:\n```\nAND (G9 G15 G23)\n```\n\
    → La salida se activa únicamente si G9, G15 **y** G23 están en alarma simultáneamente.\n\
    \n---\n\n**NOT** — NIEGA el operando [F5]:\n```\nNOT (G23)\n```\n→ La salida permanece\
    \ activa mientras G23 **no** esté en alarma.\n\n---\n\n**DEL** — Activa con retardo\
    \ [F9]:\n```\nDEL (00.30 01.30 (G21))\n```\n→ Tras **30 segundos** desde la activación\
    \ de G21, la salida se activa y permanece activa **1 minuto y 30 segundos**.\n\
    - Retardo máximo: **10 minutos** [F9]\n- Duración máxima: **10 minutos** [F9]\n\
    - Solo puede haber **un operador DEL por ecuación** [F9]\n\n---\n\n**XGRP** —\
    \ Se activa si AL MENOS DOS elementos del grupo están activos [F6]:\n```\nXGRP\
    \ (G23)\n```\n⚠️ Solo admite **un único grupo** en el paréntesis — `XGRP (G23\
    \ G24)` **no está permitido** [F6].\n\n---\n\n**FLT** — Usa el estado de **avería**\
    \ de un dispositivo o zona [F7]:\n```\nOR (FLT (C1L1S2) FLT (Z1))\n```\n→ La salida\
    \ se activa si el sensor C1L1S2 **o** la zona Z1 están en avería.\n\n---\n\n**PRE**\
    \ — Usa el estado de **pre-alarma** de un sensor [F8]:\n```\nOR (PRE (C1L1S2)\
    \ PRE (C2L1S10))\n```\n→ La salida se activa si cualquiera de los dos sensores\
    \ está en pre-alarma.\n\n---\n\n## Reglas críticas a tener en cuenta\n\n- **Para\
    \ grupos directos**: no se puede escribir una CBE donde los operandos tengan índice\
    \ **menor** que el grupo al que se asocia la CBE [F5].\n  - ❌ `G33 = (G23 G24)`\
    \ → No permitido\n  - ✅ `G21 = (G23 G24)` → Permitido\n\n- **Para grupos inversos**:\
    \ no se puede escribir una CBE donde los operandos tengan índice **mayor** que\
    \ el grupo al que se asocia la CBE [F5].\n  - ❌ `G305 = (G306 G307)` → No permitido\n\
    \  - ✅ `G307 = (G305 G306)` → Permitido\n\n- **Si el módulo de salida tiene TIPO\
    \ ID para señalizaciones generales**, la central **no permite programar una ecuación\
    \ CBE** en ese módulo [F5].\n\n---\n\n## Ejemplo completo: OR de muchos grupos\
    \ (cuando la memoria no permite un OR grande)\n\nSi necesitas un OR de 16 grupos,\
    \ usa grupos inversos intermedios [F10]:\n```\nG301 = OR (G1 G2 G3 G4 G5 G6 G7\
    \ G8)\nG302 = OR (G9 G10 G11 G12 G13 G14 G15 G16)\nL01M01 CBE = OR (G301 G302)\n\
    ```\n\n---\n\n> \U0001F4D6 Para más detalle, el manual remite al **Apéndice «A»\
    \ Control By Event** al final del manual de programación [F2].\n\n**Fuente:**\
    \ AM-8200 Manual de programación (Doc. M-162.1-AM8200-ESP Rev A.3) — HONEYWELL\
    \ LIFE SAFETY IBERIA\n\n---\n\nTambién puedo ayudarte con: **configuración de\
    \ grupos software (G)**, **programación del operador DEL con condición AND** o\
    \ **asignación de zonas a módulos de salida** en la AM-8200."
