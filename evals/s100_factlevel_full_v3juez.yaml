- qid: cat020
  question: En una central Morley DXc instalada en Espana, ¿cual es el nivel de alarma
    y de prealarma por defecto de los detectores, y el maximo configurable?
  answer: '## Niveles de alarma y prealarma en la central Morley DXc


    La respuesta depende del **tipo de detector** (protocolo Morley-IAS):


    ---


    ### Detectores ópticos convencionales (OPT) — valores en porcentaje


    - **Prealarma por defecto: 80%** [F1]

    - **Alarma por defecto: 100%** [F1]

    - **Máximo configurable para alarma: 108%** [F1]


    ---


    ### Detectores óptico-térmicos multicriterio (OTM) — valores por niveles


    Los niveles por defecto que aparecen en pantalla son [F1][F2]:


    - **Prealarma por defecto: Nivel 3**

    - **Alarma por defecto: Nivel 4**


    Para referencia, la tabla de niveles del OTM es [F2]:


    - Nivel 3 → 6,5% osc./m (marcado como nivel de prealarma recomendado \*P)

    - Nivel 4 → 6,5% a 11,5% osc./m autoajustado (marcado como nivel de alarma recomendado
    \*A)

    - Nivel máximo disponible: **Nivel 6** (solo temperatura)


    ---


    ### Detectores láser (LSR) — valores por niveles


    Los niveles por defecto que aparecen en pantalla son [F1][F2]:


    - **Prealarma por defecto: Nivel 4**

    - **Alarma por defecto: Nivel 5**


    Para referencia, la tabla de niveles del LSR es [F2]:


    - Nivel 4 → 0,32% osc./m (marcado como nivel de prealarma recomendado \*P)

    - Nivel 5 → 0,65% osc./m (marcado como nivel de alarma recomendado \*A)

    - Nivel máximo disponible: **Nivel 9** (4,92% osc./m)


    ---


    ### Restricciones de configuración


    - El nivel de prealarma **no puede ser superior al nivel de alarma** [F3]

    - La central **no permite ajustar niveles que impidan el reconocimiento de alarmas**
    [F3]


    ---


    **Fuente:** DXc_Manual variaciones de mercado (sin revisión registrada); DXc_Manual
    de configuracion (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento paso a paso para modificar los niveles
    de alarma**, **diferencias entre modos de sensibilidad día/noche** o **configuración
    de modos horarios** en la DXc.'
