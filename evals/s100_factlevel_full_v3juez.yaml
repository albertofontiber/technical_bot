  question: ¿Qué detectores de humo analógicos son compatibles con la Notifier ID3000?
  answer: '## Detectores de humo analógicos compatibles con la ID3000


    Según los fragmentos disponibles, los detectores de humo analógicos compatibles
    con la **ID3000** son los siguientes:


    ### Detectores ópticos (humo por dispersión de luz)

    - **SDX-751EM** — Óptico [F1][F2]

    - **SDX-751** — Óptico [F2]

    - **SDX-551E** — Óptico [F2]

    - **SDX-551THE** — Óptico [F2]


    ### Detectores iónicos (humo por ionización)

    - **CPX-751E** — Iónico, bajo perfil [F1][F2]

    - **CPX-551E** — Iónico [F2]


    ### Detectores combinados humo/temperatura (multicriterio)

    - **SDX-751TEM** — Optiplex (combinado térmico/humo) [F1][F2]

    - **IRX-751TEM** — SMART 3 (multicriterio) [F2]

    - **IRX-751CTEM** — SMART 4 (multicriterio) [F2]


    ### Detectores de humo láser (VIEW™)

    - **FSL-751E** — VIEW (humo láser) [F1]

    - **LPX-751** — VIEW [F2][F3]


    ### Detectores para entornos especiales

    - **HAZARD IDX-751** — Óptico intrínsecamente seguro [F1][F2]

    - **HPX-751E** — HARSH/FILTREX (óptico) [F1][F2]


    ---


    **Nota sobre los sensores VIEW™:** Pueden configurarse con **9 niveles de sensibilidad**
    (L1 más sensible, L9 menos sensible). La sensibilidad estándar se ajusta a **2,44%/m
    (L8)** o menos [F4][F5][F6].


    **Nota sobre los sensores SMART4 (IRX-751CTEM):** Incorporan detección fotoeléctrica,
    infrarroja, térmica y de monóxido de carbono [F7].


    ---


    Fuentes: MPDT190 (sin revisión registrada); MIDT190 (sin revisión registrada);
    MCDT190 (sin revisión registrada); MCDT191 (sin revisión registrada)


