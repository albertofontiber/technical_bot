- qid: hp020
  question: En la Notifier INSPIRE, ¿cómo se configuran las contraseñas de nivel 2
    y nivel 3?
  answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE E10/E15


    Hay dos escenarios según el nivel de acceso con el que estés operando:


    ---


    ## Cambio de contraseña desde Nivel 3 (NI2 y NI3)


    Si estás logado como **Nivel 3**, puedes cambiar la contraseña de ambos niveles
    [F1]:


    1. Selecciona el **icono del menú** ① y luego **"Ajustes"** ② [F1]

    2. Inicia sesión como usuario de **nivel de acceso 3** [F1]

    3. Selecciona **"Cambio del código de acceso"** ③ [F1]

    4. Asegúrate de que el **Nivel de Acceso 2 o 3** ④ esté seleccionado y el cursor
    parpadee ⑤ [F1]

    5. Pulsa el **icono del ojo** ⑥ si quieres visualizar lo que introduces [F1]

    6. Introduce el nuevo código de acceso (**mínimo 4 dígitos, máximo 8 dígitos**)
    con el teclado ⑦ [F1]

    7. Confirma seleccionando el **símbolo ✓** ⑧ [F1]

    8. Repite los pasos 3 a 6 para confirmar la entrada [F1]

    9. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1]

    10. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1]


    ---


    ## Cambio de contraseña desde Nivel 2 (solo NI2)


    Si estás logado como **Nivel 2**, únicamente puedes cambiar la contraseña del
    **nivel 2** [F2]:


    1. Selecciona el **icono del menú** ① y luego **"Configuración"** ② [F2]

    2. Inicia sesión como usuario de **nivel de acceso 2** [F2]

    3. Selecciona la opción **"Cambio del código de acceso"** ③ [F2]

    4. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y el cursor parpadee
    ⑤ [F2]

    5. Pulsa el **icono del ojo** ⑥ si quieres visualizar lo que introduces [F2]

    6. Introduce el nuevo código de acceso (**mínimo 4 dígitos, máximo 8 dígitos**)
    con el teclado ⑦ [F2]

    7. Confirma seleccionando el **símbolo ✓** ⑧ [F2]

    8. Repite los pasos 3 a 6 para confirmar la entrada [F2]


    ---


    ## Notas importantes


    - El código de fábrica del **Nivel 2** es **"22222222"** [F3]

    - Se recomienda cambiar la contraseña de fábrica por una exclusiva [F3]

    - Los códigos deben mantenerse seguros y solo conocidos por usuarios autorizados
    [F3]

    - La contraseña debe tener entre **4 y 8 dígitos** [F1][F2][F3]


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (Instrucciones de puesta en marcha INSPIRE E10/E15)

    - HOP-338-9ES issue 4, 01-2026 (Instrucciones de usuario INSPIRE E10/E15)


    También puedo ayudarte con: **sincronización de configuración con CLSS**, **lectura
    de contraseña AL2 desde la herramienta** o **buenas prácticas de seguridad de
    contraseñas en INSPIRE**.'
