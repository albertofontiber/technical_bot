- qid: cat014
  question: ¿Cual es el MTBF / vida util esperada del detector de gas DGD-600 de Detnov?
  answer: 'El manual del **DGD-600** no especifica un valor de **MTBF** (Mean Time
    Between Failures).


    Lo que sí indica el manual es la **vida útil**:


    - **Vida útil: 10 años desde la fecha de fabricación** [F2][F4]

    - La fecha de fabricación está impresa en la **pegatina lateral del dispositivo**
    [F2]

    - Transcurridos los 10 años, el detector **debe ser sustituido** [F2][F4]


    > ⚠️ El MTBF es un parámetro distinto a la vida útil. El manual no proporciona
    ningún valor de MTBF para el DGD-600. Si necesitas ese dato para un proyecto o
