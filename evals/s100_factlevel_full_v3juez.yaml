per_gold:
- qid: cat001
  question: En la Notifier PEARL, ¿cuántos equipos admite un lazo SLC y qué límites
    de cableado hay (aisladores), y cómo se dan de alta y editan esos equipos desde
    la central?
  answer: "## Notifier PEARL — Lazo SLC: capacidad, aisladores y alta/edición de equipos\n\
    \n---\n\n### 1. Capacidad máxima por lazo\n\n- **Protocolo Opal:** hasta **159\
    \ sensores + 159 módulos** por lazo [F1][F2]\n- **Protocolo CLIP:** hasta **99\
    \ sensores + 99 módulos** por lazo [F2]\n- **Protocolo mixto Opal + CLIP:** el\
    \ límite de equipos CLIP en lazo mixto es de **40**; si se supera, la autoconfiguración\
    \ continúa pero señala fallos [F7]\n- **Máximo global del sistema (EN54-2):**\
    \ no más de **512 sensores y/o pulsadores manuales** entre ambos lazos analógicos,\
    \ incluyendo detectores y pulsadores de zona convencionales [F1]\n- **Carga máxima\
    \ por lazo:** **0,75 A** [F2]\n\n---\n\n### 2. Requisitos de aisladores (EN54-2:\
    \ 12.5.2)\n\n- **Equipos SIN aisladores internos** (incluidos CLIP y algunos Opal):\
    \ máximo **20 equipos entre aisladores** [F1]\n- **Equipos CON aisladores internos**\
    \ (usados con base **B501 AP**): el lazo cumple directamente los requisitos de\
    \ EN54-2 (máximo 32 equipos entre aisladores según la norma) [F1]\n- Los equipos\
    \ Opal con aislador interno FET conectan el aislador a los terminales **+2 y +4**\
    \ en el extremo positivo [F1]\n- Para que los aisladores se cierren al aplicar\
    \ alimentación, la carga entre aisladores **no debe superar 20 SU** [F6]\n- Cargas\
    \ de referencia en protocolo CLIP [F6]:\n  - Detector LPB-700: **6 SU**\n  - Sirenas\
    \ de lazo: **3 SU**\n  - Módulo ZMX-1: **3 SU**\n  - Módulo MMX-10M/CMX10-RM:\
    \ **10 SU**\n  - Resto de equipos: **1 SU**\n\n> ⚠️ **NUNCA uses un multímetro\
    \ de alta tensión (tipo Megger) en el lazo de detección.** Si hay aisladores instalados,\
    \ el conductor positivo (+) del lazo estará en circuito abierto [F1].\n\n---\n\
    \n### 3. Alta de equipos: Autoconfiguración\n\nLa forma más rápida de dar de alta\
    \ equipos es mediante la **autoconfiguración** desde la central [F3].\n\n**Acceso\
    \ al menú (nivel de acceso 3):**\n\n1. Pulsa la tecla para mostrar la pantalla\
    \ de introducción de clave → selecciona **«Conf/Mant.Ingeniero»** → introduce\
    \ la clave de nivel 3 → pulsa ✓ → pulsa de nuevo para mostrar la pestaña **CONFIG**\
    \ [F9]\n   — O bien —\n   Gira la llave de acceso 90° en sentido horario → selecciona\
    \ **«5: Pestaña Configuración»** → introduce la clave de nivel 3 [F9]\n\n2. En\
    \ el **Menú de Configuración de Central** → **«1: Editar Configuración»** → **«Equipos\
    \ de lazo»** → **«Autoconfigurar»** [F8]\n\n**Proceso de autoconfiguración:**\n\
    \n1. Selecciona si aplica a **todos los lazos** o a un **lazo específico** [F3]\n\
    2. Elige el modo:\n   - **«1: Todos Prot. OPAL/CLIP»** — detecta duplicidades\
    \ de dirección [F3]\n   - **«2: OPAL/CLIP (No detecta duplicidad)»** — más rápido,\
    \ sin comprobación de duplicados [F3]\n   - **«3: Sólo con protocolo CLIP»** —\
    \ solo autoconfigura equipos CLIP [F3]\n3. Selecciona el modo de cambios:\n  \
    \ - **«1: Permite Añadir/Borrar/Cambiar»** [F7]\n   - **«2: Sólo Añadir Nuevos\
    \ Equipos»** [F7]\n4. El proceso se inicia automáticamente. Al finalizar, se muestran\
    \ los resultados por lazo; usa las teclas **◄/►** para navegar entre lazos [F7]\n\
    \n> **Nota:** Si un equipo Opal se autoconfigura, por defecto será Opal. Los pulsadores\
    \ CLIP se autoconfiguran como «MON» y deben cambiarse manualmente a tipo **«cPUL»**\
    \ [F10].\n\n---\n\n### 4. Edición individual de equipos\n\nAccede desde: **Editar\
    \ Configuración → Equipos de lazo → Editar equipos** [F8][F5]\n\n**Parámetros\
    \ editables en sensores** [F4]:\n- Tipo de equipo, zona (hasta 255 locales / 8192\
    \ de red), número de célula (hasta 255)\n- Nivel de alarma, prealarma, alarma\
    \ horaria\n- Retardo de alarma, retardo de confirmación de coincidencia (hasta\
    \ **240 s / 4 min**)\n- Prioridad de interrogación (solo CLIP, limitada a **30\
    \ equipos**)\n- Grupo AWACS (50 grupos, solo sensores CLIP salvo HEAT)\n- Acción\
    \ de parpadeo, función LED remoto (solo Opal), modo solo térmico (L6)\n- Programación\
    \ horaria de sensibilidad\n\n**Parámetros editables en módulos** [F10]:\n- Tipo\
    \ de equipo, zona, célula\n- Función de subdirecciones (entrada/salida)\n- Supervisión\
    \ de cortocircuito/circuito abierto\n- Retardo de confirmación de alarma\n- Ajuste\
    \ de entrada enclavada, supresión de pestaña AUX\n- Asignación para potenciador\
    \ de lazo (solo alarma)\n\n> ⚠️ Algunos ajustes de retardo de alarma en módulos\
    \ pueden **contravenir los requisitos de EN54-2** [F10].\n\n---\n\n**También puedo\
    \ ayudarte con:** **verificación de carga de lazo con el programa de cálculo**,\
    \ **configuración de zonas y reglas causa-efecto** o **puesta en marcha de sirenas\
    \ de lazo Opal** en la PEARL.\n\nFuente: Manual de instalación y puesta en marcha\
    \ 997-669-005-3_Instal-Comm_ES (sin revisión registrada); Manual de configuración\
    \ de la central 997-671-005-3_Configuration_ES (sin revisión registrada)"
