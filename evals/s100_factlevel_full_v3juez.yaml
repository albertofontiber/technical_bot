  question: Necesito un detector de humos analógico direccionable «751» para una instalación
    Notifier; ¿cuál es el modelo correcto?
  answer: '## Detectores de humo analógicos direccionables «751» en Notifier


    La denominación «751» no corresponde a un único modelo, sino a una **familia de
    detectores de bajo perfil** de Notifier. Existen varios modelos con ese sufijo
    según el principio de detección y la central a la que van destinados. Aquí tienes
    los disponibles en los fragmentos:


    ---


    ### Detectores ópticos (fotoeléctricos)


    - **SDX-751** — Sensor óptico analógico de bajo perfil (versión reducida del SDX-551)
    [F7]

    - **SDX-751E** — Detector fotoeléctrico analógico de bajo perfil [F9][F10]

    - **SDX-751TEM** — Sensor combinado **óptico + térmico** (58 °C), con microprocesador.
    Certificado **EN54:2000 partes 5 y 7 y CEA4021** [F2][F3][F9]

    - **SDX-751XXXX** — Sensor óptico de bajo perfil (referencia genérica en lista
    de compatibles ID50/60) [F6]


    ### Detectores iónicos


    - **CPX-751** — Sensor iónico analógico de bajo perfil (versión reducida del CPX-551)
    [F7][F8]

    - **CPX-751E** — Sensor iónico analógico direccionable de bajo perfil [F4][F6][F9][F10]


    ### Detectores multicriterio


    - **IRX-751TEM** — Sensor multicriterio SMART 3 [F6]

    - **IRX-751CTEM** — Sensor multicriterio SMART 4 [F6]

    - **IPX-751** — Detector analógico con microprocesador: combinación fotoeléctrico
    + iónico + térmico [F9]


    ### Detector intrínsecamente seguro (zonas ATEX)


    - **IDX-751** — Sensor óptico analógico **intrínsecamente seguro** (requiere barrera
    y traductor **IMX-1**). Rango de tensión: **17 a 24 Vdc** [F1]


    ### Detector láser


    - **FSL-751E** — Sensor de humo láser VIEW [F6]

    - **LPX-751** — Sensor de humo láser VIEW de bajo perfil [F6]


    ---


    ### ¿Cuál necesitas?


    Para orientarte al modelo correcto, necesito saber:


    1. **¿Qué central Notifier tienes?** (AFP-400, AFP4000, AM-6000, AM-2000, ID50/60,
    u otra)

    2. **¿Qué tipo de detección necesitas?** Solo humo óptico, combinado óptico+térmico,
    iónico, o zona ATEX/intrínsecamente segura


    Con esos dos datos te confirmo el modelo exacto y su compatibilidad.


    ---


    Fuentes: MNDT1020 (IDX-751, sin revisión registrada); I56-1320-001 SDX-751TEM
    (sin revisión registrada); I56-0790-003_CPX-751E (sin revisión registrada); MNDT1025
    (FSL-751E, sin revisión registrada); MIDT156 (ID50/60, sin revisión registrada);
