- qid: cat009
  question: ¿Qué resistencia de fin de línea (EOL) hay que instalar en las líneas
    de zona de la central convencional NFS Supra?
  answer: "# Resistencia de Fin de Línea (EOL) — NFS Supra\n\nLa central **NFS Supra**\
    \ admite **dos modos de supervisión de zona**, y el equipo final de línea (EFL)\
    \ depende del modo configurado:\n\n---\n\n## Modo por defecto: **Capacitivo (EFL)**\n\
    \n- **Condensador de 47 µF** instalado entre positivo y negativo de la línea,\
    \ en el último equipo [F3]\n- Este es el modo de fábrica [F1]\n- El condensador\
    \ es **suministrado** con la central [F3]\n\n## Modo alternativo: **Resistivo\
    \ (RFL)**\n\n- **Resistencia de 6K8 Ω** instalada entre positivo y negativo de\
    \ la línea, en el último equipo [F3]\n- En este modo, la central admite un rango\
    \ de resistencia final de línea entre **3 KΩ** y **7 KΩ** [F3]\n- Consumo máximo\
    \ por zona según resistencia usada:\n  - Con **3 KΩ**: consumo máx. **2,5 mA**\
    \ [F3]\n  - Con **7 KΩ**: consumo máx. **4 mA** [F3]\n\n---\n\n## Regla importante\n\
    \nTodas las zonas, **incluso las no usadas**, deben tener instalada su final de\
    \ línea según la configuración del sistema (EFL o RFL) [F3].\n\n---\n\n## Cómo\
    \ cambiar entre modo Capacitivo y Resistivo\n\n1. Pulsa simultáneamente **Tecla\
    \ TECLADO = ON + Tecla EVACUACIÓN = ON** para acceder al menú de configuración\
    \ de Final de Línea [F1]\n2. Usa la tecla **REARME** para cambiar la opción [F1]:\n\
    \   - **Led 1 Alarma Rojo encendido** → Final de Línea Resistivo **6K8 Ω** [F1]\n\
    \   - **Led 2 Anulada Ámbar encendido** → Final de Línea Capacitivo **47 µF**\
    \ (por defecto) [F1]\n3. Esta configuración requiere **Nivel de acceso 3** [F1]\n\
    \n---\n\n> ⚠️ El EFL debe instalarse **en el último equipo de la línea**, entre\
    \ positivo y negativo. La extracción de un detector debe detectarse como avería\
    \ según **EN54/2** [F2].\n\n---\n\nFuente: HLSI-MN-025_NFS Supra (v.05, sin revisión\
    \ registrada), secciones 4.3.1 y 5.4.9"
