- qid: cat019
  question: '¿Como se configura una maniobra (causa-efecto) completa en la Detnov
    CAD-250: como se crea, como se definen las entradas/eventos que la disparan y
    como se asignan las salidas?'
  answer: "# Configuración de una Maniobra (Causa-Efecto) en la CAD-250\n\n> ⚠️ La\
    \ programación de maniobras es una de las funciones más críticas de la configuración\
    \ del sistema. Requiere conocimiento específico del sistema instalado y del plan\
    \ de protección [F6].\n\n---\n\n## PASO 1 — Acceder al menú de maniobras\n\nNavega\
    \ por el panel siguiendo esta ruta [F1]:\n\n**MENÚ** → **MANIOBRAS** → **+AÑADIR**\
    \ (barra de navegación inferior)\n\n---\n\n## PASO 2 — Crear la maniobra y definir\
    \ coincidencias\n\nAl pulsar **AÑADIR** accedes a la pantalla de edición de la\
    \ maniobra [F2].\n\nEl campo clave es **COINCIDENCIAS**: indica cuántos eventos\
    \ de entrada deben cumplirse simultáneamente para que se ejecuten las acciones\
    \ [F2]:\n\n- **Coincidencias = 1** → lógica **OR**: cualquiera de los eventos\
    \ dispara la acción\n- **Coincidencias = 2** (con 2 eventos) → lógica **AND**:\
    \ todos los eventos deben cumplirse\n- **Coincidencias = N de M** → se deben cumplir\
    \ N eventos de los M definidos\n\n---\n\n## PASO 3 — Añadir EVENTOS (entradas)\n\
    \nPulsa **AÑADIR** en la barra inferior → selecciona **EVENTO** en la ventana\
    \ emergente [F3].\n\nA continuación elige el tipo de evento [F3]:\n\n- **ENTIDAD**:\
    \ cualquier elemento de la jerarquía del sistema (instalación, panel, lazo, área,\
    \ zona, dispositivo, grupo o módulo virtual), tanto local como en red\n- **CONDICIÓN\
    \ TEMPORAL**: establece un periodo de tiempo durante el cual la ecuación de entrada\
    \ es verdadera\n\n### Si seleccionas ENTIDAD, configura estos parámetros [F6][F7]:\n\
    \n- **Origen:**\n  - Local o red\n  - Nivel jerárquico: instalación, panel, lazo,\
    \ área, zona, dispositivo, grupo o módulo virtual\n\n- **Condición (estado):**\n\
    \  - *Alarma*: uno o más elementos en alarma\n  - *Avería*: uno o más elementos\
    \ en avería\n  - *Técnico*: una o más entradas activas\n\n- **Tipo de dispositivo:**\n\
    \  - *Todos*, *Pulsadores*, *Detectores* o *Entradas*\n\n- **Lógico:**\n  - *Normal*:\
    \ la condición es verdadera cuando se cumple el estado\n  - *No (Negado)*: invierte\
    \ la condición (p.ej. \"no hay alarma\")\n\n- **Repeticiones:** valor entero hasta\
    \ **9999** [F7]. Número de veces que el evento debe darse en la entidad para que\
    \ la entrada sea válida. Ejemplo: zona en alarma con repeticiones = 3 → se necesitan\
    \ 3 detectores en alarma en esa zona\n\n> ⚠️ La maniobra gestiona **eventos**\
    \ (cambios de estado), no estados estáticos. El evento es el cambio de estado\
    \ que, si coincide con la condición establecida, provoca la activación de las\
    \ salidas [F3].\n\nPuedes añadir tantos eventos como necesites. El número máximo\
    \ total de entradas y salidas entre todas las maniobras es de **100.000** [F3][F10].\n\
    \n---\n\n## PASO 4 — Añadir ACCIONES (salidas)\n\nDesde la misma pantalla de la\
    \ maniobra, pulsa **AÑADIR** → selecciona **ACCIÓN** [F4].\n\nConfigura los siguientes\
    \ campos [F4][F6]:\n\n- **Retraso (s):** tiempo de espera antes de ejecutar la\
    \ acción, configurable entre **0 y 600 segundos** [F6][F8]. El retardo se inicia\
    \ desde el momento en que la condición de entrada es verdadera\n\n- **Entidad\
    \ destino:** panel, lazo, área, zona, dispositivo, grupo o módulo virtual (siempre\
    \ entidad local) [F4]\n\n- **Tipo de acción:** activar, desactivar, habilitar,\
    \ deshabilitar, test, reiniciar o pulso [F6]\n\n- **Tipo de elemento:** todos,\
    \ sirenas, relés, sirena discontinua [F6]\n\n> ⚠️ Las acciones siempre son relativas\
    \ a la entidad seleccionada. El programa **no permite mezclar acciones sobre entidades\
    \ de paneles diferentes** [F10].\n\n---\n\n## PASO 5 — Guardar y verificar\n\n\
    Al pulsar **GUARDAR**, la pantalla vuelve al listado de la maniobra mostrando\
    \ el resumen completo: eventos a la izquierda y acciones a la derecha [F10].\n\
    \nLa pantalla principal de maniobras muestra para cada una: índice, número de\
    \ coincidencias, resumen del evento y de la acción [F6].\n\n---\n\n## Resumen\
    \ del flujo completo\n\n```\nENTRADAS (Eventos)  →  LÓGICA (Coincidencias)  →\
    \  SALIDAS (Acciones)\n• Entidad/Condición    • OR (1 de N)               • Retardo\
    \ 0-600 s\n  temporal             • AND (N de N)               • Entidad destino\n\
    • Condición estado     • N de M                     • Acción (activar,\n• Tipo\
    \ dispositivo                                    desactivar, etc.)\n• Repeticiones\
    \                                      • Tipo elemento\n• Normal/Negado\n```\n\
    \n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración MC-380-es-2026-c (rev.\
    \ c, 2026-04-23)\n- CAD-250 Manual de Software de Configuración MS-416-es-2026-b\
    \ (rev. b)\n- Manual de Instalación CAD-250 MI-372-es-2024-e (sin revisión registrada)\n\
    \n---\n\nTambién puedo ayudarte con: **configuración de Grupos** para simplificar\
    \ maniobras con múltiples dispositivos, **Módulos Virtuales** para lógicas encadenadas,\
    \ o **Condiciones Temporales** para maniobras con restricción horaria."
