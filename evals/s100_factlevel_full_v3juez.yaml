- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  answer: "# RP1r — Sistema no vuelve a estado normal tras resetear después de extinción\n\
    \nEste es un escenario con varias causas posibles bien documentadas. Comprueba\
    \ en este orden:\n\n---\n\n## 1. Función \"Resumen inhibido tras extinción\" (parámetro\
    \ **ri**)\n\nEste es el punto más probable. Según la norma **UNE-EN 12094-1:2004,\
    \ apartado 4.1.2** [F9], tras una extinción realizada, el sistema pasa a un **estado\
    \ de sistema inhibido** durante un tiempo programable para evitar reiniciar el\
    \ proceso de extinción.\n\n- Parámetro **ri = 00**: el resumen inhibido se activa\
    \ desde que finaliza la extinción o cuando se agota el tiempo configurado [F9].\n\
    - Parámetro **ri = 01 a 30**: el resumen inhibido se activa después de la intervención\
    \ o reposición, en minutos [F9].\n\n**Acción:** Verifica el valor programado en\
    \ el parámetro **ri**. Si está activo, el sistema no volverá a estado normal hasta\
    \ que transcurra ese tiempo o se realice la intervención/reposición correspondiente.\n\
    \n---\n\n## 2. La función Reset puede estar inhibida por configuración\n\nSegún\
    \ **EN12094:1 Sección 4.12.2**, la función de rearme puede estar inhibida tras\
    \ iniciar el estado de Activación [F1][F3]. En ese caso:\n\n- El microinterruptor\
    \ **SW1-6** debe estar en posición **ON** [F1][F3].\n- Colocar un puente en la\
    \ posición **PROG** (parte inferior izquierda de la placa base) [F1][F3].\n- Pulsar\
    \ la tecla **Rearme** [F1][F3].\n- Resultado: el **led número 6 se iluminará en\
    \ rojo fijo** [F1][F3].\n\n---\n\n## 3. Indicación de **Fallo de Sistema** activa\n\
    \nSi tras el rearme aparece el led **Fallo Sistema**, la central no considerará\
    \ que está funcionando correctamente y no completará el retorno al estado normal\
    \ [F5].\n\n- Causa: el microprocesador principal tardó en inicializar o hubo una\
    \ lectura de tensiones fuera de rango por perturbaciones externas [F5].\n- **Acción:**\
    \ Realizar un rearme. Si la avería desaparece, el sistema es funcional [F5].\n\
    - Si persiste: revisar alimentación y baterías.\n\n---\n\n## 4. Entradas enclavadas\
    \ no restablecidas\n\nTodas las averías son **enclavadas por defecto** y requieren\
    \ rearme manual para su restablecimiento [F7]. Comprueba si alguna entrada sigue\
    \ activa (presión baja, flujo, puerta abierta, circuito de supervisión) que impida\
    \ el retorno al estado normal.\n\n- Excepción: el circuito de **paro** no admite\
    \ rearme automático [F7].\n- Para el resto de circuitos, es posible configurar\
    \ rearme automático mediante las **funciones especiales (sección 5.4)** [F7].\n\
    \n---\n\n## 5. Indicación **\"rI\"** en pantalla de 7 segmentos\n\nSi aparece\
    \ **\"rI\"** en la pantalla, indica que se ha configurado la tarjeta opcional\
    \ **VSN-4REL** pero la central no la localiza [F10]. Esto puede impedir el retorno\
    \ al estado normal.\n\n- Si no hay ninguna tarjeta **VSN-4REL** conectada, sigue\
    \ este procedimiento [F10]:\n  1. Apagar completamente la central (alimentación\
    \ principal y baterías).\n  2. Volver a alimentar la central.\n  3. Pulsar la\
    \ tecla **Zona 1 (Z1)** para cambiar el estado del led asociado.\n\n---\n\n**Fuentes:**\
    \ Manual de usuario RP1r (MNDT102, sin revisión); Boletín técnico HLSI-BT-001\
