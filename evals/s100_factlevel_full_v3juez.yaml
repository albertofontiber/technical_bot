- qid: cat023
  question: En el detector de humos por aspiración Securiton ASD532, ¿qué clases de
    sensibilidad según EN 54-20 ofrece y cómo se configura la monitorización del flujo
    de aire?
  answer: '## Clases de sensibilidad EN 54-20 del ASD 532 y configuración de monitorización
    de flujo


    ---


    ### 1. Clases de sensibilidad según EN 54-20


    El ASD 532 cumple los requisitos de la norma **EN 54-20** en las tres clases [F7]:


    - **Clase A** – Sensibilidad muy alta

    - **Clase B** – Sensibilidad alta

    - **Clase C** – Sensibilidad normal


    La placa de características del equipo lo refleja como **EN 54-20 A/B/C** [F6].


    La clase aplicable se selecciona mediante el sensor de humo instalado y la posición
    de conmutador elegida. Los tres sensores disponibles son [F2][F8]:


    - **SSD 532-1**: rango de sensibilidad de alarma **0,5 %/m hasta 10 %/m**

    - **SSD 532-2**: rango de sensibilidad de alarma **0,1 %/m hasta 10 %/m**

    - **SSD 532-3**: rango de sensibilidad de alarma **0,02 %/m hasta 10 %/m**


    ---


    ### 2. Principio de funcionamiento de la monitorización del flujo de aire


    La monitorización se basa en el **método de medición calorimétrico** (técnica
    de medición de flujo en masa) [F3]. El sensor de flujo de aire detecta cambios
    en el conducto de aspiración (rotura de tubo u obstrucción).


    **Proceso de referencia (reset inicial)** [F3]:

    1. Al realizar el reset inicial con el conducto de aspiración intacto, los valores
    de flujo se registran y guardan como **valores nominales (100 %)**.

    2. El sistema crea electrónicamente una **ventana de monitorización** centrada
    en ese 100 %.

    3. Si los valores reales salen fuera de la ventana (por obstrucción → caída, o
    rotura de tubo → subida), el ASD 532 dispara el aviso **«Fallo flujo de aire»**.


    ---


    ### 3. Configuración de la monitorización del flujo: posiciones de conmutador


    Existen **dos grupos de posiciones de conmutador** con distinto nivel de homologación
    [F5]:


    ---


    #### 3a. Posiciones **A11 a C31** — Conformes a EN 54-20 ✅


    - Ventana de monitorización: **±20 %**

    - Tiempo de retardo: **300 s**

    - Una variación superior a ±20 % (flujo < 80 % o > 120 %) dispara el aviso de
    fallo [F3].

    - Son las posiciones a usar cuando se requiere **monitorización del flujo homologada
    según EN 54-20** [F5].


    ---


    #### 3b. Posiciones **W01 a W44** — NO homologadas según EN 54-20 ⚠️


    Permiten configurar combinaciones de ventana de monitorización y tiempo de retardo
    distintas a las normativas [F1][F4]. Las combinaciones disponibles son:


    **Clase A (Sensibilidad muy alta):**

    - W01: retardo **10 min** / desviación **±20 %**

    - W02: retardo **60 min** / desviación **±20 %**

    - W03: retardo **10 min** / desviación **±50 %**

    - W04: retardo **60 min** / desviación **±50 %**


    **Clase B (Sensibilidad alta) — Límite 1:**

    - W09: retardo **10 min** / desviación **±20 %**

    - W10: retardo **60 min** / desviación **±20 %**

    - W11: retardo **10 min** / desviación **±50 %**

    - W12: retardo **60 min** / desviación **±50 %**


    **Clase B — Límite 2:**

    - W17: retardo **10 min** / desviación **±20 %**

    - W18: retardo **60 min** / desviación **±20 %**

    - W19: retardo **10 min** / desviación **±50 %**

    - W20: retardo **60 min** / desviación **±50 %**


    **Clase C (Sensibilidad normal) — Límites 1, 2 y 3:**

    - W25–W28 (Límite 1), W33–W36 (Límite 2), W41–W44 (Límite 3): mismas combinaciones
    de **10/60 min** y **±20 %/±50 %** [F1].


    > ⚠️ **Advertencia crítica**: Las posiciones W01 a W44 **no están homologadas
    según EN 54-20** y **únicamente deben utilizarse previa consulta con el fabricante**
    [F3][F4].


    ---


    ### 4. Ajuste mediante software


    Si se usa el software de cálculo **«ASD PipeFlow»**, los resultados se introducen
    en el software de configuración **«ASD Config»** y se seleccionan las posiciones
    **X01, X02 o X03** [F5].


    Si **no** se usa «ASD PipeFlow» y se requiere conformidad EN 54-20, se seleccionan
    las posiciones **A11 a C31** directamente según las tablas del cap. 4.4.4.3 [F5].


    > ⚠️ **Advertencia adicional**: Aumentar la ventana por encima de **±20 %** o
    el tiempo de retardo por encima de **300 s** implica **incumplimiento de EN 54-20**
    y solo puede efectuarse previa consulta con el fabricante. No se recomienda usar
    ventanas inferiores a ±20 % con tiempos de retardo ≤ 300 s, ya que aumenta el
    riesgo de falsos avisos de fallo [F5].


    ---


    **Fuente:** ASD532_TD_T140421es_a (sin revisión registrada)


    ---


    También puedo ayudarte con: **procedimiento de reset inicial y puesta en funcionamiento**,
    **selección del sensor SSD 532-x según clase EN 54-20 requerida** o **instalación
    eléctrica y requisitos de cableado del ASD 532**.'
