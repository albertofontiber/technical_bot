- qid: hp005
  question: En la Notifier ID3000, ¿cómo se programa una zona para que active una
    salida de sirena solo cuando haya coincidencia de dos detectores?
  answer: '# ID3000 — Coincidencia de dos detectores para activar salida de sirena


    Hay **dos enfoques** disponibles en la ID3000 para implementar esta lógica. Te
    explico ambos:


    ---


    ## ENFOQUE 1 — Mediante la Matriz de Control (método clásico)


    Este método comprueba la coincidencia **después** de que el sistema haya entrado
    en estado de alarma [F10].


    ### Paso 1 — Configurar la entrada de la Matriz de Control


    En la edición del evento de entrada de la Matriz de Control [F4]:


    1. Selecciona la zona donde están los detectores (opción **"Zona(s) Determinada"**)
    [F4].

    2. En el campo **"Limitado por TIPO"**, selecciona el tipo de sensor al que aplica
    la coincidencia (p. ej., `CUALQUIER SENSOR ÓPTICO`, `CUALQUIER SENSOR TÉRMICO`,
    etc.) [F4].

    3. En el menú **"Indique tipo de coincidencia"**, selecciona la opción **`2: COINCIDENCIA
    2 EQUIPOS`** [F4].


    > ⚠️ **PRECAUCIÓN (EN54-2: 7.1.4):** No incluyas pulsadores manuales (MCP/PUL)
    en el grupo de coincidencia [F1][F4].


    ### Paso 2 — Separar los pulsadores manuales (obligatorio)


    Para evitar que los pulsadores queden incluidos en el grupo de coincidencia, debes
    programar **dos instrucciones separadas** en la Matriz de Control [F1][F4]:


    1. **Primera instrucción:** Define la entrada de tipo **"Pulsador Manual" (MCP)**
    como **"Simple"** (sin coincidencia) [F1].

    2. **Segunda instrucción:** Define el tipo de entrada analógica (p. ej., `ANALÓGICA`)
    con la coincidencia activada. El grupo `ANALÓGICO` incluye detectores térmicos,
    iónicos, ópticos, VIEW y multisensor [F1].


    ### Paso 3 — Asignar la salida de sirena


    Vincula la salida de sirena a esta instrucción de Matriz de Control. La salida
    solo se activará cuando dos detectores de la zona estén en alarma simultáneamente
    [F1].


    ---


    ## ENFOQUE 2 — Coincidencia de equipos a nivel de central (función avanzada, software
    v4.63+)


    Este método actúa **antes** de que el sistema entre en alarma: mantiene el sistema
    en estado de **PRIMERA ALARMA / PREALARMA** hasta que se cumple el criterio de
    coincidencia [F10].


    - Aplica a sensores únicamente; **no es aplicable a módulos de entrada** [F10].

    - El nivel de coincidencia recomendado para "dos detectores en la misma zona"
    es el **Nivel 2: Dos o más sensores en la misma zona** [F10].

    - Mientras solo un detector esté en alarma, el sistema permanece en **PRIMERA
    ALARMA** (equivalente a PREALARMA): se muestran indicaciones en pantalla pero
    el **LED de ALARMA rojo no se ilumina** y la sirena no se activa [F10].

    - Esta función opera de forma **totalmente independiente** a los criterios de
    coincidencia de las matrices de control [F10].


    > **Nota:** Los niveles de coincidencia de más de dos equipos, o combinaciones
    de diferentes tipos de equipo, no están disponibles en esta versión de software
    [F10].


    ---


    ## Configuración de niveles de coincidencia (si usas niveles 3, 4 o 5 en Matriz
    de Control)


    Si necesitas niveles de coincidencia personalizados (más de 2 zonas o equipos),
    configúralos en:

    - **Programación por teclado:** Sección **11.21** — "Niveles COINCIDENCIA en ALARMA"
    [F8].

    - **Software PK-ID3000:** Pestaña **"Coincidencia de Alarma"** en "Modificar Opciones
    de la Central" [F6].


    Los niveles 1 y 2 (1 equipo y 2 equipos) son **fijos** y siempre están disponibles
    sin configuración previa [F8].


    ---


    **Fuentes:**

    - MCDT190 (sin revisión registrada) — Sección 6.1.5

    - MPDT190 rev. D — Secciones 7 y 11.21

    - MADT190_07 (sin revisión registrada) — Edición Evento de Entrada Matriz de Control

    - MADT190_14 (sin revisión registrada) — Sección 4, Coincidencia de equipos

    - MCDT191 (sin revisión registrada) — Sección 2.12


    ---


    También puedo ayudarte con: **configuración de retardos en la salida de sirena**,
    **programación de subzonas con coincidencia** o **verificación del comportamiento
    en sistemas de red ID3000**.'
