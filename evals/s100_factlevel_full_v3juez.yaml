- qid: hp019
  question: ¿Cuál es el rango de temperatura de funcionamiento del detector de aspiración
    ASD535 (Securiton, distribuido por Detnov)?
  answer: '## Rangos de temperatura del ASD 535


    El manual especifica los siguientes rangos de temperatura [F1]:


    **Caja del detector:**

    - Rango de funcionamiento estándar: **–30 °C hasta +60 °C** (UL: máx. +40 °C)

    - Rango según estándar australiano AS 1603.8: **–30 °C hasta +55 °C**

    - Temperatura máx. de almacenamiento (sin condensación): **–30 °C hasta +70 °C**


    **Conducto de aspiración:**

    - Rango de funcionamiento estándar: **–30 °C hasta +60 °C**

    - Rango según estándar australiano AS 1603.8: **–30 °C hasta +55 °C**


    **Restricción adicional importante:**

    - La fluctuación de temperatura máxima permitida durante el funcionamiento (tanto
    en la caja como en el conducto) es de **20 °C** [F1]. Si se superan estas oscilaciones,
    pueden ser necesarios ajustes especiales (ventana de flujo de aire más grande,
    mayor tiempo de retardo, etc.) [F5].


    **Caso especial — almacenes de ultracongelación:**

    - El rango de temperatura restringido aplicable es **–30 °C hasta 0 °C**, y requiere
    seguir la directriz de uso específica T 131 390 [F3].


    > ⚠️ **Nota:** Los rangos de temperatura indicados con ➂ pueden acordarse con
    el fabricante en valores inferiores o superiores. La instalación en rango de condensación
    solo puede llevarse a cabo previa consulta con el fabricante [F2].


    ---


    Fuente: ASD535 Descripción técnica, T 131 192 h es (sin revisión registrada en
    los fragmentos)


    ---


    También puedo ayudarte con: **consumos de corriente por variante (535-1 a 535-4)**,
    **condiciones de humedad admisibles** o **limitaciones de instalación en entornos
    adversos** del ASD 535.'
