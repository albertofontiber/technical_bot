- qid: cat021
  question: Necesito un detector de llama SharpEye «40/40» (Spectrex / Notifier) para
    una instalación; ¿qué modelo pido?
  answer: '## Detector de llama SharpEye 40/40R — Cómo construir la referencia de
    pedido


    El modelo que buscas es el **S40/40R** (Single IR Flame Detector) de Spectrex
    / Notifier [F1][F2].


    La referencia completa se construye así [F2][F5]:


    ```

    40/40R  X  X  X  X  X

    ```


    Cada posición define:


    **Posición 1 — Configuración de cableado** [F2][F5]

    - Ver Tabla 1 del manual (opciones de cableado en detalle)


    **Posición 2 — Temperatura** [F2][F5]

    - 1 → 75 °C

    - 2 → 85 °C


    **Posición 3 — Entradas de cable** [F2][F5]

    - 1 → M25

    - 2 → ¾" NPT


    **Posición 4 — Carcasa** [F2][F5]

    - S → Acero inoxidable

    - A → Aluminio *(no disponible en versión FM)* [F5]


    **Posición 5 — Homologación Ex** [F2][F5]

    - F → FM / CSA

    - C → ATEX / IECEx

    - B → Inmetro [F5]

    - R → TR-CU [F5]


    ---


    ### Ejemplo práctico

    Si necesitas un detector para zona ATEX, carcasa de acero inoxidable, entrada
    M25, temperatura máxima 75 °C:

    → Referencia: **40/40R-?1S1C** (la posición 1 de cableado debes consultarla en
    la Tabla 1 del manual según tu instalación) [F2]


    ---


    ### Nota importante

    La **Tabla 1** con las opciones de cableado (posición 1 de la referencia) no está
    reproducida en los fragmentos disponibles [F2]. Deberás consultarla en el manual
    **MN-DT-724** o en el *SharpEye Single IR Flame Detector User Guide* para seleccionar
    el dígito correcto según tu tipo de salida (relé, 4-20 mA, etc.) [F3].


