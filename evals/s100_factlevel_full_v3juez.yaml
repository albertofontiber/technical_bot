- qid: hp018
  question: ¿Cómo se conecta una sirena convencional en las salidas de sirena de la
    Morley ZXe?
  answer: "# Conexionado de sirenas convencionales en salidas de sirena — Morley ZXe\n\
    \n> **Nota:** Los fragmentos recuperados corresponden principalmente a los modelos\
    \ **ZXAE/ZXEE** y **ZX2e/ZX5e**. La denominación \"ZXe\" puede referirse a cualquiera\
    \ de ellos. A continuación se detalla el procedimiento, que es común en sus aspectos\
    \ fundamentales, indicando las diferencias por modelo.\n\n---\n\n## Reglas generales\
    \ de conexionado [F1]\n\n- Las salidas de sirenas son **supervisadas** y **limitadas\
    \ en corriente**.\n- Corriente máxima por circuito: **1 A** [F1].\n- Sección mínima\
    \ de cable: **1,5 mm²** [F1].\n- **No realizar ramales** en la línea de sirenas\
    \ — la supervisión solo funciona en línea directa hasta la RFL [F2].\n\n---\n\n\
    ## Resistencia Final de Línea (RFL) [F1]\n\n- Valor: **6.800 Ω (6K8), 0,5 W mínimo**\
    \ [F1].\n- Se instala **entre + y − de la última sirena** de la línea [F1].\n\
    - Si **no hay sirenas** conectadas, la RFL se conecta directamente en los terminales\
    \ de la central [F1].\n- La supervisión usa **corriente inversa** (polaridad inversa\
    \ a la de activación) [F1].\n\n---\n\n## Sirenas con polaridad [F1][F2]\n\n1.\
    \ Conecta el **+** de la salida de sirena al **+** de la primera sirena.\n2. Encadena\
    \ las sirenas en serie de positivo a negativo.\n3. Coloca la **RFL de 6K8 Ω**\
    \ entre **+** y **−** al final de la última sirena.\n4. Conecta el **−** de la\
    \ línea al terminal **−** de la salida de sirena de la central.\n\n---\n\n## Sirenas/campanas\
    \ sin polaridad [F1][F4]\n\n- **Obligatorio instalar un diodo** entre el **+**\
    \ de la línea y uno de los terminales de alimentación de la campana [F1].\n- Esto\
    \ evita consumo durante la supervisión (corriente inversa) [F4].\n- El diodo debe\
    \ instalarse en **cada dispositivo no polarizado** [F4].\n\n---\n\n## Terminales\
    \ físicos por modelo\n\n**ZXAE** — 2 salidas (A y B) [F1]:\n- Terminales en bloque\
    \ **TB** de placa, etiquetados **SOUNDERS / SALIDA SIRENAS A, B** [F1].\n\n**ZXEE**\
    \ — 4 salidas (A, B, C y D) [F1]:\n- Terminales: **TB7: S,A+ / S,A− / S,B+ / S,C+\
    \ / S,D+ / S,D−** [F1].\n\n**ZX2e** — 2 salidas (A y B) [F4]:\n- Terminales etiquetados\
    \ **AUX RELAY A+ A− B+ B− SOUNDERS** [F4].\n\n**ZX5e** — 4 salidas (A, B, C y\
    \ D) [F4]:\n- Terminales: **TB7: A− A+ B− B+ C− C+ D− D+** [F4].\n\n---\n\n##\
    \ Longitud máxima de cable\n\n- Para **ZX2e/ZX5e**: no se recomienda cable de\
    \ longitud superior a **1 km** — la capacitancia e inductancia del lazo pueden\
    \ afectar al funcionamiento [F3].\n- Para **ZXAE/ZXEE**: el manual advierte evitar\
    \ longitudes excesivas por caída de tensión, pero **no especifica un valor máximo\
    \ concreto** [F1].\n\n---\n\n## Resumen esquemático del circuito [F2]\n\n```\n\
    + Salida ──[D]──Sirena1──[D]──Sirena2──[D]──SirenaN──┐\n                     \
    \                                 RFL 6K8Ω\n− Salida ─────────────────────────────────────────────┘\n\
    ```\n*(D = diodo integrado en sirenas polarizadas, o diodo externo en campanas\
    \ sin polaridad)*\n\n---\n\n**Fuente:** Manual de Instalación ZXAE/ZXEE (DOC.MIE-MI-310,\
    \ sin revisión registrada); Manual de Instalación ZX2e/ZX5e (DOC.MIE-MI-530, Rev.\
    \ 001)\n\n---\n\nTambién puedo ayudarte con: **programación del patrón de disparo\
    \ de las sirenas**, **verificación de la supervisión de línea** o **conexionado\
    \ de sirenas en módulo de lazo analógico**."
