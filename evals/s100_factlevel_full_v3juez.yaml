- qid: cat016
  question: En la Detnov CAD-150, ¿como se da de alta un detector nuevo en el lazo
    y como se prueba que funciona?
  answer: "# CAD-150-8: Alta de detector nuevo y prueba funcional\n\n## Parte 1: Alta\
    \ de un detector nuevo en el lazo\n\nLos fragmentos disponibles **no describen\
    \ el procedimiento específico de alta/direccionamiento de un detector nuevo**\
    \ en el lazo (asignación de dirección física, configuración de tipo de detector,\
    \ vinculación a zona, etc.).\n\nLo que sí indica el manual de instalación es que\
    \ antes de conectar dispositivos al lazo se debe verificar lo siguiente [F6]:\n\
    \n- Comprobar que no existen cortocircuitos ni circuitos abiertos en el lazo (usar\
    \ voltímetro/tester).\n- Verificar que el equipo está instalado correctamente.\n\
    - Verificar las conexiones de salida de la placa base.\n\nY para la puesta en\
    \ marcha general, el manual recomienda utilizar el **software de configuración**\
    \ para el proceso de alta de dispositivos, ya que \"el proceso será más sencillo\
    \ y rápido\" que hacerlo desde el teclado [F6].\n\n> ⚠️ Para el procedimiento\
    \ completo de direccionamiento y alta de un detector nuevo (asignación de dirección,\
    \ tipo, zona), consulta el manual de instalación completo o el software de configuración\
    \ de Detnov.\n\n---\n\n## Parte 2: Prueba funcional del detector\n\nUna vez el\
    \ detector está instalado, el procedimiento de prueba es el siguiente:\n\n###\
    \ Paso 1 — Acceder al menú de usuario\nIntroduce el código de nivel usuario (**1111**)\
    \ o instalador (**2222**) para acceder al menú principal [F7].\n\n### Paso 2 —\
    \ Poner la zona en modo PRUEBA\nDesde el menú principal, navega a:\n\n**ZONA →\
    \ PRUEBA** [F1]\n\nSe mostrará la pantalla:\n```\nPRUEBA ZONA\nRANGO  : [000]\
    \ a [250]\nACTIVAR SIRENAS: [SI]\n< Aceptar >    < Salir >\n```\n\n- Introduce\
    \ el **rango de zonas** que quieres poner en prueba [F1].\n- Selecciona si deseas\
    \ **ACTIVAR SIRENAS: [SI/NO]** [F1]:\n  - Si es **SI**: las sirenas se activarán\
    \ unos segundos tras la alarma del detector y se silenciarán automáticamente.\
    \ Cualquier retardo programado queda **anulado** en modo prueba [F1].\n  - Si\
    \ es **NO**: la alarma se registra sin activar sirenas.\n- Pulsa **ACEPTAR** para\
    \ confirmar [F2].\n\n### Paso 3 — Provocar la alarma en el detector\nActiva el\
    \ detector (aerosol de prueba, calor, etc.). El sistema debe registrar la alarma\
    \ sin necesidad de rearmar la central [F1].\n\n### Paso 4 — Salir del modo prueba\n\
    Para salir del modo prueba, **conecta la zona** desde el menú ZONA → CONECTAR\
    \ [F1].\n\n> ⚠️ **Tiempo límite:** Si transcurren **20 minutos** desde la activación\
    \ del modo prueba sin que se produzca ningún disparo de alarma, el sistema saldrá\
    \ automáticamente del modo prueba y volverá al estado normal [F1][F2].\n\n---\n\
    \n## Mantenimiento periódico asociado\n\nEl manual indica que anualmente se debe\
    \ [F8]:\n- Poner el equipo en estado de prueba y verificar que **todos los detectores\
    \ y pulsadores** funcionan según las especificaciones del fabricante.\n\n---\n\
    \n**Fuentes:**\n- Manual de usuario: `55315008-Manual-Centrales-Analogicas-CAD-150-8-Usuario-ES-FR-GB-IT`\
    \ (sin revisión registrada)\n- Manual de instalación: `55315013 Manual Centrales\
    \ Analogicas CAD-150-8 Instalacion ES FR GB IT` (sin revisión registrada)\n\n\
    ---\n\nTambién puedo ayudarte con: **conexionado del lazo analógico**, **configuración\
    \ de zonas desde teclado** o **interpretación de averías y códigos de fallo**\
    \ en la CAD-150-8."
