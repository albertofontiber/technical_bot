- qid: cat007
  question: En el detector por aspiración FAAST LT-200, ¿qué salidas de relé y de
    sirena tiene y con qué contactos, cómo se comporta el relé de avería ante un fallo
    o un corte de alimentación, qué resistencia de fin de línea llevan las salidas
    de sirena y cuál es la especificación eléctrica de los contactos de relé?
  answer: '# FAAST LT-200 — Salidas de relé y sirena: especificación completa


    ---


    ## 1. Relés disponibles y su comportamiento


    El FAAST LT-200 dispone de los siguientes relés [F1][F2]:


    **Relé de ALARMA 1 y 2:**

    - Se activa cuando se cumple la condición de alarma en el canal correspondiente
    [F1]

    - En la versión Stand-Alone: estado enclavado por defecto; requiere RESET manual
    para desactivar LED y relé [F1]

    - En la versión Loop (conectado a panel): controlado por el panel, **no enclavado**
    [F3][F4]


    **Relé de PRE-ALARMA 1 y 2** *(solo versión Stand-Alone)*:

    - Se activa cuando se cumple la condición de pre-alarma en el canal [F1]

    - Por defecto = Nivel 1. Cuando Pre-ALARMA = ALARMA = Nivel 1, la pre-alarma responde
    al **70% del Nivel 1** [F1]


    **Relé de AVERÍA 1 y 2:**

    - Se activa ante condición de avería en Ch1 o Ch2, o ante avería común [F1][F2]

    - También se activa en **modo de servicio** (puerta abierta) y cuando la **unidad
    está sin alimentación** [F1][F2]

    - Estado de avería **no enclavado** (por defecto) [F1][F2]


    **Relé de SIRENA 1 y 2:**

    - Se activa cuando el canal entra en ALARMA [F1][F2]

    - Sirena 1 → Canal 1 / Sirena 2 → Canal 2 [F1][F2]

    - Estado por defecto: activado en ALARMA [F1][F2]


    ---


    ## 2. Contactos de los relés (terminales de cableado)


    Cada relé dispone de **tres contactos: NC (normalmente cerrado), C (común) y NO
    (normalmente abierto)** [F5][F6].


    **Versión Stand-Alone** (terminales T2–T10) [F6]:

    - T2 (terminales 5–6–7): Relé Alarma CH1 → NC / C / NO

    - T3 (terminales 8–9–10): Relé Alarma CH2 → NC / C / NO

    - T4 (terminales 11–12–13): Relé Avería CH1 → NC / C / NO

    - T5 (terminales 14–15–16): Relé Avería CH2 (AUX) → NC / C / NO

    - T9 (terminales 23–24–25): Relé Pre-Alarma CH1 → NC / C / NO

    - T10 (terminales 26–27–28): Relé Pre-Alarma CH2 → NC / C / NO


    **Versión Loop** (terminales T2–T5) [F5]:

    - T2 (terminales 5–6–7): Relé Alarma CH1 → NC / C / NO

    - T3 (terminales 8–9–10): Relé Alarma CH2 → NC / C / NO

    - T4 (terminales 11–12–13): Relé Avería CH1 → NC / C / NO

    - T5 (terminales 14–15–16): Relé Avería CH2 (AUX) → NC / C / NO


    > **Nota:** La versión Loop **no incluye relés de Pre-Alarma** en su tabla de
    terminales [F5], a diferencia de la versión Stand-Alone que sí los tiene en T9
    y T10 [F6].


    ---


    ## 3. Comportamiento del relé de avería ante fallo o corte de alimentación


    - Ante cualquier **condición de avería** en Ch1, Ch2 o avería común → relé de
    avería se activa [F1][F2]

    - En **modo de servicio** (puerta abierta) → relé de avería indica avería [F10]

    - Con la **unidad sin alimentación** → el relé de avería también indica avería
    [F1][F2][F4]

    - El estado de avería **no está enclavado**: se desactiva automáticamente al resolverse
    la condición [F1][F2]


    ---


    ## 4. Resistencia de fin de línea en salidas de sirena


    Las salidas de sirena llevan una resistencia de fin de línea de **47 kΩ** [F5][F6][F7]:

    - Terminal T6 (terminales 17–18): Salida Sirena 1 → EOL **47 kΩ**

    - Terminal T7 (terminales 19–20): Salida Sirena 2 → EOL **47 kΩ**


    ---


    ## 5. Especificación eléctrica de los contactos de relé


    - Corriente máxima: **2 A** a **30 V CC** (carga resistiva) [F1][F4]

    - Corriente máxima: **0,5 A** a **30 V CA** (carga resistiva) [F1][F4]

    - Vida útil mínima: **10⁵ operaciones** [F1][F4]


    > ⚠️ **Advertencia:** Para cargas inductivas, se requiere protección adicional
    (diodo supresión tipo 1N6284CA). El conexionado directo a carga inductiva sin
    protección está indicado como incorrecto en la documentación [F4].


    ---


    **Fuentes:**

    - I56-6574-005_EN-HS-Stand-Alone-FAAST-LT-200-QIG (sin revisión registrada)

    - I56-6577-006_ES FAAST Notifier LT-200 QIG (sin revisión registrada)

    - I56-6575-005_EN-FAAST-LT-200-Loop-QIG (sin revisión registrada)

    - I56-6577-006_EN Notifier FAAST LT-200 QIG (sin revisión registrada)

    - I56-6574-005_ES -HS Stand Alone FAAST LT-200 QIG (sin revisión registrada)

    - I56-6575-005_ES FAAST LT-200 Loop QIG (sin revisión registrada)


    ---


    También puedo ayudarte con: **conexionado de la entrada configurable de rearme**,
    **especificaciones de alimentación del FAAST LT-200** o **procedimiento de sustitución
    de sensores de humo**.'
