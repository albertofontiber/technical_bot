- qid: hp002
  question: El detector ASD535 de Detnov está dando una alarma intermitente de flujo
    bajo. ¿Cuál es la causa más probable y cómo se diagnostica?
  answer: "## Alarma de flujo bajo en ASD535 — Diagnóstico\n\n### Causa más probable\n\
    \nUn valor de flujo **por debajo del 80 %** del nominal indica **obstrucción en\
    \ el conducto de aspiración** [F2]. El ASD535 dispara el aviso «fallo flujo de\
    \ aire» (código **001**) cuando la variación supera el **±20 %** una vez transcurrido\
    \ el tiempo de retardo de **300 s** de la LS-Ü [F1][F2].\n\n---\n\n### Pasos de\
    \ diagnóstico\n\n1. **Leer el valor de flujo actual**\n   Coloca el conmutador\
    \ en posición **V** para leer el porcentaje de flujo del conducto de aspiración\
    \ [F7]. Compara con el valor registrado en el protocolo de puesta en funcionamiento.\n\
    \   - Valor **< 80 %** → obstrucción [F2]\n   - Valor **> 120 %** → rotura de\
    \ tubo [F2]\n\n2. **Verificar el código de evento**\n   Coloca el conmutador en\
    \ posición **E** (AMB 35) para leer el código de evento [F3]:\n   - Código **001**\
    \ → Obstrucción en conducto de aspiración [F4]\n   - Código **002** → Rotura de\
    \ tubo en conducto de aspiración [F4]\n   - Código **004** → Parámetros LS-Ü no\
    \ válidos / fuera de rango [F4]\n   - Código **008** → Sensor de flujo de aire\
    \ defectuoso o no conectado [F4]\n\n3. **Inspección física del conducto (código\
    \ 001 — obstrucción)**\n   - Comprobar si los **orificios de aspiración** están\
    \ obstruidos [F4]\n   - Comprobar la **salida de aire** del ASD [F7]\n   - **Inspeccionar\
    \ y limpiar la caja de filtro / unidad de filtrado** [F4]\n   - **Inspeccionar\
    \ y limpiar el sensor de flujo de aire** [F4]\n\n4. **Verificar tensión de alimentación**\n\
    \   Medir en bornes **1 (+) y 2 (-)** del AMB 35 [F7]:\n   - Funcionamiento a\
    \ **12 V-CC**: valor nominal **12,3 a 13,8 V-CC** [F7]\n   - Funcionamiento a\
    \ **24 V-CC**: valor nominal **21,6 a 27,6 V-CC** [F7]\n\n5. **Umbral de inspección\
    \ preventiva**\n   Con sensibilidad estándar **±20 %**, actúa ya si el valor cae\
    \ por debajo del **90 %** (la mitad de la sensibilidad = ±10 %) sin esperar al\
    \ disparo de fallo [F7].\n\n---\n\n### ⚠️ Advertencia importante\n\nSi tras los\
    \ trabajos de limpieza fuera necesario ejecutar un **reset inicial**, este **solo\
    \ debe realizarse cuando el conducto de aspiración esté completamente limpio**.\
    \ Realizar el reset con orificios obstruidos puede impedir que el ASD535 dispare\
    \ la alarma ante un incendio real [F5].\n\n---\n\n**Fuente:** ASD535 Descripción\
    \ técnica, T 131 192 h es (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **procedimiento de limpieza del sensor de flujo de aire**, **sustitución\
    \ del sensor de flujo (código 008)** o **ejecución del reset inicial tras mantenimiento**."
