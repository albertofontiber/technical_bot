- qid: cat012
  question: ¿Cómo se calcula la capacidad de batería (en Ah) necesaria para la central
    AM-8200?
  answer: "# Cálculo de capacidad de batería — AM-8200\n\nEl manual proporciona un\
    \ procedimiento estructurado en pasos usando la **Tabla 1** (para la AM-8200)\
    \ [F9]. Aquí tienes el método completo:\n\n---\n\n## Paso 1 — Calcular la corriente\
    \ en reposo (condición NO ALARMA)\n\nPara cada componente del sistema, anota la\
    \ cantidad instalada (C) y multiplica por el consumo unitario (A). Los valores\
    \ de referencia son [F9]:\n\n- **AM-8200 CPU (AM8200-KLCD):** 179 mA/ud.\n- **LIB-8200:**\
    \ 50 mA/ud.\n- **AM82-2S2C:** 28 mA/ud.\n- **AM82-BST-C:** 39 mA/ud.\n- **Corriente\
    \ de lazos:** consultar Tabla 3 del manual [F9]\n- **Salida usuario:** máx. 2\
    \ A [F9]\n- **Dispositivos 24 Vcc** (campanas, sirenas, flashes, LCD-8200, otros):\
    \ añadir consumo de cada uno\n\nSuma todos los valores → obtienes el **Total en\
    \ reposo**.\n\n---\n\n## Paso 2 — Calcular los Ah en reposo (A)\n\nMultiplica\
    \ el total de corriente en reposo por la duración de autonomía requerida [F9]:\n\
    \n> **Total reposo × 24 h** (o × 72 h según normativa aplicable) = **Espera (A)\
    \ en Ah**\n\n---\n\n## Paso 3 — Calcular la corriente en alarma (condición ALARMA)\n\
    \nRepite el proceso con los consumos en alarma [F9]:\n\n- **AM-8200 CPU:** 345\
    \ mA/ud.\n- **LIB-8200:** 92 mA/ud.\n- **AM82-2S2C:** 28 mA/ud.\n- **AM82-BST-C:**\
    \ 39 mA/ud.\n- **Corriente de lazos en alarma:** consultar Tabla 3 [F1] — tener\
    \ en cuenta que la central enciende **solo los primeros 6 LED** de detectores\
    \ y módulos de entrada en alarma [F1]\n- **Corriente total de todos los lazos\
    \ debe ser inferior a 750 mA** [F1]\n- **Corriente total salida 24 Vcc debe ser\
    \ inferior a 2 A** [F1]\n\n---\n\n## Paso 4 — Calcular los Ah en alarma (B)\n\n\
    > **Total alarma × 0,5 h** = **Alarma (B) en Ah** [F9]\n\n---\n\n## Paso 5 — Aplicar\
    \ el factor de corrección y obtener los Ah finales\n\n> **Ah Batería = (A + B)\
    \ × 1,2** [F1] [F9]\n\nEl factor **1,2** compensa las tolerancias de fabricación\
    \ de las baterías [F1].\n\n---\n\n## Paso 6 — Verificar límites del cargador\n\
    \nSi la corriente total calculada supera **3,5 A**, la corriente en exceso durante\
    \ alarma se extrae de las baterías — tenerlo en cuenta en el dimensionado [F1].\n\
    \n---\n\n## Límites de batería admitidos\n\n- **Mínimo:** 2 × 12 V / **7 Ah**\
    \ [F5]\n- **Máximo:** 2 × 12 V / **18 Ah** [F5]\n- Baterías recomendadas [F5]:\n\
    \  - Yuasa NP18-12B o NP7-12BFR — 12 V / 17,2 Ah — 181 × 77 × 167 mm\n  - Fiamm\
    \ FG21803 o FGV21803 — 12 V / 18 Ah — 181 × 77 × 167 mm\n\n> ⚠️ **Nota:** Si usas\
    \ la **AM-8200BB**, el cálculo se realiza con la **Tabla 2** del manual, que tiene\
    \ consumos distintos (CPU BB: 177 mA en alarma / 135 mA en reposo) [F10].\n\n\
    ---\n\nFuente: AM-8200 Manual de Instalación — Doc. AM-8200-ESP Rev. A.3\n\nTambién\
    \ puedo ayudarte con: **conexionado de baterías al cargador**, **interpretación\
    \ de fallos de batería (códigos 103/104)** o **cálculo de corriente de lazos con\
    \ la Tabla 3**."
