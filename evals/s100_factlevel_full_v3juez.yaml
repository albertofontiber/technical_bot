- qid: hp001
  question: En la Detnov CAD-250, ¿cómo se entra al menú de programación avanzada?
  answer: "# Acceso al menú de Programación Avanzada — CAD-250\n\n## Paso a paso\n\
    \n1. **Desbloquea la pantalla** tocando el icono del candado (\U0001F512) en la\
    \ **PANTALLA DE REPOSO** [F6].\n\n2. **Introduce la contraseña** de nivel instalador\
    \ en la pantalla de acceso [F5]. La clave de administrador por defecto es **2222**\
    \ [F5].\n   > ⚠️ Dependiendo de la clave introducida, ciertos parámetros no estarán\
    \ disponibles. Asegúrate de introducir credenciales con nivel de instalador para\
    \ acceder a todos los ajustes avanzados [F5].\n\n3. **Navega al submenú AVANZADO**\
    \ siguiendo esta ruta desde el menú principal [F2]:\n\n   **AJUSTES** (Menú principal)\
    \ **> AVANZADO** (Submenú)\n\n4. Una vez dentro, dispones de **3 pestañas** [F2]:\n\
    \   - **SISTEMA:** configura número de cabinas (PANELES: 1–4), número de lazos\
    \ y LEDs de zona [F2].\n   - **OTROS:** interruptores de puesta en marcha y mantenimiento\
    \ (tiempo de inactividad, salto a scroll si incidentes, timeout, módulos virtuales,\
    \ salida automática del modo test) [F3].\n   - **REINICIAR:** devuelve los valores\
    \ de configuración del panel a fábrica (no afecta a entidades, lazos, maniobras,\
    \ grupos, módulos virtuales, modos especiales, filtros de red ni registros de\
    \ eventos) [F3].\n\n5. Para validar cambios en la pestaña SISTEMA, pulsa el botón\
    \ **Guardar y Reiniciar** [F2].\n\n> ⚠️ Por razones de seguridad y cumplimiento\
    \ normativo, todos los interruptores de inactividad, timeout y scroll deben estar\
    \ activados (en verde) por defecto [F3].\n\n---\n\n**Fuentes:**\n- CAD-250 Manual\
    \ de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n- CAD-250 Manual de\
    \ Software de Configuración MS-416-es-2026-b (rev. b)\n- Manual de Instalación\
    \ CAD-250 MI-372-es-2024-e\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de usuarios y niveles de acceso**, **ajuste del número de lazos en pestaña SISTEMA**\
    \ o **opciones de la pestaña OTROS (timeouts y modos de puesta en marcha)**."
