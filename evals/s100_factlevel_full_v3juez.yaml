- qid: hp006
  question: La Notifier AFP-400 muestra el aviso 'Tierra' (Earth Fault). ¿Qué significa
    y cómo se localiza?
  answer: '## Fallo de Tierra (Earth Fault) en la AFP-400


    ### ¿Qué significa?


    El aviso **''Tierra''** (Earth Fault / Fallo de Tierra) indica que existe una
    fuga de corriente entre el cableado del sistema y la tierra física (chasis o tierra
    de protección). En la AFP-400, este fallo se detecta y señaliza mediante un **LED
    específico de "Fallo de Tierra"** ubicado en la placa de alimentación **MPS-400**
    [F4].


    Cuando se produce, el sistema entra en modo **Avería** [F3]:

    - El piezo interno suena [F3]

    - El LED **"Avería del Sistema"** (amarillo) parpadea [F1]

    - Se activa el relé de avería [F3]

    - Aparece un mensaje en la pantalla LCD [F3]


    ---


    ### Procedimiento de localización


    **Paso 1 — Reconocer el aviso**

    Pulsa **\<Aceptar>** para silenciar el piezo y cambiar el LED de Avería de intermitente
    a fijo [F3].


    **Paso 2 — Identificar el origen: SLC o cableado general**

    El fallo de tierra puede originarse en el **Lazo de Comunicaciones (SLC)** o en
    el cableado de alimentación. Según el tipo de circuito SLC configurado, una falla
    de tierra genera las siguientes condiciones [F8]:


    - **Estilo 4:** Alarma/Problema

    - **Estilo 6:** Alarma/Problema

    - **Estilo 7:** Alarma/Problema


    Es decir, en cualquier estilo de SLC, una falla de tierra genera señal de problema
    (y posiblemente alarma) en el panel [F8].


    **Paso 3 — Verificar el LED de Fallo de Tierra en la MPS-400**

    La placa **MPS-400** dispone de un **LED dedicado de "Fallo de Tierra"** (Ground
    Fault LED) [F4][F5]. Comprueba visualmente si está encendido para confirmar que
    el origen está en la alimentación o en el cableado supervisado por la MPS-400.


    **Paso 4 — Revisar el cableado del SLC**

    El lazo SLC de dos hilos puede tener una resistencia máxima de **40 Ω** desde
    la central hasta el extremo de cada derivación [F9]. Inspecciona el cableado del
    lazo buscando:

    - Roces del aislamiento contra bandejas metálicas o estructuras

    - Humedad en cajas de derivación

    - Conectores en mal estado


    **Paso 5 — Revisar el cableado de alimentación (MPS-400)**

    Comprueba los terminales de la **MPS-400** relacionados con tierra [F4]:

    - **TB1-3:** Toma Tierra (conexión de tierra de protección)

    - **TB1-1:** Montaje


    Verifica que no haya conductores pelados en contacto con la carcasa o con otros
    conductores.


    **Paso 6 — Jumper JP6 (Ground Fault Disable)**

