- bot_answer: '# Cálculo de capacidad de batería — AM-8200


    El manual define el procedimiento completo en la sección **11 - ALIMENTACIÓN -
    CÁLCULO DE CONSUMOS** [F2]. A continuación el método paso a paso:


    ---


    ## Paso 1 — Calcular la corriente en reposo (A)


    Suma los consumos de todos los componentes instalados en condiciones de **NO ALARMA**
    usando la **Tabla 1** (para AM-8200 con CPU AM8200-KLCD) [F4] o la **Tabla 2**
    (para AM-8200BB) [F5]:


    Consumos de referencia en reposo:

    - **AM-8200 CPU (AM8200-KLCD):** **179 mA** [F4]

    - **LIB-8200:** **50 mA** por unidad [F4]

    - **AM82-2S2C:** **28 mA** por unidad [F4]

    - **AM82-BST-C:** **39 mA** por unidad [F4]

    - Corriente de lazos: consultar fichas de datos de los dispositivos instalados
    [F3]

    - Corriente salida usuario (máx. **2 A**) [F4]


    Una vez sumado el total, multiplica por la duración de espera requerida:

    - **Total reposo × 24 h** (o × **72 h** según normativa aplicable) = **Ah de espera
    (A)** [F4]


    ---


    ## Paso 2 — Calcular la corriente en alarma (B)


    Suma los consumos en condiciones de **ALARMA** de los mismos componentes:


    - **AM-8200 CPU (AM8200-KLCD):** **345 mA** [F4]

    - **LIB-8200:** **92 mA** por unidad [F4]

    - **AM82-2S2C:** **28 mA** por unidad [F4]

    - **AM82-BST-C:** **39 mA** por unidad [F4]

    - Corriente de lazos en alarma: la central enciende **solo los primeros 6 LED**
    de detectores y módulos de entrada en alarma [F3]

    - Comprobar que la corriente total de todos los lazos sea **inferior a 750 mA**
    [F3]

    - Comprobar que la corriente total de la salida de 24 Vcc sea **inferior a 2 A**
    [F3]


    Multiplica el total por la duración de alarma:

    - **Total alarma × 0,5 h** = **Ah de alarma (B)** [F4]


    > ⚠️ Si el valor de absorción calculado supera **3,5 A**, la corriente en exceso
