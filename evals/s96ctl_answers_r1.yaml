- bot_answer: "# Configuración de una Maniobra (Causa-Efecto) en la CAD-250\n\n##\
    \ Concepto general\n\nUna maniobra es un conjunto de acciones programadas en función\
    \ de los estados del sistema (áreas, zonas, dispositivos). Los cambios de estado\
    \ se llaman **eventos** y a cada evento se le asocia una **acción** (activación\
    \ de sirenas, relés, etc.) [F4].\n\nLa estructura es: **Entradas (Eventos) → Lógica\
    \ (Coincidencias) → Salidas (Acciones)** [F4].\n\n---\n\n## PASO 1 — Acceder al\
    \ menú de Maniobras\n\nNavega por el panel siguiendo esta ruta [F4]:\n\n**MENÚ**\
    \ → **MANIOBRAS** → **+AÑADIR**\n\n---\n\n## PASO 2 — Crear la maniobra\n\n1.\
    \ Pulsa el botón **AÑADIR** en la pantalla de Maniobras [F1].\n2. Se abre la pantalla\
    \ de edición de la maniobra (ej: \"Maniobra 0001\") [F1].\n3. Configura el campo\
    \ **COINCIDENCIAS**: indica cuántos eventos deben cumplirse simultáneamente para\
    \ que la salida se active [F1]:\n   - **Coincidencias = 1** → lógica **OR**: cualquiera\
    \ de los eventos activa la salida [F1].\n   - **Coincidencias = N (igual al total\
    \ de eventos)** → lógica **AND**: todos los eventos deben cumplirse [F1].\n  \
    \ - **Coincidencias = valor intermedio** → lógica **N de M**: se deben cumplir\
    \ N eventos cualesquiera de los M definidos [F1].\n\n> ⚠️ **Importante:** La maniobra\
    \ gestiona **eventos** (cambios de estado), no estados estáticos. El evento es\
    \ el cambio de estado; si coincide con la condición establecida, activa las salidas\
    \ [F2].\n\n---\n\n## PASO 3 — Definir las entradas (Eventos)\n\n1. En la pantalla\
    \ de edición de la maniobra, pulsa **AÑADIR** en el margen inferior [F2].\n2.\
    \ En la pantalla emergente, selecciona **EVENTO** [F2].\n3. Se mostrará una nueva\
    \ pantalla para elegir el tipo de evento [F2]:\n\n   - **ENTIDAD**: cualquier\
    \ elemento de la jerarquía del sistema (instalación, panel, lazo, área, zona,\
    \ dispositivo, grupo o módulo virtual), tanto del sistema local como de la red\
    \ [F2].\n   - **CONDICIÓN TEMPORAL**: establece un periodo de tiempo para el que\
    \ la ecuación de entrada sea verdadera [F2].\n\n4. Si seleccionas **ENTIDAD**,\
    \ accedes a la pantalla **EVENTO DE LA ENTIDAD** donde configuras [F2]:\n   -\
    \ **REPETICIONES**: condición numérica que indica el número de elementos de la\
    \ entidad que harán verdadera la entrada [F2].\n   - La entidad puede ser **Local**\
    \ (central actual) o de **Red** (cualquier central del sistema en red) [F2].\n\
    \n5. Edita cada evento haciendo **2 clics** sobre él (o selecciónalo y pulsa **EDITAR**)\
    \ para definir las premisas que deben cumplirse para que ese evento sea verdadero\
    \ [F5].\n\n6. Repite el proceso para añadir tantos eventos de entrada como necesites\
    \ [F5].\n\n> \U0001F4A1 Desde la versión **1.1.1** del software es posible seleccionar\
    \ un **elemento de salida** como condición de entrada (el cambio a condición de\
    \ avería hará la condición entrante verdadera). Para ello, desmarca la casilla\
    \ **\"Sólo dispositivos de entrada\"** [F5].\n\n---\n\n## PASO 4 — Definir las\
    \ salidas (Acciones)\n\n1. En la misma pantalla de edición de la maniobra, pulsa\
    \ **AÑADIR** en el margen inferior [F3].\n2. En la pantalla emergente, selecciona\
    \ **ACCIÓN** [F3].\n3. Se presentan dos campos [F3]:\n   - **RETRASO**: tiempo\
    \ de hasta **600 segundos** antes de iniciar la acción [F3].\n   - **ENTIDAD**:\
    \ elemento de la jerarquía del sistema local (panel, lazo, área, zona, dispositivo,\
    \ grupo o módulo virtual) sobre el que se ejecutará la acción [F3].\n\n4. En la\
    \ pantalla **ACCIÓN DE LA ENTIDAD** configuras [F3]:\n   - **Retraso**: puedes\
    \ modificar aquí el valor de retardo [F3].\n   - **Tipo**: identifica la acción\
    \ y el tipo de elemento al que se aplicará dentro de la entidad [F3].\n\n5. Repite\
    \ para añadir tantas acciones de salida como necesites.\n\n> ⚠️ **Límite del sistema:**\
    \ El número máximo de maniobras entre eventos y acciones es de **100.000** [F2].\n\
    \n---\n\n## Resumen del flujo completo\n\n```\nMENÚ > MANIOBRAS > AÑADIR\n   \
    \    ↓\n  Configurar COINCIDENCIAS (lógica OR / AND / N de M)\n       ↓\n  AÑADIR\
    \ > EVENTO > ENTIDAD o CONDICIÓN TEMPORAL\n  (repetir para cada entrada)\n   \
    \    ↓\n  AÑADIR > ACCIÓN > RETRASO + ENTIDAD + TIPO\n  (repetir para cada salida)\n\
    ```\n\n---\n\nFuente: CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c,\
    \ 2026-04-23)\n\n---\n\nTambién puedo ayudarte con: **configuración de Grupos**,\
    \ **creación de Módulos Virtuales** o **uso de Condiciones Temporales** en maniobras\
    \ de la CAD-250."
