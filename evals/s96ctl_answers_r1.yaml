- bot_answer: '## ASD532 — Clases EN 54-20 y configuración de monitorización de flujo
    de aire


    ---


    ### 1. Clases de sensibilidad según EN 54-20


    El ASD532 ofrece las tres clases definidas por EN 54-20 [F3]:


    - **Clase A** — Sensibilidad muy alta

    - **Clase B** — Sensibilidad alta

    - **Clase C** — Sensibilidad normal


    La elección del sensor de humo condiciona el rango disponible [F3]:

    - **SSD 532-1**: rango de sensibilidad de alarma **0,5 %/m hasta 10 %/m**

    - **SSD 532-2**: rango de sensibilidad de alarma **0,1 %/m hasta 10 %/m**

    - **SSD 532-3**: rango de sensibilidad de alarma **0,02 %/m hasta 10 %/m**


    ---


    ### 2. Cómo funciona la monitorización del flujo de aire


    El ASD532 usa un **método de medición calorimétrico** (técnica de medición de
    flujo en masa) [F2]. El sensor de flujo detecta cambios en el conducto de aspiración
    (rotura de tubo u obstrucción).


    **Proceso de referencia:**

    1. Al realizar el **reset inicial** (con el conducto intacto), el sistema registra
    y memoriza los valores de flujo como **valores nominales = 100 %** [F2].

    2. El sistema crea electrónicamente una **ventana de monitorización** centrada
    en ese 100 %.

    3. Si los valores reales se salen de esa ventana, se dispara el aviso **«Fallo
    flujo de aire»** [F2].


    **Parámetros normativos según EN 54-20** (posiciones A11 a C31) [F2]:

    - Desviación máxima permitida: **±20 %** (por debajo del **80 %** = suciedad/obstrucción;
    por encima del **120 %** = rotura de tubo)

    - Tiempo de retardo: **300 s**


    ---


    ### 3. Configuración: dos vías posibles


    **Vía 1 — Con software «ASD PipeFlow»** [F5]:

    1. Crear y calcular el proyecto en «ASD PipeFlow» → resultado conforme a EN 54-20.

    2. Introducir el resultado en el software de configuración **«ASD Config»**.

    3. Seleccionar posición de conmutador **X01, X02 o X03** en el ASD para memorizar
    los resultados.


    **Vía 2 — Sin «ASD PipeFlow»** (EasyConfig) [F5]:

    - Si se requiere monitorización de flujo **conforme a EN 54-20**: seleccionar
    posición de conmutador **A11 a C31** según el cap. 4.4.4.3.

    - Si **no** se requiere conformidad EN 54-20: seleccionar posición **W01 a W44**
    ⚠️ (ver advertencia abajo).


    ---


    ### 4. Tabla de posiciones W01–W44 (no normativas)


    Para uso sin «ASD PipeFlow» con parámetros de flujo no homologados EN 54-20 [F1]:


    **Clase A (Sensibilidad muy alta):**

    - W01: retardo 10 min / desviación ±20 %

    - W02: retardo 60 min / desviación ±20 %

    - W03: retardo 10 min / desviación ±50 %

    - W04: retardo 60 min / desviación ±50 %


    **Clase B (Sensibilidad alta), Límite 1:**

    - W09: retardo 10 min / desviación ±20 %

    - W10: retardo 60 min / desviación ±20 %

    - W11: retardo 10 min / desviación ±50 %

    - W12: retardo 60 min / desviación ±50 %


    **Clase B (Sensibilidad alta), Límite 2:**

    - W17: retardo 10 min / desviación ±20 %

    - W18: retardo 60 min / desviación ±20 %

    - W19: retardo 10 min / desviación ±50 %

    - W20: retardo 60 min / desviación ±50 %


    **Clase C (Sensibilidad normal), Límites 1, 2 y 3:** posiciones W25–W44 con las
    mismas combinaciones de retardo (10/60 min) y desviación (±20 %/±50 %) [F1].


    ---


    ### ⚠️ Advertencias críticas


    - Las posiciones **W01 a W44** tienen monitorización de flujo **NO homologada
    según EN 54-20** y solo deben usarse **previa consulta con el fabricante** [F2][F4][F5].

    - Aumentar los valores de la LS-Ü por encima de **±20 % o 300 s** implica **incumplimiento
    de EN 54-20** y requiere consulta con el fabricante [F5].

    - Si se usan ventanas inferiores a ±20 %, el tiempo de retardo debe ser como mínimo
    **10 min** para evitar falsos avisos de fallo [F5].


