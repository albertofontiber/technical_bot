- bot_answer: '# Cableado y configuración de lazo — INSPIRE E10/E15


    ---


    ## 1. MÓDULO DE LAZO (OPAL X2)


    El módulo de doble lazo tiene referencia **HOP-433-100** [F2] y código de color
    **morado** [F2]. Proporciona conexión a **dos circuitos de lazo** de dispositivos
    OPAL o CLIP [F2].


    ---


    ## 2. IDENTIFICACIÓN DE TERMINALES


    **Lazo 1:**

    - Terminal **1** → Lazo 1 Salida +VE [F2][F3]

    - Terminal **2** → Lazo 1 Salida -VE [F2][F3]

    - Terminal **3** → ⊕ (**NO usar para pantalla de cable**) [F2][F3]

    - Terminal **4** → Lazo 1 Entrada +VE [F2][F3]

    - Terminal **5** → Lazo 1 Entrada -VE [F2][F3]


    **Lazo 2:**

    - Terminal **6** → Lazo 2 Salida +VE [F2][F3]

    - Terminal **7** → Lazo 2 Salida -VE [F2][F3]

    - Terminal **8** → ⊕ (**NO usar para pantalla de cable**) [F2][F3]

    - Terminal **9** → Lazo 2 Entrada +VE [F2][F3]

    - Terminal **10** → Lazo 2 Entrada -VE [F2][F3]


    > ⚠️ **La pantalla del cable de lazo debe conectarse a la barra de tierra de la
    central, NO a los terminales 3 u 8** [F2][F3].


    ---


    ## 3. TOPOLOGÍA DEL LAZO


    El lazo se cablea en **bucle cerrado** (salida de central → dispositivos → retorno
    a central) [F1]. La secuencia típica es:


    - Salida (+VE / -VE) de la central → Pulsadores → Detectores → Entrada (+VE /
    -VE) de la central [F1]


    Se recomienda poner a tierra **un extremo** de la pantalla del cable de lazo a
    la barra de tierra de la central [F5].


    ---


    ## 4. CAPACIDAD DEL LAZO


    **Modo OPAL:**

    - Hasta **159 detectores OPAL** por lazo [F2]

    - Hasta **159 módulos OPAL** por lazo (sirenas, pulsadores, módulos E/S) [F2]

    - Total máximo: **318 dispositivos** por lazo [F4]


    **Modo CLIP** (requiere licencia) [F4]:

    - Hasta **99 detectores CLIP** por lazo [F2]

    - Hasta **99 módulos CLIP** por lazo [F2]


    > ⚠️ **No se permite mezclar dispositivos OPAL y CLIP en el mismo lazo** [F2].


    > ⚠️ **Restricción EN54-2, art. 13.7:** máximo **512 detectores y/o pulsadores**
    por módulo de lazo (los 2 circuitos en conjunto) [F2].


    **Corriente máxima por lazo:** **750 mA** [F2].


    **Longitud máxima de cable:** hasta **3,5 km** dependiendo del tipo de carga y
    de cable [F2]. La longitud exacta debe calcularse con el **programa de cálculo
    de lazo y batería de CLSS** [F2].


    ---


    ## 5. COMPROBACIÓN PREVIA A LA CONEXIÓN


    1. Antes de conectar los cables a la central, utiliza la herramienta **POL-200-TS**
    para comprobar y medir el circuito de lazo [F5]. La herramienta **POL-200** permite
    diagnósticos más detallados y funciona con protocolos OPAL y CLIP [F5].

    2. También puedes realizar comprobaciones con multímetro (el manual de puesta
    en marcha hace referencia a este procedimiento) [F1].


    ---


    ## 6. PROCEDIMIENTO DE CONEXIÓN


    **Para lazo OPAL:**

    1. Comprueba el cableado del lazo con POL-200-TS o multímetro [F5].

    2. Una vez verificado que es correcto, conecta el circuito al bloque de terminales
    de lazo seleccionado en la central [F5].


    **Para lazo CLIP:**

    1. Verifica el cableado del lazo [F5].

    2. Reconecta los aisladores desconectados temporalmente, los módulos de lazo y
    los pulsadores [F5].

    3. Conecta el circuito al bloque de terminales de lazo seleccionado en la central
    [F5].

    4. Al encender inicialmente, la central comprobará si existe algún problema [F5].


    ---


    ## 7. NUMERACIÓN DE LAZOS


    Los circuitos de lazo se numeran **secuencialmente de izquierda a derecha** del
    portamódulos [F2]. En la **E15**, que tiene dos filas de portamódulos, la numeración
    de la segunda fila continúa desde la primera [F2].


    ---


    ## 8. CONFIGURACIÓN (ALTA EN SOFTWARE)


    Si un circuito de lazo **no se va a utilizar**, marca la casilla **"Sin Uso"**
    en **"Configuración de tarjeta de lazo"** dentro del programa de configuración
    **CLSS** [F1].


    > ⚠️ El primer encendido de la central debe realizarse **sin el cableado externo
    conectado**, pero con la fuente de alimentación y un circuito de lazo probado
    conectado [F1].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6 (01-2026) — Instrucciones de puesta en marcha INSPIRE E10/E15

    - HOP-138-9ES issue 5 (11-2025) — Manual de instalación INSPIRE E10


    ---


    También puedo ayudarte con: **indicadores LED del módulo de lazo**, **cálculo
    de batería con CLSS** o **conexionado de módulos de E/S OPAL**.'
