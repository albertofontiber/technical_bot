    ### Terminales **S2 y S3** (cambio de tono de alarma) respecto a terminal −


    - **Ui = 28 V** [F1][F3]

    - **Ii = 0 mA** [F1][F3][F5]

    - **Ci = 0** [F3]


    Adicionalmente, estos terminales tienen parámetros de salida (para el circuito
    de retorno) [F3]:

    - Uo = **16,8 V**

    - Io = **7,3 mA**

    - Po = **31 mW**


    ---


    ## Aparato asociado requerido (lado seguro)


    Existen **dos configuraciones** posibles según el tipo de barrera utilizada:


    ### Opción A — Barrera Zener de derivación (*Shunt Zener Diode Barrier*) [F3]

    Para terminales +/−:

    - Uo ≤ **28 V**

    - Io ≤ **93 mA**

    - Po ≤ **660 mW**

    - Co ≥ Ccable

    - Lo ≥ Lcable


    Para terminales S2 y S3: barrera de retorno de diodo (*Diode Return Barrier*)
