- bot_answer: '# Configuración de contraseñas Nivel 2 y Nivel 3 — Notifier INSPIRE
    E10/E15


    ---


    ## Información general sobre contraseñas


    - La contraseña de fábrica del **Nivel 2** es **"22222222"** [F3].

    - Se recomienda cambiarla por una contraseña exclusiva de entre **4 y 8 dígitos**
    [F1][F3].

    - Si no se usa ningún control durante **5 minutos** tras iniciar sesión en Nivel
    2, la central cierra sesión automáticamente y vuelve al Nivel 1 [F3].


    ---


    ## Cambiar contraseña de Nivel 2 (desde usuario Nivel 2)


    Procedimiento según manual de operación [F2]:


    1. Selecciona el **icono del menú** ① y luego **"Configuración"** ②. Inicia sesión
    como usuario de **Nivel de Acceso 2**.

    2. Selecciona la opción **"Cambio del código de acceso"** ③.

    3. Asegúrate de que **Nivel de Acceso 2** ④ esté seleccionado y que el cursor
    parpadee ⑤.

    4. Puedes ver la contraseña introducida pulsando el **icono del ojo** ⑥.

    5. Introduce el nuevo código de acceso (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma la entrada seleccionando el símbolo **✓** ⑧.

    7. Repite los pasos 3 a 6 para confirmar el código.


    ---


    ## Cambiar contraseña de Nivel 2 y/o Nivel 3 (desde usuario Nivel 3)


    Procedimiento según manual de puesta en marcha [F1]:


    > Desde Nivel 3 puedes cambiar tanto la contraseña de Nivel 2 como la de Nivel
    3.


    1. Selecciona el **icono del menú** ① → **"Ajustes"** ② → inicia sesión como usuario
    de **Nivel de Acceso 3**.

    2. Selecciona **"Cambio del código de acceso"** ③.

    3. Selecciona el nivel a modificar (**Nivel 2 o Nivel 3**) en el desplegable ④.
    Verifica que el cursor parpadea ⑤.

    4. Pulsa el **icono del ojo** ⑥ si deseas visualizar la entrada.

    5. Introduce el nuevo código (**4 a 8 dígitos**) con el teclado ⑦.

    6. Confirma seleccionando el símbolo **✓** ⑧.

    7. Repite los pasos 3 a 6 para confirmar.

    8. Observa el mensaje **"Cambio de código de acceso satisfactorio"** y selecciona
    **Aceptar** [F1].

    9. **Sincroniza el programa con la central** y realiza una **copia de seguridad
    del cambio en la nube** [F1].


    ---


    > ⚠️ **Importante:** Asegúrate de que los códigos de acceso se mantienen seguros
    y solo los conocen los usuarios autorizados [F3].


    ---


    **Fuentes:**

    - HOP-138-8ES issue 6, 01-2026 (manual de puesta en marcha) — sin revisión registrada

    - HOP-338-9ES issue 4, 01-2026 (manual de operación) — sin revisión registrada


    También puedo ayudarte con: **lectura/sincronización de configuración desde CLSS**,
    **acceso al Modo Servicio con Nivel 3** o **recuperación de contraseña desde la
    herramienta CLSS**.'
