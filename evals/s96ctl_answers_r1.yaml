- bot_answer: '# Conexionado de sirenas convencionales en salidas de sirena — Morley
    ZXe


    > **Nota previa:** Los fragmentos recuperados corresponden a los modelos **ZXAE/ZXEE**
    y **ZX2e/ZX5e**. Si tu equipo es exactamente la "ZXe", confirma el modelo completo.
    Los principios de conexionado son los que se describen a continuación.


    ---


    ## Principio de funcionamiento del circuito


    Las salidas de sirenas son **supervisadas mediante corriente inversa** [F2]. En
    reposo, el circuito se polariza en inverso para leer la **Resistencia Final de
    Línea (RFL)**; al activarse la alarma, la polaridad se invierte y las sirenas
    disparan [F4].


    ---


    ## Pasos de conexionado


    **1. Identifica los terminales de sirena en la placa**


    - **ZXAE / ZX2e:** 2 salidas — terminales `A+`, `A-`, `B+`, `B-` [F4]

    - **ZXEE / ZX5e:** 4 salidas — terminales `A+`, `A-`, `B+`, `B-`, `C+`, `C-`,
    `D+`, `D-` [F4]


    **2. Conecta las sirenas en serie (en línea), respetando la polaridad**


    - Conecta el `+` de la salida al `+` de la primera sirena, el `-` de la primera
    sirena al `+` de la siguiente, y así sucesivamente [F1].

    - **No hagas ramales (derivaciones en paralelo):** la supervisión se realiza sobre
    la línea directa hasta la RFL, y los ramales paralelos no quedan supervisados
    [F1].


    **3. Sirenas sin polaridad (campanas)**


    - Si conectas campanas **sin polaridad**, instala un **diodo** entre el `+` de
    la línea y uno de los terminales de alimentación de la campana [F2].

    - Esto evita consumo durante la fase de supervisión (polarización inversa) [F4].


    **4. Instala la Resistencia Final de Línea (RFL)**


    - Coloca una resistencia de **6.800 Ω (6K8), mínimo 0,5 W** entre `+` y `-` al
    final de la última sirena [F2].

    - Si **no hay ninguna sirena** conectada en esa salida, instala la RFL directamente
    en los terminales de la central [F2].


    **5. Cableado**


    - Sección mínima: **1,5 mm²** [F2].

    - Longitud máxima recomendada: **1 km** (por encima, la capacitancia e inductancia
    pueden afectar al funcionamiento) [F3].

    - No enrolles el cable en los terminales; corta y empalma correctamente para mantener
    la supervisión [F3].


    **6. Corriente máxima por circuito**


    - Cada salida de sirena tiene un límite de **1 A** [F2]. Ten en cuenta el consumo
    total de la central con todas las sirenas activadas.


    ---


    ## Resumen del esquema


    ```

    (+) Salida ──▶|── Sirena 1 ──▶|── Sirena 2 ──▶|── [RFL 6K8 Ω] ──┐

    (-) Salida ─────────────────────────────────────────────────────────┘

    ```

    *(Los diodos ▶| representan la polaridad de cada sirena)* [F1]


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada);
    Manual de Instalación ZX2e/ZX5e — DOC.MIE-MI-530, Revisión 001.'
