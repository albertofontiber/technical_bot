    \ **Introduce la ecuación** usando el teclado alfanumérico. Ejemplos prácticos:\n\
    \n   - **OR** → activa la salida si **al menos uno** de los grupos está en alarma\
    \ [F4]:\n     `OR (G9 G15 G23)` — o simplificado: `(G9 G15 G23)`\n\n   - **AND**\
    \ → activa la salida solo si **todos** los grupos están en alarma [F4]:\n    \
    \ `AND (G9 G15 G23)`\n\n   - **NOT** → activa la salida mientras el grupo **NO**\
    \ esté en alarma [F4]:\n     `NOT (G23)`\n\n   - **XGRP** → activa la salida si\
    \ **al menos dos** dispositivos del grupo están activos [F5]:\n     `XGRP (G23)`\n\
    \n6. **Confirma pulsando Enter** para guardar la ecuación [F2]\n\n---\n\n## ⚠️\
    \ Restricciones importantes\n\n- **Un módulo de salida con TIPO ID para señalizaciones\
    \ generales NO puede tener ecuación CBE programada** [F4]\n- Para **grupos directos**:\
    \ los operandos dentro del paréntesis deben tener índice **mayor** que el grupo\
    \ al que se asigna la CBE. Ejemplo permitido: `G21 = (G23 G24)` [F4]\n- Para **grupos\
    \ inversos**: los operandos deben tener índice **menor** que el grupo al que se\
    \ asigna la CBE. Ejemplo permitido: `G307 = (G305 G306)` [F4]\n- El operador **XGRP**\
    \ solo admite **un único grupo** como argumento — `XGRP (G23 G24)` **no está permitido**\
    \ [F5]\n\n---\n\n> \U0001F4D6 El manual remite al **Apéndice «A» Control By Event**\
    \ al final del manual de programación para información completa sobre CBE [F2].\n\
    \n**Fuente:** AM-8200 Manual de programación (Doc. M-162.1-AM8200-ESP Rev A.3)\
