    a 0,9 V** [F5].


    ### Opción B — Alimentación galvánicamente aislada (*Galvanically Isolated Supply*)
    [F4]

    Para terminales +/−:

    - Uo ≤ **28 V**

    - Io ≤ **93 mA**

    - Po ≤ **660 mW**

    - Co ≥ Ccable

    - Lo ≥ Lcable


    Para terminales S2 y S3: relé galvánicamente aislado con Uo = 0, Io = 0 [F4].


