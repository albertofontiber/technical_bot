- bot_answer: '## Rango de temperatura de funcionamiento — ASD 535


    Según los datos técnicos del manual, los rangos de temperatura son los siguientes
    [F1]:


    **Caja del detector:**

    - Funcionamiento estándar: **–30 °C hasta +60 °C** (norma UL: máx. +40 °C) [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]


    **Conducto de aspiración:**

    - Funcionamiento estándar: **–30 °C hasta +60 °C** [F1]

    - Según estándar australiano AS 1603.8: **–30 °C hasta +55 °C** [F1]


    **Otros límites térmicos relevantes:**

    - Fluctuación de temperatura máx. permitida durante el funcionamiento (caja +
    conducto): **20 °C** [F1]

    - Temperatura máx. de almacenamiento (sin condensación): **–30 °C hasta +70 °C**
    [F1]


    > ⚠️ **Nota importante:** Es posible acordar con el fabricante rangos de temperatura
    inferiores o superiores. La instalación en rango de condensación solo puede llevarse
    a cabo previa consulta con el fabricante [F2].


    **Caso especial — almacenes de ultracongelación:**

    El ASD 535 puede utilizarse en almacenes de ultracongelación respetando la directriz
    **T 131 390**, con un rango de temperatura restringido de **–30 °C hasta 0 °C**
    [F3].


    ---


    Fuente: ASD535_TD_T131192es_h (sin revisión registrada)


