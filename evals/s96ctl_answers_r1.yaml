- bot_answer: '## Programación del retardo de salida de alarma en la Notifier PEARL


    El retardo de salida de alarma en la PEARL se configura dentro de las **reglas
    de causa-efecto**. No existe un único parámetro global de "retardo de alarma principal";
    el retardo se define por regla y se le asigna un **tipo de retardo** [F1].


    ---


    ### Paso 1 — Acceder a la programación de causa-efecto


    El retardo se configura en la **matriz de causa-efecto** (Apéndice 5 del manual
    de configuración) [F1]. Cada regla puede tener asignado un retardo de salida con
    un tipo específico.


    ---


    ### Paso 2 — Seleccionar el tipo de retardo


    Al editar una regla, se puede asignar uno de **seis tipos de retardo de salida**
    [F1]. Estos son:


    - **Fijo**: No permite silenciar sirenas durante el retardo, no muestra cuenta
    atrás en LCD, no puede anularse ni detenerse [F2].

    - **Estándar**: Permite silenciar sirenas durante el retardo, muestra cuenta atrás,
    permite anular en nivel de acceso 2 y detener con FIN RETARDO [F2].

    - **No Silenc.**: No permite silenciar sirenas, pero sí muestra cuenta atrás y
    permite anular/detener [F2].

    - **Est. Ext.**: Igual que Estándar, y además la salida se detiene si se pulsa
    AMPLIAR RETARDO [F2].

    - **RetExtStd**: Igual que Estándar, y además el temporizador comienza en RETARDO
    AMPLIADO [F2].

    - **No Sil. Ext**: No permite silenciar sirenas, pero sí se detiene con AMPLIAR
    RETARDO [F2].

    - **SinRetExt**: El temporizador comienza en RETARDO AMPLIADO, sin otras opciones
    de silencio [F2].


    ---


    ### Paso 3 — Verificar el pulsador AMPLIAR RETARDO


    Comprueba que el pulsador **EXTENDER RETARDO** esté habilitado en los parámetros
    de la central:


    - Menú de configuración → **Editar Parámetros de la Central** → parámetro **10:
    Extend Delay Button** → debe estar en **Enabled** [F5].


    Si está deshabilitado, la función de ampliar retardo no estará disponible en el
    panel.


    ---


    ### Paso 4 — Anular/habilitar retardos en operación


    Una vez configurado, el retardo puede gestionarse en operación desde:


    **Menú Anular/Habilitar → opción 5: Retardo Activación Salidas** [F3]


    - Pulsa **✓** para cambiar entre estado HABILITADO / ANULADO [F3].

    - Esta opción solo aparece si hay retardos configurados en alguna regla de causa-efecto
    [F3].


    ---


    ### Nota operativa


    Durante un retardo activo, el **LED de RETARDO ACTIVO** estará encendido [F3].
    El operador con nivel de acceso 2 puede usar la tecla **AMPLIAR RETARDO** para
    iniciar un segundo temporizador (normalmente más largo), y cualquier usuario con
    nivel de acceso 1 puede pulsar **FIN RETARDO** para terminar el retardo inmediatamente
    [F4].


    ---


    > ⚠️ Los fragmentos disponibles describen los tipos de retardo y su comportamiento,
    pero **no especifican el procedimiento paso a paso para introducir el valor numérico
    del tiempo de retardo** dentro del editor de reglas de causa-efecto. Consulta
    el Apéndice 5 completo del manual de configuración para el procedimiento detallado
    de edición de reglas.


