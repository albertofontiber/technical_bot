- bot_answer: '## RP1r — Sistema no vuelve a estado normal tras resetear después de
    descarga


    Hay dos causas principales documentadas. Comprueba en este orden:


    ---


    ### 1. Inhibición de reset activa (parámetro r1)


    La central puede tener configurado un **tiempo de inhibición de reset** tras el
    estado "Activado" [F1].


    - Por defecto esta función está **deshabilitada** (microswitch **SW1-6 en posición
    OFF**) [F1].

    - Si SW1-6 está en **ON**, el reset queda bloqueado durante el tiempo programado
    en el parámetro **r1** (hasta **30 minutos**) [F1].

    - **Comprobación:** Verifica la posición del microswitch SW1-6 en la placa de
    la central. Si está en ON, espera a que transcurra el tiempo configurado en r1
    antes de intentar el reset [F1].

    - **Excepción:** Si la central está en modo **Abort/Hold**, el reset sí está disponible
    aunque r1 esté activo [F1].


    ---


    ### 2. Fallo de Sistema (System Fault) — microprocesador


    Si tras el reset aparece el LED **"Fallo Sistema"** encendido, la central no habrá
    vuelto a estado normal [F3][F4].


    - La RP1r dispone de **dos microprocesadores**. Si el microprocesador principal
    tarda en inicializar o detecta tensiones fuera de rango, indica **Fallo de Sistema**
    [F3].

    - Con este fallo activo, la central **no realizará el proceso de extinción** al
    considerar que no funciona correctamente [F3].

    - **Acción:** Realiza un **REARME** (botón "Rearme" del panel) [F3][F4]. Tras
    el rearme, el fallo debe desaparecer [F3].

    - Este fallo puede ocurrir especialmente en el momento del arranque, una vez conectadas
    las baterías [F3].


    ---


    ### Procedimiento de reset correcto (referencia)


    Para resetear correctamente la central [F2]:

    1. Habilita el **nivel de acceso 2** (teclado habilitado).

    2. Pulsa la tecla **Reset**.

    3. Las entradas con memoria (latched inputs) se resetearán.


