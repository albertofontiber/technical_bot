  - the_panel_is_not_reused_to_relabel_disagreements_only_to_audit

authorization_scope_of_this_pass: >-
  Este PASS autoriza SOLO los pasos de datos del runbook (aplicar migracion +
  load + apply-labels + verificacion), todos gateados por la autorizacion
  explicita de Alberto/orquestador en cada paso. NO enciende el flag
  VISUAL_ASSETS_REGISTRY: el encendido en demo es el paso (v), decision
  separada de Alberto. Cero escrituras DB se han hecho en este track.

runbook:
  i_apply_migration:
    where: Supabase SQL Editor (bloqueada por permisos para el orquestador — la aplica Alberto)
    apply: migrations/014_document_visual_assets.sql
    rollback: migrations/014_rollback.sql
  ii_load_bridge:
    command: python scripts/visual_assets_bridge_load.py --load
    effect: inserta las 5096 filas del dump (technical_utility=uncertain, NO servible)
    idempotent: on_conflict (document_id, page_index, asset_sha256) ignore-duplicates
    aborts_if: la tabla document_visual_assets no existe
  iii_apply_labels:
    command: python scripts/visual_assets_bridge_load.py --apply-labels evals/s269_visual_utility_labels_v4_full.jsonl
    effect: >-
      upsert idempotente de visual_role + technical_utility + classifier_contract
      (s269_visual_utility_v4) + classifier_receipt (JSONB con response_id,
      confidence, reason, sha256 del binario y referencia a este gate) sobre las
      mismas claves; imprime el count servible esperado vs el de la tabla.
    aborts_if: tabla inexistente / labels sin fila del dump / recibo de URL no cuadra
  iv_verification:
    servable_count: >-
      GET count technical_utility=eq.useful & visual_role=in.(wiring,table,procedure,ui)
      debe dar 4489 (lo imprime --apply-labels; verificable a mano con el mismo GET).
    sample_lookups: >-
      3 lookups de muestra con src/rag/visual_assets.py::lookup_visual_assets
      sobre paginas del gate-sample (p.ej. las de s269v4_gate_01/02/03) — deben
      devolver exactamente 1 asset useful-servible cada una; y 1 lookup de una
      pagina cover del dump (technical_utility=not_useful) — debe devolver [].
  v_enable_flag_demo:
    when: cuando Alberto quiera (decision separada; auditoria opcional de spotcheck_v4/ antes)
    action: VISUAL_ASSETS_REGISTRY=on en Railway (demo); rollback = quitar la variable
    serving_guarantees: >-
      useful-only + rol en [wiring, table, procedure, ui] (filtro en query, en
      cliente y en append — test_visual_assets.py), solo paginas citadas, cap 2,
      fail-open doble; flag off = byte-identico a hoy.

authorization:
  model_calls_in_this_closure: 0
  database_writes: 0
  production_changes: false
  facts_moved_to_ok: 0
