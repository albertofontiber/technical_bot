  answer_base: "# Conexionado de sirenas convencionales en la ZXe\n\n> **Nota previa:** La denominación \"ZXe\"\
    \ puede referirse a la **ZXAE/ZXEE** (Morley-IAS) o a la **ZX2e/ZX5e** (Morley). Los fragmentos disponibles\
    \ cubren ambas familias. A continuación te doy el procedimiento completo para las dos, ya que el principio de\
    \ conexionado es el mismo.\n\n---\n\n## Principio de funcionamiento del circuito\n\nLas salidas de sirenas son\
    \ **supervisadas con polaridad inversa** en reposo [F1][F3]. La central inyecta una pequeña corriente inversa\
    \ para leer la **Resistencia Final de Línea (RFL)** y detectar apertura o cortocircuito. Al dispararse la alarma,\
    \ la polaridad se invierte a la normal y las sirenas suenan [F1].\n\n---\n\n## Número de salidas disponibles\n\
    \n- **ZXAE:** 2 salidas supervisadas (Salida A y B) [F1]\n- **ZXEE:** 4 salidas supervisadas (Salida A, B, C\
    \ y D) [F1]\n- **ZX2e:** 2 salidas (A y B) — terminales **S,A+ / S,A- / S,B+ / S,B-** en TB7 [F1]\n- **ZX5e:**\
    \ 4 salidas (A, B, C, D) — terminales **A- A+ B- B+ C- C+ D- D+** en TB7 [F3]\n\n---\n\n## Pasos de conexionado\n\
    \n1. **Identifica los terminales de sirena** en la placa base:\n   - ZXAE/ZXEE: bloque **TB7** con terminales\
    \ S,A+ / S,A- / S,B+ / S,B- (y C, D en ZXEE) [F1]\n   - ZX2e: terminales marcados **SOUNDERS A+ A- B+ B-** [F3]\n\
    \   - ZX5e: bloque **TB7** con terminales A- A+ B- B+ C- C+ D- D+ [F3]\n\n2. **Conecta las sirenas en serie**\
    \ (línea directa, sin ramales) respetando la polaridad:\n   - Terminal **+** de la salida → **+** de la primera\
    \ sirena\n   - **-** de la primera sirena → **+** de la siguiente sirena\n   - Continúa en cadena hasta la última\
    \ sirena [F2][F4]\n\n3. **Sirenas con polaridad:** conéctalas directamente respetando + y - [F2]\n\n4. **Campanas/sirenas\
    \ SIN polaridad:** instala un **diodo** entre el terminal + y uno de los bornes de alimentación de la campana,\
    \ para evitar consumo durante la supervisión en polaridad inversa [F1][F3]\n\n5. **Instala la RFL al final de\
    \ la línea:**\n   - Resistencia de **6.800 Ω (6K8) / 0,5 W mínimo** entre el + y el - de la **última sirena**\
    \ de la cadena [F1]\n   - Si no hay ninguna sirena conectada, coloca la RFL directamente en los terminales de\
    \ la central [F1]\n\n6. **Si la salida queda sin sirenas:** conecta igualmente la RFL en bornes de la central\
    \ para evitar fallo de supervisión [F1]\n\n---\n\n## Restricciones críticas de cableado\n\n- ❌ **No hagas ramales**\
    \ en la línea de sirenas — los ramales paralelos no quedan supervisados [F2]\n- ⚠️ **Sección mínima de cable:\
    \ 1,5 mm²** [F1]\n- ⚠️ **Longitud máxima recomendada: 1 km** — por encima, la capacitancia e inductancia pueden\
    \ afectar al funcionamiento [F4]\n- **Corriente máxima por circuito: 1 A** — verifica que el consumo total de\
    \ la central con sirenas activadas no supere el límite [F1]\n\n---\n\n## Resumen esquemático\n\n```\n(+) Salida\
    \ ──► Sirena 1 ──► Sirena 2 ──► Sirena N ──┐\n                                                      RFL 6K8Ω\n\
    (-) Salida ────────────────────────────────────────────┘\n```\n*(Cada sirena con diodo integrado o externo si\
    \ no tiene polaridad)* [F2][F4]\n\n---\n\nFuente: Manual de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión\
    \ registrada); Manual de Instalación ZX2e/ZX5e — DOC.MIE-MI-530, Revisión 001\n\n---\n\nTambién puedo ayudarte\
    \ con: **verificación de supervisión y averías de sirena**, **programación de patrones de disparo** o **cálculo\
    \ de consumo máximo por salida**."
  answer_sel: "# Conexionado de sirena convencional en salidas de sirena de la ZXe\n\n**Nota previa:** Los fragmentos\
    \ recuperados corresponden a los manuales de la **ZXAE/ZXEE** [F1][F2] y de la **ZX2e/ZX5e** [F3][F4]. La familia\
    \ \"ZXe\" incluye varios modelos. A continuación te doy la información de conexionado que aplica a ambas, indicando\
    \ las diferencias.\n\n---\n\n## Número de salidas disponibles\n\n- **ZXAE:** 2 salidas supervisadas para sirenas\
    \ convencionales (Salida A y B) [F1]\n- **ZXEE:** 4 salidas supervisadas para sirenas convencionales (Salida\
    \ A, B, C y D) [F1]\n- **ZX2e:** 2 salidas de sirenas de placa (A y B) [F3]\n- **ZX5e:** 4 salidas de sirenas\
    \ de placa (A, B, C y D) [F3]\n\n---\n\n## Parámetros eléctricos clave\n\n- **Corriente máxima por circuito:**\
    \ **1 A** [F1]\n- **Resistencia final de línea (RFL):** **6.800 Ω (6K8), 0,5 W mínimo** [F1]\n- **Sección mínima\
    \ de cable:** **1,5 mm²** [F1]\n- **Longitud máxima de cable recomendada (ZX2e/ZX5e):** no superior a **1 km**\
    \ [F4]\n\n---\n\n## Procedimiento de conexionado\n\n1. **Conecta las sirenas en serie** (en línea directa, sin\
    \ ramales) entre los terminales **+** y **−** de la salida correspondiente [F2].\n\n2. **Sirenas con polaridad:**\
    \ Conecta respetando la polaridad (+/−) de cada sirena. La corriente de supervisión circula en sentido inverso\
    \ al de activación [F1].\n\n3. **Sirenas/campanas sin polaridad:** Instala un **diodo** entre el terminal **+**\
    \ de la salida y el terminal de alimentación de la campana, para evitar consumo durante la supervisión (polaridad\
    \ inversa en reposo) [F1][F3].\n\n4. **Resistencia final de línea (RFL):** Coloca una resistencia de **6.800\
    \ Ω** entre el **+** y el **−** al final de la última sirena de cada circuito [F1][F2].\n   - Si no se instala\
    \ ninguna sirena en la salida, conecta la RFL directamente en los terminales de la central [F1].\n\n5. **No\
    \ realices ramales paralelos:** La supervisión se realiza sobre la línea directa hasta la RFL. Los ramales paralelos\
    \ no quedan supervisados [F2].\n\n6. **No enrolles el cable en los terminales:** Corta y empalma las conexiones\
    \ adecuadamente para mantener la supervisión de la línea [F4].\n\n---\n\n## Terminales físicos (según modelo)\n\
    \n- **ZXAE:** Terminales **SOUNDERS** en la placa (Salidas A y B) [F1]\n- **ZXEE:** Terminales **TB7** → `S,A+\
    \ / S,A- / S,B+ / S,B- / S,C+ / S,D+ / S,D-` [F1]\n- **ZX2e:** Terminales **AUX / A+ / A- / B+ / B-** en bloque\
    \ SOUNDERS [F3]\n- **ZX5e:** Terminales **TB7** → `A- / A+ / B- / B+ / C- / C+ / D- / D+` [F3]\n\n---\n\n##\
    \ Advertencias importantes\n\n- ⚠️ Verifica que el **consumo total de todas las sirenas activadas no supere\
    \ la capacidad total de la central** [F1].\n- ⚠️ Evita cables de sección inferior a **1,5 mm²** y longitudes\
    \ excesivas para no provocar caídas de tensión que impidan el funcionamiento de las sirenas [F1][F4].\n- ⚠️\
    \ Asegúrate de que la tensión en los terminales de cada sirena sea la recomendada por el fabricante, tanto en\
    \ alimentación principal como en condiciones de mínima tensión de baterías [F4].\n\n---\n\n**Fuente:** Manual\
    \ de Instalación ZXAE/ZXEE — DOC.MIE-MI-310 (sin revisión registrada); Manual de Instalación ZX2e/ZX5e — DOC.MIE-MI-530,\
    \ Revisión 001\n\n---\n\nTambién puedo ayudarte con: **configuración del programa de disparo de sirenas**, **supervisión\
    \ y averías de línea de sirenas** o **conexionado de sirenas sin polaridad con diodo**."
  answer_sel2: "# Conexionado de sirena convencional en salidas de sirena de la ZXe\n\n> **Nota previa:** La denominación\
    \ \"ZXe\" puede referirse a la **ZX2e** (2 salidas de sirena) o a la **ZX5e** (4 salidas de sirena). Los fragmentos\
    \ disponibles cubren ambas. El procedimiento de conexionado es el mismo en ambos casos.\n\n---\n\n## Reglas\
    \ generales de conexionado [F1][F2][F4]\n\n1. **Polaridad:** Las sirenas convencionales deben ser **polarizadas**\
    \ (con diodo integrado). La corriente de supervisión circula en sentido **inverso** a la de activación, por\
    \ lo que sin diodo la sirena consumiría corriente en reposo [F1][F4].\n\n2. **Sirenas sin polaridad (campanas):**\
    \ Si la campana no tiene polaridad, instala un **diodo en serie** entre el terminal `+` de la salida y uno de\
    \ los terminales de alimentación de la campana, para bloquear la corriente inversa de supervisión [F1].\n\n\
    3. **Resistencia Final de Línea (RFL):** Instala siempre una resistencia de **6.800 Ω / 0,5 W mínimo** entre\
    \ `+` y `–` al final de la última sirena de cada circuito [F1][F4].\n   - Si no hay ninguna sirena conectada\
    \ en esa salida, conecta la RFL directamente en los terminales de la central [F1].\n\n4. **Sin ramales:** **No\
    \ realices derivaciones en paralelo** en el cableado de sirenas. La supervisión se realiza sobre la línea directa\
    \ hasta la RFL; los ramales no quedan supervisados [F2].\n\n5. **Corriente máxima por circuito:** **1 A por\
    \ salida** [F1]. Verifica que el consumo total de la central con sirenas activadas no supera el límite del sistema.\n\
    \n6. **Sección de cable:** Mínimo **1,5 mm²** [F1]. No uses longitudes excesivas que provoquen caídas de tensión\
    \ significativas.\n\n7. **Longitud máxima recomendada (ZX2e/ZX5e):** No se recomienda superar **1 km**, ya que\
    \ la capacitancia e inductancia del lazo pueden afectar al funcionamiento [F4].\n\n---\n\n## Esquema de conexión\
    \ (por circuito) [F2][F4]\n\n```\n+ Salida A ──[+Sirena1-]──[+Sirena2-]──[+SirenaN-]──┐\n                  \
    \                                    │ RFL 6800 Ω\n- Salida A ───────────────────────────────────────────┘\n\
    ```\n\n- Cada sirena polarizada se conecta en **serie** en la línea, respetando la polaridad `+/–`.\n- La RFL\
    \ cierra el circuito al final de la última sirena.\n\n---\n\n## Terminales físicos [F1][F3]\n\n**ZX2e:**\n-\
    \ Terminales en bloque inferior de placa: `A+ A- B+ B-` (sección **SOUNDERS**) [F3]\n\n**ZX5e:**\n- Terminales\
    \ en **TB7**: `A- A+ B- B+ C- C+ D- D+` [F3]\n\n---\n\n## Supervisión [F1]\n\nLa central supervisa continuamente\
    \ cada circuito mediante corriente inversa. Cualquier apertura o cortocircuito en la línea generará una avería\
    \ visible en pantalla [F5]:\n\n```\n!ATENCION!  CIRCUITO ABIERTO SIRENA B\n```\n\n---\n\nFuente: Manual de Instalación\
    \ ZXAE/ZXEE – DOC.MIE-MI-310 (sin revisión registrada); Manual de Instalación ZX2e/ZX5e – DOC.MIE-MI-530, Revisión\
    \ 001; Manual de Configuración ZX2e/ZX5e – DOC.MIE-MP-530, Revisión 001."
