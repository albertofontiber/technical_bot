  answer_base: '## Familia SharpEye 40/40 — Modelos disponibles


    La denominación comercial "40/40" corresponde a una **familia completa de detectores de llama** de Spectrex
    / Notifier, no a un modelo único. Antes de pedir el equipo, necesitas identificar qué variante se ajusta a tu
    aplicación. Los modelos documentados son [F10]:


    ---


    ### Modelos de la serie S40/40


    - **S40/40R** — Detector de llama **infrarrojo simple (Single IR)** [F1]

    - **S40/40I** — Detector de llama **triple infrarrojo (IR3)** [F3][F6]

    - **S40/40M** — Detector de llama **múltiple infrarrojo** (hidrógeno e hidrocarburo) [F2][F7]

    - **S40/40L / LB** — Detector de llama **UV/IR** (longitud de onda 2,5–3,0 µm; hidrocarburos, hidrógeno, metales)
    [F8]

    - **S40/40L4 / L4B** — Detector de llama **UV/IR** (longitud de onda 4,5 µm; solo hidrocarburos) [F8]

    - **S40/40U / UB** — Detector de llama **UV** [F5][F10]

    - **S40/40UFL** — Detector de llama **UV/IR ultrarrápido** [F10]

    - **S40/40UFI** — Detector de llama **IR3 ultrarrápido** [F10]


    ---


    ### Nota sobre la referencia de pedido


    Cada modelo se suministra en varias configuraciones según opciones de cableado, rango de temperatura, tipo de
    entrada de cable, tipo de carcasa y homologaciones requeridas [F6][F7][F8]. La referencia completa de pedido
    tiene el formato **S40/40X XXXXX**, donde los últimos cinco caracteres definen la configuración exacta. El detalle
    de esos sufijos está en la sección **1.2 Tipos y modelos** del manual de cada variante.


    ---


    ### ¿Qué modelo necesitas?


    Para orientarte, dime:

    1. **¿Qué tipo de combustible** hay en la instalación? (hidrocarburos, hidrógeno, metales, gas, etc.)

    2. **¿Requieres función BIT** (prueba incorporada automática)?

    3. **¿Hay requisito de velocidad de detección** (aplicación con destellos rápidos / flares)?


    Con eso puedo indicarte qué variante S40/40 se ajusta mejor y qué sección del manual consultar para construir
    la referencia de pedido completa.


    ---


    Fuentes:

    - Manual S40/40R — MNDT724_40-40R (TM 40/40R, Rev. 4, 10 octubre 2011)

    - Manual S40/40M — MNDT725_40-40M (TM 40/40M, Rev. 4, 10 octubre 2011)

    - Manual S40/40I — MNDT721_40-40I (sin revisión registrada)

    - Manual S40/40L — MNDT722_40-40L (TM 40/40L, Rev. 5, 10 octubre 2011)

    - Manual S40/40U — MNDT723_40-40U (sin revisión registrada)

    - SharpEye 40/40 Series WinHost User Guide — TM777050 Rev. (Da), octubre 2017'
  answer_sel: '# Familia SharpEye 40/40 — ¿Qué modelo pedir?


    La serie SharpEye 40/40 (Spectrex / Notifier) incluye **varias variantes con tecnología de detección distinta
    e intercambiables entre sí**. El modelo correcto depende del tipo de riesgo/combustible de tu instalación. Aquí
    tienes los miembros documentados:


    ---


    ## **S40/40R** — IR simple (Single IR)

    - Tecnología: **un único sensor infrarrojo** [F1]

    - Referencia de manual: **TM40/40R** [F10]

    - Sensibilidades disponibles: **5 m y 15 m** [F9]

    - Uso típico según los fragmentos: no se especifica el riesgo concreto en los fragmentos disponibles.


    ---


    ## **S40/40I** — Triple infrarrojo (IR3)

    - Tecnología: **tres sensores infrarrojos (IR3)** para máxima inmunidad a falsas alarmas [F6]

    - Referencia de manual: **TM40/40I** [F10]

    - Sensibilidades disponibles: **15 m, 30 m, 45 m y 65 m** [F9]

    - Apto para: hidrocarburos y gases en general [F6]


    ---


    ## **S40/40M** — Multi-IR (hidrocarburos + hidrógeno)

    - Tecnología: **múltiple infrarrojo**, específico para **llamas de hidrógeno y combustibles de hidrocarburos**
    [F2]

    - Referencia de manual: **TM40/40M** [F10]

    - Sensibilidades disponibles: **15 m, 30 m, 45 m y 65 m** [F9]

    - Capacidad declarada: detección de gasolina a **65 m** y llama de hidrógeno a **30 m** en menos de **5 segundos**
    [F7]

    - Diferenciador clave respecto al 40/40I: **incluye detección de hidrógeno** [F2]


    ---


    ## **S40/40L / LB** — UV/IR (hidrocarburos, hidrógeno, metales)

    - Tecnología: **combinación UV + IR**, sensor IR a longitud de onda **2,5–3,0 µm** [F8]

    - Apto para: combustibles de hidrocarburos, fuegos de gas, hidrógeno y **fuegos de metales o materia inorgánica**
    [F8]

    - Sensibilidad disponible: **15 m** [F9]

    - Nota: el modelo **LB incluye función BIT** (prueba incorporada); el L no [F8]


    ## **S40/40L4 / L4B** — UV/IR (solo hidrocarburos)

    - Igual al S40/40L pero con sensor IR a **4,5 µm** → **solo apto para hidrocarburos** (no hidrógeno, no metales)
    [F8]

    - Sensibilidad disponible: **28 m** [F9]

    - Nota: el modelo **L4B incluye función BIT**; el L4 no [F8]


    ---


    ## **S40/40U / UB** — UV puro

    - Tecnología: **ultravioleta** [F5]

    - Referencia de manual: **TM40/40U** [F10]

    - Sensibilidad disponible: **15 m** [F9]

    - El manual no especifica en los fragmentos recuperados los combustibles objetivo concretos del 40/40U.


    ---


    ## ⚠️ Dato que decide la elección


    Las variantes **NO son intercambiables** entre sí: cada una usa una tecnología de detección distinta y cubre
    riesgos diferentes.


    **¿Qué tipo de riesgo/combustible tienes en la instalación?**

    - ¿Hidrocarburos únicamente? → **40/40I** o **40/40L4**

    - ¿Hidrógeno o mezcla hidrógeno + hidrocarburos? → **40/40M** o **40/40L**

    - ¿Fuegos de metales o materia inorgánica? → **40/40L**

    - ¿Necesitas función de prueba BIT integrada? → variante con sufijo **B** (LB, L4B, UB)


    ---


    Fuentes:

    - MNDT724_40-40R (TM 40/40R, Rev. 4, 10 octubre 2011)

    - MNDT725_40-40M (TM 40/40M, Rev. 4, 10 octubre 2011)

    - MNDT721_40-40I (MN-DT-721_D)

    - MNDT722_40-40L (TM 40/40L, Rev. 5, 10 octubre 2011)

    - MNDT723_40-40U (MN-DT-723_B)

    - manual-sharpeye-40-40-series-winhost-spectrex-en-us-4845694 (TM777050 Rev. Da, octubre 2017)'
