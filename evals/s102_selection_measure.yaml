  answer_base: '## Resistencia de Fin de Línea en la Morley ZXe


    La pregunta hace referencia a la "ZXe", que es una familia con varios modelos. Los fragmentos disponibles cubren
    la **ZXAE/ZXEE** y la **ZX2e/ZX5e**. Te indico los valores según el tipo de circuito, ya que difieren:


    ---


    ### 🔔 Salidas de Sirenas (circuitos de sirenas convencionales)


    - **Resistencia de fin de línea (RFL): 6.800 Ω (6K8), 0,5 W mínimo** [F1][F2]

    - Aplica a las salidas de sirenas de placa de la **ZXAE/ZXEE** [F1] y también a la **ZX2e/ZX5e** [F4]

    - La RFL se instala entre **+** y **−** de la última sirena de la línea [F1]

    - Si no hay sirenas conectadas, la RFL se conecta directamente en los terminales de salida de la central [F1]

    - **No se deben realizar ramales** en la línea de sirenas, ya que la supervisión solo cubre la línea directa
    hasta la RFL [F2]


    ---


    ### 📡 Lazo Periférico (RS-485)


    - **Resistencia de fin de línea (RFL): 150 Ω, 0,5 W mínimo**, en cada extremo [F3]

    - Aplica cuando el lazo periférico se configura en **lazo abierto** [F3]

    - El cableado debe ser **apantallado** [F3]


    ---


    ### 🔁 Lazos Analógicos


    Los fragmentos disponibles **no especifican una resistencia de fin de línea** para los lazos analógicos de la
    ZXAE/ZXEE. El manual describe estos lazos como circuitos de comunicación digital a dos hilos en bucle cerrado
    [F5], pero no menciona RFL para este tipo de lazo.


    ---


    > ⚠️ Para confirmar qué modelo exacto de la familia ZXe tienes instalado (ZXAE, ZXEE, ZX2e o ZX5e), revisa la
    etiqueta del panel, ya que los valores anteriores están confirmados para esos modelos concretos.


    **Fuente:** Manual de Instalación ZXAE/ZXEE (DOC.MIE-MI-310, sin revisión registrada); Manual de Instalación
    ZX2e/ZX5e (MIE-MI-530rv001)


    ---


    También puedo ayudarte con: **conexionado completo de sirenas**, **verificación del lazo analógico** o **cálculo
    de consumos y baterías** para la ZXAE/ZXEE.'
  answer_sel: 'La pregunta menciona la "ZXe" pero los fragmentos recuperados corresponden a las centrales **ZXAE/ZXEE**
    y **ZX2e/ZX5e**. Dado que son modelos distintos, necesito confirmar: ¿qué modelo concreto estás usando?'
  answer_sel2: 'La pregunta menciona la "ZXe" pero los fragmentos recuperados corresponden a las centrales **ZXAE/ZXEE**
    y **ZX2e/ZX5e**. Antes de responder con precisión: ¿qué modelo concreto tienes instalado?


    Dicho esto, si tu equipo es una **ZXAE, ZXEE, ZX2e o ZX5e**, puedo darte ya la información, ya que los fragmentos
    cubren estas familias y la resistencia de fin de línea varía según el circuito:


    ---


    ### Salidas de sirenas convencionales (ZXAE/ZXEE y ZX2e/ZX5e)


    - **RFL: 6.800 Ω (6K8), 0,5 W mínimo** [F1][F2][F4]

    - Se instala entre **+** y **−** de la última sirena del circuito [F1]

    - Si no hay sirenas conectadas, la RFL se coloca directamente en los terminales de salida de la central [F1]

    - **No se deben realizar ramales** en la línea de sirenas, ya que la supervisión solo cubre la línea directa
    hasta la RFL [F2]


    ---


    ### Lazo periférico RS-485 (ZXAE/ZXEE)


    - **RFL: 150 Ω, 0,5 W mínimo**, en **cada extremo** del lazo [F3]

    - Aplica tanto en configuración de lazo abierto como cerrado [F3]


    ---


    ### Lazos analógicos (ZXAE/ZXEE)


    - Los lazos analógicos **no utilizan resistencia de fin de línea** según los fragmentos disponibles. La supervisión
    se realiza mediante comunicación digital a dos hilos [F5]. El manual no especifica RFL para este circuito.


    ---


    Fuente: Manual de Instalación ZXAE/ZXEE, DOC.MIE-MI-310 (sin revisión registrada); Manual de Instalación ZX2e/ZX5e,
    MIE-MI-530rv001 (sin revisión registrada)


    ---


    También puedo ayudarte con: **longitudes máximas de lazo**, **cableado apantallado y secciones recomendadas**
    o **consumos máximos de las salidas de sirenas** de estas centrales.'
