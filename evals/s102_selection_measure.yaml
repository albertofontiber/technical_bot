  answer_base: "## Diferencias entre el 40/40L, el 40/40L4 y el sufijo «B»\n\n### 40/40L vs. 40/40L4 — Longitud\
    \ de onda del sensor IR\n\nAmbos modelos son detectores UV/IR, pero difieren en la longitud de onda de trabajo\
    \ del sensor infrarrojo [F1]:\n\n- **S40/40L (y LB):** el sensor IR opera entre **2,5 y 3,0 µm**. Es capaz de\
    \ detectar:\n  - Combustibles a base de hidrocarburos y fuegos de gas\n  - Fuegos de hidróxido e hidrógeno\n\
    \  - Fuegos de metales o materia inorgánica\n\n- **S40/40L4 (y L4B):** el sensor IR opera a **4,5 µm**. Es adecuado\
    \ **únicamente** para la detección de fuegos de hidrocarburos.\n\n> En resumen: el **40/40L** tiene un espectro\
    \ de detección más amplio; el **40/40L4** está optimizado exclusivamente para hidrocarburos.\n\n---\n\n### Sufijo\
    \ «B» — Función BIT incorporada\n\nEl sufijo **«B»** indica que el modelo incluye la función de **Prueba Incorporada\
    \ (BIT)** [F1]:\n\n- **Sin sufijo B** (40/40L, 40/40L4): **NO** incluyen la función BIT.\n- **Con sufijo B**\
    \ (40/40LB, 40/40L4B): **SÍ** incluyen la función BIT.\n\nAdicionalmente, la certificación **SIL-2 (TÜV)** según\
    \ **IEC 61508.4, Capítulo 3.5.12** está disponible **exclusivamente en los modelos con sufijo B** (S40/40LB\
    \ y L4B) [F2].\n\n---\n\n### Resumen rápido\n\n- **40/40L** → IR a 2,5–3,0 µm · detección amplia · sin BIT ·\
    \ sin SIL-2\n- **40/40LB** → igual que el L + **BIT incorporada** + **certificación SIL-2**\n- **40/40L4** →\
    \ IR a 4,5 µm · solo hidrocarburos · sin BIT · sin SIL-2\n- **40/40L4B** → igual que el L4 + **BIT incorporada**\
    \ + **certificación SIL-2**\n\nTodos los modelos comparten la misma carcasa antideflagrante EExde IIB+H₂ y la\
    \ ventana óptica calefactada [F1].\n\n---\n\n**Fuente:** Manual de usuario. Detector S40/40L-LB-L4-L4B — MNDT722_40-40L\
    \ (MN-DT-722_B, Honeywell Life Safety Iberia, sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con:\
    \ **rangos de sensibilidad del 40/40L vs. 40/40L4**, **procedimiento de prueba BIT manual/automática** o **especificaciones\
    \ eléctricas y consumos** de estos detectores."
  answer_sel: "## Diferencias entre el 40/40L, el 40/40L4 y el sufijo «B»\n\n### 40/40L vs. 40/40L4 — Longitud de\
    \ onda del sensor IR\n\nLa diferencia fundamental entre ambos modelos es la **longitud de onda de trabajo del\
    \ sensor IR** y, en consecuencia, los tipos de fuego que pueden detectar [F1]:\n\n- **S40/40L**: el sensor IR\
    \ opera en la banda de **2,5 a 3,0 µm**. Es apto para detectar:\n  - Combustibles a base de hidrocarburos y\
    \ fuegos de gas\n  - Fuegos de hidróxido e hidrógeno\n  - Fuegos de metales o materia inorgánica\n\n- **S40/40L4**:\
    \ el sensor IR opera a **4,5 µm**. Es apto **únicamente** para:\n  - Detección de fuegos de hidrocarburos\n\n\
    > ⚠️ El 40/40L4 **no es intercambiable** con el 40/40L en aplicaciones donde se requiera detectar hidrógeno,\
    \ metales o materia inorgánica.\n\nAmbos modelos comparten la misma arquitectura UV/IR y la ventana óptica calefactada\
    \ [F1].\n\n---\n\n### Sufijo «B» — Función BIT incorporada y certificación SIL-2\n\nEl sufijo **«B»** (modelos\
    \ **40/40LB** y **40/40L4B**) añade dos características exclusivas respecto a sus variantes sin sufijo [F1]\
    \ [F2]:\n\n1. **Prueba incorporada (BIT — Built-In Test)**: la función de autotest integrado **solo** está disponible\
    \ en los modelos con sufijo B.\n\n2. **Certificación SIL-2 (TÜV)**: la certificación según **IEC 61508.4, Capítulo\
    \ 3.5.12** es **exclusiva de los modelos LB y L4B** [F2]. La condición de alerta SIL-2 se implementa mediante:\n\
    \   - Una señal de alerta a través del lazo de **0-20 mA**, o\n   - Una señal de alerta mediante relé de alarma\
    \ y avería.\n\nLos modelos sin sufijo B (40/40L y 40/40L4) **no disponen de BIT ni de certificación SIL-2**\
    \ [F1] [F2].\n\n---\n\n### Resumen rápido\n\n- **40/40L** → IR a 2,5–3,0 µm · hidrocarburos + H₂ + metales ·\
    \ sin BIT · sin SIL-2\n- **40/40LB** → igual que L + **BIT** + **SIL-2**\n- **40/40L4** → IR a 4,5 µm · solo\
    \ hidrocarburos · sin BIT · sin SIL-2\n- **40/40L4B** → igual que L4 + **BIT** + **SIL-2**\n\n---\n\nFuente:\
    \ Manual de usuario. Detector S40/40L-LB-L4-L4B — MNDT722_40-40L (MN-DT-722_B, Honeywell Life Safety Iberia,\
    \ sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **sensibilidades de detección por modelo**,\
    \ **conexionado eléctrico y sección de cable** o **procedimiento de prueba BIT manual** del 40/40LB/L4B."
