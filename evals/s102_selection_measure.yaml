  answer_base: "# Configuración de una Maniobra (Causa-Efecto) en la CAD-250\n\n> ⚠️ La programación de maniobras\
    \ es una de las funciones más críticas de la configuración del sistema. Requiere conocimiento específico del\
    \ sistema instalado y del plan de protección [F6].\n\n---\n\n## CONCEPTO PREVIO\n\nUna maniobra es un conjunto\
    \ de acciones programadas en función de los estados del sistema. Los cambios de estado se llaman **eventos**\
    \ (entradas) y a cada evento se asocia una **acción** (salida: sirenas, relés, etc.) [F1].\n\nLa lógica es:\
    \ **Entradas → Lógica (coincidencias) → Salidas** [F1].\n\nEl sistema soporta hasta **100.000 entradas y salidas**\
    \ configuradas en distintas maniobras [F3][F10].\n\n---\n\n## PASO 1 — ACCEDER AL MENÚ DE MANIOBRAS\n\nRuta\
    \ de acceso desde el panel [F1]:\n\n**MENÚ** → **MANIOBRAS** → **+AÑADIR** (barra de navegación inferior)\n\n\
    Al entrar por primera vez puede estar vacío o incluir maniobras preestablecidas de fábrica [F6].\n\n---\n\n\
    ## PASO 2 — CREAR LA MANIOBRA Y DEFINIR COINCIDENCIAS\n\n1. Pulsa **AÑADIR** para crear una nueva maniobra [F2].\n\
    2. Se accede a la pantalla de edición de **Maniobra 000X** [F2].\n3. Define el campo **COINCIDENCIAS**: número\
    \ de eventos que deben cumplirse simultáneamente para que la salida se ejecute [F2]:\n\n   - **Coincidencias\
    \ = 1** → lógica **OR**: cualquier evento dispara la acción [F2].\n   - **Coincidencias = 2** (con 2 eventos)\
    \ → lógica **AND**: todos los eventos deben cumplirse [F2].\n   - **Coincidencias = 3** (con 4 eventos) → lógica\
    \ **3 de N**: 3 eventos cualesquiera deben cumplirse [F2].\n\n---\n\n## PASO 3 — DEFINIR LAS ENTRADAS (EVENTOS)\n\
    \n1. Pulsa **AÑADIR** en el margen inferior → selecciona **EVENTO** en la ventana emergente [F3].\n2. Elige\
    \ el tipo de evento [F3]:\n   - **ENTIDAD**: cualquier elemento de la jerarquía del sistema.\n   - **CONDICIÓN\
    \ TEMPORAL**: periodo de tiempo durante el que la ecuación de entrada es verdadera.\n\n3. Si seleccionas **ENTIDAD**,\
    \ configura los siguientes parámetros en la pantalla **EVENTO DE LA ENTIDAD** [F6][F7]:\n\n**Origen:**\n- Local\
    \ o Red [F6]\n- Instalación, Panel, Lazo, Área, Zona, Dispositivo, Grupo o Módulo Virtual [F6]\n\n**Condición\
    \ (Tipo — estado):**\n- **Alarma**: uno o más elementos en alarma [F7]\n- **Avería**: uno o más elementos en\
    \ avería [F7]\n- **Técnico**: una o más entradas activas [F7]\n\n**Tipo de dispositivo:**\n- **Todos**: cualquier\
    \ dispositivo activo [F7]\n- **Pulsadores**: únicamente pulsadores [F7]\n- **Detectores**: únicamente detectores\
    \ [F7]\n- **Entrada**: únicamente entradas [F7]\n\n**Lógico:**\n- **Normal**: la condición de estado es verdadera\
    \ [F7]\n- **No (Negado)**: la condición de estado es falsa (p.ej. \"no hay alarma\") [F7]\n\n**Repeticiones:**\n\
    - Valor entero hasta **9999** [F6]\n- Número de veces que el evento debe repetirse en la entidad para que la\
    \ entrada sea válida [F7]\n- Ejemplo: zona en alarma de detectores con repeticiones = 3 → la condición es verdadera\
    \ cuando **3 detectores** estén en alarma [F7]\n\n> ⚠️ La maniobra gestiona **eventos** (cambios de estado),\
    \ no estados estáticos. El evento es el cambio de estado; si coincide con la condición establecida, activa las\
    \ salidas [F3].\n\n4. Pulsa **GUARDAR**. Repite el proceso para añadir más eventos si la maniobra lo requiere\
    \ [F5].\n\n> Desde la versión 1.1.1 es posible seleccionar un elemento de **salida** como condición de entrada;\
    \ en ese caso, el cambio a condición de avería hace verdadera la entrada. Para ello, desmarca la casilla **\"\
    Sólo dispositivos de entrada\"** [F5].\n\n---\n\n## PASO 4 — DEFINIR LAS SALIDAS (ACCIONES)\n\n1. Desde la misma\
    \ pantalla de la maniobra, pulsa **AÑADIR** → selecciona **ACCIÓN** [F4].\n2. Configura los campos de **ACCIÓN\
    \ DE LA ENTIDAD** [F4][F6]:\n\n**Retraso:**\n- Tiempo configurable entre **0 y 600 segundos** antes de iniciar\
    \ la acción [F4][F6]\n- Se inicia a partir del momento en que la condición de entrada es verdadera [F6]\n\n\
    **Entidad (destino):**\n- Panel, Lazo, Área, Zona, Dispositivo, Grupo o Módulo Virtual [F4]\n- Las acciones\
    \ siempre son relativas a la entidad seleccionada [F4]\n- **El programa no permite mezclar acciones sobre entidades\
    \ de paneles diferentes** [F10]\n\n**Acción:**\n- Activar, Desactivar, Habilitar, Deshabilitar, Test, Reiniciar\
    \ o Pulso [F6]\n\n**Tipo de dispositivo de salida:**\n- Todos, Sirenas, Relés, Sirena discontinua [F6]\n\n3.\
    \ Pulsa **GUARDAR**. La pantalla mostrará la maniobra completa con eventos y acciones [F9].\n\n---\n\n## RESUMEN\
    \ DEL FLUJO COMPLETO\n\n```\nAÑADIR maniobra\n    ↓\nDefinir COINCIDENCIAS (1=OR / N=AND / X de N)\n    ↓\n\
    AÑADIR → EVENTO → ENTIDAD o CONDICIÓN TEMPORAL\n    → Configurar: Origen / Condición / Tipo / Lógico / Repeticiones\n\
    \    (repetir para cada evento necesario)\n    ↓\nAÑADIR → ACCIÓN → ENTIDAD\n    → Configurar: Retraso / Entidad\
    \ destino / Acción / Tipo\n    (repetir para cada acción necesaria)\n    ↓\nGUARDAR → Maniobra completa activa\n\
    ```\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n- Manual\
    \ de Instalación CAD-250 MI-372-es-2024-e (sin revisión registrada)\n- CAD-250 Manual Software de Configuración\
    \ MS-416-es-2026-b (rev. b)\n\n---\n\nTambién puedo ayudarte con: **configuración de Grupos**, **Módulos Virtuales**\
    \ o **Condiciones Temporales** en la CAD-250."
  answer_sel: "# Configuración de una maniobra completa en la CAD-250\n\n> ⚠️ La programación de maniobras es una\
    \ de las funciones más críticas de la configuración del sistema. Requiere conocimiento específico del sistema\
    \ instalado, del plan de protección y del producto [F6].\n\n---\n\n## CONCEPTO PREVIO\n\nUna maniobra es un\
    \ conjunto de **entradas (eventos)** → **lógica (coincidencias)** → **salidas (acciones)** [F1].\n\n- El **evento**\
    \ es el cambio de estado, no el estado en sí [F3].\n- El sistema soporta hasta **100.000 entradas y salidas**\
    \ configuradas en distintas maniobras [F3][F10].\n- El retardo de acción es configurable entre **0 y 600 segundos**\
    \ [F6].\n\n---\n\n## PASO 1 — ACCEDER AL MENÚ DE MANIOBRAS\n\nRuta: **MENÚ > MANIOBRAS > +AÑADIR** [F1]\n\n\
    En el submenú de MANIOBRAS también encontrarás: **GRUPOS**, **MÓDULOS VIRTUALES** y **ESTADO VM** [F1].\n\n\
    ---\n\n## PASO 2 — CREAR LA MANIOBRA\n\n1. Pulsa **AÑADIR** en la barra de navegación inferior [F2].\n2. Se\
    \ abre la pantalla de edición de la maniobra (ej: \"Maniobra 0001\") [F2].\n3. Define el campo **COINCIDENCIAS**:\
    \ número de eventos que deben cumplirse simultáneamente para que la salida se active [F2]:\n   - **Coincidencias\
    \ = 1** → lógica **OR** (cualquier evento activa la salida) [F2].\n   - **Coincidencias = N (igual al total\
    \ de eventos)** → lógica **AND** (todos deben cumplirse) [F2].\n   - **Coincidencias = X de N** → lógica de\
    \ mayoría (X eventos cualesquiera de N totales) [F2].\n\n---\n\n## PASO 3 — DEFINIR LAS ENTRADAS (EVENTOS)\n\
    \n1. Pulsa **AÑADIR** en el margen inferior y selecciona **EVENTO** [F3].\n2. Elige el tipo de evento [F3]:\n\
    \   - **ENTIDAD**: cualquier elemento de la jerarquía del sistema.\n   - **CONDICIÓN TEMPORAL**: periodo de\
    \ tiempo durante el cual la entrada es verdadera.\n\n### Si eliges ENTIDAD:\n\n3. Selecciona el origen: **LOCAL**\
    \ (central actual) o **RED** (cualquier central en red) [F3][F6].\n4. Selecciona el nivel de entidad [F6][F8]:\n\
    \   - Instalación, Panel, Lazo, Área, Zona, Dispositivo, Grupo o Módulo Virtual.\n5. Configura los parámetros\
    \ del evento [F7]:\n\n   - **Tipo / Condición de estado:**\n     - *Alarma*: uno o más elementos en alarma.\n\
    \     - *Avería*: uno o más elementos en avería.\n     - *Técnico*: una o más entradas activas.\n\n   - **Tipo\
    \ / Condición de tipo** (filtra qué dispositivo activa la condición) [F7]:\n     - *Todos*, *Pulsadores*, *Detectores*\
    \ o *Entrada*.\n\n   - **Lógico** [F7]:\n     - *Normal*: la condición de estado es verdadera.\n     - *No (Negado)*:\
    \ invierte la condición (ej: \"no hay alarma\").\n\n   - **Repeticiones** [F7]: valor entero hasta **9999**.\
    \ Número de veces que el evento debe darse en la entidad para que la entrada sea válida. Ejemplo: zona en alarma\
    \ con 3 repeticiones → condición verdadera cuando 3 detectores estén en alarma.\n\n6. Pulsa **GUARDAR** para\
    \ confirmar el evento [F9].\n7. Repite para añadir más eventos si es necesario [F5].\n\n> \U0001F4A1 Desde la\
    \ versión **1.1.1** es posible seleccionar un elemento de salida como condición de entrada. En ese caso, el\
    \ cambio a condición de avería hace verdadera la entrada. Para ello, desmarca la casilla **\"Sólo dispositivos\
    \ de entrada\"** [F5].\n\n---\n\n## PASO 4 — DEFINIR LAS SALIDAS (ACCIONES)\n\n1. Desde la misma pantalla de\
    \ la maniobra, pulsa **AÑADIR** y selecciona **ACCIÓN** [F4].\n2. Configura los campos [F4][F6]:\n\n   - **Retraso\
    \ (s):** tiempo de espera antes de ejecutar la acción, de **0 a 600 segundos** [F4][F6]. El retardo se inicia\
    \ cuando la condición de entrada es verdadera [F6].\n\n   - **Entidad (destino):** Panel, Lazo, Área, Zona,\
    \ Dispositivo, Grupo o Módulo Virtual [F4].\n     > ⚠️ El programa **no permite mezclar acciones sobre entidades\
    \ de paneles diferentes** [F10].\n\n   - **Tipo / Acción:** Activar, Desactivar, Habilitar, Deshabilitar, Test,\
    \ Reiniciar o Pulso [F6].\n\n   - **Tipo de dispositivo:** Todos, Sirenas, Relés, Sirena discontinua [F6].\n\
    \n3. Pulsa **GUARDAR** [F10].\n4. Repite para añadir más acciones si es necesario.\n\n---\n\n## PASO 5 — VERIFICAR\
    \ LA MANIOBRA COMPLETA\n\nLa pantalla de la maniobra mostrará [F10]:\n- **Cuadro izquierdo (Eventos):** todas\
    \ las entradas configuradas.\n- **Cuadro derecho (Acciones):** todas las salidas que se activarán cuando se\
    \ cumplan las condiciones.\n\nDesde esta pantalla puedes [F10]:\n- **Editar** un evento o acción seleccionándolo\
    \ y pulsando EDITAR.\n- **Borrar elemento** individual.\n- **Borrar maniobra** completa.\n\n---\n\n## RESUMEN\
    \ DEL FLUJO\n\n```\nAÑADIR maniobra\n    ↓\nDefinir COINCIDENCIAS (1=OR / N=AND / X de N)\n    ↓\nAÑADIR EVENTO(S)\
    \ → Entidad + Estado + Tipo + Lógico + Repeticiones\n    ↓\nAÑADIR ACCIÓN(ES) → Retraso + Entidad destino +\
    \ Acción + Tipo dispositivo\n    ↓\nGUARDAR\n```\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración MC-380-es-2026-c\
    \ (rev. c, 2026-04-23)\n- CAD-250 Manual de Software de Configuración MS-416-es-2026-b (rev. b)\n- Manual de\
    \ Instalación CAD-250 MI-372-es-2024-e (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de Grupos**, **uso de Módulos Virtuales** o **configuración de Condiciones Temporales** en la CAD-250."
  answer_sel2: "# Configuración de una maniobra completa en la CAD-250\n\n> ⚠️ La programación de maniobras es una\
    \ de las funciones más críticas de la configuración del sistema. Requiere conocimiento específico del sistema\
    \ instalado, del plan de protección y del producto [F6].\n\n---\n\n## CONCEPTO PREVIO\n\nUna maniobra es un\
    \ conjunto de **Entradas (Eventos)** → **Lógica (Coincidencias)** → **Salidas (Acciones)** [F1].\n\n- El **evento**\
    \ es el cambio de estado, no el estado en sí [F3].\n- El sistema soporta hasta **100.000 entradas y salidas**\
    \ configuradas en distintas maniobras [F3][F10].\n- El retardo de acción es configurable entre **0 y 600 segundos**\
    \ [F6].\n\n---\n\n## PASO 1 — ACCEDER AL MENÚ DE MANIOBRAS\n\nRuta: **MENÚ > MANIOBRAS > +AÑADIR** [F1]\n\n\
    En el submenú de MANIOBRAS también encontrarás: **GRUPOS**, **MÓDULOS VIRTUALES** y **ESTADO VM** [F1].\n\n\
    ---\n\n## PASO 2 — CREAR LA MANIOBRA\n\n1. Pulsa **AÑADIR** en la barra de navegación inferior [F2].\n2. Se\
    \ abre la pantalla de edición de **Maniobra 000X** [F2].\n3. Define el campo **COINCIDENCIAS**: número de eventos\
    \ que deben cumplirse simultáneamente para que la maniobra se ejecute [F2]:\n   - **Coincidencias = 1** → lógica\
    \ **OR** (cualquier evento dispara la acción) [F2]\n   - **Coincidencias = N (igual al total de eventos)** →\
    \ lógica **AND** (todos deben cumplirse) [F2]\n   - **Coincidencias = X de N** → lógica de mayoría (X eventos\
    \ cualesquiera de los N definidos) [F2]\n\n---\n\n## PASO 3 — DEFINIR LAS ENTRADAS (EVENTOS)\n\n1. Pulsa **AÑADIR**\
    \ en el margen inferior y selecciona **EVENTO** [F3].\n2. Elige el tipo de evento [F3]:\n   - **ENTIDAD**: cualquier\
    \ elemento de la jerarquía del sistema (instalación, panel, lazo, área, zona, dispositivo, grupo o módulo virtual),\
    \ tanto local como en red [F3][F6].\n   - **CONDICIÓN TEMPORAL**: establece un periodo de tiempo durante el\
    \ cual la condición de entrada es verdadera [F3].\n\n3. Si eliges **ENTIDAD**, configura los siguientes parámetros\
    \ en la pantalla **EVENTO DE LA ENTIDAD** [F6][F7]:\n\n   - **Origen:** Local o Red [F6]\n   - **Condición (estado):**\n\
    \     - *Alarma*: uno o más elementos en alarma [F7]\n     - *Avería*: uno o más elementos en avería [F7]\n\
    \     - *Técnico*: una o más entradas activas [F7]\n   - **Tipo (discriminación de dispositivo):**\n     - *Todos*,\
    \ *Pulsadores*, *Detectores* o *Entrada* [F7]\n   - **Lógico:**\n     - *Normal*: la condición es verdadera\
    \ [F7]\n     - *No (Negado)*: invierte la condición (p. ej. \"no hay alarma\") [F7]\n   - **Repeticiones:**\
    \ valor entero hasta **9999**; número de veces que el evento debe darse en la entidad para que la entrada sea\
    \ válida [F7]. Ejemplo: zona en alarma con 3 repeticiones → condición verdadera cuando 3 detectores estén en\
    \ alarma [F7].\n\n4. Pulsa **GUARDAR** para confirmar el evento [F9].\n5. Repite el proceso para añadir más\
    \ eventos si la maniobra lo requiere [F5].\n\n> \U0001F4A1 Desde la versión 1.1.1 es posible seleccionar un\
    \ **elemento de salida como condición de entrada**; en ese caso, el cambio a condición de avería hace verdadera\
    \ la entrada. Para ello, desmarca la casilla **\"Sólo dispositivos de entrada\"** [F5].\n\n---\n\n## PASO 4\
    \ — DEFINIR LAS SALIDAS (ACCIONES)\n\n1. Desde la misma pantalla de la maniobra, pulsa **AÑADIR** y selecciona\
    \ **ACCIÓN** [F4].\n2. Configura los campos de la ventana **ACCIÓN DE LA ENTIDAD** [F4][F6]:\n\n   - **Retraso\
    \ (s):** tiempo de espera antes de ejecutar la acción, de **0 a 600 segundos** [F4][F6]. El retardo se inicia\
    \ cuando la condición de entrada es verdadera [F6].\n   - **Entidad destino:** panel, lazo, área, zona, dispositivo,\
    \ grupo o módulo virtual (siempre entidad **local**) [F4].\n   - **Tipo de acción:** Activar, Desactivar, Habilitar,\
    \ Deshabilitar, Test, Reiniciar o Pulso [F6].\n   - **Tipo de elemento:** Todos, Sirenas, Relés, Sirena discontinua\
    \ [F6].\n\n3. Pulsa **GUARDAR** [F10].\n4. Repite para añadir más acciones si es necesario [F4].\n\n> ⚠️ El\
    \ programa **no permite mezclar acciones sobre entidades de paneles diferentes** en la misma maniobra [F10].\n\
    \n---\n\n## PASO 5 — VERIFICAR LA MANIOBRA COMPLETA\n\nUna vez guardada, la pantalla mostrará:\n- **Cuadro izquierdo\
    \ (Eventos):** todas las entradas configuradas [F10].\n- **Cuadro derecho (Acciones):** todas las salidas que\
    \ se ejecutarán cuando se cumplan las condiciones [F10].\n\nDesde esta pantalla puedes usar **EDITAR** o **BORRAR\
    \ ELEMENTO** para modificar eventos o acciones individuales, y **BORRAR MANIOBRA** para eliminar la maniobra\
    \ completa [F10].\n\n---\n\n## RESUMEN VISUAL DEL FLUJO\n\n```\n[Evento 1] ─┐\n[Evento 2] ─┤→ [Coincidencias:\
    \ X de N] → [Retardo 0-600s] → [Acción 1]\n[Evento N] ─┘                                               → [Acción\
    \ N]\n```\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración MC-380-es-2026-c (rev. c, 2026-04-23)\n\
    - CAD-250 Manual de Software de Configuración MS-416-es-2026-b (rev. b)\n- Manual de Instalación CAD-250 MI-372-es-2024-e\
    \ (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte con: **configuración de Grupos**, **uso de Módulos\
    \ Virtuales** o **configuración de Condiciones Temporales** en la CAD-250."
