cleanup_gate:
  before_any_move_or_delete:
    - recompute file size and sha256 for every selected payload
    - verify the compact gate remains sufficient to reproduce the decision
    - write a reversible source_to_destination_or_delete manifest
    - keep at least one governed full payload when compact evidence is not reproducible
    - obtain explicit authorization for destructive deletion
  files_moved: 0
  files_deleted: 0
  database_changes: 0
  production_changes: 0
  model_calls: 0
