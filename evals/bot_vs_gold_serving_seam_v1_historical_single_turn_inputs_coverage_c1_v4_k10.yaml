    - El código de fallo **008** corresponde a "Fallo reloj" y puede estar causado
    por la batería de litio [F11].


    ---


    ## Sobre la conservación de la configuración


    El manual indica que tras una **sustitución del LMB 35** (la placa que aloja la
    batería) es necesario [F9]:


    - Realizar un **nuevo reset inicial**.

    - Reajustar las **configuraciones específicas de cliente** y de proyecto desde
    «ADW Config» o «ADW HeatCalc».

    - Realizar una **verificación de la transmisión de alarmas** según el cap. 7.7.1.


