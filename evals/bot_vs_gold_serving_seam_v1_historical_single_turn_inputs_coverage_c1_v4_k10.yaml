  bot_answer: '# Programación del retardo de salida de alarma en la PEARL


    El retardo de salida de alarma en la Pearl **no se configura como un parámetro
    aislado**, sino como parte de las **reglas de causa-efecto**. Aquí tienes el proceso
    completo:


    ---


    ## 1. Acceso a la programación de causa-efecto


    No puedo confirmar de forma segura el número de menú de Causa y Efecto con los
    fragmentos servidos. Confirma el manual y la revisión exactos antes de usar un
    número de menú.


    > ⚠️ Si no se ha transferido un archivo de configuración previo, aparecerán dos
    reglas por defecto. **Deben eliminarse si vas a crear reglas personalizadas**
    [F11].


    ---


    ## 2. Selección del tipo de retardo


    Dentro de cada regla de causa-efecto, debes asignar uno de los **seis tipos de
    retardo de salida** disponibles [F1]. Cada tipo determina qué acciones puede realizar
    el usuario mientras el retardo está activo [F1][F2]:


    - **Fijo:** No se puede silenciar, no se puede anular, no muestra cuenta atrás
    en LCD, no responde a AMPLIAR RETARDO [F2].

    - **Estándar:** Se detiene si se pulsa SILENCIAR SIRENAS; se puede anular en nivel
    de acceso 2; muestra tiempo restante en pestaña ALARMA; se puede detener con FIN
    RETARDO [F2].

    - **No Silenc.:** No se detiene con SILENCIAR SIRENAS; sí se puede anular en nivel
    2; muestra tiempo restante; se puede detener con FIN RETARDO [F2].

    - **Est. Ext.:** Se detiene con SILENCIAR SIRENAS; se puede anular en nivel 2;
    muestra tiempo restante; se puede detener con FIN RETARDO; **se detiene también
    con AMPLIAR RETARDO** [F2].

    - **RetExtStd:** Se detiene con SILENCIAR SIRENAS; se puede anular en nivel 2;
    muestra tiempo restante; se puede detener con FIN RETARDO; el temporizador comienza
    en RETARDO AMPLIADO [F2].

    - **No Sil. Ext:** No se detiene con SILENCIAR SIRENAS; sí se puede anular en
    nivel 2; muestra tiempo restante; se puede detener con FIN RETARDO; se detiene
    con AMPLIAR RETARDO [F2].

    - **SinRetExt:** No se detiene con SILENCIAR SIRENAS; se puede anular en nivel
    2; muestra tiempo restante; se puede detener con FIN RETARDO; el temporizador
    comienza en RETARDO AMPLIADO [F2].


    ---


    ## 3. Método recomendado de programación


    > **Se recomienda usar el programa de configuración por ordenador como método
    principal.** El menú de la central debe emplearse solo para modificaciones menores
    [F12].


    ---


    ## 4. Tecla AMPLIAR RETARDO (opcional)


    La tecla **AMPLIAR RETARDO** puede habilitarse o deshabilitarse desde los parámetros
    de la central [F5]:


    - Parámetro: `10: Extend Delay Button` → `Enabled / Disabled` [F5]


    Esta función no se requiere en algunos mercados [F5].


    ---


    ## 5. Anular/habilitar retardos en operación (nivel de acceso 2)


    Una vez configurado, el retardo puede anularse temporalmente desde el menú de
    operación [F3]:


    1. Accede al **Menú Anular/Habilitar**

    2. Selecciona **«5: Retardo Activación Salidas»**

    3. Pulsa **✓** para cambiar el estado (habilitado ↔ anulado)

    4. Pulsa **✕** para salir [F3]


    ---


    ## Nota sobre el comportamiento en campo


    Durante un retardo activo, el LED **RETARDO ACTIVO** se ilumina [F3]. El usuario
    con llave (nivel de acceso 2) puede pulsar **AMPLIAR RETARDO** para iniciar un
    segundo temporizador más largo, o **FIN RETARDO** (disponible en nivel de acceso
    1) para terminar el retardo inmediatamente y pasar a alarma completa [F4].


    ---


    **Fuentes:**

    - Manual de configuración de la central Pearl (rev. 997-671-005-3)

    - Manual de funcionamiento Pearl 997-670-005-3 (sin revisión registrada)

    - Manual de instalación y puesta en marcha Pearl 997-669-005-3 (sin revisión registrada)


    ---


    También puedo ayudarte con: **borrado de reglas de causa-efecto**, **configuración
    del segundo temporizador (AMPLIAR RETARDO)** o **prueba funcional de los retardos
    tras la puesta en marcha**.


    ---

    ⚠️ **Información adicional del manual:**

    - "**Es de vital importancia probar rigurosamente todas las reglas durante la
    puesta en marcha del sistema para verificar que no haya conflictos lógicos entre
    ellas.**" [F12]

    - "**Al programar reglas de causa-efecto evite las lógicas contradictorias.**"
    [F12]

    - Nota: el manual también indica: "Si no se ha transferido a la central un archivo
    de configuración, el usuario encontrará aquí las dos reglas de causa-efecto por
    defecto." [F11] · "| Acción de usuario/indicación de estado                                                                                    |
    Tipos de retardo<br/>Fijo | Tipos de retardo<br/>Estándar | Tipos de retardo<br/>No
    Silenc | Tipos de retardo<br/>Est. Ext. | Tipos de retardo<br/>RetExtStd | Tipos
