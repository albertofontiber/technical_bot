  bot_answer: 'La pregunta hace referencia a "lazos de la central ZXe", pero el término
    "lazo" puede referirse a dos circuitos distintos en esta central, y la resistencia
    de fin de línea (RFL) es diferente en cada caso. Aquí tienes los valores según
    los fragmentos:


    ---


    ## Resistencia de fin de línea (RFL) según tipo de circuito


    ### 1. Circuitos de Sirenas (Sirena A, B, C, D)


    - **Valor RFL: 6,8 KΩ (6800 Ω), 0,5 W mínimo** [F6]

    - Se instala una RFL al final de cada circuito de sirenas para la supervisión
    ante cortocircuito y circuito abierto [F6]

    - En el diagrama de conexionado (Figura 15) se confirma el valor **6800 Ω** en
    el extremo de cada circuito [F1]


    ### 2. Lazo RS-485 (red de centrales o lazo periférico)


    - **Valor RFL: 150 Ω, 0,5 W mínimo** [F10]

    - Se coloca entre terminales **A y B** en los extremos libres del principio y
    final de la cadena, en instalación en abierto (cadena sencilla) [F10]

    - En instalación en **bucle cerrado RS-485**, el manual no especifica RFL en los
    extremos [F10]


    ### 3. Lazo analógico (detectores/pulsadores)


    - El lazo analógico se realiza en **bucle cerrado** con aisladores de cortocircuito
    [F4][F5]

    - El manual **no especifica resistencia de fin de línea** para el lazo analógico
    — la supervisión se realiza mediante el propio protocolo de comunicación en bucle
    cerrado


    ---


    **Resumen rápido:**

    - Sirenas → **6,8 KΩ / 0,5 W** [F6]

    - RS-485 en cadena abierta → **150 Ω / 0,5 W** [F10]

    - Lazo analógico → sin RFL (bucle cerrado con aisladores) [F4]


    ---


    Fuente: Manual de Instalación Paneles de Incendio ZX2e/ZX5e — Documento No. MIE-MI-530,
    Revisión: 001 (sin fecha registrada)


    También puedo ayudarte con: **conexionado de sirenas paso a paso**, **cálculo
    de carga del lazo analógico** o **instalación de aisladores de cortocircuito**
    en el ZX2e/ZX5e.


    ---

    ⚠️ **Información adicional del manual:**

    - "**Todo cableado debe ser verificado antes de su conexionado al panel.**" [F4]

    - "LAS SIGUIENTES MEDIDAS PRÁCTICAS SOBRE EL CABLEADO, DEBEN REALIZARSE ANTES
    DE CONECTAR AL PANEL, PARA ASEGURAR EL FUNCIONAMIENTO DEL SISTEMA Y EVITAR DAÑOS:"
    [F4]

    - "AISLADORES DE CORTOCIRCUITO: Si se han instalado aisladores estos deben puentearse
    antes o medir entre todos los aisladores (Los aisladores mantienen abierta la
    línea de señal de positivo hasta que se alimentan e impiden la verificación del
    cableado). De no tenerse en cuenta esta medida, podrá existir tensión externa
    en el cableado, que no sea posible medir y que al conectar el lazo al panel, se
    derive directamente a éste provocando daños irreparables.


    TENSIONES: Comprobar que no existe tensión de C.C. o C.A. entre ningún conductor,
    ni con pantalla o tierra de ningún lazo.


    CONTINUIDAD: Comprobar la continuidad independiente los conductores positivo,
    negativo y pantalla desde el inicio de lazo al final. Si hay ramales, estos deberán
    comprobarse por separado.


    DERIVACIONES: Comprobar que no existe continuidad entre los conductores de positivo,
    negativo y pantalla y que tampoco hay continuidad entre éstos y tierra." [F4]'
