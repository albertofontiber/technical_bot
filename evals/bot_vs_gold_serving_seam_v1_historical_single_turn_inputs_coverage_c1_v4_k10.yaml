  bot_answer: "# ASD535 — Diagnóstico de fallo de flujo bajo\n\n## Causa más probable\n\
    \nUn valor de flujo **por debajo del 100 %** apunta directamente a una **obstrucción\
    \ en el conducto de aspiración** [F1][F2]. Si el valor cae por debajo del **80\
    \ %**, el ASD535 dispara el aviso «fallo flujo de aire» una vez transcurrido el\
    \ tiempo de retardo de **300 s** de la LS-Ü (en posiciones de conmutador **A11\
    \ a C32**) [F2].\n\nEl código de evento asociado es el **código 001: Obstrucción,\
    \ conducto de aspiración** [F4].\n\n---\n\n## Procedimiento de diagnóstico paso\
    \ a paso\n\n### 1. Leer el valor de flujo actual\n\n1. En el AMB 35, navega con\
    \ el botón **UP** hasta que aparezca el grupo de posiciones **V ----** [F1].\n\
    2. Pulsa **OK** → selecciona **V01** (conducto de aspiración) [F1].\n3. Pulsa\
    \ **OK** nuevamente → el display muestra el porcentaje de flujo actual (p. ej.,\
    \ *079* = 79 %) [F1].\n\n**Interpretación** [F1][F5]:\n- Valor **< 100 %** → obstrucción\
    \ inminente o activa\n- Valor **< 80 %** → umbral de fallo según EN 54-20 (con\
    \ sensibilidad ±20 %)\n- Si la sensibilidad configurada es **±20 %** (estándar),\
    \ inspecciona el conducto cuando el valor caiga por debajo del **90 %** (mitad\
    \ de la ventana = ±10 %) [F5]\n\n### 2. Verificar el código de evento\n\n- Coloca\
    \ el conmutador del AMB 35 en **posición E** para leer el código de evento [F3].\n\
    - **Código 001** = Obstrucción en conducto de aspiración [F4].\n- **Código 004**\
    \ = Parámetros LS-Ü no válidos / fuera de rango [F4].\n- **Código 008** = Sensor\
    \ de flujo de aire defectuoso o no conectado [F4].\n\n### 3. Inspección física\
    \ del conducto\n\nSegún el código 001 [F4], comprueba en este orden:\n\n1. **Orificios\
    \ de aspiración**: verificar si están obstruidos (suciedad, objetos, cinta adhesiva\
    \ olvidada de pruebas anteriores).\n2. **Salida de aire del ASD**: comprobar si\
    \ hay suciedad acumulada [F5].\n3. **Caja de filtro / unidad de filtrado**: inspeccionar\
    \ y limpiar [F4].\n4. **Sensor de flujo de aire**: inspeccionar y limpiar [F4].\n\
    \n### 4. Verificar la tensión de servicio\n\nAbre la cubierta y mide en los bornes\
    \ **1 (+) y 2 (-)** [F5]:\n- Funcionamiento a **12 V-CC**: valor nominal **12,3\
    \ a 13,8 V-CC** [F5]\n- Funcionamiento a **24 V-CC**: valor nominal **21,6 a 27,6\
    \ V-CC** [F5]\n\nUn fallo de baja tensión (< **10,4 V-CC**, +0/–0,3 V) también\
    \ puede generar aviso de fallo [F3].\n\n### 5. Comparar con el protocolo de puesta\
    \ en funcionamiento\n\nCompara el valor de flujo actual con el registrado en el\
    \ protocolo de puesta en funcionamiento. Si la desviación supera la mitad de la\
    \ sensibilidad configurada, es obligatorio inspeccionar el conducto [F5].\n\n\
    ---\n\n## ⚠️ Advertencia antes de actuar\n\nAntes de realizar cualquier comprobación,\
    \ **bloquea o desconecta el control de incendios y la alerta remota en la CDI\
    \ de orden superior** para evitar disparos no deseados [F5].\n\n---\n\n## Si el\
    \ conducto está limpio y el fallo persiste\n\nSi tras limpiar el conducto el valor\
    \ no se recupera, considera:\n- **Código 004**: el punto de funcionamiento está\
    \ fuera de rango → inspeccionar y limpiar el sensor de flujo; si persiste, **sustituir\
    \ el sensor** [F4].\n- **Código 008**: sensor de flujo no conectado o defectuoso\
    \ → verificar cable de conexión y, si procede, **sustituir el sensor** [F4].\n\
    \nTras resolver la causa, realiza un **reset inicial** para que el ASD535 registre\
    \ los nuevos valores nominales de flujo [F2].\n\n---\n\nFuente: ASD535 Descripción\
    \ técnica, T 131 192 h es (sin revisión registrada)\n\n---\n\nTambién puedo ayudarte\
    \ con: **procedimiento de reset inicial del ASD535**, **limpieza del sensor de\
    \ flujo de aire** o **lectura de códigos de evento desde el AMB 35**.\n\n---\n\
    ⚠️ **Información adicional del manual:**\n- \"Para evitar que los controles de\
    \ incendios, las alertas remotas y las zonas de extinción se disparen al llevar\
    \ a cabo los trabajos de mantenimiento, es **imprescindible** bloquearlos o desconectarlos\
    \ previamente.\" [F5]\n- Nota: el manual también indica: \"1. Bloquear o desconectar\
    \ el control de incendios y la alerta remota en la CDI de orden superior.\n2.\
    \ La tensión de alimentación de la CDI debe estar configurada para la central\
    \ conforme a la normativa de mantenimiento.\n3. Debe comprobarse que la entrada\
    \ del conducto de aspiración y los tapones de tubo del orificio de entrada de\
    \ la caja del detector que no está en uso (ASD 535-1 y ASD 535-3) están en la\
    \ posición correcta.\n4. Debe comprobarse si existe suciedad en la salida de aire,\
    \ en cuyo caso deberá limpiarse.\n5. En caso de que el ASD 535 se utilice para\
    \ la vigilancia de equipos y se hayan instalado transiciones insertadas de tubo\
    \ rígido a tubo flexible, debe comprobarse que dichas transiciones están colocadas\
    \ correctamente (sin fugas).\n6. Debe abrirse la cubierta de la caja del detector\
    \ y fijarse en la posición media de anclaje del fondo de la caja. **Atención**:\
    \ conexión de cable plano (véanse también los cap. 5.4.1 y 7.1). Deberán efectuarse\
    \ las siguientes mediciones:\n   * Medir la tensión de servicio en los bornes\
    \ 1 (+), 2 (-) \U0001F87A Valor nominal = 12,3 a 13,8 V-CC (funcionamiento a 12\
    \ V-CC) o 21,6 a 27,6 V-CC (funcionamiento a 24 V-CC).\n   * Leer el valor de\
    \ flujo de aire del conducto de aspiración en la posición de conmutador V (véase\
    \ para ello el cap. 7.6.1) y comparar con el protocolo de puesta en funcionamiento.\
    \ Si existe una desviación superior a la mitad de la sensibilidad establecida\
    \ (véanse ejemplos ➀ y ➁), deberá realizarse una inspección del conducto de aspiración\
    \ de la siguiente manera:\n     - Un **aumento** del valor (superior al 100 %)\
    \ implica una **rotura de tubo** inminente \U0001F87A Comprobar si el conducto\
    \ de aspiración tiene fugas (puntos de unión, racores, etc.)\n     - Una **disminución**\
    \ del valor (inferior al 100 %) implica una **obstrucción** inminente \U0001F87A\
    \ Comprobar si el conducto de aspiración está obstruido y limpiarlo según el **punto\
    \ 9** o el **punto 10**.\n   * ➀ Sensibilidad de LS-Ü establecida = ±20 % (estándar);\
    \ la mitad = ±10 %. También deberá realizarse una inspección del conducto de aspiración\
    \ cuando el valor caiga por debajo del 90 % o suba por encima del 110 %.\n   *\
    \ ➁ Sensibilidad de LS-Ü establecida = ±50 % (no conforme a EN 54-20); la mitad\
    \ = ±25 %. También deberá realizarse una inspección del conducto de aspiración\
    \ cuando el valor caiga por debajo del 75 % o suba por encima del 125 %.\n7. Debe\
    \ desconectarse el ASD (extraer el bloque de bornes 1/2 y, en su caso, 3/4 del\
    \ AMB 35), desconectar con cuidado la conexión de cable plano con la unidad de\
    \ control y retirar completamente la cubierta de la caja del detector. Una vez\
    \ desconectado el cable plano de los sensores de humo, estos deberán extraerse\
    \ del ASD con cuidado.\n8. El espacio interior de las cámaras de los sensores\
    \ de humo y la rejilla protectora contra insectos deberán limpiarse con un pincel\
    \ suave y seco. Para la limpieza también puede emplearse nitrógeno o aire comprimido\
    \ sin aceite.\" [F5]\n- \"* Fallo flujo de aire (transcurrido el tiempo de retardo\
    \ del LS)\n* Fallo ventilador (por debajo o por encima de los valores límite del\
    \ ventilador, señal taquimétrica)\n* Fallo reset inicial\n* Fallo polvo o suciedad\
    \ en sensor de humo\n* Fallo sensor de humo inexistente; fallo de comunicación;\
    \ otros\n* Fallo de comunicación del AMB 35 con la unidad de control\n* Fallo\
    \ de comunicación del AMB 35 con el XLM 35 / SLM 35 / RIM 35 / MCM 35 / SIM 35\
    \ (individual)\n* Fallo de emergencia (microprocesador averiado)\n* Fallo baja\
    \ tensión (10,4 V-CC, +0 / –0,3 V)\n* Fallo alimentación (sin tensión en el ASD,\
    \ sin indicación «Fault»)\n* ASD inactivo a través de la entrada «Reset externo».\"\
    \ [F3]"
