    \ **conexionado del bucle analógico**, **conexión de sirenas** o **verificación\
    \ del sistema en puesta en marcha** de la CAD-150-8.\n\n---\n\U0001F4CB **Información\
    \ adicional del manual:**\n- Nota: el manual también indica: \"Las centrales analógicas\
