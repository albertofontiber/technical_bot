  bot_answer: '## Añadir un nuevo detector al lazo en la Morley DXc


    El procedimiento para incorporar un nuevo detector tras la puesta en marcha inicial
    se realiza mediante la función **Autobúsqueda de equipos**, accesible desde el
    menú de Lazo [F1].


    ---


    ### Pasos del procedimiento


    **1. Conexión física previa**

    Conecta el nuevo detector al lazo siguiendo el cableado en bucle cerrado, respetando
    la polaridad positivo/negativo [F2]. Recuerda que deben usarse aisladores de cortocircuito
    con un **máximo de 32 sensores/pulsadores entre aisladores**, conforme a **EN54-2:
    12.5.2** [F2].


    **2. Acceder al menú de Lazo**

    Desde el menú principal, accede al menú de **Lazo**.


    **3. Seleccionar Autobúsqueda**

    Pulsa la tecla **''2''** en el menú de Lazos para seleccionar la función **''Autobúsqueda''**
    [F1].


    **4. Seleccionar el lazo**

    Si la central dispone de más de un lazo, introduce el número del lazo donde has
    conectado el nuevo detector y pulsa **⊙** [F1].


    ```

    [Autobusqueda]

    Sel.Num.Lazo (1-2) :1

    OK:Confirm  1-2:↕:Edit  ←:Cancel

    ```


    **5. Confirmar la autobúsqueda**

    La central pedirá confirmación. Pulsa **⊙** para iniciar el proceso [F1]:


    ```

    [Autobusqueda]

    Lazo: 1  Autobusqueda?

    OK:Confirm  ←:Cancel

    ```


    **6. Esperar el reconocimiento**

    La pantalla mostrará una barra de progreso mientras se realiza el reconocimiento
    [F1]:


    ```

    [Autobusqueda]

    Lazo: 1 Reconocimiento en progreso...

    █████████████████

    ```


    **7. Verificar el resultado**

    Al finalizar, la pantalla muestra un resumen con el total de equipos y las diferencias
    encontradas (nuevos, eliminados, cambiados). **Comprueba que el número de equipos
    nuevos detectados coincide con los que has añadido físicamente** [F1]:


    ```

    [Lazo]

    Lazo: 1           Total: 13

    Nuevos:X          Elimin.:0  Cambiad:0

    ION: 0 OPT: 1 TMP: 1 MLT: 2

    PUL: 4 MON: 0 SIR: 2 REL: 1 OTROS : 2

    ```


    **8. Salir**

    Pulsa la tecla **⊞** para abandonar la pantalla de resultados y regresar al menú
    de Lazo [F1].


    ---


    ### ⚠️ Aviso importante

    Si en tu instalación el protocolo es seleccionable y has realizado un cambio de
    protocolo, **espera dos minutos antes de ejecutar la autobúsqueda**, ya que la
    central necesita tiempo para rearmar los equipos del lazo [F1].


    ---


    Fuente: DXc_Manual de configuracion (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de parámetros del detector recién
    añadido**, **asignación de zona al nuevo equipo** o **verificación del cableado
    del lazo con aisladores**.


    ---

    📋 **Obligaciones de evidencia del manual:**

    - Nota: la fuente es inconsistente: "PUL: 4 MON: 0 SIR: 2 REL: 1 OTROS : 2" (DXc_Manual
    de configuracion, p. 48) [F1] declara 1 OTROS y la enumeración servida lista 5
    (DXc_Manual de configuracion, p. 48) [F1].'
- qid: hp011
  question: En la Morley RP1r, después de descargar la extinción el sistema no vuelve
    a estado normal tras resetear. ¿Qué comprobar?
  gold_estado: verificado
  conducta_esperada: answer
  conducta_bot: answer
  veredicto: PARCIAL
  diagnostico: Acierta en revisar r.I, averías enclavadas y entradas como ABORT/Flow,
    pero introduce una sección duplicada/alucinada sobre parámetro "ri/Resumen inhibido"
    con norma y valores confusos, menciona mal t.A/t.Fi y no cubre claramente t.A,
    zonas en alarma ni el procedimiento de rearme. Es útil parcialmente, pero contiene
    imprecisiones que pueden confundir a un técnico.
  bot_sources:
  - HLSI-MA-103_GuiaRapida_RP1r-Supra_ES_lr
  - HLSI-MN-103I_RP1r-Supra_lr
  - HLSI-MN-103_RP1r-Supra_lr
  coverage_status: appended
  coverage_appended_rows: 4
  release_profile: coverage_c1_v4
  harness_variant: serving_seam_v1_historical_single_turn_inputs
  bot_answer: '# RP1r-Supra: Sistema no vuelve a estado normal tras resetear después
    de extinción


    Este comportamiento puede deberse a varias causas. Comprueba en este orden:


    ---


    ## 1. Parámetro **r.i** — Rearme inhibido tras extinción


    El parámetro **r.i** configura un intervalo de tiempo durante el cual el rearme
    está **bloqueado** después de que la central entra en estado ACTIVADO [F13].


    - **Valor `- -`**: Rearme inhibido hasta finalizar la extinción o hasta que se
    agote el tiempo configurado en el parámetro **t.Fi** (t.A → 0 seg.) [F13]

    - **Valor `00`**: Rearme permitido en cualquier momento (valor por defecto) [F13]

    - **Valores `01` a `30`**: Rearme inhibido durante el intervalo definido en minutos
    [F13]


    ➡️ **Acción**: Accede al modo de programación (nivel 3) y verifica el valor del
    parámetro **r.i**. Si está configurado con `- -` o un valor de 01 a 30, la central
    no permitirá el rearme hasta que transcurra ese tiempo o se complete la extinción.


    ---


    ## 2. Parámetro **ri** — Resumen inhibido tras extinción


    Según la norma **UNE-EN 12094-1:2004, apartado 4.1.2**, tras la extinción realizada,
    el sistema pasa a **estado inhibido** para evitar reiniciar el proceso de extinción
    [F2].


    - **Valor `00`**: Resumen inhibido desde finalizar extinción o cuando agotado
    el tiempo configurado en **ri** (por defecto) [F2]

    - **Valores `01` a `30`**: Resumen inhibido después de intervención o reposición,
    en minutos [F2]


    ➡️ **Acción**: Verifica si el sistema está en estado inhibido (no es un fallo,
    es comportamiento normativo). Para salir de este estado puede ser necesaria la
    intervención/reposición física del sistema de extinción antes de que la central
    permita el rearme completo.


    ---


    ## 3. Averías enclavadas en circuitos supervisados


    **Todas las averías son por defecto enclavadas y requieren rearme manual** [F6].
    Si existe alguna avería activa en los circuitos supervisados, el rearme no devolverá
    la central a estado normal. Comprueba los LEDs de avería:


    - **Circuito de extinción 1/2** (terminales 1/2 — CCT EXT 1/2): LED "Avería circuito
    extinción" intermitente [F10]

    - **Señal de flujo** (terminal I — FLOW PRESS SWITCH): LED "Avería presión flujo"
    intermitente [F6][F10]

    - **Presión baja** (terminal H — LOW PRESS SWITCH): LED "Avería presión baja"
    intermitente [F6][F10]

    - **Puerta abierta** (terminal J — DOOR OPEN SWITCH): LED "C''to. supervisión
    puerta abierta" intermitente [F6]

    - **Pulsador ABORT** (terminal D — ABORT SWITCH): **Requiere rearme manual obligatorio**,
    sin opción de rearme automático [F10]


    ➡️ **Acción**: Revisa todos los LEDs de avería en el panel frontal. Si hay alguno
    activo, resuelve la condición de avería física antes de intentar el rearme.


    ---


    ## 4. Estado fin de extinción — verificar que el proceso ha concluido


    Tras la extinción, el estado correcto "fin extinción" es [F3]:

    - LED "Extinción realizada" iluminado de forma **fija**

    - Temporizador en **00 seg. fijo**

    - Circuitos de extinción (relés de solenoide) **desactivados**


    Si el LED "Extinción realizada" sigue **intermitente** (no fijo), la central aún
    está en estado de **disparo extinción** [F4], no en fin de extinción. En ese caso
    el parámetro **t-H** (tiempo de activación del circuito de extinción) puede no
    haber concluido aún [F4].


    ---


    ## 5. Procedimiento de rearme correcto


    Para rearmar correctamente [F6]:

    1. Accede con **nivel 2** de acceso

    2. Pulsa la tecla **"Rearme"**

    3. Esta acción reinicia la central y restablece todas las entradas enclavadas


    El estado normal queda confirmado cuando [F5]:

    - LED **"Servicio"** iluminado en verde

    - Zumbador en silencio

    - Relé avería general (GEN.FAULT) activado (continuidad entre C y NO)


    ---


