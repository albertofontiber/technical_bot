  bot_answer: '# Programación de ecuación CBE en AM-8200 para activar una salida


    ## Concepto previo


    Las **CBE (Control By Events)** son ecuaciones que activan un comando (salida)
    en función de un evento [F2]. La longitud máxima de una CBE es de **64 caracteres**
    [F2].


    **Requisito importante:** Para que un módulo de salida se active mediante CBE,
    NO debe tener programado un TIPO ID para señalizaciones de carácter general. Si
    lo tiene, la central no permite programar una ecuación [F3].


    ---


    ## Procedimiento paso a paso


    ### Paso 1 — Acceder al punto de salida (módulo)


    Navega al menú:

    **MENU PROGRAMMAZIONE → Punti → Moduli** [F1]


    Selecciona el módulo de salida que quieres programar usando los controles de CPU,
    LINEA y MOD [F1].


    ### Paso 2 — Ir a la pestaña de Programación


    Desde las pestañas disponibles (**Principale / Programmazione / Opzioni / Edit**),
    selecciona **Programmazione** [F2].


    Verás dos campos:

    - **Zona** — número de zona asignada al punto [F2]

    - **CBE** — campo donde se introduce la ecuación. Si ya hay una ecuación configurada,
    se visualizará; si no, el campo estará vacío [F2]


    ### Paso 3 — Seleccionar el campo CBE y entrar en edición


    Usa las teclas **▲▼** para seleccionar el parámetro CBE y pulsa la tecla de confirmación
    **☑** para editarlo [F2].


    ### Paso 4 — Introducir la ecuación CBE


    Usa el teclado alfanumérico para escribir la ecuación. Los operadores disponibles
    son [F3][F4][F5][F6][F7][F8]:


    **Operador OR** — se activa si AL MENOS UN operando está activo [F3]:

    ```

    OR (G9 G15 G23)

    ```

    *(También válido omitiendo OR: `(G9 G15 G23)`)* [F3]


    **Operador AND** — se activa solo si TODOS los operandos están activos [F3]:

    ```

    AND (G9 G15 G23)

    ```


    **Operador NOT** — niega el operando; la salida se desactiva cuando el operando
    entra en alarma [F3]:

    ```

    NOT (G23)

    ```


    **Operador XGRP** — se activa si AL MENOS DOS elementos del grupo indicado están
    activos [F6]:

    ```

    XGRP (G23)

    ```

    ⚠️ No se permite usar más de un grupo con XGRP: `XGRP (G23 G24)` **no está permitido**
    [F6].


    **Operador DEL** — permite retardo de activación [F7]:

    ```

    DEL (MM.SS MM.SS (CONDICIÓN))

    ```

    - Retardo máximo: **10 minutos** [F7]

    - Duración máxima: **10 minutos** [F7]

    - Solo puede existir **un operador DEL por ecuación** [F7]


    **Operador PRE** — usa el estado de pre-alarma de un sensor [F5]:

    ```

    OR (PRE(C1L1S2) PRE(C2L1S10))

    ```


    **Operador FLT** — usa el estado de avería de un dispositivo o zona [F4]:

    ```

    OR (FLT(C1L1S2) FLT(Z1))

    ```


    **Operador DIS** — detecta el estado de desactivación de una zona o punto [F8]:

    ```

    (DIS(Z1))

    ```


    **Operador TAC(SYS)** — se activa cuando se ejecuta el comando de silencio sirena
    en la central [F7]:

    ```

    (TAC(SYS))

    ```


    ### Paso 5 — Confirmar la ecuación


    Una vez introducida la ecuación, pulsa la tecla **Enter** para confirmar [F2].


    ---


    ## Ejemplo práctico completo


    Para que el módulo de salida **L01M01** se active si cualquiera de los grupos
    G1 a G16 está en alarma, usando grupos inversos intermedios [F9]:


    ```

    G301 = OR (G1 G2 G3 G4 G5 G6 G7 G8)

    G302 = OR (G9 G10 G11 G12 G13 G14 G15 G16)

    L01M01 CBE = OR (G301 G302)

    ```


    ---


    ## ⚠️ Restricciones importantes en grupos directos/inversos


    - Para un **grupo directo**: los operandos dentro del paréntesis deben tener índice
    **mayor** que el grupo que se programa. Ejemplo permitido: `G21 = (G23 G24)` [F3]

    - Para un **grupo inverso**: los operandos dentro del paréntesis deben tener índice
    **menor** que el grupo que se programa. Ejemplo permitido: `G307 = (G305 G306)`
    [F3]


    ---


    Fuente: AM-8200 Manual de programación — Doc. M-162.1-AM8200-ESP Rev A.3 — HONEYWELL
    LIFE SAFETY IBERIA


    ---


    También puedo ayudarte con: **operadores avanzados DEL con retardos específicos**,
    **programación de grupos software (Gxxx)** o **asignación de zona a un módulo
    de salida**.


    ---

