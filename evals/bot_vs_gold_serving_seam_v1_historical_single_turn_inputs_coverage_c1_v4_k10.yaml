  bot_answer: '# Conexionado de sirena convencional en salidas de sirena de la Morley
    ZXe


    ## 1. Terminales de conexión


    Los circuitos de sirena de placa se ubican en los terminales etiquetados como
    **SIRENA A (+) / SIRENA A (-)** y **SIRENA B (+) / SIRENA B (-)** [F2].


    - En la **ZX2e**: bloque de terminales con etiqueta `AUX RELAY A+ A- B+ B- SOUNDERS`
    [F2]

    - En la **ZX5e**: bloque **TB7** con terminales `A- A+ B- B+ C- C+ D- D+` [F2]


    ---


    ## 2. Requisitos de la sirena


    Cada sirena convencional **debe tener un diodo integrado** para impedir el consumo
    en polarización inversa [F2]. Esto es imprescindible porque:


    > El circuito se polariza en **inverso en reposo** para supervisar la línea, y
    cambia a polarización normal al dispararse [F2].


    Si conectas dispositivos **no polarizados**, deberás añadir **diodos de polarización
    y protección en cada uno** [F2].


    ---


    ## 3. Resistencia final de línea (RFL)


    Instala una **resistencia de 6,8 kΩ (0,5 W mínimo)** al final de cada circuito
    de sirena [F11]. Esta RFL es obligatoria para la supervisión de circuito abierto
    y cortocircuito [F11].


    ---


    ## 4. Esquema de conexión


    Según la **Figura 15** del manual [F1]:


    - **SIRENA A (+)** → hilo positivo (rojo) → sirenas en paralelo → **RFL 6800 Ω**
    al final

    - **SIRENA A (-)**→ hilo negativo (negro) corriendo en paralelo


    Las sirenas se conectan **en paralelo** entre los hilos + y −, con la RFL al final
    de la línea [F1].


    ---


    ## 5. Límites y restricciones


    - **Corriente máxima por circuito: 1 A** [F11]

    - **Longitud máxima de cable recomendada: 1 km**. Por encima de esta longitud,
    la capacitancia e inductancia del lazo pueden afectar al funcionamiento [F1]

    - Usa secciones de cable adecuadas para garantizar la tensión recomendada por
    el fabricante de la sirena, tanto en alimentación principal como en condiciones
    de **mínima tensión de baterías** (consulta las tablas 10 y 11 del manual) [F1]


    ---


    ## 6. Advertencias de instalación


    > ⚠️ **No enrolles el cable en los terminales. Corta y empalma las conexiones
    adecuadamente para mantener la supervisión de la línea** [F1].


    ---


    ## Programas de disparo por defecto


    Tras instalación nueva o borrado de programación [F3]:

    - **Sirena de placa A → Programa 3**

    - **Sirena de placa B → Programa 4**

    - **Sirena de placa C → Programa 5** (solo ZX5e)

    - **Sirena de placa D → Programa 6** (solo ZX5e)


    ---


    **Fuente:** Manual de Instalación ZX2e/ZX5e — MIE-MI-530rv001 (sin revisión registrada);
    Manual de Configuración ZX2e/ZX5e — MIE-MP-530rv001 (sin revisión registrada)


    ---

    ⚠️ **Obligaciones de evidencia del manual:**

    - "(NOTA: Las salidas de relé no se activan nunca)." (MIE-MU-530rv001, p. 17)
    [F7]'
