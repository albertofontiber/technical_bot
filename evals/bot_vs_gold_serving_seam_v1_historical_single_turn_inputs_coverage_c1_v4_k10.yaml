    - "Si, por el contrario, el dispositivo en cuestión es un módulo de salida, esta
    salida no se activará nunca, a no ser que se programe con software TIPO ID para
    señalizaciones generales." [F3]

    - Nota: el manual también indica: "Si **CUALQUIERA** de los tres operandos de
    esta ecuación (G9 G15 G23) está en alarma, el módulo de salida se activará, es
    decir:" [F3] · "- **SI** el grupo software 9 está en alarma, o

    - **SI** el grupo software 15 está en alarma, o

    - **SI** el grupo software 23 está en alarma

    - **ENTONCES** este módulo de salida se activará." [F3]

    - "**Zona** - número de zona asignada


    **CBE** - ecuación CBE del punto." [F2]'
