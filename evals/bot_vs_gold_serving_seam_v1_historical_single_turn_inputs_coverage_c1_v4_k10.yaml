    ## Batería de litio del ADW 535 — Lo que indican los fragmentos


    Los fragmentos recuperados **no describen un procedimiento de sustitución de la
    batería de litio** (tampón o de reloj) del ADW 535. Lo que sí aparece es:


    - La batería de litio está ubicada en el **Main Board LMB 35** [F8], visible en
    la Fig. 31 del manual.

    - En la primera puesta en marcha, debe **retirarse la cinta aislante de la batería
