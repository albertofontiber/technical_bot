  bot_answer: "# Configuración de una maniobra completa en la CAD-250\n\n> ⚠️ **Aviso\
    \ previo:** La programación de maniobras es una de las funciones más críticas\
    \ de la configuración del sistema. Requiere conocimiento específico del sistema\
    \ instalado, del plan de protección y del producto [F5].\n\n---\n\n## Concepto\
    \ general\n\nUna maniobra es un conjunto de **Entradas (Eventos) → Lógica → Salidas\
    \ (Acciones)** [F1]. El sistema soporta hasta **100.000 entradas y salidas** configuradas\
    \ en distintas maniobras [F10]. La maniobra gestiona **eventos** (cambios de estado),\
    \ no estados estáticos [F2].\n\n---\n\n## PASO 1 — Acceder al menú de maniobras\n\
    \nRuta de acceso desde el panel táctil [F1]:\n\n**MENÚ** → **MANIOBRAS** → **+AÑADIR**\n\
    \nDesde el software de configuración, accede a la ventana **CREACIÓN DE MANIOBRA**\
    \ [F6].\n\n---\n\n## PASO 2 — Crear la maniobra\n\nPulsa el botón **AÑADIR** [F4].\
    \ Se abre la pantalla de edición de la maniobra con:\n- Un **contador** que muestra\
    \ el número de maniobra actual [F4].\n- El campo **COINCIDENCIAS**: número de\
    \ eventos que deben cumplirse simultáneamente para que la salida sea verdadera\
    \ [F4].\n\n---\n\n## PASO 3 — Definir las entradas (Eventos)\n\n**3.1 Añadir un\
    \ evento**\n\nPulsa **AÑADIR** en el margen inferior → selecciona **EVENTO** en\
    \ la pantalla emergente [F2].\n\nA continuación elige el tipo de evento [F2]:\n\
    \n- **ENTIDAD**: cualquier elemento de la jerarquía del sistema (local o en red):\
    \ instalación, panel, lazo, área, zona, dispositivo, grupo o módulo virtual [F2].\n\
    - **CONDICIÓN TEMPORAL**: establece un periodo de tiempo durante el cual la ecuación\
    \ de entrada es válida [F2].\n\n**3.2 Configurar los parámetros del evento de\
    \ entidad**\n\nPara cada evento de entidad debes definir [F5] [F7]:\n\n- **Origen:**\n\
    \  - Local o red [F5]\n  - Nivel jerárquico: instalación, panel, lazo, área, zona,\
    \ dispositivo, grupo o módulo virtual [F5]\n\n- **Condición de estado (Tipo):**\
    \ [F7]\n  - *Alarma*: uno o más elementos en alarma\n  - *Avería*: uno o más elementos\
    \ en avería\n  - *Técnico*: una o más entradas activas\n\n- **Condición de tipo**\
    \ (discrimina qué dispositivo activa la condición) [F7]:\n  - Todos / Pulsadores\
    \ / Detectores / Entrada\n\n- **Repeticiones:** valor entero hasta **9999** —\
    \ número de veces que el evento debe repetirse en la entidad para que la entrada\
    \ sea válida. Ejemplo: 3 detectores en alarma en una zona [F7].\n\n- **Lógico**\
    \ [F7]:\n  - *Normal*: la condición de estado es verdadera\n  - *No (Negado)*:\
    \ la condición de estado es falsa (p. ej. \"no hay alarma\")\n\n> **Nota software:**\
    \ Desde la versión **1.1.1** es posible seleccionar un elemento de salida como\
    \ condición de entrada; en ese caso, el cambio a condición de avería hace verdadera\
    \ la entrada. Para ello, desmarca la casilla **\"Sólo dispositivos de entrada\"\
    ** [F6].\n\n**3.3 Configurar una condición temporal (opcional)**\n\nSi necesitas\
    \ condicionar la maniobra a un periodo de tiempo [F8] [F9]:\n\n- **Desde mes /\
    \ Hasta mes**\n- **Desde día / Hasta día** (días de la semana)\n- **Desde hora\
    \ / Hasta hora**\n- **Lógico:**\n  - *Normal*: el periodo definido hace la condición\
    \ verdadera\n  - *No*: el periodo definido hace la condición falsa\n\nEjemplo\
    \ de uso: impedir que las sirenas se activen en un área concreta un día y hora\
    \ determinados [F8].\n\nPulsa **GUARDAR** para confirmar o **CANCELAR** para deshacer\
    \ [F8].\n\n---\n\n## PASO 4 — Definir la lógica de coincidencias\n\nEn el campo\
    \ **COINCIDENCIAS** indica cuántos eventos deben cumplirse [F4]:\n\n- **Coincidencias\
    \ = 1** → lógica **OR**: cualquiera de los eventos activa la salida [F4].\n- **Coincidencias\
    \ = N (igual al total de eventos)** → lógica **AND**: todos los eventos deben\
    \ cumplirse [F4].\n- **Coincidencias = X (entre 1 y N)** → lógica **X de N**:\
    \ se deben cumplir X eventos cualesquiera de los N definidos [F4].\n\n---\n\n\
    ## PASO 5 — Definir las salidas (Acciones)\n\n**5.1 Añadir una acción**\n\nPulsa\
    \ **AÑADIR** → selecciona **ACCION** en la pantalla emergente [F3].\n\nSe presentan\
    \ dos campos [F3]:\n\n- **Retraso**: tiempo configurable entre **0 y 600 segundos**\
    \ antes de iniciar la acción, contado desde que la condición de entrada es verdadera\
    \ [F3] [F5].\n- **Entidad de destino**: panel, lazo, área, zona, dispositivo,\
    \ grupo o módulo virtual (siempre relativa al sistema local) [F3].\n\n> ⚠️ **El\
    \ programa no permite mezclar acciones sobre entidades de paneles diferentes**\
    \ [F10].\n\n**5.2 Configurar la acción**\n\nEn la pantalla **ACCIÓN DE LA ENTIDAD**\
    \ define [F3] [F8]:\n\n- **Retraso**: modificable aquí también [F3].\n- **Tipo\
    \ de acción** [F5] [F8]:\n  - *Activar* las salidas\n  - *Desactivar* las salidas\n\
    \  - *Habilitar* la entidad\n  - *Deshabilitar* la entidad\n  - *Test*: pone en\
    \ modo test la entidad\n  - *Reiniciar* la entidad\n  - *Pulso*\n\n- **Tipo de\
    \ elemento** sobre el que aplica la acción [F5]:\n  - Todos / Sirenas / Relés\
    \ / Sirena discontinua\n\nPulsa **GUARDAR** para confirmar [F8].\n\n---\n\n##\
    \ PASO 6 — Verificar la maniobra completa\n\nLa ventana de maniobra mostrará [F10]:\n\
    - **Cuadro de eventos** (izquierda): todas las entradas configuradas.\n- **Cuadro\
    \ de acciones** (derecha): todas las salidas que se desencadenarán.\n- Botones\
    \ disponibles: **Borrar elemento**, **Editar**, **Borrar maniobra** [F10].\n\n\
    ---\n\n## Resumen del flujo completo\n\n```\n[Evento 1] ─┐\n[Evento 2] ─┤→ [Coincidencias:\
    \ X de N] → [Retardo 0-600s] → [Acción sobre Entidad]\n[Evento N] ─┘\n+ [Condición\
    \ Temporal] (opcional)\n```\n\n---\n\n**Fuentes:**\n- CAD-250 Manual de Configuración\
    \ MC-380-es-2026-c (rev. c, 2026-04-23)\n- CAD-250 Manual de Software de Configuración\
    \ MS-416-es-2026-b (rev. b)\n\n---\n\nTambién puedo ayudarte con: **configuración\
    \ de Grupos** para simplificar maniobras con múltiples elementos, **Módulos Virtuales**\
    \ para lógicas encadenadas, o un **ejemplo práctico completo** (p. ej. 2 detectores\
    \ en alarma → activar sirena con retardo de 30 s).\n\n---\n\U0001F4D6 **Obligaciones\
    \ de evidencia del manual:**\n- \"Defina para cada salida el tipo de acción que\
    \ debe realizarse cuando todos las condiciones de los eventos de entrada sean\
    \ verdderas.\" (CAD-250_Manual-software-configuracion-MS-416-es-2026-b, p. 54)\
    \ [F8]"
