    \ deben instalarse en **cada lazo analógico** [F3]\n\n## Terminales del aislador\n\
    \nEl aislador dispone de **4 terminales numerados: 1, 2, 3 y 4** [F1].\n\nLa conexión\
    \ en el lazo sigue la topología en bucle cerrado, con el aislador intercalado\
    \ en serie en el cableado del lazo [F1].\n\n## Procedimiento de comprobación del\
    \ lazo con aisladores instalados\n\n1. **Antes de conectar el panel**, desconecta\
    \ temporalmente los aisladores **cortocircuitando los terminales 2 y 4** de cada\
    \ aislador [F1].\n\n   > ⚠️ El cableado del lazo **DEBE desconectarse del panel**\
    \ mientras realizas este procedimiento [F1].\n\n2. Con los aisladores cortocircuitados,\
    \ comprueba la continuidad de cada extremo del lazo y mide la resistencia final\
