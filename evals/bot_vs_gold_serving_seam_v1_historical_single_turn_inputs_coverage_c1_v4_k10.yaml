  bot_answer: '# ID3000 — Programación de coincidencia de 2 detectores para activar
    sirena


    Hay **dos enfoques** según el manual: mediante la **Matriz de Control** (coincidencia
    a nivel de salida) o mediante la **Coincidencia de Alarma** a nivel de central
    (coincidencia antes de entrar en estado de alarma). Te explico ambos:


    ---


    ## ENFOQUE 1 — Coincidencia en la Matriz de Control


    Este método activa la sirena solo cuando dos detectores de la zona están en alarma,
    pero el sistema ya habrá entrado en estado de alarma [F3].


    ### Paso 1 — Configurar la entrada de la Matriz de Control


    En el menú de Matriz de Control, al crear un nuevo evento [F3]:


    1. Selecciona la **zona** como tipo de entrada (no equipo individual ni tecla)
    [F1].

    2. En el paso de **"Limitado por TIPO"**, selecciona el tipo de detector que aplica
    (p.ej. `ANALÓGICO` para detectores térmicos, iónicos, ópticos, VIEW y multisensor)
    [F1].

    3. En el paso **"Indique tipo de coincidencia"**, selecciona la opción **`2: COINCIDENCIA
    2 EQUIPOS`** [F3].


    > ⚠️ **PRECAUCIÓN EN54-2: 7.1.4** — No incluyas pulsadores manuales (MCP/PUL)
    en el grupo de coincidencia [F1][F3].


    ### Paso 2 — Separar los pulsadores manuales (obligatorio)


    Para evitar que los pulsadores manuales queden incluidos en el grupo de coincidencia,
    debes programar **dos instrucciones de Matriz de Control separadas** [F1][F3]:


    - **Instrucción 1:** Define la entrada de tipo `Pulsador Manual (MCP)` como **`1:
    UN ÚNICO EQUIPO`** (sin coincidencia) [F1].

    - **Instrucción 2:** Define la entrada del tipo analógico (detectores) con **`2:
    COINCIDENCIA 2 EQUIPOS`** [F1].


    ### Paso 3 — Definir la salida de sirena


    En la columna de SALIDA de esa línea de Matriz de Control, asigna la función **`EVACUAR`**,
    que acciona todos los circuitos de sirena configurados como salida de sirena [F11].


    > **Nota:** Las sirenas se activarán solo si están configuradas como salidas de
    sirena y no como relés [F11].


    ---


    ## ENFOQUE 2 — Coincidencia de Alarma a nivel de central (Sección 11.21 / Sección
    4)


    Este método es más restrictivo: el sistema **no entra en estado de alarma** hasta
    que se cumple la coincidencia. Mientras tanto, el sistema queda en estado de **PRIMERA
    ALARMA / PREALARMA** y el LED de ALARMA rojo no se ilumina [F4].


    > **Nota importante:** Esta función opera de forma **totalmente independiente**
    a la coincidencia de las matrices de control [F4].


    ### Configuración desde el panel (Sección 11.21):


    1. Accede a **Configuración de la central → opción 21 o 22: "Niveles COINCIDENCIA
    en ALARMA"** [F7].

    2. En **"Niveles COINCIDENCIA en ALARMA para EQUIPOS"**, el **Nivel 2 = 2 es fijo**
    (dos equipos) — no requiere configuración adicional para el caso básico de 2 detectores
    [F7].

    3. Asegúrate de que los detectores de la zona tienen asignado el **nivel de coincidencia
    2: "Dos o más sensores en la misma zona"** [F4].


    ### Configuración desde el software PK-ID3000 (Sección 2.12):


    1. Accede a **Modificar Opciones de la Central → pestaña "Coincidencia de Alarma"**
    [F5].

    2. En la sección **"Nivel de Coincidencia de los Equipos en Alarma"**, los niveles
    1 y 2 son fijos (1 equipo y 2 equipos respectivamente) [F5][F7].

    3. En **"Funcionamiento de la Coincidencia para ''Cualquier Zona''"**, selecciona
    si los equipos deben estar en la **misma central/red** o en la **misma zona**
    [F5].


    ---


    ## Diferencia clave entre ambos enfoques


    - **Matriz de Control:** La central entra en alarma con el primer detector; la
    sirena se activa solo cuando hay 2 en alarma [F4].

    - **Coincidencia de Alarma (Sección 11.21):** La central **no entra en alarma**
    hasta que hay 2 detectores; permanece en PREALARMA hasta entonces [F4].


    ---


    **Fuentes:**

    - MCDT190 — ID3000 Manual de configuración (sin revisión registrada)

    - MPDT190 — ID3000 Manual de programación (sin revisión registrada)

    - MADT190_14 — Anexo ID3000, Versión de software 4.63 (sin revisión registrada)

    - MCDT191 — ID3000 Manual del programa de configuración PK-ID3000, v. 2.17e (sin
    revisión registrada)

    - MADT190_07 — (sin revisión registrada)


    ---


    También puedo ayudarte con: **configuración de PREALARMA y sus indicaciones**,
    **programación de retardos en la salida de sirena** o **verificación de la Sección
    11.21 para ajustes de red**.


    ---

    📖 **Información adicional del manual:**

    - "- Radio button: Misma Central o Red

    - Radio button: Siempre la misma Zona" [F5]

    - "- Radio button: Deber estar en la misma Subzona

    - Radio button: Se extiende en el rango de Subzonas especificadas (labeled as
    4)" [F5]


    ---

    📋 **Obligaciones de evidencia del manual:**

    - Nota: la fuente es inconsistente: "**La coincidencia de equipos está disponible
    pero limitada SOLO a dos equipos**." (MPDT190, p. 74) [F2] declara 2 equipos y
    la enumeración servida lista 4 (MPDT190, p. 73) [F3].

    - Nota: la fuente es inconsistente: "**La coincidencia de equipos está disponible
    pero SOLO para dos equipos**." (MPDT190, p. 74) [F2] declara 2 equipos y la enumeración
    servida lista 4 (MPDT190, p. 73) [F3].

    - Nota: la fuente es inconsistente: "○ Cualquier Zona Coincidencia de 2 Zonas
    ☐" (MADT190_07, p. 5) [F10] declara 2 Zonas y la enumeración servida lista 1 (MADT190_07,
    p. 5) [F10].'
