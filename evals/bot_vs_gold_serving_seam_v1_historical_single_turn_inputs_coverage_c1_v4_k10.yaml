  bot_answer: "# Notifier PEARL — Lazo SLC: capacidad, aisladores y alta/edición de\
    \ equipos\n\n---\n\n## 1. Capacidad máxima de equipos por lazo\n\n**Protocolo\
    \ Opal:**\n- Máximo **159 sensores + 159 módulos** por lazo [F2]\n- Total: **318\
    \ equipos de lazo por lazo analógico** [F1]\n\n**Protocolo CLIP:**\n- Máximo **99\
    \ sensores + 99 módulos** por lazo [F2]\n\n**Protocolo mixto Opal + CLIP:**\n\
    - El límite de equipos CLIP en lazo mixto es de **40 equipos** [F5]\n- Si se supera\
    \ ese límite, la autoconfiguración continúa pero señala fallos [F5]\n\n**Límite\
    \ global del sistema (EN54-2: 13-7):**\n- Máximo **512 sensores y/o pulsadores\
    \ manuales** en total entre AMBOS lazos [F1]\n\n**Carga máxima:** **0,75 A por\
    \ lazo** [F2]\n\n---\n\n## 2. Requisitos de aisladores (EN54-2: 12.5.2)\n\n**Regla\
    \ general EN54:** máximo **32 equipos entre aisladores** [F1]\n\n**Para la Pearl,\
    \ los límites concretos son:**\n\n- **Equipos sin aisladores internos** (incluidos\
    \ CLIP y algunos Opal): no más de **20 equipos entre aisladores** [F1]\n- **Equipos\
    \ con aisladores internos** (con base B501 AP): deben cumplir los requisitos de\
    \ EN54-2 [F1]\n- **Nota de puesta en marcha del lazo:** para que los aisladores\
    \ se cierren al aplicar alimentación, la carga entre aisladores no debe superar\
    \ **20 SU** [F6]\n- **Nota del diagrama de cableado:** no colocar más de **25\
    \ equipos entre aisladores** (20 si se usan aisladores FET) [F8]\n\n**Sobre los\
    \ aisladores internos Opal:**\n- La mayoría de equipos Opal incorporan aisladores\
    \ FET internos [F1]\n- Con base **B501 AP**, el aislador se conecta a los terminales\
    \ **+2 y +4** en el extremo positivo [F1]\n- Si se usan bases sin conectores de\
    \ cable de lazo de extremo positivo adicionales, el aislador interno queda inutilizado\
    \ [F1]\n\n**Longitud máxima del lazo:** **2000 metros** (longitud total del par\
    \ de comunicaciones) [F9]\n\n**Resistencia del lazo:** medir entre IN- y OUT-,\
    \ multiplicar por 2 y añadir la resistencia de cada aislador (**entre 0,1 y 0,13\
    \ ohms** cada uno). La **capacitancia del cable debe ser inferior a 0,5 µF** [F12]\n\
    \n---\n\n## 3. Alta de equipos: Autoconfiguración desde la central\n\nLa forma\
    \ más rápida de dar de alta equipos es mediante la **función de autoconfiguración**\
    \ [F3].\n\n**Pasos:**\n\n1. Accede al menú de configuración (nivel de acceso requerido)\
    \ y selecciona **1: Autoconfiguración** [F3]\n2. Elige si aplicar la autoconfiguración\
    \ a **todos los lazos** o a un **lazo específico** [F3]\n3. Selecciona el modo\
    \ de autoconfiguración [F3] [F5]:\n   - **1: Todos Prot. OPAL/CLIP** → detecta\
    \ equipos Opal y CLIP, comprueba direcciones duplicadas\n   - **2: OPAL/CLIP (No\
    \ detecta duplicidad)** → más rápido, sin comprobación de duplicados\n   - **3:\
    \ Sólo con protocolo CLIP** → solo autoconfigura equipos CLIP aunque haya Opal\
    \ en el lazo\n4. Selecciona el modo de actualización [F5]:\n   - **1: Permite\
    \ Añadir/Borrar/Cambiar**\n   - **2: Sólo Añadir Nuevos Equipos**\n5. El proceso\
    \ se inicia automáticamente. Sensores y módulos (Opal y CLIP) se detectan en la\
    \ misma pasada [F3]\n6. Al finalizar, se muestran los resultados en pantalla LCD\
    \ por lazo. Usa las teclas **◄/►** para navegar entre lazos [F5]\n\n**Nota:**\
    \ Si un equipo Opal se autoconfigura, por defecto será Opal. Si el número de equipos\
    \ CLIP supera 40, selecciona manualmente la opción «Sólo con protocolo CLIP» [F5]\n\
    \n**Nota:** Los pulsadores CLIP se autoconfiguran como «MON» y deben cambiarse\
    \ manualmente a tipo **«cPUL»** [F10]\n\nLos equipos configurados pueden consultarse\
    \ en cualquier momento desde **nivel de acceso 2 → «Resumen de Equipos»** [F3]\n\
    \n> La configuración puede realizarse también (de forma más óptima) con el **programa\
    \ de configuración ITS**, y puede transferirse a un ordenador portátil para editarla\
    \ y archivarla [F3]\n\n---\n\n## 4. Edición individual de equipos desde la central\n\
    \nAccede a **4.2 Editar equipos** para modificar sensores o módulos individualmente\
    \ [F4] [F10].\n\n**Para sensores, los parámetros editables son** [F4]:\n- Números\
    \ de referencia de zona de red\n- Tipo de equipo\n- Entorno del número de referencia\
    \ de zona (opcional)\n- Número de central (LOCAL; 1-125 para otras centrales de\
    \ red)\n- Número de zonas (hasta **255 zonas locales** o **8192 zonas de red**)\n\
    - Número de células (hasta **255**)\n- Prioridad de interrogación (solo CLIP:\
    \ limitada a **30 equipos**)\n- Acción de parpadeo en equipo interrogado (elección\
    \ de color solo Opal)\n- Opción de tipo de equipo (VIEW, Optiplex y SMART)\n-\
    \ Ajuste del nivel de alarma\n- Ajuste del nivel de alarma horaria\n- Ajuste del\
    \ nivel de prealarma\n- Selección de programación horaria (cambio de sensibilidad)\n\
    - Grupo AWACS (**50 grupos** con todos los sensores CLIP salvo HEAT)\n- Retardo\
    \ de alarma\n- Ajuste no silenciable para LED remoto (solo Opal); respuesta a\
    \ SILENCIAR SIRENAS\n- Operación solo modo térmico (L6) (solo SMART y Optiplex)\n\
    - Número de aplicación (solo equipos SMART 4)\n- Ajuste de función LED remota\
    \ (solo Opal): «Seguir el equipo» (predeterminada) o «Controlada por reglas de\
    \ causa-efecto»\n- Retardo de confirmación de coincidencia de detector: hasta\
    \ **240 s (4 min)**; puede usarse con dependencia tipo B\n\n**Para módulos, los\
    \ parámetros editables son** [F10]:\n- Números de referencia de zona de red\n\
    - Tipo de equipo\n- Entorno del número de referencia de zona (opcional)\n- Número\
    \ de central (LOCAL; 1-64 para otras centrales de red)\n- Número de zonas (hasta\
    \ **255 zonas locales** o **8192 zonas de red**)\n- Número de células (hasta **255**)\n\
    - Prioridad de interrogación (solo CLIP: limitada a **30 equipos**)\n- Acción\
    \ de parpadeo en equipo interrogado (elección de color solo Opal)\n- Asignar si\
    \ es necesario para alimentación de potenciador de lazo (solo para alarma)\n-\
    \ Seleccionar función de acción de subdirecciones de módulo de entrada o salida\n\
    - Ajuste de acción de fallo no AUX: entrada de alarma o avería\n- Ajuste de supervisión\
    \ de avería de cortocircuito o circuito abierto\n- Periodo de retardo de confirmación\
    \ de alarma\n- Ajuste no silenciable para LED remoto (solo Opal); respuesta a\
    \ SILENCIAR SIRENAS\n- Ajuste de entrada enclavada\n- Ajuste de supresión de pestaña\
    \ AUX\n\n> ⚠️ **Advertencia:** Algunos periodos de retardo de alarma configurables\
    \ en módulos pueden contravenir los requisitos de EN54-2 [F10]\n\n---\n\n**Fuentes:**\n\
    - Manual de instalación y puesta en marcha PEARL, ref. 997-669-005-3 (sin revisión\
    \ registrada)\n- Manual de configuración de la central PEARL, ref. 997-671-005-3\
    \ (rev. 997-671-005-3)\n\n---\n\nTambién puedo ayudarte con: **conexionado físico\
    \ del lazo en la placa base**, **configuración del Loop Splitter 795-131** o **reglas\
    \ de causa-efecto para módulos de salida**.\n\n---\n⚠️ **Información adicional\
    \ del manual:**\n- \"La resistencia máxima del lazo no debe superar los límites\
    \ definidos en **«6.4.2 Comprobaciones del lazo antes de conectar el cableado»**,\
    \ paso 2.\" [F12]\n- \"**NUNCA utilice un multímetro de alta tensión en el lazo\
    \ de detección.**\" [F1]\n\n---\n⚠️ **Obligaciones de evidencia del manual:**\n\
    - \"Es de vital importancia que el cable utilizado sea de buena calidad y que\
    \ se instale de forma correcta.\" (997-669-005-3_Instal-Comm_ES, p. 17) [F12]"
