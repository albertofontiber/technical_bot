  bot_answer: "## Conexión de baterías en la CAD-150-8\n\n### Especificaciones de\
    \ las baterías\n\nLas centrales analógicas requieren **dos baterías de 12V 7A/h**\
    \ [F4]. Se conectan **en serie** para el correcto funcionamiento [F4].\n\n###\
    \ Procedimiento de conexión\n\n1. **Coloca las baterías** en la parte inferior\
    \ de la caja, en el espacio reservado para ello, de forma **vertical** [F4].\n\
    \n2. **Conecta el cable puente** entre baterías: el cable suministrado con la\
    \ central debe unir el **polo positivo de una batería con el polo negativo de\
    \ la otra** (conexión en serie) [F4].\n\n3. **Conecta los cables del circuito**\
    \ (rojo y negro) al **positivo y negativo** del conjunto de baterías [F1].\n \
    \  - El conector de baterías en la placa base está identificado como **Conector\
    \ Batería** (posición 11 en la PCB Base) [F2][F3].\n   - El fusible de baterías\
    \ está identificado como **Fusible Baterías** (posición 10 en la PCB Base) [F2][F3].\n\
    \n### ⚠️ Orden de conexión obligatorio\n\n**Primero la red, después las baterías.**\
    \ Si no se respeta este orden, el equipo podría sufrir daños [F5].\n\n- Primero:\
    \ conectar a la red principal (**230VAC**) activando el magnetotérmico bipolar\
    \ [F5][F6].\n- Segundo: conectar las baterías [F5][F6].\n\n### Verificación previa\
