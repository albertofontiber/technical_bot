    \           | 7  | Fusibles salidas sirenas       |\n| - | --------------------------------\
    \ | -- | ------------------------------ |\n| 2 | Conectores Bucle 2          \
    \     | 8  | Fusible salida 24 v auxiliares |\n| 3 | Conectores Bucle 3      \
    \         | 9  | Tecla arranque por Batería     |\n| 4 | Conectores Bucle 4  \
    \             | 10 | Fusible Baterías               |\n| 5 | Conectores relés\
