  bot_answer: "# Cableado y configuración (alta) de un lazo en la INSPIRE E10/E15\n\
    \n---\n\n## PARTE 1 — CABLEADO DEL LAZO\n\n### Módulo de lazo (LAZO OPAL X2 —\
    \ código color Morado, ref. HOP-433-100)\n\nEl módulo gestiona **2 circuitos de\
    \ lazo** con los siguientes terminales [F1][F3]:\n\n**Lazo 1:**\n- Terminal **1**\
    \ → Lazo 1 Salida +VE\n- Terminal **2** → Lazo 1 Salida -VE\n- Terminal **3**\
    \ → ⊕ (**NO USAR** para pantalla de cable)\n- Terminal **4** → Lazo 1 Entrada\
    \ +VE\n- Terminal **5** → Lazo 1 Entrada -VE\n\n**Lazo 2:**\n- Terminal **6**\
    \ → Lazo 2 Salida +VE\n- Terminal **7** → Lazo 2 Salida -VE\n- Terminal **8**\
    \ → ⊕ (**NO USAR** para pantalla de cable)\n- Terminal **9** → Lazo 2 Entrada\
    \ +VE\n- Terminal **10** → Lazo 2 Entrada -VE\n\n> ⚠️ **La pantalla del cable\
    \ de lazo debe conectarse a la Barra de Tierra de la central, NO a los terminales\
    \ 3 u 8** [F1][F3].\n\n---\n\n### Pasos de conexión física\n\n1. Inserta el módulo\
    \ de lazo en la ranura del portamódulos. Se recomienda comenzar por los módulos\
    \ de lazo desde la **RANURA 3** (junto a la CPU) hacia la derecha [F4].\n\n2.\
    \ Conecta el cable de lazo en bucle cerrado (2 hilos) a los terminales correspondientes\
    \ del módulo [F8]:\n   - Salida (+VE / -VE) → hacia el primer dispositivo del\
    \ lazo\n   - Entrada (+VE / -VE) → retorno desde el último dispositivo del lazo\n\
    \n3. Conecta la pantalla del cable a la **Barra de Tierra** de la central [F1][F12].\n\
    \n> ⚠️ **No mezcles dispositivos OPAL y CLIP en el mismo lazo** [F1].\n\n---\n\
    \n### Capacidad por lazo [F1]\n\n- Protocolo **OPAL**: hasta **159 detectores**\
    \ + hasta **159 módulos** por lazo\n- Protocolo **CLIP**: hasta **99 detectores**\
    \ + hasta **99 módulos** por lazo\n- Corriente máxima por lazo: **750 mA** [F1]\n\
    - Restricción EN54-2 (13.7): máximo **512 detectores y/o pulsadores** por módulo\
    \ de lazo (2 circuitos) [F1]\n\n---\n\n### Numeración de lazos [F1]\n\nLos circuitos\
    \ se numeran **secuencialmente de izquierda a derecha** del portamódulos. El primer\
    \ módulo en la ranura izquierda tiene el Lazo 1. En la E15 (dos filas de portamódulos),\
    \ la segunda fila continúa la numeración desde la primera [F1].\n\n---\n\n## PARTE\
    \ 2 — COMPROBACIONES PREVIAS CON MULTÍMETRO (antes de conectar a la central)\n\
    \nRealiza estas pruebas **con el lazo desconectado físicamente de los terminales\
    \ de la central** [F9]:\n\n1. **Continuidad y resistencia extremo a extremo**\
    \ del lazo. Mide entre Lazo X Entrada -VE y Lazo X Salida -VE, multiplica el resultado\
    \ por 2 y suma la resistencia de cada aislador (**0,1 a 0,13 Ω** por aislador)\
    \ [F9].\n\n   Límites de resistencia máxima [F9]:\n   - Protocolo **OPAL**: resistencia\
    \ < **40 Ω**\n   - Protocolo **CLIP** (detección doble dirección): < **40 Ω**\n\
    \   - Protocolo **CLIP** (sin detección de dirección duplicada): < **71 Ω**\n\
    \   - Capacidad del cable: < **0,5 µF** [F9]\n\n2. **Continuidad de la pantalla**\
    \ del cable (resistencia muy baja) y verificar que **no hay continuidad entre\
    \ la pantalla y los cables +VE / -VE** [F8][F10].\n\n3. **Prueba de diodo** con\
    \ multímetro [F10]:\n   - En polaridad **invertida** (+VE al negativo del lazo,\
    \ -VE al positivo): debe indicar diodo en polarización directa ✓\n   - En polaridad\
    \ **normal** (+VE al positivo, -VE al negativo): debe leer resistencia baja que\
    \ va aumentando al cargarse los condensadores de los dispositivos. Si indica diodo\
    \ en directa → hay dispositivos con polaridad invertida o cortocircuito.\n\n4.\
    \ Verificar que la pantalla del cable **no tiene conexión a tierra en ningún otro\
    \ punto** del recorrido del lazo (salvo en la barra de tierra de la central) [F10].\n\
    \n> ⚠️ **NUNCA uses un comprobador de alta tensión (megóhmetro) en el circuito\
    \ de lazo** [F8].\n\n---\n\nUna vez verificado el cableado, conecta el circuito\
    \ al bloque de terminales de lazo de la central [F12].\n\n---\n\n## PARTE 3 —\
    \ CONFIGURACIÓN (ALTA) DEL LAZO\n\n### Paso previo: primer encendido\n\nLa primera\
    \ vez que se encienda la central, debe hacerse **sin el cableado externo conectado**,\
    \ pero con la fuente de alimentación y un circuito de lazo probado conectado [F2].\n\
    \n---\n\n### Configuración con CLSS (software de configuración)\n\nSigue este\
    \ procedimiento [F6][F5]:\n\n1. Conecta la herramienta de configuración **CLSS**\
    \ a la central.\n\n2. Ve a **Ajustes → Ajustes HMI** y en **Tipo de Marca** selecciona\
    \ **Notifier EN** [F6].\n\n3. Ve a **Configuración de lazo** (Ajustes de lazo)\
    \ para cada lazo [F6][F5]:\n   - **Protocolo de lazo**: selecciona **Opal** (o\
    \ **Clip** si procede — requiere licencia adicional)\n   - **Limitar a VdS 2540**:\
    \ Sí o No (el valor de resistencia cambia según la selección)\n   - **Resistencia\
    \ (Ohm)**: introduce el valor medido (ejemplo en pantalla: **93,5 Ω**) [F5]\n\
    \   - **Tipo de Cable**: selecciona el tipo correspondiente\n   - Si el lazo **no\
    \ se usa**: marca ☑ **Sin Uso** [F2][F6]\n\n4. Envía el archivo de configuración\
    \ a la central (Paso 8, pasos 01 a 04 del flujo CLSS) [F6].\n\n> ⚠️ De forma predeterminada,\
    \ la central tiene licencia solo para **protocolo OPAL avanzado**. Para usar CLIP\
    \ o TC800 OPAL/CLIP se necesita **licencia adicional** antes de realizar la Auto\
    \ Configuración [F6].\n\n---\n\n### Auto Configuración (búsqueda de dispositivos)\n\
    \nUna vez enviada la configuración [F7]:\n\n1. Selecciona **Auto Configuración**\
    \ en la central para buscar dispositivos en el lazo. Lee el aviso emergente y\
    \ confirma seleccionando **Auto Configuración** / **Learn Devices** [F7].\n\n\
    2. Al completarse, selecciona la flecha **>** junto al botón Auto Búsqueda para\
    \ ver el estado de averías del lazo [F7].\n\n3. Lee los mensajes de avería y corrige\
    \ los problemas detectados. Causas típicas [F7]:\n   - Discordancia entre diseño\
    \ e instalación\n   - Averías en el cableado\n   - Fuente de RFI externa\n   -\
    \ Error de módulo o fuente de alimentación\n   - Conexionado incorrecto en dispositivos\n\
    \n4. Selecciona **Hecho** al completar. Si no hay averías, vuelve a la página\
    \ **Información del sistema** [F7].\n\n5. **Repite los pasos 01 a 04 para cada\
    \ lazo** hasta descubrir todos [F7].\n\n---\n\n**Fuentes:**\n- HOP-138-8ES issue\
    \ 6 (01-2026) — Instrucciones de puesta en marcha INSPIRE E10/E15\n- HOP-138-9ES\
    \ issue 5 (11-2025) — Manual de instalación INSPIRE E10/E15\n- 4188-1132-ES issue\
    \ 3 (04-2025) — Guía rápida CLSS-10\n\n---\n\nTambién puedo ayudarte con: **comprobación\
    \ de averías de lazo y sus mensajes**, **longitud máxima de cable de lazo con\
    \ CLSS**, o **instalación y conexionado de dispositivos OPAL/CLIP**.\n\n---\n\
    ⚠️ **Información adicional del manual:**\n- \"- Warning text in red: \"Do not\
    \ use 3 + & 8 +.\" [F4]\n- \"A warning triangle symbol (△) is shown.]\" [F4]"
