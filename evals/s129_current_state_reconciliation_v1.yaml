recommended_upstream_to_downstream_sequence:
  - >-
    Freeze this reconciliation as the sole navigation snapshot and classify
    S112-S128 artifacts as retain, archive, revoked or superseded.
  - >-
    Build the exact claim-to-extraction-to-gained-span map for the 27 changed
    documents and 100 recovered blocks. Stop the KPI branch if it finds no
    material opportunity in non-OK or unmeasured claims.
  - >-
    In parallel, close chunks_v3 M0b locally in disposable PostgreSQL plus
    pgvector and verify apply, permissions, activation and rollback without
    production data. This is infrastructure readiness, not OK credit.
  - >-
    Only if the impact map finds at least one materially relevant new span,
    build a loadable shadow generation and generate context/embeddings for the
    minimal preregistered population. Expand only after the cheap gate passes.
  - >-
    Compare chunks_v2 versus chunks_v3 at retrieval first, then rerank only
    changed cases, then synthesis only cases whose served evidence changes.
  - >-
    Resolve the 27 actual synthesis-not-measured claims using frozen evidence;
    add the two S126 claims only in an isolated candidate arm. This can publish
    a complete hybrid funnel, not an official atomic KPI.
  - >-
    To publish an official atomic KPI, either migrate/adjudicate the 77 remaining
    legacy carries or publish legacy-parent and atomic denominators in parallel
    with a frozen crosswalk. Do not call the hybrid bridge fully atomic.
  - >-
    Resume relational extraction, voice/model resolution, visual evidence and
    response-format work as independent tracks only after each has a bounded
    target cohort and isolated credit.

